        <h1>在項目中使用ofa.js的AI技能</h1>
        <p>由於 ofa.js 目前尚未成爲廣泛知名的框架，主流 AI 模型尚不具備直接使用 ofa.js 的能力。爲此，我們精心準備瞭專用技能包，幫助 AI 學習和査閱 ofa.js 的使用方法。</p>
        <h2>使用方法</h2>
        <p>在支持技能的 AI 工具中，根據您使用的 AI 模型語言選擇相應的技能地址：</p>
        <p><strong>註意：</strong> 由於 ofa.js 的文檔最初是用中文編寫的，中文版本的技能包內容更爲完整和準確。如菓您使用英文版本時遇到問題，建議嘗試使用中文版本。</p>
        <h3>中文模型</h3>
        <p>如菓您使用的是中文 AI 模型，請使用以下地址：</p>
        <pre><code class="hljs">https:<span class="hljs-regexp">//</span>raw.githubusercontent.com<span class="hljs-regexp">/ofajs/</span>ofa.js<span class="hljs-regexp">/main/</span>skills/ofajs-docs.zip</code></pre>
        <p>常見的中國 AI 模型包括：DeepSeek、Kimi、GLM、MiniMax、Qwen 等。</p>
        <h3>英文模型</h3>
        <p>如菓您使用的是英文 AI 模型，請使用以下地址：</p>
        <pre><code class="hljs">https:<span class="hljs-regexp">//</span>raw.githubusercontent.com<span class="hljs-regexp">/ofajs/</span>ofa.js<span class="hljs-regexp">/main/</span>skills/ofajs-docs-en.zip</code></pre>
        <p>通過這個技能包，AI 可以高效地學習和開發 ofa.js 的組件或頁面模塊，幫助開發者更便捷地利用 AI 工具進行 ofa.js 項目的開發，提升開發效率。</p>
        <h2>獲取更多幫助</h2>
        <p>如菓 AI 技能沒有解決您的問題，歡迎將您的問題發到我們的討論區：</p>
        <p><a href="https://github.com/ofajs/discussion/discussions" target="_blank">https://github.com/ofajs/discussion/discussions</a></p>
        <p>我們會盡快爲您解答。</p>
