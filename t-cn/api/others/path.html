        <h1>PATH</h1>
        <p><code>PATH</code> 屬性通常用於自定義組件或頁面組件上，用於獲取該組件的註冊組件的文件地址。這在開發過程中可以幫助妳瞭解組件的來源，特別是當妳需要引用或加載其他資源文件時，可以使用 <code>PATH</code> 屬性來構建文件路徑。</p>
        <p>下面是一個簡單示例，演示如何在自定義組件中使用 <code>PATH</code> 屬性：</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> componentPath = $(<span class="hljs-string">&quot;#myCustomComponent&quot;</span>).<span class="hljs-property">PATH</span>;</code></pre>
        <p>在這個示例中，我們選擇瞭一個具有 <code>id</code> 爲 &quot;myCustomComponent&quot; 的 <code>my-comp</code> 元素，然後通過 <code>PATH</code> 屬性獲取瞭該自定義組件的文件路徑。妳可以根據需要在腳本部分使用 <code>componentPath</code> 變量，例如，用牠來構建其他資源文件的路徑或進行其他操作。</p>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
