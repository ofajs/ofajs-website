      <article class="markdown-body">
        <h1>o-page 組件</h1>
        <p><code>o-page</code> 是 ofa.js 中的覈心組件之一，代錶著一個獨立的頁面或頁面模塊。以下是 <code>o-page</code> 的一些關鍵屬性和方法：</p>
        <h2>src 屬性</h2>
        <p><code>src</code> 屬性用於指定頁面模塊的具體地址。這是指定頁面內容和行爲的關鍵屬性，告訴應用程序從哪裏加載特定頁面的內容。</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> page = <span class="hljs-variable language_">this</span>;</code></pre>
        <h2>goto 方法</h2>
        <p><code>goto</code> 方法用於從當前頁面跳轉到另一個頁面。相比較於 <code>app</code> 的 <code>goto</code> 方法，<code>page</code> 的 <code>goto</code> 方法可以使用<strong>相對地址</strong>來導航到其他頁面。</p>
        <pre><code class="hljs language-javascript">page.<span class="hljs-title function_">goto</span>(<span class="hljs-string">&quot;./page2.html&quot;</span>);</code></pre>
        <h2>replace 方法</h2>
        <p><code>replace</code> 方法用於替換當前頁面爲另一個頁面。這與 <code>app</code> 的 <code>replace</code> 方法類似，但是在頁面內進行替換操作。</p>
        <pre><code class="hljs language-javascript">page.<span class="hljs-title function_">replace</span>(<span class="hljs-string">&quot;./new-page.html&quot;</span>);</code></pre>
        <h2>back 方法</h2>
        <p><code>back</code> 方法用於返迴到前一個頁面。這會導航用戶迴到上一個頁面，類似於瀏覽器的後退操作。</p>
        <pre><code class="hljs language-javascript">page.<span class="hljs-title function_">back</span>();</code></pre>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
