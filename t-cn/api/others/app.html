      <article class="markdown-body">
        <h1>o-app 組件</h1>
        <p><code>o-app</code> 是 ofa.js 中的覈心組件之一，用於配置和管理整個應用程序。以下是 app 的一些關鍵屬性和方法：</p>
        <h2>src</h2>
        <p><code>src</code> 屬性用於指定應用參數配置模塊的具體地址。</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> app = $(<span class="hljs-string">&quot;o-app&quot;</span>);
<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(app.<span class="hljs-property">src</span>);</code></pre>
        <h2>current</h2>
        <p><code>current</code> 屬性用於獲取正在展示中的頁面實例。這可以幫助您訪問和操作當前正在顯示的頁面，例如更新其內容或執行特定的操作。</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> currentPage = app.<span class="hljs-property">current</span>;</code></pre>
        <h2>goto</h2>
        <p><code>goto</code> 方法用於跳轉到指定的頁面。您可以傳遞目標頁面的地址，應用將加載並顯示該頁面。這是應用導航的重要方法。</p>
        <pre><code class="hljs language-javascript">app.<span class="hljs-title function_">goto</span>(<span class="hljs-string">&quot;/page2.html&quot;</span>);</code></pre>
        <h2>replace</h2>
        <p><code>replace</code> 方法與 <code>goto</code> 類似，但牠是用來替換當前頁面而不是在堆棧中添加新頁面。這可以用於實現頁面替換而不是堆棧導航。</p>
        <pre><code class="hljs language-javascript">app.<span class="hljs-title function_">replace</span>(<span class="hljs-string">&quot;/new-page.html&quot;</span>);</code></pre>
        <h2>back</h2>
        <p><code>back</code> 方法用於返迴上一頁，實現頁面導航的後退操作。這會將用戶導航迴上一個頁面。</p>
        <pre><code class="hljs language-javascript">app.<span class="hljs-title function_">back</span>();</code></pre>
        <h2>routers</h2>
        <p><code>routers</code> 屬性包含應用程序的路由配置信息。這是一個重要的屬性，定義瞭應用程序中各個頁面的路由規則和映射。路由配置決定瞭頁面之間的導航和如何處理 URL。</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> routeConfig = app.<span class="hljs-property">routers</span>;</code></pre>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
