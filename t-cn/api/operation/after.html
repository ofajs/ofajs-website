      <article class="markdown-body">
        <h1>after</h1>
        <p><code>after</code> 方法用於向目標元素的後面添加元素。在執行 <code>after</code> 操作之前，會自動執行 <a href="../instance/dollar.html" olink="">$ 方法</a> 的初始化操作，因此可以直接填寫具體的元素字符串或對象。</p>
        <p><strong>請註意，不要在 o-fill 或 o-if 等模闆組件內操作。</strong></p>
        <o-playground name="after - 後面添加" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <ul>
        <li>I am 1</li>
        <li id="target">I am 2</li>
        <li>I am 3</li>
      </ul>
      <script>
        setTimeout(()=>{
          \$('#target').after(`<li style="color:red;">new li</li>`);
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
