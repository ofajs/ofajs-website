        <h1>API 文檔</h1>
        <p> ofa.js 不僅支持模闆語法，還提供豐富的 API 來直接操作 DOM。就像 <a href="https://jquery.com/" target="_blank">jQuery</a> 一樣，妳可以用簡潔的 ofa.js 語法替代冗長的原生 JavaScript，輕鬆完成 DOM 操作。 </p>
        <p> 在組件或頁面模塊的生命周期函數及自定義方法中，妳都可以隨時調用 ofa.js 提供的 API，靈活高效地操控 DOM 元素。 </p>

      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
