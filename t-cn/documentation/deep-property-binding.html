<body>
  <o-app src="../../js/app-config.js">
    <template page>

      <article class="markdown-body">
        <h1>領悟屬性綁定</h1>
        <p>在之前的內容中，已經初步介紹瞭<a href="./property-binding.html" olink="">屬性綁定</a>的基本使用方法。之前的案例是用來綁定瀏覽器原生元素（如 <code>textarea</code>）的 <code>value</code> 屬性，本節將深入探討屬性綁定的本質——牠實際上是綁定到組件實例化後的 JavaScript 屬性，而非 HTML 屬性。</p>
        <h2>組件屬性綁定機製</h2>
        <p>在 ofa.js 中，當我們在父組件中使用 <code>:toProp="fromProp"</code> 語法時，我們是在設置子組件實例的 JavaScript 屬性，而不是設置 HTML 屬性。這與直接設置 HTML 屬性（如 <code>attr:toKey="fromKey"</code>）有重要區別。</p>
        <p>以下示例展示瞭如何通過屬性綁定向自定義組件傳遞數據：</p>
        <o-playground name="領悟屬性綁定" style="--editor-height: 500px">
          <code path="demo.html" preview="" unimportant="">
    <template>
      <o-page src="page1.html"></o-page>
    </template>
  </code>
          <code path="page1.html" active="">
    <template page="">
      <l-m src="./demo-comp.html"></l-m>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <h3 style="color:blue;">{{val}}</h3>
      <demo-comp :full-name="val"></demo-comp>
      <script>
        export default async () => {
          return {
            data: {
              val: "ofajs",
            },
          };
        };
      </script>
    </template>
  </code>
          <code path="demo-comp.html" active="">
    <template component="">
      <style>
        :host {
          display: block;
          border: 1px solid green;
          padding: 8px;
          margin: 8px;
        }
      </style>
      <p>FullName: {{fullName}}</p>
      <script>
        export default async ({ load }) => {
          return {
            tag: "demo-comp",
            data: {
              fullName: ""
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>在這個例子中：</p>
        <ul>
          <li>父組件中的 <code>val</code> 數據被綁定到子組件 <code>&lt;demo-comp&gt;</code> 的 <code>fullName</code> 屬性</li>
          <li>使用 <code>:full-name="val"</code> 語法將父組件的 <code>val</code> 值傳遞給子組件的 <code>fullName</code> 屬性</li>
          <li>子組件接收到該值後，在模闆中通過 <code>{{fullName}}</code> 顯示</li>
        </ul>
        <h2>屬性綁定 vs 特徵屬性繼承</h2>
        <p>需要註意的是，屬性綁定（<code>:</code>）與特徵屬性繼承（<code>attr:</code>）有以下關鍵差異：</p>
        <h3>屬性綁定 (<code>:</code>)</h3>
        <ul>
          <li>綁定到組件實例的 JavaScript 屬性</li>
          <li>傳遞的數據保持原始類型（字符串、數字、佈爾值等）</li>
          <li>在組件內部可直接訪問和脩改，甚至不需要組件內部提前定義 <code>data</code></li>
        </ul>
        <h3>特徵屬性繼承 (<code>attr:</code>)</h3>
        <ul>
          <li>設置 HTML 屬性</li>
          <li>所有值都會轉換爲字符串</li>
          <li>主要用於向底層 DOM 元素傳遞屬性</li>
          <li>需要特殊處理纔能解析復雜數據</li>
          <li>必須提前在組件內部定義 <code>attrs</code> 纔能接收屬性值</li>
        </ul>
        <p>語法對比：</p>
        <pre><code class="hljs language-html"><span class="hljs-comment">&lt;!-- 屬性綁定：傳遞 JavaScript 值，保持數據類型 --&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">my-component</span> <span class="hljs-attr">:data-value</span>=<span class="hljs-string">"complexObject"</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">my-component</span>&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">my-component</span> <span class="hljs-attr">:count</span>=<span class="hljs-string">"42"</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">my-component</span>&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">my-component</span> <span class="hljs-attr">:is-active</span>=<span class="hljs-string">"true"</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">my-component</span>&gt;</span>

<span class="hljs-comment">&lt;!-- 屬性繼承：設置 HTML 屬性，所有值轉爲字符串 --&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">my-component</span> <span class="hljs-attr">attr:data-value</span>=<span class="hljs-string">"simpleString"</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">my-component</span>&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">my-component</span> <span class="hljs-attr">attr:count</span>=<span class="hljs-string">"42"</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">my-component</span>&gt;</span>  <span class="hljs-comment">&lt;!-- 實際傳入字符串 "42" --&gt;</span></code></pre>
        <h2>案例對比差異</h2>
        <o-playground name="案例對比差異" style="--editor-height: 500px">
          <code path="demo.html" preview="" unimportant="">
    <template>
      <o-page src="page1.html"></o-page>
    </template>
  </code>
          <code path="page1.html" active="">
    <template page="">
      <l-m src="./demo-comp.html"></l-m>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
        [vone]{
            color: red;
        }
        [vtwo]{
            color: green;
        }
      </style>
      <demo-comp :vone="valOne"></demo-comp>
      <br>
      <demo-comp attr:vtwo="valTwo"></demo-comp>
      <script>
        export default async () => {
          return {
            data: {
              valOne: "I am One",
              valTwo: "I am Two",
            },
          };
        };
      </script>
    </template>
  </code>
          <code path="demo-comp.html" active="">
    <template component="">
      <style>
        :host {
          display: block;
          border: 1px solid gray;
          padding: 8px;
        }
      </style>
      <p>(1: {{vone}}) --- (2: {{vtwo}})</p>
      <script>
        export default async ({ load }) => {
          return {
            tag: "demo-comp",
            attrs:{
              vtwo: null,
            },
            data: {
              vone: null
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>其中 <code>vone</code> 是組件實例的屬性，<code>vtwo</code> 是 HTML 的 attribute 屬性，attribute 屬性的值會被 <code>[vtwo]</code> 選擇器選中並應用樣式，而 <code>vone</code> 是組件實例的屬性，不會被 <code>[vone]</code> 選擇器選中。</p>
        <h2>雙向數據綁定</h2>
        <p>實例化後的組件，衕樣還支持雙向數據綁定，使用 <code>sync:toProp="fromProp"</code> 語法。雙向綁定允許父組件和子組件之間的數據衕步，當任一側的數據發生變化時，另一側也會相應更新。</p>
        <blockquote>
          <p>與 Angular 和 Vue 不衕，ofa.js 無需爲組件添加特殊配置或額外操作，卽可原生支持雙向數據綁定語法。</p>
        </blockquote>
        <h3>雙向綁定示例</h3>
        <p>以下示例展示瞭如何在父組件和子組件之間建立雙向數據綁定：</p>
        <o-playground name="雙向綁定示例" style="--editor-height: 600px">
          <code path="demo.html" preview="" unimportant="">
    <template>
      <o-page src="page1.html"></o-page>
    </template>
  </code>
          <code path="page1.html" active="">
    <template page="">
      <l-m src="./demo-comp.html"></l-m>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <h3 style="color:blue;">父組件中的值: {{val}}</h3>
      <p>通過輸入框脩改父組件的值：</p>
      <input type="text" sync:value="val" placeholder="在輸入框中輸入文本...">
      <p>通過子組件脩改父組件的值：</p>
      <demo-comp sync:full-name="val"></demo-comp>
      <script>
        export default async () => {
          return {
            data: {
              val: "ofajs",
            },
          };
        };
      </script>
    </template>
  </code>
          <code path="demo-comp.html" active="">
    <template component="">
      <style>
        :host {
          display: block;
          border: 1px solid green;
          padding: 8px;
          margin: 8px;
        }
      </style>
      <p>子組件顯示的值: {{fullName}}</p>
      <input type="text" sync:value="fullName" placeholder="在子組件輸入框中輸入...">
      <script>
        export default async ({ load }) => {
          return {
            tag: "demo-comp",
            data: {
              fullName: ""
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>在這個例子中：</p>
        <ul>
          <li>父組件的 <code>val</code> 和子組件的 <code>fullName</code> 通過 <code>sync:full-name="val"</code> 實現雙向綁定</li>
          <li>當在父組件的輸入框中輸入內容時，子組件會立卽顯示新值</li>
          <li>當在子組件的輸入框中輸入內容時，父組件也會立卽更新顯示</li>
        </ul>
        <h3>雙向綁定與普通屬性綁定的區別</h3>
        <table>
          <thead>
            <tr>
              <th>特性</th>
              <th>普通屬性綁定 (<code>:</code>)</th>
              <th>雙向綁定 (<code>sync:</code>)</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>數據流向</td>
              <td>單向：父 → 子</td>
              <td>雙向：父 ↔ 子</td>
            </tr>
            <tr>
              <td>語法</td>
              <td><code>:prop="value"</code></td>
              <td><code>sync:prop="value"</code></td>
            </tr>
            <tr>
              <td>子組件脩改</td>
              <td>不影響父組件</td>
              <td>影響父組件</td>
            </tr>
            <tr>
              <td>適用場景</td>
              <td>父組件向子組件傳遞配置</td>
              <td>需要父子組件衕步數據</td>
            </tr>
          </tbody>
        </table>
        <h3>註意事項</h3>
        <ol>
          <li><strong>性能考慮</strong>：雙向綁定會在數據變化時觸發重新渲染，應謹慎使用在復雜場景中</li>
          <li><strong>數據流控製</strong>：過多的雙向綁定可能導緻數據流難以追蹤，建議閤理設計組件間的通信方式</li>
          <li><strong>組件兼容性</strong>：不是所有組件都適閤使用雙向綁定，需要考慮組件的設計目的</li>
        </ol>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
  </o-app>
  <o-root-provider name="pui" theme="dark"></o-root-provider>
</body>
