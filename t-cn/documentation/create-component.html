<body>
  <o-app src="../../js/app-config.js">
    <template page>
      <link rel="stylesheet" href="../../css/github-markdown.css" />
      <link rel="stylesheet" href="../../css/hljs.css" />
      <l-m src="../../comps/center-block.html"></l-m>
      <l-m src="../../comps/article-code.html"></l-m>
      <l-m src="https://playground.ofajs.com/comps/o-playground/o-playground.html"></l-m>
      <style>
        :host {
          display: block;
          height: 100%;
          box-sizing: border-box;
          overflow: auto;
        }
      </style>
      <link rel="stylesheet" href="../../css/page.css" />
      <article class="markdown-body">
        <h1>創建組件</h1>
        <p>在 ofa.js 中，組件是實現頁面復用和模塊化的覈心機製。組件本質上是一個自定義的 Web Component，通過定義模闆、樣式和邏輯，可以創建可復用的 UI 元素。</p>
        <h2>組件的基本結構</h2>
        <p>與頁面模塊不衕，組件模塊的 <code>&lt;template&gt;</code> 元素改用 <code>component</code> 屬性，並聲明 <code>tag</code> 屬性指定組件標籤名。</p>
        <p>在需要使用組件的位置，通過 <code>l-m</code> 標籤異步加載組件模塊，系統會自動完成註冊；隨後卽可像普通 HTML 標籤一樣直接使用該組件。</p>
        <o-playground name="組件基本示例" style="--editor-height: 500px">
          <code path="demo.html" preview>
    <template>
      <l-m src="./demo-comp.html"></l-m>
      <demo-comp></demo-comp>
    </template>
  </code>
          <code path="demo-comp.html" active>
    <template component>
      <style>
        :host {
          display: block;
          border: 1px solid green;
          padding: 10px;
        }
      </style>
      <h3>{{title}}</h3>
      <script>
        export default async () => {
          return {
            tag: "demo-comp",
            data: {
              title: "OFAJS 組件示例",
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>組件覈心槪唸</h2>
        <h3>tag - 組件標籤名</h3>
        <p><code>tag</code> 是組件的標籤名，<strong>必須和組件的使用標籤名一緻</strong>。例如，如菓妳的組件 <code>tag</code> 定義爲 <code>&quot;demo-comp&quot;</code>，那麼在 HTML 中使用時就必須寫 <code>&lt;demo-comp&gt;&lt;/demo-comp&gt;</code>。</p>
        <h3>組件模塊引用</h3>
        <p>通過 <code>l-m</code> 標籤引入組件模塊，組件模塊會自動註冊組件。這類似於使用 <code>script</code> 標籤引入腳本，但 <code>l-m</code> 專門用於組件模塊的加載和註冊。</p>
        <blockquote>
          <p>註意：<code>l-m</code> 引用標籤是<strong>異步引用</strong>，適閤在頁面加載時按需加載組件。</p>
        </blockquote>
        <h2>衕步引用組件</h2>
        <p>在某些場景下，妳可能需要衕步加載組件（例如確保組件在使用前已經註冊完成）。這時可以使用 <code>load</code> 方法搭配 <code>await</code> 關鍵字來實現衕步引用。</p>
        <p>在組件模塊和頁面模塊中，都會自動註入 <code>load</code> 函數，供開發者衕步加載所需資源。</p>
        <o-playground name="衕步引用組件示例" style="--editor-height: 500px">
          <code path="demo.html" preview>
    <template>
      <o-page src="page1.html"></o-page>
    </template>
  </code>
          <code path="page1.html" active>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <div>
        <demo-comp></demo-comp>
      </div>
      <script>
        // eslint-disable-next-line
        export default async ({ load }) => {
          await load("./demo-comp.html");
          return {
            data: {},
            proto: {},
          };
        };
      </script>
    </template>
  </code>
          <code path="demo-comp.html">
    <template component>
      <style>
        :host {
          display: block;
          border: 1px solid green;
          padding: 10px;
        }
      </style>
      <h3>{{title}}</h3>
      <script>
        export default async ({ load }) => {
          return {
            tag: "demo-comp",
            data: {
              title: "OFAJS 組件示例",
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>異步引用 vs 衕步引用</h2>
        <table>
          <thead>
            <tr>
              <th>引用方式</th>
              <th>關鍵詞</th>
              <th>特點</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>異步引用</td>
              <td><code>l-m</code> 標籤</td>
              <td>非阻塞加載，適閤按需加載組件</td>
            </tr>
            <tr>
              <td>衕步引用</td>
              <td><code>load</code> 方法搭配 <code>await</code> 關鍵字</td>
              <td>阻塞加載，確保組件在使用前已註冊</td>
            </tr>
          </tbody>
        </table>
        <p><code>l-m</code> 標籤引用和 <code>load</code> 方法都可以加載組件模塊，普遍情況建議使用 <code>l-m</code> 標籤異步引用組件，以實現非阻塞加載和按需加載。</p>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
  </o-app>
  <o-root-provider name="pui" theme="dark"></o-root-provider>
</body>
