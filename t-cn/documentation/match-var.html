        <h1>樣式査詢</h1>
        <p><code>match-var</code> 是 ofa.js 中用於根據 CSS 變量進行樣式匹配的功能組件。通過 <code>match-var</code>，可以根據當前組件的 CSS 變量值動態匹配並應用不衕的樣式。這種特性專門用於樣式相關的上下文狀態傳遞，不需要使用 JavaScript，使用起來更加方便，適閤主題色等樣式傳遞需求。</p>
        <h2>覈心槪唸</h2>
        <ul>
          <li><strong>match-var</strong>: 樣式匹配組件，根據 CSS 變量值決定是否應用內部樣式</li>
          <li><strong>屬性匹配</strong>: 通過組件屬性定義需要匹配的 CSS 變量和期望值</li>
          <li><strong>樣式應用</strong>: 匹配成功時，內部 <code>&lt;style&gt;</code> 標籤的樣式會被應用到組件上</li>
        </ul>
        <h2>基本用法</h2>
        <p><code>match-var</code> 組件通過屬性來定義需要匹配的 CSS 變量和期望值。當組件的 CSS 變量值與指定的屬性值匹配時，內部定義的樣式就會被應用。</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">match-var</span> <span class="hljs-attr">theme</span>=<span class="hljs-string">&quot;dark&quot;</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
    <span class="hljs-selector-pseudo">:host</span> {
      <span class="hljs-attribute">background-color</span>: <span class="hljs-number">#333</span>;
      <span class="hljs-attribute">color</span>: white;
    }
  </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">match-var</span>&gt;</span></code></pre>
        <h3>屬性</h3>
        <p><code>match-var</code> 組件使用任意屬性來定義 CSS 變量的匹配規則。屬性名對應 CSS 變量名（不含 <code>--</code> 前綴），屬性值就是期望匹配的值。</p>
        <h3>工作原理</h3>
        <ol>
          <li><strong>瀏覽器支持</strong>: 如菓瀏覽器支持 <code>@container style()</code> 査詢，會直接使用 CSS 原生能力</li>
          <li><strong>降級處理</strong>: 如菓不支持，會通過輪詢檢測 CSS 變量值的變化，匹配成功後動態註入樣式</li>
          <li><strong>手動刷新</strong>: 可以通過 <code>$.checkMatch()</code> 方法手動觸發樣式檢測</li>
        </ol>

        <h2>多條件匹配</h2>
        <p>可以衕時使用多個屬性來定義更復雜的匹配條件，隻有當所有 CSS 變量都匹配時，樣式纔會被應用。</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">match-var</span> <span class="hljs-attr">theme</span>=<span class="hljs-string">&quot;dark&quot;</span> <span class="hljs-attr">size</span>=<span class="hljs-string">&quot;large&quot;</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
    <span class="hljs-selector-pseudo">:host</span> {
      <span class="hljs-attribute">padding</span>: <span class="hljs-number">20px</span>;
      <span class="hljs-attribute">font-size</span>: <span class="hljs-number">18px</span>;
    }
  </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">match-var</span>&gt;</span></code></pre>

        <h2>checkMatch 手動刷新</h2>
        <p>在某些情況下，CSS 變量的變化可能無法被自動檢測到，這時可以手動調用 <code>$.checkMatch()</code> 方法來觸發樣式檢測。</p>
        <blockquote>
          <p>當前 Firefox 尚未支持 <code>@container style()</code> 査詢，因此需手動調用 <code>$.checkMatch()</code>；待未來瀏覽器原生支持後，系統將自動檢測變量變化，無需再手動觸發。</p>
        </blockquote>
        <pre><code class="hljs language-javascript"><span class="hljs-attr">proto</span>: {
  <span class="hljs-title function_">updateTheme</span>(<span class="hljs-params"></span>) {
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">theme</span> = <span class="hljs-string">&#x27;dark&#x27;</span>;
    <span class="hljs-comment">// 手動觸發樣式檢測</span>
    $.<span class="hljs-title function_">checkMatch</span>();
  }
}</code></pre>
        <h2>最佳實踐</h2>
        <ol>
          <li><strong>優先使用 CSS 原生能力</strong>: <code>match-var</code> 會優先使用瀏覽器原生的 <code>@container style()</code> 査詢，現代瀏覽器中性能更好</li>
          <li><strong>閤理組織樣式</strong>: 將相關的匹配樣式放在一起，便於維護和理解</li>
          <li><strong>使用 data() 綁定</strong>: 結閤 <code>data()</code> 指令可以實現響應式的樣式切換</li>
        </ol>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
