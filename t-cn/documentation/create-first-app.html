<body>
  <o-app src="../../js/app-config.js">
    <template page>
      <link rel="stylesheet" href="../../css/github-markdown.css" />
      <link rel="stylesheet" href="../../css/hljs.css" />
      <l-m src="../../comps/center-block.html"></l-m>
      <l-m src="../../comps/article-code.html"></l-m>
      <l-m src="https://playground.ofajs.com/comps/o-playground/o-playground.html"></l-m>
      <style>
        :host {
          display: block;
          height: 100%;
          box-sizing: border-box;
          overflow: auto;
        }
      </style>
      <link rel="stylesheet" href="../../css/page.css" />
      <article class="markdown-body">
        <h1>創建第一個應用</h1>
        <p>如菓妳不想摺騰其他繁瑣步驟，想直接使用 ofa.js 開發整個項目，可以藉助 ofa.js 官方提供的在綫構建與預覽工具，在瀏覽器裏一鍵創建妳的第一個本地應用。</p>
        <p>該工具託管於靜態服務器，所有操作均在瀏覽器本地完成，無需連接動態服務器，請放心使用。</p>
        <h2>啓動程序</h2>
        <p>點擊 <a href="https://core.noneos.com?redirect=studio" target="_blank">OFA Studio</a> 打開 ofa.js 構建工具。該工具直接使用瀏覽器的本地文件系統，無需安裝或配置。按照以下步驟操作：</p>
        <ol>
          <li>訪問網站並等待程序加載</li>
          <li>點擊 "創建新項目" 按鈕</li>
          <li>選擇 "ofa.js 應用" 類型，輸入項目名稱，然後選擇本地目錄</li>
          <li>在彈齣的權限確認對話框中全部點擊允許，然後點擊 "確認創建"</li>
          <li>等待幾秒後，項目將在所選目錄中初始化完成</li>
        </ol>
        <p>項目初始化完成後，您可使用 <a href="https://code.visualstudio.com/" target="_blank">VSCode</a> 等編輯器打開該目錄，開始編寫應用代碼。</p>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
  </o-app>
  <o-root-provider name="pui" theme="dark"></o-root-provider>
</body>

</html>
