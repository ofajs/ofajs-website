        <h1>單頁面應用</h1>
        <p>單頁面應用是將 <code>o-app</code> 組件與瀏覽器地址欄綁定，使網頁 URL 與應用內的頁面路徑保持衕步。啓用單頁面應用後：</p>
        <ul>
          <li>刷新網頁可以保持當前的路由狀態</li>
          <li>復製地址欄的 URL，在其他瀏覽器或標籤頁打開，衕樣可以還原應用狀態</li>
          <li>瀏覽器的前進/後退按鈕可以正常使用</li>
        </ul>
        <h2>基本用法</h2>
        <p>使用官方的 <code>o-router</code> 組件包裹 <code>o-app</code> 組件，卽可實現單頁面應用。</p>

        <h2>fix-body 屬性</h2>
        <p>添加 <code>fix-body</code> 屬性後，<code>o-router</code> 會自動重置 <code>html</code> 和 <code>body</code> 的樣式，消除默認的 margin 和 padding。</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">o-router</span> <span class="hljs-attr">fix-body</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">o-app</span> <span class="hljs-attr">src</span>=<span class="hljs-string">&quot;./app-config.js&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-app</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">o-router</span>&gt;</span></code></pre>
        <p>這在以下場景特別有用：</p>
        <ul>
          <li>需要 <code>o-app</code> 完全填滿視口</li>
          <li>應用作爲頁面唯一內容時</li>
        </ul>

        <h2>工作原理</h2>
        <p>單頁面應用基於瀏覽器的 Hash 模式實現：</p>
        <ol>
          <li>當應用內發生頁面切換時，<code>o-router</code> 會自動更新地址欄的 hash 值（如 <code>#/about.html</code>）</li>
          <li>當用戶刷新頁面或通過 URL 訪問時，<code>o-router</code> 會讀取 hash 值並加載對應頁面</li>
          <li>瀏覽器的前進/後退按鈕會觸發 hash 變化，進而控製應用的頁面導航</li>
        </ol>
        <h2>URL 變化示例</h2>
        <p>假設應用有兩個頁面 <code>home.html</code> 和 <code>about.html</code>：</p>
        <table>
          <thead>
            <tr>
              <th>用戶操作</th>
              <th>地址欄變化</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>打開應用</td>
              <td><code>index.html</code> → <code>index.html#/home.html</code></td>
            </tr>
            <tr>
              <td>跳轉到關於頁</td>
              <td><code>index.html#/home.html</code> → <code>index.html#/about.html</code></td>
            </tr>
            <tr>
              <td>點擊返迴</td>
              <td><code>index.html#/about.html</code> → <code>index.html#/home.html</code></td>
            </tr>
            <tr>
              <td>刷新頁面</td>
              <td>保持當前 hash 不變</td>
            </tr>
          </tbody>
        </table>
        <h2>使用限製</h2>
        <ul>
          <li>單頁面應用隻能與<strong>一個</strong> <code>o-app</code> 組件配閤使用</li>
        </ul>
      </article>

      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
