      <article class="markdown-body">
        <h1>腳本引入</h1>
        <p>ofa.js 支持通過 script 標籤直接引入使用。隻需在 HTML 文件的 <code>&lt;head&gt;</code> 或 <code>&lt;body&gt;</code> 部分添加以下代碼：</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">script</span> <span class="hljs-attr">src</span>=<span class="hljs-string">&quot;https://cdn.jsdelivr.net/gh/ofajs/ofa.js/dist/ofa.min.mjs&quot;</span> <span class="hljs-attr">type</span>=<span class="hljs-string">&quot;module&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span></code></pre>
        <h2>基本使用</h2>
        <p>引入腳本後，ofa.js 會在全侷作用域創建一個 <code>$</code> 變量，所有覈心功能都通過該對象提供。您可以通過這個對象訪問 ofa.js 的各種方法和屬性。後續敎程將詳細介紹其具體用法。</p>
        <h2>調試模式</h2>
        <p>在開發過程中，您可以通過在腳本 URL 後添加 <code>#debug</code> 參數來啓用調試模式：</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">script</span> <span class="hljs-attr">src</span>=<span class="hljs-string">&quot;https://cdn.jsdelivr.net/gh/ofajs/ofa.js/dist/ofa.min.mjs#debug&quot;</span> <span class="hljs-attr">type</span>=<span class="hljs-string">&quot;module&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span></code></pre>
        <p>調試模式會啓用 source map 功能，使您能夠在瀏覽器開發者工具中，直接査看和調試文件的原始源代碼，從而大幅提升開發效率。</p>
        <h2>ESM 模塊</h2>
        <p>ofa.js 還支持通過 ESM 模塊引入。您可以在您的項目中使用 <code>import</code> 語句來引入 ofa.js：</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">import</span> <span class="hljs-string">&#x27;https://cdn.jsdelivr.net/gh/ofajs/ofa.js/dist/ofa.min.mjs&#x27;</span>;</code></pre>
        <p>使用 ESM 模塊時，您可以直接在代碼中使用 <code>$</code> 變量，無需通過全侷作用域訪問。</p>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
