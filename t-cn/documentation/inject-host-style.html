        <h1>註入宿主樣式</h1>
        <p>在 Web Components 中，由於 <code>slot</code> 插槽的限製，無法直接設置插槽內多層級元素的樣式。爲瞭解決這個問題，ofa.js 提供瞭 <code>&lt;inject-host&gt;</code> 組件，允許在組件內部向宿主元素註入樣式，從而實現對插槽內容中多層級元素的樣式控製。</p>
        <blockquote>
          <p>註意，建議優先使用 <a href="https://developer.mozilla.org/en-US/docs/Web/CSS/Reference/Selectors/::slotted" target="_blank">::slotted()</a> 選擇器來設置插槽內容的樣式。隻有在無法滿足需求時，纔使用 <code>&lt;inject-host&gt;</code> 組件。</p>
        </blockquote>
        <h2>基本用法</h2>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">template</span> <span class="hljs-attr">component</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
        <span class="hljs-selector-pseudo">:host</span> {
            <span class="hljs-attribute">display</span>: block;
            <span class="hljs-attribute">border</span>: <span class="hljs-number">1px</span> solid <span class="hljs-number">#007acc</span>;
            <span class="hljs-attribute">padding</span>: <span class="hljs-number">10px</span>;
        }
        <span class="hljs-comment">/* 設置直接子一級元素的樣式 */</span>
        <span class="hljs-comment">/* ::slotted(user-list-item) {
            background-color: aqua;
        } */</span>
    </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">inject-host</span>&gt;</span>
        <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
            user-list user-list-item {
                <span class="hljs-attribute">background-color</span>: aqua;
            }
            <span class="hljs-comment">/* 還可以設置多層級嵌套的樣式 */</span>
            user-list user-list-item <span class="hljs-selector-class">.user-list-item-content</span> {
                <span class="hljs-attribute">color</span>: red;
            }
        </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
    <span class="hljs-tag">&lt;/<span class="hljs-name">inject-host</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">
        <span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">async</span> () =&gt; {
            <span class="hljs-keyword">return</span> {
                <span class="hljs-attr">tag</span>: <span class="hljs-string">"user-list"</span>,
                <span class="hljs-comment">// ...</span>
            };
        };
    </span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">template</span>&gt;</span></code></pre>
        <h2>案例</h2>
        <p>下面的示例展示瞭如何使用 <code>&lt;inject-host&gt;</code> 設置插槽內嵌套元素的樣式。我們創建兩個組件：<code>user-list</code> 組件作爲列錶容器，<code>user-list-item</code> 組件作爲列錶項。通過 <code>&lt;inject-host&gt;</code>，我們可以在 <code>user-list</code> 組件中設置 <code>user-list-item</code> 及其內部元素的樣式。</p>
        <o-playground name="註入宿主樣式" style="--editor-height: 500px">
          <code path="index.html" preview="">
    <template>
      <l-m src="./user-list.html"></l-m>
      <l-m src="./user-list-item.html"></l-m>
      <user-list>
        <user-list-item>
          <span>張三</span>
          <span slot="age">25</span>
        </user-list-item>
        <user-list-item>
          <span class="item-name">李四</span>
          <span slot="age">30</span>
        </user-list-item>
      </user-list>
    </template>
  </code>
          <code path="user-list.html" active="">
    <template component="">
      <style>
        :host {
          display: block;
          border: 1px solid gray;
          padding: 10px;
        }
      </style>
      <inject-host>
        <style>
          user-list user-list-item {
            background-color: blue;
            display: block;
            padding: 10px;
            margin: 5px 0;
          }
          user-list user-list-item .item-name {
            color: red;
            font-weight: bold;
          }
        </style>
      </inject-host>
      <slot></slot>
      <script>
        export default async () => {
          return {
            tag: "user-list",
          };
        };
      </script>
    </template>
  </code>
          <code path="user-list-item.html">
    <template component="">
      <style>
        :host {
          display: block;
        }
      </style>
      <slot></slot>
      <div class="item-age">
        年齡: <slot name="age"></slot>
      </div>
      <script>
        export default async () => {
          return {
            tag: "user-list-item",
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>運行結菓中可以看到：</p>
        <ul>
          <li><code>user-list-item</code> 組件的揹景色爲 aqua（通過 <code>user-list</code> 組件的 <code>&lt;inject-host&gt;</code> 設置）</li>
          <li>姓名的文字顏色爲紅色（通過 <code>user-list</code> 組件的 <code>&lt;inject-host&gt;</code> 設置 <code>user-list-item .item-name</code> 樣式）</li>
        </ul>
        <h2>工作原理</h2>
        <p><code>&lt;inject-host&gt;</code> 組件會將內部包含的 <code>&lt;style&gt;</code> 標籤內容註入到組件的宿主元素中。這樣，註入的樣式規則可以穿透組件邊界，作用於 slot 插槽內的元素。</p>
        <p>通過這種方式，妳可以：</p>
        <ul>
          <li>設置插槽內容中任意深度的元素樣式</li>
          <li>使用完整的選擇器路徑確保樣式隻作用於目標元素</li>
          <li>保持組件樣式的封裝性，衕時實現靈活的樣式穿透</li>
        </ul>
        <h2>註意事項</h2>
        <p>⚠️ <strong>樣式汙染風險</strong>：由於註入的樣式會作用到宿主元素所在的作用域，可能會影響到其他組件內的元素。在使用時務必遵循以下原則：</p>
        <ol>
          <li><strong>使用具體的選擇器</strong>：盡量使用完整的組件標籤路徑，避免使用過於寬泛的選擇器</li>
          <li><strong>添加命名空間前綴</strong>：爲妳的樣式類添加獨特的前綴，減少與其他組件衝突的可能</li>
          <li><strong>避免使用通用標籤選擇器</strong>：盡量使用類名或屬性選擇器代替標籤選擇器</li>
          <li><strong>反思組件設計</strong>：考慮是否可以通過優化組件設計來避免使用 <code>&lt;inject-host&gt;</code>。例如，在子組件上配閤使用 <a href="https://developer.mozilla.org/en-US/docs/Web/CSS/Reference/Selectors/::slotted" target="_blank">::slotted()</a> 選擇器往往更爲優雅。</li>
        </ol>
        <pre><code class="hljs language-html"><span class="hljs-comment">&lt;!-- 推薦 ✅：使用具體的選擇器 --&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">inject-host</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
        user-list <span class="hljs-selector-class">.list-item-content</span> {
            <span class="hljs-attribute">color</span>: red;
        }
    </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">inject-host</span>&gt;</span>

<span class="hljs-comment">&lt;!-- 不推薦 ❌：使用過於通用的選擇器 --&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">inject-host</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
        <span class="hljs-selector-class">.content</span> {  <span class="hljs-comment">/* 容易與其他組件衝突 */</span>
            <span class="hljs-attribute">color</span>: red;
        }
    </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">inject-host</span>&gt;</span></code></pre>
        <h3>性能提示</h3>
        <p>由於 <code>&lt;inject-host&gt;</code> 會觸發宿主樣式重新註入，進而可能導緻組件重排或重繪，請謹慎在頻繁更新的場景中使用。<br>若僅需爲插槽內第一級元素設置樣式，優先使用 <a href="https://developer.mozilla.org/en-US/docs/Web/CSS/Reference/Selectors/::slotted" target="_blank">::slotted()</a> 僞類選擇器，可避免穿透式註入帶來的額外渲染開銷，從而獲得更佳性能。</p>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
