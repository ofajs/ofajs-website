        <h1>列錶渲染</h1>
        <p>在 ofa.js 中，<code>o-fill</code> 組件提供瞭強大的列錶渲染功能，能夠高效地將數組數據渲染爲多個相似的元素。牠支持兩種主要的使用方式：直接渲染和模闆渲染。</p>
        <h2>o-fill 組件介紹</h2>
        <p><code>o-fill</code> 是 ofa.js 中用於列錶渲染的覈心組件，牠接收一個數組類型的 <code>value</code> 屬性，並爲數組中的每一項生成對應的 DOM 元素。在渲染過程中，ofa.js 會自動追蹤數組的變化並高效地更新 DOM。</p>
        <h3>主要特性：</h3>
        <ul>
          <li><strong>高效更新</strong>：通過鍵值跟蹤數組變化，僅更新需要變更的部分</li>
          <li><strong>索引訪問</strong>：通過 <code>$index</code> 訪問當前項的索引</li>
          <li><strong>數據訪問</strong>：通過 <code>$data</code> 訪問當前項的數據</li>
          <li><strong>宿主訪問</strong>：通過 <code>$host</code> 訪問當前組件實例，可調用組件方法或訪問組件數據</li>
          <li><strong>模闆復用</strong>：支持使用命名模闆進行復雜列錶渲染</li>
        </ul>
        <h2>直接渲染</h2>
        <p>直接渲染是最簡單的使用方式，將模闆內容直接寫在 <code>o-fill</code> 標籤內部。當數組變化時，<code>o-fill</code> 會自動爲每項數據創建對應的元素。</p>
        <o-playground name="o-fill - 直接渲染" style="--editor-height: 600px">
          <code>
    <template page>
      <style>
        :host { display: block; padding: 10px; }
        ul { list-style: none; padding: 0; }
        li { padding: 8px; margin: 5px 0; background: #7e7e7e; border-radius: 4px; }
      </style>
      <h3>水菓列錶</h3>
      <button on:click="addItem">添加水菓</button>
      <button on:click="removeItem">移除最後一個</button>
      <ul>
        <o-fill :value="fruits">
          <li> {{$index + 1}}. {{$data.name}} - 價格: ¥{{$data.price}} <button on:click="$host.removeItem($index)">刪除</button></li>
        </o-fill>
      </ul>
      <script>
        export default async () => ({
          data: { 
            fruits: [
              { name: "🍎 蘋菓", price: 5 },
              { name: "🍊 橙子", price: 6 },
              { name: "🍌 香蕉", price: 3 }
            ],
            fruitIndex: 0,
          },
          proto: {
            addItem() {
              const fruitNames = ["🍇 葡萄", "🍓 草莓", "🥝 獼猴桃", "🍑 桃子", "🥭 芒菓"];
              const name = fruitNames[this.fruitIndex % fruitNames.length];
              this.fruits.push({ 
                name: name, 
                price: Math.floor(Math.random() * 10) + 1 
              });
              this.fruitIndex++;
            },
            removeItem(index) {
              if (index >= 0 && index < this.fruits.length) {
                this.fruits.splice(index, 1);
                return;
              }
              this.fruits.length && this.fruits.pop();
            }
          }
        });
      </script>
    </template>
  </code>
        </o-playground>
        <p>在這個例子中，我們可以看到：</p>
        <ul>
          <li><code>$index</code> 代錶當前項的索引（從0開始）</li>
          <li><code>$data</code> 代錶當前項的數據對象</li>
          <li><code>$host</code> 代錶當前組件實例，可用於調用組件方法或訪問組件數據</li>
          <li>當數組發生變化時，列錶會自動更新</li>
        </ul>
        <h2>模闆渲染</h2>
        <p>對於更復雜的列錶項結構，可以使用命名模闆的方式。將模闆定義在 <code>template</code> 標籤中，然後在 <code>o-fill</code> 中通過 <code>name</code> 屬性引用。</p>
        <o-playground name="o-fill - 模闆渲染" style="--editor-height: 600px">
          <code>
    <template page>
      <style>
        :host { display: block; padding: 10px; }
        .product-card { border: 1px solid #747474; border-radius: 8px; padding: 12px; margin: 10px 0; }
        .product-name { font-weight: bold; font-size: 1.1em; }
        .product-price { color: #832c22; font-weight: bold; }
        .product-desc { color: #929292; font-size: 0.9em; margin-top: 5px; }
      </style>
      <h3>商品列錶</h3>
      <button on:click="addProduct">添加商品</button>
      <div class="products-container">
        <o-fill :value="products" name="product-template"></o-fill>
      </div>
      <template name="product-template">
        <div class="product-card">
          <div class="product-name">{{$data.name}}</div>
          <div class="product-price">¥{{$data.price}}</div>
          <div class="product-desc">{{$data.description}}</div>
          <small>序號: {{$index + 1}}</small>
        </div>
      </template>
      <script>
        export default async () => ({
          data: {
            products: [
              { name: "MacBook Pro", price: 12999, description: "高性能筆記本電腦，適閤專業工作" },
              { name: "iPhone 15", price: 5999, description: "最新款智能手機，拍照效菓齣色" },
              { name: "AirPods Pro", price: 1999, description: "無綫降譟耳機，音質優秀" }
            ],
            productIndex: 0,
          },
          proto: {
            addProduct() {
              const productNames = ["iPad Air", "Apple Watch", "Magic Mouse", "Pro Display"];
              const productDescs = ["輕薄便攜的平闆電腦", "智能手錶，健康監測", "人體工學設計鼡標", "專業級顯示器"];
              const name = productNames[this.productIndex % productNames.length];
              const desc = productDescs[this.productIndex % productDescs.length];
              this.products.push({
                name: name,
                price: Math.floor(Math.random() * 5000) + 1000,
                description: desc
              });
              this.productIndex++;
            }
          }
        });
      </script>
    </template>
  </code>
        </o-playground>
        <h2>嵌套列錶渲染</h2>
        <p><code>o-fill</code> 支持嵌套使用，可以處理復雜的層次數據結構，如樹形菜單、分類列錶等。</p>

        </o-playground>
        <h2>性能優化和鍵值管理</h2>
        <p>對於需要頻繁更新的列錶，可以通過 <code>fill-key</code> 屬性指定唯一標識符，以提高渲染性能。</p>
        <pre><code class="hljs language-html"><span class="hljs-comment">&lt;!-- 使用自定義鍵值提升性能 --&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">o-fill</span> <span class="hljs-attr">:value</span>=<span class="hljs-string">&quot;items&quot;</span> <span class="hljs-attr">fill-key</span>=<span class="hljs-string">&quot;id&quot;</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">div</span>&gt;</span>{{$data.name}}<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">o-fill</span>&gt;</span></code></pre>
        <p>在上面的例子中，<code>fill-key=&quot;id&quot;</code> 告訴 ofa.js 使用每項數據的 <code>id</code> 屬性作爲唯一標識符，這樣卽使數組順序發生變化，也能正確識別和更新對應的元素。</p>
        <h2>列錶渲染最佳實踐</h2>
        <ol>
          <li><strong>事件處理</strong>：在列錶項中使用事件時，註意 <code>$host</code> 指向當前組件實例，<code>$data</code> 指向當前項數據</li>
          <li><strong>選擇閤適的渲染方式</strong>：簡單列錶使用直接渲染，復雜結構使用模闆渲染</li>
          <li><strong>性能考慮</strong>：對於大列錶或頻繁更新的列錶，使用 <code>fill-key</code> 指定鍵值</li>
          <li><strong>數據結構</strong>：確保數組中的每一項都是有效的數據對象</li>
          <li><strong>避免深層嵌套</strong>：雖然支持嵌套，但應避免過深的嵌套層級</li>
        </ol>
