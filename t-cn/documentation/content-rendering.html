<body>
  <o-app src="../../js/app-config.js">
    <template page>
      <link rel="stylesheet" href="../../css/github-markdown.css" />
      <link rel="stylesheet" href="../../css/hljs.css" />
      <l-m src="../../comps/center-block.html"></l-m>
      <l-m src="../../comps/article-code.html"></l-m>
      <l-m src="https://playground.ofajs.com/comps/o-playground/o-playground.html"></l-m>
      <style>
        :host {
          display: block;
          height: 100%;
          box-sizing: border-box;
          overflow: auto;
        }
      </style>
      <link rel="stylesheet" href="../../css/page.css" />
      <article class="markdown-body">
        <h1>模闆渲染</h1>
        <p>ofa.js 提供瞭強大的模闆渲染引擎，包含豐富的模闆語法，能夠幫助開發者快速構建應用。首先我們從最常用的文本渲染開始介紹。</p>
        <h2>頁面數據綁定</h2>
        <p>在 ofa.js 中，每個頁面都有一個 <code>data</code> 對象，妳可以在其中定義需要在頁面中使用的變量。當頁面開始渲染時，會自動將 <code>data</code> 對象中的數據與模闆進行綁定，然後在模闆中使用 <code>{{變量名}}</code> 的語法來渲染對應變量的值。</p>
        <h2>文本渲染</h2>
        <p>文本渲染是最基礎的渲染方式，妳可以在模闆中使用 <code>{{變量名}}</code> 語法來顯示 <code>data</code> 對象中相應變量的值。</p>
        <o-playground name="文本渲染示例" style="--editor-height: 500px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <p>{{val}}</p>
      <script>
        export default async () => {
          return {
            data: {
              val: "Hello ofa.js Demo Code",
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>渲染 HTML 內容</h2>
        <p>通過爲元素添加 <code>:html</code> 指令，可將對應變量中的 HTML 字符串解析並安全地插入元素內部，輕鬆實現富文本動態渲染或外部 HTML 片段的嵌入。</p>
        <o-playground name="渲染 HTML 內容示例" style="--editor-height: 500px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <p :html="val"></p>
      <script>
        export default async () => {
          return {
            data: {
              val: '<span style="color:green;">Hello ofa.js Demo Code</span>',
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
  </o-app>
  <o-root-provider name="pui" theme="dark"></o-root-provider>
</body>
