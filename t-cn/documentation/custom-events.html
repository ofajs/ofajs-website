        <h1>自定義事件</h1>
        <p>在 ofa.js 中，除瞭內置的 DOM 事件外，還可以創建和使用自定義事件來實現組件間的通信。自定義事件是組件化開發中的重要機製，牠允許組件向上廣播消息或狀態變化。</p>
        <h2>emit 方法 - 觸發自定義事件</h2>
        <p><code>emit</code> 方法用於觸發自定義事件，將組件內部的狀態變化或用戶操作通知給外部監聽者。</p>
        <h3>基本用法</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// 觸發一個簡單的自定義事件</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-title function_">emit</span>(<span class="hljs-string">'custom-event'</span>);

<span class="hljs-comment">// 觸發帶數據的自定義事件</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-title function_">emit</span>(<span class="hljs-string">'data-changed'</span>, {
  <span class="hljs-attr">data</span>: {
    <span class="hljs-comment">// 自定義數據，可根據需求任意結構</span>
    <span class="hljs-attr">newValue</span>: <span class="hljs-number">100</span>,
    <span class="hljs-attr">oldValue</span>: <span class="hljs-number">50</span>
  }
});</code></pre>
        <h3>emit 方法參數</h3>
        <p><code>emit</code> 方法接受兩個參數：</p>
        <ol>
          <li><strong>事件名稱</strong>：字符串，錶示要觸發的事件名稱</li>
          <li><strong>選項對象</strong>（可選）：包含事件配置選項<ul>
              <li><code>data</code>：要傳遞的數據</li>
              <li><code>bubbles</code>：佈爾值，控製事件是否冒泡（默認爲 true）</li>
              <li><code>composed</code>：佈爾值，控製事件是否能穿過 Shadow DOM 邊界</li>
              <li><code>cancelable</code>：佈爾值，控製事件是否可以被取消</li>
            </ul>
          </li>
        </ol>
        <p>然後上層元素就可以使用<code>on</code>方法 <a href="./event-binding.html" olink="">（事件綁定）</a> 監聽這個自定義事件。</p>

        <h2>bubbles - 事件冒泡機製</h2>
        <p><code>bubbles</code> 屬性控製事件是否會向上冒泡到父元素。當設置爲 <code>true</code> 時，事件會沿著 DOM 樹向上傳播。默認值爲 <code>true</code>。如菓設置爲 <code>false</code>，事件將不會冒泡。</p>
        <h3>冒泡機製詳解</h3>
        <ul>
          <li><strong>默認行爲</strong>：使用 <code>emit</code> 發齣的事件默認開啓冒泡（<code>bubbles: true</code>）</li>
          <li><strong>冒泡路徑</strong>：事件從觸發元素開始，逐級向上傳播</li>
          <li><strong>阻止冒泡</strong>：在事件處理器中調用 <code>event.stopPropagation()</code> 可阻止冒泡</li>
        </ul>
        <h3>冒泡示例</h3>
        <o-playground name="自定義事件示例" style="--editor-height: 500px">
          <code path="demo.html" preview="" unimportant="">
    <template>
      <o-page src="page1.html"></o-page>
    </template>
  </code>
          <code path="page1.html">
    <template page="">
      <l-m src="./bubble-component.html"></l-m>
      <style>
        :host {
          display: block;
          padding: 20px;
          border: 1px solid blue;
        }
      </style>
      <div on:child-event="handleChildEventFromComponent">
        <bubble-component on:child-event="handleDirectChildEvent"></bubble-component>
      </div>
      <p>外層容器（監聽冒泡事件）: {{bubbledEventCount}} 次</p>
      <p>內層組件（監聽直接事件）: {{directEventCount}} 次</p>
      <p>接受到的數據: <span style="color:red;">{{result}}</span></p>
      <script>
        export default async () => {
          return {
            data: {
              result:"-",
              bubbledEventCount: 0,
              directEventCount: 0
            },
            proto: {
              handleDirectChildEvent(event) {
                this.directEventCount++;
                this.result = event.data;
              },
              handleChildEventFromComponent(event) {
                this.bubbledEventCount++;
                this.result = event.data;
              },
            }
          };
        };
      </script>
    </template>
  </code>
          <code path="bubble-component.html" active="">
    <template component="">
      <style>
        :host {
          display: block;
          padding: 15px;
          border: 1px solid green;
        }
      </style>
      <button on:click="triggerNonBubblingEvent">觸發非冒泡事件</button>
      <button on:click="triggerBubblingEvent">觸發冒泡事件</button>
      <script>
        export default async () => {
          return {
            tag: "bubble-component",
            proto: {
              triggerNonBubblingEvent() {
                // 非冒泡事件，隻會被直接監聽者捕獲
                this.emit('child-event', {
                  data: { type: 'non-bubbling', message: '非冒泡事件觸發', timestamp: Date.now() },
                  bubbles: false
                });
              },
              triggerBubblingEvent() {
                // 冒泡事件，會向上傳播到父元素
                this.emit('child-event', {
                  data: { type: 'bubbling', message: '冒泡事件觸發', timestamp: Date.now() },
                  bubbles: true
                });
              }
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>composed - 穿透 Shadow DOM 邊界</h2>
        <p><code>composed</code> 屬性控製事件是否能夠穿過 Shadow DOM 邊界。這對於 Web Components 開發特別重要，默認值爲 <code>false</code>。</p>
        <h3>穿透機製詳解</h3>
        <ul>
          <li><strong>Shadow DOM 隔離</strong>：默認情況下，事件無法跨越 Shadow DOM 邊界</li>
          <li><strong>啓用穿透</strong>：設置 <code>composed: true</code> 允許事件穿越 Shadow DOM 邊界</li>
          <li><strong>使用場景</strong>：當組件需要向宿主環境發送事件時，必須設置 <code>composed: true</code></li>
        </ul>
        <h3>穿透示例</h3>

              handleChildEventFromComponent(event) {
                this.bubbledEventCount++;
                this.result = event.data;
              },

          };
        };
      </script>
    </template>
  </code>

          <code path="child-component.html" active="">
    <template component="">
      <style>
        :host {
          display: block;
          padding: 15px;
          border: 1px solid green;
        }
      </style>
      <button on:click="triggerNonComposedEvent">觸發非穿透事件</button>
      <button on:click="triggerComposedEvent">觸發穿透事件</button>
      <script>
        export default async () => {
          return {
            tag: "child-component",
            proto: {
              triggerNonComposedEvent() {
                // 非穿透事件，隻會被直接監聽者捕獲
                this.emit('child-event', {
                  data: { type: 'non-composed', message: '非穿透事件觸發', timestamp: Date.now() },
                  composed: false
                });
              },
              triggerComposedEvent() {
                // 穿透事件，會跨越 Shadow DOM 邊界
                this.emit('child-event', {
                  data: { type: 'composed', message: '穿透事件觸發', timestamp: Date.now() },
                  composed: true
                });
              }
            }
          };
        };
      </script>
    </template>
  </code>
