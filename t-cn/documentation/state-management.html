        <h1>狀態管理</h1>
        <h2>什麼是狀態</h2>
        <p>在ofa.js中，<strong>狀態</strong>是指組件或頁面模塊自身的 <code>data</code> 屬性。這個狀態隻能在當前組件上使用，用於存儲和管理該組件的內部數據。</p>
        <p>當有多個組件或頁面需要共享衕一份數據時，傳統的做法是通過事件傳遞或 props 層層傳遞，這種方式在復雜應用中會導緻代碼難以維護。因此需要<strong>狀態管理</strong>——通過定義一個共享的狀態對象，讓多個組件或頁面模塊都可以訪問和脩改這份數據，從而實現狀態的共享。</p>
        <blockquote>
          <p><strong>提示</strong>：狀態管理適用於需要跨組件、跨頁面共享數據的場景，如用戶信息、購物車、主題配置、全侷配置等。</p>
        </blockquote>
        <h2>生成狀態對象</h2>
        <p>通過 <code>$.stanz({})</code> 來創建一個響應式的狀態對象。這個方法接收一個普通對象作爲初始數據，返迴一個響應式的狀態代理。</p>

        <h2>狀態對象的特性</h2>
        <h3>1. 響應式更新</h3>
        <p><code>$.stanz()</code> 創建的狀態對象是響應式的。當狀態數據發生變化時，所有引用該數據的組件都會自動更新。</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> store = $.<span class="hljs-title function_">stanz</span>({ <span class="hljs-attr">count</span>: <span class="hljs-number">0</span> });

<span class="hljs-comment">// 在組件中</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> {
  <span class="hljs-attr">data</span>: {
    <span class="hljs-attr">store</span>: {}
  },
  <span class="hljs-attr">proto</span>:{
    <span class="hljs-title function_">increment</span>(<span class="hljs-params"></span>) {
        store.<span class="hljs-property">count</span>++; <span class="hljs-comment">// 所有引用瞭 store.count 的組件都會自動更新</span>
    }
  },
  <span class="hljs-title function_">attached</span>(<span class="hljs-params"></span>) {
    <span class="hljs-comment">// 直接引用狀態對象的屬性</span>
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">store</span> = store;
  },
  <span class="hljs-title function_">detached</span>(<span class="hljs-params"></span>){
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">store</span> = {}; <span class="hljs-comment">// 組件銷毀時，清空掛載的狀態數據</span>
  }
};</code></pre>
        <h3>2. 深度響應式</h3>
        <p>狀態對象支持深度響應式，嵌套對象和數組的變化也會被監聽。</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> store = $.<span class="hljs-title function_">stanz</span>({
  <span class="hljs-attr">user</span>: {
    <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;張三&quot;</span>,
    <span class="hljs-attr">settings</span>: {
      <span class="hljs-attr">theme</span>: <span class="hljs-string">&quot;dark&quot;</span>
    }
  },
  <span class="hljs-attr">list</span>: []
});

<span class="hljs-comment">// 脩改嵌套屬性也會觸發更新</span>
store.<span class="hljs-property">user</span>.<span class="hljs-property">name</span> = <span class="hljs-string">&quot;李四&quot;</span>;
store.<span class="hljs-property">user</span>.<span class="hljs-property">settings</span>.<span class="hljs-property">theme</span> = <span class="hljs-string">&quot;light&quot;</span>;
store.<span class="hljs-property">list</span>.<span class="hljs-title function_">push</span>({ <span class="hljs-attr">id</span>: <span class="hljs-number">1</span>, <span class="hljs-attr">title</span>: <span class="hljs-string">&quot;新任務&quot;</span> });</code></pre>
        <h2>最佳實踐</h2>
        <h3>1. 在組件 attached 階段掛載狀態</h3>
        <p>推薦在組件的 <code>attached</code> 生命周期中掛載共享狀態：</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> {
  <span class="hljs-attr">data</span>: {
    <span class="hljs-attr">list</span>: []
  },
  <span class="hljs-title function_">attached</span>(<span class="hljs-params"></span>) {
    <span class="hljs-comment">// 將共享狀態掛載到組件的 data 上</span>
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">list</span> = data.<span class="hljs-property">list</span>;
  },
  <span class="hljs-title function_">detached</span>(<span class="hljs-params"></span>) {
    <span class="hljs-comment">// 組件銷毀時，清空掛載的狀態數據，防止內存洩漏</span>
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">list</span> = [];
  }
};</code></pre>
        <h3>2. 閤理管理狀態作用域</h3>
        <ul>
          <li><strong>全侷狀態</strong>：適用於整個應用都需要訪問的數據（如用戶信息、全侷配置）</li>
          <li><strong>模塊狀態</strong>：適用於特定功能模塊內部共享的數據</li>
        </ul>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// 全侷調用狀態</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> globalStore = $.<span class="hljs-title function_">stanz</span>({ <span class="hljs-attr">user</span>: <span class="hljs-literal">null</span>, <span class="hljs-attr">theme</span>: <span class="hljs-string">&quot;light&quot;</span> });

<span class="hljs-comment">// 模塊內使用的狀態</span>
<span class="hljs-keyword">const</span> cartStore = $.<span class="hljs-title function_">stanz</span>({ <span class="hljs-attr">total</span>: <span class="hljs-number">0</span> });</code></pre>

        <h2>註意事項</h2>
        <ol>
          <li>
            <p><strong>狀態清理</strong>：在組件的 <code>detached</code> 生命周期中，及時清理對狀態數據的引用，避免內存洩漏。</p>
          </li>
          <li>
            <p><strong>避免循環依賴</strong>：狀態對象之間不要形成循環引用，這可能導緻響應式系統齣現問題。</p>
          </li>
          <li>
            <p><strong>大型數據結構</strong>：對於大型數據結構，考慮使用計算屬性或分片管理，避免不必要的性能開銷。</p>
          </li>
          <li>
            <p><strong>狀態一緻性</strong>：在異步操作中註意狀態的一緻性，可以使用事務或批量更新來保證數據的完整性。</p>
          </li>
        </ol>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},

              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
