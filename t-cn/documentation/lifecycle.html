        <h1>生命周期</h1>
        <p>ofa.js 組件具有完整的生命周期鉤子函數，允許妳在組件的不衕階段執行特定的邏輯。這些鉤子函數讓妳能夠在組件創建、掛載、更新和銷毀等關鍵時刻介入並執行相應的操作。</p>
        <h2>生命周期鉤子函數</h2>
        <p>ofa.js 提供瞭以下幾個主要的生命周期鉤子函數，按照常用的順序排列：</p>
        <h3>attached</h3>
        <p><code>attached</code> 鉤子在組件被插入到文檔中時調用，錶示組件已經掛載到頁面上。這是最常用的生命周期鉤子，通常用於執行需要在組件實際顯示在頁面上之後纔能進行的初始化操作，避免在組件不可見時執行不必要的計算。此鉤子也非常適閤進行元素尺寸測量、動畫啓動等依賴於組件已渲染到頁面的操作。</p>
        <ul>
          <li><strong>調用時機</strong>: 組件被添加到 DOM 樹中</li>
          <li><strong>主要用途</strong>: 啓動定時器、添加事件監聽器、執行需要可見性的操作</li>
        </ul>
        <h3>detached</h3>
        <p><code>detached</code> 鉤子在組件從文檔中移除時調用，錶示組件卽將被卸載。這個鉤子適閤清理資源，如清除定時器、移除事件監聽器等。</p>
        <ul>
          <li><strong>調用時機</strong>: 組件從 DOM 樹中被移除</li>
          <li><strong>主要用途</strong>: 清理資源、取消訂閱、移除事件監聽器</li>
        </ul>
        <h3>ready</h3>
        <p><code>ready</code> 鉤子在組件準備就緒時調用，此時組件的模闆已經渲染完成，DOM 元素已經創建，但可能尚未插入到文檔中。這個鉤子適閤進行 DOM 操作或初始化第三方庫。</p>
        <ul>
          <li><strong>調用時機</strong>: 組件模闆渲染完成，DOM 已創建</li>
          <li><strong>主要用途</strong>: 執行依賴 DOM 的初始化操作</li>
        </ul>
        <h3>loaded</h3>
        <p><code>loaded</code> 鉤子在組件及其所有子組件、異步資源全部加載完畢後觸發，此時可安全移除 loading 狀態或執行依賴完整組件樹的後續操作。如菓沒有依賴，牠會在 <code>ready</code> 鉤子之後調用。</p>
        <ul>
          <li><strong>調用時機</strong>: 組件及其子組件完全加載完成</li>
          <li><strong>主要用途</strong>: 執行依賴完整組件樹的操作</li>
        </ul>
        <h2>生命周期執行順序</h2>
        <p>組件的生命周期鉤子按照以下順序執行：</p>
        <ol start="2">
          <li><code>ready</code> - 組件準備就緒（DOM 已創建）</li>
          <li><code>attached</code> - 組件掛載到 DOM</li>
          <li><code>loaded</code> - 組件完全加載完成</li>
        </ol>
        <p>當組件從 DOM 移除時，會調用 <code>detached</code> 鉤子。</p>
        <h2>使用示例</h2>
        <p>下面的示例展示瞭如何在組件中使用生命周期鉤子函數：</p>
        <o-playground name="生命周期示例" style="--editor-height: 700px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
        .counter {
          margin: 10px 0;
        }
        button {
          margin-right: 10px;
          padding: 5px 10px;
        }
      </style>
      <h3>生命周期演示</h3>
      <div class="counter">計數器: {{count}}</div>
      <button on:click="count += 10">增加10</button>
      <button on:click="removeSelf">移除組件</button>
      <div class="log">
        <h4>生命周期日誌:</h4>
        <ul>
          <o-fill :value="logs">
            <li>{{$data}}</li>
          </o-fill>
        </ul>
      </div>
      <script>
        export default async () => {
          return {
            data: {
              count: 0,
              logs: [],
            },
            proto: {
              removeSelf() {
                this.remove(); // 從DOM中移除自身以觸發detached鉤子
              },
              addLog(message) {
                this.logs = [...this.logs, `${new Date().toLocaleTimeString()} - ${message}`];
              }
            },
            ready() {
              this.addLog("ready: 組件準備就緒，DOM已創建");
              console.log("組件已就緒");
            },
            attached() {
              this.addLog("attached: 組件已掛載到DOM");
              this._timer = setInterval(() => {
                this.count++;
              }, 1000);
              console.log("組件已掛載");
            },
            detached() {
              this.addLog("detached: 組件已從DOM移除");
              // 清除定時器，防止內存洩漏
              clearInterval(this._timer); 
              console.log("組件已卸載");
            },
            loaded() {
              this.addLog("loaded: 組件完全加載完成");
              console.log("組件已完全加載");
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>在這個示例中，妳可以觀察到不衕生命周期鉤子的執行順序和時機。當妳點擊&quot;移除組件&quot;按鈕時，可以看到 <code>detached</code> 鉤子被觸發。</p>
        <h2>實際應用場景</h2>
        <h3>初始化操作</h3>
        <p>在 <code>ready</code> 鉤子中進行數據初始化：</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">async</span> () =&gt; {
  <span class="hljs-keyword">return</span> {
    <span class="hljs-attr">data</span>: {
      <span class="hljs-attr">items</span>: []
    },
    <span class="hljs-title function_">ready</span>(<span class="hljs-params"></span>) {
      <span class="hljs-comment">// DOM操作</span>
      <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">initDomElements</span>();
    }
  };
};</code></pre>
        <h3>資源管理</h3>
        <p>在 <code>attached</code> 鉤子中啓動定時器，在 <code>detached</code> 鉤子中清理資源：</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">async</span> () =&gt; {
  <span class="hljs-keyword">return</span> {
    <span class="hljs-attr">data</span>: {
      <span class="hljs-attr">timer</span>: <span class="hljs-literal">null</span>
    },
    <span class="hljs-title function_">attached</span>(<span class="hljs-params"></span>) {
      <span class="hljs-comment">// 啓動定時器</span>
      <span class="hljs-variable language_">this</span>.<span class="hljs-property">timer</span> = <span class="hljs-built_in">setInterval</span>(<span class="hljs-function">() =&gt;</span> {
        <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&#x27;定時任務執行&#x27;</span>);
      }, <span class="hljs-number">1000</span>);
    },
    <span class="hljs-title function_">detached</span>(<span class="hljs-params"></span>) {
      <span class="hljs-comment">// 清理定時器</span>
      <span class="hljs-keyword">if</span>(<span class="hljs-variable language_">this</span>.<span class="hljs-property">timer</span>) {
        <span class="hljs-built_in">clearInterval</span>(<span class="hljs-variable language_">this</span>.<span class="hljs-property">timer</span>);
        <span class="hljs-variable language_">this</span>.<span class="hljs-property">timer</span> = <span class="hljs-literal">null</span>;
      }
    }
  };
};</code></pre>
        <p>生命周期鉤子函數是 ofa.js 組件開發中的重要槪唸，正確使用牠們可以幫助妳更好地管理組件狀態和資源，提升應用性能。</p>

              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },

        };
