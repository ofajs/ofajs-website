        <h1>事件綁定</h1>
        <p>在 ofa.js 中，事件綁定是實現用戶交互的重要機製。妳可以通過多種方式爲元素綁定事件處理器，從而響應用戶的操作。</p>
        <h2>從 proto 綁定事件</h2>
        <p>這是推薦的事件綁定方式，適用於復雜的事件處理邏輯。將事件處理函數定義在 <code>proto</code> 對象中，可以更好地組織代碼邏輯，並且便於維護和復用。</p>
        <o-playground name="從 proto 綁定事件" style="--editor-height: 500px">
          <code>
    <template page="">
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <button on:click="clickMe">Click Me - {{count}}</button>
      <script>
        export default async () => {
          return {
            data: {
              count: 1,
            },
            proto:{
              clickMe(){
                this.count++;
              }
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>直接運行函數</h2>
        <p>對於簡單的操作（如計數器增加、狀態切換等），可以直接在事件屬性中編寫簡短的錶達式。這種方式簡潔明瞭，適閤處理簡單邏輯。</p>
        <o-playground name="直接運行函數" style="--editor-height: 500px">
          <code>
    <template page="">
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <button on:click="count++">Click Me - {{count}}</button>
      <script>
        export default async () => {
          return {
            data: {
              count: 1,
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>支持的事件類型</h2>
        <p>ofa.js 支持所有標準 DOM 事件，包括但不限於：</p>
        <ul>
          <li>鼡標事件：<code>click</code>、<code>dblclick</code>、<code>mousedown</code>、<code>mouseup</code>、<code>mouseover</code>、<code>mouseout</code> 等</li>
          <li>鍵盤事件：<code>keydown</code>、<code>keyup</code>、<code>keypress</code> 等</li>
          <li>錶單事件：<code>submit</code>、<code>change</code>、<code>input</code>、<code>focus</code>、<code>blur</code> 等</li>
          <li>觸摸事件：<code>touchstart</code>、<code>touchmove</code>、<code>touchend</code> 等</li>
        </ul>
        <p>ofa.js 支持的事件類型與原生 DOM 事件完全一緻，更多細節可參考 <a href="https://developer.mozilla.org/zh-CN/docs/Web/API/Event" target="_blank">MDN 事件文檔</a>。</p>
        <h2>傳遞參數到事件處理器</h2>
        <p>妳也可以向事件處理器傳遞參數：</p>
        <o-playground name="傳遞參數到事件處理器" style="--editor-height: 600px">
          <code>
    <template page="">
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <button on:click="addNumber(5)">Add 5 - Current: {{count}}</button>
      <button on:click="addNumber(10)">Add 10 - Current: {{count}}</button>
      <script>
        export default async () => {
          return {
            data: {
              count: 0,
            },
            proto: {
              addNumber(num) {
                this.count += num;
              }
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>訪問事件對象</h2>
        <p>在事件處理器中，妳可以通過 <code>event</code> 參數訪問原生事件對象：</p>
        <o-playground name="訪問事件對象" style="--editor-height: 700px">
          <code>
    <template page="">
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
        .container {
          width: 300px;
          height: 200px;
          background-color: #f0f0f0;
          display: flex;
          align-items: center;
          justify-content: center;
        }
      </style>
      <div class="container" on:click="handleClick">點擊任意位置査看坐標</div>
      <p>X: {{x}}, Y: {{y}}</p>
      <script>
        export default async () => {
          return {
            data: {
              x: 0,
              y: 0,
            },
            proto: {
              handleClick(event) {
                this.x = event.clientX;
                this.y = event.clientY;
              }
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>妳也可以在錶達式中使用 <code>$event</code> 參數訪問原生事件對象，例如獲取鼡標點擊坐標：</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">div</span> <span class="hljs-attr">class</span>=<span class="hljs-string">"container"</span> <span class="hljs-attr">on:click</span>=<span class="hljs-string">"handleClick($event)"</span>&gt;</span>點擊任意位置査看坐標<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span></code></pre>
        <h2>監聽自定義事件</h2>
        <p>除瞭監聽原生 DOM 事件，妳還可以輕鬆監聽組件發齣的自定義事件：</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">custom-comp</span> <span class="hljs-attr">on:custom-event</span>=<span class="hljs-string">"handleCustomEvent"</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">custom-comp</span>&gt;</span></code></pre>
        <p>如需深入瞭解自定義事件，請參考<a href="custom-events.html" olink="">自定義事件</a>章節。建議按敎程順序循序漸進，後續內容將自然展開；當然，也歡迎隨時査閱以提前掌握。</p>
      </article>

      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
