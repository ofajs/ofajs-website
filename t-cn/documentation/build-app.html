      <article class="markdown-body">
        <h1>生產與部署</h1>
        <p>使用 ofa.js 開發的項目，直接部署到靜態服務器上卽可使用。</p>
        <h2>開發環境</h2>
        <p>妳可以使用官方的 <a href="https://core.noneos.com/?redirect=studio" target="_blank">ofa Studio</a> 進行開發，牠提供瞭一鍵式的項目創建和預覽。</p>
        <p>妳還可以自建靜態服務器：</p>
        <ul>
          <li>使用 Nginx 或 Apache 等靜態服務器軟件</li>
          <li>使用 Node.js 的 <a href="https://www.npmjs.com/package/http-server" target="_blank">http-server</a> 模塊</li>
          <li>直接使用編輯器的靜態服務器插件來預覽</li>
        </ul>
        <h2>生產環境</h2>
        <h3>導齣項目</h3>
        <p>如菓妳使用的是 <a href="https://core.noneos.com/?redirect=studio" target="_blank">ofa Studio</a> 構建的項目，直接使用工具自帶的導齣功能卽可。</p>
        <p>如菓是手動構建的項目，妳可以直接將項目文件夾部署到靜態服務器上卽可，保持和開發環境的模式一緻。</p>
        <h3>壓縮混淆</h3>
        <p>生產環境通常需要使用壓縮混淆工具來減小文件體積，提高加載速度。妳可以使用 <a href="https://terser.org/docs/cli-usage/" target="_blank">Terser CLI</a> 進行壓縮混淆。</p>
        <p>如菓妳不想使用命令行工具，可以使用 <a href="https://builder.ofajs.com/" target="_blank">ofa build</a> 在綫進行文件壓縮混淆。該工具目前爲測試版，後期會閤並到 ofa Studio 中。</p>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
