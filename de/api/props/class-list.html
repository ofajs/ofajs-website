      <article class="markdown-body">
        <h1>classList</h1>
        <p>Die <code>classList</code>-Eigenschaft ist mit der nativen Implementierung identisch. Sie können <a href="https://developer.mozilla.org/de/docs/Web/API/Element/classList" target="_blank">classList</a> verwenden, um Klassen hinzuzufügen, zu entfernen und umzuschalten.</p>
        <p>Nachfolgend ein Beispiel, das die Verwendung von <code>classList</code> demonstriert:</p>
        <o-playground name="classList - Verwendungsbeispiel" style="--editor-height: 500px">
          <code path="demo.html">
    <template>
      <style>
        .t-red{
          color: red;
          font-size: 14px;
        }
        .t-blue{
          color: blue;
          font-weight:bold;
          font-size:20px;
        }
      </style>
      <div id="target" class="t-red">Ursprünglicher Text</div>
      <script>
        setTimeout(()=> {
          $("#target").classList.remove('t-red');
          setTimeout(()=>{
            $("#target").classList.add('t-blue');
          },1000);
        }, 1000);
      </script>
    </template>
  </code>
        </o-playground>
        <p><code>classList</code>-Eigenschaft ermöglicht es Ihnen, Klassennamen einfach hinzuzufügen, zu entfernen und umzuschalten, um das Styling von Elementen dynamisch zu ändern.</p>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../../layout.html";
        export default async ({

          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
