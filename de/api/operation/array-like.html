        <h1>Hinzufügen oder Löschen von Unterelementen</h1>
        <p>Element-Instanzen haben array-ähnliche Eigenschaften. Das Hinzufügen oder Löschen von Knoten kann einfach mit den üblichen Array-Methoden erfolgen. Bei Verwendung der Methoden <code>push</code>, <code>unshift</code>, <code>pop</code>, <code>shift</code> und <code>splice</code> führt das System intern automatisch die Initialisierungsoperation der <a href="../instance/dollar.html" olink="">$-Methode</a> aus, sodass direkt konkrete Elementzeichenketten oder Objekte angegeben werden können.</p>
        <p>Ebenso können Sie andere Array-Methoden verwenden, z. B. <code>forEach</code>, <code>map</code>, <code>some</code> usw.</p>
        <p><strong>Bitte beachten Sie, dass bei Elementen mit Vorlagensyntax keine Kindelemente hinzugefügt oder entfernt werden sollen.</strong></p>
        <h2>push</h2>
        <p>Fügen Sie ein untergeordnetes Element vom Ende hinzu.</p>
        <o-playground name="array-like - push" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <ul>
        <li>Ich bin 1</li>
        <li>Ich bin 2</li>
        <li>Ich bin 3</li>
      </ul>
      <script>
        setTimeout(()=>{
          \$("ul").push(`<li style="color:red;">neues li</li>`);
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>unshift</h2>
        <p>Fügen Sie ein untergeordnetes Element am Anfang des Arrays ein.</p>
        <o-playground name="array-like - unshift" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <ul>
        <li>Ich bin 1</li>
        <li>Ich bin 2</li>
        <li>Ich bin 3</li>
      </ul>
      <script>
        setTimeout(()=>{
          \$("ul").unshift(`<li style="color:blue;">neues li</li>`);
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>pop</h2>
        <p>Entfernen Sie Unterelemente vom Ende.</p>
        <o-playground name="array-like - pop" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <ul>
        <li>Ich bin 1</li>
        <li>Ich bin 2</li>
        <li>Ich bin 3</li>
      </ul>
      <script>
        setTimeout(()=>{
          \$("ul").pop();
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>shift</h2>
        <p>Ein Unterelement am Anfang des Arrays löschen.</p>
        <o-playground name="array-like - shift" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <ul>
        <li>Ich bin 1</li>
        <li>Ich bin 2</li>
        <li>Ich bin 3</li>
      </ul>
      <script>
        setTimeout(()=>{
          \$("ul").shift();
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>splice</h2>
        <p>Sie können vorhandene Kindelemente löschen oder ersetzen und neue Kindelemente hinzufügen. Die Verwendung ähnelt der <code>splice</code>-Methode von Arrays.</p>
        <o-playground name="array-like - splice" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <ul>
        <li>Ich bin 1</li>
        <li>Ich bin 2</li>
        <li>Ich bin 3</li>
      </ul>
      <script>
        setTimeout(()=>{
          \$("ul").splice(1, 2, `<li style="color:green;">neues li 1</li>`, `<li style="color:green;">neues li 2</li>`);
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
