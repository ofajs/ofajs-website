      <article>
        <h1>API-Dokumentation</h1>
        <p> ofa.js unterstützt nicht nur die Vorlagensyntax, sondern bietet auch eine umfangreiche API, um direkt mit dem DOM zu arbeiten. Wie <a href="https://jquery.com/" target="_blank">jQuery</a> können Sie mit der prägnanten ofa.js-Syntax das umständliche native JavaScript ersetzen und DOM-Operationen mühelos durchführen. </p>
        <p> In den Lebenszyklusfunktionen und benutzerdefinierten Methoden von Komponenten oder Seitenmodulen können Sie jederzeit die von ofa.js bereitgestellten APIs aufrufen, um DOM-Elemente flexibel und effizient zu steuern. </p>
        <api-container>
          <api-list>
            <h3>Instanzbezogene</h3>
            <api-item>
              <a href="./instance/dollar.html" olink="">$(selector)</a>
              <p>Die Kernfunktion in ofa.js zum Abrufen und Manipulieren von DOM-Elementinstanzen</p>
            </api-item>
            <api-item>
              <a href="./instance/all.html" olink="">all</a>
              <p>Ruft alle Kindelementinstanzen des aktuellen Elements ab</p>
            </api-item>
            <api-item>
              <a href="./instance/shadow.html" olink="">shadow</a>
              <p>Ruft den Shadow-Root des aktuellen Elements ab</p>
            </api-item>
            <api-item>
              <a href="./instance/prev.html" olink="">prev</a>
              <p>Ruft das vorherige Geschwisterelement des aktuellen Elements ab</p>
            </api-item>
            <api-item>
              <a href="./instance/prevs.html" olink="">prevs</a>
              <p>Ruft alle vorherigen Geschwisterelemente des aktuellen Elements ab</p>
            </api-item>
            <api-item>
              <a href="./instance/next.html" olink="">next</a>
              <p>Ruft das nächste Geschwisterelement des aktuellen Elements ab</p>
            </api-item>
            <api-item>
              <a href="./instance/nexts.html" olink="">nexts</a>
              <p>Ruft alle folgenden Geschwisterelemente des aktuellen Elements ab</p>
            </api-item>
            <api-item>
              <a href="./instance/siblings.html" olink="">siblings</a>
              <p>Ruft alle Geschwisterelemente des aktuellen Elements ab</p>
            </api-item>
            <api-item>
              <a href="./instance/parent.html" olink="">parent</a>
              <p>Ruft das übergeordnete Element des aktuellen Elements ab</p>
            </api-item>
            <api-item>
              <a href="./instance/parents.html" olink="">parents</a>
              <p>Ruft alle Vorfahrenelemente des aktuellen Elements ab</p>
            </api-item>
            <api-item>
              <a href="./instance/clone.html" olink="">clone</a>
              <p>Kopiert das aktuelle Element und seine Kindelemente</p>
            </api-item>
            <api-item>
              <a href="./instance/ele.html" olink="">ele</a>
              <p>Ruft eine Kindelementinstanz des aktuellen Elements ab</p>
            </api-item>
            <api-item>
              <a href="./instance/root.html" olink="">root</a>
              <p>Ruft die Wurzelinstanz ab, zu der das aktuelle Element gehört</p>
            </api-item>
            <api-item>
              <a href="./instance/children.html" olink="">Kinder</a>
              <p>Ruft alle Kindelemente des aktuellen Elements ab</p>
            </api-item>
            <api-item>
              <a href="./instance/host.html" olink="">host</a>
              <p>Ruft das Web-Component-Host-Element ab, zu dem das aktuelle Element gehört</p>
            </api-item>
            <api-item>
              <a href="./instance/app.html" olink="">app</a>
              <p>Ruft die o-app-Komponenteninstanz ab, zu der das aktuelle Element gehört</p>
            </api-item>
          </api-list>
          <api-list>
            <h3>Knotenoperationen</h3>
            <api-item>
              <a href="./operation/array-like.html" olink="">push</a>
              <p>Fügt dem aktuellen Element ein Kindelement hinzu</p>
            </api-item>
            <api-item>
              <a href="./operation/array-like.html?L=11" olink="">pop</a>
              <p>Entfernt das letzte Kindelement des aktuellen Elements</p>
            </api-item>
            <api-item>
              <a href="./operation/array-like.html?L=14" olink="">shift</a>
              <p>Entfernt das erste Kindelement des aktuellen Elements</p>
            </api-item>
            <api-item>
              <a href="./operation/array-like.html?L=8" olink="">unshift</a>
              <p>Fügt dem aktuellen Element ein Kindelement am Anfang hinzu</p>
            </api-item>
            <api-item>
              <a href="./operation/array-like.html?L=17" olink="">splice</a>
              <p>Fügt Kindelemente hinzu oder entfernt sie</p>
            </api-item>
            <api-item>
              <a href="./operation/before.html" olink="">before</a>
              <p>Fügt ein Element vor dem aktuellen Element ein</p>
            </api-item>
            <api-item>
              <a href="./operation/after.html" olink="">after</a>
              <p>Fügt ein Element nach dem aktuellen Element ein</p>
            </api-item>
            <api-item>
              <a href="./operation/remove.html" olink="">remove</a>
              <p>Entfernt das aktuelle Element</p>
            </api-item>
            <api-item>
              <a href="./operation/wrap.html" olink="">wrap</a>
              <p>Umschließt das aktuelle Element mit einem angegebenen Element</p>
            </api-item>
            <api-item>
              <a href="./operation/unwrap.html" olink="">unwrap</a>
              <p>Entfernt die Umhüllung des übergeordneten Elements des aktuellen Elements</p>
            </api-item>
          </api-list>
          <api-list>
            <h3>Attributoperationen</h3>
            <api-item>
              <a href="./props/text.html" olink="">text</a>
              <p>Ruft den Textinhalt des Elements ab oder legt ihn fest</p>
            </api-item>
            <api-item>
              <a href="./props/html.html" olink="">html</a>
              <p>Ruft den HTML-Inhalt des Elements ab oder legt ihn fest</p>
            </api-item>
            <api-item>
              <a href="./props/attr.html" olink="">attr</a>
              <p>Ruft ein Attribut des Elements ab oder legt es fest</p>
            </api-item>
            <api-item>
              <a href="./props/css.html" olink="">css</a>
              <p>Ruft den Stil des Elements ab oder legt ihn fest</p>
            </api-item>
            <api-item>
              <a href="./props/style.html" olink="">style</a>
              <p>Ruft das style-Objekt des Elements ab</p>
            </api-item>
            <api-item>
              <a href="./props/class-list.html" olink="">classList</a>
              <p>Ruft die Klassenliste des Elements ab</p>
            </api-item>
            <api-item>
              <a href="./props/data.html" olink="">data</a>
              <p>Ruft ein data-Attribut des Elements ab oder legt es fest</p>
            </api-item>
          </api-list>
          <api-list>
            <h3>Ereignisbezogenes</h3>
            <api-item>
              <a href="./event/on.html" olink="">on</a>
              <p>Fügt dem Element einen Ereignislistener hinzu</p>
            </api-item>
            <api-item>
              <a href="./event/one.html" olink="">one</a>
              <p>Fügt dem Element einen einmaligen Ereignislistener hinzu</p>
            </api-item>
            <api-item>
              <a href="./event/emit.html" olink="">emit</a>
              <p>Löst ein benutzerdefiniertes Ereignis des Elements aus</p>
            </api-item>
            <api-item>
              <a href="./event/off.html" olink="">off</a>
              <p>Entfernt einen Ereignislistener des Elements</p>
            </api-item>
          </api-list>
          <api-list>
            <h3>Sonstiges</h3>
            <api-item>
              <a href="./others/app.html" olink="">o-app-Komponente</a>
              <p>Die Wurzelkomponente der ofa.js-Anwendung zur Verwaltung des Anwendungsstatus und des Routings</p>
            </api-item>
            <api-item>
              <a href="./others/page.html" olink="">o-page-Komponente</a>
              <p>Die Seitenkomponente von ofa.js zum Erstellen von Single-Page-Application-Seiten</p>
            </api-item>
            <api-item>
              <a href="./others/module-return.html" olink="">Eigenschaften des Rückgabeobjekts des Moduls</a>
              <p>Zusammenfassung der Eigenschaften des Rückgabeobjekts von Seitenmodulen und Komponentenmodulen</p>
            </api-item>
            <api-item>
              <a href="./others/form-data.html" olink="">formData</a>
              <p>Ruft Formulardaten ab</p>
            </api-item>
            <api-item>
              <a href="./others/tag.html" olink="">tag</a>
              <p>Ruft den Tag-Namen des Elements ab</p>
            </api-item>
            <api-item>
              <a href="./others/index.html" olink="">index</a>
              <p>Ruft den Index des Elements innerhalb seines übergeordneten Elements ab</p>
            </api-item>
            <api-item>
              <a href="./others/is.html" olink="">is</a>
              <p>Überprüft, ob das Element mit dem angegebenen Selektor übereinstimmt</p>
            </api-item>
            <api-item>
              <a href="./others/refresh.html" olink="">refresh</a>
              <p>Aktualisiert die aktuelle Komponente oder Seite</p>
            </api-item>
            <api-item>
              <a href="./others/path.html" olink="">PATH</a>
              <p>Ruft den Pfad der aktuellen Seite ab</p>
            </api-item>
            <api-item>
              <a href="./others/extend.html" olink="">extend</a>
              <p>Erweitert die Funktionalität von ofa.js</p>
            </api-item>
            <api-item>
              <a href="./others/version.html" olink="">version</a>
              <p>Ruft die Versionsnummer von ofa.js ab</p>
            </api-item>
            <api-item>
              <a href="./others/stanz.html" olink="">Instanzdaten-Eigenschaft</a>
              <p>Stanz ist die reaktive Dateneigenschaft von ofa.js, die automatische Aktualisierungen der Daten unterstützt</p>
            </api-item>
          </api-list>
        </api-container>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
