      <article>
        <h1>API-Dokumentation</h1>
        <p> ofa.js unterstützt nicht nur Template-Syntax, sondern bietet auch umfangreiche APIs zur direkten DOM-Manipulation. Ähnlich wie <a href="https://jquery.com/" target="_blank">jQuery</a> kannst du mit der prägnanten ofa.js-Syntax das ausführliche native JavaScript ersetzen und mühelos DOM-Operationen durchführen. </p>
        <p> In den Lebenszyklusfunktionen und benutzerdefinierten Methoden von Komponenten oder Seitenmodulen kannst du jederzeit die von ofa.js bereitgestellten APIs aufrufen, um DOM-Elemente flexibel und effizient zu steuern. </p>
        <api-container>
          <api-list>
            <h3>Instanz bezogen</h3>
            <api-item>
              <a href="./instance/dollar.html" olink="">$(selector)</a>
              <p>Die Kernfunktion in ofa.js, die zum Abrufen und Bearbeiten von DOM-Element-Instanzen verwendet wird</p>
            </api-item>
            <api-item>
              <a href="./instance/all.html" olink="">all</a>
              <p>Ruft alle untergeordneten Elementinstanzen des aktuellen Elements ab</p>
            </api-item>
            <api-item>
              <a href="./instance/shadow.html" olink="">shadow</a>
              <p>Ruft den Shadow Root des aktuellen Elements ab</p>
            </api-item>
            <api-item>
              <a href="./instance/prev.html" olink="">prev</a>
              <p>Ruft das vorherige Geschwisterelement des aktuellen Elements ab</p>
            </api-item>
            <api-item>
              <a href="./instance/prevs.html" olink="">prevs</a>
              <p>Ruft alle vorherigen Geschwisterelemente des aktuellen Elements ab</p>
            </api-item>
            <api-item>
              <a href="./instance/next.html" olink="">next</a>
              <p>Ruft das nächste Geschwisterelement des aktuellen Elements ab</p>
            </api-item>
            <api-item>
              <a href="./instance/nexts.html" olink="">nexts</a>
              <p>Ruft alle nächsten Geschwisterelemente des aktuellen Elements ab</p>
            </api-item>
            <api-item>
              <a href="./instance/siblings.html" olink="">siblings</a>
              <p>Ruft alle Geschwisterelemente des aktuellen Elements ab</p>
            </api-item>
            <api-item>
              <a href="./instance/parent.html" olink="">parent</a>
              <p>Ruft das übergeordnete Element des aktuellen Elements ab</p>
            </api-item>
            <api-item>
              <a href="./instance/parents.html" olink="">parents</a>
              <p>Ruft alle übergeordneten Elemente des aktuellen Elements ab</p>
            </api-item>
            <api-item>
              <a href="./instance/clone.html" olink="">clone</a>
              <p>Kopiert das aktuelle Element und seine untergeordneten Elemente</p>
            </api-item>
            <api-item>
              <a href="./instance/ele.html" olink="">ele</a>
              <p>Ruft die untergeordnete Elementinstanz des aktuellen Elements ab</p>
            </api-item>
            <api-item>
              <a href="./instance/root.html" olink="">root</a>
              <p>Ruft die Stamm-Instanz ab, zu der das aktuelle Element gehört</p>
            </api-item>
            <api-item>
              <a href="./instance/children.html" olink="">Unterelemente</a>
              <p>Ruft alle untergeordneten Elemente des aktuellen Elements ab</p>
            </api-item>
            <api-item>
              <a href="./instance/host.html" olink="">host</a>
              <p>Ruft das Host-Element des Web Components ab, zu dem das aktuelle Element gehört</p>
            </api-item>
            <api-item>
              <a href="./instance/app.html" olink="">app</a>
              <p>Ruft die o-app-Komponenteninstanz ab, zu der das aktuelle Element gehört</p>
            </api-item>
          </api-list>
          <api-list>
            <h3>Knotenoperationen</h3>
            <api-item>
              <a href="./operation/array-like.html" olink="">push</a>
              <p>Fügt untergeordnete Elemente zum aktuellen Element hinzu</p>
            </api-item>
            <api-item>
              <a href="./operation/array-like.html?L=11" olink="">pop</a>
              <p>Entfernt das letzte untergeordnete Element des aktuellen Elements</p>
            </api-item>
            <api-item>
              <a href="./operation/array-like.html?L=14" olink="">shift</a>
              <p>Entfernt das erste untergeordnete Element des aktuellen Elements</p>
            </api-item>
            <api-item>
              <a href="./operation/array-like.html?L=8" olink="">unshift</a>
              <p>Fügt das erste untergeordnete Element zum aktuellen Element hinzu</p>
            </api-item>
            <api-item>
              <a href="./operation/array-like.html?L=17" olink="">splice</a>
              <p>Fügt untergeordnete Elemente zum aktuellen Element hinzu oder entfernt sie</p>
            </api-item>
            <api-item>
              <a href="./operation/before.html" olink="">before</a>
              <p>Fügt vor dem aktuellen Element untergeordnete Elemente hinzu</p>
            </api-item>
            <api-item>
              <a href="./operation/after.html" olink="">after</a>
              <p>Fügt nach dem aktuellen Element untergeordnete Elemente hinzu</p>
            </api-item>
            <api-item>
              <a href="./operation/remove.html" olink="">remove</a>
              <p>Entfernt das aktuelle Element</p>
            </api-item>
            <api-item>
              <a href="./operation/wrap.html" olink="">wrap</a>
              <p>Umgibt das aktuelle Element mit einem angegebenen Element</p>
            </api-item>
            <api-item>
              <a href="./operation/unwrap.html" olink="">unwrap</a>
              <p>Entfernt die übergeordnete Elementumgebung des aktuellen Elements</p>
            </api-item>
          </api-list>
          <api-list>
            <h3>Attributoperationen</h3>
            <api-item>
              <a href="./props/text.html" olink="">text</a>
              <p>Ruft den Textinhalt des Elements ab oder legt ihn fest</p>
            </api-item>
            <api-item>
              <a href="./props/html.html" olink="">html</a>
              <p>Ruft den HTML-Inhalt des Elements ab oder legt ihn fest</p>
            </api-item>
            <api-item>
              <a href="./props/attr.html" olink="">attr</a>
              <p>Ruft Attribute des Elements ab oder legt sie fest</p>
            </api-item>
            <api-item>
              <a href="./props/css.html" olink="">css</a>
              <p>Ruft den CSS-Stil des Elements ab oder legt ihn fest</p>
            </api-item>
            <api-item>
              <a href="./props/style.html" olink="">style</a>
              <p>Ruft das Style-Objekt des Elements ab</p>
            </api-item>
            <api-item>
              <a href="./props/class-list.html" olink="">classList</a>
              <p>Ruft die Klassenliste des Elements ab</p>
            </api-item>
            <api-item>
              <a href="./props/data.html" olink="">data</a>
              <p>Ruft die data-Attribute des Elements ab oder legt sie fest</p>
            </api-item>
          </api-list>
          <api-list>
            <h3>Ereignis bezogen</h3>
            <api-item>
              <a href="./event/on.html" olink="">on</a>
              <p>Fügt dem Element einen Ereignis-Listener hinzu</p>
            </api-item>
            <api-item>
              <a href="./event/one.html" olink="">one</a>
              <p>Fügt dem Element einen Ereignis-Listener hinzu, der nur einmal ausgeführt wird</p>
            </api-item>
            <api-item>
              <a href="./event/emit.html" olink="">emit</a>
              <p>Löst ein benutzerdefiniertes Ereignis des Elements aus</p>
            </api-item>
            <api-item>
              <a href="./event/off.html" olink="">off</a>
              <p>Entfernt den Ereignis-Listener des Elements</p>
            </api-item>
          </api-list>
          <api-list>
            <h3>Sonstiges</h3>
            <api-item>
              <a href="./others/app.html" olink="">o-app Komponente</a>
              <p>Die Stammkomponente der ofa.js-Anwendung, die zum Verwalten des Anwendungsstatus und des Routings verwendet wird</p>
            </api-item>
            <api-item>
              <a href="./others/page.html" olink="">o-page Komponente</a>
              <p>Die Seitenkomponente von ofa.js, die zum Erstellen von Einzelseiten-Anwendungsseiten verwendet wird</p>
            </api-item>
            <api-item>
              <a href="./others/form-data.html" olink="">formData</a>
              <p>Ruft Formulardaten ab</p>
            </api-item>
            <api-item>
              <a href="./others/tag.html" olink="">tag</a>
              <p>Ruft den Tag-Namen des Elements ab</p>
            </api-item>
            <api-item>
              <a href="./others/index.html" olink="">index</a>
              <p>Ruft den Index des Elements in seinem übergeordneten Element ab</p>
            </api-item>
            <api-item>
              <a href="./others/is.html" olink="">is</a>
              <p>Prüft, ob das Element mit dem angegebenen Selektor übereinstimmt</p>
            </api-item>
            <api-item>
              <a href="./others/refresh.html" olink="">refresh</a>
              <p>Aktualisiert die aktuelle Komponente oder Seite</p>
            </api-item>
            <api-item>
              <a href="./others/path.html" olink="">PATH</a>
              <p>Ruft den Pfad der aktuellen Seite ab</p>
            </api-item>
            <api-item>
              <a href="./others/extend.html" olink="">extend</a>
              <p>Erweitert die Funktionalität von ofa.js</p>
            </api-item>
            <api-item>
              <a href="./others/version.html" olink="">version</a>
              <p>Ruft die Versionsnummer von ofa.js ab</p>
            </api-item>
            <api-item>
              <a href="./others/stanz.html" olink="">Instanzdatenmerkmale</a>
              <p>Stanz ist das reaktive Datenmerkmal von ofa.js, das die automatische Aktualisierung von Daten unterstützt</p>
            </api-item>
          </api-list>
        </api-container>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>

  <o-root-provider name="pui" theme="dark"></o-root-provider>
