      <article class="markdown-body">
        <h1>o-page Komponente</h1>
        <p><code>o-page</code> ist eine der Kernkomponenten von ofa.js und repräsentiert eine eigenständige Seite oder ein Seitenmodul. Im Folgenden sind einige Schlüsseleigenschaften und -methoden von <code>o-page</code>:</p>
        <h2>src Attribut</h2>
        <p>Das <code>src</code>-Attribut wird verwendet, um die konkrete Adresse des Seitenmoduls anzugeben. Es ist das Schlüsselattribut zur Festlegung von Inhalt und Verhalten der Seite und teilt der Anwendung mit, wo der Inhalt der jeweiligen Seite geladen werden soll.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> page = <span class="hljs-variable language_">this</span>;</code></pre>
        <h2>goto-Methode</h2>
        <p>Die <code>goto</code>-Methode dient dazu, von der aktuellen Seite zu einer anderen Seite zu springen. Im Vergleich zur <code>goto</code>-Methode von <code>app</code> kann die <code>goto</code>-Methode von <code>page</code> <strong>relative Adressen</strong> verwenden, um zu anderen Seiten zu navigieren.</p>
        <pre><code class="hljs language-javascript">page.<span class="hljs-title function_">goto</span>(<span class="hljs-string">&quot;./page2.html&quot;</span>);</code></pre>
        <h2>replace-Methode</h2>
        <p>Die Methode <code>replace</code> wird verwendet, um die aktuelle Seite durch eine andere Seite zu ersetzen. Dies ist ähnlich wie die <code>replace</code>-Methode von <code>app</code>, erfolgt jedoch innerhalb der Seite.</p>
        <pre><code class="hljs language-javascript">page.<span class="hljs-title function_">replace</span>(<span class="hljs-string">&quot;./new-page.html&quot;</span>);</code></pre>
        <h2>Rückgabemethode</h2>
        <p><code>back</code>-Methode wird verwendet, um zur vorherigen Seite zurückzukehren. Dies navigiert den Benutzer zur vorherigen Seite, ähnlich der Rückwärtsfunktion eines Browsers.</p>
        <pre><code class="hljs language-javascript">page.<span class="hljs-title function_">back</span>();</code></pre>
      </article>

      <script>
        export const parent = "../../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
