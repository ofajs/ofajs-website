        <h1>extend</h1>
        <p><code>extend</code> ist eine höhere Methode, die verwendet wird, um die Attribute oder Methoden einer Instanz zu erweitern.</p>
        <blockquote>
          <p>In der Regel wird es nicht empfohlen, dass Benutzer die Eigenschaften oder Methoden der Instanz erweitern, da dies die Lernkurve erhöht. Es sei denn, es gibt im Team spezielle Szenarien, in denen das Verhalten der Instanz angepasst werden muss, andernfalls ist dies nicht ratsam.</p>
        </blockquote>
        <o-playground name="extend - Erweiterungsbeispiel" style="--editor-height: 560px">
          <code path="demo.html">
    <template>
      <ul>
        <li>I am 1</li>
        <li id="target">I am target</li>
        <li>I am 3</li>
      </ul>
      <div id="logger">logger</div>
      <script>
        const target = $("#target");
        target.extend({
          get good(){
            return "ofa.js is good";
          },
          say(){
            return 'hello';
          }
        });
        setTimeout(() => {
          const target = $("#target");
          \$("#logger").html = `
          good : ${target.good} <br>
          say() : ${target.say()}
          `;
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Erweitern Sie die $-Unterstützung</h2>
        <p>Ähnlich wie jQuery kannst du auch mit fn.extend die Eigenschaften oder Methoden der zugrunde liegenden Instanz erweitern; die von fn erweiterten Eigenschaften oder Methoden werden auf alle Instanzen angewendet.</p>
        <o-playground name="extend - Basis erweitern" style="--editor-height: 560px">
          <code path="demo.html">
    <template>
      <ul>
        <li>I am 1</li>
        <li id="target">I am target</li>
        <li>I am 3</li>
      </ul>
      <div id="logger">logger</div>
      <script>
        \$.fn.extend({
          get good(){
            return "ofa.js is good";
          },
          say(){
            return 'hello';
          }
        });
        setTimeout(() => {
          \$("#logger").html = `
          target good : ${$("#target").good} <br>
          logger say() : ${$("#logger").say()}
          `;
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Erweiterte Vorlagensyntax</h2>
        <p>Durch das Erweitern von Eigenschaften oder Funktionen mit <code>extend</code> kann die Funktionalität der Vorlagensyntax erweitert werden, sogar bis hin zur Bereitstellung spezifischer Vorlagen-Syntaktischer Zucker für Komponenten. Es ist jedoch zu beachten, dass <strong>nicht offizielle</strong> Vorlagensyntax möglichst vermieden werden sollte, da sie für Benutzer einen gewissen Lernaufwand mit sich bringt und eine große Anzahl nicht offizieller Vorlagen-Syntaktischer Zucker die Entwicklungserfahrung beeinträchtigt.</p>
        <h3>Erweiterte Attribute</h3>
        <p>Sie können über Erweiterungsattribute im Template mit <code>:</code> Einstellungen vornehmen. Im Folgenden erweitern wir ein <code>red</code>-Attribut: Wenn <code>red</code> den Wert <code>true</code> hat, wird die Schriftfarbe rot.</p>
        <pre><code class="hljs language-javascript">$.fn.<span class="hljs-title function_">extend</span>({
  <span class="hljs-keyword">set</span> <span class="hljs-title function_">red</span>(<span class="hljs-params">bool</span>){
    <span class="hljs-keyword">if</span>(bool){
      <span class="hljs-variable language_">this</span>.<span class="hljs-property">css</span>.<span class="hljs-property">color</span> = <span class="hljs-string">&quot;red&quot;</span>;
    }<span class="hljs-keyword">else</span>{
      <span class="hljs-variable language_">this</span>.<span class="hljs-property">css</span>.<span class="hljs-property">color</span> = <span class="hljs-string">&#x27;&#x27;</span>;
    }
  }
});</code></pre><o-playground name="extend - erweiterte Attribute" style="--editor-height: 400px">
          <code path="demo.html" preview active>
    <template>
      <l-m src="./temp-one.html"></l-m>
      <temp-one></temp-one>
      <script>
        \$.fn.extend({
          set red(bool){
            if(bool){
              this.css.color = "red";
            }else{
              this.css.color = '';
            }
          }
        });
      </script>
    </template>
  </code>

        <p>In diesem Beispiel haben wir der Templatsyntax eine <code>red</code>-Eigenschaft hinzugefügt. Wenn <code>count % 3</code> nicht 0 ist, wird die Schriftfarbe rot.</p>
        <h3>Erweiterungsmethoden</h3>
        <p>Du kannst sie auch durch die <code>extend</code>-Erweiterungsmethode in der Templatesyntax verfügbar machen. Der Methodenname ist der Teil vor dem Doppelpunkt. Hier haben wir eine <code>color</code>-Templatesyntax erweitert, und die nachfolgenden Parameter werden an die definierte Erweiterungsmethode übergeben.</p>
        <p>Hier wurde das <code>always</code>-Attribut auf <code>true</code> gesetzt, was bedeutet, dass diese definierte Methode jedes Mal aufgerufen wird, wenn die Komponente die Oberfläche aktualisieren muss. Wenn <code>always</code> nicht gesetzt wird, wird diese Template-Syntax-Funktion nur einmal ausgeführt.</p>
        <p>Dabei bietet <code>options</code> mehr Parameter, die Ihnen helfen, eine individuellere Vorlagensyntax zu entwickeln:</p>
        <pre><code class="hljs language-javascript">$.fn.<span class="hljs-title function_">extend</span>({
  <span class="hljs-title function_">color</span>(<span class="hljs-params">value, func, options</span>){
    <span class="hljs-keyword">const</span> bool = <span class="hljs-title function_">func</span>();
    <span class="hljs-keyword">if</span>(bool){
      <span class="hljs-variable language_">this</span>.<span class="hljs-property">css</span>.<span class="hljs-property">color</span> = value;
    }<span class="hljs-keyword">else</span>{
      <span class="hljs-variable language_">this</span>.<span class="hljs-property">css</span>.<span class="hljs-property">color</span> = <span class="hljs-string">&#x27;&#x27;</span>;
    }
  }
});

$.fn.<span class="hljs-property">color</span>.<span class="hljs-property">always</span> = <span class="hljs-literal">true</span>;</code></pre><o-playground name="extend - Erweiterungsmethoden" style="--editor-height: 400px">

      <script>

          color(color, func, options){
            const bool = func();
            if(bool){
              this.css.color = color;
            }else{
              this.css.color = '';
            }
          }
        });
        \$.fn.color.always = true;

        <h2>Prinzip der Vorlagen-Syntax</h2>
        <p>Bis jetzt solltest du bereits verstanden haben, dass viele der Template-Syntaxen auf ofa.js tatsächlich über <code>extend</code> erweitert werden:</p>
        <ul>
          <li>Die Methoden <code>class</code> und <code>attr</code> werden bei jedem Neuladen der Ansicht ausgeführt</li>
          <li>Funktionsbindungen wie <code>on</code> oder <code>one</code> werden nur einmal ausgeführt</li>
        </ul>
        <p>Du kannst dir das folgende Beispiel ansehen, um das Prinzip des Template-Renderings von ofa.js besser zu verstehen:</p>
        <o-playground name="extend - Vorlagen-Syntax-Prinzip" style="--editor-height: 480px">
          <code path="demo.html" preview>
    <template>
      <l-m src="./temp-three.html"></l-m>
      <temp-three></temp-three>
    </template>
  </code>
          <code path="temp-three.html" active>
    <template component>
      <div>class always => {{classalways}}</div>
      <div>attr always => {{attralways}}</div>
      <div>on always => {{onalways}}</div>
      <script>
        export default {
          tag: "temp-three",
          data: {
            classalways:"",
            attralways:"",
            onalways:""
          },
          ready(){
            this.classalways = $.fn.class.always;
            this.attralways = $.fn.attr.always;
            this.onalways = !!$.fn.on.always;
          }
        };
      </script>
    </template>
  </code>
