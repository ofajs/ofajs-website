      <article class="markdown-body">
        <h1>o-app Komponente</h1>
        <p><code>o-app</code> ist eine der Kernkomponenten in ofa.js und wird zur Konfiguration und Verwaltung der gesamten Anwendung verwendet. Im Folgenden einige Schlüsselattribute und -methoden der App:</p>
        <h2>src</h2>
        <p>Das <code>src</code>-Attribut wird verwendet, um die spezifische Adresse des Anwendungsparameter-Konfigurationsmoduls anzugeben.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> app = $(<span class="hljs-string">&quot;o-app&quot;</span>);
<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(app.<span class="hljs-property">src</span>);</code></pre>
        <h2>current</h2>
        <p>Das <code>current</code>-Attribut wird verwendet, um die Instanz der aktuell angezeigten Seite abzurufen. Dies kann Ihnen helfen, auf die aktuell angezeigte Seite zuzugreifen und sie zu bearbeiten, z. B. um deren Inhalt zu aktualisieren oder bestimmte Aktionen auszuführen.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> currentPage = app.<span class="hljs-property">current</span>;</code></pre>
        <h2>goto</h2>
        <p>Die Methode <code>goto</code> wird verwendet, um zu einer bestimmten Seite zu springen. Sie können die Adresse der Zielseite übergeben, und die Anwendung lädt und zeigt diese Seite an. Dies ist eine wichtige Methode für die Navigation in der Anwendung.</p>
        <pre><code class="hljs language-javascript">app.<span class="hljs-title function_">goto</span>(<span class="hljs-string">&quot;/page2.html&quot;</span>);</code></pre>
        <h2>replace</h2>
        <p>Die Methode <code>replace</code> ist ähnlich wie <code>goto</code>, ersetzt jedoch die aktuelle Seite anstatt eine neue Seite auf den Stapel zu legen. Sie kann verwendet werden, um eine Seitenersetzung statt einer Stapelnavigation zu realisieren.</p>
        <pre><code class="hljs language-javascript">app.<span class="hljs-title function_">replace</span>(<span class="hljs-string">&quot;/new-page.html&quot;</span>);</code></pre>
        <h2>back</h2>
        <p>Die <code>back</code>-Methode wird verwendet, um zur vorherigen Seite zurückzukehren und ermöglicht die Navigation rückwärts durch die Seiten. Dadurch wird der Benutzer zur vorherigen Seite zurückgeleitet.</p>
        <pre><code class="hljs language-javascript">app.<span class="hljs-title function_">back</span>();</code></pre>
        <h2>routers</h2>
        <p>Die Eigenschaft <code>routers</code> enthält die Routing-Konfigurationsinformationen der Anwendung. Dies ist eine wichtige Eigenschaft, die die Routing-Regeln und Zuordnungen der einzelnen Seiten innerhalb der Anwendung definiert. Die Routing-Konfiguration bestimmt die Navigation zwischen Seiten und die Behandlung von URLs.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> routeConfig = app.<span class="hljs-property">routers</span>;</code></pre>
      </article>

      <script>
        export const parent = "../../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
