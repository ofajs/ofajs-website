        <h1>o-app-Komponente</h1>
        <p><code>o-app</code> ist eine der Kernkomponenten in ofa.js, die zur Konfiguration und Verwaltung der gesamten Anwendung dient. Im Folgenden sind einige wichtige Eigenschaften und Methoden der app:</p>
        <h2>src</h2>
        <p><code>src</code> Attribut wird verwendet, um die genaue Adresse des Anwendungsparameter-Konfigurationsmoduls anzugeben.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> app = $(<span class="hljs-string">&quot;o-app&quot;</span>);
<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(app.<span class="hljs-property">src</span>);</code></pre>
        <h2>current</h2>
        <p>Die Eigenschaft <code>current</code> wird verwendet, um die gerade angezeigte Seiteninstanz abzurufen. Auf diese Weise können Sie auf die aktuell dargestellte Seite zugreifen und sie bearbeiten, etwa um deren Inhalt zu aktualisieren oder bestimmte Aktionen auszuführen.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> currentPage = app.<span class="hljs-property">current</span>;</code></pre>
        <h2>goto</h2>
        <p><code>goto</code> Methode wird verwendet, um zu einer bestimmten Seite zu springen. Sie können die Adresse der Zielseite übergeben, die App wird die Seite laden und anzeigen. Dies ist eine wichtige Methode der App-Navigation.</p>
        <pre><code class="hljs language-javascript">app.<span class="hljs-title function_">goto</span>(<span class="hljs-string">&quot;/page2.html&quot;</span>);</code></pre>
        <h2>replace</h2>
        <p><code>replace</code>-Methode ähnelt <code>goto</code>, dient jedoch dazu, die aktuelle Seite zu ersetzen, anstatt eine neue Seite zum Stack hinzuzufügen. Dies kann verwendet werden, um Seitenersetzungen anstelle von Stack-Navigation zu implementieren.</p>
        <pre><code class="hljs language-javascript">app.<span class="hljs-title function_">replace</span>(<span class="hljs-string">&quot;/neue-seite.html&quot;</span>);</code></pre>
        <h2>back</h2>
        <p><code>back</code> Methode wird verwendet, um zur vorherigen Seite zurückzukehren und die Rückwärtsnavigation der Seite zu realisieren. Dies führt den Benutzer zurück zur vorherigen Seite.</p>
        <pre><code class="hljs language-javascript">app.<span class="hljs-title function_">back</span>();</code></pre>
        <h2>routers</h2>
        <p>Das Attribut <code>routers</code> enthält die Routing-Konfigurationsinformationen der Anwendung. Es ist ein wichtiges Attribut, das die Routing-Regeln und Zuordnungen der einzelnen Seiten in der Anwendung definiert. Die Routing-Konfiguration bestimmt die Navigation zwischen den Seiten und die Behandlung von URLs.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> routeConfig = app.<span class="hljs-property">routers</span>;</code></pre>
      </article>

          query

            init,
            revoke
          } = await load("../../../js/init.js");

            data: {},

            detached() {
              revoke(this);
            },
