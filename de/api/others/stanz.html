        <h1>Beispieldatenmerkmale</h1>
        <p>Die durch <code>$</code> abgerufenen oder erstellten Instanzobjekte besitzen vollständige stanz-Dateneigenschaften, da die <code>$</code>-Instanz von stanz abgeleitet ist. Dies bedeutet, dass Sie die von <code>stanz</code> bereitgestellten Datenoperationsmethoden und -eigenschaften nutzen können, um die Daten der Instanzobjekte zu manipulieren und zu überwachen.</p>
        <blockquote>
          <p>Die folgenden Beispiele verwenden reguläre Elemente, da benutzerdefinierte Komponenten normalerweise bereits registrierte Daten enthalten, während reguläre Elemente meist nur Tag-Informationen enthalten und daher besser für die Demonstration geeignet sind.</p>
        </blockquote>
        <h2>watch</h2>
        <p>Instanzen können mithilfe der <code>watch</code>-Methode Änderungen von Werten überwachen; selbst wenn ein Wert eines Unterobjekts geändert wird, kann die Änderung in der <code>watch</code>-Methode des Objekts erfasst werden.</p>
        <p>Unten ist ein Beispiel, das die Verwendung der <code>$</code>-Instanz und der <code>watch</code>-Methode demonstriert:</p>
        <o-playground name="stanz - watch" style="--editor-height: 480px">
          <code path="demo.html">
    <template>
      <div id="target"></div>
      <br>
      <div id="logger" style="border: #aaa solid 1px; padding: 8px"></div>
      <script>
        const target = $("#target");
        \$("#logger").text = target;
        target.watch(() => {
          \$("#logger").text = target;
        });
        setTimeout(() => {
          target.aaa = "I am aaa";
        }, 600);
        setTimeout(() => {
          target.bbb = {
            child: {
              val: "I am bbb child val",
            },
          };
        }, 1200);
        setTimeout(() => {
          target.bbb.child.val = "change bbb child val";
        }, 1800);
      </script>
    </template>
  </code>
        </o-playground>
        <p>In diesem Beispiel erstellen wir zunächst eine <code>$</code>-Instanz namens <code>target</code> und verwenden dann die Methode <code>watch</code>, um Änderungen daran zu überwachen. Selbst wenn wir Werte in untergeordneten Objekten ändern, z. B. den Wert von <code>target.bbb.child.val</code>, werden diese Änderungen von der Methode <code>watch</code> erkannt und der Inhalt des <code>logger</code>-Elements entsprechend aktualisiert. Dies zeigt die leistungsstarke Funktionalität der <code>$</code>-Instanz und ermöglicht es dir, Änderungen an Objekten mühelos zu überwachen.</p>
        <h2>watchTick</h2>
        <p><code>watchTick</code> und die <code>watch</code>-Methode haben eine ähnliche Funktionalität, aber <code>watchTick</code> verfügt intern über eine Drosselungsoperation, die in einem einzelnen Thread einmal ausgeführt wird. Daher kann es in Szenarien mit höheren Leistungsanforderungen effektiver auf Datenänderungen überwachen.</p>
        <p>Hier ist ein Beispiel, das zeigt, wie man die <code>watchTick</code>-Methode einer <code>$</code>-Instanz verwendet:</p>
        <o-playground name="stanz - watchTick" style="--editor-height: 480px">
          <code path="demo.html">
    <template>
      <div id="target"></div>
      <br>
      <div id="logger1" style="border: blue solid 1px; margin: 8px"></div>
      <div id="logger2" style="border: red solid 1px; margin: 8px"></div>
      <script>
        const target = $("#target");
        let count1 = 0;
        target.watch(() => {
          count1++;
          \$("#logger1").text = 'watch-Läufe：' + count1;
        });
        let count2 = 0;
        target.watchTick(()=>{
          count2++;
          \$("#logger2").text = 'watchTick-Läufe：' + count2;
        });
        setTimeout(() => {
          target.aaa = "I am aaa";
          target.bbb = "I am bbb";
          target.ccc = "I am ccc";
        }, 1000);
      </script>
    </template>
  </code>
        </o-playground>
        <p>In diesem Beispiel erstellen wir zunächst eine <code>$</code>-Instanz <code>target</code>. Danach nutzen wir die Methoden <code>watch</code> und <code>watchTick</code>, um Änderungen am Objekt zu überwachen. Die Methode <code>watch</code> wird sofort bei einer Datenänderung ausgeführt, während <code>watchTick</code> innerhalb eines einzelnen Threads nur einmal läuft und dadurch die Häufigkeit der Überwachungsoperationen begrenzt. Je nach Bedarf kannst du <code>watch</code> oder <code>watchTick</code> wählen, um Datenänderungen zu beobachten.</p>
        <h2>unwatch</h2>
        <p>Die <code>unwatch</code>-Methode wird verwendet, um die Datenüberwachung abzubrechen, und kann zuvor registrierte <code>watch</code>- oder <code>watchTick</code>-Überwachungen widerrufen.</p>
        <p>Hier ist ein Beispiel, das zeigt, wie die <code>unwatch</code>-Methode der <code>$</code>-Instanz verwendet wird:</p>
        <o-playground name="stanz - unwatch" style="--editor-height: 480px">
          <code path="demo.html">
    <template>
      <div id="target"></div>
      <br>
      <div id="logger1" style="border: blue solid 1px; margin: 8px"></div>
      <div id="logger2" style="border: red solid 1px; margin: 8px"></div>
      <script>
        const target = $("#target");
        const tid1 = target.watch(() => {
          \$("#logger1").text = JSON.stringify(target);
        });
        const tid2 = target.watchTick(()=>{
          \$("#logger2").text = JSON.stringify(target);
        });
        setTimeout(() => {
          target.aaa = "I am aaa";
          target.unwatch(tid1);
          target.unwatch(tid2);
        }, 500);
        setTimeout(() => {
          target.bbb = "I am aaa";
        }, 1000);
      </script>
    </template>
  </code>
        </o-playground>
        <p>In diesem Beispiel erstellen wir zunächst eine <code>$</code>-Instanz <code>target</code> und registrieren dann mit der <code>watch</code>-Methode und der <code>watchTick</code>-Methode jeweils einen Listener. Anschließend widerrufen wir diese beiden Listener, indem wir der <code>unwatch</code>-Methode die zuvor gespeicherten Rückgabewerte <code>tid1</code> und <code>tid2</code> übergeben. Das bedeutet, dass die Attributänderung im ersten <code>setTimeout</code> keinen Listener auslöst, da die Listener bereits widerrufen wurden.</p>
        <h2>Der nicht überwachte Wert</h2>
        <p>In der <code>$</code>-Instanz zeigen Eigenschaftsnamen, die mit einem Unterstrich <code>_</code> beginnen, an, dass diese Werte nicht von den Methoden <code>watch</code> oder <code>watchTick</code> überwacht werden. Dies ist sehr nützlich für temporäre oder private Eigenschaften, bei denen Sie sie nach Belieben ändern können, ohne eine Überwachung auszulösen.</p>
        <p>In der Vorlage wird dies als <a href="../../documentation/state-management.html" olink="">nicht-reaktive Daten</a> bezeichnet.</p>
        <p>Im Folgenden finden Sie ein Beispiel, das zeigt, wie Sie einen Attributwert, der mit einem Unterstrich beginnt, verwenden können, um das Abhören zu vermeiden:</p>
        <o-playground name="stanz - Nicht-reaktive Daten" style="--editor-height: 480px">
          <code path="demo.html">
    <template>
      <div id="target"></div>
      <br>
      <div id="logger" style="border: #aaa solid 1px; padding: 8px"></div>
      <script>
        const target = $("#target");
        \$("#logger").text = target;
        target.watch(() => {
          \$("#logger").text = target;
        });
        setTimeout(() => {
          target._aaa = "Ich bin aaa";
        }, 600);
        setTimeout(() => {
          target._aaa = "Ändere aaa";
        }, 1200);
      </script>
    </template>
  </code>
        </o-playground>
        <p>In diesem Beispiel erstellen wir eine <code>$</code>-Instanz <code>target</code> und überwachen mit der Methode <code>watch</code> Änderungen von Eigenschaftswerten. Innerhalb von <code>setTimeout</code> versuchen wir, den Wert der Eigenschaft <code>_aaa</code> zu ändern; diese Änderung löst jedoch keine Überwachung aus. Das ist besonders nützlich, wenn Eigenschaftswerte aktualisiert werden sollen, ohne dabei die Überwachung auszulösen.</p>
        <h2>Grundlegende Merkmale</h2>
        <p>Auf der Instanz gesetzte Objektdaten werden in Stanz-Instanzen konvertiert, die das Abhören ermöglichen.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> obj = {
  <span class="hljs-attr">val</span>: <span class="hljs-string">"I am obj"</span>
};

$(<span class="hljs-string">"#target"</span>).<span class="hljs-property">obj</span> = obj;
<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>($(<span class="hljs-string">"#target"</span>).<span class="hljs-property">obj</span>.<span class="hljs-property">val</span> === obj.<span class="hljs-property">val</span>);
<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>($(<span class="hljs-string">"#target"</span>).<span class="hljs-property">obj</span> === obj);</code></pre>
        <p>Wir können auch <code>$.stanz</code> verwenden, um Stanz-Daten zu erstellen, die nicht an eine Instanz gebunden sind.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> data = $.<span class="hljs-title function_">stanz</span>({
  <span class="hljs-attr">val</span>: <span class="hljs-string">"Ich bin val"</span>
});

data.<span class="hljs-title function_">watch</span>(<span class="hljs-function">() =&gt;</span> {
  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(data.<span class="hljs-property">val</span>);
});

data.<span class="hljs-property">val</span> = <span class="hljs-string">"ändere val"</span>;</code></pre>
        <p>Diese Beispiele zeigen die grundlegenden Merkmale des Setzens von Objektdaten als Stanz-Instanz zum Abhören.</p>
        <p>Weitere vollständige Funktionen finden Sie unter <a href="https://github.com/ofajs/stanz" target="_blank">stanz</a>.</p>
