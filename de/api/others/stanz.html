        <h1>Merkmale der Beispieldaten</h1>
        <p>Durch <code>$</code> abgerufene oder erstellte Instanzobjekte verfügen über vollständige stanz-Datenmerkmale, da <code>$</code>-Instanzen von stanz erben. Das bedeutet, dass Sie die von <code>stanz</code> bereitgestellten Datenoperationen und Merkmale nutzen können, um die Daten von Instanzobjekten zu manipulieren und zu überwachen.</p>
        <blockquote>
          <p>Die folgenden Beispiele verwenden reguläre Elemente, da benutzerdefinierte Komponenten in der Regel bereits registrierte Daten mitbringen, während reguläre Elemente normalerweise nur Tag-Informationen enthalten und daher besser für die Demonstration geeignet sind.</p>
        </blockquote>
        <h2>watch</h2>
        <p>Instanzen können Änderungen von Werten über die <code>watch</code>-Methode beobachten; selbst wenn der Wert eines Unterobjekts des Objekts geändert wird, kann die Änderung in der <code>watch</code>-Methode des Objekts wahrgenommen werden.</p>
        <p>Im Folgenden finden Sie ein Beispiel, das zeigt, wie man die <code>$</code>-Instanz und die <code>watch</code>-Methode verwendet:</p>
        <o-playground name="stanz - watch" style="--editor-height: 480px">
          <code path="demo.html">
    <template>
      <div id="target"></div>
      <br>
      <div id="logger" style="border: #aaa solid 1px; padding: 8px"></div>
      <script>
        const target = $("#target");
        \$("#logger").text = target;
        target.watch(() => {
          \$("#logger").text = target;
        });
        setTimeout(() => {
          target.aaa = "Ich bin aaa";
        }, 600);
        setTimeout(() => {
          target.bbb = {
            child: {
              val: "Ich bin bbb child val",
            },
          };
        }, 1200);
        setTimeout(() => {
          target.bbb.child.val = "ändere bbb child val";
        }, 1800);
      </script>
    </template>
  </code>
        </o-playground>
        <p>In diesem Beispiel erstellen wir zunächst eine <code>$</code>-Instanz <code>target</code> und verwenden dann die Methode <code>watch</code>, um ihre Änderungen zu überwachen. Selbst wenn wir Werte in untergeordneten Objekten ändern, z. B. den Wert von <code>target.bbb.child.val</code>, werden diese Änderungen von der Methode <code>watch</code> erkannt und der Inhalt des <code>logger</code>-Elements aktualisiert. Dies zeigt die leistungsstarke Funktionalität der <code>$</code>-Instanz und ermöglicht es dir, Objektänderungen mühelos zu überwachen.</p>
        <h2>watchTick</h2>
        <p><code>watchTick</code> und die <code>watch</code>-Methode haben ähnliche Funktionen, aber <code>watchTick</code> führt intern eine Drosselung durch und wird in einem einzelnen Thread nur einmal ausgeführt, daher kann es in Szenarien mit höheren Leistungsanforderungen effizienter Datenänderungen überwachen.</p>
        <p>Nachfolgend ein Beispiel, das zeigt, wie die <code>watchTick</code>-Methode einer <code>$</code>-Instanz verwendet wird:</p>
        <o-playground name="stanz - watchTick" style="--editor-height: 480px">
          <code path="demo.html">
    <template>
      <div id="target"></div>
      <br>
      <div id="logger1" style="border: blue solid 1px; margin: 8px"></div>
      <div id="logger2" style="border: red solid 1px; margin: 8px"></div>
      <script>
        const target = $("#target");
        let count1 = 0;
        target.watch(() => {
          count1++;
          \$("#logger1").text = 'watch Anzahl der Ausführungen:' + count1;
        });
        let count2 = 0;
        target.watchTick(()=>{
          count2++;
          \$("#logger2").text = 'watchTick Anzahl der Ausführungen:' + count2;
        });
        setTimeout(() => {
          target.aaa = "I am aaa";
          target.bbb = "I am bbb";
          target.ccc = "I am ccc";
        }, 1000);
      </script>
    </template>
  </code>
        </o-playground>
        <p>In diesem Beispiel erstellen wir zunächst eine <code>$</code>-Instanz namens <code>target</code>. Danach verwenden wir die Methoden <code>watch</code> und <code>watchTick</code>, um Änderungen am Objekt zu überwachen. Die Methode <code>watch</code> wird sofort bei Datenänderungen ausgeführt, während <code>watchTick</code> innerhalb eines einzelnen Threads nur einmal läuft und dadurch die Häufigkeit der Überwachungsoperationen begrenzt. Du kannst je nach Bedarf <code>watch</code> oder <code>watchTick</code> wählen, um Datenänderungen zu überwachen.</p>
        <h2>unwatch</h2>
        <p>Die <code>unwatch</code>-Methode wird verwendet, um die Überwachung von Daten aufzuheben und kann zuvor registrierte <code>watch</code>- oder <code>watchTick</code>-Überwachungen widerrufen.</p>
        <p>Hier ist ein Beispiel, das zeigt, wie man die <code>unwatch</code>-Methode der <code>$</code>-Instanz verwendet:</p>
        <o-playground name="stanz - unwatch" style="--editor-height: 480px">
          <code path="demo.html">
    <template>
      <div id="target"></div>
      <br>
      <div id="logger1" style="border: blue solid 1px; margin: 8px"></div>
      <div id="logger2" style="border: red solid 1px; margin: 8px"></div>
      <script>
        const target = $("#target");
        const tid1 = target.watch(() => {
          \$("#logger1").text = JSON.stringify(target);
        });
        const tid2 = target.watchTick(()=>{
          \$("#logger2").text = JSON.stringify(target);
        });
        setTimeout(() => {
          target.aaa = "I am aaa";
          target.unwatch(tid1);
          target.unwatch(tid2);
        }, 500);
        setTimeout(() => {
          target.bbb = "I am aaa";
        }, 1000);
      </script>
    </template>
  </code>
        </o-playground>
        <p>In diesem Beispiel erstellen wir zunächst eine <code>$</code>-Instanz <code>target</code> und registrieren dann mit der <code>watch</code>-Methode und der <code>watchTick</code>-Methode jeweils einen Listener. Anschließend widerrufen wir diese beiden Listener, indem wir der <code>unwatch</code>-Methode die zuvor gespeicherten Rückgabewerte <code>tid1</code> und <code>tid2</code> übergeben. Das bedeutet, dass die Attributänderung im ersten <code>setTimeout</code> keinen Listener auslöst, da die Listener bereits widerrufen wurden.</p>
        <h2>Nicht überwachte Werte</h2>
        <p>In <code>$</code> Instanzen zeigen Attributnamen, die mit einem Unterstrich <code>_</code> beginnen, an, dass diese Werte nicht von den Methoden <code>watch</code> oder <code>watchTick</code> überwacht werden. Dies ist sehr nützlich für temporäre oder private Attribute, die du beliebig ändern kannst, ohne eine Überwachung auszulösen.</p>
        <p>In der Vorlage wird dies als <a href="../../documentation/state-management.html" olink="">nicht-reaktive Daten</a> bezeichnet.</p>
        <p>Hier ist ein Beispiel, das zeigt, wie man Eigenschaftswerte mit Unterstrich am Anfang verwendet, um Abhörversuche zu vermeiden:</p>
        <o-playground name="stanz - Nicht-reaktive Daten" style="--editor-height: 480px">
          <code path="demo.html">
    <template>
      <div id="target"></div>
      <br>
      <div id="logger" style="border: #aaa solid 1px; padding: 8px"></div>
      <script>
        const target = $("#target");
        \$("#logger").text = target;
        target.watch(() => {
          \$("#logger").text = target;
        });
        setTimeout(() => {
          target._aaa = "Ich bin aaa";
        }, 600);
        setTimeout(() => {
          target._aaa = "ändere aaa";
        }, 1200);
      </script>
    </template>
  </code>
        </o-playground>
        <p>In diesem Beispiel erstellen wir eine <code>$</code>-Instanz <code>target</code> und verwenden die <code>watch</code>-Methode, um Änderungen von Eigenschaftswerten zu überwachen. In <code>setTimeout</code> versuchen wir, den Wert der Eigenschaft <code>_aaa</code> zu ändern, diese Änderung löst jedoch keine Überwachung aus. Dies ist sehr nützlich für Fälle, in denen Eigenschaftswerte aktualisiert werden sollen, ohne eine Überwachung auszulösen.</p>
        <h2>Grundmerkmale</h2>
        <p>Objektdaten, die auf der Instanz gesetzt werden, werden in eine Stanz-Instanz konvertiert, und diese Stanz-Instanz ermöglicht das Abhören.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> obj = {
  <span class="hljs-attr">val</span>: <span class="hljs-string">"Ich bin obj"</span>
};

$(<span class="hljs-string">"#target"</span>).<span class="hljs-property">obj</span> = obj;
<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>($(<span class="hljs-string">"#target"</span>).<span class="hljs-property">obj</span>.<span class="hljs-property">val</span> === obj.<span class="hljs-property">val</span>);
<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>($(<span class="hljs-string">"#target"</span>).<span class="hljs-property">obj</span> === obj);</code></pre>
        <p>Wir können auch <code>$.stanz</code> verwenden, um Stanz-Daten zu erstellen, die nicht an eine Instanz gebunden sind.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> data = $.<span class="hljs-title function_">stanz</span>({
  <span class="hljs-attr">val</span>: <span class="hljs-string">"Ich bin val"</span>
});

data.<span class="hljs-title function_">watch</span>(<span class="hljs-function">() =&gt;</span> {
  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(data.<span class="hljs-property">val</span>);
});

data.<span class="hljs-property">val</span> = <span class="hljs-string">"val ändern"</span>;</code></pre>
        <p>Diese Beispiele zeigen grundlegende Merkmale beim Setzen von Objektdaten als Stanz-Instanz zum Lauschen.</p>
        <p>Weitere vollständige Funktionen finden Sie unter <a href="https://github.com/ofajs/stanz" target="_blank">stanz</a>.</p>
