        <h1>Modul-Rückgabeobjekteigenschaften</h1>
        <p>In ofa.js müssen sowohl Seitenmodule als auch Komponentenmodule über <code>export default async () =&gt; {}</code> ein Objekt zurückgeben, um die Konfiguration und das Verhalten des Moduls zu definieren. Dieses Dokument fasst alle Eigenschaften zusammen, die das zurückgegebene Objekt enthalten kann.</p>
        <h2>Attributübersicht</h2>
        <table>
          <thead>
            <tr>
              <th>Attribut</th>
              <th>Typ</th>
              <th align="center">Seitenmodul</th>
              <th align="center">Komponentenmodul</th>
              <th>Beschreibung</th>
              <th>Relevante Dokumentation</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><code>tag</code></td>
              <td><code>string</code></td>
              <td align="center">❌</td>
              <td align="center">✅ Erforderlich</td>
              <td>Name des Komponenten-Tags</td>
              <td><a href="../../documentation/create-component.html" olink="">Komponente erstellen</a></td>
            </tr>
            <tr>
              <td><code>data</code></td>
              <td><code>object</code></td>
              <td align="center">✅</td>
              <td align="center">✅</td>
              <td>Reaktives Datenobjekt</td>
              <td><a href="../../documentation/property-response.html" olink="">Eigenschaftsreaktion</a></td>
            </tr>
            <tr>
              <td><code>attrs</code></td>
              <td><code>object</code></td>
              <td align="center">❌</td>
              <td align="center">✅</td>
              <td>Definition der Komponenteneigenschaften</td>
              <td><a href="../../documentation/inherit-attributes.html" olink="">Vererbung von Attributen</a></td>
            </tr>
            <tr>
              <td><code>proto</code></td>
              <td><code>object</code></td>
              <td align="center">✅</td>
              <td align="center">✅</td>
              <td>Methoden und berechnete Eigenschaften</td>
              <td><a href="../../documentation/computed-properties.html" olink="">Berechnete Eigenschaften</a></td>
            </tr>
            <tr>
              <td><code>watch</code></td>
              <td><code>object</code></td>
              <td align="center">✅</td>
              <td align="center">✅</td>
              <td>Watcher</td>
              <td><a href="../../documentation/watchers.html" olink="">Watchers</a></td>
            </tr>
            <tr>
              <td><code>ready</code></td>
              <td><code>function</code></td>
              <td align="center">✅</td>
              <td align="center">✅</td>
              <td>Wird aufgerufen, wenn DOM erstellt wurde</td>
              <td><a href="../../documentation/lifecycle.html" olink="">Lebenszyklus</a></td>
            </tr>
            <tr>
              <td><code>attached</code></td>
              <td><code>function</code></td>
              <td align="center">✅</td>
              <td align="center">✅</td>
              <td>Wird beim Einhängen in das DOM aufgerufen</td>
              <td><a href="../../documentation/lifecycle.html" olink="">Lebenszyklus</a></td>
            </tr>
            <tr>
              <td><code>detached</code></td>
              <td><code>function</code></td>
              <td align="center">✅</td>
              <td align="center">✅</td>
              <td>Wird beim Entfernen aus dem DOM aufgerufen</td>
              <td><a href="../../documentation/lifecycle.html" olink="">Lebenszyklus</a></td>
            </tr>
            <tr>
              <td><code>loaded</code></td>
              <td><code>function</code></td>
              <td align="center">✅</td>
              <td align="center">✅</td>
              <td>Wird aufgerufen, wenn vollständig geladen</td>
              <td><a href="../../documentation/lifecycle.html" olink="">Lebenszyklus</a></td>
            </tr>
            <tr>
              <td><code>routerChange</code></td>
              <td><code>function</code></td>
              <td align="center">✅ Übergeordnete Seite</td>
              <td align="center">❌</td>
              <td>Wird bei Routenänderungen aufgerufen</td>
              <td><a href="../../documentation/nested-routes.html" olink="">Verschachtelte Seiten/Routen</a></td>
            </tr>
          </tbody>
        </table>
        <h2>Kernattribute</h2>
        <h3>tag</h3>
        <p><code>tag</code> ist der Tag-Name der Komponente, <strong>Komponentenmodule müssen dieses Attribut definieren</strong>. Seitenmodule müssen <code>tag</code> nicht definieren.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">async</span> () =&gt; {
  <span class="hljs-keyword">return</span> {
    <span class="hljs-attr">tag</span>: <span class="hljs-string">"my-component"</span>,
    <span class="hljs-comment">// ...</span>
  };
};</code></pre>
        <blockquote>
          <p>Hinweis: Der Wert von <code>tag</code> muss mit dem Tag-Namen bei der Verwendung der Komponente übereinstimmen.</p>
        </blockquote>
        <h3>data</h3>
        <p><code>data</code> ist ein reaktives Datenobjekt, das zum Speichern der Zustandsdaten einer Komponente oder Seite dient. Wenn sich die Daten ändern, wird die Ansicht automatisch aktualisiert.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">async</span> () =&gt; {
  <span class="hljs-keyword">return</span> {
    <span class="hljs-attr">data</span>: {
      <span class="hljs-attr">message</span>: <span class="hljs-string">"Hello"</span>,
      <span class="hljs-attr">count</span>: <span class="hljs-number">0</span>,
      <span class="hljs-attr">user</span>: {
        <span class="hljs-attr">name</span>: <span class="hljs-string">"ZhangSan"</span>,
        <span class="hljs-attr">age</span>: <span class="hljs-number">25</span>
      },
      <span class="hljs-attr">items</span>: [<span class="hljs-number">1</span>, <span class="hljs-number">2</span>, <span class="hljs-number">3</span>]
    }
  };
};</code></pre>
        <blockquote>
          <p>Hinweis: <code>data</code> ist ein Objekt und keine Funktion, anders als im Vue-Framework.</p>
        </blockquote>
        <h3>attrs</h3>
        <p><code>attrs</code> wird verwendet, um Komponenteneigenschaften zu definieren und von außen übergebene Daten zu empfangen. Nur das Komponentenmodul muss <code>attrs</code> definieren.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">async</span> () =&gt; {
  <span class="hljs-keyword">return</span> {
    <span class="hljs-attr">tag</span>: <span class="hljs-string">"my-component"</span>,
    <span class="hljs-attr">attrs</span>: {
      <span class="hljs-attr">title</span>: <span class="hljs-literal">null</span>,      <span class="hljs-comment">// Kein Standardwert</span>
      <span class="hljs-attr">disabled</span>: <span class="hljs-string">""</span>,     <span class="hljs-comment">// Hat einen Standardwert</span>
      <span class="hljs-attr">size</span>: <span class="hljs-string">"medium"</span>    <span class="hljs-comment">// Hat einen Standardwert</span>
    }
  };
};</code></pre>
        <p>Verwenden Sie beim Einsatz der Komponente die Eigenschaften:</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">my-component</span> <span class="hljs-attr">title</span>=<span class="hljs-string">"Titel"</span> <span class="hljs-attr">disabled</span> <span class="hljs-attr">size</span>=<span class="hljs-string">"large"</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">my-component</span>&gt;</span></code></pre>
        <blockquote>
          <p>Wichtige Regeln:</p>
          <ul>
            <li>Übergebene Attributwerte müssen Zeichenketten sein, andernfalls werden sie automatisch in Zeichenketten umgewandelt</li>
            <li>Namenskonvertierung: <code>fullName</code> → <code>full-name</code> (kebab-case-Format)</li>
            <li>Die Schlüssel von <code>attrs</code> und <code>data</code> dürfen nicht doppelt vorkommen</li>
          </ul>
        </blockquote>
        <h3>proto</h3>
        <p><code>proto</code> wird verwendet, um Methoden und berechnete Eigenschaften zu definieren. Berechnete Eigenschaften werden mit den JavaScript-Schlüsselwörtern <code>get</code> und <code>set</code> definiert.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">async</span> () =&gt; {
  <span class="hljs-keyword">return</span> {
    <span class="hljs-attr">data</span>: {
      <span class="hljs-attr">count</span>: <span class="hljs-number">0</span>
    },
    <span class="hljs-attr">proto</span>: {
      <span class="hljs-comment">// Methodendefinition</span>
      <span class="hljs-title function_">increment</span>(<span class="hljs-params"></span>) {
        <span class="hljs-variable language_">this</span>.<span class="hljs-property">count</span>++;
      },
      
      <span class="hljs-comment">// Berechnete Eigenschaft (Getter)</span>
      <span class="hljs-keyword">get</span> <span class="hljs-title function_">doubleCount</span>() {
        <span class="hljs-keyword">return</span> <span class="hljs-variable language_">this</span>.<span class="hljs-property">count</span> * <span class="hljs-number">2</span>;
      },
      
      <span class="hljs-comment">// Berechnete Eigenschaft</span>
      <span class="hljs-keyword">set</span> <span class="hljs-title function_">doubleCount</span>(<span class="hljs-params">val</span>) {
        <span class="hljs-variable language_">this</span>.<span class="hljs-property">count</span> = val / <span class="hljs-number">2</span>;
      }
    }
  };
};</code></pre>
        <blockquote>
          <p>Hinweis: ofa.js verwendet die Schlüsselwörter <code>get</code>/<code>set</code>, um berechnete Eigenschaften zu definieren, nicht die <code>computed</code>-Option von Vue.</p>
        </blockquote>
        <h3>watch</h3>
        <p><code>watch</code> wird verwendet, um Watcher zu definieren, die auf Datenänderungen lauschen und entsprechende Logik ausführen.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">async</span> () =&gt; {
  <span class="hljs-keyword">return</span> {
    <span class="hljs-attr">data</span>: {
      <span class="hljs-attr">count</span>: <span class="hljs-number">0</span>,
      <span class="hljs-attr">name</span>: <span class="hljs-string">""</span>
    },
    <span class="hljs-attr">watch</span>: {
      <span class="hljs-comment">// Eine einzelne Eigenschaft überwachen</span>
      <span class="hljs-title function_">count</span>(<span class="hljs-params">newVal, { watchers }</span>) {
        <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">'count changed:'</span>, newVal);
      },
      
      <span class="hljs-comment">// Mehrere Eigenschaften überwachen</span>
      <span class="hljs-string">"count,name"</span>() {
        <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">'count oder name geändert'</span>);
      }
    }
  };
};</code></pre>
        <p>Die Listener-Callback-Funktion empfängt zwei Parameter:- <code>newValue</code>: der neue Wert nach der Änderung</p>
        <ul>
          <li><code>{ watchers }</code>: alle Watcher-Objekte der aktuellen Komponente</li>
        </ul>
        <h2>Lebenszyklus-Hooks</h2>
        <p>Lebenszyklus-Hooks ermöglichen es Ihnen, in den verschiedenen Phasen einer Komponente spezifische Logik auszuführen.</p>
        <h3>ready</h3>
        <p><code>ready</code>-Hook wird aufgerufen, wenn die Komponente bereit ist. Zu diesem Zeitpunkt ist das Template der Komponente vollständig gerendert, die DOM-Elemente sind erstellt, aber möglicherweise noch nicht in das Dokument eingefügt.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-title function_">ready</span>(<span class="hljs-params"></span>) {
  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">'DOM erstellt'</span>);
  <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">initDomElements</span>();
}</code></pre>
        <h3>attached</h3>
        <p><code>attached</code>-Hook wird aufgerufen, wenn die Komponente in das Dokument eingefügt wird, und zeigt an, dass die Komponente auf der Seite eingehängt wurde.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-title function_">attached</span>(<span class="hljs-params"></span>) {
  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">'An DOM angehängt'</span>);
  <span class="hljs-variable language_">this</span>.<span class="hljs-property">_timer</span> = <span class="hljs-built_in">setInterval</span>(<span class="hljs-function">() =&gt;</span> {
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">count</span>++;
  }, <span class="hljs-number">1000</span>);
}</code></pre>
        <h3>detached</h3>
        <p><code>detached</code>-Hook wird aufgerufen, wenn die Komponente aus dem Dokument entfernt wird. Dies zeigt an, dass die Komponente demnächst ausgehängt wird.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-title function_">detached</span>(<span class="hljs-params"></span>) {
  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">'Vom DOM entfernt'</span>);
  <span class="hljs-built_in">clearInterval</span>(<span class="hljs-variable language_">this</span>.<span class="hljs-property">_timer</span>);
}</code></pre>
        <h3>loaded</h3>
        <p>Der <code>loaded</code>-Hook wird ausgelöst, nachdem die Komponente und alle ihre Unterkomponenten sowie asynchronen Ressourcen vollständig geladen sind.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-title function_">loaded</span>(<span class="hljs-params"></span>) {
  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">'Vollständig geladen'</span>);
}</code></pre>
        <h3>routerChange</h3>
        <p><code>routerChange</code>-Hook wird bei Routenänderung aufgerufen und dient ausschließlich der Überwachung von Unterseitenwechseln durch die übergeordnete Seite.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-title function_">routerChange</span>(<span class="hljs-params"></span>) {
  <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">refreshActive</span>();
}</code></pre>
        <h2>Lebenszyklus-Ausführungsreihenfolge</h2>
        <pre><code class="hljs">ready → attached → loaded
                 ↓
              detached（beim Entfernen）</code></pre>
        <h2>Spezielle Exporte: parent</h2>
        <p><code>parent</code> wird für verschachtelte Routen verwendet und gibt den Pfad der übergeordneten Seite der aktuellen Seite an. Dies ist ein eigenständiger Export und nicht im zurückgegebenen Objekt enthalten.</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">template</span> <span class="hljs-attr">page</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css"><span class="hljs-selector-pseudo">:host</span> { <span class="hljs-attribute">display</span>: block; }</span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">div</span>&gt;</span>Inhalt der Unterseite<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">
    <span class="hljs-comment">// Übergeordnete Seite angeben</span>
    <span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> parent = <span class="hljs-string">"./layout.html"</span>;
    
    <span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">async</span> () =&gt; {
      <span class="hljs-keyword">return</span> {
        <span class="hljs-attr">data</span>: {}
      };
    };
  </span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">template</span>&gt;</span></code></pre>
        <h2>Vollständiges Beispiel</h2>
        <h3>Komponentenmodul</h3>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">template</span> <span class="hljs-attr">component</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
    <span class="hljs-selector-pseudo">:host</span> { <span class="hljs-attribute">display</span>: block; <span class="hljs-attribute">padding</span>: <span class="hljs-number">10px</span>; }
  </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">div</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">p</span>&gt;</span>{{title}}<span class="hljs-tag">&lt;/<span class="hljs-name">p</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">p</span>&gt;</span>Zähler: {{count}}<span class="hljs-tag">&lt;/<span class="hljs-name">p</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">p</span>&gt;</span>Doppelt: {{doubleCount}}<span class="hljs-tag">&lt;/<span class="hljs-name">p</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">button</span> <span class="hljs-attr">on:click</span>=<span class="hljs-string">"increment"</span>&gt;</span>Erhöhen<span class="hljs-tag">&lt;/<span class="hljs-name">button</span>&gt;</span>
  <span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">
    <span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">async</span> () =&gt; {
      <span class="hljs-keyword">return</span> {
        <span class="hljs-attr">tag</span>: <span class="hljs-string">"my-component"</span>,
        <span class="hljs-attr">attrs</span>: {
          <span class="hljs-attr">title</span>: <span class="hljs-string">"Standardtitel"</span>
        },
        <span class="hljs-attr">data</span>: {
          <span class="hljs-attr">count</span>: <span class="hljs-number">0</span>
        },
        <span class="hljs-attr">proto</span>: {
          <span class="hljs-title function_">increment</span>(<span class="hljs-params"></span>) {
            <span class="hljs-variable language_">this</span>.<span class="hljs-property">count</span>++;
          },
          <span class="hljs-keyword">get</span> <span class="hljs-title function_">doubleCount</span>() {
            <span class="hljs-keyword">return</span> <span class="hljs-variable language_">this</span>.<span class="hljs-property">count</span> * <span class="hljs-number">2</span>;
          }
        },
        <span class="hljs-attr">watch</span>: {
          <span class="hljs-title function_">count</span>(<span class="hljs-params">newVal</span>) {
            <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">'count geändert zu:'</span>, newVal);
          }
        },
        <span class="hljs-title function_">ready</span>(<span class="hljs-params"></span>) {
          <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">'Komponente bereit'</span>);
        },
        <span class="hljs-title function_">attached</span>(<span class="hljs-params"></span>) {
          <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">'Komponente eingehängt'</span>);
        },
        <span class="hljs-title function_">detached</span>(<span class="hljs-params"></span>) {
          <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">'Komponente ausgehängt'</span>);
        }
      };
    };
  </span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">template</span>&gt;</span></code></pre>
        <h3>Seitenmodule</h3>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">template</span> <span class="hljs-attr">page</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
    <span class="hljs-selector-pseudo">:host</span> { <span class="hljs-attribute">display</span>: block; <span class="hljs-attribute">padding</span>: <span class="hljs-number">10px</span>; }
  </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>

      <script>
        export const parent = "../../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },

        };
