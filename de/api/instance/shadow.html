      <article class="markdown-body">
        <h1>shadow</h1>
        <p>Mit dem <code>shadow</code>-Attribut können Sie die Instanz des Schattenwurzelknotens eines Elements abrufen.</p>
        <o-playground name="shadow - Schattenknoten" style="--editor-height: 400px">
          <code path="demo.html" preview>
    <template>
      <l-m src="./test-shadow.html"></l-m>
      <test-shadow></test-shadow>
    </template>
  </code>
          <code path="test-shadow.html" active>
    <template component>
      <ul>
        <li>item 1</li>
        <li id="target">item 2</li>
        <li>item 3</li>
      </ul>
      <script>
        export default {
          tag:"test-shadow",
          ready(){
            setTimeout(()=>{
              this.shadow.$("#target").text = 'change target';
            },500);
          }
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>Es ist zu beachten, dass innerhalb von Elementen mit Vorlagensyntax direkte Änderungen an Elementen innerhalb des Schattenknotens vermieden werden sollten, um Konsistenz und Wartbarkeit der Operationen sicherzustellen.</p>
        <h2>Abrufen von Elementinstanzen innerhalb des Schatten-DOM einer Komponente von außen</h2>
        <p>Sie können auch eine benutzerdefinierte Elementinstanz von extern beziehen und dann über die Eigenschaft <code>shadow</code> auf die Elemente innerhalb des Schattenknotens zugreifen, wie folgt:</p>
        <pre><code class="hljs language-javascript">$(<span class="hljs-string">&quot;test-shadow&quot;</span>).<span class="hljs-property">shadow</span>.$(<span class="hljs-string">&#x27;selector&#x27;</span>).<span class="hljs-title function_">method</span>(xxx);</code></pre><o-playground name="Schatten - Externer Zugriff" style="--editor-height: 400px">
          <code path="demo.html" preview active>
    <template>
      <l-m src="./test-shadow.html"></l-m>
      <test-shadow></test-shadow>
      <script>
        setTimeout(()=>{
          $("test-shadow").shadow.$("#target").text = 'Ziel von außen ändern - ' + new Date();
        },1000);
      </script>
    </template>
  </code>
          <code path="test-shadow.html">
    <template component>
      <ul>
        <li>Element 1</li>
        <li id="target">Element 2</li>
        <li>Element 3</li>
      </ul>
      <script>
        export default {
          tag:"test-shadow",
          ready(){
            setTimeout(()=>{
              this.shadow.$("#target").text = 'Ziel ändern';
            },500);
          }
        };
      </script>
    </template>
  </code>
        </o-playground>

      <script>

          load,
          query

          const {
            init,
            revoke

          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
