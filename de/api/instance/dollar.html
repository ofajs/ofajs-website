      <article class="markdown-body">
        <h1>$</h1>
        <p>Die <code>$</code>-Methode ist die Kernfunktion in ofa.js, die zum Abrufen und Manipulieren von DOM-Elementinstanzen verwendet wird. Im Folgenden werden die Hauptfunktionen von <code>$</code> im Detail erläutert:</p>
        <h2>Instanz eines Elements abrufen</h2>
        <p>Mit der <code>$</code>-Methode können Sie die erste Elementinstanz auf der Seite abrufen, die mit einem <a href="https://developer.mozilla.org/zh-CN/docs/Web/CSS/Reference/Selectors/Selector_list" target="_blank">CSS-Selektor</a> übereinstimmt, und sie bearbeiten. Hier ist ein Beispiel:</p>
        <o-playground name="$ - Element abrufen">
          <code path="demo.html">
    <template>
      <div id="target1">target 1 text</div>
      <script>
        setTimeout(()=>{
          \$("#target1").text = 'change target 1';
        },500);
      </script>
    </template>
  </code>
        </o-playground>
        <p>Im obigen Beispiel haben wir mit dem <code>$</code>-Symbol eine Instanz des Elements mit der <code>id</code> "target1" ausgewählt und durch Setzen der <code>text</code>-Eigenschaft seinen Textinhalt geändert.</p>
        <h2>Beispiel zum Finden von Unterelementen</h2>
        <p>Die Instanz besitzt ebenfalls die <code>$</code>-Methode; über die <code>$</code>-Methode der Instanz kann man die erste passende untergeordnete Elementinstanz abrufen.</p>
        <o-playground name="$ - Unterelemente finden">
          <code path="demo.html">
    <template>
      <div id="target1">
        <h3>target</h3>
        <p>Ich bin target1</p>
      </div>
      <script>
        const tar = $("#target1");
        tar.$('h3').text = 'Titel des Ziels ändern';
      </script>
    </template>
  </code>
        </o-playground>
        <p>Bitte fügen Sie die erhaltene Elementinstanz nicht direkt an anderen Stellen ein, da dies das ursprüngliche Element beeinflussen kann. Wenn Sie eine Kopie erstellen müssen, können Sie die <a href="./clone.html" olink="">clone</a>-Methode verwenden.</p>
        <o-playground name="$ - Instanz-Eigenschaften" style="--editor-height: 360px">
          <code path="demo.html">
    <template>
      <div id="pos1" style="border:red solid 1px;">
        <h3>Position 1</h3>
        <p id="target1" style="color:green">I am target1</p>
      </div>
      <div id="pos2" style="border:blue solid 1px;margin:8px;">
        <h3>Position 2</h3>
      </div>
      <script>
        setTimeout(()=>{
          const tar = $("#target1");
          \$("#pos2").push(tar);
        },500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Untergeordnete Elemente innerhalb eines Shadow-Knotens abrufen</h2>
        <p>Sie können die Instanz über das <a href="./shadow.html" olink="">shadow</a>-Attribut abrufen und dann das gewünschte Element über die <code>$</code>-Methode erhalten:</p>
        <pre><code class="hljs language-javascript">$(<span class="hljs-string">'my-component'</span>).<span class="hljs-property">shadow</span>.$(<span class="hljs-string">"selector"</span>).<span class="hljs-title function_">method</span>(xxx)</code></pre>
        <h2>Direkte Instanziierung von Elementen</h2>
        <p>Sie können native Elemente direkt als <code>$</code>-Instanzobjekte initialisieren durch:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> ele = <span class="hljs-variable language_">document</span>.<span class="hljs-title function_">createElement</span>(<span class="hljs-string">'div'</span>);
<span class="hljs-keyword">const</span> $ele = $(ele);</code></pre>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> ele = <span class="hljs-variable language_">document</span>.<span class="hljs-title function_">querySelector</span>(<span class="hljs-string">'#target'</span>);
<span class="hljs-keyword">const</span> $ele = $(ele);</code></pre>
        <p>Auf diese Weise können Sie vorhandene HTML-Elemente bequem in <code>$</code>-Instanzen umwandeln, um die von <code>$</code> bereitgestellten Funktionen zur Manipulation und Verarbeitung zu nutzen.</p>
        <h2>Instanz eines Erzeugniselements</h2>
        <p>Außer, <code>$</code> kann nicht nur verwendet werden, um vorhandene Elementinstanzen abzurufen, sondern auch um neue Elementinstanzen zu erstellen und sie zur Seite hinzuzufügen.</p>
        <h3>Generierung über String</h3>
        <p>Sie können mit der <code>$</code>-Funktion neue Elementinstanzen aus Zeichenketten erstellen, wie unten gezeigt:</p>
        <o-playground name="$ - String-Generierung" style="--editor-height: 260px">
          <code path="demo.html">
    <template>
      <div id="target1">
        <b>target1:</b>
      </div>
      <script>
        const newEl = $(`<div style="color:red">add target 1 text</div>`);
        \$('#target1').push(newEl);
      </script>
    </template>
  </code>
        </o-playground>
        <p>In diesem Beispiel verwenden wir die <code>$</code>-Funktion, um eine neue Elementinstanz mit den angegebenen Stilen und dem Textinhalt zu erstellen und sie in eine bestehende Elementinstanz mit der <code>id</code> „target1“ einzufügen.</p>
        <h3>Durch Objekte generieren</h3>
        <p>Sie können auch die <code>$</code>-Funktion verwenden, um neue Elementinstanzen auf objektorientierte Weise zu generieren, wie folgt:</p>
        <o-playground name="$ - Objektgenerierung" style="--editor-height: 360px">
          <code path="demo.html">
    <template>
      <div id="target1">
        <b>target1:</b>
      </div>
      <script>
        const newEl = $({
          tag: "div",
          text: "Text zu target1 hinzufügen",
          css: {
            color: "red"
          }
        });
        \$('#target1').push(newEl);
      </script>
    </template>
  </code>
        </o-playground>
        <p>In diesem Beispiel verwenden wir die <code>$</code>-Funktion, um eine neue Elementinstanz über ein Objekt zu definieren, einschließlich des Tag-Typs, des Textinhalts und der Stilattribute, und fügen sie innerhalb der vorhandenen Elementinstanz mit der <code>id</code> "target1" hinzu.</p>
