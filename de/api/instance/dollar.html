        <h1>$</h1>
        <p><code>$</code> ist die Kernfunktion in ofa.js, die zum Abrufen und Manipulieren von DOM-Elementinstanzen verwendet wird. Im Folgenden werden die Hauptfunktionen von <code>$</code> im Detail beschrieben:</p>
        <h2>Elementinstanz abrufen</h2>
        <p>Mit der <code>$</code>-Methode kannst du die erste Elementinstanz auf der Seite abrufen, die dem <a href="https://developer.mozilla.org/zh-CN/docs/Web/CSS/Reference/Selectors/Selector_list" target="_blank">CSS-Selektor</a> entspricht, und sie bearbeiten. Hier ist ein Beispiel:</p>
        <o-playground name="$ - Element abrufen">
          <code path="demo.html">
    <template>
      <div id="target1">target 1 text</div>
      <script>
        setTimeout(()=>{
          \$("#target1").text = 'change target 1';
        },500);
      </script>
    </template>
  </code>
        </o-playground>
        <p>Im obigen Beispiel haben wir mit dem <code>$</code>-Symbol das Element mit der <code>id</code> "target1" ausgewählt und dessen Textinhalt durch Setzen der <code>text</code>-Eigenschaft geändert.</p>
        <h2>Beispiel zum Auffinden von untergeordneten Elementen</h2>
        <p>Instanzen haben auch die <code>$</code>-Methode, mit der über die <code>$</code>-Methode auf der Instanz die erste untergeordnete Elementinstanz abgerufen werden kann, die den Bedingungen entspricht.</p>
        <o-playground name="$ - Unterelemente suchen">
          <code path="demo.html">
    <template>
      <div id="target1">
        <h3>target</h3>
        <p>I am target1</p>
      </div>
      <script>
        const tar = $("#target1");
        tar.$('h3').text = 'change target title';
      </script>
    </template>
  </code>
        </o-playground>
        <p>Bitte fügen Sie die abgerufene Elementinstanz nicht direkt an anderer Stelle ein; eine solche Operation wirkt sich auf das ursprüngliche Element aus. Wenn Sie eine Kopie erstellen möchten, können Sie die Methode <a href="./clone.html" olink="">clone</a> verwenden.</p>
        <o-playground name="$ - Instanzeigenschaften" style="--editor-height: 360px">
          <code path="demo.html">
    <template>
      <div id="pos1" style="border:red solid 1px;">
        <h3>position 1</h3>
        <p id="target1" style="color:green">I am target1</p>
      </div>
      <div id="pos2" style="border:blue solid 1px;margin:8px;">
        <h3>position 2</h3>
      </div>
      <script>
        setTimeout(()=>{
          const tar = $("#target1");
          \$("#pos2").push(tar);
        },500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Unterelemente im Shadow-Knoten abrufen</h2>
        <p>Man kann nach dem Abrufen der Instanz über die <a href="./shadow.html" olink="">shadow</a>-Eigenschaft dann mit der <code>$</code>-Methode das gewünschte Element erhalten:</p>
        <pre><code class="hljs language-javascript">$(<span class="hljs-string">'my-component'</span>).<span class="hljs-property">shadow</span>.$(<span class="hljs-string">"selector"</span>).<span class="hljs-title function_">method</span>(xxx)</code></pre>
        <h2>Direktes Instanziieren von Elementen</h2>
        <p>Sie können native Elemente direkt wie folgt in eine <code>$</code>-Instanz initialisieren:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> ele = <span class="hljs-variable language_">document</span>.<span class="hljs-title function_">createElement</span>(<span class="hljs-string">'div'</span>);
<span class="hljs-keyword">const</span> $ele = $(ele);</code></pre>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> ele = <span class="hljs-variable language_">document</span>.<span class="hljs-title function_">querySelector</span>(<span class="hljs-string">'#target'</span>);
<span class="hljs-keyword">const</span> $ele = $(ele);</code></pre>
        <p>So kannst du bestehende HTML-Elemente bequem in <code>$</code>-Instanzen umwandeln, um die von <code>$</code> bereitgestellten Funktionen zum Manipulieren und Verarbeiten zu nutzen.</p>
        <h2>Generieren von Elementinstanzen</h2>
        <p>Außer, <code>$</code> kann verwendet werden, um bestehende Elementinstanzen zu erhalten, und auch neue Elementinstanzen zu erstellen und sie der Seite hinzuzufügen.</p>
        <h3>Generierung über Zeichenkette</h3>
        <p>Du kannst die <code>$</code>-Funktion verwenden, um neue Elementinstanzen aus einem String zu erstellen, wie folgt:</p>
        <o-playground name="$ - String-Generierung" style="--editor-height: 260px">
          <code path="demo.html">
    <template>
      <div id="target1">
        <b>target1:</b>
      </div>
      <script>
        const newEl = $(`<div style="color:red">add target 1 text</div>`);
        \$('#target1').push(newEl);
      </script>
    </template>
  </code>
        </o-playground>
        <p>In diesem Beispiel erstellen wir eine neue Elementinstanz mit dem angegebenen Stil und Textinhalt mithilfe der <code>$</code>-Funktion und fügen sie in die vorhandene Elementinstanz mit der <code>id</code> "target1" ein.</p>
        <h3>Generierung durch Objekte</h3>
        <p>Du kannst auch die <code>$</code>-Funktion verwenden, um über ein Objekt neue Element-Instanzen zu erzeugen, wie folgt:</p>
        <o-playground name="$ - Objekterzeugung" style="--editor-height: 360px">
          <code path="demo.html">
    <template>
      <div id="target1">
        <b>target1:</b>
      </div>
      <script>
        const newEl = $({
          tag: "div",
          text: "add target 1 text",
          css: {
            color: "red"
          }
        });
        \$('#target1').push(newEl);
      </script>
    </template>
  </code>
        </o-playground>
        <p>In diesem Beispiel verwenden wir die <code>$</code>-Funktion, um eine neue Elementinstanz durch ein Objekt zu definieren, einschließlich Tag-Typ, Textinhalt und Stilattributen, und fügen sie der vorhandenen Elementinstanz mit der <code>id</code> "target1" hinzu.</p>
        <h2>Beziehung zwischen abgerufenen Beispielen und Seiten-/Komponenteninstanzen</h2>
        <p><code>$</code>-Methode kann verwendet werden, um von globaler Ebene eine Instanz des entsprechenden Seiten- oder Komponentenelements abzurufen. Ihre Funktion entspricht dem <code>this</code>-Verweis in den Lebenszyklusmethoden innerhalb des Seiten- oder Komponentenmoduls.</p>

<span class="hljs-tag">&lt;<span class="hljs-name">test-comp</span> <span class="hljs-attr">id</span>=<span class="hljs-string">"target"</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">test-comp</span>&gt;</span>
