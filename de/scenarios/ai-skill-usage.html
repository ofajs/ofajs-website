        <h1>Einsatz von KI-Fähigkeiten von ofa.js in Projekten</h1>
        <p>Da ofa.js derzeit noch kein weithin bekannter Rahmen ist, verfügen die gängigen KI-Modelle noch nicht über die Fähigkeit, ofa.js direkt zu verwenden. Aus diesem Grund haben wir sorgfältig ein spezielles Kompetenzpaket vorbereitet, das der KI hilft, die Verwendung von ofa.js zu erlernen und nachzuschlagen.</p>
        <h2>Verwendung</h2>
        <p>Wählen Sie bei KI-Tools, die Skills unterstützen, je nach der von Ihnen verwendeten KI-Modellsprache die entsprechende Skill-Adresse aus:</p>
        <p><strong>Hinweis:</strong> Da die Dokumentation von ofa.js ursprünglich auf Chinesisch verfasst wurde, ist der Inhalt des Skill-Pakets in der chinesischen Version vollständiger und genauer. Wenn Sie bei der Verwendung der englischen Version auf Probleme stoßen, empfehlen wir, die chinesische Version auszuprobieren.</p>
        <h3>Chinesisches Modell</h3>
        <p>Wenn Sie ein chinesisches KI-Modell verwenden, verwenden Sie bitte die folgende Adresse:</p>
        <pre><code class="hljs">https:<span class="hljs-regexp">//</span>raw.githubusercontent.com<span class="hljs-regexp">/ofajs/</span>ofa.js<span class="hljs-regexp">/main/</span>skills/ofajs-docs.zip</code></pre>
        <p>Zu den gängigen chinesischen KI-Modellen gehören: DeepSeek, Kimi, GLM, MiniMax, Qwen usw.</p>
        <h3>Englisches Modell</h3>
        <p>Wenn Sie ein englischsprachiges KI-Modell verwenden, verwenden Sie bitte die folgende Adresse:</p>
        <pre><code class="hljs">https:<span class="hljs-regexp">//</span>raw.githubusercontent.com<span class="hljs-regexp">/ofajs/</span>ofa.js<span class="hljs-regexp">/main/</span>skills/ofajs-docs-en.zip</code></pre>
        <p>Durch dieses Skill-Paket kann die KI effizient Komponenten oder Seitenmodule von ofa.js lernen und entwickeln und Entwicklern helfen, KI-Tools bequemer für die Entwicklung von ofa.js-Projekten zu nutzen, um die Entwicklungseffizienz zu steigern.</p>
        <h2>Weitere Hilfe</h2>
        <p>Wenn die KI-Fähigkeiten Ihr Problem nicht lösen konnten, können Sie Ihr Problem gerne in unserem Diskussionsforum posten:</p>
        <p><a href="https://github.com/ofajs/discussion/discussions" target="_blank">https://github.com/ofajs/discussion/discussions</a></p>
        <p>Wir werden Ihre Frage so schnell wie möglich beantworten.</p>
