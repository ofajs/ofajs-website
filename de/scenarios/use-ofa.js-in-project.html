      <article class="markdown-body">
        <h1>Verwendung von AI-Prompts mit ofa.js im Projekt</h1>
        <p>Da ofa.js noch kein weit verbreitetes und bekanntes Framework ist, verfügen die gängigen KI-Modelle noch nicht über die Fähigkeit, ofa.js direkt zu nutzen. Zu diesem Zweck haben wir spezielle Prompt-Anweisungen sorgfältig vorbereitet, um der KI beim Lernen und Nachschlagen der Verwendung von ofa.js zu helfen.</p>
        <p>Wir bieten zwei Versionen der Prompt-Formulierungen an:</p>
        <h2>Vereinfachte Eingabeaufforderung</h2>
        <p>Dies ist eine konzentrierte und optimierte Version, die darauf abzielt, den Verbrauch von vorangestellten Token-Eingaben zu minimieren und für die meisten Szenarien geeignet ist.</p>
        <pre><code class="hljs">https:<span class="hljs-regexp">//</span>raw.githubusercontent.com<span class="hljs-regexp">/ofajs/</span>ofa.js<span class="hljs-regexp">/main/</span>llms<span class="hljs-regexp">/tiny/</span>start.md</code></pre>
        <p>Mit diesem Prompt kann die KI effizient Komponenten oder Seitenmodule von ofa.js entwickeln.</p>
        <h2>Vollständiges Prompt</h2>
        <p>Wenn das von Ihnen verwendete KI-Modell relativ weniger intelligent ist, können Sie versuchen, die ungekürzte Vollversion des Prompt-Worts zu verwenden. Obwohl bei der Initialisierung mehr Token verbraucht werden, kann dies möglicherweise bessere Ergebnisse erzielen:</p>
        <pre><code class="hljs">https:<span class="hljs-regexp">//</span>raw.githubusercontent.com<span class="hljs-regexp">/ofajs/</span>ofa.js<span class="hljs-regexp">/main/</span>llms<span class="hljs-regexp">/origin/</span>start.md</code></pre>
        <p>Durch die Bereitstellung dieser Prompts hoffen wir, Entwicklern zu helfen, KI-Tools bequemer für die Entwicklung von ofa.js-Projekten zu nutzen und die Entwicklungseffizienz zu verbessern.</p>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";

        }) => {

            init,
            revoke

          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
