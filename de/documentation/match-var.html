        <h1>Stilabfragen</h1>
        <h2>Kernkonzepte</h2>
        <ul>
          <li><strong>match-var</strong>: Stil-Matching-Komponente, die entscheidet, ob interne Stile angewendet werden, basierend auf dem Wert der CSS-Variablen</li>
          <li><strong>Attribut-Matching</strong>: Definiert über Komponentenattribute, welche CSS-Variablen und erwarteten Werte abgeglichen werden sollen</li>
          <li><strong>Stilanwendung</strong>: Bei erfolgreichem Matching werden die Stile des internen <code>&lt;style&gt;</code>-Tags auf die Komponente angewendet</li>
        </ul>
        <h2>Grundlegende Verwendung</h2>
        <p>Die <code>match-var</code>-Komponente definiert über Attribute die abzugleichenden CSS-Variablen und die erwarteten Werte. Sobald der CSS-Variablenwert der Komponente mit dem angegebenen Attributwert übereinstimmt, werden die innerhalb definierten Stile angewendet.</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">match-var</span> <span class="hljs-attr">theme</span>=<span class="hljs-string">&quot;dark&quot;</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
    <span class="hljs-selector-pseudo">:host</span> {
      <span class="hljs-attribute">background-color</span>: <span class="hljs-number">#333</span>;
      <span class="hljs-attribute">color</span>: white;
    }
  </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">match-var</span>&gt;</span></code></pre>
        <h3>Attribute</h3>
        <p>Die <code>match-var</code>-Komponente verwendet beliebige Attribute, um die Übereinstimmungsregeln für CSS-Variablen zu definieren. Der Attributname entspricht dem CSS-Variablennamen (ohne das <code>--</code>-Präfix), und der Attributwert ist der erwartete Übereinstimmungswert.</p>
        <h3>Funktionsweise</h3>
        <ol>
          <li>
            <p><strong>Browser-Unterstützung</strong>: Wenn der Browser <code>@container style()</code>-Abfragen unterstützt, werden die nativen CSS-Fähigkeiten direkt verwendet.</p>
          </li>
          <li>
            <p><strong>Fallback-Behandlung</strong>: Wenn dies nicht unterstützt wird, werden Änderungen der CSS-Variablenwerte durch Abfrage erkannt, und nach erfolgreicher Übereinstimmung werden Stile dynamisch injiziert.</p>
          </li>
          <li>
            <p><strong>Manuelle Aktualisierung</strong>: Die Stilerkennung kann manuell durch die Methode <code>$.checkMatch()</code> ausgelöst werden.</p>
          </li>
        </ol>

        <h2>Mehrfachbedingungs-Abgleich</h2>
        <p>Mehrere Attribute können gleichzeitig verwendet werden, um komplexere Übereinstimmungsbedingungen zu definieren; Stile werden nur angewendet, wenn alle CSS-Variablen übereinstimmen.</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">match-var</span> <span class="hljs-attr">theme</span>=<span class="hljs-string">&quot;dark&quot;</span> <span class="hljs-attr">size</span>=<span class="hljs-string">&quot;large&quot;</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
    <span class="hljs-selector-pseudo">:host</span> {
      <span class="hljs-attribute">padding</span>: <span class="hljs-number">20px</span>;
      <span class="hljs-attribute">font-size</span>: <span class="hljs-number">18px</span>;
    }
  </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">match-var</span>&gt;</span></code></pre>

        <h2>checkMatch Manuelle Aktualisierung</h2>
        <p>In manchen Fällen können Änderungen an CSS-Variablen möglicherweise nicht automatisch erkannt werden. In solchen Fällen kann die Methode <code>$.checkMatch()</code> manuell aufgerufen werden, um die Stilerkennung auszulösen.</p>
        <p>Derzeit unterstützt Firefox die <code>@container style()</code>-Abfrage noch nicht, daher muss <code>$.checkMatch()</code> manuell aufgerufen werden; sobald die native Browser-Unterstützung in Zukunft verfügbar ist, wird das System automatisch Variablenänderungen erkennen und manuelle Aufrufe sind nicht mehr erforderlich.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-attr">proto</span>: {
  <span class="hljs-title function_">updateTheme</span>(<span class="hljs-params"></span>) {
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">theme</span> = <span class="hljs-string">&#x27;dark&#x27;</span>;
    <span class="hljs-comment">// Manuell die Stilerkennung auslösen</span>
    $.<span class="hljs-title function_">checkMatch</span>();
  }
}</code></pre>
        <h2>Best Practices</h2>
        <ol>
          <li><strong>Prioritize native CSS capabilities</strong>: <code>match-var</code> prioritizes using the browser&#39;s native <code>@container style()</code> queries, which offer better performance in modern browsers.</li>
          <li><strong>Organize styles logically</strong>: Group related matching styles together for easier maintenance and understanding.</li>
          <li><strong>Utilize data() binding</strong>: Combine with the <code>data()</code> directive to achieve responsive style switching.</li>
        </ol>

      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
