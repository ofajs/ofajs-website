        <h1>Stil-Abfrage</h1>
        <p><code>match-var</code> ist eine Funktionskomponente in ofa.js, die zur Stilzuordnung basierend auf CSS-Variablen dient. Mit <code>match-var</code> können Sie je nach aktuellen CSS-Variablenwerten der Komponente dynamisch verschiedene Stile zuordnen und anwenden. Diese Funktion ist speziell für die Übergabe von stilbezogenen Kontextzuständen gedacht, erfordert keine Verwendung von JavaScript, ist bequemer zu verwenden und eignet sich für die Übergabe von Stilen wie z. B. Themenfarben.</p>
        <h2>Kernkonzepte</h2>
        <ul>
          <li><strong>match-var</strong>: Eine Komponente zur Stilübereinstimmung, die basierend auf dem Wert einer CSS-Variable entscheidet, ob der interne Stil angewendet wird.</li>
          <li><strong>Attributübereinstimmung</strong>: Definiert die abzugleichende CSS-Variable und den erwarteten Wert über die Komponenteneigenschaften.</li>
          <li><strong>Stilanwendung</strong>: Bei erfolgreicher Übereinstimmung wird der Stil des internen <code>&lt;style&gt;</code>-Tags auf die Komponente angewendet.</li>
        </ul>
        <h2>Grundlegende Verwendung</h2>
        <p><code>match-var</code> Komponente definiert über Attribute die zu übereinstimmenden CSS-Variablen und die erwarteten Werte. Wenn der CSS-Variablenwert der Komponente mit dem angegebenen Attributwert übereinstimmt, werden die intern definierten Stile angewendet.</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">match-var</span> <span class="hljs-attr">theme</span>=<span class="hljs-string">&quot;dark&quot;</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
    <span class="hljs-selector-pseudo">:host</span> {
      <span class="hljs-attribute">background-color</span>: <span class="hljs-number">#333</span>;
      <span class="hljs-attribute">color</span>: white;
    }
  </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">match-var</span>&gt;</span></code></pre>
        <h3>Eigenschaften</h3>
        <p><code>match-var</code>-Komponente verwendet beliebige Attribute, um die Übereinstimmungsregeln für CSS-Variablen zu definieren. Der Attributname entspricht dem CSS-Variablennamen (ohne das <code>--</code>-Präfix), und der Attributwert ist der erwartete übereinstimmende Wert.</p>
        <h3>Funktionsweise</h3>
        <ol>
          <li><strong>Browser-Unterstützung</strong>: Unterstützt der Browser <code>@container style()</code>-Abfragen, werden die nativen CSS-Funktionen direkt verwendet</li>
          <li><strong>Fallback</strong>: Falls nicht, wird durch Polling auf Änderungen des CSS-Variablenwerts geprüft; bei Übereinstimmung werden Stile dynamisch eingefügt</li>
          <li><strong>Manuelles Neuladen</strong>: Über die Methode <code>$.checkMatch()</code> kann die Stilprüfung manuell ausgelöst werden</li>
        </ol>

        <h2>Mehrfachbedingungsabgleich</h2>
        <p>Man kann mehrere Attribute gleichzeitig verwenden, um komplexere Übereinstimmungsbedingungen zu definieren. Der Stil wird nur angewendet, wenn alle CSS-Variablen übereinstimmen.</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">match-var</span> <span class="hljs-attr">theme</span>=<span class="hljs-string">&quot;dark&quot;</span> <span class="hljs-attr">size</span>=<span class="hljs-string">&quot;large&quot;</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
    <span class="hljs-selector-pseudo">:host</span> {
      <span class="hljs-attribute">padding</span>: <span class="hljs-number">20px</span>;
      <span class="hljs-attribute">font-size</span>: <span class="hljs-number">18px</span>;
    }
  </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">match-var</span>&gt;</span></code></pre>

        <h2>checkMatch manuell aktualisieren</h2>
        <p>In bestimmten Fällen können Änderungen an CSS-Variablen möglicherweise nicht automatisch erkannt werden. In diesem Fall kann die Methode <code>$.checkMatch()</code> manuell aufgerufen werden, um die Stilprüfung auszulösen.</p>
        <blockquote>
          <p>Derzeit unterstützt Firefox die <code>@container style()</code>-Abfrage noch nicht, daher muss <code>$.checkMatch()</code> manuell aufgerufen werden. Sobald der Browser diese Funktion nativ unterstützt, erkennt das System Änderungen an Variablen automatisch, ohne dass ein manueller Aufruf erforderlich ist.</p>
        </blockquote>
        <pre><code class="hljs language-javascript"><span class="hljs-attr">proto</span>: {
  <span class="hljs-title function_">updateTheme</span>(<span class="hljs-params"></span>) {
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">theme</span> = <span class="hljs-string">&#x27;dark&#x27;</span>;
    <span class="hljs-comment">// Stilprüfung manuell auslösen</span>
    $.<span class="hljs-title function_">checkMatch</span>();
  }
}</code></pre>
        <h2>Beste Praktiken</h2>
        <ol>
          <li><strong>Bevorzugung nativer CSS-Funktionen</strong>: <code>match-var</code> verwendet bevorzugt die native <code>@container style()</code>-Abfrage des Browsers, die in modernen Browsern eine bessere Leistung bietet</li>
          <li><strong>Sinnvolle Organisation der Styles</strong>: Platzieren Sie zusammengehörige Match-Styles gemeinsam, um die Wartung und das Verständnis zu erleichtern</li>
          <li><strong>Verwendung der data()-Bindung</strong>: In Kombination mit der <code>data()</code>-Direktive können reaktive Stilwechsel realisiert werden</li>
        </ol>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
