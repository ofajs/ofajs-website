        <h1>Routing und Navigation</h1>
        <p>Die Seitennavigation innerhalb der App ist die Kernfunktion einer Single-Page-Anwendung. In diesem Kapitel wird erläutert, wie man programmatische Navigation verwendet, den Routenverlauf verwaltet und auf Routenänderungen lauscht.</p>
        <h2>allowForward - Vorwärtsfunktion</h2>
        <p>Standardmäßig unterstützt die App nur die Rückwärtsnavigation. Wenn Sie in <code>app-config.js</code> <code>allowForward</code> auf <code>true</code> setzen, können Sie die Vorwärtsfunktion der App aktivieren.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// app-config.js</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> allowForward = <span class="hljs-literal">true</span>;</code></pre>
        <p>Nach der Aktivierung:</p>
        <ul>
          <li>Benutzer können die Vor- und Zurück-Schaltflächen des Browsers zur Navigation verwenden</li>
          <li>Die <code>forward()</code>-Methode der Anwendung funktioniert einwandfrei</li>
        </ul>
        <h2>Programmatische Navigation</h2>
        <p>Neben Links, die das <code>olink</code>-Attribut verwenden, können Navigationsmethoden auch in JavaScript aufgerufen werden.</p>
        <blockquote>
          <p><strong>Wichtiger Hinweis</strong>:</p>
          <ul>
            <li>Die Methoden <code>goto</code>, <code>replace</code> und <code>back</code> sind sowohl auf der <strong>Seiteninstanz (page)</strong> als auch auf der <strong>App-Instanz (app)</strong> verfügbar.</li>
            <li>Die Methode <code>forward</code> ist nur auf der <strong>App-Instanz (app)</strong> verfügbar.</li>
            <li>Verwendung in einer Seite: <code>this.goto()</code> oder <code>this.app.goto()</code></li>
            <li>Verwendung in einer Komponente: <code>this.app.goto()</code> (Aufruf über die App-Instanz erforderlich)</li>
          </ul>
          <p><strong>Hinweise zur Pfadrelativität</strong>:</p>
          <ul>
            <li>Bei Verwendung von <code>goto</code> oder <code>replace</code> auf einem <strong>Seitenmodul</strong> ist der Pfad relativ zur Adresse des <strong>aktuellen Seitenmoduls</strong>.</li>
            <li>Bei Verwendung von <code>goto</code> oder <code>replace</code> auf der <strong>App-Instanz (app)</strong> ist der Pfad relativ zur <strong>aktuellen App-Navigation</strong>.</li>
          </ul>
        </blockquote>
        <h3>goto - Seite wechseln</h3>
        <p>Zur angegebenen Seite navigieren und zum Verlauf hinzufügen:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// Zur angegebenen Seite springen</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-title function_">goto</span>(<span class="hljs-string">&quot;./about.html&quot;</span>);

<span class="hljs-comment">// Mit Parameter springen</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-title function_">goto</span>(<span class="hljs-string">&quot;./detail.html?id=123&quot;</span>);</code></pre>
        <h3>replace - Seite ersetzen</h3>
        <p>Aktuelle Seite ersetzen, nicht zum Verlauf hinzufügen:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// Aktuelle Seite ersetzen</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-title function_">replace</span>(<span class="hljs-string">&quot;./login.html&quot;</span>);</code></pre>
        <p>Wird häufig nach dem Login für die Weiterleitung verwendet, um zu verhindern, dass der Benutzer durch Klicken auf die Zurück-Taste zur Login-Seite zurückkehrt.</p>
        <h3>back - zurück</h3>
        <p>Zurück zur vorherigen Seite:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-variable language_">this</span>.<span class="hljs-title function_">back</span>();</code></pre>
        <h3>forward - Vorwärts</h3>
        <p>Zur nächsten Seite gehen (muss <code>allowForward: true</code> gesetzt werden):</p>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// Auf Seite oder Komponente aufrufen</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-property">app</span>.<span class="hljs-title function_">forward</span>();</code></pre>
        <blockquote>
          <p><strong>Hinweis</strong>: Die <code>forward</code>-Methode muss auf der Anwendungsinstanz (<code>app</code>) aufgerufen werden, nicht auf der Seiteninstanz. Verwenden Sie z.B. <code>this.app.forward()</code> anstelle von <code>this.forward()</code>.</p>
        </blockquote>
        <h3>Vergleich der Navigationsmethoden</h3>
        <table>
          <thead>
            <tr>
              <th>Methode</th>
              <th>Verlauf</th>
              <th>Verwendungsszenario</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><code>goto</code></td>
              <td>Neuer Eintrag</td>
              <td>Normales Seiten-Navigieren</td>
            </tr>
            <tr>
              <td><code>replace</code></td>
              <td>Aktuellen Eintrag ersetzen</td>
              <td>Navigation nach Login, Weiterleitung</td>
            </tr>
            <tr>
              <td><code>back</code></td>
              <td>Zum vorherigen Eintrag zurück</td>
              <td>Zurück-Operation</td>
            </tr>
            <tr>
              <td><code>forward</code></td>
              <td>Zum nächsten Eintrag vorwärts</td>
              <td>Vorwärts-Operation (bei Aktivierung)</td>
            </tr>
          </tbody>
        </table>
        <h3>Routing-Verlauf abrufen</h3>
        <p>Abrufen aller Routing-Verläufe über die <code>routers</code>-Eigenschaft:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> history = app.<span class="hljs-property">routers</span>;
<span class="hljs-comment">// Rückgabeformat: [{ src: &quot;./page1.html&quot; }, { src: &quot;./page2.html&quot; }, ...]</span></code></pre>
        <h3>Aktuelle Seite abrufen</h3>
        <p>Über die Eigenschaft <code>current</code> die aktuelle Seiteninstanz abrufen:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> currentPage = app.<span class="hljs-property">current</span>;
<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;Aktuelle Seite:&quot;</span>, currentPage.<span class="hljs-property">src</span>);</code></pre>
        <h3>Routing-Verlaufsbeispiel</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> proto = {
  <span class="hljs-keyword">get</span> <span class="hljs-title function_">canGoBack</span>() {
    <span class="hljs-keyword">return</span> <span class="hljs-variable language_">this</span>.<span class="hljs-property">routers</span> &amp;&amp; <span class="hljs-variable language_">this</span>.<span class="hljs-property">routers</span>.<span class="hljs-property">length</span> &gt; <span class="hljs-number">1</span>;
  },

  <span class="hljs-keyword">get</span> <span class="hljs-title function_">canGoForward</span>() {
    <span class="hljs-comment">// Muss zusammen mit allowForward verwendet werden</span>
    <span class="hljs-keyword">return</span> <span class="hljs-variable language_">this</span>.<span class="hljs-property">routers</span> &amp;&amp; <span class="hljs-variable language_">this</span>.<span class="hljs-property">currentIndex</span> &lt; <span class="hljs-variable language_">this</span>.<span class="hljs-property">routers</span>.<span class="hljs-property">length</span> - <span class="hljs-number">1</span>;
  },

  <span class="hljs-keyword">get</span> <span class="hljs-title function_">currentPath</span>() {
    <span class="hljs-keyword">return</span> <span class="hljs-variable language_">this</span>.<span class="hljs-property">current</span>?.<span class="hljs-property">src</span> || <span class="hljs-string">&quot;&quot;</span>;
  },
};</code></pre>
        <h2>Überwachung von Routenänderungen</h2>
        <p>Durch das Abhören des <code>router-change</code> Ereignisses auf Routenänderungen reagieren.</p>
        <h3>Grundlegende Verwendung</h3>
        <pre><code class="hljs language-javascript">app.<span class="hljs-title function_">on</span>(<span class="hljs-string">&quot;router-change&quot;</span>, <span class="hljs-function">(<span class="hljs-params">e</span>) =&gt;</span> {
  <span class="hljs-keyword">const</span> { data } = e;
  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;Routing-Änderung:&quot;</span>, data.<span class="hljs-property">name</span>);
  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;Seitenadresse:&quot;</span>, data.<span class="hljs-property">src</span>);
});</code></pre>
        <h3>Ereignisdaten</h3>
        <p><code>router-change</code>Ereignis-Datenobjekt enthält：</p>
        <table>
          <thead>
            <tr>
              <th>Attribut</th>
              <th>Beschreibung</th>
              <th>Mögliche Werte</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><code>name</code></td>
              <td>Navigationstyp</td>
              <td><code>goto</code>, <code>replace</code>, <code>forward</code>, <code>back</code></td>
            </tr>
            <tr>
              <td><code>src</code></td>
              <td>Zielseitenadresse</td>
              <td>Seitenpfad</td>
            </tr>
          </tbody>
        </table>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> ready = <span class="hljs-keyword">function</span> (<span class="hljs-params"></span>) {
  <span class="hljs-comment">// Überwacht Routenänderungen</span>
  <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">on</span>(<span class="hljs-string">&quot;router-change&quot;</span>, <span class="hljs-function">(<span class="hljs-params">e</span>) =&gt;</span> {
    <span class="hljs-keyword">const</span> { name, src } = e.<span class="hljs-property">data</span>;

    <span class="hljs-comment">// Seitenzugriff protokollieren</span>
    <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">`[<span class="hljs-subst">${name}</span>] Navigiere zu: <span class="hljs-subst">${src}</span>`</span>);

    <span class="hljs-comment">// Seitentitel aktualisieren</span>
    <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">updateTitle</span>(src);

    <span class="hljs-comment">// Statistikdaten senden</span>
    <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">trackPageView</span>(src);
  });
};

<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> proto = {
  <span class="hljs-title function_">updateTitle</span>(<span class="hljs-params">src</span>) {
    <span class="hljs-keyword">const</span> titles = {
      <span class="hljs-string">&quot;home.html&quot;</span>: <span class="hljs-string">&quot;Startseite&quot;</span>,
      <span class="hljs-string">&quot;about.html&quot;</span>: <span class="hljs-string">&quot;Über uns&quot;</span>,
      <span class="hljs-string">&quot;contact.html&quot;</span>: <span class="hljs-string">&quot;Kontakt&quot;</span>,
    };

    <span class="hljs-keyword">const</span> pageName = src.<span class="hljs-title function_">split</span>(<span class="hljs-string">&quot;/&quot;</span>).<span class="hljs-title function_">pop</span>();
    <span class="hljs-variable language_">document</span>.<span class="hljs-property">title</span> = titles[pageName] || <span class="hljs-string">&quot;Anwendung&quot;</span>;
  },

  <span class="hljs-title function_">trackPageView</span>(<span class="hljs-params">src</span>) {
    <span class="hljs-comment">// Seitenzugriffsstatistik senden</span>
    <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;Seitenzugriffsstatistik:&quot;</span>, src);
  },
};</code></pre>
        <h2>Seiten-Navigationswächter</h2>
        <p>Durch die Kombination mit der Routenüberwachung kann eine Navigationsschutzfunktion implementiert werden:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> ready = <span class="hljs-keyword">function</span> (<span class="hljs-params"></span>) {
  <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">on</span>(<span class="hljs-string">&quot;router-change&quot;</span>, <span class="hljs-function">(<span class="hljs-params">e</span>) =&gt;</span> {
    <span class="hljs-keyword">const</span> { src } = e.<span class="hljs-property">data</span>;

    <span class="hljs-comment">// Prüfen, ob eine Anmeldung erforderlich ist</span>
    <span class="hljs-keyword">if</span> (<span class="hljs-variable language_">this</span>.requiresAuth(src) &amp;&amp; !<span class="hljs-variable language_">this</span>.<span class="hljs-title function_">isLoggedIn</span>()) {
      e.<span class="hljs-title function_">preventDefault</span>();
      <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">goto</span>(<span class="hljs-string">&quot;./login.html&quot;</span>);
    }
  });
};

<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> proto = {
  <span class="hljs-title function_">requiresAuth</span>(<span class="hljs-params">src</span>) {
    <span class="hljs-keyword">const</span> authPages = [<span class="hljs-string">&quot;profile.html&quot;</span>, <span class="hljs-string">&quot;settings.html&quot;</span>];
    <span class="hljs-keyword">return</span> authPages.<span class="hljs-title function_">some</span>(<span class="hljs-function">(<span class="hljs-params">page</span>) =&gt;</span> src.<span class="hljs-title function_">includes</span>(page));
  },

  <span class="hljs-title function_">isLoggedIn</span>(<span class="hljs-params"></span>) {
    <span class="hljs-keyword">return</span> !!<span class="hljs-variable language_">this</span>.<span class="hljs-property">globalData</span>?.<span class="hljs-property">user</span>;
  },
};</code></pre>
