        <h1>Bedingtes Rendern</h1>
        <p>In ofa.js ist die bedingte Darstellung eine wichtige Funktion, die es ermöglicht, basierend auf dem Datenstatus zu entscheiden, ob ein Element oder eine Komponente gerendert wird. ofa.js bietet eine komponentenbasierte Lösung für bedingte Darstellung, die über die Komponenten <code>o-if</code>, <code>o-else-if</code> und <code>o-else</code> realisiert wird.</p>
        <h2>o-if Komponente</h2>
        <p>Die <code>o-if</code>-Komponente entscheidet anhand des Wahrheitswerts eines Ausdrucks, ob ihr Inhalt gerendert wird. Wenn das gebundene <code>value</code>-Attribut wahr ist, wird der Inhalt der Komponente gerendert; andernfalls erscheint der Inhalt nicht im DOM.</p>
        <o-playground name="o-if Funktionsweise Beispiel" style="--editor-height: 500px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <button on:click="isHide = !isHide">Toggle Display</button>
      <o-if :value="!isHide">
        <p>{{val}}</p>
      </o-if>
      <script>
        export default async () => {
          return {
            data: {
              isHide: false,
              val: "Hello ofa.js Demo Code",
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h3>Funktionsweise von o-if</h3>
        <p><code>o-if</code> wird den Inhalt nur dann in das DOM rendern, wenn die Bedingung wahr ist，wenn die Bedingung falsch ist，werden die DOM Elemente innerhalb von o-if vollständig entfernt。Diese Implementierungsweise eignet sich für Situationen, in denen sich die Bedingung nicht zu häufig ändert，da sie die Erstellung und Zerstörung von DOM Elementen beinhaltet。</p>
        <h2>o-else-if und o-else Komponenten</h2>
        <p>Wenn mehrere Bedingungszweige benötigt werden, können die Komponenten <code>o-else-if</code> und <code>o-else</code> zusammen mit <code>o-if</code> verwendet werden, um eine Mehrfachverzweigungsbedingungsdarstellung zu realisieren.</p>
        <ul>
          <li><code>o-if</code>：erforderliche erste Bedingungskomponente</li>
          <li><code>o-else-if</code>：optionale mittlere Bedingungskomponente, es können mehrere vorhanden sein</li>
          <li><code>o-else</code>：optionale Standardbedingungskomponente, wird zuletzt platziert</li>
        </ul>
        <o-playground name="Mehrfach bedingte Rendering-Beispiele" style="--editor-height: 500px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <button on:click="num++">Anzeige umschalten - {{num}}</button>
      <!-- Je nach Ergebnis von num modulo 3 unterschiedliche Inhalte anzeigen -->
      <o-if :value="num % 3 === 0">
        <p>❤️ 0 / 3</p>
      </o-if>
      <o-else-if :value="num % 3 === 1">
        <p>😊 1 / 3</p>
      </o-else-if>
      <o-else>
        <p>😭 2 / 3</p>
      </o-else>
      <script>
        export default async () => {
          return {
            data: {
              num: 0,
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Praktische Anwendungsszenarien – Beispiele</h2>
        <h3>Benutzerberechtigungskontrolle</h3>
        <o-playground name="Beispiel für Benutzerberechtigungen" style="--editor-height: 500px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
        .admin-panel {
          background-color: #813b3bff;
          padding: 10px;
          margin: 10px 0;
        }
        .user-info {
          background-color: #3f6e86ff;
          padding: 10px;
          margin: 10px 0;
        }
      </style>
      <div>
        <button on:click="toggleUserRole">Benutzerrolle wechseln</button>
        <p>Aktuelle Rolle: {{role}}</p>
        <o-if :value="role === 'admin'">
          <div class="admin-panel">
            <h3>Administrationspanel</h3>
            <button>Benutzer verwalten</button>
            <button>Systemeinstellungen</button>
          </div>
        </o-if>
        <o-else-if :value="role === 'user'">
          <div class="user-info">
            <h3>Benutzerinformationen</h3>
            <p>Willkommen {{userName}}!</p>
          </div>
        </o-else-if>
        <o-else>
          <p>Bitte melden Sie sich an, um den Inhalt zu sehen</p>
        </o-else>
      </div>
      <script>
        export default async () => {
          return {
            data: {
              role: 'guest',
              userName: 'Gast'
            },
            proto: {
              toggleUserRole() {
                if (this.role === 'guest') {
                  this.role = 'user';
                  this.userName = 'Max Mustermann';
                } else if (this.role === 'user') {
                  this.role = 'admin';
                } else {
                  this.role = 'guest';
                  this.userName = '';
                }
              }
            }
          };
        };
      </script>
    </template>
  </code>

        <h3>Anzeige des Formularvalidierungsstatus</h3>
        <o-playground name="Beispiel für die Anzeige des Formularvalidierungsstatus" style="--editor-height: 500px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
        input {
          margin: 5px;
          padding: 5px;
        }
      </style>
      <div>
        <h3>E-Mail-Validierungsbeispiel</h3>
        <input type="email" :value="email" on:input="email = $event.target.value" placeholder="E-Mail-Adresse eingeben">
        <o-if :value="email && isValidEmail(email)">
          <p style="color:green;">✓ E-Mail-Format korrekt</p>
        </o-if>
        <o-else-if :value="email && !isValidEmail(email) && email.length > 0">
          <p style="color:red;">✗ E-Mail-Format falsch</p>
        </o-else-if>
        <o-else>
          <p style="color:orange;">Bitte geben Sie eine E-Mail-Adresse zur Validierung ein</p>
        </o-else>
      </div>
      <script>
        export default async () => {
          return {
            data: {
              email: ''
            },
            proto: {
              isValidEmail(email) {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return emailRegex.test(email);
              }
            }
          };
        };
      </script>
    </template>
  </code>

        <h2>Bewährte Methoden für bedingtes Rendern</h2>
        <ol>
          <li>
            <p><strong>Verwendungsszenario</strong>: Wenn Elemente unter verschiedenen Bedingungen selten umgeschaltet werden, ist die Verwendung von <code>o-if</code> besser geeignet, da dadurch nicht benötigte Elemente vollständig entfernt werden können, was Speicher spart.</p>
          </li>
          <li>
            <p><strong>Leistungsüberlegungen</strong>: Häufig umgeschaltete Elemente eignen sich besser für Klassenbindungen (wie <code>class:hide</code>) als für bedingtes Rendering, da bedingtes Rendern das Erstellen und Zerstören von DOM-Elementen beinhaltet.</p>
          </li>
          <li>
            <p><strong>Klare Struktur</strong>: Bedingtes Rendering eignet sich besonders für das Umschalten von Inhalten mit unterschiedlichen Strukturen, wie z. B. Tabs, Schritt-für-Schritt-Anleitungen usw.</p>
          </li>
        </ol>
