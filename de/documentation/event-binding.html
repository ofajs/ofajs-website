        <h1>Ereignisbindung</h1>
        <p>In ofa.js ist die Ereignisbindung ein wichtiger Mechanismus zur Umsetzung von Benutzerinteraktionen. Du kannst auf verschiedene Weise Ereignisbehandler für Elemente binden, um auf Benutzeraktionen zu reagieren.</p>
        <h2>Ereignisse von proto binden</h2>
        <p>Dies ist die empfohlene Methode zur Ereignisbindung, die sich für komplexe Ereignisverarbeitungslogiken eignet. Wenn Sie die Ereignisbehandlungsfunktion im <code>proto</code>-Objekt definieren, können Sie die Codelogik besser organisieren, was die Wartung und Wiederverwendung erleichtert.</p>
        <o-playground name="Ereignisse von proto binden" style="--editor-height: 500px">
          <code>
    <template page="">
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <button on:click="clickMe">Click Me - {{count}}</button>
      <script>
        export default async () => {
          return {
            data: {
              count: 1,
            },
            proto:{
              clickMe(){
                this.count++;
              }
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Direkte Funktionsausführung</h2>
        <p>Bei einfachen Operationen (wie Zählererhöhung, Statusumschaltung usw.) können kurze Ausdrücke direkt im Ereignisattribut geschrieben werden. Diese Methode ist prägnant und klar und eignet sich für die Verarbeitung einfacher Logik.</p>
        <o-playground name="Funktion direkt ausführen" style="--editor-height: 500px">
          <code>
    <template page="">
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <button on:click="count++">Click Me - {{count}}</button>
      <script>
        export default async () => {
          return {
            data: {
              count: 1,
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Unterstützte Ereignistypen</h2>
        <p>ofa.js unterstützt alle Standard-DOM-Events, einschließlich, aber nicht beschränkt auf:</p>
        <ul>
          <li>Mausereignisse: <code>click</code>, <code>dblclick</code>, <code>mousedown</code>, <code>mouseup</code>, <code>mouseover</code>, <code>mouseout</code> usw.</li>
          <li>Tastaturereignisse: <code>keydown</code>, <code>keyup</code>, <code>keypress</code> usw.</li>
          <li>Formularereignisse: <code>submit</code>, <code>change</code>, <code>input</code>, <code>focus</code>, <code>blur</code> usw.</li>
          <li>Touchevents: <code>touchstart</code>, <code>touchmove</code>, <code>touchend</code> usw.</li>
        </ul>
        <p>Die von ofa.js unterstützten Ereignistypen sind vollständig identisch mit den nativen DOM-Ereignissen. Weitere Details finden Sie in der <a href="https://developer.mozilla.org/zh-CN/docs/Web/API/Event" target="_blank">MDN-Ereignisdokumentation</a>。</p>
        <h2>Parameter an Ereignishandler übergeben</h2>
        <p>Du kannst auch Parameter an den Event-Handler übergeben：</p>
        <o-playground name="Parameter an Event-Handler übergeben" style="--editor-height: 600px">
          <code>
    <template page="">
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <button on:click="addNumber(5)">Add 5 - Aktuell: {{count}}</button>
      <button on:click="addNumber(10)">Add 10 - Aktuell: {{count}}</button>
      <script>
        export default async () => {
          return {
            data: {
              count: 0,
            },
            proto: {
              addNumber(num) {
                this.count += num;
              }
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Zugriff auf das Ereignisobjekt</h2>
        <p>Im Event-Handler kannst du über den <code>event</code>-Parameter auf das native Event-Objekt zugreifen:</p>
        <o-playground name="Auf das Event-Objekt zugreifen" style="--editor-height: 700px">
          <code>
    <template page="">
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
        .container {
          width: 300px;
          height: 200px;
          background-color: #f0f0f0;
          display: flex;
          align-items: center;
          justify-content: center;
        }
      </style>
      <div class="container" on:click="handleClick">Klicke irgendwo, um die Koordinaten zu sehen</div>
      <p>X: {{x}}, Y: {{y}}</p>
      <script>
        export default async () => {
          return {
            data: {
              x: 0,
              y: 0,
            },
            proto: {
              handleClick(event) {
                this.x = event.clientX;
                this.y = event.clientY;
              }
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>Sie können auch den Parameter <code>$event</code> im Ausdruck verwenden, um auf das native Ereignisobjekt zuzugreifen, z.B. um die Mausklickkoordinaten zu erhalten:</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">div</span> <span class="hljs-attr">class</span>=<span class="hljs-string">"container"</span> <span class="hljs-attr">on:click</span>=<span class="hljs-string">"handleClick($event)"</span>&gt;</span>Klicken Sie auf eine beliebige Stelle, um die Koordinaten anzuzeigen<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span></code></pre>
        <h2>Benutzerdefinierte Ereignisse überwachen</h2>
        <p>Neben dem Abhören von nativen DOM-Ereignissen können Sie auch problemlos benutzerdefinierte Ereignisse abhören, die von Komponenten ausgelöst werden:</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">custom-comp</span> <span class="hljs-attr">on:custom-event</span>=<span class="hljs-string">"handleCustomEvent"</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">custom-comp</span>&gt;</span></code></pre>
        <p>Für ein tieferes Verständnis von benutzerdefinierten Ereignissen lesen Sie bitte das Kapitel <a href="custom-events.html" olink="">Benutzerdefinierte Ereignisse</a>. Es wird empfohlen, der Reihenfolge des Tutorials Schritt für Schritt zu folgen, da sich die nachfolgenden Inhalte natürlich entfalten; natürlich sind Sie auch jederzeit willkommen, nachzuschlagen, um vorzeitig Kenntnisse zu erlangen.</p>
      </article>

      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
