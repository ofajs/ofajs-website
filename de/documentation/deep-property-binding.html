        <h1>Verstehen der Eigenschaftsbindung</h1>
        <p>Im vorherigen Inhalt wurde bereits die grundlegende Verwendung der <a href="./property-binding.html" olink="">Eigenschaftsbindung</a> vorgestellt. Das vorherige Beispiel diente dazu, die <code>value</code>-Eigenschaft eines nativen Browserelements (wie <code>textarea</code>) zu binden. Dieser Abschnitt wird das Wesen der Eigenschaftsbindung näher untersuchen——sie bindet tatsächlich an JavaScript-Eigenschaften nach der Instanziierung der Komponente, nicht an HTML-Attribute.</p>
        <h2>Mechanismus der Komponenten-Attributbindung</h2>
        <p>In ofa.js verwenden wir in der übergeordneten Komponente die Syntax <code>:toProp="fromProp"</code>, um eine JavaScript-Eigenschaft des untergeordneten Komponenteninstanz zu setzen, nicht um ein HTML-Attribut zu setzen. Dies unterscheidet sich wesentlich vom direkten Setzen eines HTML-Attributs (wie <code>attr:toKey="fromKey"</code>).</p>
        <p>Das folgende Beispiel zeigt, wie man Daten über Attribut-Bindung an eine benutzerdefinierte Komponente übergibt:</p>
        <o-playground name="Attribut-Bindung verstehen" style="--editor-height: 500px">
          <code path="demo.html" preview="" unimportant="">
    <template>
      <o-page src="page1.html"></o-page>
    </template>
  </code>

    <template page="">
      <l-m src="./demo-comp.html"></l-m>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <h3 style="color:blue;">{{val}}</h3>
      <demo-comp :full-name="val"></demo-comp>
      <script>
        export default async () => {
          return {
            data: {
              val: "ofajs",
            },
          };
        };
      </script>
    </template>
  </code>

        <p>In diesem Beispiel:- Die <code>val</code>-Daten der Elternkomponente werden an die <code>fullName</code>-Eigenschaft der Kindkomponente <code>&lt;demo-comp&gt;</code> gebunden</p>
        <ul>
          <li>Mit der Syntax <code>:full-name="val"</code> wird der Wert von <code>val</code> der Elternkomponente an die <code>fullName</code>-Eigenschaft der Kindkomponente übergeben</li>
          <li>Die Kindkomponente empfängt den Wert und zeigt ihn in der Vorlage mit <code>{{fullName}}</code> an</li>
        </ul>
        <h2>Eigenschaftsbindung vs. Merkmalsvererbung</h2>
        <p>Es ist zu beachten, dass es zwischen Attribut-Bindung (<code>:</code>) und Merkmals-Attribut-Vererbung (<code>attr:</code>) folgende wesentliche Unterschiede gibt:</p>
        <h3>Attributbindung (<code>:</code>)</h3>
        <ul>
          <li>An die Komponenteninstanz gebundene JavaScript-Eigenschaften</li>
          <li>Die übergebenen Daten bleiben primitive Typen (Zeichenketten, Zahlen, Booleans usw.)</li>
          <li>Innerhalb der Komponente kann direkt darauf zugegriffen und sie modifiziert werden, ohne dass <code>data</code> vorab definiert werden muss.</li>
        </ul>
        <h3>Vererbung von Feature-Attributen (<code>attr:</code>)</h3>
        <ul>
          <li>HTML-Attribute setzen</li>
          <li>Alle Werte werden in Zeichenketten umgewandelt</li>
          <li>Hauptsächlich zum Übergeben von Attributen an zugrunde liegende DOM-Elemente</li>
          <li>Erfordert spezielle Verarbeitung, um komplexe Daten zu analysieren</li>
          <li><code>attrs</code> muss vorher innerhalb der Komponente definiert werden, um Attributwerte empfangen zu können</li>
        </ul>
        <p>Grammatikvergleich:```html</p>
        <!-- Attributbindung: Übergabe von JavaScript-Werten, Beibehaltung des Datentyps -->
        <p><my-component :data-value="complexObject"></my-component>
          <my-component :count="42"></my-component>
          <my-component :is-active="true"></my-component>
        </p>
        <!-- Attributvererbung: Festlegen von HTML-Attributen, alle Werte werden in Zeichenfolgen umgewandelt -->
        <p><my-component attr:data-value="simpleString"></my-component>
          <my-component attr:count="42"></my-component> <!-- Tatsächlich wird die Zeichenfolge "42" übergeben -->
        </p>

## Zwei-Wege-Datenbindung

Nach der Instanziierung unterstützt die Komponente auch die bidirektionale Datenbindung unter Verwendung der Syntax `sync:toProp="fromProp"`. Die bidirektionale Bindung ermöglicht die Synchronisation von Daten zwischen der übergeordneten und der untergeordneten Komponente. Wenn sich die Daten auf einer Seite ändern, wird die andere Seite entsprechend aktualisiert.

&gt; Anders als Angular und Vue unterstützt ofa.js die native bidirektionale Datenbindungssyntax, ohne dass spezielle Konfigurationen oder zusätzliche Operationen für Komponenten erforderlich sind.

In diesem Beispiel:- Der `val` des übergeordneten Komponenten und der `fullName` des untergeordneten Komponenten realisieren eine bidirektionale Bindung über `sync:full-name="val"`.
- Wenn im Eingabefeld des übergeordneten Komponenten ein Inhalt eingegeben wird, zeigt der untergeordnete Komponente sofort den neuen Wert an.
- Wenn im Eingabefeld des untergeordneten Komponenten ein Inhalt eingegeben wird, aktualisiert der übergeordnete Komponente ebenfalls sofort die Anzeige.

### Unterschied zwischen bidirektionaler Bindung und normaler Eigenschaftsbindung

| Eigenschaft | Normale Attribut-Bindung (`:`) | Zwei-Wege-Bindung (`sync:`) |
|------|-------------------|-------------------|
| Datenfluss | Einbahnstraße: Eltern → Kind | Zwei-Wege: Eltern ↔ Kind |
| Syntax | `:prop="value"` | `sync:prop="value"` |
| Änderung durch Kind-Komponente | Beeinflusst Eltern-Komponente nicht | Beeinflusst Eltern-Komponente |
| Anwendungsfall | Eltern-Komponente übergibt Konfiguration an Kind-Komponente | Synchronisation der Daten zwischen Eltern- und Kind-Komponente erforderlich |### Hinweise

1. **Leistungsüberlegungen**: Die bidirektionale Bindung löst bei Datenänderungen eine erneute Darstellung aus, daher sollte sie in komplexen Szenarien mit Vorsicht verwendet werden.
2. **Datenflusskontrolle**: Zu viele bidirektionale Bindungen können dazu führen, dass der Datenfluss schwer nachvollziehbar ist. Es wird empfohlen, die Kommunikationsmethode zwischen Komponenten sinnvoll zu gestalten.
3. **Komponentenkompatibilität**: Nicht alle Komponenten eignen sich für die bidirektionale Bindung. Der Zweck des Komponentendesigns sollte berücksichtigt werden.</span></code></pre>

          const {
