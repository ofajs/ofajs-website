      <article class="markdown-body">
        <h1>Schnellstart</h1>
        <p>Dieser Abschnitt zeigt Ihnen, wie Sie schnell mit ofa.js beginnen können. In den folgenden Tutorials werden wir den Schritt der Erstellung der index.html-Einstiegsdatei auslassen und nur den Code der Seitenmoduldateien zeigen. Sie können direkt auf Basis der Vorlage entwickeln.</p>
        <h2>Vorbereitung der Basisdokumente</h2>
        <p>Um schnell mit ofa.js zu beginnen, erstellen Sie einfach ein <strong>Seitenmodul</strong> und kombinieren Sie es mit einer Einstiegs-HTML. Die benötigten Kern-Dateien sind wie folgt:</p>
        <ul>
          <li><code>index.html</code>: Die Einstiegsdatei der Anwendung, die das ofa.js-Framework lädt und das Seitenmodul einbindet</li>
          <li><code>demo-page.html</code>: Die Seitenmoduldatei, die den konkreten Inhalt, die Stile und die Datenlogik der Seite definiert</li>
        </ul>
        <h3>index.html (Anwendungseingang)</h3>
        <pre><code class="hljs language-html"><span class="hljs-comment">&lt;!-- index.html --&gt;</span>
<span class="hljs-meta">&lt;!DOCTYPE <span class="hljs-keyword">html</span>&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">html</span> <span class="hljs-attr">lang</span>=<span class="hljs-string">&quot;en&quot;</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">head</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">meta</span> <span class="hljs-attr">charset</span>=<span class="hljs-string">&quot;UTF-8&quot;</span> /&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">meta</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;viewport&quot;</span> <span class="hljs-attr">content</span>=<span class="hljs-string">&quot;width=device-width, initial-scale=1.0&quot;</span> /&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">title</span>&gt;</span>ofa.js Beispiel<span class="hljs-tag">&lt;/<span class="hljs-name">title</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">script</span>
      <span class="hljs-attr">src</span>=<span class="hljs-string">&quot;https://cdn.jsdelivr.net/gh/ofajs/ofa.js/dist/ofa.mjs&quot;</span>
      <span class="hljs-attr">type</span>=<span class="hljs-string">&quot;module&quot;</span>
    &gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>
  <span class="hljs-tag">&lt;/<span class="hljs-name">head</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">body</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">o-page</span> <span class="hljs-attr">src</span>=<span class="hljs-string">&quot;./demo-page.html&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-page</span>&gt;</span>
  <span class="hljs-tag">&lt;/<span class="hljs-name">body</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">html</span>&gt;</span></code></pre>
        <p>Die Hauptfunktion dieser Datei ist:- Einbindung des ofa.js-Frameworks</p>
        <ul>
          <li>Verwenden der <code>&lt;o-page&gt;</code> Komponente zum Laden und Rendern des Seitenmoduls</li>
        </ul>
        <h3>demo-page.html (Seitenmodul)</h3>
        <pre><code class="hljs language-html"><span class="hljs-comment">&lt;!-- demo-page.html --&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">template</span> <span class="hljs-attr">page</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
    <span class="hljs-selector-pseudo">:host</span> {
      <span class="hljs-attribute">display</span>: block;
      <span class="hljs-attribute">border</span>: <span class="hljs-number">1px</span> solid red;
      <span class="hljs-attribute">padding</span>: <span class="hljs-number">10px</span>;
    }
    <span class="hljs-selector-tag">p</span> {
      <span class="hljs-attribute">color</span>: pink;
    }
  </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">p</span>&gt;</span>{{val}}<span class="hljs-tag">&lt;/<span class="hljs-name">p</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">
    <span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">async</span> () =&gt; {
      <span class="hljs-keyword">return</span> {
        <span class="hljs-attr">data</span>: {
          <span class="hljs-attr">val</span>: <span class="hljs-string">&quot;Hallo ofa.js Demo-Code&quot;</span>,
        },
      };
    };
  </span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">template</span>&gt;</span></code></pre>
        <p>Diese Datei definiert eine einfache Seitenkomponente, die Folgendes enthält:- <code>&lt;template page&gt;</code>-Tag, definiert ein Seitenmodul</p>
        <ul>
          <li>CSS-Stile (unter Verwendung des <code>:host</code>-Selektors von Shadow DOM)</li>
          <li>Datenbindungsausdruck <code>{{val}}</code></li>
          <li>JavaScript-Logik, die ein Objekt mit Anfangsdaten zurückgibt</li>
        </ul>
        <h2>Online-Demo</h2>
        <p>Hier ist ein Live-Beispiel im Online-Editor, bei dem Sie den Code direkt ändern und das Ergebnis anzeigen können:</p>
        <o-playground name="Online-Demo" style="--editor-height: 500px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
        p {
          color: pink;
        }
      </style>
      <p>{{val}}</p>
      <script>
        export default async () => {
          return {
            data: {
              val: "Hello ofa.js Demo Code",
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>Wir definieren Stile durch das <code>&lt;style&gt;</code>-Tag innerhalb der Komponente. Diese internen Stile wirken nur innerhalb der Komponente, haben eine gute Kapselung und beeinflussen keine anderen Elemente auf der Seite.</p>
        <p>Dabei wird der <code>:host</code>-Selektor verwendet, um den Stil des Host-Elements der Komponente zu definieren. Hier setzen wir die Komponente als Blockelement und fügen einen roten Rand und einen Innenabstand von 10px hinzu.</p>
        <p>Mit dem Ausdruck <code>{{key}}</code> kann der entsprechende Wert aus den Komponentendaten auf die Seite gerendert werden.</p>
        <p>Jetzt haben Sie erfolgreich Ihre erste ofa.js-Anwendung erstellt! Als Nächstes lassen Sie uns die Template-Rendering-Syntax und die erweiterten Funktionen von ofa.js vertiefen.</p>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
