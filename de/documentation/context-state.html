        <h1>Kontextzustand</h1>
        <p>Der Kontextstatus ist ein Mechanismus in ofa.js für die gemeinsame Nutzung von Daten über Komponenten hinweg. Durch das Provider-Consumer-Muster können Daten zwischen Eltern- und Kindkomponenten sowie über verschiedene Ebenen hinweg übergeben werden, ohne dass sie durch Props stufenweise weitergereicht werden müssen.</p>
        <h2>Kernkonzepte</h2>
        <ul>
          <li><strong>o-provider</strong>: Datenanbieter, definiert die zu teilenden Daten</li>
          <li><strong>o-consumer</strong>: Datenverbraucher, ruft Daten vom nächstgelegenen Anbieter ab</li>
          <li><strong>watch:xxx</strong>: Überwacht Änderungen der Verbraucherdaten und bindet sie an die Eigenschaften von Komponenten oder Seitenmodulen</li>
        </ul>
        <h2>o-provider Anbieter</h2>
        <p>Die <code>o-provider</code>-Komponente wird verwendet, um einen Anbieter für gemeinsam genutzte Daten zu definieren. Sie identifiziert ihren eigenen Namen über das <code>name</code>-Attribut und definiert die zu teilenden Daten über Attribute (wie <code>custom-a=&quot;value&quot;</code>).</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">o-provider</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;userInfo&quot;</span> <span class="hljs-attr">custom-name</span>=<span class="hljs-string">&quot;Zhang San&quot;</span> <span class="hljs-attr">custom-age</span>=<span class="hljs-string">&quot;25&quot;</span>&gt;</span>
  ...
<span class="hljs-tag">&lt;/<span class="hljs-name">o-provider</span>&gt;</span></code></pre>
        <h3>Attribute</h3>
        <ul>
          <li><code>name</code>: Der eindeutige Identifikationsname des Anbieters, der für den Verbraucher zur Suche des entsprechenden Anbieters verwendet wird</li>
        </ul>
        <h3>Eigenschaften</h3>
        <ol>
          <li><strong>Automatische Attributweitergabe</strong>: Alle nicht reservierten Attribute des Providers werden als gemeinsame Daten übergeben</li>
          <li><strong>Reaktive Aktualisierung</strong>: Wenn sich die Daten des Providers ändern, wird der Consumer mit dem entsprechenden Namen automatisch aktualisiert</li>
          <li><strong>Hierarchische Suche</strong>: Der Consumer beginnt mit der nächsthöheren Provider-Instanz und sucht nach Daten mit dem entsprechenden Namen</li>
        </ol>
        <h2>o-consumer Konsument</h2>
        <p>Die <code>o-consumer</code>-Komponente wird verwendet, um Daten von einem Provider zu konsumieren (zu verwenden). Sie gibt über das <code>name</code>-Attribut den Namen des zu konsumierenden Providers an.</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">o-consumer</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;userInfo&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-consumer</span>&gt;</span></code></pre>
        <h3>Attribute</h3>
        <ul>
          <li><code>name</code>: Der Name des Anbieters, der konsumiert werden soll</li>
        </ul>
        <h3>Eigenschaften</h3>
        <ol>
          <li><strong>Automatische Datenbeschaffung</strong>: Der Consumer bezieht automatisch die Daten des nächsthöheren Providers mit dem entsprechenden Namen.</li>
          <li><strong>Attributzusammenführung</strong>: Haben mehrere Provider mit demselben Namen ein Attribut, hat der dem Consumer am nächsten liegende Provider Vorrang.</li>
          <li><strong>Attributbeobachtung</strong>: Über <code>watch:xxx</code> lassen sich Änderungen bestimmter Attribute beobachten.</li>
        </ol>
        <h2>Datenänderungen überwachen</h2>
        <p>Durch <code>watch:xxx</code> können Änderungen der Anbieterdaten überwacht werden:</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">o-consumer</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;userInfo&quot;</span> <span class="hljs-attr">watch:custom-age</span>=<span class="hljs-string">&quot;age&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-consumer</span>&gt;</span>

<span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">
<span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> {
  <span class="hljs-attr">data</span>:{
    <span class="hljs-attr">age</span>: <span class="hljs-number">0</span>,
  },
};
</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span></code></pre>

        <h2>o-root-provider Root-Anbieter</h2>
        <p><code>o-root-provider</code> ist ein globaler Provider auf Root-Ebene, dessen Gültigkeitsbereich das gesamte Dokument umfasst. Auch ohne übergeordneten Provider können Consumer die Daten des Root-Providers abrufen.</p>
        <pre><code class="hljs language-html"><span class="hljs-comment">&lt;!-- Definieren des globalen Root-Providers --&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">o-root-provider</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;globalConfig&quot;</span> <span class="hljs-attr">custom-theme</span>=<span class="hljs-string">&quot;dark&quot;</span> <span class="hljs-attr">custom-language</span>=<span class="hljs-string">&quot;zh-CN&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-root-provider</span>&gt;</span>

<span class="hljs-comment">&lt;!-- Kann an beliebiger Stelle der Seite konsumiert werden --&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">o-consumer</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;globalConfig&quot;</span> <span class="hljs-attr">watch:custom-theme</span>=<span class="hljs-string">&quot;theme&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-consumer</span>&gt;</span></code></pre>
        <h3>Eigenschaften</h3>
        <ol>
          <li><strong>全局作用域</strong>: 根提供者的数据在整个页面都可用</li>
          <li><strong>优先级</strong>: 当同时存在同 name 的 provider 和 root-provider 时，离消费者最近的 provider 优先</li>
          <li><strong>可移除</strong>: 移除 root-provider 后，消费者会回退到查找其他 provider</li>
        </ol>

        <h2>getProvider(name) Methode</h2>
        <p><code>getProvider(name)</code> ist eine Instanzmethode, die das Provider-Element mit dem entsprechenden Namen abruft. Sie durchläuft das DOM nach oben und sucht den nächstgelegenen übergeordneten Provider; falls keiner gefunden wird, wird der root-provider zurückgegeben.</p>
        <h3>Verwendung der getProvider(name)-Methode innerhalb von Komponenten oder Seitenmodulen</h3>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">
...
<span class="hljs-attr">proto</span>:{
  <span class="hljs-title function_">changeValue</span>(<span class="hljs-params"></span>){
    <span class="hljs-keyword">const</span> provider = <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">getProvider</span>(<span class="hljs-string">&quot;name&quot;</span>);
    provider.<span class="hljs-property">customValue</span> = <span class="hljs-string">&quot;new value&quot;</span>;
  }
}
...
</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span></code></pre>

        <h3>Anwendungsfall</h3>
        <ol>
          <li><strong>Manuelle Datenabfrage</strong>: Wird in Szenarien verwendet, in denen direkter Zugriff auf die Daten des Anbieters erforderlich ist</li>
          <li><strong>Über Shadow DOM hinweg</strong>: Sucht im Inneren des Shadow DOM nach dem übergeordneten Provider</li>
          <li><strong>Ereignisverarbeitung</strong>: Erhalten des entsprechenden Anbieters im Ereignis-Rückruf</li>
        </ol>
        <h2>dispatch 事件派发</h2>
        <p>Der Provider kann Ereignisse an alle Consumer verteilen, die ihn nutzen:</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">o-provider</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;test&quot;</span> <span class="hljs-attr">id</span>=<span class="hljs-string">&quot;myProvider&quot;</span> <span class="hljs-attr">custom-value</span>=<span class="hljs-string">&quot;Hallo&quot;</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">o-consumer</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;test&quot;</span> <span class="hljs-attr">on:custom-event</span>=<span class="hljs-string">&quot;handleEvent&quot;</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">div</span>&gt;</span>{{customValue}}<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span>
  <span class="hljs-tag">&lt;/<span class="hljs-name">o-consumer</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">o-provider</span>&gt;</span>

<span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">
<span class="hljs-comment">// Ereignis auslösen</span>
$(<span class="hljs-string">&quot;#myProvider&quot;</span>).<span class="hljs-title function_">dispatch</span>(<span class="hljs-string">&quot;custom-event&quot;</span>, {
  <span class="hljs-attr">data</span>: { <span class="hljs-attr">message</span>: <span class="hljs-string">&quot;Hallo Welt&quot;</span> }
});
</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span></code></pre>

        <h2>Best Practices</h2>
        <ol>
          <li><strong>Sinnvolle Benennung</strong>: Verwenden Sie aussagekräftige Namen für Provider und Consumer, um Nachverfolgung und Wartung zu erleichtern </li>
          <li><strong>Übermäßige Nutzung vermeiden</strong>: Kontextstatus ist für datenübergreifende Komponenten gedacht; für gewöhnliche Eltern-Kind-Komponenten werden Props empfohlen </li>
          <li><strong>Root-Provider für globale Konfiguration</strong>: Themen, Sprache, globaler Status usw. eignen sich für die Verwendung eines Root-Providers </li>
          <li><strong>Rechtzeitiges Aufräumen</strong>: Wenn ein Provider entfernt wird, werden die Daten des Consumers automatisch gelöscht, eine manuelle Behandlung ist nicht erforderlich</li>
        </ol>
