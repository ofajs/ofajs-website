        <h1>Kontextstatus</h1>
        <p>Der Kontextstatus ist ein Mechanismus in ofa.js für die gemeinsame Nutzung von Daten über Komponenten hinweg. Durch das Provider- und Consumer-Muster kann die Datenweitergabe zwischen über- und untergeordneten Komponenten sowie über mehrere Hierarchieebenen hinweg realisiert werden, ohne dass Daten über Props schrittweise weitergegeben werden müssen.</p>
        <h2>Kernkonzepte</h2>
        <ul>
          <li><strong>o-provider</strong>: Datenanbieter, definiert die zu teilenden Daten</li>
          <li><strong>o-consumer</strong>: Datenkonsument, ruft Daten vom nächsten Anbieter ab</li>
          <li><strong>watch:xxx</strong>: Überwacht Änderungen der Konsumentendaten und bindet sie an die Eigenschaften der Komponente oder des Seitenmoduls</li>
        </ul>
        <h2>o-provider Anbieter</h2>
        <p>Die Komponente <code>o-provider</code> dient zur Definition eines Providers für gemeinsame Daten. Sie kennzeichnet sich über das Attribut <code>name</code> und definiert die bereitzustellenden Daten durch Attribute wie <code>custom-a=&quot;value&quot;</code>.</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">o-provider</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;userInfo&quot;</span> <span class="hljs-attr">custom-name</span>=<span class="hljs-string">&quot;Zhang San&quot;</span> <span class="hljs-attr">custom-age</span>=<span class="hljs-string">&quot;25&quot;</span>&gt;</span>
  ...
<span class="hljs-tag">&lt;/<span class="hljs-name">o-provider</span>&gt;</span></code></pre>
        <h3>Eigenschaften</h3>
        <ul>
          <li><code>name</code>: der eindeutige Name des Anbieters, der vom Verbraucher verwendet wird, um den entsprechenden Anbieter zu finden</li>
        </ul>
        <h3>Eigenschaften</h3>
        <ol>
          <li><strong>Automatische Eigenschaftsweitergabe</strong>: Alle nicht reservierten Eigenschaften des Providers werden als gemeinsame Daten weitergegeben.</li>
          <li><strong>Reaktive Aktualisierung</strong>: Wenn sich die Daten des Providers ändern, wird der Consumer, der den entsprechenden Namen dieses Providers konsumiert, automatisch aktualisiert.</li>
          <li><strong>Hierarchische Suche</strong>: Der Consumer beginnt die Suche nach den Daten des entsprechenden Namens beim nächstgelegenen übergeordneten Provider.</li>
        </ol>
        <h2>o-consumer Verbraucher</h2>
        <p>Die Komponente <code>o-consumer</code> dient dem Verbrauch (der Nutzung) von Daten eines Providers. Sie gibt über das Attribut <code>name</code> an, welchen Provider sie beziehen möchte.</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">o-consumer</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;userInfo&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-consumer</span>&gt;</span></code></pre>
        <h3>Eigenschaften</h3>
        <ul>
          <li><code>name</code>: Der Name des anzusprechenden Providers</li>
        </ul>
        <h3>Eigenschaften</h3>
        <ol>
          <li><strong>Automatische Datenerfassung</strong>: Der Consumer ruft automatisch die Daten des entsprechenden <code>name</code> vom nächstgelegenen übergeordneten Provider ab.</li>
          <li><strong>Eigenschaftszusammenführung</strong>: Wenn mehrere Provider mit demselben <code>name</code> eine bestimmte Eigenschaft besitzen, hat die Eigenschaft des Providers, der dem Consumer am nächsten liegt, Vorrang.</li>
          <li><strong>Eigenschaftsüberwachung</strong>: Die Änderung bestimmter Eigenschaften kann über <code>watch:xxx</code> überwacht werden.</li>
        </ol>
        <h2>Datenänderungen überwachen</h2>
        <p>Durch <code>watch:xxx</code> können Änderungen der Daten des Providers überwacht werden:</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">o-consumer</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;userInfo&quot;</span> <span class="hljs-attr">watch:custom-age</span>=<span class="hljs-string">&quot;age&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-consumer</span>&gt;</span>

<span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">
<span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> {
  <span class="hljs-attr">data</span>:{
    <span class="hljs-attr">age</span>: <span class="hljs-number">0</span>,
  },
};
</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span></code></pre>

        <h2>o-root-provider Root-Provider</h2>
        <p><code>o-root-provider</code> ist der globale Anbieter der Root-Ebene, dessen Geltungsbereich das gesamte Dokument ist. Selbst wenn es keinen übergeordneten Provider gibt, können Verbraucher die Daten des Root-Anbieters abrufen.</p>
        <pre><code class="hljs language-html"><span class="hljs-comment">&lt;!-- Definieren Sie den globalen Root-Provider --&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">o-root-provider</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;globalConfig&quot;</span> <span class="hljs-attr">custom-theme</span>=<span class="hljs-string">&quot;dark&quot;</span> <span class="hljs-attr">custom-language</span>=<span class="hljs-string">&quot;zh-CN&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-root-provider</span>&gt;</span>

<span class="hljs-comment">&lt;!-- Kann an beliebiger Stelle auf der Seite konsumiert werden --&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">o-consumer</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;globalConfig&quot;</span> <span class="hljs-attr">watch:custom-theme</span>=<span class="hljs-string">&quot;theme&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-consumer</span>&gt;</span></code></pre>
        <h3>Eigenschaften</h3>
        <ol>
          <li><strong>Globaler Gültigkeitsbereich</strong>: Die Daten des Root-Providers sind auf der gesamten Seite verfügbar.</li>
          <li><strong>Priorität</strong>: Wenn gleichzeitig ein Provider und ein Root-Provider mit demselben Namen existieren, hat der Provider, der dem Consumer am nächsten ist, Vorrang.</li>
          <li><strong>Entfernbar</strong>: Nach dem Entfernen des Root-Providers fällt der Consumer auf die Suche nach anderen Providern zurück.</li>
        </ol>

        <h2>getProvider(name) Methode</h2>
        <p><code>getProvider(name)</code> ist eine Instanzmethode, um das Provider-Element mit dem entsprechenden Namen zu erhalten. Es sucht entlang des DOM nach dem nächstgelegenen übergeordneten Provider. Wenn keiner gefunden wird, wird der root-provider zurückgegeben.</p>
        <h3>In der Komponente oder im Seitenmodul die Methode getProvider(name) verwenden</h3>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">
...
<span class="hljs-attr">proto</span>:{
  <span class="hljs-title function_">changeValue</span>(<span class="hljs-params"></span>){
    <span class="hljs-keyword">const</span> provider = <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">getProvider</span>(<span class="hljs-string">&quot;name&quot;</span>);
    provider.<span class="hljs-property">customValue</span> = <span class="hljs-string">&quot;new value&quot;</span>;
  }
}
...
</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span></code></pre>

        <h3>Verwendungsszenarien</h3>
        <ol>
          <li><strong>Manuelle Datenbeschaffung</strong>: Verwendung in Szenarien, bei denen direkt auf die Daten des Providers zugegriffen werden muss </li>
          <li><strong>Über Shadow DOM hinweg</strong>: Suche nach einem Provider auf einer höheren Ebene innerhalb des Shadow DOM </li>
          <li><strong>Ereignisbehandlung</strong>: Abrufen des entsprechenden Providers in Ereignis-Callbacks</li>
        </ol>
        <h2>dispatch Ereignisverteilung</h2>
        <p>Der Provider kann Ereignisse an alle Consumer, die ihn konsumieren, senden:</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">o-provider</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;test&quot;</span> <span class="hljs-attr">id</span>=<span class="hljs-string">&quot;myProvider&quot;</span> <span class="hljs-attr">custom-value</span>=<span class="hljs-string">&quot;Hello&quot;</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">o-consumer</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;test&quot;</span> <span class="hljs-attr">on:custom-event</span>=<span class="hljs-string">&quot;handleEvent&quot;</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">div</span>&gt;</span>{{customValue}}<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span>
  <span class="hljs-tag">&lt;/<span class="hljs-name">o-consumer</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">o-provider</span>&gt;</span>

<span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">
<span class="hljs-comment">// Ereignis auslösen</span>
$(<span class="hljs-string">&quot;#myProvider&quot;</span>).<span class="hljs-title function_">dispatch</span>(<span class="hljs-string">&quot;custom-event&quot;</span>, {
  <span class="hljs-attr">data</span>: { <span class="hljs-attr">message</span>: <span class="hljs-string">&quot;Hello World&quot;</span> }
});
</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span></code></pre>
