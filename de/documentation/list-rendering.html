        <h1>Listen-Rendering</h1>
        <p>In ofa.js bietet die <code>o-fill</code>-Komponente leistungsstarke Listen-Render-Funktionen und kann Array-Daten effizient in mehrere ähnliche Elemente rendern. Sie unterstützt zwei Hauptverwendungsarten: Direktes Rendern und Template-Rendering.</p>
        <h2>Einführung in die o-fill Komponente</h2>
        <p><code>o-fill</code> ist eine Kernkomponente in ofa.js zur Listen-Rendering. Sie erhält ein Array-Attribut <code>value</code> und erzeugt für jeden Eintrag im Array ein entsprechendes DOM-Element. Während des Renderings verfolgt ofa.js automatisch Änderungen am Array und aktualisiert das DOM effizient.</p>
        <h3>Hauptmerkmale:</h3>
        <ul>
          <li><strong>Effiziente Aktualisierung</strong>: Verfolgen Sie Array-Änderungen über Schlüssel-Werte-Paare und aktualisieren Sie nur die Teile, die geändert werden müssen.</li>
          <li><strong>Indexzugriff</strong>: Greifen Sie über <code>$index</code> auf den Index des aktuellen Elements zu.</li>
          <li><strong>Datenzugriff</strong>: Greifen Sie über <code>$data</code> auf die Daten des aktuellen Elements zu.</li>
          <li><strong>Hostzugriff</strong>: Greifen Sie über <code>$host</code> auf die aktuelle Komponenteninstanz zu, um Komponentenmethoden aufzurufen oder auf Komponentendaten zuzugreifen.</li>
          <li><strong>Wiederverwendung von Vorlagen</strong>: Unterstützt die Verwendung benannter Vorlagen für komplexe Listendarstellungen.</li>
        </ul>
        <h2>Direktes Rendern</h2>
        <p>Die direkte Renderung ist die einfachste Anwendung: Der Template-Inhalt wird direkt innerhalb des <code>o-fill</code>-Tags geschrieben. Wenn sich das Array ändert, erstellt <code>o-fill</code> automatisch für jeden Datensatz das entsprechende Element.</p>
        <o-playground name="o-fill - Direktes Rendern" style="--editor-height: 600px">
          <code>
    <template page>
      <style>
        :host { display: block; padding: 10px; }
        ul { list-style: none; padding: 0; }
        li { padding: 8px; margin: 5px 0; background: #7e7e7e; border-radius: 4px; }
      </style>
      <h3>Obstliste</h3>
      <button on:click="addItem">Obst hinzufügen</button>
      <button on:click="removeItem">Letztes entfernen</button>
      <ul>
        <o-fill :value="fruits">
          <li> {{$index + 1}}. {{$data.name}} - Preis: ¥{{$data.price}} <button on:click="$host.removeItem($index)">Löschen</button></li>
        </o-fill>
      </ul>
      <script>
        export default async () => ({
          data: { 
            fruits: [
              { name: "🍎 Apfel", price: 5 },
              { name: "🍊 Orange", price: 6 },
              { name: "🍌 Banane", price: 3 }
            ],
            fruitIndex: 0,
          },
          proto: {
            addItem() {
              const fruitNames = ["🍇 Traube", "🍓 Erdbeere", "🥝 Kiwi", "🍑 Pfirsich", "🥭 Mango"];
              const name = fruitNames[this.fruitIndex % fruitNames.length];
              this.fruits.push({ 
                name: name, 
                price: Math.floor(Math.random() * 10) + 1 
              });
              this.fruitIndex++;
            },
            removeItem(index) {
              if (index >= 0 && index < this.fruits.length) {
                this.fruits.splice(index, 1);
                return;
              }
              this.fruits.length && this.fruits.pop();
            }
          }
        });
      </script>
    </template>
  </code>
        </o-playground>
        <p>In diesem Beispiel können wir sehen:- <code>$index</code> steht für den Index des aktuellen Elements (beginnend bei 0)</p>
        <ul>
          <li><code>$data</code> steht für das Datenobjekt des aktuellen Elements</li>
          <li><code>$host</code> steht für die aktuelle Komponenteninstanz, die zum Aufrufen von Komponentenmethoden oder zum Zugreifen auf Komponentendaten verwendet werden kann</li>
          <li>Wenn sich das Array ändert, wird die Liste automatisch aktualisiert</li>
        </ul>
        <h2>Vorlagen-Rendering</h2>
        <p>Für komplexere Listenelementstrukturen kann der Ansatz benannter Vorlagen verwendet werden. Definieren Sie die Vorlage im <code>template</code>-Tag und referenzieren Sie sie dann in <code>o-fill</code> über das <code>name</code>-Attribut.</p>

        <h2>Leistungsoptimierung und Schlüssel-Wert-Verwaltung</h2>
        <p>Für Listen, die häufig aktualisiert werden müssen, kann das eindeutige Identifikationsmerkmal über das Attribut <code>fill-key</code> angegeben werden, um die Rendering-Leistung zu verbessern.</p>
        <pre><code class="hljs language-html"><span class="hljs-comment">&lt;!-- Verwendung eines benutzerdefinierten Schlüssels zur Leistungssteigerung --&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">o-fill</span> <span class="hljs-attr">:value</span>=<span class="hljs-string">&quot;items&quot;</span> <span class="hljs-attr">fill-key</span>=<span class="hljs-string">&quot;id&quot;</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">div</span>&gt;</span>{{$data.name}}<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">o-fill</span>&gt;</span></code></pre>
        <p>Im obigen Beispiel teilt <code>fill-key=&quot;id&quot;</code> ofa.js mit, die <code>id</code>-Eigenschaft jedes Datensatzes als eindeutigen Identifikator zu verwenden, sodass auch bei einer Änderung der Reihenfolge des Arrays die entsprechenden Elemente korrekt erkannt und aktualisiert werden können.</p>
        <h2>Best Practices für das Rendern von Listen</h2>
        <ol>
          <li><strong>Ereignisbehandlung</strong>: Bei der Verwendung von Ereignissen in Listenelementen beachten Sie, dass <code>$host</code> auf die aktuelle Komponenteninstanz und <code>$data</code> auf die aktuellen Datenpunkte verweist.</li>
          <li><strong>Auswahl der geeigneten Darstellungsmethode</strong>: Verwenden Sie für einfache Listen die direkte Darstellung, für komplexe Strukturen die Vorlagendarstellung.</li>
          <li><strong>Leistungsaspekte</strong>: Verwenden Sie für große oder häufig aktualisierte Listen <code>fill-key</code>, um Schlüsselwerte anzugeben.</li>
          <li><strong>Datenstruktur</strong>: Stellen Sie sicher, dass jedes Element im Array ein gültiges Datenobjekt ist.</li>
          <li><strong>Vermeidung tiefer Verschachtelungen</strong>: Obwohl Verschachtelungen unterstützt werden, sollten zu tiefe Verschachtelungsebenen vermieden werden.</li>
        </ol>
