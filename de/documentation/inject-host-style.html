        <h1>Host-Stile einfügen</h1>
        <p>In Web Components ist es aufgrund der Einschränkungen von <code>slot</code>-Elementen nicht möglich, direkt die Stile von mehrschichtigen Elementen innerhalb eines Slots festzulegen. Um dieses Problem zu lösen, stellt ofa.js die Komponente <code>&lt;inject-host&gt;</code> bereit, die es ermöglicht, innerhalb einer Komponente Stile in das Host-Element einzufügen und so die Stile mehrschichtiger Elemente innerhalb von Slot-Inhalten zu steuern.</p>
        <blockquote>
          <p>Hinweis: Es wird empfohlen, zuerst den <a href="https://developer.mozilla.org/en-US/docs/Web/CSS/Reference/Selectors/::slotted" target="_blank">::slotted()</a> Selektor zu verwenden, um das Styling des Slot-Inhalts festzulegen. Verwenden Sie die <code>&lt;inject-host&gt;</code> Komponente nur dann, wenn die Anforderungen nicht erfüllt werden können.</p>
        </blockquote>
        <h2>Grundlegende Verwendung</h2>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">template</span> <span class="hljs-attr">component</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
        <span class="hljs-selector-pseudo">:host</span> {
            <span class="hljs-attribute">display</span>: block;
            <span class="hljs-attribute">border</span>: <span class="hljs-number">1px</span> solid <span class="hljs-number">#007acc</span>;
            <span class="hljs-attribute">padding</span>: <span class="hljs-number">10px</span>;
        }
        <span class="hljs-comment">/* Stile für direkte Kindelemente festlegen */</span>
        <span class="hljs-comment">/* ::slotted(user-list-item) {
            background-color: aqua;
        } */</span>
    </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">inject-host</span>&gt;</span>
        <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
            user-list user-list-item {
                <span class="hljs-attribute">background-color</span>: aqua;
            }
            <span class="hljs-comment">/* Mehrstufige verschachtelte Stile können ebenfalls gesetzt werden */</span>
            user-list user-list-item <span class="hljs-selector-class">.user-list-item-content</span> {
                <span class="hljs-attribute">color</span>: red;
            }
        </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
    <span class="hljs-tag">&lt;/<span class="hljs-name">inject-host</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">
        <span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">async</span> () =&gt; {
            <span class="hljs-keyword">return</span> {
                <span class="hljs-attr">tag</span>: <span class="hljs-string">"user-list"</span>,
                <span class="hljs-comment">// ...</span>
            };
        };
    </span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">template</span>&gt;</span></code></pre>
        <h2>Fallbeispiel</h2>
        <p>Das folgende Beispiel zeigt, wie man mit <code>&lt;inject-host&gt;</code> die Stile von geschachtelten Elementen innerhalb eines Slots setzt. Wir erstellen zwei Komponenten: die <code>user-list</code>-Komponente als Listen-Container und die <code>user-list-item</code>-Komponente als Listeneintrag. Durch <code>&lt;inject-host&gt;</code> können wir in der <code>user-list</code>-Komponente die Stile von <code>user-list-item</code> und dessen inneren Elementen festlegen.</p>
        <o-playground name="Host-Styles einfügen" style="--editor-height: 500px">
          <code path="index.html" preview="">
    <template>
      <l-m src="./user-list.html"></l-m>
      <l-m src="./user-list-item.html"></l-m>
      <user-list>
        <user-list-item>
          <span>Max Mustermann</span>
          <span slot="age">25</span>
        </user-list-item>
        <user-list-item>
          <span class="item-name">Erika Mustermann</span>
          <span slot="age">30</span>
        </user-list-item>
      </user-list>
    </template>
  </code>
          <code path="user-list.html" active="">
    <template component="">
      <style>
        :host {
          display: block;
          border: 1px solid gray;
          padding: 10px;
        }
      </style>
      <inject-host>
        <style>
          user-list user-list-item {
            background-color: blue;
            display: block;
            padding: 10px;
            margin: 5px 0;
          }
          user-list user-list-item .item-name {
            color: red;
            font-weight: bold;
          }
        </style>
      </inject-host>
      <slot></slot>
      <script>
        export default async () => {
          return {
            tag: "user-list",
          };
        };
      </script>
    </template>
  </code>
          <code path="user-list-item.html">
    <template component="">
      <style>
        :host {
          display: block;
        }
      </style>
      <slot></slot>
      <div class="item-age">
        Alter: <slot name="age"></slot>
      </div>
      <script>
        export default async () => {
          return {
            tag: "user-list-item",
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>Im Ergebnis ist zu sehen:- Die Hintergrundfarbe der Komponente <code>user-list-item</code> ist aqua (gesetzt über das <code>&lt;inject-host&gt;</code> der Komponente <code>user-list</code>)</p>
        <ul>
          <li>Die Textfarbe des Namens ist rot (gesetzt über den <code>user-list-item .item-name</code>-Stil des <code>&lt;inject-host&gt;</code> der Komponente <code>user-list</code>)</li>
        </ul>
        <h2>Funktionsweise</h2>
        <p><code>&lt;inject-host&gt;</code> Komponente injiziert die Inhalte des enthaltenen <code>&lt;style&gt;</code>-Tags in das Host-Element der Komponente. Dadurch können die injizierten Stilregeln die Komponentengrenzen durchdringen und auf Elemente innerhalb des Slots wirken.</p>
        <p>Auf diese Weise kannst du:- Stile für Elemente beliebiger Tiefe im Slot-Inhalt festlegen</p>
        <ul>
          <li>Verwenden eines vollständigen Selektorpfads, um sicherzustellen, dass die Stile nur auf das Zielelement wirken</li>
          <li>Die Kapselung der Komponentenstile beibehalten und gleichzeitig einen flexiblen Stildurchgriff ermöglichen</li>
        </ul>
        <h2>Hinweise</h2>
        <p>⚠️ <strong>Stil-Kontaminationsrisiko</strong>: Da die injizierten Stile auf den Bereich des Wirtselements angewendet werden, können sie auch Elemente in anderen Komponenten beeinflussen. Beachten Sie bei der Verwendung unbedingt folgende Grundsätze:</p>
        <ol>
          <li><strong>Verwenden Sie spezifische Selektoren</strong>: Verwenden Sie möglichst vollständige Komponenten-Tag-Pfade und vermeiden Sie zu allgemeine Selektoren.</li>
          <li><strong>Fügen Sie ein Namespace-Präfix hinzu</strong>: Fügen Sie Ihren Style-Klassen ein eindeutiges Präfix hinzu, um Konflikte mit anderen Komponenten zu reduzieren.</li>
          <li><strong>Vermeiden Sie generische Tag-Selektoren</strong>: Verwenden Sie nach Möglichkeit Klassen- oder Attribut-Selektoren anstelle von Tag-Selektoren.</li>
          <li><strong>Überdenken Sie das Komponenten-Design</strong>: Überlegen Sie, ob Sie durch Optimierung des Komponenten-Designs die Verwendung von <code>&lt;inject-host&gt;</code> vermeiden können. Beispielsweise ist die Verwendung des <a href="https://developer.mozilla.org/en-US/docs/Web/CSS/Reference/Selectors/::slotted" target="_blank">::slotted()</a> Selektors in Verbindung mit untergeordneten Komponenten oft eleganter.</li>
        </ol>
        <pre><code class="hljs language-html"><span class="hljs-comment">&lt;!-- Empfohlen ✅: Spezifische Selektoren verwenden --&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">inject-host</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
        user-list <span class="hljs-selector-class">.list-item-content</span> {
            <span class="hljs-attribute">color</span>: red;
        }
    </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">inject-host</span>&gt;</span>

<span class="hljs-comment">&lt;!-- Nicht empfohlen ❌: Zu allgemeine Selektoren verwenden --&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">inject-host</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
        <span class="hljs-selector-class">.content</span> {  <span class="hljs-comment">/* Leicht mit anderen Komponenten in Konflikt geraten */</span>
            <span class="hljs-attribute">color</span>: red;
        }
    </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">inject-host</span>&gt;</span></code></pre>
        <h3>Leistungstipps</h3>
        <p>Da <code>&lt;inject-host&gt;</code> die erneute Injektion von Host-Stilen auslöst und dadurch möglicherweise das Neuordnen oder Neuzeichnen von Komponenten verursacht, verwenden Sie es vorsichtig in Szenarien mit häufigen Aktualisierungen.<br>Wenn Sie nur Stile für die Elemente der ersten Ebene innerhalb eines Slots festlegen müssen, verwenden Sie vorzugsweise den Pseudo-Klassen-Selektor <a href="https://developer.mozilla.org/en-US/docs/Web/CSS/Reference/Selectors/::slotted" target="_blank">::slotted()</a>, um zusätzliche Rendering-Kosten durch durchdringende Injektion zu vermeiden und so eine bessere Leistung zu erzielen.</p>
      </article>

      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
