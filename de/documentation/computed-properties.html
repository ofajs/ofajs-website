        <h1>Berechnete Eigenschaften</h1>
        <p>Berechnete Eigenschaften sind eine Möglichkeit, neue Daten aus reaktiven Daten abzuleiten, die sich automatisch aktualisieren, wenn sich die abhängigen Daten ändern. In ofa.js werden berechnete Eigenschaften als spezielle Methoden im <code>proto</code>-Objekt definiert, die mit den JavaScript-Schlüsselwörtern <code>get</code> oder <code>set</code> definiert werden.</p>
        <h2>Merkmale und Vorteile</h2>
        <ul>
          <li><strong>Caching</strong>: Die Ergebnisse von berechneten Eigenschaften werden zwischengespeichert; sie werden nur neu berechnet, wenn sich die abhängigen Daten ändern </li>
          <li><strong>Reaktivität</strong>: Wenn sich die abhängigen Daten aktualisieren, wird die berechnete Eigenschaft automatisch aktualisiert </li>
          <li><strong>Deklarativität</strong>: Abhängigkeiten werden deklarativ erstellt, der Code ist klarer und leichter verständlich</li>
        </ul>
        <h2>get berechnete Eigenschaft</h2>
        <p>Der get-Berechnete Eigenschaft wird verwendet, um neue Werte aus reaktiven Daten abzuleiten. Er akzeptiert keine Parameter und gibt nur Werte zurück, die auf Basis anderer Daten berechnet werden.</p>
        <o-playground name="get berechnete Eigenschaft Beispiel" style="--editor-height: 600px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <button on:click="clickMe">Klick mich - {{count}} - {{countDouble}}</button>
      <p>Der Wert der berechneten Eigenschaft countDouble ist: {{countDouble}}</p>
      <script>
        export default async () => {
          return {
            data: {
              count: 1,
            },
            proto: {
              get countDouble() {
                console.log('countDouble wurde aufgerufen');
                return this.count * 2;
              },
              clickMe() {
                this.count++;
              },
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h3>Praktische Anwendungsszenarien und Beispiele</h3>
        <p>Berechnete Eigenschaften werden häufig verwendet, um komplexe Datenumwandlungslogik zu verarbeiten, wie z.B. das Filtern von Arrays oder das Formatieren von Anzeigetexten:</p>
        <o-playground name="Beispiel für berechnete Eigenschaften" style="--editor-height: 500px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          padding: 10px;
        }
        ul {
          list-style-type: none;
          padding: 0;
        }
        li {
          padding: 5px;
          margin: 3px 0;
          background-color: #838383ff;
        }
      </style>
      <input type="text" sync:value="filterText" placeholder="Namen filtern...">
      <ul>
        <o-fill :value="filteredNames">
          <li>{{$data}}</li>
        </o-fill>
      </ul>
      <script>
        export default async () => {
          return {
            data: {
              filterText: '',
              names: ['Max3', 'Anna4', 'Tom54']
            },
            proto: {
              get filteredNames() {
                if (!this.filterText) {
                  return this.names;
                }
                return this.names.filter(name => 
                  name.includes(this.filterText)
                );
              },
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>set Berechnete Eigenschaften</h2>
        <p>set-Eigenschaften ermöglichen es dir, den zugrunde liegenden Datenstatus durch eine Zuweisungsoperation zu ändern. Sie akzeptieren einen Parameter, der normalerweise verwendet wird, um die ursprünglichen Daten, von denen sie abhängen, rückwärts zu aktualisieren.</p>
        <o-playground name="Setter für berechnete Eigenschaft - Beispiel" style="--editor-height: 700px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
        button {
          margin: 5px;
          padding: 8px 12px;
        }
      </style>
      <div>
        <p>Basiswert: {{count}}</p>
        <p>Doppelter Wert: {{countDouble}}</p>
        <button on:click="resetCount">Zähler zurücksetzen</button>
        <button on:click="setCountDouble">Doppelten Wert auf 10 setzen</button>
        <button on:click="incrementCount">Basiswert erhöhen</button>
      </div>
      <script>
        export default async () => {
          return {
            data: {
              count: 1,
            },
            proto: {
              get countDouble() {
                return this.count * 2;
              },
              set countDouble(val) {
                this.count = Math.max(0, val / 2); // Stellt sicher, dass count nicht negativ wird
              },
              resetCount() {
                this.count = 0;
              },
              setCountDouble() {
                this.countDouble = 10;
              },
              incrementCount() {
                this.count++;
              }
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Berechnete Eigenschaften vs Methoden</h2>
        <p>Obwohl Methoden ähnliche Funktionen implementieren können, hat die berechnete Eigenschaft eine Caching-Eigenschaft: Sie wird nur dann neu ausgewertet, wenn sich ihre abhängigen Daten ändern, was die Leistung verbessert.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// Verwendung von berechneten Eigenschaften (empfohlen) - mit Cache</span>
<span class="hljs-keyword">get</span> <span class="hljs-title function_">fullName</span>() {
  <span class="hljs-keyword">return</span> <span class="hljs-variable language_">this</span>.<span class="hljs-property">firstName</span> + <span class="hljs-string">&#x27; &#x27;</span> + <span class="hljs-variable language_">this</span>.<span class="hljs-property">lastName</span>;
}

<span class="hljs-comment">// Verwendung einer Methode - wird bei jedem Aufruf ausgeführt</span>
<span class="hljs-title function_">fullName</span>(<span class="hljs-params"></span>) {
  <span class="hljs-keyword">return</span> <span class="hljs-variable language_">this</span>.<span class="hljs-property">firstName</span> + <span class="hljs-string">&#x27; &#x27;</span> + <span class="hljs-variable language_">this</span>.<span class="hljs-property">lastName</span>;
}</code></pre>
        <h2>Hinweise</h2>
        <ol>
          <li><strong>Asynchrone Vorgänge vermeiden</strong>: Berechnete Eigenschaften sollten synchron und ohne Nebenwirkungen sein, asynchrone Aufrufe oder direkte Änderungen des Komponentenzustands sind darin verboten. </li>
          <li><strong>Abhängigkeitsverfolgung</strong>: Es muss ausschließlich auf reaktive Daten angewiesen werden, sonst sind Aktualisierungen unvorhersehbar. </li>
          <li><strong>Fehlerschutz</strong>: Wenn innerhalb einer berechneten Eigenschaft zirkuläre Abhängigkeiten oder abnormale Zuweisungen auftreten, kann dies zu Renderfehlern oder sogar Endlosschleifen führen. Setzen Sie unbedingt im Voraus Randbedingungen und treffen Sie eine Ausnahmebehandlung.</li>
        </ol>
        <h2>Praktische Anwendungsbeispiele</h2>
        <p>Nachfolgend ein einfaches Beispiel zur Formularvalidierung, das die Nützlichkeit von berechneten Eigenschaften zeigt:</p>
        <o-playground name="Formularvalidierungsbeispiel" style="--editor-height: 600px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          padding: 15px;
          font-family: Arial, sans-serif;
        }
        input {
          margin: 5px 0;
          padding: 8px;
          width: 200px;
        }
        .status {
          margin-top: 10px;
          padding: 8px;
          border-radius: 4px;
        }
        .valid {
          background-color: #d4edda;
          color: green;
        }
        .invalid {
          background-color: #f8d7da;
          color: red;
        }
      </style>
      <h3>Einfaches Validierungsbeispiel</h3>
      <input type="text" sync:value="username" placeholder="Benutzernamen eingeben (mindestens 3 Zeichen)">
      <p class="status" class:valid="isValid" class:invalid="!isValid">
        Status: {{statusMessage}}
      </p>
      <script>
        export default async () => {
          return {
            data: {
              username: ''
            },
            proto: {
              get isValid() {
                return this.username.length >= 3;
              },
              get statusMessage() {
                return this.isValid ? 'Benutzername gültig' : 'Benutzername zu kurz';
              },
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>

          query

            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {

            },
            detached() {

            },
