        <h1>Nicht explizite Komponenten</h1>
        <p>ofa.js enthält zwei implizite Komponenten:</p>
        <ul>
          <li>Bedingte Rendering-Komponenten: <code>x-if</code>, <code>x-else-if</code>, <code>x-else</code></li>
          <li>Füllkomponente: <code>x-fill</code></li>
        </ul>
        <p>Die Funktionen dieser beiden Komponenten sind jeweils identisch mit den Komponenten <code>o-if</code> und <code>o-fill</code>, aber sie selbst werden nicht wirklich im DOM gerendert, sondern ihre inneren Elemente werden direkt in den entsprechenden Bereich gerendert.</p>
        <p>zum Beispiel:</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
    <span class="hljs-selector-class">.container</span> &gt; <span class="hljs-selector-class">.item</span>{
        <span class="hljs-attribute">color</span>:red;
    }
</span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">div</span> <span class="hljs-attr">class</span>=<span class="hljs-string">"container"</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">o-if</span> <span class="hljs-attr">:value</span>=<span class="hljs-string">"true"</span>&gt;</span>
        <span class="hljs-comment">&lt;!-- Der Stil ist nicht rot, da die o-if-Komponente selbst im DOM vorhanden ist --&gt;</span>
        <span class="hljs-tag">&lt;<span class="hljs-name">div</span> <span class="hljs-attr">class</span>=<span class="hljs-string">"item"</span>&gt;</span>1<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span>
    <span class="hljs-tag">&lt;/<span class="hljs-name">o-if</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">x-if</span> <span class="hljs-attr">:value</span>=<span class="hljs-string">"true"</span>&gt;</span>
        <span class="hljs-comment">&lt;!-- Der Stil ist rot, da die x-if-Komponente nicht in das DOM gerendert wird --&gt;</span>
        <span class="hljs-tag">&lt;<span class="hljs-name">div</span> <span class="hljs-attr">class</span>=<span class="hljs-string">"item"</span>&gt;</span>2<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span>
    <span class="hljs-tag">&lt;/<span class="hljs-name">x-if</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span></code></pre><o-playground name="Nicht-explizite Komponente" style="--editor-height: 500px">

        <h2>x-if-Komponente für bedingtes Rendering</h2>
        <p><code>x-if</code> hat genau die gleiche Funktionalität wie <a href="./conditional-rendering.html" olink="">o-if</a> und wird verwendet, um zu entscheiden, ob Inhalte basierend auf dem Wahrheitswert eines bedingten Ausdrucks gerendert werden sollen. Der Unterschied besteht darin, dass <code>x-if</code> selbst nicht als DOM-Element existiert; sein interner Inhalt wird direkt im übergeordneten Container gerendert.</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">div</span> <span class="hljs-attr">class</span>=<span class="hljs-string">"container"</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">x-if</span> <span class="hljs-attr">:value</span>=<span class="hljs-string">"isLoggedIn"</span>&gt;</span>
        <span class="hljs-tag">&lt;<span class="hljs-name">p</span>&gt;</span>Willkommen zurück, Benutzer!<span class="hljs-tag">&lt;/<span class="hljs-name">p</span>&gt;</span>
    <span class="hljs-tag">&lt;/<span class="hljs-name">x-if</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span></code></pre>
        <p><code>x-if</code> kann auch mit <code>x-else-if</code> und <code>x-else</code> verwendet werden:</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">div</span> <span class="hljs-attr">class</span>=<span class="hljs-string">"container"</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">x-if</span> <span class="hljs-attr">:value</span>=<span class="hljs-string">"role === 'admin'"</span>&gt;</span>
        <span class="hljs-tag">&lt;<span class="hljs-name">p</span>&gt;</span>Administrationsbereich<span class="hljs-tag">&lt;/<span class="hljs-name">p</span>&gt;</span>
    <span class="hljs-tag">&lt;/<span class="hljs-name">x-if</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">x-else-if</span> <span class="hljs-attr">:value</span>=<span class="hljs-string">"role === 'user'"</span>&gt;</span>
        <span class="hljs-tag">&lt;<span class="hljs-name">p</span>&gt;</span>Benutzerzentrum<span class="hljs-tag">&lt;/<span class="hljs-name">p</span>&gt;</span>
    <span class="hljs-tag">&lt;/<span class="hljs-name">x-else-if</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">x-else</span>&gt;</span>
        <span class="hljs-tag">&lt;<span class="hljs-name">p</span>&gt;</span>Bitte anmelden<span class="hljs-tag">&lt;/<span class="hljs-name">p</span>&gt;</span>
    <span class="hljs-tag">&lt;/<span class="hljs-name">x-else</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span></code></pre>
        <h2>x-fill Füllkomponente</h2>
        <p><code>x-fill</code> hat die exakt gleiche Funktionalität wie <a href="./list-rendering.html" olink="">o-fill</a> und wird verwendet, um Array-Daten in mehrere DOM-Elemente zu rendern. Ähnlich wie <code>x-if</code> wird <code>x-fill</code> selbst nicht ins DOM gerendert, sondern die innere Vorlage wird direkt in das übergeordnete Container-Element gerendert.</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">ul</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">x-fill</span> <span class="hljs-attr">:value</span>=<span class="hljs-string">"items"</span>&gt;</span>
        <span class="hljs-tag">&lt;<span class="hljs-name">li</span>&gt;</span>{{$data.name}}<span class="hljs-tag">&lt;/<span class="hljs-name">li</span>&gt;</span>
    <span class="hljs-tag">&lt;/<span class="hljs-name">x-fill</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">ul</span>&gt;</span></code></pre>
        <p>Beispiel für die Verwendung benannter Vorlagen:</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">ul</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">x-fill</span> <span class="hljs-attr">name</span>=<span class="hljs-string">"li"</span> <span class="hljs-attr">:value</span>=<span class="hljs-string">"items"</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">x-fill</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">ul</span>&gt;</span>

<span class="hljs-tag">&lt;<span class="hljs-name">template</span> <span class="hljs-attr">name</span>=<span class="hljs-string">"li"</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">li</span> <span class="hljs-attr">class:active</span>=<span class="hljs-string">"$data.active"</span>&gt;</span>
        <span class="hljs-tag">&lt;<span class="hljs-name">a</span> <span class="hljs-attr">attr:href</span>=<span class="hljs-string">"$data.href"</span>&gt;</span>{{$data.name}}<span class="hljs-tag">&lt;/<span class="hljs-name">a</span>&gt;</span>
    <span class="hljs-tag">&lt;/<span class="hljs-name">li</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">template</span>&gt;</span></code></pre>
        <h2>Leistungshinweise</h2>
        <p>Abgesehen von den funktionalen Unterschieden ist die Rendering-Leistung von nicht-expliziten Komponenten <strong>viel schlechter</strong> als die von expliziten Komponenten (<code>o-if</code>, <code>o-fill</code>). Dies liegt daran, dass nicht-explizite Komponenten nicht tatsächlich im DOM gerendert werden und zusätzliche simulierte Rendering-Logik erfordern, um die Positionierung und Aktualisierung interner Elemente zu verarbeiten.</p>
        <p>Darüber hinaus können implizite Komponenten einige schwer erkennbare Bugs verursachen: Da sie nicht wirklich in das DOM eintreten, können Operationen, die von der DOM-Struktur abhängen (wie Event-Bindungen, Stilberechnungen oder Abfragen durch Drittanbieter-Bibliotheken), unwirksam oder anomal sein.</p>
        <p>Daher wird empfohlen, <strong>vorzugsweise explizite Komponenten</strong> (<code>o-if</code>, <code>o-else-if</code>, <code>o-else</code>, <code>o-fill</code>) zu verwenden und nicht explizite Komponenten nur in bestimmten Szenarien einzusetzen.</p>
        <h2>Anwendungsszenario</h2>
        <p>Obwohl nicht-explizite Komponenten eine schlechtere Leistung aufweisen, können sie in den folgenden Szenarien verwendet werden:</p>
        <ol>
          <li><strong>Vermeide zusätzliche DOM-Ebenen</strong>: Wenn du nicht möchtest, dass <code>o-if</code>- oder <code>o-fill</code>-Elemente Teil der DOM-Struktur werden</li>
          <li><strong>Stilvererbung</strong>: Wenn du möchtest, dass innere Elemente direkt die Stile des übergeordneten Containers erben, ohne von Zwischenkomponenten beeinflusst zu werden</li>
          <li><strong>Einschränkungen bei CSS-Selektoren</strong>: Wenn du Eltern-Direktkind-Selektoren (wie <code>.container &gt; .item</code>) verwenden musst, um Stile präzise zu steuern, aber keine zusätzlichen Wrapper-Elemente dazwischen haben willst</li>
        </ol>
