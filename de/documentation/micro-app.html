## Parameterübergabe

In `o-app` unterstützt das Seitenwechseln die Übergabe von Parametern über URL Query, und die Zielseite empfängt diese über den `query`-Parameter der Modulfunktion.

## Seitennavigation

In o-app kann jede Seitenkomponente mit einem `&lt;a&gt;`-Tag mit dem Attribut `olink` für Seitenwechsel verwendet werden. Dieses Tag löst einen Routing-Wechsel in der Anwendung aus, führt Übergangsanimationen aus und aktualisiert nicht die gesamte Seite.

```html
&lt;a href=<span class="hljs-string">&quot;./about.html&quot;</span> olink&gt;Zur Über-Seite springen&lt;/a&gt;</code></pre>
        <p>In der Seitenkomponente kann die Methode <code>back()</code> verwendet werden, um zur vorherigen Seite zurückzukehren:</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">template</span> <span class="hljs-attr">page</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">button</span> <span class="hljs-attr">on:click</span>=<span class="hljs-string">&quot;back()&quot;</span>&gt;</span>Zurück<span class="hljs-tag">&lt;/<span class="hljs-name">button</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">template</span>&gt;</span></code></pre>

      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
