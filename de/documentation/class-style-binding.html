        <h1>Klassen- und Stilbindung</h1>
        <p>In ofa.js können Sie durch dynamisches Binden von Klassennamen, Stilen und Attributen ein flexibles UI-State-Management realisieren. Dadurch passt sich die Benutzeroberfläche automatisch an Änderungen der Daten an.</p>
        <h2>Klassenbindung</h2>
        <p>Klassenbindungen erlauben es dir, CSS-Klassen basierend auf dem Datenzustand dynamisch hinzuzufügen oder zu entfernen. Du kannst die Syntax <code>class:className=&quot;booleanExpression&quot;</code> verwenden, um eine bestimmte Klasse zu binden.</p>
        <p>Wenn <code>booleanExpression</code> <code>true</code> ist, wird der Klassenname zum Element hinzugefügt; wenn <code>false</code> ist, wird der Klassenname entfernt.</p>
        <h3>Basisklassenbindung</h3>
        <o-playground name="Basis-Klassenbindung" style="--editor-height: 500px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
        .hide {
          display: none;
        }
      </style>
      <button on:click="isHide = !isHide">Toggle Display</button>
      <p class="green" class:hide="isHide">{{val}}</p>
      <script>
        export default async () => {
          return {
            data: {
              isHide: false,
              val: "Hello ofa.js Demo Code",
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h3>Mehrere Klassenbindungen</h3>
        <p>Sie können auch mehrere Klassen gleichzeitig binden, sodass das Element je nach unterschiedlichen Bedingungen verschiedene Erscheinungszustände hat.</p>
        <o-playground name="Mehrere Klassen-Bindungen" style="--editor-height: 500px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
        .active {
          background-color: #e6f7ff;
          border: 2px solid #1890ff;
        }
        .disabled {
          opacity: 0.5;
          cursor: not-allowed;
        }
        .highlight {
          font-weight: bold;
          color: #52c41a;
        }
      </style>
      <button on:click="toggleStates">Toggle States</button>
      <p class:active="isActive" class:disabled="isDisabled" class:highlight="isHighlighted">
        Current State - Active: {{isActive}}, Disabled: {{isDisabled}}, Highlighted: {{isHighlighted}}
      </p>
      <script>
        export default async () => {
          return {
            data: {
              isActive: false,
              isDisabled: false,
              isHighlighted: false,
            },
            proto: {
              toggleStates() {
                this.isActive = !this.isActive;
                this.isDisabled = !this.isDisabled;
                this.isHighlighted = !this.isHighlighted;
              }
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Stilbindung</h2>
        <p>Stil-Bindung ermöglicht es dir, die Werte von Inline-Stilen direkt zu setzen und dynamisch zu aktualisieren. ofa.js bietet zwei Arten der Stil-Bindung:</p>
        <h3>Einzelne Stilattributbindung</h3>
        <p>Verwenden Sie die Syntax <code>:style.propertyName</code>, um bestimmte Stilattribute zu binden.</p>
        <o-playground name="Einzelne Stilattributbindung" style="--editor-height: 500px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <p class="green" :style.color="isGreen ? 'green' : 'red'">{{val}}</p>
      <button on:click="isGreen = !isGreen">Farbe umschalten</button>
      <script>
        export default async () => {
          return {
            data: {
              isGreen: false,
              val: "Hallo ofa.js Demo-Code",
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h3>Mehrfache Stilattributbindung</h3>
        <p>Du kannst auch mehrere Stileigenschaften auf einmal binden:</p>
        <o-playground name="Bindung mehrerer Stil-Eigenschaften" style="--editor-height: 500px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <p :style.color="textColor" :style.fontSize="fontSize + 'px'" :style.backgroundColor="bgColor">
        Dynamic Styling Example
      </p>
      <button on:click="changeStyles">Change Styles</button>
      <script>
        export default async () => {
          return {
            data: {
              textColor: 'blue',
              fontSize: 16,
              bgColor: '#f0f0f0'
            },
            proto: {
              changeStyles() {
                this.textColor = this.textColor === 'blue' ? 'red' : 'blue';
                this.fontSize = this.fontSize === 16 ? 20 : 16;
                this.bgColor = this.bgColor === '#f0f0f0' ? '#ffffcc' : '#f0f0f0';
              }
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Attributbindung</h2>
        <p>Neben der Bindung von Klassen und Stilen können Sie auch andere HTML-Attribute dynamisch binden. ofa.js verwendet die Syntax <code>attr:attributeName</code>, um Attributbindungen zu realisieren.</p>
        <h3>Grundlegende Attributbindung</h3>
        <o-playground name="Grundlegende Attributbindung" style="--editor-height: 700px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
        [bg-color="red"]{
            background-color: red;
        }
        [bg-color="green"]{
            background-color: green;
        }
      </style>
      <p attr:bg-color="bgColor" attr:title="tooltipText">{{val}}</p>
      <button on:click="changeColor">Change Color</button>  
      <script>
        export default async () => {
          return {
            data: {
              bgColor: "green",
              tooltipText: "Dies ist eine Hinweisinformation",
              val: "Bewege die Maus über mich, um den Titel zu sehen",
            },
            proto: {
              changeColor() {
                this.bgColor = this.bgColor === "green" ? "red" : "green";
              }
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h3>Boolesche Attribute Behandlung</h3>
        <p>Für boolesche Attribute (wie <code>disabled</code>, <code>hidden</code>) entscheidet ofa.js anhand des Wahrheitswerts des gebundenen Werts, ob das Attribut hinzugefügt wird.</p>
        <o-playground name="Boolesche Attributbehandlung" style="--editor-height: 700px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <input type="text" attr:disabled="isDisabled" placeholder="Hier tippen..." />
      <br /><br />
      <button attr:disabled="isButtonDisabled" on:click="handleButtonClick">Klick mich</button>
      <br /><br />
      <label>
        <input type="checkbox" on:change="toggleAll" /> Alle Zustände umschalten
      </label>
      <script>
        export default async () => {
          return {
            data: {
              isDisabled: false,
              isChecked: true,
              isButtonDisabled: false,
            },
            proto: {
              handleButtonClick() {
                alert('Schaltfläche geklickt!');
              },
              toggleAll(event) {
                const checked = event.target.checked;
                this.isDisabled = checked;
                this.isChecked = checked;
                this.isButtonDisabled = checked;
              }
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>data() Funktion</h2>
        <p>Man kann <code>data(key)</code> im Stil verwenden, um Komponentendaten zu binden. Dies eignet sich hervorragend für Szenarien, in denen der Stil dynamisch basierend auf den Komponentendaten geändert werden muss.</p>
        <o-playground name="Datenfunktion innerhalb von Style-Tags" style="--editor-height: 500px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
        p {
          font-size: 10px;
          color:red;
          transition: all .3s ease;
        }
      </style>
      <style>
        p:hover {
          font-size: data(size);
          color: green;
          transition: all data(time)s ease;
        }
      </style>
      Hover FontSize: <input type="number" sync:value="size" placeholder="Dies ist ein bidirektional gebundenes Eingabefeld" />
      <br />
      TransitionTime: <input type="number" step="0.3" min="0" sync:value="time" placeholder="Dies ist ein bidirektional gebundenes Eingabefeld" />
      <p>{{val}} - size: {{size}}</p>
      <script>
        export default async () => {
          return {
            data: {
              size: 16,
              time: 0.3,
              val: "Hallo ofa.js Demo-Code",
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Hinweise</h2>
        <p>Das <code>data(key)</code> innerhalb des <code>style</code>-Tags ersetzt im Prinzip den gesamten Inhalt des Styles. Um wiederholtes Rendern irrelevante Stile zu vermeiden, wird empfohlen, Stile mit <code>data(key)</code> in einem eigenen <code>style</code>-Tag zu platzieren, während Stile ohne Datenbindung in einen anderen <code>style</code>-Tag ausgelagert werden, um eine bessere Leistung zu erzielen.</p>
        <pre><code class="hljs language-html"><span class="hljs-comment">&lt;!-- ❌ Ein p:hover ohne data(key) wird ebenfalls aktualisiert --&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
  <span class="hljs-selector-tag">p</span> {
    <span class="hljs-attribute">font-size</span>: <span class="hljs-built_in">data</span>(size);
    <span class="hljs-attribute">color</span>:green;
    <span class="hljs-attribute">transition</span>: all <span class="hljs-built_in">data</span>(time)s ease;
  }
  <span class="hljs-selector-tag">p</span><span class="hljs-selector-pseudo">:hover</span>{
    <span class="hljs-attribute">color</span>:red;
  }
</span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
