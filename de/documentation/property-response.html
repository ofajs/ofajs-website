        <h1>Attributantwort</h1>
        <p>Im vorherigen Abschnitt <a href="./property-binding.html" olink="">Attribut-Binding</a> haben wir den einfachen Mechanismus der Attribut-Reaktivität vorgestellt, also wie man den Wert einer Komponenteneigenschaft in einer Textanzeige rendert.</p>
        <p>ofa.js unterstützt nicht nur die Reaktivität von grundlegenden Eigenschaftswerten, sondern auch das reaktive Rendering von inneren Eigenschaftswerten von mehrschichtig verschachtelten Objekten.</p>
        <o-playground name="Beispiel für nicht-reaktive Daten" style="--editor-height: 500px">
          <code>
    <template page="">
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <p style="color: blue;">count: {{count}}</p>
      <p style="color: green;">count2: {{obj.count2}}</p>
      <button on:click="handleAddCount">Erhöhen</button>
      <script>
        export default async () => {
          return {
            data: {
              count: 20,
              obj: {
                count2: 100,
              },
            },
            proto:{
              handleAddCount(){
                this.count++;
                this.obj.count2++;
              }
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>Alle Daten, die an ein ofa.js-Instanzobjekt gebunden werden, werden automatisch in reaktive Daten umgewandelt. Reaktive Daten unterstützen nur primitive Datentypen wie Strings, Zahlen, boolesche Werte, Arrays und Objekte. Für komplexe Datentypen wie Funktionen oder Klasseninstanzen müssen diese als <strong>nicht-reaktive Eigenschaften</strong> gespeichert werden, da Änderungen an diesen Eigenschaften keine erneute Komponentenrenderierung auslösen.</p>
        <h2>Nicht-responsive Daten</h2>
        <p>Manchmal müssen wir Daten speichern, die nicht reaktiv aktualisiert werden müssen, wie beispielsweise Promise-Instanzen, reguläre Ausdrücke oder andere komplexe Objekte. In solchen Fällen müssen nicht-reaktive Eigenschaften verwendet werden. Änderungen an diesen Eigenschaften lösen kein erneutes Rendern der Komponente aus und eignen sich daher für die Speicherung von Daten, die keine Verknüpfung mit der Ansicht erfordern.</p>
        <p>Die Benennung nicht-reaktiver Eigenschaften erfolgt in der Regel durch das Voranstellen eines Unterstrichs <code>_</code> vor den Eigenschaftsnamen, um sie von reaktiven Eigenschaften zu unterscheiden.</p>
        <o-playground name="Beispiel für nicht-reaktive Daten" style="--editor-height: 500px">
          <code>
    <template page="">
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <p style="color: blue;">count: {{count}}</p>
      <p style="color: green;">count2: {{_count2}}</p>
      <button on:click="count++">Blau erhöht</button>
      <button on:click="_count2++">Grün erhöht</button>
      <script>
        export default async () => {
          return {
            data: {
              count: 20,
              _count2: 100,
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>Wenn Sie auf die Schaltfläche <code>Green increments</code> klicken, erhöht sich zwar der Wert von <code>_count2</code> tatsächlich, aber da es sich um eine nicht-reaktive Eigenschaft handelt, wird keine Ansichtsaktualisierung ausgelöst, sodass die Anzeige auf der Benutzeroberfläche unverändert bleibt. Wenn Sie auf die Schaltfläche <code>Blue increases</code> klicken, wird aufgrund der reaktiven Eigenschaft <code>count</code> eine Neuberechnung der gesamten Komponente ausgelöst, und erst dann wird die Anzeige von Green synchron aktualisiert.</p>
        <p>Nicht-reaktive Objektdaten haben eine bessere Leistung als reaktive Objektdaten, da nicht-reaktive Daten keine erneute Renderung der Komponente auslösen.</p>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
