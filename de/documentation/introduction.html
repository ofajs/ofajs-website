        <h1>Einführung</h1>
        <h2>Was ist ofa.js?</h2>
        <p>ofa.js ist ein benutzerfreundliches Web-Frontend-Framework, das speziell für die Entwicklung von Webanwendungen entwickelt wurde, um die Entwicklungseffizienz zu steigern und die Einstiegshürde zu senken.</p>
        <blockquote>
          <p>Wenn Sie mit HTML, CSS und JavaScript <strong>bereits grundlegend vertraut</strong> sind, dann ist ofa.js eine sehr gute Wahl.</p>
        </blockquote>
        <h2>Warum ich ofa.js entwickelt habe</h2>
        <p>Das ursprüngliche Designziel von ofa.js ist einfach: ohne Kompilierungstools die <strong>Engineering</strong>-Probleme der Web-Entwicklung lösen.</p>
        <blockquote>
          <p>Engineering bezeichnet die systematische Integration von Standards, Prozessen, Tools und Methoden im Software-Entwicklungsprozess, um Effizienz, Codequalität und Wartbarkeit zu steigern.</p>
        </blockquote>
        <p>In den letzten zehn Jahren hat die Web-Frontend-Entwicklung eine Entwicklung von anfänglichem wildem Wachstum zu allmählicher Engineerisierung durchgemacht. Dieser Prozess hat von den Erfahrungen der traditionellen Anwendungsentwicklung profitiert und durch die Einführung von Node.js und Kompilierungsprozessen die Engineerierungsprobleme großer Projekte gelöst.</p>
        <p>Wenn das Projekt jedoch größer wird, zeigen sich allmählich die Nachteile dieses Modells, und es treten die Probleme traditioneller Entwicklung auf, nämlich das Problem der <strong>monolithischen Anwendung</strong>, was zu Schwierigkeiten bei der Wartung des Projekts und der Iteration der Interaktionsanforderungen führt.</p>
        <blockquote>
          <p>Monolithische Anwendung (Monolithic Application) bezeichnet eine große und eng gekoppelte Einzelanwendung, bei der alle Funktionsmodule in einer einzigen Codebasis konzentriert sind. Eine Änderung an einer Stelle wirkt sich auf das Ganze aus, und eine unabhängige Entwicklung und Bereitstellung ist schwierig.</p>
        </blockquote>
        <p>In diesem Moment muss das Projekt zerlegt und in Mikro-Frontends umgewandelt werden, ähnlich wie bei <strong>Microservices</strong>. Durch die Kompilierung wird Micro-Frontend jedoch schwierig und umständlich; die eigenständige Bereitstellung von Frontend-Modulen erfordert die Kompilierung jedes einzelnen kleinen Moduls, was sehr schwierig ist und die Entwicklung von Web-Frontend-Technologien nahezu zum Stillstand bringt.</p>
        <blockquote>
          <p>Microservices sind ein Softwarearchitekturstil, der große, komplexe Anwendungen in mehrere feinkörnige, unabhängig bereitstellbare und laufende kleine Dienste aufteilt.</p>
        </blockquote>
        <p>Zu diesem Zeitpunkt begann ich nachzudenken: Traditionelle Programmiersprachen müssen mit unterschiedlicher Hardware und Betriebssystemen umgehen, daher müssen sie durch Kompilierung plattformunabhängig gemacht werden. Aber die Webentwicklung ist anders – sie basiert auf Browsern, benötigt von Haus aus keine Kompilierung, kann unabhängig ausgeführt und bereitgestellt werden und ist von Natur aus ein Micro-Frontend-Modell. So wurde mir klar, dass es der Kompilierungsprozess ist, der die Dinge komplizierter macht.</p>
        <p>Das bedeutet, dass sich die Frontend-Entwicklung dann gut für die Entwicklung großer Anwendungen eignet, wenn die Engineering-Probleme gelöst sind und der obligatorische Schritt der Kompilierung entfällt – das ist das natürliche Micro-Frontend-Muster. So entstand ofa.js.</p>
        <h2>Kernvorteile</h2>
        <h3>Null Hürden, sofort einsatzbereit</h3>
        <p>Keine Einrichtung der Entwicklungsumgebung, Installation von Abhängigkeiten oder Konfiguration von Gerüsten erforderlich. Öffnen Sie das offizielle Build-Programm im Browser, wählen Sie ein lokales Verzeichnis aus und beginnen Sie mit der Entwicklung. Alle Berechnungen, Daten- und Speichervorgänge werden lokal ausgeführt, ohne Abhängigkeit von Cloud-Diensten.</p>
        <h3>KI-freundlich, leicht zu verifizieren</h3>
        <p>Keine Black-Box-Kompilierung; der von der KI erzeugte Code kann schnell bereitgestellt und selbst validiert werden. Durch die Reduzierung von Zwischenschichten und das Umgehen des Kompilierungsprozesses wird die Fehlerlokalisierung und -behebung erleichtert.</p>
        <h3>Native Unterstützung für Mikro-Frontends</h3>
        <p>ofa.js ermöglicht es, Web-Front-End-Entwicklung wie Microservices in viele unabhängige Module aufzuspalten, die jeweils separat entwickelt und deployed werden können. Sobald die Grenzen klassischer Web-Front-Ends durchbrochen sind, wird Front-End-Technologie schrittweise die Beschränkungen von Servertechnologien überwinden.</p>

          <li>Wenn Sie Anfänger sind, wird empfohlen, mit <a href="./create-first-app.html" olink="">Erstellen der ersten App</a> zu beginnen.</li>
        </ul>
