        <h1>Single-Page-Anwendung</h1>
        <p>Eine Single-Page-Anwendung bindet die <code>o-app</code>-Komponente an die Adressleiste des Browsers, sodass die URL der Webseite mit den Seitenpfaden innerhalb der Anwendung synchron bleibt. Nach dem Aktivieren der Single-Page-Anwendung:</p>
        <ul>
          <li>Das Aktualisieren der Webseite kann den aktuellen Routenstatus beibehalten.</li>
          <li>Durch Kopieren der URL in der Adressleiste und Öffnen in einem anderen Browser oder Tab kann der Anwendungsstatus ebenfalls wiederhergestellt werden.</li>
          <li>Die Vorwärts-/Rückwärts-Schaltflächen des Browsers funktionieren normal.</li>
        </ul>
        <h2>Grundlegende Verwendung</h2>
        <p>Verwenden Sie die offizielle <code>o-router</code>-Komponente, um die <code>o-app</code>-Komponente zu umschließen, und schon erhalten Sie eine Single-Page-Anwendung.</p>

        <h2>fix-body Eigenschaft</h2>
        <p>Fügen Sie das Attribut <code>fix-body</code> hinzu, dann wird <code>o-router</code> automatisch die Stile von <code>html</code> und <code>body</code> zurücksetzen und die standardmäßigen Ränder und Abstände entfernen.</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">o-router</span> <span class="hljs-attr">fix-body</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">o-app</span> <span class="hljs-attr">src</span>=<span class="hljs-string">&quot;./app-config.js&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-app</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">o-router</span>&gt;</span></code></pre>
        <p>Dies ist besonders nützlich in den folgenden Szenarien:- Erfordert, dass <code>o-app</code> den Viewport vollständig ausfüllt</p>
        <ul>
          <li>Wenn die Anwendung der einzige Inhalt der Seite ist</li>
        </ul>

        <h2>Funktionsweise</h2>
        <p>Implementierung des browserbasierten Hash-Modus für Single-Page-Anwendungen:</p>
        <ol>
          <li>Wenn innerhalb der Anwendung ein Seitenwechsel stattfindet, aktualisiert <code>o-router</code> automatisch den Hash-Wert in der Adressleiste (z. B. <code>#/about.html</code>).</li>
          <li>Wenn der Benutzer die Seite aktualisiert oder über eine URL darauf zugreift, liest <code>o-router</code> den Hash-Wert und lädt die entsprechende Seite.</li>
          <li>Die Vorwärts-/Rückwärts-Schaltflächen des Browsers lösen eine Änderung des Hash-Werts aus und steuern so die Seitennavigation der Anwendung.</li>
        </ol>
        <h2>URL-Änderungsbeispiele</h2>
        <p>Angenommen, die Anwendung hat zwei Seiten: <code>home.html</code> und <code>about.html</code>:</p>
        <table>
          <thead>
            <tr>
              <th>Benutzeraktion</th>
              <th>Adressleistenänderung</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>App öffnen</td>
              <td><code>index.html</code> → <code>index.html#/home.html</code></td>
            </tr>
            <tr>
              <td>Zur Über-Seite navigieren</td>
              <td><code>index.html#/home.html</code> → <code>index.html#/about.html</code></td>
            </tr>
            <tr>
              <td>Zurück klicken</td>
              <td><code>index.html#/about.html</code> → <code>index.html#/home.html</code></td>
            </tr>
            <tr>
              <td>Seite aktualisieren</td>
              <td>Aktuellen Hash beibehalten</td>
            </tr>
          </tbody>
        </table>
        <ul>
          <li>Ein Single-Page-Application kann nur mit <strong>einer</strong> <code>o-app</code>-Komponente verwendet werden</li>
        </ul>
