        <h1>SSR und Isomorphic Rendering</h1>
        <blockquote>
          <p>Wenn Sie nicht wissen, was SSR ist, bedeutet das, dass Sie es derzeit nicht benötigen. Sie können dieses Kapitel überspringen und später darauf zurückkommen, wenn Sie es brauchen.</p>
        </blockquote>
        <h2>Isomorphes Rendering</h2>
        <p>Um sowohl das flüssige CSR-Erlebnis beizubehalten, eine bessere Erkennung durch Maschinen-Crawler (SEO) zu ermöglichen als auch eine freiere Wahl der Backend-Entwicklungssprache zu bieten, bietet ofa.js einen einzigartigen isomorphen Rendering-Modus (Symphony Client-Server Rendering).</p>
        <blockquote>
          <p>Wenn Sie die genauen Definitionen und Unterschiede von CSR / SSR / SSG verstehen möchten, lesen Sie bitte direkt den letzten Abschnitt dieses Artikels.</p>
        </blockquote>
        <p>Die Kernidee des isomorphen Renderings ist:- Rendern Sie die ursprüngliche Seite auf dem Server, um SEO und Ladegeschwindigkeit beim ersten Bildschirm zu gewährleisten</p>
        <ul>
          <li>Übernehmen Sie die Routing-Verarbeitung auf der Client-Seite, um ein flüssiges CSR-Benutzererlebnis zu bewahren</li>
          <li>Geeignet für jede Serverumgebung, echtes isomorphes Rendering verwirklichen</li>
        </ul>
        <h3>Prinzip der isomorphen Rendering-Implementierung</h3>
        <p>Das isomorphe Render-Modell von ofa.js basiert auf folgenden Mechanismen:</p>
        <ol>
          <li>Der Server generiert eine vollständige HTML-Seite mit einer universellen Laufzeitstruktur</li>
          <li>Der Client lädt die CSR-Laufzeit-Engine</li>
          <li>Automatische Erkennung der aktuellen Laufzeitumgebung zur Bestimmung der Rendering-Strategie</li>
        </ol>

        <h3>Isomorphes Rendering-Vorlagenstruktur</h3>
        <p>Um das isomorphe Rendering-Modell zu implementieren, verwenden Sie auf der Serverseite einfach die folgende allgemeine Template-Struktur:</p>

        <p><strong>Hinweis:</strong> Der vom Server zurückgegebene HTML-Code muss den korrekten HTTP-Header gesetzt haben: <code>Content-Type: text/html; charset=UTF-8</code></p>
        <p><code>scsr.mjs</code> ist die von ofa.js bereitgestellte isomorphe Rendering-Laufzeit-Engine. Sie erkennt automatisch die Rendering-Strategie basierend auf dem aktuellen Seitenstatus und stellt sicher, dass in jeder Umgebung die bestmögliche Benutzererfahrung geboten wird.</p>
        <p>Auch SSG kann diese Struktur verwenden, um statische Website-Generierung zu implementieren.</p>
        <h2>Unterschiede zwischen ofa.js, SSR und anderen Frontend-Frameworks</h2>
        <p>Das Symphony Client-Server Rendering (im Folgenden SCSR) von ofa.js ist im Wesentlichen ebenfalls ein SSR-Modus.</p>
        <p>Im Vergleich zu SSR-Lösungen bestehender Frontend-Frameworks wie Vue, React und Angular liegt der größte Vorteil von ofa.js darin, <strong>dass keine zwingende Bindung an Node.js erforderlich ist</strong>. Das bedeutet, dass jede serverseitige Template-Rendering-Engine (wie z.B. Smarty für PHP, Jinja2 für Python, Thymeleaf für Java usw.) ofa.js problemlos integrieren kann, um SSR zu realisieren.</p>
        <h2>Überblick über Webseiten-Rendering-Methoden</h2>
        <p>Moderne Webanwendungen verfügen über vier Haupt-Renderverfahren: traditionelles serverseitiges Template-Engine-Rendering, CSR (Client-Side-Rendering, clientseitiges Rendern), SSR (Server-Side-Rendering, serverseitiges Rendern) und SSG (Static Site Generation, statische Website-Generierung). Jede Methode hat ihre eigenen Vorteile und Einsatzszenarien.</p>
        <h3>Traditionelle serverseitige Template-Engine-Rendering</h3>
        <p>Unter den zahlreichen Web-Produkten ist die serverseitige Template-Engine nach wie vor das vorherrschende Mittel zur Seiten-Rendering. Back-End-Sprachen wie Go oder PHP nutzen eingebaute oder Drittanbieter-Template-Engines (z. B. Gos <code>html/template</code>, PHPs Smarty/Twig/Blade usw.), um dynamische Daten in HTML-Templates einzuspeisen, in einem Schritt eine vollständige HTML-Seite zu erzeugen und an den Client zurückzugeben.</p>
        <p><strong>Vorteile:</strong>- SEO-freundlich, schnelles Laden des ersten Bildschirms</p>
        <ul>
          <li>Serverseitige Steuerung, hohe Sicherheit</li>
          <li>Geringere Anforderungen an den Tech-Stack des Teams, Backend-Entwickler können die Entwicklung unabhängig abschließen</li>
        </ul>
        <p><strong>Nachteile:</strong>- Schlechte Benutzererfahrung, jede Interaktion erfordert eine Seitenaktualisierung</p>
        <ul>
          <li>Hohe Belastung des Servers</li>
          <li>Hohe Kopplung zwischen Frontend und Backend, ungünstig für Arbeitsteilung und Zusammenarbeit</li>
        </ul>
        <h3>CSR (Client-seitiges Rendering)</h3>
        <p>Im CSR-Modus wird der Seiteninhalt vollständig durch clientseitiges JavaScript gerendert. Die <a href="./routes.html" olink="">Single-Page-Anwendung</a> von ofa.js ist eine typische CSR-Implementierung. Diese Methode bietet ein flüssiges Nutzererlebnis, bei dem alle Interaktionen ohne Seitenwechsel abgeschlossen werden können. Single-Page-Anwendungen (SPAs), die mit React oder Vue in Kombination mit den entsprechenden Routing-Bibliotheken (wie React Router oder Vue Router) entwickelt wurden, sind ebenfalls typische CSR-Implementierungen.</p>
        <p><strong>Vorteile:</strong>- Die Benutzererfahrung ist flüssig, Seitenwechsel erfolgen ohne Neuladen</p>
        <ul>
          <li>Starke Client-seitige Verarbeitungsleistung, schnelle Reaktionszeiten</li>
        </ul>
        <p><strong>Nachteile:</strong>- Nachteilig für SEO, Suchmaschinen haben Schwierigkeiten, den Inhalt zu indexieren</p>
        <h3>SSR (Server-Side Rendering)</h3>
        <p>Während die flüssige CSR-Erfahrung beibehalten wird, wird die Seite nun in Echtzeit vom Server gerendert: Wenn ein Benutzer eine Anfrage stellt, generiert der Server sofort vollständiges HTML und liefert es zurück, um echtes serverseitiges Rendering zu erreichen.</p>
        <p><strong>Vorteile:</strong>- SEO-freundlich, schnelles Laden der ersten Ansicht</p>
        <ul>
          <li>Unterstützung für dynamische Inhalte</li>
        </ul>
        <p><strong>Nachteile:</strong>- Hohe Serverbelastung</p>
        <ul>
          <li>Erfordert in der Regel eine Node.js-Umgebung als Laufzeitumgebung oder zumindest eine Node.js-Zwischenschicht</li>
          <li>Eine vollständige Interaktion erfordert immer noch eine nachfolgende Client-Aktivierung</li>
        </ul>
        <h3>SSG (Statische Seitengenerierung)</h3>
        <p>Alle Seiten werden in der Build-Phase als statische HTML-Dateien vorgerendert und können nach dem Deployment direkt vom Server an die Benutzer zurückgegeben werden.</p>
        <p><strong>Vorteile:</strong>- Schnelle Ladezeit beim ersten Aufruf, SEO-freundlich</p>
        <ul>
          <li>Geringe Serverlast, stabile Leistung</li>
          <li>Hohe Sicherheit</li>
        </ul>
        <p><strong>Nachteile:</strong>- Schwierigkeiten bei der Aktualisierung dynamischer Inhalte</p>
        <ul>
          <li>Die Bauzeit nimmt mit der Anzahl der Seiten zu</li>
        </ul>
