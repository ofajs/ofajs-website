        <h1>SSR und isomorphes Rendering</h1>
        <blockquote>
          <p>Wenn du nicht weißt, was SSR ist, bedeutet das, dass du es derzeit noch nicht benötigst. Du kannst dieses Kapitel überspringen und später darauf zurückkommen, wenn du es brauchst.</p>
        </blockquote>
        <h2>Isomorphes Rendering</h2>
        <p>Um gleichzeitig die reibungslose CSR-Erfahrung, eine bessere Erkennung durch Webcrawler (SEO) und mehr Freiheit bei der Wahl der Backend-Programmiersprache zu gewährleisten, bietet ofa.js einen einzigartigen Modus für isomorphes Rendering (Symphony Client-Server Rendering).</p>
        <blockquote>
          <p>Um die spezifischen Definitionen und Unterschiede von CSR / SSR / SSG zu verstehen, lesen Sie bitte direkt das Kapitel am Ende dieses Artikels.</p>
        </blockquote>
        <p>Die Kernidee des isomorphen Renderings ist:- Rendern des initialen Seiteninhalts auf dem Server, um SEO und Ladegeschwindigkeit der ersten Seite zu gewährleisten</p>
        <ul>
          <li>Übernahme der Routenverarbeitung auf dem Client, um eine flüssige Benutzererfahrung wie bei CSR zu erhalten</li>
          <li>Anwendbar in jeder Serverumgebung für echtes isomorphes Rendering</li>
        </ul>
        <h3>Das Prinzip der Implementierung von isomorphem Rendering</h3>
        <p>Das isomorphe Rendering-Modell von ofa.js basiert auf dem folgenden Mechanismus:</p>
        <ol>
          <li>Der Server generiert eine vollständige HTML-Seite mit einer universellen Laufzeitstruktur</li>
          <li>Der Client lädt die CSR-Laufzeit-Engine</li>
          <li>Die aktuelle Laufzeitumgebung wird automatisch erkannt, um das Rendering-Verfahren zu bestimmen</li>
        </ol>

        <p><code>scsr.mjs</code> ist die von ofa.js bereitgestellte isomorphe Rendering-Engine, die automatisch die Renderstrategie basierend auf dem aktuellen Seitenstatus bestimmt, um unter allen Umgebungen ein optimales Benutzererlebnis zu gewährleisten.</p>
        <p>Gleichermaßen kann SSG diese Struktur auch anwenden, um statische Websites zu generieren.</p>
        <h2>ofa.js und SSR sowie Unterschiede zu anderen Frontend-Frameworks</h2>
        <p>Die Symphony Client-Server Rendering (im Folgenden als SCSR bezeichnet) von ofa.js ist im Wesentlichen ebenfalls ein SSR-Modus.</p>
        <p>Im Vergleich zu den SSR-Lösungen bestehender Frontend-Frameworks wie Vue, React, Angular usw. liegt der größte Vorteil von ofa.js darin, <strong>dass es nicht zwingend an Node.js gebunden ist</strong>. Dies bedeutet, dass jede beliebige Backend-Template-Engine (wie Smarty für PHP, Jinja2 für Python, Thymeleaf für Java usw.) problemlos ofa.js integrieren kann, um SSR zu realisieren.</p>
        <h2>Übersicht der Webseiten-Rendering-Methoden</h2>
        <p>Moderne Webanwendungen verwenden hauptsächlich vier Rendering-Methoden: traditionelles serverseitiges Template-Engine-Rendering, CSR (Client Side Rendering, clientseitiges Rendering), SSR (Server Side Rendering, serverseitiges Rendering) und SSG (Static Site Generation, statische Seitengenerierung). Jede Methode hat ihre Vorteile und geeigneten Anwendungsszenarien.</p>
        <h3>Rendering mit traditionellen serverseitigen Template-Engines</h3>
        <p>In zahlreichen Webprodukten sind serverseitige Template-Engines nach wie vor die gängigste Methode zur Seitendarstellung. Backend-Sprachen wie Go und PHP nutzen integrierte oder Drittanbieter-Template-Engines (z. B. Go's <code>html/template</code>, PHPs Smarty/Twig/Blade usw.), um dynamische Daten in HTML-Templates einzufügen, eine vollständige HTML-Seite zu generieren und an den Client zurückzugeben.</p>
        <p><strong>Vorteile:</strong>- SEO-freundlich, schnelles Laden des ersten Bildschirminhalts </p>
        <ul>
          <li>Servergesteuert, höhere Sicherheit </li>
          <li>Geringere Anforderungen an den Technologie-Stack des Teams, Backend-Entwickler können die Entwicklung eigenständig abschließen</li>
        </ul>
        <p><strong>Nachteile：</strong>- Schlechte Benutzererfahrung, bei jeder Interaktion ist ein Seiten-Refresh erforderlich</p>
        <ul>
          <li>Hohe Serverlast</li>
          <li>Hohe Kopplung zwischen Frontend und Backend, erschwert die Arbeitsteilung</li>
        </ul>
        <h3>CSR (Client-Side Rendering)</h3>
        <p>Im CSR-Modus werden die Seiteninhalte vollständig vom clientseitigen JavaScript gerendert. Die <a href="./routes.html" olink="">Single-Page-Anwendung</a> von ofa.js ist eine typische CSR-Implementierung. Diese Methode bietet ein flüssiges Benutzererlebnis, bei dem alle Interaktionen ohne Seitenwechsel erfolgen. Single-Page-Anwendungen (SPAs), die mit React oder Vue in Verbindung mit den entsprechenden Routing-Bibliotheken (wie React Router oder Vue Router) entwickelt wurden, sind ebenfalls typische CSR-Implementierungen.</p>
        <p><strong>Vorteile:</strong>- Flüssige Benutzererfahrung, Seitenwechsel ohne Neuladen</p>
        <ul>
          <li>Starke Client-Verarbeitungsfähigkeit, schnelle Reaktion</li>
        </ul>
        <p><strong>Nachteile：</strong>- nachteilig für SEO，Suchmaschinen haben Schwierigkeiten, den Inhalt zu indexieren</p>
        <h3>SSR（Serverseitiges Rendern）</h3>
        <p>Beibehaltung der flüssigen CSR-Erfahrung bei gleichzeitigem Echtzeit-Rendering der Seite auf dem Server: Sobald der Nutzer eine Anfrage stellt, erzeugt der Server sofort vollständiges HTML und sendet es zurück – echtes Server-Side Rendering.</p>
        <p><strong>Vorteile:</strong>- SEO-freundlich, schnelles Laden des oberen Bildbereichs</p>
        <ul>
          <li>Unterstützung für dynamische Inhalte</li>
        </ul>
        <p><strong>Nachteile：</strong>- Hohe Serverlast</p>
        <ul>
          <li>In der Regel wird eine Node.js-Umgebung als Laufzeit benötigt, oder zumindest eine Node.js-Middleware-Schicht</li>
          <li>Es ist dennoch eine nachfolgende Client-Aktivierung erforderlich, um vollständige Interaktion zu erreichen</li>
        </ul>
        <h3>SSG (Static Site Generation)</h3>
        <p>In der Build-Phase werden alle Seiten vorab als statische HTML-Dateien gerendert, die nach der Bereitstellung direkt vom Server an den Benutzer zurückgegeben werden können.</p>
        <p><strong>Vorteile:</strong>- Schnelle Erstladezeit, SEO-freundlich</p>
        <ul>
          <li>Geringe Serverlast, stabile Leistung</li>
          <li>Hohe Sicherheit</li>
        </ul>
        <p><strong>Nachteile：</strong>- Schwierigkeiten bei der Aktualisierung dynamischer Inhalte</p>
        <ul>
          <li>Die Build-Zeit erhöht sich mit der Anzahl der Seiten</li>
        </ul>
