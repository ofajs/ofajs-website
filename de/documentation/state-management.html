        <h1>Zustandsverwaltung</h1>
        <h2>Was ist Zustand</h2>
        <p>In ofa.js bezeichnet <strong>Status</strong> das <code>data</code>-Attribut einer Komponente oder Seitenmoduls selbst. Dieser Status kann nur innerhalb der aktuellen Komponente verwendet werden, um interne Daten der Komponente zu speichern und zu verwalten.</p>
        <p>Wenn mehrere Komponenten oder Seiten dieselben Daten gemeinsam nutzen müssen, werden Daten traditionell durch Ereignisweitergabe oder schrittweise Props-Weitergabe übergeben. Diese Methode führt in komplexen Anwendungen zu schwer wartbarem Code. Daher ist eine <strong>Zustandsverwaltung</strong> erforderlich – durch die Definition eines gemeinsamen Zustandsobjekts, auf das mehrere Komponenten oder Seitenmodule zugreifen und dieses ändern können, wird eine gemeinsame Nutzung des Zustands ermöglicht.</p>
        <blockquote>
          <p><strong>Tipp</strong>: Statusverwaltung eignet sich für Szenarien, in denen Daten über Komponenten und Seiten hinweg geteilt werden müssen, wie z. B. Benutzerinformationen, Warenkorb, Theme-Konfiguration, globale Einstellungen etc.</p>
        </blockquote>
        <h2>Generieren des Statusobjekts</h2>
        <p>Erstellen Sie mit <code>$.stanz({})</code> ein reaktives Zustandsobjekt. Diese Methode nimmt ein einfaches Objekt als Ausgangsdaten entgegen und gibt einen reaktiven Zustandsproxy zurück.</p>

        <h2>Eigenschaften des Zustandsobjekts</h2>
        <h3>1. Reaktives Update</h3>
        <p><code>$.stanz()</code> erzeugte Statusobjekte sind reaktiv. Wenn sich die Statusdaten ändern, werden alle Komponenten, die diese Daten referenzieren, automatisch aktualisiert.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> store = $.<span class="hljs-title function_">stanz</span>({ <span class="hljs-attr">count</span>: <span class="hljs-number">0</span> });

<span class="hljs-comment">// In der Komponente</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> {
  <span class="hljs-attr">data</span>: {
    <span class="hljs-attr">store</span>: {}
  },
  <span class="hljs-attr">proto</span>:{
    <span class="hljs-title function_">increment</span>(<span class="hljs-params"></span>) {
        store.<span class="hljs-property">count</span>++; <span class="hljs-comment">// Alle Komponenten, die store.count referenzieren, werden automatisch aktualisiert</span>
    }
  },
  <span class="hljs-title function_">attached</span>(<span class="hljs-params"></span>) {
    <span class="hljs-comment">// Direktes Referenzieren der Eigenschaften des Zustandsobjekts</span>
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">store</span> = store;
  },
  <span class="hljs-title function_">detached</span>(<span class="hljs-params"></span>){
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">store</span> = {}; <span class="hljs-comment">// Beim Zerstören der Komponente die gemounteten Zustandsdaten leeren</span>
  }
};</code></pre>
        <h3>2. Tiefe Responsivität</h3>
        <p>Zustandsobjekte unterstützen tiefe Reaktivität, Änderungen in verschachtelten Objekten und Arrays werden ebenfalls überwacht.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> store = $.<span class="hljs-title function_">stanz</span>({
  <span class="hljs-attr">user</span>: {
    <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;Zhang San&quot;</span>,
    <span class="hljs-attr">settings</span>: {
      <span class="hljs-attr">theme</span>: <span class="hljs-string">&quot;dark&quot;</span>
    }
  },
  <span class="hljs-attr">list</span>: []
});

<span class="hljs-comment">// Das Ändern verschachtelter Eigenschaften löst ebenfalls Aktualisierungen aus</span>
store.<span class="hljs-property">user</span>.<span class="hljs-property">name</span> = <span class="hljs-string">&quot;Li Si&quot;</span>;
store.<span class="hljs-property">user</span>.<span class="hljs-property">settings</span>.<span class="hljs-property">theme</span> = <span class="hljs-string">&quot;light&quot;</span>;
store.<span class="hljs-property">list</span>.<span class="hljs-title function_">push</span>({ <span class="hljs-attr">id</span>: <span class="hljs-number">1</span>, <span class="hljs-attr">title</span>: <span class="hljs-string">&quot;Neue Aufgabe&quot;</span> });</code></pre>
        <h2>Beste Praktiken</h2>
        <h3>1. Status beim attached-Zyklus des Components mounten</h3>
        <p>Es wird empfohlen, den gemeinsamen Zustand im <code>attached</code>-Lebenszyklus der Komponente zu mounten.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> {
  <span class="hljs-attr">data</span>: {
    <span class="hljs-attr">list</span>: []
  },
  <span class="hljs-title function_">attached</span>(<span class="hljs-params"></span>) {
    <span class="hljs-comment">// Den gemeinsamen Zustand in die data der Komponente einhängen</span>
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">list</span> = data.<span class="hljs-property">list</span>;
  },
  <span class="hljs-title function_">detached</span>(<span class="hljs-params"></span>) {
    <span class="hljs-comment">// Beim Zerstören der Komponente den eingehängten Zustand leeren, um Speicherlecks zu verhindern</span>
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">list</span> = [];
  }
};</code></pre>
        <h3>2. Sinnvolle Verwaltung des Zustandsbereichs</h3>
        <ul>
          <li><strong>Globaler Zustand</strong>: Geeignet für Daten, auf die die gesamte Anwendung zugreifen muss (z. B. Benutzerinformationen, globale Konfiguration)</li>
          <li><strong>Modulzustand</strong>: Geeignet für Daten, die innerhalb eines bestimmten Funktionsmoduls gemeinsam genutzt werden</li>
        </ul>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// Globaler Aufrufzustand</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> globalStore = $.<span class="hljs-title function_">stanz</span>({ <span class="hljs-attr">user</span>: <span class="hljs-literal">null</span>, <span class="hljs-attr">theme</span>: <span class="hljs-string">&quot;light&quot;</span> });

<span class="hljs-comment">// Im Modul verwendeter Zustand</span>
<span class="hljs-keyword">const</span> cartStore = $.<span class="hljs-title function_">stanz</span>({ <span class="hljs-attr">total</span>: <span class="hljs-number">0</span> });</code></pre>

        <h2>Hinweise</h2>
        <ol>
          <li>
            <p><strong>Zustandsbereinigung</strong>: Entfernen Sie rechtzeitig Verweise auf Zustandsobjekte im <code>detached</code>-Lebenszyklus der Komponente, um Speicherlecks zu vermeiden.</p>
          </li>
          <li>
            <p><strong>Vermeidung zirkulärer Abhängigkeiten</strong>: Bilden Sie keine zirkulären Referenzen zwischen Zustandsobjekten, da dies zu Problemen im reaktiven System führen kann.</p>
          </li>
          <li>
            <p><strong>Große Datenstrukturen</strong>: Verwenden Sie für große Datenstrukturen berechnete Eigenschaften oder verwalten Sie diese in Teilen, um unnötige Leistungseinbußen zu vermeiden.</p>
          </li>
          <li>
            <p><strong>Zustandskonsistenz</strong>: Achten Sie bei asynchronen Operationen auf die Konsistenz des Zustands und verwenden Sie Transaktionen oder Batch-Updates, um die Datenintegrität zu gewährleisten.</p>
          </li>
        </ol>
