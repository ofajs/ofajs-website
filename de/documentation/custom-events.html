        <h1>Benutzerdefinierte Ereignisse</h1>
        <p>In ofa.js können Sie neben den integrierten DOM-Ereignissen auch benutzerdefinierte Ereignisse erstellen und verwenden, um die Kommunikation zwischen Komponenten zu ermöglichen. Benutzerdefinierte Ereignisse sind ein wichtiger Mechanismus in der komponentenbasierten Entwicklung, da sie es Komponenten ermöglichen, Nachrichten oder Statusänderungen nach oben zu übertragen.</p>
        <h2>emit-Methode - Benutzerdefinierte Ereignisse auslösen</h2>
        <p>Die Methode <code>emit</code> wird verwendet, um benutzerdefinierte Ereignisse auszulösen und Zustandsänderungen innerhalb der Komponente oder Benutzeraktionen an externe Beobachter zu melden.</p>
        <h3>Grundlegende Verwendung</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// Ein einfaches benutzerdefiniertes Ereignis auslösen</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-title function_">emit</span>(<span class="hljs-string">'custom-event'</span>);

<span class="hljs-comment">// Ein benutzerdefiniertes Ereignis mit Daten auslösen</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-title function_">emit</span>(<span class="hljs-string">'data-changed'</span>, {
  <span class="hljs-attr">data</span>: {
    <span class="hljs-comment">// Benutzerdefinierte Daten, beliebige Struktur je nach Anforderungen</span>
    <span class="hljs-attr">newValue</span>: <span class="hljs-number">100</span>,
    <span class="hljs-attr">oldValue</span>: <span class="hljs-number">50</span>
  }
});</code></pre>
        <h3>emit-Methode Parameter</h3>
        <p>Die <code>emit</code>-Methode akzeptiert zwei Parameter:</p>
        <ol>
          <li><strong>Ereignisname</strong>: Zeichenkette, die den Namen des auszulösenden Ereignisses angibt</li>
          <li><strong>Optionsobjekt</strong> (optional): Enthält Konfigurationsoptionen für das Ereignis<ul>
              <li><code>data</code>: zu übermittelnde Daten</li>
              <li><code>bubbles</code>: Boolescher Wert, steuert, ob das Ereignis bubblen soll (Standardwert ist true)</li>
              <li><code>composed</code>: Boolescher Wert, steuert, ob das Ereignis Shadow-DOM-Grenzen überwinden kann</li>
              <li><code>cancelable</code>: Boolescher Wert, steuert, ob das Ereignis abgebrochen werden kann</li>
            </ul>
          </li>
        </ol>
        <p>Dann kann das übergeordnete Element dieses benutzerdefinierte Ereignis mit der <code>on</code>-Methode <a href="./event-binding.html" olink="">(Ereignisbindung)</a> überwachen.</p>

        <h2>bubbles - Ereignisblasen-Mechanismus</h2>
        <p>Das <code>bubbles</code>-Attribut steuert, ob ein Ereignis zu übergeordneten Elementen aufsteigt (bubbling). Wenn es auf <code>true</code> gesetzt ist, breitet sich das Ereignis im DOM-Baum nach oben aus. Der Standardwert ist <code>true</code>. Wenn es auf <code>false</code> gesetzt wird, wird das Ereignis nicht aufsteigen.</p>
        <h3>Detaillierte Erklärung des Bubble-Mechanismus</h3>
        <ul>
          <li><strong>Standardverhalten</strong>: Mit <code>emit</code> ausgelöste Ereignisse haben standardmäßig Blasen aktiviert (<code>bubbles: true</code>)</li>
          <li><strong>Blasenpfad</strong>: Das Ereignis beginnt beim auslösenden Element und verbreitet sich stufenweise nach oben</li>
          <li><strong>Blasen stoppen</strong>: Der Aufruf von <code>event.stopPropagation()</code> im Ereignis-Handler verhindert das Weiterblasen</li>
        </ul>
        <h3>Blasensortierungsbeispiel</h3>
        <o-playground name="Benutzerdefinierte Ereignis-Beispiel" style="--editor-height: 500px">

      <div on:child-event="handleChildEventFromComponent">
        <bubble-component on:child-event="handleDirectChildEvent"></bubble-component>
      </div>
      <p>Äußerer Container (hört Bubbling-Ereignis): {{bubbledEventCount}} mal</p>
      <p>Inneres Komponente (hört direktes Ereignis): {{directEventCount}} mal</p>
      <p>Empfangene Daten: <span style="color:red;">{{result}}</span></p>
      <script>
        export default async () => {
          return {
            data: {
              result:"-",
              bubbledEventCount: 0,
              directEventCount: 0
            },
            proto: {
              handleDirectChildEvent(event) {
                this.directEventCount++;
                this.result = event.data;
              },
              handleChildEventFromComponent(event) {
                this.bubbledEventCount++;
                this.result = event.data;
              },
            }
          };
        };
      </script>
    </template>
  </code>

    <template component="">
      <style>
        :host {
          display: block;
          padding: 15px;
          border: 1px solid green;

      </style>
      <button on:click="triggerNonBubblingEvent">Nicht-Bubbling-Ereignis auslösen</button>
      <button on:click="triggerBubblingEvent">Bubbling-Ereignis auslösen</button>
      <script>
        export default async () => {
          return {
            tag: "bubble-component",
            proto: {
              triggerNonBubblingEvent() {
                // Nicht-Bubbling-Ereignis, wird nur vom direkten Listener erfasst
                this.emit('child-event', {
                  data: { type: 'non-bubbling', message: 'Nicht-Bubbling-Ereignis ausgelöst', timestamp: Date.now() },
                  bubbles: false
                });
              },
              triggerBubblingEvent() {
                // Bubbling-Ereignis, wird zum Elternelement hochpropagiert
                this.emit('child-event', {
                  data: { type: 'bubbling', message: 'Bubbling-Ereignis ausgelöst', timestamp: Date.now() },
                  bubbles: true
                });
              }
            }
          };
        };
      </script>
    </template>
  </code>

        <h2>composed - Durchdringung der Shadow DOM-Grenze</h2>
        <p>Das <code>composed</code>-Attribut steuert, ob Ereignisse die Shadow-DOM-Grenze passieren können. Dies ist besonders wichtig für die Web Components-Entwicklung, der Standardwert ist <code>false</code>.</p>
        <h3>Durchdringungsmechanismus im Detail</h3>
        <ul>
          <li><strong>Shadow DOM-Isolierung</strong>: Standardmäßig können Ereignisse nicht über Shadow DOM-Grenzen hinweggehen</li>
          <li><strong>Durchdringung aktivieren</strong>: Setzen Sie <code>composed: true</code>, um Ereignissen das Durchqueren von Shadow DOM-Grenzen zu ermöglichen</li>
          <li><strong>Anwendungsfälle</strong>: Wenn eine Komponente Ereignisse an die Host-Umgebung senden muss, muss <code>composed: true</code> gesetzt werden</li>
        </ul>
