      <article class="markdown-body">
        <h1>Erste Anwendung erstellen</h1>
        <p>Wenn Sie sich andere komplizierte Schritte ersparen und direkt ofa.js für das gesamte Projekt nutzen möchten, können Sie mit dem offiziellen Online-Build- und Vorschau-Tool von ofa.js im Browser mit einem Klick Ihre erste lokale Anwendung erstellen.</p>
        <p>Dieses Tool wird auf einem statischen Server gehostet. Alle Vorgänge werden lokal im Browser ausgeführt, ohne dass eine Verbindung zu einem dynamischen Server erforderlich ist. Bitte verwenden Sie es beruhigt.</p>
        <h2>Programm starten</h2>
        <p>Klicken Sie auf <a href="https://core.noneos.com?redirect=studio" target="_blank">OFA Studio</a>, um das ofa.js-Build-Tool zu öffnen. Dieses Tool verwendet direkt das lokale Dateisystem des Browsers und erfordert keine Installation oder Konfiguration. Gehen Sie wie folgt vor:</p>
        <ol>
          <li>Besuchen Sie die Website und warten Sie, bis das Programm geladen ist</li>
          <li>Klicken Sie auf die Schaltfläche "Neues Projekt erstellen"</li>
          <li>Wählen Sie den Typ "ofa.js App", geben Sie den Projektnamen ein und wählen Sie dann das lokale Verzeichnis</li>
          <li>Klicken Sie im angezeigten Berechtigungsbestätigungsdialog auf "Zulassen", und klicken Sie dann auf "Erstellung bestätigen"</li>
          <li>Warten Sie einige Sekunden, das Projekt wird im ausgewählten Verzeichnis initialisiert</li>
        </ol>
        <p>Nach Abschluss der Projektinitialisierung können Sie das Verzeichnis mit einem Editor wie <a href="https://code.visualstudio.com/" target="_blank">VSCode</a> öffnen und mit dem Schreiben des Anwendungscodes beginnen.</p>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
