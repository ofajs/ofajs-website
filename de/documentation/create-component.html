      <article class="markdown-body">
        <h1>Komponente erstellen</h1>
        <p>In ofa.js ist die Komponente der Kernmechanismus zur Wiederverwendung und Modularisierung von Seiten. Eine Komponente ist im Wesentlichen ein benutzerdefiniertes Web Component, durch das Vorlagen, Stile und Logik definiert werden, um wiederverwendbare UI-Elemente zu erstellen.</p>
        <h2>Grundstruktur der Komponente</h2>
        <p>Im Unterschied zum Seitenmodul verwendet das <code>&lt;template&gt;</code>-Element des Komponentenmoduls stattdessen die <code>component</code>-Eigenschaft und deklariert die <code>tag</code>-Eigenschaft, um den Komponenten-Tag-Namen anzugeben.</p>
        <p>An der Stelle, an der die Komponente verwendet werden soll, wird das Komponentenmodul asynchron über das <code>l-m</code>-Tag geladen, und das System führt die Registrierung automatisch durch; danach kann die Komponente direkt wie ein normales HTML-Tag verwendet werden.</p>
        <o-playground name="Komponenten-Grundbeispiel" style="--editor-height: 500px">
          <code path="demo.html" preview>
    <template>
      <l-m src="./demo-comp.html"></l-m>
      <demo-comp></demo-comp>
    </template>
  </code>
          <code path="demo-comp.html" active>
    <template component>
      <style>
        :host {
          display: block;
          border: 1px solid green;
          padding: 10px;
        }
      </style>
      <h3>{{title}}</h3>
      <script>
        export default async () => {
          return {
            tag: "demo-comp",
            data: {
              title: "OFAJS Komponenten-Beispiel",
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Komponenten-Kernkonzepte</h2>
        <h3>tag - Komponenten-Tag-Name</h3>
        <p><code>tag</code> ist der Tag-Name der Komponente, <strong>muss mit dem verwendeten Tag-Namen der Komponente übereinstimmen</strong>. Beispiel: Wenn der <code>tag</code> Ihrer Komponente als <code>&quot;demo-comp&quot;</code> definiert ist, dann muss im HTML <code>&lt;demo-comp&gt;&lt;/demo-comp&gt;</code> verwendet werden.</p>
        <h3>Komponenten-Modulreferenz</h3>
        <p>Durch das <code>l-m</code>-Tag wird ein Komponentenmodul eingefügt, das automatisch Komponenten registriert. Dies ähnelt der Verwendung des <code>script</code>-Tags zum Einbinden von Skripten, aber <code>l-m</code> ist speziell für das Laden und Registrieren von Komponentenmodulen vorgesehen.</p>
        <blockquote>
          <p>Hinweis: Das <code>l-m</code>-Referenz-Tag ist ein <strong>asynchroner Verweis</strong> und eignet sich zum bedarfsgesteuerten Laden von Komponenten beim Seitenaufruf.</p>
        </blockquote>
        <h2>Synchronisierungszitat-Komponente</h2>
        <p>In manchen Szenarien musst du möglicherweise Komponenten synchron laden (z. B. um sicherzustellen, dass die Komponente vor der Verwendung vollständig registriert ist). In diesem Fall kannst du die <code>load</code>-Methode mit dem Schlüsselwort <code>await</code> verwenden, um einen synchronen Verweis zu implementieren.</p>
        <p>In Komponenten- und Seitenmodulen wird automatisch die <code>load</code>-Funktion injiziert, damit Entwickler benötigte Ressourcen synchron laden können.</p>
        <o-playground name="Beispiel für synchrones Referenzieren von Komponenten" style="--editor-height: 500px">
          <code path="demo.html" preview>
    <template>
      <o-page src="page1.html"></o-page>
    </template>
  </code>
          <code path="page1.html" active>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <div>
        <demo-comp></demo-comp>
      </div>
      <script>
        // eslint-disable-next-line
        export default async ({ load }) => {
          await load("./demo-comp.html");
          return {
            data: {},
            proto: {},
          };
        };
      </script>
    </template>
  </code>
          <code path="demo-comp.html">
    <template component>
      <style>
        :host {
          display: block;

      <h3>{{title}}</h3>

        </o-playground>
        <h2>Asynchrone Referenzen vs. synchrone Referenzen</h2>
        <table>
          <thead>
            <tr>
              <th>Referenzart</th>
              <th>Stichwort</th>
              <th>Merkmale</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Asynchrone Referenz</td>
              <td><code>l-m</code>-Tag</td>
              <td>Nicht-blockierendes Laden, geeignet für bedarfsgesteuertes Laden von Komponenten</td>
            </tr>
            <tr>
              <td>Synchrone Referenz</td>
              <td><code>load</code>-Methode mit <code>await</code>-Schlüsselwort</td>
              <td>Blockierendes Laden, stellt sicher, dass die Komponente vor der Verwendung registriert ist</td>
            </tr>
          </tbody>
        </table>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
