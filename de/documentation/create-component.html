        <h1>Komponente erstellen</h1>
        <p>In ofa.js sind Komponenten der Kernmechanismus zur Implementierung von Wiederverwendung und Modularisierung von Seiten. Im Wesentlichen ist eine Komponente ein benutzerdefiniertes Web Component, das durch die Definition von Vorlagen, Stilen und Logik wiederverwendbare UI-Elemente erstellen kann.</p>
        <h2>Grundlegende Struktur der Komponente</h2>
        <p>Im Gegensatz zu Seitenmodulen verwendet das <code>&lt;template&gt;</code>-Element von Komponentenmodulen stattdessen das <code>component</code>-Attribut und deklariert das <code>tag</code>-Attribut, um den Komponententagnamen anzugeben.</p>
        <p>An der Stelle, an der die Komponente benötigt wird, wird das Komponentenmodul asynchron über das <code>l-m</code>-Tag geladen, und das System registriert es automatisch. Anschließend kann die Komponente direkt wie ein normales HTML-Tag verwendet werden.</p>
        <o-playground name="Grundlegendes Beispiel für Komponenten" style="--editor-height: 500px">
          <code path="demo.html" preview>
    <template>
      <l-m src="./demo-comp.html"></l-m>
      <demo-comp></demo-comp>
    </template>
  </code>
          <code path="demo-comp.html" active>
    <template component>
      <style>
        :host {
          display: block;
          border: 1px solid green;
          padding: 10px;
        }
      </style>
      <h3>{{title}}</h3>
      <script>
        export default async () => {
          return {
            tag: "demo-comp",
            data: {
              title: "OFAJS Komponentenbeispiel",
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Kernkonzepte der Komponenten</h2>
        <h3>tag - Komponenten-Tagname</h3>
        <p><code>tag</code> ist der Tag-Name der Komponente und <strong>muss mit dem im Gebrauch verwendeten Tag-Namen übereinstimmen</strong>. Wenn Sie beispielsweise den <code>tag</code> Ihrer Komponente als <code>&quot;demo-comp&quot;</code> definieren, dann müssen Sie in der HTML-Nutzung <code>&lt;demo-comp&gt;&lt;/demo-comp&gt;</code> schreiben.</p>
        <h3>Komponentenmodulreferenz</h3>
        <p>Durch das <code>l-m</code>-Tag werden Komponentenmodule eingebunden, die automatisch registriert werden. Dies ähnelt dem Einbinden von Skripten über das <code>script</code>-Tag, aber <code>l-m</code> ist speziell für das Laden und Registrieren von Komponentenmodulen vorgesehen.</p>
        <p>Beachten Sie: Das <code>l-m</code>-Referenztag ist eine <strong>asynchrone Referenz</strong>, die sich für das bedarfsgerechte Laden von Komponenten beim Laden der Seite eignet.</p>
        <h2>Synchronisierte Referenzkomponente</h2>
        <p>In manchen Szenarien müssen Sie möglicherweise Komponenten synchron laden (z. B. um sicherzustellen, dass eine Komponente registriert ist, bevor sie verwendet wird). In diesem Fall können Sie die <code>load</code>-Methode in Kombination mit dem <code>await</code>-Schlüsselwort verwenden, um eine synchrone Referenz zu implementieren.</p>
        <p>In Komponenten- und Seitenmodulen wird automatisch eine <code>load</code>-Funktion eingefügt, mit der Entwickler die benötigten Ressourcen synchron laden können.</p>
        <o-playground name="Synchrones Referenzkomponentenbeispiel" style="--editor-height: 500px">
          <code path="demo.html" preview>
    <template>
      <o-page src="page1.html"></o-page>
    </template>
  </code>
          <code path="page1.html" active>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <div>
        <demo-comp></demo-comp>
      </div>
      <script>
        // eslint-disable-next-line
        export default async ({ load }) => {
          await load("./demo-comp.html");
          return {
            data: {},
            proto: {},
          };
        };
      </script>
    </template>
  </code>
          <code path="demo-comp.html">
    <template component>
      <style>

        </o-playground>
        <h2>Asynchrone Referenzen vs. Synchrone Referenzen</h2>
        <table>
          <thead>
            <tr>
              <th>Verweisart</th>
              <th>Schlüsselwort</th>
              <th>Merkmal</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Asynchroner Verweis</td>
              <td><code>l-m</code> Tag</td>
              <td>Nicht blockierendes Laden, geeignet für bedarfsweises Laden von Komponenten</td>
            </tr>
            <tr>
              <td>Synchroner Verweis</td>
              <td><code>load</code> Methode mit <code>await</code> Schlüsselwort</td>
              <td>Blockierendes Laden, stellt sicher, dass die Komponente vor der Verwendung registriert ist</td>
            </tr>
          </tbody>
        </table>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
