        <h1>プロジェクトでofa.jsのAIスキルを活用する</h1>
        <p>由于 ofa.js 目前尚未成为广泛知名的框架，主流 AI 模型尚不具备直接使用 ofa.js 的能力。为此，我们精心准备了专用技能包，帮助 AI 学习和查阅 ofa.js 的使用方法。</p>
        <h2>使用方法</h2>
        <p>スキル対応のAIツールでは、ご使用のAIモデルの言語に応じて対応するスキルアドレスを選択してください：</p>
        <p><strong>注意：</strong> ofa.js のドキュメントは元々中国語で書かれているため、中国語バージョンのスキルパックの内容はより完全で正確です。英語バージョンで問題が発生した場合は、中国語バージョンを試すことをお勧めします。</p>
        <h3>中国語モデル</h3>
        <p>日本語版AIモデルをご利用の場合は、以下のアドレスをご使用ください：</p>
        <pre><code class="hljs">https:<span class="hljs-regexp">//</span>raw.githubusercontent.com<span class="hljs-regexp">/ofajs/</span>ofa.js<span class="hljs-regexp">/main/</span>skills/ofajs-docs.zip</code></pre>
        <p>一般的な中国のAIモデルには、DeepSeek、Kimi、GLM、MiniMax、Qwenなどがあります。</p>
        <h3>英語モデル</h3>
        <p>如果您使用的是英文 AI 模型，请使用以下地址：</p>
        <pre><code class="hljs">https:<span class="hljs-regexp">//</span>raw.githubusercontent.com<span class="hljs-regexp">/ofajs/</span>ofa.js<span class="hljs-regexp">/main/</span>skills/ofajs-docs-en.zip</code></pre>
        <p>このスキルパックにより、AI は ofa.js のコンポーネントやページモジュールを効率的に学習・開発でき、開発者は AI ツールをより手軽に活用して ofa.js プロジェクトの開発を行い、開発効率を向上させることができます。</p>
        <h2>さらにヘルプを見る</h2>
        <p>AIスキルで問題が解決しなかった場合は、お気軽にディスカッションエリアにご投稿ください：</p>
        <p><a href="https://github.com/ofajs/discussion/discussions" target="_blank">https://github.com/ofajs/discussion/discussions</a></p>
        <p>できるだけ早くご回答いたします。</p>

            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
