      <article class="markdown-body">
        <h1>プロジェクトでofa.jsのAIプロンプトを使用する</h1>
        <p>ofa.jsは現在、広く知られたフレームワークではないため、主流のAIモデルはofa.jsを直接利用する能力をまだ持っていません。そのため、私たちはAIがofa.jsの使用方法を学び、参照できるよう、専用のプロンプトを丁寧に用意しました。</p>
        <p>私たちは2つのバージョンのプロンプトを提供しています：</p>
        <h2>簡易版プロンプト</h2>
        <p>これは濃縮最適化されたバージョンであり、前置きトークンの入力消費を最小限に抑えることを目的としており、ほとんどのシナリオに適用されます：</p>
        <pre><code class="hljs">https:<span class="hljs-regexp">//</span>raw.githubusercontent.com<span class="hljs-regexp">/ofajs/</span>ofa.js<span class="hljs-regexp">/main/</span>llms<span class="hljs-regexp">/tiny/</span>start.md</code></pre>
        <p>このプロンプトを使用することで、AI は ofa.js のコンポーネントやページモジュールを効率的に開発できます。</p>
        <h2>完全版プロンプト</h2>
        <p>使用しているAIモデルが比較的賢くない場合は、濃縮されていない完全版のプロンプトを試してみてください。初期化時により多くのトークンを消費しますが、より良い効果が得られる可能性があります：</p>
        <pre><code class="hljs">https:<span class="hljs-regexp">//</span>raw.githubusercontent.com<span class="hljs-regexp">/ofajs/</span>ofa.js<span class="hljs-regexp">/main/</span>llms<span class="hljs-regexp">/origin/</span>start.md</code></pre>
        <p>これらのプロンプトを提供することで、開発者が AI ツールをより便利に活用して ofa.js プロジェクトの開発を行い、開発効率を向上させることを目指しています。</p>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
