      <article class="markdown-body">
        <h1>生産とデプロイ</h1>
        <p>ofa.jsを使って開発したプロジェクトは、静的サーバーに直接デプロイすれば使用できます。</p>
        <h2>開発環境</h2>
        <p>公式の <a href="https://core.noneos.com/?redirect=studio" target="_blank">ofa Studio</a> を使用して開発できます。ワンクリックでプロジェクトの作成とプレビューが可能です。</p>
        <p>静的なサーバーを自分で構築することもできます：</p>
        <ul>
          <li>Nginx や Apache などの静的サーバーソフトウェアを使用する</li>
          <li>Node.js の <a href="https://www.npmjs.com/package/http-server" target="_blank">http-server</a> モジュールを使用する</li>
          <li>エディタの静的サーバープラグインを直接使用してプレビューする</li>
        </ul>
        <h2>本番環境</h2>
        <h3>プロジェクトをエクスポート</h3>
        <p>もし <a href="https://core.noneos.com/?redirect=studio" target="_blank">ofa Studio</a> を使ってプロジェクトを構築している場合は、ツールに付属しているエクスポート機能を直接使用してください。</p>
        <p>手動で構築したプロジェクトの場合は、プロジェクトフォルダをそのまま静的サーバーにデプロイすればよく、開発環境のモードと一貫性を保ちます。</p>
        <h3>圧縮難読化</h3>
        <p>本番環境では通常、ファイルサイズを削減し読み込み速度を向上させるために、圧縮・難読化ツールを使用する必要があります。<a href="https://terser.org/docs/cli-usage/" target="_blank">Terser CLI</a> を使用して圧縮・難読化を行うことができます。</p>
        <p>コマンドラインツールを使用したくない場合は、<a href="https://builder.ofajs.com/" target="_blank">ofa build</a> を使用してオンラインでファイルの圧縮と難読化を行うことができます。このツールは現在ベータ版で、後日ofa Studioに統合される予定です。</p>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
