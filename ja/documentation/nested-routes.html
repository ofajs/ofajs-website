        <h1>ネストされたページ/ルーティング</h1>
        <p>ofa.jsにおいて、ネストされたページ（ネストルートとも呼ばれる）は強力な機能であり、親子の階層関係を持つページ構造を作成できる。親ページはレイアウトコンテナとして機能し、<code>&lt;slot&gt;</code>スロットを通じて子ページのコンテンツをレンダリングする。</p>
        <h2>基本概念</h2>
        <ul>
          <li><strong>親ページ（Layout）</strong>：レイアウトコンテナとしてのページで、ナビゲーションバー、サイドバーなどの共通UI要素を含む</li>
          <li><strong>子ページ</strong>：具体的な業務ページの内容で、親ページの <code>&lt;slot&gt;</code> スロット位置にレンダリングされる</li>
        </ul>
        <h2>親ページの書き方</h2>
        <p>親ページは <code>&lt;slot&gt;&lt;/slot&gt;</code> タグを使用して子ページのレンダリング位置を予約する必要があります。</p>
        <pre><code class="hljs language-html"><span class="hljs-comment">&lt;!-- layout.html --&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">template</span> <span class="hljs-attr">page</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
    <span class="hljs-selector-pseudo">:host</span> {
      <span class="hljs-attribute">display</span>: block;
      <span class="hljs-attribute">height</span>: <span class="hljs-number">100%</span>;
    }
    ...
  </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
  ...
  <span class="hljs-tag">&lt;<span class="hljs-name">div</span> <span class="hljs-attr">class</span>=<span class="hljs-string">&quot;content&quot;</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">slot</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">slot</span>&gt;</span>
  <span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span>
  ...
<span class="hljs-tag">&lt;/<span class="hljs-name">template</span>&gt;</span></code></pre>
        <h2>サブページの書き方</h2>
        <p>子ページは <code>parent</code> プロパティをエクスポートして親ページのパスを指定します。</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">template</span> <span class="hljs-attr">page</span>&gt;</span>

  <span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">

    <span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">async</span> () =&gt; {
      <span class="hljs-keyword">return</span> {

        <h2>親ページのルート監視</h2>
        <p>親ページは <code>routerChange</code> ライフサイクルフックを使用してルート変更を監視できます。これは、現在のルートに基づいてナビゲーション状態を更新する必要がある場合に非常に便利です。</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">template</span> <span class="hljs-attr">page</span>&gt;</span>
  ...
  <span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">
    <span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> () =&gt; {
      <span class="hljs-keyword">return</span> {
        <span class="hljs-attr">data</span>: {
          <span class="hljs-attr">active1</span>: <span class="hljs-literal">false</span>,
          <span class="hljs-attr">active2</span>: <span class="hljs-literal">false</span>,
        },
        <span class="hljs-title function_">routerChange</span>(<span class="hljs-params"></span>) {
          <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">refreshActive</span>();
        },
        <span class="hljs-title function_">ready</span>(<span class="hljs-params"></span>) {
          <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">refreshActive</span>();
        },
        <span class="hljs-attr">proto</span>: {
          <span class="hljs-title function_">refreshActive</span>(<span class="hljs-params"></span>) {
            <span class="hljs-keyword">const</span> { current } = <span class="hljs-variable language_">this</span>.<span class="hljs-property">app</span>;
            <span class="hljs-keyword">const</span> path = <span class="hljs-keyword">new</span> <span class="hljs-title function_">URL</span>(current.<span class="hljs-property">src</span>).<span class="hljs-property">pathname</span>;
            
            <span class="hljs-variable language_">this</span>.<span class="hljs-property">active1</span> = path.<span class="hljs-title function_">includes</span>(<span class="hljs-string">&#x27;page1&#x27;</span>);
            <span class="hljs-variable language_">this</span>.<span class="hljs-property">active2</span> = path.<span class="hljs-title function_">includes</span>(<span class="hljs-string">&#x27;page2&#x27;</span>);
          },
        },
      };
    };
  </span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">template</span>&gt;</span></code></pre>
        <h2>注意事項</h2>
        <ul>
          <li><code>parent</code> 属性値は相対パス（例：<code>./layout.html</code>）または絶対パス（例：<code>/pages/layout.html</code>）を指定できます</li>
          <li>親ページには <code>&lt;slot&gt;&lt;/slot&gt;</code> タグを含める必要があります。含めない場合、子ページのコンテンツは表示されません</li>
          <li>親ページのスタイルは子ページに継承されます。子ページは独自のスタイルを定義することもできます</li>
          <li><code>routerChange</code> フックを使用すると、ルート変更を監視し、ナビゲーションのハイライトなどの機能を実装できます</li>
        </ul>
        <h2>多階層ネスト</h2>
        <p>親ページもまた自分自身の親ページを持ち、多階層のネスト構造を形成することができる。</p>

<span class="hljs-tag">&lt;<span class="hljs-name">template</span> <span class="hljs-attr">page</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">p</span>&gt;</span>子ページの内容<span class="hljs-tag">&lt;/<span class="hljs-name">p</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">
    <span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> parent = <span class="hljs-string">&#x27;./parent.html&#x27;</span>;
    <span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> () =&gt; {
      <span class="hljs-keyword">return</span> { <span class="hljs-attr">data</span>: {} };
    };
  </span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">template</span>&gt;</span></code></pre>

      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
