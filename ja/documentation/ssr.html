        <h1>SSR と アイソモルフィックレンダリング</h1>
        <blockquote>
          <p>SSRとは何かわからないなら、今はまだ必要ないということですので、この章をスキップして、将来的に必要になったときに戻って学習してください。</p>
        </blockquote>
        <h2>アイソモルフィックレンダリング</h2>
        <p>CSRのスムーズな体験、より優れたクローラー認識（SEO）、そしてより自由なバックエンド開発言語の選択を同時に維持するために、ofa.jsは独自の同型レンダリング（Symphony Client-Server Rendering）モードを提供しています。</p>
        <blockquote>
          <p>CSR / SSR / SSG の具体的な定義と違いを理解したい場合は、この記事の末尾の章を直接ご覧ください。</p>
        </blockquote>
        <p>同型レンダリングの核心理念は：- サーバーサイドで初期ページコンテンツをレンダリングし、SEOと初回読み込み速度を確保</p>
        <ul>
          <li>クライアント側でルーティング処理を引き継ぎ、CSRのスムーズなユーザー体験を維持</li>
          <li>あらゆるサーバー環境に対応し、真の同型レンダリングを実現</li>
        </ul>
        <h3>同型レンダリングの実装原理</h3>
        <p>ofa.js の 同型レンダリングモードは、以下のメカニズムに基づいています：</p>
        <ol>
          <li>サーバーサイドで汎用実行構造を持つ完全なHTMLページを生成する</li>
          <li>クライアントがCSR実行エンジンをロードする</li>
          <li>現在の実行環境を自動認識し、レンダリング戦略を決定する</li>
        </ol>

        </ul>
        <h3>同構レンダリングテンプレート構造</h3>
        <p>同じ構造のレンダリングモードを実現するには、サーバーサイドで以下の汎用テンプレート構造を使用するだけです：</p>

        <p>同様に、SSG もこの構造を適用して静的サイト生成を実現できます。</p>
        <h2>ofa.js と SSR および他のフロントエンドフレームワークの違い</h2>
        <p>ofa.js の Symphony Client-Server Rendering（以下SCSR）は本質的にもSSRモードです。</p>
        <p>Vue、React、Angularなどの既存のフロントエンドフレームワークのSSR方式と比較して、ofa.jsの最大の利点は<strong>Node.jsへの強制バインドが不要</strong>であることです。つまり、任意のバックエンドテンプレートレンダリングエンジン（PHPのSmarty、PythonのJinja2、JavaのThymeleafなど）でも、ofa.jsを容易に統合してSSRを実現できます。</p>
        <h2>ウェブページのレンダリング方式概要</h2>
        <p>モダンなウェブアプリケーションには主に4種類のレンダリング方式があります：従来のサーバーサイドテンプレートエンジンレンダリング、CSR（Client Side Rendering、クライアントサイドレンダリング）、SSR（Server Side Rendering、サーバーサイドレンダリング）、そしてSSG（Static Site Generation、静的サイト生成）です。それぞれの方式には利点と適用シーンがあります。</p>
        <h3>従来のサーバーサイドテンプレートエンジンレンダリング</h3>
        <p>多くのWeb製品において、サーバーサイドテンプレートエンジンは依然として最も主流なページレンダリング手段です。Go、PHPなどのバックエンド言語は、組み込みまたはサードパーティのテンプレートエンジン（Goの <code>html/template</code>、PHPのSmarty/Twig/Bladeなど）を利用して、動的データをHTMLテンプレートに注入し、一度に完全なHTMLページを生成してクライアントに返します。</p>
        <p><strong>利点：</strong>- SEO フレンドリー、初回表示が速い</p>
        <ul>
          <li>サーバー側で制御するため、セキュリティが高い</li>
          <li>チームの技術スタックへの要求が低く、バックエンド開発者だけで独立して開発可能</li>
        </ul>
        <p><strong>欠点：</strong>- ユーザーエクスペリエンスが悪く、毎回のインタラクションでページの再読み込みが必要</p>
        <ul>
          <li>サーバー側の負荷が高い</li>
          <li>フロントエンドとバックエンドの結合度が高く、役割分担が困難</li>
        </ul>
        <h3>CSR（クライアントサイドレンダリング）</h3>
        <p>在 CSR モードでは、ページコンテンツは完全にブラウザ側のJavaScriptでレンダリングされます。ofa.jsの<a href="./routes.html" olink="">シングルページアプリケーション</a>は典型的なCSR実装です。この方式はスムーズなユーザー体験を提供し、ページ遷移なしですべての操作を完了できます。ReactやVueと、それに対応するルーティングライブラリ（React RouterやVue Routerなど）を使用して開発されたシングルページアプリケーション（SPA）は、いずれも典型的なCSR実装です。</p>
        <p><strong>利点：</strong>- ユーザー体験はスムーズで、ページ切り替えにリフレッシュはありません</p>
        <ul>
          <li>クライアント側の処理能力が高く、応答が迅速です</li>
        </ul>
        <p><strong>欠点：</strong>- SEOに不利であり、検索エンジンが内容をインデックスしにくい</p>
        <h3>SSR（サーバーサイドレンダリング）</h3>
        <p>CSRのスムーズな体験を維持しつつ、サーバー側でリアルタイムにページをレンダリングする方式に変更：ユーザーがリクエストを送信すると、サーバーが即座に完全なHTMLを生成して返すことで、真のサーバーサイドレンダリングを実現します。</p>
        <p><strong>利点：</strong>- SEOに優しく、初回表示が速い</p>
        <ul>
          <li>動的コンテンツをサポート</li>
        </ul>
        <p><strong>欠点：</strong>- サーバー負荷が大きい</p>
        <ul>
          <li>通常、Node.js 環境をランタイムとして必要とするか、少なくとも Node.js 中間層が必要</li>
          <li>完全な対話を実現するには、後続のクライアントアクティベーションが必要</li>
        </ul>
        <h3>SSG（静的サイト生成）</h3>
        <p>ビルド段階で全ページを静的なHTMLファイルに事前レンダリングし、デプロイ後は直接サーバーからユーザーに返すことができる。</p>
        <p><strong>利点：</strong>- 初回読み込みが速く、SEOに優しい</p>
        <ul>
          <li>サーバー負荷が低く、安定したパフォーマンス</li>
          <li>セキュリティが高い</li>
        </ul>
        <p><strong>欠点：</strong>- 動的コンテンツの更新が困難</p>
        <ul>
          <li>ページ数の増加に伴いビルド時間が長くなる</li>
        </ul>
