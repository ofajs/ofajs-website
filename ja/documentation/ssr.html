        <h1>SSRと同構レンダリング</h1>
        <blockquote>
          <p>SSRが何であるかよくわからない場合は、今のところそれを使う必要がないということです。この章は飛ばして、将来必要になった時に改めて学び直せば大丈夫です。</p>
        </blockquote>
        <h2>同型レンダリング</h2>
        <p>CSRのスムーズな体験、より良い機械クローラーの認識（SEO）、およびより自由なバックエンド開発言語の選択を同時に保持するために、ofa.jsは独自のアイソモーフィックレンダリング（Symphony Client-Server Rendering）モードを提供しています。</p>
        <blockquote>
          <p>CSR / SSR / SSGの詳細な定義とちがいについては、本文末尾の章を直接お読みください。</p>
        </blockquote>
        <p>同型レンダリングの核心理念は：- サーバーサイドで初期ページコンテンツをレンダリングし、SEOと初回表示速度を確保</p>
        <ul>
          <li>クライアントサイドでルーティング処理を引き継ぎ、CSRの滑らかなユーザー体験を維持</li>
          <li>あらゆるサーバー環境に対応し、真のアイソモーフィックレンダリングを実現</li>
        </ul>
        <h3>同じ構造を持つレンダリングの実現原理</h3>
        <p>ofa.jsの同型レンダリングモードは以下のメカニズムに基づいています：</p>
        <ol>
          <li>サーバーサイドで共通ランタイム構造を持つ完全なHTMLページを生成</li>
          <li>クライアントがCSRランタイムエンジンをロード</li>
          <li>現在の実行環境を自動識別し、レンダリング戦略を決定</li>
        </ol>

        <p>したがって、任意の 开发言語（Go、Java、PHP、Nodejs、Python など）、任意の後端テンプレートレンダリングエンジン（Go の <code>html/template</code>、PHP の Smarty/Twig/Blade など）を使用して、ofa.js のアイソモーフィックレンダリングコード構造をテンプレートに埋め込むことで、SSR を実現できます。</p>

          <li><a href="https://github.com/ofajs/ofa.js/tree/main/test/ssr-case/go" target="_blank">Go SSR ケース</a></li>
        </ul>
        <h3>同型レンダリングテンプレート構造</h3>
        <p>同型レンダリングモードを実現するには、サーバー側で以下の汎用テンプレート構造を使用するだけです：</p>

        <p><code>scsr.mjs</code> は ofa.js が提供する同型レンダリング実行エンジンであり、現在のページの実行状態に基づいて自動的にレンダリング戦略を判断し、あらゆる環境で最適なユーザーエクスペリエンスを提供します。</p>
        <p>同様に、SSGもこの構造を適用して静的サイト生成を実現できます。</p>
        <h2>ofa.js とSSRおよびその他のフロントエンドフレームワークとの違い</h2>
        <p>ofa.js の Symphony Client-Server Rendering（以下 SCSR）は本質的には SSR モードです。</p>
        <p>Vue、React、Angular などの既存フロントエンドフレームワークの SSR ソリューションと比べて、ofa.js の最大の利点は<strong>Node.js を強制的にバインドする必要がない</strong>ことです。これは、任意のバックエンドテンプレートレンダリングエンジン（PHP の Smarty、Python の Jinja2、Java の Thymeleaf など）が ofa.js を簡単に統合して SSR を実現できることを意味します。</p>
        <h2>ウェブページレンダリング方式の概要</h2>
        <p>現代のウェブアプリケーションには主に4つのレンダリング方式があります：従来のサーバーサイドテンプレートエンジンレンダリング、CSR（Client Side Rendering、クライアントサイドレンダリング）、SSR（Server Side Rendering、サーバーサイドレンダリング）、そしてSSG（Static Site Generation、静的サイト生成）です。それぞれの方式には独自の利点と適用シーンがあります。</p>
        <h3>伝統的なサーバーサイドテンプレートエンジンレンダリング</h3>
        <p>多くのWeb製品において、サーバーサイドテンプレートエンジンは依然として最も主流なページレンダリング手法です。Go、PHPなどのバックエンド言語は、組み込みまたはサードパーティのテンプレートエンジン（Goの<code>html/template</code>、PHPのSmarty/Twig/Bladeなど）を活用し、動的データをHTMLテンプレートに注入し、一括で完全なHTMLページを生成してクライアントに返します。</p>
        <p><strong>利点：</strong>- SEOに優しく、初回表示が速い</p>
        <ul>
          <li>サーバーサイド制御で、セキュリティが比較的高い</li>
          <li>チームの技術スタックに対する要求が低く、バックエンド開発者だけで独立して開発を完了できる</li>
        </ul>
        <p><strong>デメリット：</strong>- ユーザーエクスペリエンスが悪く、インタラクションのたびにページが再読み込みされる</p>
        <ul>
          <li>サーバー側の負荷が大きい</li>
          <li>フロントエンドとバックエンドの結合度が高く、業務分担に不利</li>
        </ul>
        <h3>CSR（クライアントサイドレンダリング）</h3>
        <p>CSRモードでは、ページの内容は完全にブラウザ側のJavaScriptによってレンダリングされ、ofa.jsの<a href="./routes.html" olink="">シングルページアプリケーション</a>は典型的なCSRの実装です。この方法は、ページ遷移なしですべてのインタラクションを完了できる、スムーズなユーザー体験を提供します。ReactやVueをそれぞれのルーティングライブラリ（React RouterやVue Routerなど）と組み合わせて開発されたシングルページアプリケーション（SPA）は、すべて典型的なCSRの実装です。</p>
        <p><strong>利点：</strong>- ユーザーエクスペリエンスが滑らかで、ページの切り替えがリフレッシュなし</p>
        <ul>
          <li>クライアントの処理能力が高く、応答が迅速</li>
        </ul>
        <p><strong>デメリット：</strong>- SEOに不利で、検索エンジンがコンテンツをインデックス化しにくい</p>
        <h3>SSR（サーバーサイドレンダリング）</h3>
        <p>CSRの滑らかな体験を保ちながら、サーバーがリアルタイムでページをレンダリングする：ユーザーがリクエストを発行すると、サーバーが即座に完全なHTMLを生成して返し、真のサーバーサイドレンダリングを実現する。</p>
        <p><strong>利点：</strong>- SEO に優れ、ファーストビューの読み込みが高速</p>
        <ul>
          <li>動的コンテンツに対応</li>
        </ul>
        <p><strong>デメリット：</strong>- サーバーへの負荷が高い</p>
        <ul>
          <li>通常、Node.js環境をランタイムとして必要とするか、最低でもNode.jsのミドルウェア層が必要</li>
          <li>それでも完全なインタラクションを実現するには、後続のクライアント側での活性化が必要</li>
        </ul>
        <h3>SSG（静的サイト生成）</h3>
        <p>ビルド段階ですべてのページを事前に静的HTMLファイルとしてレンダリングし、デプロイ後はサーバーから直接ユーザーに返すことができます。</p>
        <p><strong>利点：</strong>- 初回読み込みが高速で、SEOに優しい</p>
        <ul>
          <li>サーバー負荷が低く、パフォーマンスが安定している</li>
          <li>セキュリティが高い</li>
        </ul>
        <p><strong>デメリット：</strong>- 動的なコンテンツの更新が困難</p>
        <ul>
          <li>ページ数が増えるにつれてビルド時間が長くなる</li>
        </ul>

        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);

            detached() {

            },
