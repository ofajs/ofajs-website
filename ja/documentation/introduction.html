        <h1>紹介</h1>
        <h2>ofa.jsとは何ですか？</h2>
        <p>ofa.js は使いやすい Web フロントエンドフレームワークで、Web アプリケーションの構築に特化して設計されており、開発効率を向上させ、開発のハードルを下げることを目的としています。</p>
        <blockquote>
          <p>HTML、CSS、JavaScript に<strong>すでに基本的に精通している</strong>なら、ofa.js は非常に良い選択肢です。</p>
        </blockquote>
        <h2>なぜ私が ofa.js を開発したのか</h2>
        <p>ofa.js の設計意図は非常にシンプルです：コンパイルツールに依存せずに、Web開発の<strong>エンジニアリング</strong>問題を解決することです。</p>
        <blockquote>
          <p>エンジニアリングとは、ソフトウェア開発プロセスにおける規範、フロー、ツール、方法を体系的に統合し、開発効率、コード品質、保守性を向上させることを指します。</p>
        </blockquote>
        <p>ここ10年、Webフロントエンド開発は初期の無秩序な成長から、次第にエンジニアリング化へと進化してきました。この過程では、従来のアプリケーション開発の経験を参考にし、Node.jsとコンパイルプロセスを導入することで、大規模プロジェクトのエンジニアリング上の課題を解決してきました。</p>
        <p>しかし、プロジェクトが大きくなるにつれて、このパターンの欠点が徐々に明らかになり、従来の開発で直面していた<strong>モノリスアプリケーション</strong>の問題が発生し、プロジェクトのメンテナンスが困難になり、インタラクション要件の反復が難しくなりました。</p>
        <blockquote>
          <p>巨石アプリケーション（Monolithic Application）とは、庞大で密結合な单体アプリケーションであり、すべての機能モジュールが1つのコードベースに集約されており、一部分が变动すれば全体に影響し、独立した開発やデプロイが難しい。</p>
        </blockquote>
        <p>この時点で、プロジェクトを分解し、<strong>マイクロサービス</strong>のようにマイクロフロントエンド化を実現する必要があります。しかし、コンパイル処理を経ているため、マイクロフロントエンドは困難で煩雑になり、フロントエンドモジュールの独立したデプロイには各小さなモジュールのコンパイルが必要で、これは非常に困難であり、Webフロントエンド技術の発展はほぼ停滞に直面しています。</p>
        <blockquote>
          <p>マイクロサービス（Microservices）は、大規模で複雑なアプリケーションを、細かい粒度で独立してデプロイ・実行可能な複数の小さなサービスに分割するソフトウェアアーキテクチャスタイルです。</p>
        </blockquote>
        <p>この時、私は考え始めました：従来のプログラミング言語は異なるハードウェアやオペレーティングシステムに対応する必要があるため、コンパイルを通じてクロスプラットフォームでの差異をなくさなければなりません。しかし、Web開発は異なります。ブラウザをベースにしており、もともとコンパイルが不要で、独立して実行およびデプロイでき、生まれつきマイクロフロントエンドのモードです。そこで私は、コンパイルのプロセスがかえって物事を複雑にしていることに気づきました。</p>
        <p>つまり、エンジニアリングの問題を解決し、コンパイルという必要なステップを取り除けば、フロントエンド開発は大規模アプリケーションの開発に非常に適しているということです。これが生まれつきのマイクロフロントエンドモードです。そこでofa.jsが誕生しました。</p>
        <h2>コアアドバンテージ</h2>
        <h3>敷居ゼロ、箱から出してすぐ使える</h3>
        <p>開発環境の構築、依存関係のインストール、またはスキャフォールドの設定は不要です。ブラウザで公式ビルドプログラムを開き、ローカルディレクトリを選択するだけで開発を開始できます。すべての計算、データ、およびストレージ操作はローカルで実行され、クラウドサービスに依存する必要はありません。</p>
        <h3>AI フレンドリーで検証しやすい</h3>
        <p>コンパイルのブラックボックスがなく、AIが生成したコードは迅速にデプロイと自己検証が可能です。中間層を減らし、コンパイルプロセスを経ずに、コードの問題の特定と修正を容易にします。</p>
        <h3>マイクロフロントエンドのネイティブサポート</h3>
        <p>ofa.js は、Webフロントエンド開発をマイクロサービスのように細分化し、各モジュールを独立して開発・デプロイ可能にします。従来のWebフロントエンドの境界が打破されると、フロントエンド技術は徐々にサーバー技術の制限を突破していくでしょう。</p>

        </ul>
