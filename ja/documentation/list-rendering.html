      <article class="markdown-body">
        <h1>リストレンダリング</h1>
        <p>在 ofa.js では、<code>o-fill</code> コンポーネントが強力なリストレンダリング機能を提供し、配列データを効率的に複数の類似した要素にレンダリングできます。このコンポーネントは、直接レンダリングとテンプレートレンダリングという2つの主な使用方法をサポートしています。</p>
        <h2>o-fill コンポーネントの紹介</h2>
        <p><code>o-fill</code> は ofa.js でリストレンダリングに使用されるコアコンポーネントであり、配列型の <code>value</code> プロパティを受け取り、配列の各要素に対応する DOM 要素を生成します。レンダリング中、ofa.js は自動的に配列の変更を追跡し、効率的に DOM を更新します。</p>
        <h3>主な特徴：</h3>
        <ul>
          <li><strong>効率的な更新</strong>：キーによる配列の変化を追跡し、変更が必要な部分のみを更新します</li>
          <li><strong>インデックスアクセス</strong>：<code>$index</code> で現在のアイテムのインデックスにアクセスできます</li>
          <li><strong>データアクセス</strong>：<code>$data</code> で現在のアイテムのデータにアクセスできます</li>
          <li><strong>ホストアクセス</strong>：<code>$host</code> で現在のコンポーネントインスタンスにアクセスし、コンポーネントメソッドの呼び出しやデータへのアクセスが可能です</li>
          <li><strong>親アクセス</strong>：ネストされた <code>o-fill</code> 内で、<code>$parent</code> を使って親アイテムのデータにアクセスできます</li>
          <li><strong>テンプレートの再利用</strong>：名前付きテンプレートを使った複雑なリストレンダリングをサポートします</li>
        </ul>
        <h2>直接レンダリング</h2>
        <p>直接レンダリングは最も簡単な使用方法であり、テンプレートの内容を直接 <code>o-fill</code> タグの内部に記述します。配列が変化すると、<code>o-fill</code> は自動的に各データ項目に対応する要素を作成します。</p>
        <o-playground name="o-fill - 直接渲染" style="--editor-height: 600px">
          <code>
    <template page>
      <style>
        :host { display: block; padding: 10px; }
        ul { list-style: none; padding: 0; }
        li { padding: 8px; margin: 5px 0; background: #7e7e7e; border-radius: 4px; }
      </style>
      <h3>フルーツリスト</h3>
      <button on:click="addItem">フルーツを追加</button>
      <button on:click="removeItem">最後を削除</button>
      <ul>
        <o-fill :value="fruits">
          <li> {{$index + 1}}. {{$data.name}} - 価格: ¥{{$data.price}} <button on:click="$host.removeItem($index)">削除</button></li>
        </o-fill>
      </ul>
      <script>
        export default async () => ({
          data: { 
            fruits: [
              { name: "🍎 りんご", price: 5 },
              { name: "🍊 オレンジ", price: 6 },
              { name: "🍌 バナナ", price: 3 }
            ],
            fruitIndex: 0,
          },
          proto: {
            addItem() {
              const fruitNames = ["🍇 ぶどう", "🍓 いちご", "🥝 キウイ", "🍑 もも", "🥭 マンゴー"];
              const name = fruitNames[this.fruitIndex % fruitNames.length];
              this.fruits.push({ 
                name: name, 
                price: Math.floor(Math.random() * 10) + 1 
              });
              this.fruitIndex++;
            },
            removeItem(index) {
              if (index >= 0 && index < this.fruits.length) {
                this.fruits.splice(index, 1);
                return;
              }
              this.fruits.length && this.fruits.pop();
            }
          }
        });
      </script>
    </template>
  </code>
        </o-playground>
        <p>この例では、次のことがわかります：- <code>$index</code> は現在の項目のインデックスを表す（0から始まる）</p>
        <ul>
          <li><code>$data</code> は現在の項目のデータオブジェクトを表す</li>
          <li><code>$host</code> は現在のコンポーネントインスタンスを表し、コンポーネントメソッドの呼び出しやコンポーネントデータへのアクセスに使用できる</li>
          <li>配列に変化があった場合、リストは自動的に更新される</li>
        </ul>
        <h2>テンプレートレンダリング</h2>
        <p>より複雑なリスト項目構造には、名前付きテンプレートの方式を使用できます。テンプレートを <code>template</code> タグ内に定義し、それを <code>o-fill</code> 内で <code>name</code> 属性を通じて参照します。</p>
        <o-playground name="o-fill - テンプレートレンダリング" style="--editor-height: 600px">
          <code>
    <template page>
      <style>
        :host { display: block; padding: 10px; }
        .product-card { border: 1px solid #747474; border-radius: 8px; padding: 12px; margin: 10px 0; }
        .product-name { font-weight: bold; font-size: 1.1em; }
        .product-price { color: #832c22; font-weight: bold; }
        .product-desc { color: #929292; font-size: 0.9em; margin-top: 5px; }
      </style>
      <h3>商品一覧</h3>
      <button on:click="addProduct">商品を追加</button>
      <div class="products-container">
        <o-fill :value="products" name="product-template"></o-fill>
      </div>
      <template name="product-template">
        <div class="product-card">
          <div class="product-name">{{$data.name}}</div>
          <div class="product-price">¥{{$data.price}}</div>
          <div class="product-desc">{{$data.description}}</div>
          <small>番号: {{$index + 1}}</small>
        </div>
      </template>
      <script>
        export default async () => ({
          data: {
            products: [
              { name: "MacBook Pro", price: 12999, description: "高性能ノートパソコン、プロフェッショナルな作業に最適" },
              { name: "iPhone 15", price: 5999, description: "最新のスマートフォン、写真撮影性能が優れている" },
              { name: "AirPods Pro", price: 1999, description: "ワイヤレスノイズキャンセリングイヤホン、高音質" }
            ],
            productIndex: 0,
          },
          proto: {
            addProduct() {
              const productNames = ["iPad Air", "Apple Watch", "Magic Mouse", "Pro Display"];
              const productDescs = ["薄型軽量のタブレット", "スマートウォッチ、健康管理", "人間工学に基づいたマウス", "プロフェッショナル向けディスプレイ"];
              const name = productNames[this.productIndex % productNames.length];
              const desc = productDescs[this.productIndex % productDescs.length];
              this.products.push({
                name: name,
                price: Math.floor(Math.random() * 5000) + 1000,
                description: desc
              });
              this.productIndex++;
            }
          }
        });
      </script>
    </template>
  </code>
        </o-playground>
        <h2>ネストされたリストのレンダリング</h2>
        <p><code>o-fill</code> はネスト使用をサポートしており、複雑な階層データ構造（ツリーメニュー、分類リストなど）を処理できます。</p>
        <o-playground name="o-fill - ネストリストレンダリング" style="--editor-height: 800px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
        .category {
          border-left: 3px solid #3498db;
          padding-left: 15px;
          margin: 10px 0;
        }
        .subcategory {
          border-left: 2px solid #9b59b6;
          padding-left: 15px;
          margin: 8px 0;
        }
        .item {
          padding: 5px 0;
          margin: 5px 0;
          color: #2c3e50;
        }
        h4 {
          margin: 10px 0 5px 0;
          color: #34495e;
        }
      </style>
      <h3>商品カテゴリーナビゲーション</h3>
      <div class="navigation">
        <o-fill :value="categories" name="category-template"></o-fill>
      </div>
      <template name="category-template">
        <div class="category">
          <h4> {{$data.name}} </h4>
          <o-fill :value="$data.subcategories" name="subcategory-template"></o-fill>
        </div>
      </template>
      <template name="subcategory-template">
        <div class="subcategory">
          <strong>{{$data.name}}</strong>
          <o-fill :value="$data.items">
            <div class="item"> • {{$data}} </div>
          </o-fill>
        </div>
      </template>
      <script>
        export default async () => {
          return {
            data: {
              categories: [
                {
                  name: "電子製品",
                  subcategories: [
                    {
                      name: "スマートフォン",
                      items: ["iPhone", "Androidスマートフォン", "フィーチャーフォン"]
                    },
                    {
                      name: "パソコン",
                      items: ["ノートパソコン", "デスクトップパソコン", "タブレット"]
                    }
                  ]
                },
                {
                  name: "ホーム用品",
                  subcategories: [
                    {
                      name: "キッチン用品",
                      items: ["鍋", "食器", "小型家電"]
                    },
                    {
                      name: "ベッドルーム用品",
                      items: ["寝具", "ワードローブ", "装飾品"]
                    }
                  ]
                },
                {
                  name: "衣料・アクセサリー",
                  subcategories: [
                    {
                      name: "メンズ",
                      items: ["Tシャツ", "シャツ", "アウター"]
                    },
                    {
                      name: "ウィメンズ",
                      items: ["ワンピース", "パンツ", "アクセサリー"]
                    }
                  ]
                }
              ]
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>上の例は、基本的な入れ子リストのレンダリングを示しています。入れ子になった <code>o-fill</code> で親アイテムのデータにアクセスする必要がある場合は、 <code>$parent</code> を使用できます。</p>
        <h3>$parent を使用して親データにアクセス</h3>
        <blockquote>
          <p><strong>バージョン要件</strong>：<code>$parent</code> 機能は ofa.js v4.7.0 以上が必要です。</p>
        </blockquote>
        <p>入れ子になった <code>o-fill</code> では、<code>$parent</code> を使用して親アイテムのデータにアクセスできます。<code>$parent</code> を有効にするには、入れ子の <code>o-fill</code> に <code>:_$parent=&quot;$data&quot;</code> 属性を追加する必要があります。</p>
        <p><strong>重要ルール：</strong>- 第1層の <code>o-fill</code> は <code>_$parent</code> を必要とせず、<code>$host</code> を使用してコンポーネントデータにアクセスします</p>
        <ul>
          <li>ネストされた <code>o-fill</code>（第2層以降）は <code>:_$parent=&quot;$data&quot;</code> を使用して親データを渡します</li>
          <li><code>_$parent</code> は <code>$data</code> のみを受け取り、データフローの明確さを確保します</li>
        </ul>
        <h3>$parent の使用例</h3>
        <p>以下の例では、ネストされた<code>o-fill</code>内で<code>$parent</code>を使用して親項目のデータにアクセスする方法を示します。</p>
        <o-playground name="o-fill - $parent 使用示例" style="--editor-height: 600px">
          <code>
    <template page>
      <style>
        :host { display: block; padding: 20px; }
        .category { background: #e3f2fd; padding: 10px; margin: 10px 0; border-radius: 4px; }
        .item { background: #fff; padding: 8px; margin: 5px 0; border-radius: 4px; border-left: 3px solid #2196f3; }
      </style>
      <h3>分類リスト</h3>
      <o-fill :value="categories">
        <div class="category">
          <h4>分類: {{$data.name}}</h4>
          <o-fill :value="$data.items" :_$parent="$data">
            <div class="item">
              <div>商品: {{$data}}</div>
              <div>所属分類: {{$parent.name}}</div>
            </div>
          </o-fill>
        </div>
      </o-fill>
      <script>
        export default async () => {
          return {
            data: {
              categories: [
                {
                  name: "果物",
                  items: ["リンゴ", "バナナ", "オレンジ"]
                },
                {
                  name: "野菜",
                  items: ["トマト", "キュウリ", "ナス"]
                }
              ]
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>この簡単な例では：- <strong>第一層 o-fill</strong>：分類配列を走査し、<code>$data.name</code> は分類名です</p>
        <ul>
          <li><strong>ネストされた o-fill</strong>：<code>:_$parent=&quot;$data&quot;</code> を使って親分類データを渡します</li>
          <li><strong>$parent アクセス</strong>：ネスト層内で、<code>$parent.name</code> で親分類の名前にアクセスします</li>
        </ul>
        <h2>性能最適化とキー値管理</h2>
        <p>頻繁に更新が必要なリストに対しては、<code>fill-key</code> 属性で一意の識別子を指定することで、レンダリングパフォーマンスを向上させることができます。</p>
        <pre><code class="hljs language-html"><span class="hljs-comment">&lt;!-- カスタムキーを使用してパフォーマンスを向上 --&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">o-fill</span> <span class="hljs-attr">:value</span>=<span class="hljs-string">&quot;items&quot;</span> <span class="hljs-attr">fill-key</span>=<span class="hljs-string">&quot;id&quot;</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">div</span>&gt;</span>{{$data.name}}<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">o-fill</span>&gt;</span></code></pre>
        <p>在上記の例では、<code>fill-key=&quot;id&quot;</code> は ofa.js に対し、各データの <code>id</code> 属性を一意の識別子として使用するように指示します。これにより、配列の順序が変わっても、対応する要素を正しく識別して更新できます。</p>
        <h2>リストレンダリングのベストプラクティス</h2>
        <ol>
          <li><strong>イベント処理</strong>：リストアイテムでイベントを使用する場合、<code>$host</code> は現在のコンポーネントインスタンスを指し、<code>$data</code> は現在のアイテムデータを指すことに注意してください</li>
          <li><strong>適切なレンダリング方法の選択</strong>：単純なリストには直接レンダリングを、複雑な構造にはテンプレートレンダリングを使用します</li>
          <li><strong>パフォーマンスへの配慮</strong>：大規模なリストや頻繁に更新されるリストには、<code>fill-key</code> を使用してキーを指定します</li>
          <li><strong>データ構造</strong>：配列の各項目が有効なデータオブジェクトであることを確認します</li>
          <li><strong>深すぎるネストの回避</strong>：ネストはサポートされていますが、深くなりすぎないようにします</li>
          <li><strong>$parent の正しい使用</strong>：<ul>
              <li>ネストされた <code>o-fill</code> 内でのみ <code>$parent</code> を使用します</li>
              <li><code>:_$parent=&quot;$data&quot;</code> を使用して <code>$parent</code> を有効にする必要があります</li>
              <li>最初の層の <code>o-fill</code> ではコンポーネントデータにアクセスするために <code>$host</code> を使用し、<code>$parent</code> は使用しないでください</li>
              <li><code>_$parent</code> は <code>$data</code> のみを受け入れ、他の値を渡さないでください</li>
            </ul>
          </li>
        </ol>
        <h2>変数の使用まとめ</h2>
        <p><code>o-fill</code> では、異なる変数にそれぞれ異なる用途と使用シーンがあります：</p>
        <table>
          <thead>
            <tr>
              <th>変数</th>
              <th>用途</th>
              <th>使用シーン</th>
              <th>例</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><code>$host</code></td>
              <td>コンポーネントインスタンスのデータとメソッドにアクセス</td>
              <td>第一階層の <code>o-fill</code></td>
              <td><code>{{$host.totalAmount}}</code></td>
            </tr>
            <tr>
              <td><code>$data</code></td>
              <td>現在の反復項目のデータ</td>
              <td>すべての階層の <code>o-fill</code></td>
              <td><code>{{$data.name}}</code></td>
            </tr>
            <tr>
              <td><code>$index</code></td>
              <td>現在の項目のインデックス</td>
              <td>すべての階層の <code>o-fill</code></td>
              <td><code>{{$index + 1}}</code></td>
            </tr>
            <tr>
              <td><code>$parent</code></td>
              <td>親項目のデータ</td>
              <td>ネストされた <code>o-fill</code>（第二階層から）</td>
              <td><code>{{$parent.orderName}}</code></td>
            </tr>
          </tbody>
        </table>
        <pre><code class="hljs">コンポーネント data (totalAmount, orders)
  │
  └─ 第一層 o-fill: :<span class="hljs-attribute">value</span>=<span class="hljs-string">&quot;orders&quot;</span>
      │  <span class="hljs-variable">$host</span> でコンポーネントデータにアクセス: {{<span class="hljs-variable">$host</span>.totalAmount}}
      │  <span class="hljs-variable">$data</span> で現在の注文にアクセス: {{<span class="hljs-variable">$data</span>.orderName}}
      │
      └─ 第二層 o-fill: :<span class="hljs-attribute">value</span>=<span class="hljs-string">&quot;<span class="hljs-variable">$data</span>.items&quot;</span> :_<span class="hljs-variable">$parent</span>=<span class="hljs-string">&quot;<span class="hljs-variable">$data</span>&quot;</span>
          │  <span class="hljs-variable">$parent</span> は第一層の注文データを指す
          │  <span class="hljs-variable">$data</span> は items の各項目
          │  アクセス可能: {{<span class="hljs-variable">$parent</span>.orderName}}, {{<span class="hljs-variable">$data</span>.name}}</code></pre>
        <p>これらの変数を正しく使用することで、複雑なネストされたリストのレンダリングシナリオを簡単に処理できます。</p>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
  </o-app>
  <o-root-provider name="pui" theme="dark"></o-root-provider>
