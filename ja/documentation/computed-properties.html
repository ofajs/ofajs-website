        <h1>算出プロパティ</h1>
        <p>計算プロパティは、リアクティブデータに基づいて新しいデータを派生させる方法であり、依存するデータの変化に応じて自動的に更新されます。ofa.jsでは、計算プロパティは <code>proto</code> オブジェクト内で定義される特別なメソッドであり、JavaScriptの <code>get</code> または <code>set</code> キーワードを使用して定義します。</p>
        <h2>特徴と利点</h2>
        <ul>
          <li><strong>キャッシング</strong>：算出プロパティの結果はキャッシュされ、依存データが変更された場合にのみ再計算される</li>
          <li><strong>リアクティブ</strong>：依存データが更新されると、算出プロパティは自動的に更新される</li>
          <li><strong>宣言的</strong>：依存関係を宣言的に作成し、コードをより明確で理解しやすくする</li>
        </ul>
        <h2>get 計算プロパティ</h2>
        <p>get 算出プロパティは、リアクティブなデータから新しい値を派生させるために使用されます。パラメーターを受け付けず、他のデータに基づいて計算された値のみを返します。</p>
        <o-playground name="get 計算プロパティの例" style="--editor-height: 600px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <button on:click="clickMe">クリックして - {{count}} - {{countDouble}}</button>
      <p>計算プロパティ countDouble の値：{{countDouble}}</p>
      <script>
        export default async () => {
          return {
            data: {
              count: 1,
            },
            proto: {
              get countDouble() {
                console.log('countDouble 被访问');
                return this.count * 2;
              },
              clickMe() {
                this.count++;
              },
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h3>実際の応用シナリオ例</h3>
        <p>算出プロパティは、配列のフィルタリングや表示テキストのフォーマットなど、複雑なデータ変換ロジックを処理するためによく使用されます：</p>
        <o-playground name="計算プロパティの例" style="--editor-height: 500px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          padding: 10px;
        }
        ul {
          list-style-type: none;
          padding: 0;
        }
        li {
          padding: 5px;
          margin: 3px 0;
          background-color: #838383ff;
        }
      </style>
      <input type="text" sync:value="filterText" placeholder="名前をフィルタ...">
      <ul>
        <o-fill :value="filteredNames">
          <li>{{$data}}</li>
        </o-fill>
      </ul>
      <script>
        export default async () => {
          return {
            data: {
              filterText: '',
              names: ['張3', '李4', '王54']
            },
            proto: {
              get filteredNames() {
                if (!this.filterText) {
                  return this.names;
                }
                return this.names.filter(name => 
                  name.includes(this.filterText)
                );
              },
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>set 計算プロパティ</h2>
        <p>set 計算プロパティを使用すると、代入操作によって基盤となるデータ状態を変更できます。これはパラメータを受け取り、通常はそれに依存する元のデータを逆方向に更新するために使用されます。</p>
        <o-playground name="set 計算プロパティの例" style="--editor-height: 700px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
        button {
          margin: 5px;
          padding: 8px 12px;
        }
      </style>
      <div>
        <p>基本値: {{count}}</p>
        <p>倍の値: {{countDouble}}</p>
        <button on:click="resetCount">カウントリセット</button>
        <button on:click="setCountDouble">倍の値を10に設定</button>
        <button on:click="incrementCount">基本値を増加</button>
      </div>
      <script>
        export default async () => {
          return {
            data: {
              count: 1,
            },
            proto: {
              get countDouble() {
                return this.count * 2;
              },
              set countDouble(val) {
                this.count = Math.max(0, val / 2); // countが負にならないようにする
              },
              resetCount() {
                this.count = 0;
              },
              setCountDouble() {
                this.countDouble = 10;
              },
              incrementCount() {
                this.count++;
              }
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>算出プロパティ vs メソッド</h2>
        <p>方法でも同様の機能を実現できますが、算出プロパティにはキャッシュの特性があり、依存するデータが変化した場合にのみ再評価されるため、パフォーマンスがより優れています。</p>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// 算出プロパティを使用（推奨） - キャッシュあり</span>
<span class="hljs-keyword">get</span> <span class="hljs-title function_">fullName</span>() {
  <span class="hljs-keyword">return</span> <span class="hljs-variable language_">this</span>.<span class="hljs-property">firstName</span> + <span class="hljs-string">&#x27; &#x27;</span> + <span class="hljs-variable language_">this</span>.<span class="hljs-property">lastName</span>;
}

<span class="hljs-comment">// メソッドを使用 - 呼び出しごとに実行</span>
<span class="hljs-title function_">fullName</span>(<span class="hljs-params"></span>) {
  <span class="hljs-keyword">return</span> <span class="hljs-variable language_">this</span>.<span class="hljs-property">firstName</span> + <span class="hljs-string">&#x27; &#x27;</span> + <span class="hljs-variable language_">this</span>.<span class="hljs-property">lastName</span>;
}</code></pre>
        <h2>注意事項</h2>
        <ol>
          <li><strong>非同期操作の回避</strong>：算出プロパティは同期的かつ副作用のない状態を維持すべきであり、その中で非同期呼び出しを行ったり、直接コンポーネントの状態を変更してはなりません。 </li>
          <li><strong>依存関係の追跡</strong>：必ずリアクティブデータのみに依存してください。そうでなければ、更新は予期しないものになります。 </li>
          <li><strong>エラー対策</strong>：算出プロパティ内部で循環依存や異常な代入が発生した場合、レンダリングの失敗や無限ループにつながる可能性があるため、必ず事前に境界条件を設定し、例外処理を適切に行ってください。</li>
        </ol>
        <h2>実際の応用例</h2>
        <p>以下は簡単なフォーム検証の例で、計算属性の実用性を示しています。</p>
        <o-playground name="フォーム検証サンプル" style="--editor-height: 600px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          padding: 15px;
          font-family: Arial, sans-serif;
        }
        input {
          margin: 5px 0;
          padding: 8px;
          width: 200px;
        }
        .status {
          margin-top: 10px;
          padding: 8px;
          border-radius: 4px;
        }
        .valid {
          background-color: #d4edda;
          color: green;
        }
        .invalid {
          background-color: #f8d7da;
          color: red;
        }
      </style>
      <h3>簡単な検証サンプル</h3>
      <input type="text" sync:value="username" placeholder="ユーザー名を入力(最低3文字)">
      <p class="status" class:valid="isValid" class:invalid="!isValid">
        ステータス: {{statusMessage}}
      </p>
      <script>
        export default async () => {
          return {
            data: {
              username: ''
            },
            proto: {
              get isValid() {
                return this.username.length >= 3;
              },
              get statusMessage() {
                return this.isValid ? 'ユーザー名は有効です' : 'ユーザー名が短すぎます';
              },
            }
          };
        };
      </script>
    </template>
  </code>
