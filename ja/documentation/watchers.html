        <h1>リスナー</h1>
        <p>リスナー（Watcher）は、ofa.jsにおいてデータの変化を監視し、対応するロジックを実行するための機能です。リアクティブデータが変化すると、リスナーは自動的にコールバック関数をトリガーし、データ変換、副作用操作、非同期処理などのタスクを実行することができます。</p>
        <h2>基本的な使い方</h2>
        <p>リスナーはコンポーネントの <code>watch</code> オブジェクト内で定義され、キー名は監視するデータプロパティ名に対応し、値はデータが変化した際に実行されるコールバック関数です。</p>
        <o-playground name="watchers - 基本用法" style="--editor-height: 700px">
          <code>
    <template page="">
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <p>
        count:{{count}}
        <br>
        doubleCount:{{doubleCount}}
      </p>
      <input sync:value="count" type="number">
      <script>
        export default async () => {
          return {
            data: {
              count: 0,
              doubleCount: 0,
            },
            watch: {
              count(count) {
                setTimeout(() => {
                  this.doubleCount = count * 2;
                }, 500);
              },
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>コールバック関数のパラメータ</h2>
        <p>リスナーのコールバック関数は2つの引数を受け取ります：- <code>newValue</code>：変更後の新しい値</p>
        <ul>
          <li><code>{watchers}</code>：現在のコンポーネントのすべてのウォッチャーオブジェクト</li>
        </ul>
        <p>データ変更後、まずデバウンス処理が行われ、その後<code>watch</code>内のコールバックが実行されます。<code>watchers</code>パラメータは本次デバウンス周期内にマージされたすべての変更セットです。</p>
        <p><code>watch</code> の中の関数はコンポーネントの初期化完了後に即座に呼び出され、データ監視を確立するために使われる。<code>watchers</code> に長さがあるかどうかで初回呼び出しかどうかを判別できる。</p>
        <o-playground name="watchers - コールバックパラメータ" style="--editor-height: 700px">
          <code>
    <template page="">
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
        .log {
          margin-top: 10px;
          padding: 10px;
          background-color: #7e7e7eff;
          font-family: monospace;
          white-space: pre-wrap;
        }
      </style>
      <p>名前: {{name}}</p>
      <p>年齢: {{age}}</p>
      <input sync:value="name" placeholder="名前を入力">
      <input sync:value="age" type="number" placeholder="年齢を入力">
      <div class="log">{{log}}</div>
      <script>
        export default async () => {
          return {
            data: {
              name: "張三",
              age: 25,
              log: "",
            },
            watch: {
              name(newVal,{watchers}) {
                if(!watchers){
                  return;
                }
                const watcher = watchers[0]; // いずれかを取得
                this.log += `プロパティ "${watcher.name}" が "${watcher.oldValue}" から "${watcher.value}" に変更されました\n`;
              },
              age(newVal,{watchers}) {
                if(!watchers){
                  return;
                }
                const watcher = watchers[0]; // いずれかを取得
                this.log += `プロパティ "${watcher.name}" が "${watcher.oldValue}" から "${watcher.value}" に変更されました\n`;
              },
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>深い監視</h2>
        <p>オブジェクトまたは配列型のネストされたデータに対しては、watch内で自動的に深い監視が行われます。</p>
        <o-playground name="watchers - 深度監視" style="--editor-height: 700px">
          <code>
    <template page="">
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
        button {
          margin: 5px;
          padding: 8px 12px;
        }
        .info {
          margin-top: 10px;
          padding: 10px;
          background-color: gray;
        }
      </style>
      <div>
        <p>ユーザー情報:</p>
        <p>名前: {{user.name}}</p>
        <p>年齢: {{user.age}}</p>
        <p>趣味: {{user.hobbies.join(', ')}}</p>
      </div>
      <div>
        <button on:click="updateName">名前の変更</button>
        <button on:click="updateAge">年齢の変更</button>
        <button on:click="addHobby">趣味の追加</button>
        <button on:click="updateHobby">趣味の変更</button>
      </div>
      <div class="info" :html="log"></div>
      <script>
        export default async () => {
          return {
            data: {
              user: {
                name: "張三",
                age: 25,
                hobbies: ["バスケットボール", "サッカー"],
              },
              log: "",
            },
            watch: {
              user(newVal,{watchers}) {
                if(!watchers){
                  return;
                }
                const watcher = watchers[0]; // そのうちの一つを取得
                console.log("変更: ",watcher.target);
                if(watcher.type === 'set'){
                  this.log += `値変更-> プロパティ "${watcher.name}" が "${watcher.oldValue}" から "${watcher.value}" に変更されました <br>`;
                }else{
                  this.log += `メソッド実行${watcher.type}-> 関数名 "${watcher.name}"  引数 "${watcher.args}" <br>`;
                }
              },
            },
            proto: {
              updateName() {
                this.user.name = "李四";
              },
              updateAge() {
                this.user.age = 30;
              },
              addHobby() {
                this.user.hobbies.push("水泳");
              },
              updateHobby() {
                this.user.hobbies[0] = "バドミントン";
              },
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground> ## 複数のデータソースをリッスンする <p>複数のデータの変化を同時に監視し、コールバック関数内でそれらの変化に応じた処理を実行できます。</p>

    <template page="">

      <input sync:value="rectWidth" type="number" placeholder="幅">

      <script>
        export default async () => {

            data: {
              rectWidth: 10,

        <h2>実際の応用シーン</h2>
        <h3>1. フォーム検証</h3>
        <o-playground name="watchers - フォーム検証" style="--editor-height: 800px">
          <code>
    <template page="">
      <style>
        :host {
          display: block;
          padding: 15px;
        }
        input {
          display: block;
          margin: 10px 0;
          padding: 8px;
          width: 200px;
        }
        .error {
          color: red;
          font-size: 12px;
        }
      </style>
      <input sync:value="username" placeholder="ユーザー名（3-10文字）">
      <span class="error">{{usernameError}}</span>
      <input sync:value="email" placeholder="メールアドレス">
      <span class="error">{{emailError}}</span>
      <script>
        export default async () => {
          return {
            data: {
              username: "",
              email: "",
              usernameError: "",
              emailError: "",
            },
            watch: {
              username(val) {
                if (val.length < 3 || val.length > 10) {
                  this.usernameError = "ユーザー名は3-10文字である必要があります";
                } else {
                  this.usernameError = "";
                }
              },
              email(val) {
                const emailRegex = /^.+@.+\..+$/;
                if (!emailRegex.test(val)) {
                  this.emailError = "有効なメールアドレスを入力してください";
                } else {
                  this.emailError = "";
                }
              },
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h3>2. テーマの設定</h3>
        <o-playground name="watchers - テーマ設定" style="--editor-height: 800px">
          <code>
    <template page="">
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;

          margin: 5px;
          padding: 8px 12px;
        }
      </style>
      <p>設定: {{settings.theme}}</p>
      <p>保存状態: {{saveStatus}}</p>
      <button on:click="setLight">ライトテーマ</button>
      <button on:click="setDark">ダークテーマ</button>
      <button on:click="resetSettings">リセット</button>
      <script>
        export default async () => {
          return {
            data: {
              settings: {
                theme: "light",
              },
              saveStatus: "保存済み",
            },
            watch: {
              settings(){
                  this.saveStatus = "保存中...";
                  setTimeout(() => {
                    this.saveStatus = "保存済み";
                    console.log("設定が保存されました:", this.settings);
                  }, 500);
              }
            },
            proto: {
              setLight() {
                this.settings.theme = "light";
              },
              setDark() {
                this.settings.theme = "dark";
              },
              resetSettings() {
                this.settings = { theme: "light" };
              },
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>注意事項</h2>
        <ul>
          <li><strong>監視対象データの変更を避ける</strong>：ウォッチャーのコールバック内で監視対象のデータを変更すると、無限ループが発生する可能性があります。変更が必要な場合は、適切な条件分岐を設けてください。</li>
          <li><strong>算出プロパティの使用を検討</strong>：複数のデータの変化に基づいて新しい値を計算する必要がある場合は、ウォッチャーではなく<a href="./computed-properties.html" olink="">算出プロパティ</a>の使用を推奨します。</li>
        </ul>
