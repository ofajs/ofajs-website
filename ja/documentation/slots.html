<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>スロット</title>
  <script src="https://cdn.jsdelivr.net/gh/kirakiray/ofa.js@4.6.20/dist/ofa.mjs#debug" type="module"></script>
  <script src="https://cdn.jsdelivr.net/gh/kirakiray/ofa.js@4.6.20/libs/scsr/dist/scsr.min.mjs" type="module"></script>
  <link rel="icon" href="../../img/logo.svg" />
  <link rel="stylesheet" href="../../css/palette.css" pui-colors />
  <link rel="stylesheet" href="../../css/theme.css" />
  <link rel="stylesheet" href="../../css/github-markdown.css" />
  <link rel="stylesheet" href="../../css/hljs.css" />
  <style>
    html,
    body {
      height: 100%;
      padding: 0;
      margin: 0;
      overflow: hidden;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        Segoe UI,
        Microsoft Yahei,
        Helvetica,
        Arial,
        sans-serif,
        Apple Color Emoji,
        Segoe UI Emoji;
    }

    o-app {
      height: 100%;
    }

    @keyframes fadein {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    o-app {
      animation: fadein 0.1s ease-in-out;
    }
  </style>
</head>

<body>
  <o-app src="../../js/app-config.js">
    <template page>
      <link rel="stylesheet" href="../../css/github-markdown.css" />
      <link rel="stylesheet" href="../../css/hljs.css" />
      <l-m src="../../comps/center-block.html"></l-m>
      <l-m src="../../comps/article-code.html"></l-m>
      <l-m src="https://playground.ofajs.com/comps/o-playground/o-playground.html"></l-m>
      <style>
        :host {
          display: block;
          height: 100%;
          box-sizing: border-box;
          overflow: auto;
        }
      </style>
      <link rel="stylesheet" href="../../css/page.css" />
      <article class="markdown-body">
        <h1>スロット</h1>
        <p>スロットは、コンポーネント内で外部コンテンツを受け取るためのプレースホルダーです。スロットを使用することで、再利用可能なコンポーネントを作成しながら、コンポーネントの利用者がコンポーネント内部のコンテンツをカスタマイズできるようになります。</p>
        <h2>デフォルトスロット</h2>
        <o-playground name="デフォルトスロット例" style="--editor-height: 500px">
          <code path="demo.html" preview>
    <template>
      <l-m src="./demo-comp.html"></l-m>
      <demo-comp>
        <div>Hello, OFAJS!</div>
      </demo-comp>
    </template>
  </code>
          <code path="demo-comp.html" active>
    <template component>
      <style>
        :host {
          display: block;
          border: 1px solid green;
          padding: 8px;
        }
      </style>スロット内容：
      <br />
      <span style="color: red;">
        <slot></slot>
      </span>
      <script>
        export default async ({ load }) => {
          return {
            tag: "demo-comp",
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h3>スロットのデフォルトコンテンツ</h3>
        <p>親コンポーネントがスロットのコンテンツを提供していない場合、<code>&lt;slot&gt;&lt;/slot&gt;</code> 内部の要素はデフォルトのコンテンツとして表示されます。</p>
        <o-playground name="スロットデフォルト内容の例" style="--editor-height: 500px">
          <code path="demo.html" preview>
    <template>
      <l-m src="./demo-comp.html"></l-m>
      <h3>スロット内容あり：</h3>
      <demo-comp>
        <div>これはカスタム内容です</div>
      </demo-comp>
      <h3>スロット内容なし（デフォルト内容を表示）：</h3>
      <demo-comp></demo-comp>
    </template>
  </code>
          <code path="demo-comp.html" active>
    <template component>
      <style>
        :host {
          display: block;
          border: 1px solid green;
          padding: 8px;
          margin-bottom: 10px;
        }
      </style>スロット内容：
      <span style="color: red;">
        <slot>
          <div>これはデフォルト内容です</div>
        </slot>
      </span>
      <script>
        export default async ({ load }) => {
          return {
            tag: "demo-comp",
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>名前付きスロット</h2>
        <p>コンポーネントで複数のスロットが必要な場合、名前付きスロットを使用してスロットを区別することができます。<code>&lt;slot name=&quot;xxx&quot;&gt;</code> で名前付きスロットを定義し、使用時には <code>slot=&quot;xxx&quot;</code> 属性でコンテンツをどのスロットに入れるかを指定します。</p>
        <o-playground name="名前付きスロットサンプル" style="--editor-height: 500px">
          <code path="demo.html" preview>
    <template>
      <l-m src="./demo-comp.html"></l-m>
      <demo-comp>
        <div>Hello, OFAJS!</div>
        <div slot="footer">Footer Content</div>
      </demo-comp>
    </template>
  </code>
          <code path="demo-comp.html" active>
    <template component>
      <style>
        :host {
          display: block;
          border: 1px solid green;
          padding: 8px;
        }
      </style>スロット内容：
      <br />
      <span style="color: red;">
        <slot></slot>
      </span>
      <br />
      <span style="color: blue;">
        <slot name="footer"></slot>
      </span>
      <script>
        export default async ({ load }) => {
          return {
            tag: "demo-comp",
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>多階層スロットの受け渡し</h2>
        <p>スロットの内容は複数のコンポーネント層をまたいで渡すことができます。親コンポーネントが子コンポーネントにスロットの内容を渡した後、子コンポーネントはそのスロットの内容をさらに自分の子コンポーネントに渡し続けることができ、スロットの多層的な透過的な受け渡しを実現します。</p>
        <o-playground name="多階層スロット伝達例" style="--editor-height: 500px">
          <code path="demo.html" preview>
    <template>
      <l-m src="./outer-comp.html"></l-m>
      <outer-comp>
        <div style="color: red;">最外層からのタイトル</div>
      </outer-comp>
    </template>
  </code>
          <code path="outer-comp.html">
    <template component>
      <style>
        :host {
          display: block;
          border: 1px solid green;
          padding: 8px;
          margin-bottom: 10px;
        }
      </style>
      <h3>外層コンポーネント</h3>
      <l-m src="./inner-comp.html"></l-m>
      <inner-comp>
        <div style="color: inherit;">
          <slot></slot>
        </div>
      </inner-comp>
      <script>
        export default async ({ load }) => {
          return {
            tag: "outer-comp",
          };
        };
      </script>
    </template>
  </code>
          <code path="inner-comp.html" active>
    <template component>
      <style>
        :host {
          display: block;
          border: 1px solid blue;
          padding: 8px;
        }
      </style>
      <h4>内層コンポーネント</h4>
      <slot></slot>
      <script>
        export default async ({ load }) => {
          return {
            tag: "inner-comp",
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>上記の例では：- 最上位の親コンポーネントが <code>slot=&quot;header&quot;</code> の内容を定義しています</p>
        <ul>
          <li>外側のコンポーネント（outer-comp）はこのスロット内容を受け取り、それを内側のコンポーネント（inner-comp）に引き継ぎます</li>
          <li>内側のコンポーネントが最終的に最上位からのスロット内容をレンダリングします</li>
        </ul>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
  </o-app>
  <o-root-provider name="pui" theme="dark"></o-root-provider>
</body>

</html>
