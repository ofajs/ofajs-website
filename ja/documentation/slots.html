<body>
  <o-app src="../../js/app-config.js">
    <template page>
      <link rel="stylesheet" href="../../css/github-markdown.css" />
      <link rel="stylesheet" href="../../css/hljs.css" />
      <l-m src="../../comps/center-block.html"></l-m>
      <l-m src="../../comps/article-code.html"></l-m>
      <l-m src="https://playground.ofajs.com/comps/o-playground/o-playground.html"></l-m>
      <style>
        :host {
          display: block;
          height: 100%;
          box-sizing: border-box;
          overflow: auto;
        }
      </style>
      <link rel="stylesheet" href="../../css/page.css" />
      <article class="markdown-body">
        <h1>スロット</h1>
        <p>スロットは、コンポーネント内で外部からのコンテンツを受け取るためのプレースホルダです。スロットを使用することで、再利用可能なコンポーネントを作成しつつ、コンポーネントを使用する人がその内部のコンテンツを自由にカスタマイズできるようになります。</p>
        <h2>デフォルトスロット</h2>
        <o-playground name="默认插槽示例" style="--editor-height: 500px">
          <code path="demo.html" preview>
    <template>
      <l-m src="./demo-comp.html"></l-m>
      <demo-comp>
        <div>Hello, OFAJS!</div>
      </demo-comp>
    </template>
  </code>
          <code path="demo-comp.html" active>
    <template component>
      <style>
        :host {
          display: block;
          border: 1px solid green;
          padding: 8px;
        }
      </style>スロット内容：
      <br />
      <span style="color: red;">
        <slot></slot>
      </span>
      <script>
        export default async ({ load }) => {
          return {
            tag: "demo-comp",
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h3>スロットのデフォルトコンテンツ</h3>
        <p>親コンポーネントがスロットコンテンツを提供していない場合、<code>&lt;slot&gt;&lt;/slot&gt;</code>内部の要素がデフォルトコンテンツとして表示されます。</p>
        <o-playground name="スロットデフォルトコンテンツ例" style="--editor-height: 500px">
          <code path="demo.html" preview>
    <template>
      <l-m src="./demo-comp.html"></l-m>
      <h3>スロットコンテンツあり：</h3>
      <demo-comp>
        <div>これはカスタムコンテンツです</div>
      </demo-comp>
      <h3>スロットコンテンツなし（デフォルトコンテンツを表示）：</h3>
      <demo-comp></demo-comp>
    </template>
  </code>
          <code path="demo-comp.html" active>
    <template component>
      <style>
        :host {
          display: block;
          border: 1px solid green;
          padding: 8px;
          margin-bottom: 10px;
        }
      </style>スロットコンテンツ：
      <span style="color: red;">
        <slot>
          <div>これはデフォルトコンテンツです</div>
        </slot>
      </span>
      <script>
        export default async ({ load }) => {
          return {
            tag: "demo-comp",
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>名前付きスロット</h2>
        <p>コンポーネントに複数のスロット位置が必要な場合、名前付きスロットを使って異なるスロットを区別できます。<code>&lt;slot name=&quot;xxx&quot;&gt;</code> で名前付きスロットを定義し、使用時には <code>slot=&quot;xxx&quot;</code> 属性でどのスロットにコンテンツを入れるかを指定します。</p>
        <o-playground name="名前付きスロットの例" style="--editor-height: 500px">
          <code path="demo.html" preview>
    <template>
      <l-m src="./demo-comp.html"></l-m>
      <demo-comp>
        <div>Hello, OFAJS!</div>
        <div slot="footer">Footer Content</div>
      </demo-comp>
    </template>
  </code>
          <code path="demo-comp.html" active>
    <template component>
      <style>
        :host {
          display: block;
          border: 1px solid green;
          padding: 8px;
        }
      </style>スロット内容：
      <br />
      <span style="color: red;">
        <slot></slot>
      </span>
      <br />
      <span style="color: blue;">
        <slot name="footer"></slot>
      </span>
      <script>
        export default async ({ load }) => {
          return {
            tag: "demo-comp",
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>多層スロットの受け渡し</h2>
        <p>スロットの内容は、複数層のコンポーネントを越えて渡すことができます。親コンポーネントが子コンポーネントにスロットの内容を渡した後、子コンポーネントはさらにそのスロットの内容を自身の子コンポーネントに渡すことができ、スロットの多層透過を実現します。</p>
        <o-playground name="多層スロット渡しサンプル" style="--editor-height: 500px">
          <code path="demo.html" preview>
    <template>
      <l-m src="./outer-comp.html"></l-m>
      <outer-comp>
        <div style="color: red;">最外層からのタイトル</div>
      </outer-comp>
    </template>
  </code>
          <code path="outer-comp.html">
    <template component>
      <style>
        :host {
          display: block;
          border: 1px solid green;
          padding: 8px;
          margin-bottom: 10px;
        }
      </style>
      <h3>外側コンポーネント</h3>
      <l-m src="./inner-comp.html"></l-m>
      <inner-comp>
        <div style="color: inherit;">
          <slot></slot>
        </div>
      </inner-comp>
      <script>
        export default async ({ load }) => {
          return {
            tag: "outer-comp",
          };
        };
      </script>
    </template>
  </code>
          <code path="inner-comp.html" active>
    <template component>
      <style>
        :host {
          display: block;
          border: 1px solid blue;
          padding: 8px;
        }
      </style>
      <h4>内側コンポーネント</h4>
      <slot></slot>
      <script>
        export default async ({ load }) => {
          return {
            tag: "inner-comp",
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>上記の例では：- 最外側の親コンポーネントが <code>slot=&quot;header&quot;</code> の内容を定義しています</p>
        <ul>
          <li>外側のコンポーネント（outer-comp）がこのスロットの内容を受け取り、それを内側のコンポーネント（inner-comp）に渡し続けます</li>
          <li>内側のコンポーネントは最終的に、最外側からのスロット内容をレンダリングします</li>
        </ul>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
  </o-app>
  <o-root-provider name="pui" theme="dark"></o-root-provider>
</body>
