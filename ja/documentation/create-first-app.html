<body>
  <o-app src="../../js/app-config.js">
    <template page>
      <link rel="stylesheet" href="../../css/github-markdown.css" />

      <article class="markdown-body">
        <h1>最初のアプリケーションを作成する</h1>
        <p>もし面倒な手順を踏みたくなく、ofa.js を使ってプロジェクト全体を開発したい場合は、ofa.js 公式が提供するオンライン構築・プレビューツールを活用すれば、ブラウザでワンクリックで最初のローカルアプリケーションを作成できます。</p>
        <p>このツールは静的サーバーでホストされており、すべての操作はブラウザのローカルで完了します。動的サーバーに接続する必要はありませんので、安心してお使いください。</p>
        <h2>起動プログラム</h2>
        <p><a href="https://core.noneos.com?redirect=studio" target="_blank">OFA Studio</a> をクリックして、ofa.js ビルドツールを開きます。このツールはブラウザのローカルファイルシステムを直接使用するため、インストールや設定は不要です。以下の手順に従って操作してください：</p>
        <ol>
          <li>ウェブサイトにアクセスし、プログラムの読み込みを待つ</li>
          <li>「新規プロジェクト作成」ボタンをクリックする</li>
          <li>「ofa.js アプリケーション」タイプを選択し、プロジェクト名を入力して、ローカルディレクトリを選択する</li>
          <li>表示された権限確認ダイアログで全て許可をクリックし、その後「作成を確認」をクリックする</li>
          <li>数秒待つと、選択したディレクトリにプロジェクトが初期化完了する</li>
        </ol>
        <p>プロジェクトの初期化が完了したら、<a href="https://code.visualstudio.com/" target="_blank">VSCode</a> などのエディタでこのディレクトリを開き、アプリケーションコードの記述を開始できます。</p>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>

  <o-root-provider name="pui" theme="dark"></o-root-provider>
