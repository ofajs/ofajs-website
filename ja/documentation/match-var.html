      <article class="markdown-body">
        <h1>スタイルクエリ</h1>
        <p><code>match-var</code> は、ofa.js においてCSS変数に基づいてスタイルをマッチングする機能コンポーネントです。<code>match-var</code> を使うことで、現在のコンポーネントのCSS変数の値に応じて動的に異なるスタイルをマッチングし適用できます。この特性は、スタイル関連のコンテキスト状態の受け渡し専用で、JavaScriptを使用する必要がなく、より便利に使用でき、テーマカラーなどのスタイルの受け渡しニーズに適しています。</p>
        <h2>核心概念</h2>
        <ul>
          <li><strong>match-var</strong>: スタイルマッチングコンポーネント。CSS変数の値に基づいて内部スタイルを適用するかどうかを決定します</li>
          <li><strong>属性マッチング</strong>: コンポーネント属性を通じて、マッチングが必要なCSS変数と期待値を定義します</li>
          <li><strong>スタイル適用</strong>: マッチングが成功した場合、内部の<code>&lt;style&gt;</code>タグのスタイルがコンポーネントに適用されます</li>
        </ul>
        <h2>基本的な使い方</h2>
        <p><code>match-var</code> コンポーネントは、属性を通して一致させるCSS変数と期待値を定義します。コンポーネントのCSS変数値が指定された属性値と一致した場合、内部で定義されたスタイルが適用されます。</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">match-var</span> <span class="hljs-attr">theme</span>=<span class="hljs-string">&quot;dark&quot;</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
    <span class="hljs-selector-pseudo">:host</span> {
      <span class="hljs-attribute">background-color</span>: <span class="hljs-number">#333</span>;
      <span class="hljs-attribute">color</span>: white;
    }
  </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">match-var</span>&gt;</span></code></pre>
        <h3>属性</h3>
        <p><code>match-var</code> コンポーネントは任意の属性を使用して、CSS変数のマッチングルールを定義します。属性名はCSS変数名（<code>--</code> プレフィックスを除く）に対応し、属性値は期待されるマッチング値です。</p>
        <h3>動作原理</h3>
        <ol>
          <li><strong>ブラウザサポート</strong>: ブラウザが <code>@container style()</code> クエリをサポートしている場合、CSSのネイティブ機能を直接使用します</li>
          <li><strong>フォールバック処理</strong>: サポートされていない場合は、CSS変数値の変化をポーリング検出し、一致した後に動的にスタイルを注入します</li>
          <li><strong>手動更新</strong>: <code>$.checkMatch()</code> メソッドを使用してスタイル検出を手動でトリガーできます</li>
        </ol>
        <h2>基本の例</h2>

        <h2>複数条件マッチング</h2>
        <p>複数の属性を同時に使用して、より複雑な一致条件を定義することができ、すべてのCSS変数が一致した場合にのみスタイルが適用されます。</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">match-var</span> <span class="hljs-attr">theme</span>=<span class="hljs-string">&quot;dark&quot;</span> <span class="hljs-attr">size</span>=<span class="hljs-string">&quot;large&quot;</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
    <span class="hljs-selector-pseudo">:host</span> {
      <span class="hljs-attribute">padding</span>: <span class="hljs-number">20px</span>;
      <span class="hljs-attribute">font-size</span>: <span class="hljs-number">18px</span>;
    }
  </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">match-var</span>&gt;</span></code></pre>

        <h2>checkMatch 手動更新</h2>
        <p>一部の場合、CSS変数の変更が自動的に検出されないことがあります。その場合は、手動で <code>$.checkMatch()</code> メソッドを呼び出してスタイルの検出をトリガーできます。</p>
        <blockquote>
          <p>現在の Firefox は <code>@container style()</code> クエリをまだサポートしていないため、手動で <code>$.checkMatch()</code> を呼び出す必要があります。将来的にブラウザがネイティブサポートした後は、システムが自動的に変数の変化を検出し、手動でのトリガーは不要になります。</p>
        </blockquote>
        <pre><code class="hljs language-javascript"><span class="hljs-attr">proto</span>: {
  <span class="hljs-title function_">updateTheme</span>(<span class="hljs-params"></span>) {
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">theme</span> = <span class="hljs-string">&#x27;dark&#x27;</span>;
    <span class="hljs-comment">// 手動でスタイルの検出をトリガー</span>
    $.<span class="hljs-title function_">checkMatch</span>();
  }
}</code></pre>
        <h2>ベストプラクティス</h2>
        <ol>
          <li><strong>CSSネイティブ機能の優先使用</strong>: <code>match-var</code> はブラウザのネイティブな <code>@container style()</code> クエリを優先的に使用し、モダンブラウザではパフォーマンスが向上します</li>
          <li><strong>スタイルの適切な整理</strong>: 関連するマッチングスタイルをまとめて配置し、保守性と理解しやすさを向上させます</li>
          <li><strong>data() バインディングの使用</strong>: <code>data()</code> ディレクティブと組み合わせることで、レスポンシブなスタイル切り替えを実現できます</li>
        </ol>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
