      <article class="markdown-body">
        <h1>スタイルクエリ</h1>
        <p><code>match-var</code> は ofa.js の、CSS 変数に基づいてスタイルをマッチングする機能コンポーネントです。<code>match-var</code> を使用すると、現在のコンポーネントの CSS 変数値に基づいて動的にマッチングし、異なるスタイルを適用できます。この機能はスタイル関連のコンテキスト状態の受け渡しに特化しており、JavaScript を使用する必要がないため、より便利で、テーマカラーなどのスタイル受け渡しのニーズに適しています。</p>
        <h2>核心概念</h2>
        <ul>
          <li><strong>match-var</strong>: スタイルマッチングコンポーネント。CSS変数の値に基づいて内部スタイルを適用するかどうかを決定します。</li>
          <li><strong>属性マッチング</strong>: コンポーネントの属性を通じて、マッチングするCSS変数と期待値を定義します。</li>
          <li><strong>スタイル適用</strong>: マッチングが成功した場合、内部の <code>&lt;style&gt;</code> タグのスタイルがコンポーネントに適用されます。</li>
        </ul>
        <h2>基本的な使い方</h2>
        <p><code>match-var</code> コンポーネントは属性を通じて一致させる CSS 変数と期待値を定義します。コンポーネントの CSS 変数値が指定された属性値と一致した場合、内部で定義されたスタイルが適用されます。</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">match-var</span> <span class="hljs-attr">theme</span>=<span class="hljs-string">&quot;dark&quot;</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
    <span class="hljs-selector-pseudo">:host</span> {
      <span class="hljs-attribute">background-color</span>: <span class="hljs-number">#333</span>;
      <span class="hljs-attribute">color</span>: white;
    }
  </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">match-var</span>&gt;</span></code></pre>
        <h3>属性</h3>
        <p><code>match-var</code> コンポーネントは、CSS 変数のマッチングルールを定義するために任意の属性を使用します。属性名は CSS 変数名（<code>--</code> プレフィックスなし）に対応し、属性値は期待されるマッチング値です。</p>
        <h3>動作原理</h3>
        <ol>
          <li><strong>ブラウザサポート</strong>: ブラウザが <code>@container style()</code> クエリをサポートしている場合、CSSのネイティブ機能を直接使用します。</li>
          <li><strong>フォールバック処理</strong>: サポートされていない場合、ポーリングによりCSS変数値の変更を検出し、一致した後に動的にスタイルを注入します。</li>
          <li><strong>手動リフレッシュ</strong>: <code>$.checkMatch()</code> メソッドを使用して手動でスタイル検出をトリガーできます。</li>
        </ol>
        <h2>基本例</h2>

      <div class="container">

                changeTheme(){

                }

        <h2>複数条件マッチング</h2>
        <p>複数の属性を同時に使用して、より複雑なマッチング条件を定義することができます。すべてのCSS変数がマッチした場合にのみ、スタイルが適用されます。</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">match-var</span> <span class="hljs-attr">theme</span>=<span class="hljs-string">&quot;dark&quot;</span> <span class="hljs-attr">size</span>=<span class="hljs-string">&quot;large&quot;</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
    <span class="hljs-selector-pseudo">:host</span> {
      <span class="hljs-attribute">padding</span>: <span class="hljs-number">20px</span>;
      <span class="hljs-attribute">font-size</span>: <span class="hljs-number">18px</span>;
    }
  </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">match-var</span>&gt;</span></code></pre>

        <h2>checkMatch 手動更新</h2>
        <p>状況によっては、CSS変数の変更が自動的に検出されない場合があります。その場合は、手動で <code>$.checkMatch()</code> メソッドを呼び出してスタイル検出をトリガーできます。</p>
        <blockquote>
          <p>現在の Firefox は <code>@container style()</code> クエリをまだサポートしていないため、<code>$.checkMatch()</code> を手動で呼ぶ必要があります；将来ブラウザがネイティブにサポートした後は、システムが変数の変化を自動的に検出し、手動でのトリガーは不要になります。</p>
        </blockquote>
        <pre><code class="hljs language-javascript"><span class="hljs-attr">proto</span>: {
  <span class="hljs-title function_">updateTheme</span>(<span class="hljs-params"></span>) {
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">theme</span> = <span class="hljs-string">&#x27;dark&#x27;</span>;
    <span class="hljs-comment">// 手動でスタイル検出をトリガー</span>
    $.<span class="hljs-title function_">checkMatch</span>();
  }
}</code></pre>
        <h2>ベストプラクティス</h2>
        <ol>
          <li><strong>優先的にCSSネイティブ機能を使用</strong>: <code>match-var</code>はブラウザネイティブの<code>@container style()</code>クエリを優先的に使用し、モダンブラウザではパフォーマンスが向上します</li>
          <li><strong>スタイルを適切に整理</strong>: 関連するマッチングスタイルをまとめて配置し、メンテナンスと理解を容易にします</li>
          <li><strong>data()バインディングを使用</strong>: <code>data()</code>ディレクティブと組み合わせることで、レスポンシブなスタイル切り替えを実現できます</li>
        </ol>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
