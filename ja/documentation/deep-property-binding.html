        <h1>属性バインディングの理解</h1>
        <p>前の内容では、<a href="./property-binding.html" olink="">属性バインディング</a>の基本的な使い方についてすでに初步的に紹介しました。前のケースでは、ブラウザのネイティブ要素（例： <code>textarea</code>）の <code>value</code> 属性をバインドするものでしたが、本節では属性バインディングの本質を深く探ります——それは実際にはコンポーネントインスタンス化後の JavaScript プロパティにバインドされるものであり、HTML 属性ではありません。</p>
        <h2>コンポーネントプロパティバインディングメカニズム</h2>
        <p>ofa.jsにおいて、親コンポーネントで<code>:toProp="fromProp"</code>構文を使用する場合、私たちは子コンポーネントインスタンスのJavaScriptプロパティを設定しており、HTML属性を設定しているわけではありません。これは、HTML属性（例：<code>attr:toKey="fromKey"</code>）を直接設定するのとは重要な違いがあります。</p>
        <p>以下の例は、属性バインディングを通じてカスタムコンポーネントにデータを渡す方法を示しています：</p>

        <p>この例では：- 親コンポーネントの <code>val</code> データが子コンポーネント <code>&lt;demo-comp&gt;</code> の <code>fullName</code> プロパティにバインドされる</p>
        <ul>
          <li><code>:full-name="val"</code> という構文を使って親コンポーネントの <code>val</code> 値を子コンポーネントの <code>fullName</code> プロパティに渡す</li>
          <li>子コンポーネントはその値を受け取った後、テンプレート内で <code>{{fullName}}</code> によって表示する</li>
        </ul>
        <h2>属性バインディング vs 特徴プロパティ継承</h2>
        <p>需要注意的是，属性绑定（<code>:</code>）与特征属性继承（<code>attr:</code>）有以下关键差异：</p>
        <h3>属性バインディング (<code>:</code>)</h3>
        <ul>
          <li>コンポーネントインスタンスにバインドされる JavaScript プロパティ</li>
          <li>渡されるデータは元の型（文字列、数値、ブール値など）を保持する</li>
          <li>コンポーネント内部で直接アクセスおよび変更可能で、コンポーネント内部で事前に <code>data</code> を定義する必要さえない</li>
        </ul>
        <h3>特徴属性の継承 (<code>attr:</code>)</h3>
        <ul>
          <li>HTML属性を設定する</li>
          <li>すべての値は文字列に変換される</li>
          <li>主に下層のDOM要素へ属性を渡すために使う</li>
          <li>複雑なデータを解釈するには特別な処理が必要</li>
          <li>属性値を受け取るには、あらかじめコンポーネント内部で <code>attrs</code> を定義しておく必要がある</li>
        </ul>
        <p>文法対比：```html</p>
        <!-- 属性バインディング：JavaScriptの値を渡し、データ型を保持 -->
        <p><my-component :data-value="complexObject"></my-component>
          <my-component :count="42"></my-component>
          <my-component :is-active="true"></my-component>
        </p>
        <!-- 属性継承：HTML属性を設定し、すべての値を文字列に変換 -->
        <p><my-component attr:data-value="simpleString"></my-component>
          <my-component attr:count="42"></my-component> <!-- 実際には文字列 "42" が渡される -->
        </p>

## 双方向データバインディング

インスタンス化されたコンポーネントも、双方向データバインディングをサポートしており、`sync:toProp="fromProp"` という構文を使用します。双方向バインディングは、親コンポーネントと子コンポーネント間でデータを同期させ、いずれかの側のデータが変更されると、もう一方もそれに応じて更新されます。

AngularやVueとは異なり、ofa.jsはコンポーネントに特別な設定や追加の操作を加えることなく、ネイティブで双方向データバインディング構文をサポートします。

- 親コンポーネントの入力ボックスに内容を入力すると、子コンポーネントは即座に新しい値を表示します
- 子コンポーネントの入力ボックスに内容を入力すると、親コンポーネントも即座に表示を更新します

### 双方向バインディングと通常のプロパティバインディングの違い

| 特性 | 普通属性绑定 (`:`) | 双向绑定 (`sync:`) |
|------|-------------------|-------------------|
| データの流れ | 一方向：親 → 子 | 双方向：親 ↔ 子 |
| 構文 | `:prop="value"` | `sync:prop="value"` |
| 子コンポーネントでの変更 | 親コンポーネントに影響しない | 親コンポーネントに影響する |
| 適用シナリオ | 親コンポーネントから子コンポーネントへの設定の受け渡し | 親子コンポーネント間でのデータ同期が必要な場合 |### 注意事項

1. **パフォーマンスの考慮**：双方向バインディングはデータが変化した際に再レンダリングを引き起こすため、複雑なシナリオでは慎重に使用すべきである
2. **データフローの制御**：双方向バインディングが多すぎるとデータフローの追跡が困難になるため、コンポーネント間の通信方法を合理的に設計することを推奨する
3. **コンポーネントの互換性**：すべてのコンポーネントが双方向バインディングに適しているわけではなく、コンポーネントの設計目的を考慮する必要がある</span></code></pre>

              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
  </o-app>
  <o-root-provider name="pui" theme="dark"></o-root-provider>
</body>
