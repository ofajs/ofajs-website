        <h1>属性バインディングを理解する</h1>
        <p>以前の内容では、<a href="./property-binding.html" olink="">プロパティバインディング</a>の基本的な使用方法を簡単に紹介しました。前回の例では、ブラウザのネイティブ要素（<code>textarea</code>など）の <code>value</code> プロパティをバインドするために使用しました。本節では、プロパティバインディングの本質についてさらに深く掘り下げます。実際には、HTML属性ではなく、コンポーネントのインスタンス化後のJavaScriptプロパティにバインドされるものです。</p>
        <h2>コンポーネント属性バインディングメカニズム</h2>
        <p>ofa.jsにおいて、親コンポーネント内で <code>:toProp="fromProp"</code> という構文を使用する際、私たちは子コンポーネントインスタンスのJavaScriptプロパティを設定しており、HTML属性を設定しているわけではありません。これは、HTML属性を直接設定する場合（例：<code>attr:toKey="fromKey"</code>）とは重要な違いがあります。</p>
        <p>次の例では、属性バインディングを使ってカスタムコンポーネントにデータを渡す方法を示しています：</p>

        <p>この例では：- 親コンポーネントの <code>val</code> データが子コンポーネント <code>&lt;demo-comp&gt;</code> の <code>fullName</code> プロパティにバインドされます</p>
        <ul>
          <li><code>:full-name="val"</code> 構文を使用して、親コンポーネントの <code>val</code> 値を子コンポーネントの <code>fullName</code> プロパティに渡します</li>
          <li>子コンポーネントは値を受け取った後、テンプレート内で <code>{{fullName}}</code> によって表示します</li>
        </ul>
        <h2>属性バインディング vs 特性属性継承</h2>
        <p>注意すべき点として、属性バインディング（<code>:</code>）と特徴属性継承（<code>attr:</code>）には以下の重要な違いがあります：</p>
        <h3>属性バインディング (<code>:</code>)</h3>
        <ul>
          <li>コンポーネントインスタンスにバインドされた JavaScript プロパティ</li>
          <li>渡されるデータは元の型（文字列、数値、ブール値など）を保持する</li>
          <li>コンポーネント内部で直接アクセスおよび変更が可能であり、コンポーネント内部で事前に <code>data</code> を定義する必要すらない</li>
        </ul>
        <h3>特徴属性の継承 (<code>attr:</code>)</h3>
        <ul>
          <li>HTML属性を設定</li>
          <li>すべての値は文字列に変換される</li>
          <li>主に下位のDOM要素に属性を渡すために使用</li>
          <li>複雑なデータを解析するには特別な処理が必要</li>
          <li>属性値を受け取るには事前にコンポーネント内部で<code>attrs</code>を定義する必要がある</li>
        </ul>
        <p>文法比較：```html</p>
        <!-- 属性バインディング：JavaScriptの値を渡し、データ型を保持 -->
        <p><my-component :data-value="complexObject"></my-component>
          <my-component :count="42"></my-component>
          <my-component :is-active="true"></my-component>
        </p>
        <!-- 属性継承：HTML属性を設定し、すべての値が文字列に変換される -->
        <p><my-component attr:data-value="simpleString"></my-component>
          <my-component attr:count="42"></my-component> <!-- 実際には文字列 "42" が渡されます -->
        </p>

## 双方向データバインディング

インスタンス化されたコンポーネントも、双方向データバインディングをサポートしており、`sync:toProp="fromProp"` という構文を使用します。双方向バインディングにより、親コンポーネントと子コンポーネント間でデータを同期でき、どちらかのデータが変更されると、もう一方もそれに応じて更新されます。

&gt; AngularやVueとは異なり、ofa.jsはコンポーネントに特別な設定や追加の操作を追加する必要がなく、ネイティブに双方向データバインディング構文をサポートしています。

- 親コンポーネントの入力ボックスに内容を入力すると、子コンポーネントはすぐに新しい値を表示します
- 子コンポーネントの入力ボックスに内容を入力すると、親コンポーネントもすぐに更新されて表示されます

### 双方向バインディングと通常のプロパティバインディングの違い

| 特性 | 通常の属性バインディング (`:`) | 双方向バインディング (`sync:`) |
|------|-------------------------------|-------------------------------|
| データの流れ | 単方向：親 → 子 | 双方向：親 ↔ 子 |
| 構文 | `:prop="value"` | `sync:prop="value"` |
| 子コンポーネントでの変更 | 親コンポーネントに影響しない | 親コンポーネントに影響する |
| 適したシナリオ | 親コンポーネントから子コンポーネントに設定を渡す | 親子コンポーネント間でのデータ同期が必要な場合 |### 注意事項

1. **パフォーマンスの考慮**：双方向バインディングはデータ変更時に再レンダリングをトリガーするため、複雑なシナリオでは慎重に使用すべきです
2. **データフローの制御**：過剰な双方向バインディングはデータフローの追跡を困難にする可能性があるため、コンポーネント間の通信方法を適切に設計することを推奨します
3. **コンポーネントの互換性**：すべてのコンポーネントが双方向バインディングに適しているわけではなく、コンポーネントの設計目的を考慮する必要があります</span></code></pre>

              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
  </o-app>

</body>
