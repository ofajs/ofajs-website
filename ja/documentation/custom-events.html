        <h1>カスタムイベント</h1>
        <p>ofa.jsでは、組み込みのDOMイベントに加えて、カスタムイベントを作成して使用することで、コンポーネント間の通信を実現することもできます。カスタムイベントは、コンポーネント指向開発における重要なメカニズムであり、コンポーネントがメッセージや状態の変化を上位にブロードキャストすることを可能にします。</p>
        <h2>emit 方法 - カスタムイベントをトリガーする</h2>
        <p><code>emit</code> メソッドはカスタムイベントをトリガーし、コンポーネント内部の状態変化やユーザー操作を外部のリスナーに通知するために使用されます。</p>
        <h3>基本的な使い方</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// シンプルなカスタムイベントを発火</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-title function_">emit</span>(<span class="hljs-string">'custom-event'</span>);

<span class="hljs-comment">// データ付きのカスタムイベントを発火</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-title function_">emit</span>(<span class="hljs-string">'data-changed'</span>, {
  <span class="hljs-attr">data</span>: {
    <span class="hljs-comment">// カスタムデータ、必要に応じて任意の構造</span>
    <span class="hljs-attr">newValue</span>: <span class="hljs-number">100</span>,
    <span class="hljs-attr">oldValue</span>: <span class="hljs-number">50</span>
  }
});</code></pre>
        <h3>emit メソッドパラメータ</h3>
        <p><code>emit</code> メソッドは2つの引数を受け取ります：</p>
        <ol>
          <li><strong>イベント名</strong>：文字列。トリガーするイベントの名前を指定します。</li>
          <li><strong>オプションオブジェクト</strong>（オプション）：イベント設定オプションを含む<ul>
              <li><code>data</code>：渡すデータ</li>
              <li><code>bubbles</code>：ブール値。イベントがバブリングするかどうかを制御します（デフォルトはtrue）</li>
              <li><code>composed</code>：ブール値。イベントがShadow DOMの境界を越えられるかどうかを制御します</li>
              <li><code>cancelable</code>：ブール値。イベントがキャンセル可能かどうかを制御します</li>
            </ul>
          </li>
        </ol>
        <p>そして上位の要素は<code>on</code>メソッド<a href="./event-binding.html" olink="">（イベントバインディング）</a>を使ってこのカスタムイベントをリッスンできる。</p>
        <h3>emit 使用例</h3>

        <h2>bubbles - イベントバブリング機構</h2>
        <p><code>bubbles</code> プロパティは、イベントが親要素へとバブリング（上方向に伝播）するかどうかを制御します。<code>true</code> に設定すると、イベントは DOM ツリーに沿って上方向に伝播します。デフォルト値は <code>true</code> です。<code>false</code> に設定すると、イベントはバブリングしません。</p>
        <h3>バブリングメカニズム詳解</h3>
        <ul>
          <li><strong>デフォルトの動作</strong>：<code>emit</code> によって発行されるイベントはデフォルトでバブリングが有効（<code>bubbles: true</code>）</li>
          <li><strong>バブリングパス</strong>：イベントはトリガー要素から始まり、階層を上へ伝播する</li>
          <li><strong>バブリングの阻止</strong>：イベントハンドラ内で <code>event.stopPropagation()</code> を呼ぶとバブリングを阻止できる</li>
        </ul>
        <h3>バブル例</h3>
        <o-playground name="カスタムイベント例" style="--editor-height: 500px">
          <code path="demo.html" preview="" unimportant="">
    <template>
      <o-page src="page1.html"></o-page>
    </template>
  </code>
          <code path="page1.html">
    <template page="">
      <l-m src="./bubble-component.html"></l-m>
      <style>
        :host {
          display: block;
          padding: 20px;
          border: 1px solid blue;
        }
      </style>
      <div on:child-event="handleChildEventFromComponent">
        <bubble-component on:child-event="handleDirectChildEvent"></bubble-component>
      </div>
      <p>外側コンテナ（バブリングイベントをリッスン）: {{bubbledEventCount}} 回</p>
      <p>内側コンポーネント（直接イベントをリッスン）: {{directEventCount}} 回</p>
      <p>受け取ったデータ: <span style="color:red;">{{result}}</span></p>
      <script>
        export default async () => {
          return {
            data: {
              result:"-",
              bubbledEventCount: 0,
              directEventCount: 0
            },
            proto: {
              handleDirectChildEvent(event) {
                this.directEventCount++;
                this.result = event.data;
              },
              handleChildEventFromComponent(event) {
                this.bubbledEventCount++;
                this.result = event.data;
              },
            }
          };
        };
      </script>
    </template>
  </code>
          <code path="bubble-component.html" active="">
    <template component="">
      <style>
        :host {
          display: block;
          padding: 15px;
          border: 1px solid green;
        }
      </style>
      <button on:click="triggerNonBubblingEvent">非バブリングイベントをトリガー</button>
      <button on:click="triggerBubblingEvent">バブリングイベントをトリガー</button>
      <script>
        export default async () => {
          return {
            tag: "bubble-component",
            proto: {
              triggerNonBubblingEvent() {
                // 非バブリングイベント、直接のリスナーのみがキャッチ
                this.emit('child-event', {
                  data: { type: 'non-bubbling', message: '非バブリングイベントがトリガーされました', timestamp: Date.now() },
                  bubbles: false
                });
              },
              triggerBubblingEvent() {
                // バブリングイベント、親要素へ伝播する
                this.emit('child-event', {
                  data: { type: 'bubbling', message: 'バブリングイベントがトリガーされました', timestamp: Date.now() },
                  bubbles: true
                });
              }
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>composed - Shadow DOM 境界を貫通</h2>
        <p><code>composed</code> 属性は、イベントが Shadow DOM の境界を越えるかどうかを制御します。これは Web Components の開発において特に重要であり、デフォルト値は <code>false</code> です。</p>
        <h3>貫通メカニズム詳解</h3>
        <ul>
          <li><strong>Shadow DOM の分離</strong>：デフォルトでは、イベントは Shadow DOM の境界を越えられません</li>
          <li><strong>透過の有効化</strong>：<code>composed: true</code> を設定すると、イベントが Shadow DOM の境界を越えられるようになります</li>
          <li><strong>使用シーン</strong>：コンポーネントがホスト環境にイベントを送信する必要がある場合、<code>composed: true</code> を設定する必要があります</li>
        </ul>

    </template>
  </code>

      <script>

              triggerNonComposedEvent() {
                // 非貫通イベント、直接のリスナーのみキャプチャされます

                });

                // 貫通イベント、Shadow DOM 境界を越えます
