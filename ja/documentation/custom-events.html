        <h1>カスタムイベント</h1>
        <p>ofa.jsでは、組み込みのDOMイベントに加えて、カスタムイベントを作成して使用し、コンポーネント間の通信を実現することができます。カスタムイベントはコンポーネント開発における重要なメカニズムであり、コンポーネントが上位にメッセージや状態変化をブロードキャストすることを可能にします。</p>
        <h2>emit メソッド - カスタムイベントをトリガーする</h2>
        <p><code>emit</code> メソッドはカスタムイベントを発行し、コンポーネント内部の状態変化やユーザー操作を外部のリスナーに通知するために使用されます。</p>
        <h3>基本的な使い方</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// シンプルなカスタムイベントをトリガーする</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-title function_">emit</span>(<span class="hljs-string">'custom-event'</span>);

<span class="hljs-comment">// データ付きのカスタムイベントをトリガーする</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-title function_">emit</span>(<span class="hljs-string">'data-changed'</span>, {
  <span class="hljs-attr">data</span>: {
    <span class="hljs-comment">// カスタムデータ、必要に応じて任意の構造で設定可能</span>
    <span class="hljs-attr">newValue</span>: <span class="hljs-number">100</span>,
    <span class="hljs-attr">oldValue</span>: <span class="hljs-number">50</span>
  }
});</code></pre>
        <h3>emit メソッドの引数</h3>
        <p><code>emit</code> メソッドは2つの引数を受け取ります：</p>
        <ol>
          <li><strong>イベント名</strong>：文字列、トリガーするイベントの名前を表す</li>
          <li><strong>オプションオブジェクト</strong>（任意）：イベント設定オプションを含む<ul>
              <li><code>data</code>：渡すデータ</li>
              <li><code>bubbles</code>：ブール値、イベントをバブリングさせるかどうか（デフォルトは true）</li>
              <li><code>composed</code>：ブール値、イベントが Shadow DOM の境界を越えられるかどうかを制御する</li>
              <li><code>cancelable</code>：ブール値、イベントをキャンセル可能にするかどうかを制御する</li>
            </ul>
          </li>
        </ol>
        <p>そして上位要素は<code>on</code>メソッド <a href="./event-binding.html" olink="">（イベントバインディング）</a> を使用してこのカスタムイベントを監視できます。</p>
        <h3>emit 使用例</h3>
        <o-playground name="emit 使用示例" style="--editor-height: 500px">

      <script>
        export default async () => {
          return {
            data: {
              val: "ofajs",
            },

          <code path="my-component.html" active="">
    <template component="">

        }
      </style>
      <button on:click="handleClick">クリックしてイベントをトリガー</button>
      <script>
        export default async () => {
          return {
            tag: "my-component",
            proto: {
              handleClick() {
                this.emit('button-clicked', {
                  data: {
                    message: 'ボタンがクリックされました',
                    timestamp: Date.now()
                  },
                });
              }
            }
          };
        };
      </script>
    </template>
  </code>

        <h2>bubbles - イベントバブリングメカニズム</h2>
        <p><code>bubbles</code> 属性は、イベントが親要素にバブルアップするかどうかを制御します。<code>true</code> に設定すると、イベントは DOM ツリーを上方向に伝播します。デフォルト値は <code>true</code> です。<code>false</code> に設定すると、イベントはバブルしません。</p>
        <h3>バブルメカニズムの詳細解説</h3>
        <ul>
          <li><strong>デフォルト動作</strong>：<code>emit</code>で発行されるイベントはデフォルトでバブリングが有効（<code>bubbles: true</code>）</li>
          <li><strong>バブリング経路</strong>：イベントはトリガー要素から始まり、段階的に上位へ伝播します</li>
          <li><strong>バブリングの停止</strong>：イベントハンドラ内で<code>event.stopPropagation()</code>を呼び出すとバブリングを停止できます</li>
        </ul>
        <h3>バブルソートの例</h3>
        <o-playground name="カスタムイベント例" style="--editor-height: 500px">
          <code path="demo.html" preview="" unimportant="">
    <template>
      <o-page src="page1.html"></o-page>
    </template>
  </code>
          <code path="page1.html">
    <template page="">
      <l-m src="./bubble-component.html"></l-m>
      <style>
        :host {
          display: block;
          padding: 20px;
          border: 1px solid blue;
        }
      </style>
      <div on:child-event="handleChildEventFromComponent">
        <bubble-component on:child-event="handleDirectChildEvent"></bubble-component>
      </div>
      <p>外側コンテナ（バブリングイベントを監視）: {{bubbledEventCount}} 回</p>
      <p>内側コンポーネント（直接イベントを監視）: {{directEventCount}} 回</p>
      <p>受信したデータ: <span style="color:red;">{{result}}</span></p>
      <script>
        export default async () => {
          return {
            data: {
              result:"-",
              bubbledEventCount: 0,
              directEventCount: 0
            },
            proto: {
              handleDirectChildEvent(event) {
                this.directEventCount++;
                this.result = event.data;
              },
              handleChildEventFromComponent(event) {
                this.bubbledEventCount++;
                this.result = event.data;
              },
            }
          };
        };
      </script>
    </template>
  </code>
          <code path="bubble-component.html" active="">
    <template component="">
      <style>
        :host {
          display: block;
          padding: 15px;
          border: 1px solid green;
        }
      </style>
      <button on:click="triggerNonBubblingEvent">非バブリングイベントをトリガー</button>
      <button on:click="triggerBubblingEvent">バブリングイベントをトリガー</button>
      <script>
        export default async () => {
          return {
            tag: "bubble-component",
            proto: {
              triggerNonBubblingEvent() {
                // 非バブリングイベント、直接リスナーのみがキャッチ
                this.emit('child-event', {
                  data: { type: 'non-bubbling', message: '非バブリングイベントがトリガーされました', timestamp: Date.now() },
                  bubbles: false
                });
              },
              triggerBubblingEvent() {
                // バブリングイベント、親要素へ伝播
                this.emit('child-event', {
                  data: { type: 'bubbling', message: 'バブリングイベントがトリガーされました', timestamp: Date.now() },
                  bubbles: true
                });
              }
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>composed - Shadow DOM の境界を貫通する</h2>
        <p><code>composed</code> プロパティは、イベントが Shadow DOM の境界を通過できるかどうかを制御します。これは Web Components の開発において特に重要であり、デフォルト値は <code>false</code> です。</p>
        <h3>貫通メカニズム詳解</h3>
        <ul>
          <li><strong>Shadow DOM 隔離</strong>：デフォルトでは、イベントは Shadow DOM の境界を越えられない</li>
          <li><strong>透過を有効化</strong>：<code>composed: true</code> を設定すると、イベントが Shadow DOM の境界を越えて伝播される</li>
          <li><strong>使用シーン</strong>：コンポーネントがホスト環境にイベントを送信する必要がある場合、<code>composed: true</code> を設定する必要がある</li>
        </ul>

    </template>
  </code>

      <script>
        export default async () => {

              result:"-",

              handleChildEventFromComponent(event) {
                this.bubbledEventCount++;
                this.result = event.data;
              },

          };
        };

    </template>
  </code>

          <code path="child-component.html" active="">
    <template component="">
      <style>
        :host {
          display: block;
          padding: 15px;
          border: 1px solid green;
        }
      </style>
      <button on:click="triggerNonComposedEvent">非透過イベントをトリガー</button>
      <button on:click="triggerComposedEvent">透過イベントをトリガー</button>
      <script>
        export default async () => {
          return {
            tag: "child-component",
            proto: {
              triggerNonComposedEvent() {
                // 非透過イベント、直接の監視者のみがキャプチャします
                this.emit('child-event', {
                  data: { type: 'non-composed', message: '非透過イベントトリガー', timestamp: Date.now() },
                  composed: false
                });
              },
              triggerComposedEvent() {
                // 透過イベント、Shadow DOM の境界を越えます
                this.emit('child-event', {
                  data: { type: 'composed', message: '透過イベントトリガー', timestamp: Date.now() },
                  composed: true
                });
              }
            }
          };
        };
      </script>
    </template>
  </code>
