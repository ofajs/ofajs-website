<body>
  <o-app src="../../js/app-config.js">
    <template page>
      <link rel="stylesheet" href="../../css/github-markdown.css" />
      <link rel="stylesheet" href="../../css/hljs.css" />
      <l-m src="../../comps/center-block.html"></l-m>
      <l-m src="../../comps/article-code.html"></l-m>
      <l-m src="https://playground.ofajs.com/comps/o-playground/o-playground.html"></l-m>
      <style>
        :host {
          display: block;
          height: 100%;
          box-sizing: border-box;
          overflow: auto;
        }
      </style>
      <link rel="stylesheet" href="../../css/page.css" />
      <article class="markdown-body">
        <h1>プロパティレスポンス</h1>
        <p>前の <a href="./property-binding.html" olink="">プロパティバインディング</a> では、シンプルなプロパティ応答メカニズム、つまりコンポーネントのプロパティ値をテキスト表示にレンダリングする方法について説明しました。</p>
        <p>ofa.jsは、基本的なプロパティ値のリアクティブなサポートだけでなく、多層にネストされたオブジェクト内部のプロパティ値に対するリアクティブなレンダリングもサポートしています。</p>
        <o-playground name="非リアクティブデータの例" style="--editor-height: 500px">
          <code>
    <template page="">
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <p style="color: blue;">count: {{count}}</p>
      <p style="color: green;">count2: {{obj.count2}}</p>
      <button on:click="handleAddCount">増加</button>
      <script>
        export default async () => {
          return {
            data: {
              count: 20,
              obj: {
                count2: 100,
              },
            },
            proto:{
              handleAddCount(){
                this.count++;
                this.obj.count2++;
              }
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>ofa.js インスタンスオブジェクトにバインドされたすべてのデータは、自動的にリアクティブデータに変換されます。リアクティブデータは、文字列、数値、真偽値、配列、オブジェクトなどの基本データ型のみをサポートしています。関数やクラスインスタンスなどの複雑なデータ型については、<strong>非リアクティブプロパティ</strong>として保存する必要があり、これらのプロパティの変更はコンポーネントの再レンダリングをトリガーしません。</p>
        <h2>非レスポンシブデータ</h2>
        <p>時折、Promise インスタンス、正規表現オブジェクト、またはその他の複雑なオブジェクトなど、リアクティブな更新の必要がないデータを保存する必要があります。その場合は非リアクティブなプロパティを使用します。これらのプロパティの変更はコンポーネントの再レンダリングを引き起こさず、ビューと連動する必要がないデータの保存に適しています。</p>
        <p>非応答性プロパティの命名は通常、プロパティ名の前にアンダースコア <code>_</code> を接頭辞として追加し、応答性プロパティとの区別を示します。</p>
        <o-playground name="非応答データの例" style="--editor-height: 500px">
          <code>
    <template page="">
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <p style="color: blue;">count: {{count}}</p>
      <p style="color: green;">count2: {{_count2}}</p>
      <button on:click="count++">Blue増加</button>
      <button on:click="_count2++">Green増加</button>
      <script>
        export default async () => {
          return {
            data: {
              count: 20,
              _count2: 100,
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p><code>Green增加</code>ボタンをクリックすると、<code>_count2</code>の数値は実際には増加しているが、それは非リアクティブなプロパティであるためビューの更新がトリガーされず、インターフェース上の表示は変化しない。<code>Blue增加</code>ボタンをクリックすると、<code>count</code>はリアクティブなプロパティであるためコンポーネント全体の再レンダリングがトリガーされ、その際に初めてGreenの表示内容が同期して更新される。</p>
        <p>非応答型のオブジェクトデータは、応答型のオブジェクトデータよりもパフォーマンスが優れています。なぜなら、非応答型データはコンポーネントの再レンダリングをトリガーしないからです。</p>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
  </o-app>
  <o-root-provider name="pui" theme="dark"></o-root-provider>
</body>

</html>
