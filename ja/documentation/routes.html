        <h1>シングルページアプリケーション</h1>
        <p>シングルページアプリケーションは、<code>o-app</code>コンポーネントをブラウザのアドレスバーにバインディングし、WebページのURLとアプリ内のページパスを同期させます。シングルページアプリケーションを有効にすると：</p>
        <ul>
          <li>ウェブページを更新しても現在のルーティング状態が維持される</li>
          <li>アドレスバーのURLをコピーして別のブラウザやタブで開いても、アプリケーションの状態を復元できる</li>
          <li>ブラウザの進む/戻るボタンが正常に動作する</li>
        </ul>
        <h2>基本的な使い方</h2>
        <p>公式の <code>o-router</code> コンポーネントで <code>o-app</code> コンポーネントを囲むだけで、シングルページアプリケーションが実現できます。</p>

        <h2>fix-body 属性</h2>
        <p><code>fix-body</code> 属性を追加すると、<code>o-router</code> は自動的に <code>html</code> と <code>body</code> のスタイルをリセットし、デフォルトの margin と padding を削除します。</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">o-router</span> <span class="hljs-attr">fix-body</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">o-app</span> <span class="hljs-attr">src</span>=<span class="hljs-string">&quot;./app-config.js&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-app</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">o-router</span>&gt;</span></code></pre>
        <p>これは以下のシナリオで特に便利です：- <code>o-app</code>がビューポートを完全に埋める必要がある</p>
        <ul>
          <li>アプリケーションがページの唯一のコンテンツである場合</li>
        </ul>

  const loadingEl = $({
    tag: "div",
    css: {
      width: "100%",
      height: "100%",
      position: "absolute",
      zIndex: 1000,
    },
    html: `
      <div style="transition: all 10s cubic-bezier(0, 0, 0.22, 0.84) 0s; height: 2px;width: 0;background-color: rgb(0, 161, 46);"></div>
    `,
  });
  setTimeout(() => (loadingEl[0].style.width = "98%"));

    loadingEl[0].style["transition-duration"] = "0.1s";
    loadingEl[0].style.width = "100%";
    setTimeout(() => {
      \$.fn.remove.call(loadingEl);
    }, 200);
  };
  return loadingEl;
};

        <h2>動作原理</h2>
        <p>シングルページアプリケーションはブラウザのハッシュモードに基づいて実装：</p>
        <ol>
          <li>アプリ内でページが切り替わると、<code>o-router</code> は自動的にアドレスバーのハッシュ値を更新します（例：<code>#/about.html</code>）</li>
          <li>ユーザーがページを更新したり URL でアクセスしたりすると、<code>o-router</code> はハッシュ値を読み取り、対応するページを読み込みます</li>
          <li>ブラウザの進む／戻るボタンはハッシュの変化をトリガーし、アプリのページナビゲーションを制御します</li>
        </ol>
        <h2>URL 変化の例</h2>
        <p>アプリケーションに <code>home.html</code> と <code>about.html</code> という2つのページがあると仮定します：</p>
        <table>
          <thead>
            <tr>
              <th>ユーザー操作</th>
              <th>アドレスバーの変化</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>アプリを開く</td>
              <td><code>index.html</code> → <code>index.html#/home.html</code></td>
            </tr>
            <tr>
              <td>Aboutページに移動</td>
              <td><code>index.html#/home.html</code> → <code>index.html#/about.html</code></td>
            </tr>
            <tr>
              <td>戻るをクリック</td>
              <td><code>index.html#/about.html</code> → <code>index.html#/home.html</code></td>
            </tr>
            <tr>
              <td>ページを更新</td>
              <td>現在のhashを維持</td>
            </tr>
          </tbody>
        </table>
        <ul>
          <li>シングルページアプリケーションは、<strong>1つ</strong>の <code>o-app</code> コンポーネントとのみ連携して使用できます</li>
        </ul>
      </article>

      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
