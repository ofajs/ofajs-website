      <article>
        <h1>API ドキュメント</h1>
        <p> ofa.js はテンプレート構文をサポートするだけでなく、DOMを直接操作するための豊富なAPIも提供します。 <a href="https://jquery.com/" target="_blank">jQuery</a> と同様に、簡潔なofa.jsの構文で冗長なネイティブJavaScriptを置き換え、DOM操作を簡単に行えます。 </p>
        <p> コンポーネントやページモジュールのライフサイクル関数やカスタムメソッドの中で、いつでもofa.jsが提供する API、を呼び出してDOM要素を柔軟かつ効率的に操作できます。 </p>
        <api-container>
          <api-list>
            <h3>インスタンス関連</h3>
            <api-item>
              <a href="./instance/dollar.html" olink="">$(selector)</a>
              <p>ofa.jsのコア関数で、DOM要素インスタンスを取得・操作するために使用します</p>
            </api-item>
            <api-item>
              <a href="./instance/all.html" olink="">all</a>
              <p>現在の要素のすべての子要素インスタンスを取得します</p>
            </api-item>
            <api-item>
              <a href="./instance/shadow.html" olink="">shadow</a>
              <p>現在の要素のシャドウルートを取得します</p>
            </api-item>
            <api-item>
              <a href="./instance/prev.html" olink="">prev</a>
              <p>現在の要素の前の兄弟要素を取得します</p>
            </api-item>
            <api-item>
              <a href="./instance/prevs.html" olink="">prevs</a>
              <p>現在の要素より前のすべての兄弟要素を取得します</p>
            </api-item>
            <api-item>
              <a href="./instance/next.html" olink="">next</a>
              <p>現在の要素の次の兄弟要素を取得します</p>
            </api-item>
            <api-item>
              <a href="./instance/nexts.html" olink="">nexts</a>
              <p>現在の要素より後のすべての兄弟要素を取得します</p>
            </api-item>
            <api-item>
              <a href="./instance/siblings.html" olink="">siblings</a>
              <p>現在の要素のすべての兄弟要素を取得します</p>
            </api-item>
            <api-item>
              <a href="./instance/parent.html" olink="">parent</a>
              <p>現在の要素の親要素を取得します</p>
            </api-item>
            <api-item>
              <a href="./instance/parents.html" olink="">parents</a>
              <p>現在の要素のすべての祖先要素を取得します</p>
            </api-item>
            <api-item>
              <a href="./instance/clone.html" olink="">clone</a>
              <p>現在の要素とその子要素を複製します</p>
            </api-item>
            <api-item>
              <a href="./instance/ele.html" olink="">ele</a>
              <p>現在の要素の子要素インスタンスを取得します</p>
            </api-item>
            <api-item>
              <a href="./instance/root.html" olink="">root</a>
              <p>現在の要素が属するルートインスタンスを取得します</p>
            </api-item>
            <api-item>
              <a href="./instance/children.html" olink="">子要素</a>
              <p>現在の要素のすべての子要素を取得します</p>
            </api-item>
            <api-item>
              <a href="./instance/host.html" olink="">host</a>
              <p>現在の要素が属するウェブコンポーネントのホスト要素を取得します</p>
            </api-item>
            <api-item>
              <a href="./instance/app.html" olink="">app</a>
              <p>現在の要素が属するo-appコンポーネントインスタンスを取得します</p>
            </api-item>
          </api-list>
          <api-list>
            <h3>ノード操作</h3>
            <api-item>
              <a href="./operation/array-like.html" olink="">push</a>
              <p>現在の要素に子要素を追加します</p>
            </api-item>
            <api-item>
              <a href="./operation/array-like.html?L=11" olink="">pop</a>
              <p>現在の要素の最後の子要素を削除します</p>
            </api-item>
            <api-item>
              <a href="./operation/array-like.html?L=14" olink="">shift</a>
              <p>現在の要素の最初の子要素を削除します</p>
            </api-item>
            <api-item>
              <a href="./operation/array-like.html?L=8" olink="">unshift</a>
              <p>現在の要素の最初の子要素として追加します</p>
            </api-item>
            <api-item>
              <a href="./operation/array-like.html?L=17" olink="">splice</a>
              <p>現在の要素の子要素を追加または削除します</p>
            </api-item>
            <api-item>
              <a href="./operation/before.html" olink="">before</a>
              <p>現在の要素の前に子要素を追加します</p>
            </api-item>
            <api-item>
              <a href="./operation/after.html" olink="">after</a>
              <p>現在の要素の後に子要素を追加します</p>
            </api-item>
            <api-item>
              <a href="./operation/remove.html" olink="">remove</a>
              <p>現在の要素を削除します</p>
            </api-item>
            <api-item>
              <a href="./operation/wrap.html" olink="">wrap</a>
              <p>現在の要素を指定した要素でラップします</p>
            </api-item>
            <api-item>
              <a href="./operation/unwrap.html" olink="">unwrap</a>
              <p>現在の要素の親要素によるラップを解除します</p>
            </api-item>
          </api-list>
          <api-list>
            <h3>プロパティ操作</h3>
            <api-item>
              <a href="./props/text.html" olink="">text</a>
              <p>要素のテキストコンテンツを取得または設定します</p>
            </api-item>
            <api-item>
              <a href="./props/html.html" olink="">html</a>
              <p>要素のHTMLコンテンツを取得または設定します</p>
            </api-item>
            <api-item>
              <a href="./props/attr.html" olink="">attr</a>
              <p>要素の属性を取得または設定します</p>
            </api-item>
            <api-item>
              <a href="./props/css.html" olink="">css</a>
              <p>要素のスタイルを取得または設定します</p>
            </api-item>
            <api-item>
              <a href="./props/style.html" olink="">style</a>
              <p>要素のstyleオブジェクトを取得します</p>
            </api-item>
            <api-item>
              <a href="./props/class-list.html" olink="">classList</a>
              <p>要素のクラス名リストを取得します</p>
            </api-item>
            <api-item>
              <a href="./props/data.html" olink="">data</a>
              <p>要素のdata属性を取得または設定します</p>
            </api-item>
          </api-list>
          <api-list>
            <h3>イベント関連</h3>
            <api-item>
              <a href="./event/on.html" olink="">on</a>
              <p>要素にイベントリスナーを追加します</p>
            </api-item>
            <api-item>
              <a href="./event/one.html" olink="">one</a>
              <p>要素に一度だけ実行されるイベントリスナーを追加します</p>
            </api-item>
            <api-item>
              <a href="./event/emit.html" olink="">emit</a>
              <p>要素のカスタムイベントを発火します</p>
            </api-item>
            <api-item>
              <a href="./event/off.html" olink="">off</a>
              <p>要素のイベントリスナーを削除します</p>
            </api-item>
          </api-list>
          <api-list>
            <h3>その他</h3>
            <api-item>
              <a href="./others/app.html" olink="">o-appコンポーネント</a>
              <p>ofa.jsアプリケーションのルートコンポーネントで、アプリケーションの状態とルーティングを管理するために使用します</p>
            </api-item>
            <api-item>
              <a href="./others/page.html" olink="">o-pageコンポーネント</a>
              <p>ofa.jsのページコンポーネントで、シングルページアプリケーションのページを作成するために使用します</p>
            </api-item>
            <api-item>
              <a href="./others/form-data.html" olink="">formData</a>
              <p>フォームデータを取得します</p>
            </api-item>
            <api-item>
              <a href="./others/tag.html" olink="">tag</a>
              <p>要素のタグ名を取得します</p>
            </api-item>
            <api-item>
              <a href="./others/index.html" olink="">index</a>
              <p>要素の親要素内でのインデックスを取得します</p>
            </api-item>
            <api-item>
              <a href="./others/is.html" olink="">is</a>
              <p>要素が指定されたセレクタに一致するかどうかを判定します</p>
            </api-item>
            <api-item>
              <a href="./others/refresh.html" olink="">refresh</a>
              <p>現在のコンポーネントまたはページをリフレッシュします</p>
            </api-item>
            <api-item>
              <a href="./others/path.html" olink="">PATH</a>
              <p>現在のページのパスを取得します</p>
            </api-item>
            <api-item>
              <a href="./others/extend.html" olink="">extend</a>
              <p>ofa.jsの機能を拡張します</p>
            </api-item>
            <api-item>
              <a href="./others/version.html" olink="">version</a>
              <p>ofa.jsのバージョン番号を取得します</p>
            </api-item>
            <api-item>
              <a href="./others/stanz.html" olink="">インスタンスデータ機能</a>
              <p>Stanzはofa.jsのリアクティブデータ機能で、データの自動更新をサポートします</p>
            </api-item>
          </api-list>
        </api-container>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
  </o-app>
  <o-root-provider name="pui" theme="dark"></o-root-provider>
