        <h1>$</h1>
        <p><code>$</code> メソッドは ofa.js のコア関数であり、DOM 要素インスタンスを取得および操作するために使用されます。以下では、<code>$</code> の主な機能について詳しく説明します：</p>
        <h2>要素インスタンスの取得</h2>
        <p><code>`<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script
      src="https://cdn.jsdelivr.net/gh/kirakiray/ofa.js@4.6.21/dist/ofa.mjs#debug"
      type="module"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/gh/kirakiray/ofa.js@4.6.21/libs/scsr/dist/scsr.min.mjs"
      type="module"
    ></script>

    <link rel="icon" href="https://ofajs.com/publics/logo.svg" />
    <link rel="stylesheet" href="../../../css/palette.css" pui-colors />
    <link rel="stylesheet" href="../../../css/theme.css" />
    <link rel="stylesheet" href="../../../css/github-markdown.css" />
    <link rel="stylesheet" href="../../../css/hljs.css" />
    <style>
      html,
      body {
        height: 100%;
        padding: 0;
        margin: 0;
        overflow: hidden;
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          Segoe UI,
          Microsoft Yahei,
          Helvetica,
          Arial,
          sans-serif,
          Apple Color Emoji,
          Segoe UI Emoji;
      }

      o-app {
        height: 100%;
      }

      @keyframes fadein {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      o-app {
        animation: fadein 0.1s ease-in-out;
      }
    </style>
    <script type="module" src="../../../js/util.js"></script>
    <script async="" src="https://www.googletagmanager.com/gtag/js?id=G-7L1TCCJZT6"></script>         <script>           window.dataLayer = window.dataLayer || [];           function gtag() {             dataLayer.push(arguments);           }           gtag("js", new Date());            gtag("config", "G-7L1TCCJZT6");         </script>
  </head>
  <body>
    <o-app src="../../../js/app-config.js">
      <template page>
        <link rel="stylesheet" href="../../../css/github-markdown.css" />
        <link rel="stylesheet" href="../../../css/hljs.css" />
        <l-m src="../../../comps/center-block.html"></l-m>
        <l-m src="../../../comps/article-code.html"></l-m>
        <l-m
          src="https://playground.ofajs.com/comps/o-playground/o-playground.html"
        ></l-m>
        <style>
          :host {
            display: block;
            height: 100%;
            box-sizing: border-box;
            overflow: auto;
          }
        </style>
        <link rel="stylesheet" href="../../../css/page.css" />
        </code> メソッドを使用すると、ページ上の <a href="https://developer.mozilla.org/zh-CN/docs/Web/CSS/Reference/Selectors/Selector_list" target="_blank">CSS セレクタ</a> に一致する最初の要素のインスタンスを取得し、それを操作することができます。以下に例を示します：</p>
        <o-playground name="$ - 要素の取得">
          <code path="demo.html">
    <template>
      <div id="target1">target 1 text</div>
      <script>
        setTimeout(()=>{
          \$("#target1").text = 'change target 1';
        },500);
      </script>
    </template>
  </code>
        </o-playground>
        <p>上の例では、<code>$</code> 記号を使用して <code>id</code> が "target1" の要素インスタンスを選択し、<code>text</code> 属性を設定することでそのテキスト内容を変更しました。</p>
        <h2>子要素検索の例</h2>
        <p>インスタンスも <code>$</code> メソッドを持っており、インスタンス上の <code>$</code> メソッドを通じて、要素インスタンスの最初の条件を満たす子要素インスタンスを取得できます。</p>
        <o-playground name="$ - 子要素の検索">
          <code path="demo.html">
    <template>
      <div id="target1">
        <h3>target</h3>
        <p>I am target1</p>
      </div>
      <script>
        const tar = $("#target1");
        tar.$('h3').text = 'change target title';
      </script>
    </template>
  </code>
        </o-playground>
        <p>取得した要素インスタンスを直接他の場所に挿入しないでください。このような操作は元の要素に影響を与えます。コピーを作成する必要がある場合は、<a href="./clone.html" olink="">clone</a> メソッドを使用できます。</p>
        <o-playground name="$ - インスタンス特性" style="--editor-height: 360px">
          <code path="demo.html">
    <template>
      <div id="pos1" style="border:red solid 1px;">
        <h3>position 1</h3>
        <p id="target1" style="color:green">I am target1</p>
      </div>
      <div id="pos2" style="border:blue solid 1px;margin:8px;">
        <h3>position 2</h3>
      </div>
      <script>
        setTimeout(()=>{
          const tar = $("#target1");
          \$("#pos2").push(tar);
        },500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>シャドウノード内の子要素を取得する</h2>
        <p><a href="./shadow.html" olink="">shadow</a> 属性でインスタンスを取得した後、<code>$</code> メソッドを使用して目的の要素を取得できます：</p>
        <pre><code class="hljs language-javascript">$(<span class="hljs-string">'my-component'</span>).<span class="hljs-property">shadow</span>.$(<span class="hljs-string">"selector"</span>).<span class="hljs-title function_">method</span>(xxx)</code></pre>
        <h2>直接インスタンス化要素</h2>
        <p>以下の方法で、ネイティブ要素を直接 <code>$</code> インスタンスオブジェクトとして初期化できます：</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> ele = <span class="hljs-variable language_">document</span>.<span class="hljs-title function_">createElement</span>(<span class="hljs-string">'div'</span>);
<span class="hljs-keyword">const</span> $ele = $(ele);</code></pre>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> ele = <span class="hljs-variable language_">document</span>.<span class="hljs-title function_">querySelector</span>(<span class="hljs-string">'#target'</span>);
<span class="hljs-keyword">const</span> $ele = $(ele);</code></pre>
        <p>このように、既存のHTML要素を<code>$</code>インスタンスに簡単に変換でき、<code>$</code>が提供する機能を使って操作や処理を行うことができます。</p>
        <h2>生成要素インスタンス</h2>
        <p><code>$</code> は既存の要素インスタンスを取得するだけでなく、新しい要素インスタンスを作成し、ページに追加するためにも使用できます。</p>
        <h3>文字列による生成</h3>
        <p>文字列を使って新しい要素のインスタンスを <code>$</code> 関数で作成することができます。次のようにします：</p>
        <o-playground name="$ - 文字列生成" style="--editor-height: 260px">
          <code path="demo.html">
    <template>
      <div id="target1">
        <b>target1:</b>
      </div>
      <script>
        const newEl = $(`<div style="color:red">target 1 にテキストを追加</div>`);
        \$('#target1').push(newEl);
      </script>
    </template>
  </code>
        </o-playground>
        <p>この例では、<code>$</code> 関数を使用して、指定されたスタイルとテキストコンテンツを持つ新しい要素インスタンスを作成し、それを <code>id</code> が "target1" の既存の要素インスタンス内に追加しました。</p>
        <h3>オブジェクトによる生成</h3>
        <p>また、<code>$</code> 関数を使用してオブジェクト方式で新しい要素インスタンスを生成することもできます。次のように：</p>
        <o-playground name="$ - オブジェクト生成" style="--editor-height: 360px">
          <code path="demo.html">
    <template>
      <div id="target1">
        <b>target1:</b>
      </div>
      <script>
        const newEl = $({
          tag: "div",
          text: "add target 1 text",
          css: {
            color: "red"
          }
        });
        \$('#target1').push(newEl);
      </script>
    </template>
  </code>
        </o-playground>
        <p>この例では、<code>$</code> 関数を使用して、タグタイプ、テキスト内容、スタイル属性を含む新しい要素インスタンスをオブジェクトの方法で定義し、それを <code>id</code> が "target1" の既存の要素インスタンス内に追加しました。</p>

      <script>
        export const parent = "../../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
