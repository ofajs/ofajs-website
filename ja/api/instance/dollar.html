        <h1>$</h1>
        <p><code>$</code> メソッドは、ofa.js における中核となる関数で、DOM 要素インスタンスの取得および操作に用いられます。以下では、<code>$</code> の主な機能について詳しく説明します：</p>
        <h2>要素インスタンスの取得</h2>
        <p>通过 <code>$</code> 方法，你可以获取页面上符合 <a href="https://developer.mozilla.org/zh-CN/docs/Web/CSS/Reference/Selectors/Selector_list" target="_blank">CSS 选择器</a> 的第一个元素实例，并对其进行操作。以下是一个示例：</p>
        <o-playground name="$ - 要素を取得">
          <code path="demo.html">
    <template>
      <div id="target1">target 1 text</div>
      <script>
        setTimeout(()=>{
          \$("#target1").text = 'change target 1';
        },500);
      </script>
    </template>
  </code>
        </o-playground>
        <p>上記の例では、<code>$</code>記号を使用して<code>id</code>が"target1"の要素インスタンスを選択し、<code>text</code>プロパティを設定することでそのテキスト内容を変更しています。</p>
        <h2>子要素の検索例</h2>
        <p>インスタンスも <code>$</code> メソッドを持っており、インスタンスの <code>$</code> メソッドを通じて、要素インスタンスの最初の条件に一致する子要素インスタンスを取得できます。</p>
        <o-playground name="$ - 子要素を検索">
          <code path="demo.html">
    <template>
      <div id="target1">
        <h3>target</h3>
        <p>I am target1</p>
      </div>
      <script>
        const tar = $("#target1");
        tar.$('h3').text = 'change target title';
      </script>
    </template>
  </code>
        </o-playground>
        <p>要素のインスタンスを直接他の場所に挿入しないでください。そのような操作は元の要素に影響を与えます。コピーを作成する必要がある場合は、<a href="./clone.html" olink="">clone</a> メソッドを使用してください。</p>
        <o-playground name="$ - インスタンス特性" style="--editor-height: 360px">
          <code path="demo.html">
    <template>
      <div id="pos1" style="border:red solid 1px;">
        <h3>position 1</h3>
        <p id="target1" style="color:green">I am target1</p>
      </div>
      <div id="pos2" style="border:blue solid 1px;margin:8px;">
        <h3>position 2</h3>
      </div>
      <script>
        setTimeout(()=>{
          const tar = $("#target1");
          \$("#pos2").push(tar);
        },500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>シャドウノード内の子要素を取得する</h2>
        <p><a href="./shadow.html" olink="">shadow</a> プロパティでインスタンスを取得した後、<code>$</code> メソッドを使って目的の要素を取得できます：</p>
        <pre><code class="hljs language-javascript">$(<span class="hljs-string">'my-component'</span>).<span class="hljs-property">shadow</span>.$(<span class="hljs-string">"selector"</span>).<span class="hljs-title function_">method</span>(xxx)</code></pre>
        <h2>直接インスタンス化要素</h2>
        <p>次の方法で、ネイティブ要素を直接 <code>$</code> インスタンスオブジェクトとして初期化できます：</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> ele = <span class="hljs-variable language_">document</span>.<span class="hljs-title function_">createElement</span>(<span class="hljs-string">'div'</span>);
<span class="hljs-keyword">const</span> $ele = $(ele);</code></pre>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> ele = <span class="hljs-variable language_">document</span>.<span class="hljs-title function_">querySelector</span>(<span class="hljs-string">'#target'</span>);
<span class="hljs-keyword">const</span> $ele = $(ele);</code></pre>
        <p>これにより、既存のHTML要素を<code>$</code>インスタンスに簡単に変換して、<code>$</code>が提供する機能を使用して操作や処理を行うことができます。</p>
        <h2>要素インスタンスの生成</h2>
        <p>さらに、<code>$</code>は既存の要素インスタンスを取得するだけでなく、新しい要素インスタンスを作成してページに追加することもできます。</p>
        <h3>文字列による生成</h3>
        <p>文字列を使って <code>$</code> 関数で新しい要素インスタンスを作成できます。以下のようにします：</p>
        <o-playground name="$ - 文字列生成" style="--editor-height: 260px">
          <code path="demo.html">
    <template>
      <div id="target1">
        <b>target1:</b>
      </div>
      <script>
        const newEl = $(`<div style="color:red">add target 1 text</div>`);
        \$('#target1').push(newEl);
      </script>
    </template>
  </code>
        </o-playground>
        <p>この例では、<code>$</code> 関数を使用して指定したスタイルとテキストコンテンツを持つ新しい要素インスタンスを作成し、それを <code>id</code> が "target1" の既存の要素インスタンス内に追加しています。</p>
        <h3>オブジェクト生成による</h3>
        <p><code>$</code> 関数を使用して、オブジェクトの方法で新しい要素インスタンスを生成することもできます。以下に示します：</p>
        <o-playground name="$ - オブジェクト生成" style="--editor-height: 360px">
          <code path="demo.html">
    <template>
      <div id="target1">
        <b>target1:</b>
      </div>
      <script>
        const newEl = $({
          tag: "div",
          text: "add target 1 text",
          css: {
            color: "red"
          }
        });
        \$('#target1').push(newEl);
      </script>
    </template>
  </code>
        </o-playground>
        <p>この例では、<code>$</code> 関数を使用してオブジェクト形式で新しい要素インスタンスを定義しています。タグタイプ、テキスト内容、スタイル属性を含み、それを <code>id</code> が "target1" の既存の要素インスタンス内に追加します。</p>
        <h2>取得したサンプルとページ／コンポーネントインスタンスの関係</h2>
        <p><code>$</code> メソッドは、グローバルから対応するページやコンポーネント要素のインスタンスを取得するために使用でき、その機能はページやコンポーネントモジュール内のライフサイクルメソッドにおける <code>this</code> の指す先と同じです。</p>

        export const parent = "../../../layout.html";

            detached() {
              revoke(this);
