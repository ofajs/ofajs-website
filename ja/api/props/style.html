      <article class="markdown-body">
        <h1>style</h1>
        <p><code>style</code> 属性はネイティブと一致するようにします。</p>
        <p>ご注意ください、<code>style</code>属性は実際のスタイル値を取得することはできず、<code>style</code>属性に設定された値のみを取得します。<code>style</code>メソッドは<a href="./css.html" olink="">cssメソッド</a>と似ていますが、全量のスタイルを上書きすることはできません。<code>css</code>と比較して、<code>style</code>メソッドの内部実行効率はより高くなっています。</p>
        <p>以下は、<code>style</code>の使い方を示す例です：</p>
        <o-playground name="style - 直接使用" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <div id="target">元のテキスト</div>
      <br>
      <h4>ロガー</h4>
      <div id="logger" style="border:#aaa solid 1px;padding:8px;"></div>
      <script>
        $("#logger").text = $("#target").style.color;
        setTimeout(()=> {
          $('#target').style.color = 'red';
          $("#logger").text = $("#target").style.color;
        }, 1000);
      </script>
    </template>
  </code>
        </o-playground>
        <p>覚えておいてください。<code>style</code> メソッドは <code>style</code> 属性の値のみを取得・設定し、実際の計算スタイルではありません。</p>
        <h2>テンプレート構文方式での使用</h2>
        <p>あなたはテンプレート構文を使用してターゲット要素のスタイルを設定することもできます。</p>
        <o-playground name="style - テンプレート構文" style="--editor-height: 400px">
          <code path="demo.html" preview="">
    <template>
      <l-m src="./style-demo.html"></l-m>
      <style-demo></style-demo>
      <script>
        setTimeout(()=>{
          \$("style-demo").txt = "blue";
        },1000);
      </script>
    </template>
  </code>
          <code path="style-demo.html" active="">
    <template component="">
      <div :style.color="txt">I am target</div>
      <script>
        export default {
          tag: "style-demo",
          data: {
            txt: "red"
          },
          ready(){
            setTimeout(()=>{
              this.txt = "blue";
            }, 500);
          }
        };
      </script>
    </template>
  </code>
        </o-playground>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
