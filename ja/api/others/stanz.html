        <h1>インスタンスデータの特徴</h1>
        <p><code>$</code> によって取得または作成されたインスタンスオブジェクトは、完全な stanz データ特性を持っている。なぜなら、<code>$</code> インスタンスは stanz を継承しているからだ。これは、stanz が提供するデータ操作メソッドや特性を利用して、インスタンスオブジェクトのデータを操作し、監視できることを意味する。</p>
        <blockquote>
          <p>以下の例では通常の要素を使用しています。カスタムコンポーネントは通常、登録済みのデータを持っているのに対し、通常の要素はタグ情報のみを含むことが多いため、デモに適しています。</p>
        </blockquote>
        <h2>watch</h2>
        <p>インスタンスは <code>watch</code> メソッドを使って値の変更を監視できます。オブジェクトの子オブジェクトの値を変更しても、そのオブジェクトの <code>watch</code> メソッドで変更を監視できます。</p>
        <p>以下は、<code>$</code> インスタンスと <code>watch</code> メソッドの使用方法を示す例です：</p>
        <o-playground name="stanz - watch" style="--editor-height: 480px">
          <code path="demo.html">
    <template>
      <div id="target"></div>
      <br>
      <div id="logger" style="border: #aaa solid 1px; padding: 8px"></div>
      <script>
        const target = $("#target");
        \$("#logger").text = target;
        target.watch(() => {
          \$("#logger").text = target;
        });
        setTimeout(() => {
          target.aaa = "I am aaa";
        }, 600);
        setTimeout(() => {
          target.bbb = {
            child: {
              val: "I am bbb child val",
            },
          };
        }, 1200);
        setTimeout(() => {
          target.bbb.child.val = "change bbb child val";
        }, 1800);
      </script>
    </template>
  </code>
        </o-playground>
        <p>この例では、まず <code>$</code> インスタンスオブジェクト <code>target</code> を作成し、<code>watch</code> メソッドを使ってその変更を監視します。オブジェクトの子オブジェクトの値（例えば <code>target.bbb.child.val</code> の値）を変更しても、<code>watch</code> メソッドでそれらの変更を検出し、<code>logger</code> 要素の内容を更新できます。これは <code>$</code> インスタンスオブジェクトの強力な特性を示しており、オブジェクトの変化を簡単に監視できるようにします。</p>
        <h2>watchTick</h2>
        <p><code>watchTick</code> と <code>watch</code> メソッドの機能は似ていますが、<code>watchTick</code> 内部にはスロットル操作があり、単一スレッドで1回実行されるため、パフォーマンスがより求められるシナリオでは、データの変動をより効果的に監視できます。</p>
        <p>以下は、<code>$</code> インスタンスの <code>watchTick</code> メソッドの使用方法を示す例です：</p>
        <o-playground name="stanz - watchTick" style="--editor-height: 480px">
          <code path="demo.html">
    <template>
      <div id="target"></div>
      <br>
      <div id="logger1" style="border: blue solid 1px; margin: 8px"></div>
      <div id="logger2" style="border: red solid 1px; margin: 8px"></div>
      <script>
        const target = $("#target");
        let count1 = 0;
        target.watch(() => {
          count1++;
          \$("#logger1").text = 'watch 実行回数：' + count1;
        });
        let count2 = 0;
        target.watchTick(()=>{
          count2++;
          \$("#logger2").text = 'watchTick 実行回数：' + count2;
        });
        setTimeout(() => {
          target.aaa = "I am aaa";
          target.bbb = "I am bbb";
          target.ccc = "I am ccc";
        }, 1000);
      </script>
    </template>
  </code>
        </o-playground>
        <p>この例では、まず <code>$</code> インスタンスオブジェクト <code>target</code> を作成します。そして、<code>watch</code> メソッドと <code>watchTick</code> メソッドを使用して、オブジェクトの変更を監視します。<code>watch</code> メソッドはデータが変更されるとすぐに実行され、<code>watchTick</code> メソッドは単一スレッド下で一度だけ実行されるため、監視操作の頻度を制限できます。ニーズに応じて、<code>watch</code> または <code>watchTick</code> メソッドを使用してデータの変化を監視できます。</p>
        <h2>unwatch</h2>
        <p><code>unwatch</code>メソッドは、データの監視を解除するために使用され、以前に登録した<code>watch</code>または<code>watchTick</code>の監視をキャンセルできます。</p>
        <p>以下は、<code>$</code> インスタンスの <code>unwatch</code> メソッドの使用例です：</p>
        <o-playground name="stanz - unwatch" style="--editor-height: 480px">
          <code path="demo.html">
    <template>
      <div id="target"></div>
      <br>
      <div id="logger1" style="border: blue solid 1px; margin: 8px"></div>
      <div id="logger2" style="border: red solid 1px; margin: 8px"></div>
      <script>
        const target = $("#target");
        const tid1 = target.watch(() => {
          \$("#logger1").text = JSON.stringify(target);
        });
        const tid2 = target.watchTick(()=>{
          \$("#logger2").text = JSON.stringify(target);
        });
        setTimeout(() => {
          target.aaa = "I am aaa";
          target.unwatch(tid1);
          target.unwatch(tid2);
        }, 500);
        setTimeout(() => {
          target.bbb = "I am aaa";
        }, 1000);
      </script>
    </template>
  </code>
        </o-playground>
        <p>この例では、まず <code>$</code> インスタンスオブジェクト <code>target</code> を作成し、次に <code>watch</code> メソッドと <code>watchTick</code> メソッドを使用してそれぞれ2つのリスナーを登録しました。その後、<code>unwatch</code> メソッドを使用して、前に保存したリスナーの戻り値 <code>tid1</code> と <code>tid2</code> を渡し、これら2つのリスナーを取り消します。つまり、最初の <code>setTimeout</code> 内でのプロパティ変更は、リスナーが取り消されているため、どのリスナーもトリガーされません。</p>
        <h2>盗聴されない値</h2>
        <p><code>$</code> インスタンスでは、アンダースア <code>_</code> で始まるプロパティ名は、<code>watch</code> や <code>watchTick</code> メソッドで監視されないことを示します。これは一時的またはプライベートなプロパティに非常に便利で、監視をトリガーせずに自由に変更できます。</p>
        <p>テンプレート内では、これは<a href="../../documentation/state-management.html" olink="">非反応データ</a>と呼ばれます。</p>
        <p>以下は、アンダースコアで始まる属性値を使用して監視を避ける方法を示す例です：</p>
        <o-playground name="stanz - 非リアクティブデータ" style="--editor-height: 480px">
          <code path="demo.html">
    <template>
      <div id="target"></div>
      <br>
      <div id="logger" style="border: #aaa solid 1px; padding: 8px"></div>
      <script>
        const target = $("#target");
        \$("#logger").text = target;
        target.watch(() => {
          \$("#logger").text = target;
        });
        setTimeout(() => {
          target._aaa = "I am aaa";
        }, 600);
        setTimeout(() => {
          target._aaa = "change aaa";
        }, 1200);
      </script>
    </template>
  </code>
        </o-playground>
        <p>この例では、<code>$</code> インスタンスオブジェクト <code>target</code> を作成し、<code>watch</code> メソッドを使ってプロパティ値の変更を監視しています。<code>setTimeout</code> 内で <code>_aaa</code> プロパティ値を変更しようとしますが、この変更は監視をトリガーしません。これは、監視をトリガーせずにプロパティ値を更新する必要がある場合に非常に便利です。</p>
        <h2>基本特徴</h2>
        <p>インスタンスに設定されたオブジェクトデータはStanzインスタンスに変換され、このStanzインスタンスは監視を可能にします。</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> obj = {
  <span class="hljs-attr">val</span>: <span class="hljs-string">"I am obj"</span>
};

$(<span class="hljs-string">"#target"</span>).<span class="hljs-property">obj</span> = obj;
<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>($(<span class="hljs-string">"#target"</span>).<span class="hljs-property">obj</span>.<span class="hljs-property">val</span> === obj.<span class="hljs-property">val</span>);
<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>($(<span class="hljs-string">"#target"</span>).<span class="hljs-property">obj</span> === obj);</code></pre>
        <p>また <code>$.stanz</code> を使用して、インスタンスにバインドされていない Stanz データを作成することもできます。</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> data = $.<span class="hljs-title function_">stanz</span>({
  <span class="hljs-attr">val</span>: <span class="hljs-string">"I am val"</span>
});

data.<span class="hljs-title function_">watch</span>(<span class="hljs-function">() =&gt;</span> {
  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(data.<span class="hljs-property">val</span>);
});

data.<span class="hljs-property">val</span> = <span class="hljs-string">"change val"</span>;</code></pre>
        <p>これらの例は、オブジェクトデータを Stanz インスタンスに設定してリスニングを行うための基本的な特徴を示しています。</p>
        <p>より完全な機能については <a href="https://github.com/ofajs/stanz" target="_blank">stanz</a> をご覧ください。</p>
