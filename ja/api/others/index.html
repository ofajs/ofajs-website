      <article class="markdown-body">
        <h1>index</h1>
        <p><code>index</code> 属性は、要素がその親要素内で占める位置を取得するために使用されます。この位置は0から始まるため、最初の要素の位置は0、2番目の要素は1、というように続きます。</p>
        <p>以下の例では、<code>index</code> プロパティを使用して要素が親要素内で何番目に位置するかを取得する方法を示します：</p>
        <o-playground name="index - 位置を取得" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <ul>
        <li>I am 1</li>
        <li id="target">I am target</li>
        <li>I am 3</li>
      </ul>
      <div id="logger" style="color: green">logger</div>
      <script>
        setTimeout(() => {
          $("#logger").text = $("#target").index;
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
        <p>この例では、まず <code>id</code> が &quot;target&quot; の <code>&lt;li&gt;</code> 要素を選択します。次に、<code>index</code> プロパティを使用してその要素が親要素である <code>&lt;ul&gt;</code> の中で何番目にあるかを取得します。2番目の要素なので、<code>index</code> の値は1となります。その後、この値を <code>id</code> が &quot;logger&quot; の <code>&lt;div&gt;</code> 要素に表示します。</p>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
