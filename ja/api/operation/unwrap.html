      <article class="markdown-body">
        <h1>unwrap</h1>
        <p><code>unwrap</code> メソッドは、ターゲット要素の外側のラッピング要素を削除するために使用されます。</p>
        <o-playground name="unwrap - ラップを解除" style="--editor-height: 440px">
          <code path="demo.html">
    <template>
      <style> div{border: #aaa solid 1px; margin:8px; padding:8px;} </style>
      <div style="color:red;border-color:red;">
        <div id="target">I am target</div>
      </div>
      <script>
        setTimeout(()=>{
          \$('#target').unwrap();
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>注意事項</h2>
        <p>対象要素<strong>は親ノードを持っている必要があります</strong>、そうでないと unwrap 操作を実行できません。</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> $el = $(<span class="hljs-string">`
&lt;div&gt;
    &lt;div id=&quot;target&quot;&gt;&lt;/div&gt;
&lt;/div&gt;
`</span>);

$el.<span class="hljs-title function_">unwrap</span>(); <span class="hljs-comment">// エラー、親要素がないため、unwrapできません</span>
$el.$(<span class="hljs-string">&#x27;#target&#x27;</span>).<span class="hljs-title function_">unwrap</span>(); <span class="hljs-comment">// 正しい、ラップ要素を取り除きます</span></code></pre>
        <p>ターゲット要素が他の兄弟要素を持っている場合、unwrap を実行することもできません。</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> $el = $(<span class="hljs-string">`
&lt;div&gt;
    &lt;div id=&quot;target&quot;&gt;&lt;/div&gt;
    &lt;div&gt;I am siblings&lt;/div&gt;
&lt;/div&gt;
`</span>);

$el.$(<span class="hljs-string">&#x27;#target&#x27;</span>).<span class="hljs-title function_">unwrap</span>(); <span class="hljs-comment">// エラー、他の隣接ノードが存在するため</span></code></pre>
        <p><strong>o-fill や o-if などのテンプレートコンポーネント内で操作しないでください。</strong></p>
      </article>
