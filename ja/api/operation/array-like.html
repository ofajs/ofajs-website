<body>
  <o-app src="../../../js/app-config.js">

      <article class="markdown-body">
        <h1>子要素の追加と削除</h1>
        <p>要素インスタンスは配列のような特性を持っており、ノードの追加や削除は配列の操作方法を使うだけで済みます。その中で <code>push</code>、<code>unshift</code>、<code>pop</code>、<code>shift</code>、<code>splice</code> メソッドを使用する際は、内部で自動的に <a href="../instance/dollar.html" olink="">$ メソッド</a> の初期化処理が実行されるため、具体的な要素の文字列やオブジェクトを直接記載できます。</p>
        <p>同様に、他の配列メソッド、例えば <code>forEach</code>、<code>map</code>、<code>some</code> なども使用できます。</p>
        <p>テンプレート構文を持つ要素に対して、子要素を追加または削除しないでください。</p>
        <h2>push</h2>
        <p>末尾に子要素を追加する。</p>
        <o-playground name="array-like - push" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <ul>
        <li>I am 1</li>
        <li>I am 2</li>
        <li>I am 3</li>
      </ul>
      <script>
        setTimeout(()=>{
          \$("ul").push(`<li style="color:red;">新しいli</li>`);
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>unshift</h2>
        <p>配列の先頭に子要素を追加する。</p>
        <o-playground name="array-like - unshift" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <ul>
        <li>I am 1</li>
        <li>I am 2</li>
        <li>I am 3</li>
      </ul>
      <script>
        setTimeout(()=>{
          \$("ul").unshift(`<li style="color:blue;">new li</li>`);
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>pop</h2>
        <p>末尾から子要素を削除</p>
        <o-playground name="array-like - pop" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <ul>
        <li>I am 1</li>
        <li>I am 2</li>
        <li>I am 3</li>
      </ul>
      <script>
        setTimeout(()=>{
          \$("ul").pop();
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>shift</h2>
        <p>配列の先頭から子要素を削除します。</p>
        <o-playground name="array-like - shift" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <ul>
        <li>I am 1</li>
        <li>I am 2</li>
        <li>I am 3</li>
      </ul>
      <script>
        setTimeout(()=>{
          \$("ul").shift();
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>splice</h2>
        <p>既存の子要素を削除または置換したり、新しい子要素を追加したりすることができます。その使用方法は配列の <code>splice</code> メソッドと似ています。</p>
        <o-playground name="array-like - splice" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <ul>
        <li>私は1です</li>
        <li>私は2です</li>
        <li>私は3です</li>
      </ul>
      <script>
        setTimeout(()=>{
          \$("ul").splice(1, 2, `<li style="color:green;">new li 1</li>`, `<li style="color:green;">new li 2</li>`);
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
      </article>
