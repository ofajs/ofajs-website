      <article class="markdown-body">
        <h1>$</h1>
        <p><code>$</code> 方法是 ofa.js 中的核心函数，用于获取和操作 DOM 元素实例。下面将详细介绍 <code>$</code> 的主要功能：</p>
        <h2>获取元素实例</h2>
        <p>通过 <code>$</code> 方法，你可以获取页面上符合 <a href="https://developer.mozilla.org/zh-CN/docs/Web/CSS/Reference/Selectors/Selector_list" target="_blank">CSS 选择器</a> 的第一个元素实例，并对其进行操作。以下是一个示例：</p>
        <o-playground name="$ - 获取元素">
          <code path="demo.html">
    <template>
      <div id="target1">target 1 text</div>
      <script>
        setTimeout(()=>{
          \$("#target1").text = 'change target 1';
        },500);
      </script>
    </template>
  </code>
        </o-playground>
        <p>在上面的示例中，我们使用 <code>$</code> 符号选择了具有 <code>id</code> 为 "target1" 的元素实例，并通过设置 <code>text</code> 属性来修改其文本内容。</p>
        <h2>查找子元素实例</h2>
        <p>实例也拥有 <code>$</code> 方法，可以通过实例上的 <code>$</code> 方法获取元素实例的第一个符合条件的子元素实例。</p>
        <o-playground name="$ - 查找子元素">
          <code path="demo.html">
    <template>
      <div id="target1">
        <h3>target</h3>
        <p>I am target1</p>
      </div>
      <script>
        const tar = $("#target1");
        tar.$('h3').text = 'change target title';
      </script>
    </template>
  </code>
        </o-playground>
        <p>请不要将获取的元素实例直接插入到其他地方，这样的操作会导致原来的元素受到影响。如果需要创建一份副本，可以使用 <a href="./clone.html" olink="">clone</a> 方法。</p>
        <o-playground name="$ - 实例特性" style="--editor-height: 360px">
          <code path="demo.html">
    <template>
      <div id="pos1" style="border:red solid 1px;">
        <h3>position 1</h3>
        <p id="target1" style="color:green">I am target1</p>
      </div>
      <div id="pos2" style="border:blue solid 1px;margin:8px;">
        <h3>position 2</h3>
      </div>
      <script>
        setTimeout(()=>{
          const tar = $("#target1");
          \$("#pos2").push(tar);
        },500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>获取影子节点内的子元素</h2>
        <p>可以通过 <a href="./shadow.html" olink="">shadow</a> 属性获取实例后，再通过 <code>$</code> 方法获取想要的元素：</p>
        <pre><code class="hljs language-javascript">$(<span class="hljs-string">'my-component'</span>).<span class="hljs-property">shadow</span>.$(<span class="hljs-string">"selector"</span>).<span class="hljs-title function_">method</span>(xxx)</code></pre>
        <h2>直接实例化元素</h2>
        <p>你可以通过以下方式直接将原生元素初始化为 <code>$</code> 实例对象：</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> ele = <span class="hljs-variable language_">document</span>.<span class="hljs-title function_">createElement</span>(<span class="hljs-string">'div'</span>);
<span class="hljs-keyword">const</span> $ele = $(ele);</code></pre>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> ele = <span class="hljs-variable language_">document</span>.<span class="hljs-title function_">querySelector</span>(<span class="hljs-string">'#target'</span>);
<span class="hljs-keyword">const</span> $ele = $(ele);</code></pre>
        <p>这样，你可以方便地将现有的 HTML 元素转换为 <code>$</code> 实例，以便使用 <code>$</code> 提供的功能进行操作和处理。</p>
        <h2>生成元素实例</h2>
        <p>除了，<code>$</code> 获取现有的元素实例还可以用于创建新的元素实例，并将其添加到页面中。</p>
        <h3>通过字符串生成</h3>
        <p>你可以使用 <code>$</code> 函数通过字符串创建新元素实例，如下所示：</p>
        <o-playground name="$ - 字符串生成" style="--editor-height: 260px">
          <code path="demo.html">
    <template>
      <div id="target1">
        <b>target1:</b>
      </div>
      <script>
        const newEl = $(`<div style="color:red">add target 1 text</div>`);
        \$('#target1').push(newEl);
      </script>
    </template>
  </code>
        </o-playground>
        <p>在这个示例中，我们使用 <code>$</code> 函数创建了一个具有指定样式和文本内容的新元素实例，并将其添加到具有 <code>id</code> 为 "target1" 的现有元素实例内。</p>
        <h3>通过对象生成</h3>
        <p>你还可以使用 <code>$</code> 函数通过对象的方式生成新元素实例，如下所示：</p>
        <o-playground name="$ - 对象生成" style="--editor-height: 360px">
          <code path="demo.html">
    <template>
      <div id="target1">
        <b>target1:</b>
      </div>
      <script>
        const newEl = $({
          tag: "div",
          text: "add target 1 text",
          css: {
            color: "red"
          }
        });
        \$('#target1').push(newEl);
      </script>
    </template>
  </code>
        </o-playground>
        <p>在这个示例中，我们使用 <code>$</code> 函数通过对象的方式定义了一个新元素实例，包括标签类型、文本内容和样式属性，并将其添加到具有 <code>id</code> 为 "target1" 的现有元素实例内。</p>
        <h2>获取的示例和页面/组件实例的关系</h2>
        <p><code>$</code> 方法可用于从全局获取对应页面或组件元素的实例，其功能与页面或组件模块内生命周期方法中的 <code>this</code> 指向相同。</p>

      <script>
        export const parent = "../../../layout.html";

          load,

            init,

          } = await load("../../../js/init.js");

            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {

            },
            detached() {
              revoke(this);
            },
