<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>all</title>
  <script src="https://cdn.jsdelivr.net/gh/kirakiray/ofa.js@4.6.20/dist/ofa.mjs#debug" type="module"></script>
  <script src="https://cdn.jsdelivr.net/gh/kirakiray/ofa.js@4.6.20/libs/scsr/dist/scsr.min.mjs" type="module"></script>
  <link rel="icon" href="../../../img/logo.svg" />
  <link rel="stylesheet" href="../../../css/palette.css" pui-colors />
  <link rel="stylesheet" href="../../../css/theme.css" />
  <link rel="stylesheet" href="../../../css/github-markdown.css" />
  <link rel="stylesheet" href="../../../css/hljs.css" />
  <style>
    html,
    body {
      height: 100%;
      padding: 0;
      margin: 0;
      overflow: hidden;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        Segoe UI,
        Microsoft Yahei,
        Helvetica,
        Arial,
        sans-serif,
        Apple Color Emoji,
        Segoe UI Emoji;
    }

    o-app {
      height: 100%;
    }

    @keyframes fadein {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    o-app {
      animation: fadein 0.1s ease-in-out;
    }
  </style>
  <script type="module" src="../../../js/util.js"></script>
</head>

<body>
  <o-app src="../../../js/app-config.js">
    <template page>
      <link rel="stylesheet" href="../../../css/github-markdown.css" />
      <link rel="stylesheet" href="../../../css/hljs.css" />
      <l-m src="../../../comps/center-block.html"></l-m>
      <l-m src="../../../comps/article-code.html"></l-m>
      <l-m src="https://playground.ofajs.com/comps/o-playground/o-playground.html"></l-m>
      <style>
        :host {
          display: block;
          height: 100%;
          box-sizing: border-box;
          overflow: auto;
        }
      </style>
      <link rel="stylesheet" href="../../../css/page.css" />
      <article class="markdown-body">
        <h1>all</h1>
        <p>使用 <code>all</code> 方法，你可以获取页面上符合 CSS 选择器的所有元素，并返回一个数组包含这些元素实例。</p>
        <o-playground name="all - 获取所有元素" style="--editor-height: 360px">
          <code path="demo.html">
    <template>
      <ul>
        <li>I am 1</li>
        <li>I am 2</li>
        <li>I am 3</li>
      </ul>
      <script>
        setTimeout(()=>{
          \$.all("li").forEach((item,index)=>{
            item.text = `change item ${index}`;
          });
        },500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>获取子元素</h2>
        <p>实例也拥有 <code>all</code> 方法，可以通过实例上的 <code>all</code> 方法选择并获取子元素。</p>
        <o-playground name="all - 获取子元素" style="--editor-height: 360px">
          <code path="demo.html">
    <template>
      <div id="target1">
        <ul>
          <li>I am 1</li>
          <li>I am 2</li>
          <li>I am 3</li>
        </ul>
      </div>
      <script>
        const tar = $("#target1");
        setTimeout(()=>{
          tar.all("li").forEach((item,index)=>{
            item.text = `change item ${index}`;
          });
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
  </o-app>
  <o-root-provider name="pui" theme="dark"></o-root-provider>
</body>

</html>
