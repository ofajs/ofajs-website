  <o-app src="../../../js/app-config.js">

      <link rel="stylesheet" href="../../../css/page.css" />
      <article class="markdown-body">
        <h1>attr</h1>
        <p><code>attr</code> 方法用于获取或设置元素的 attributes。</p>
        <h2>直接使用</h2>
        <p>你可以直接使用 <code>attr</code> 方法获取或设置元素的属性。</p>
        <o-playground name="attr - 直接使用" style="--editor-height: 500px">
          <code path="demo.html">
    <template>
      <style>
        [test-attr="1"] {
          color: red;
        }
        [test-attr="2"]{
          color: green;
        }
      </style>
      <div id="target1" test-attr="1">I am target 1</div>
      <div id="target2">I am target 2</div>
      <div id="logger" style="border:blue solid 1px;padding:8px;margin:8px;">logger</div>
      <script>
        $("#logger").text = $("#target1").attr('test-attr');
        setTimeout(()=> {
          $("#target1").attr('test-attr', '2')
          $("#logger").text = $("#target1").attr('test-attr');
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>模板语法方式使用</h2>
        <p>你还可以使用 <code>attr:aaa=&quot;bbb&quot;</code> 方式，将目标元素的 <strong>aaa</strong> 属性设置为组件 <strong>bbb</strong> 的值。这种方法对于组件渲染特别有用。</p>
        <o-playground name="attr - 模板语法" style="--editor-height: 600px">
          <code path="demo.html" preview>
    <template>
      <l-m src="./attr-demo.html"></l-m>
      <attr-demo></attr-demo>
      <script>
        setTimeout(()=>{
          \$("attr-demo").txt = "2";
        },1000);
      </script>
    </template>
  </code>
          <code path="attr-demo.html" active>
    <template component>
      <style>
        [test-attr="1"] {
          color: red;
        }
        [test-attr="2"]{
          color: green;
        }
      </style>
      <div attr:test-attr="txt">I am target</div>
      <script>
        export default {
          tag: "attr-demo",
          data: {
            txt: "1"
          },
          ready(){
            setTimeout(()=>{
              this.txt = "2";
            }, 500);
          }
        };
      </script>
    </template>
  </code>
        </o-playground>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../../layout.html";

          query

            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
