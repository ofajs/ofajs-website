      <article class="markdown-body">
        <h1>wrap</h1>
        <p><code>wrap</code> 方法用于在目标元素的外部包裹一层元素。在执行 <code>wrap</code> 操作之前，会自动执行 <a href="../instance/dollar.html" olink="">$ 方法</a> 的初始化操作，因此可以直接填写具体的元素字符串或对象。</p>
        <o-playground name="wrap - 包裹元素" style="--editor-height: 440px">
          <code path="demo.html">
    <template>
      <style> div{border: #aaa solid 1px; margin:8px; padding:8px;} </style>
      <div>
        <div>I am 1</div>
        <div id="target">I am 2</div>
        <div>I am 3</div>
      </div>
      <script>
        setTimeout(()=>{
          \$('#target').wrap(`<div style="border-color:red;">wrap</div>`);
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>注意事项</h2>
        <p>目标元素<strong>必须拥有父节点</strong>，否则包裹操作会失败。</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> $el = $(<span class="hljs-string">`
&lt;div&gt;
    &lt;div id="target"&gt;&lt;/div&gt;
&lt;/div&gt;
`</span>);

$el.<span class="hljs-title function_">wrap</span>(<span class="hljs-string">"&lt;div&gt;new div&lt;/div&gt;"</span>); <span class="hljs-comment">// 错误，没有父元素，无法包裹</span>
$el.$(<span class="hljs-string">'#target'</span>).<span class="hljs-title function_">wrap</span>(<span class="hljs-string">"&lt;div&gt;new div&lt;/div&gt;"</span>); <span class="hljs-comment">// 正确，有父元素</span></code></pre>
        <p><strong>请注意，不要在 o-fill 或 o-if 等模板组件内操作。</strong></p>
