        <h1>SSR 与 同构渲染</h1>
        <blockquote>
          <p>如果你不清楚什么是SSR，说明你目前还用不到它，可以跳过这章内容，等到将来有需要时再回过头来学习。</p>

        <h2>同构渲染</h2>
        <p>为了在同时保留 CSR 流畅体验、更好的机器爬虫识别（SEO），以及更自由的后端开发语言选择，ofa.js 提供了独特的同构渲染（Symphony Client-Server Rendering）模式。</p>
        <blockquote>
          <p>想了解 CSR / SSR / SSG 的具体定义与区别，请直接阅读本文末尾章节。</p>
        </blockquote>
        <p>同构渲染的核心理念是：</p>
        <ul>
          <li>在服务端渲染初始页面内容，确保 SEO 和首屏加载速度</li>
          <li>在客户端接管路由处理，保持 CSR 的流畅用户体验</li>
          <li>适用于任何服务端环境，实现真正的同构渲染</li>
        </ul>
        <h3>同构渲染实现原理</h3>
        <p>ofa.js 的 同构渲染模式基于以下机制：</p>
        <ol>
          <li>服务端生成带有通用运行结构的完整 HTML 页面</li>
          <li>客户端加载 CSR 运行引擎</li>
          <li>自动识别当前运行环境，决定渲染策略</li>
        </ol>

        <p>所以，你可以使用任意的开发语言（Go、Java、PHP、Nodejs、Python 等），任意的后端模板渲染引擎（如 Go 的 <code>html/template</code>、PHP 的 Smarty/Twig/Blade 等），将 ofa.js 的同构渲染代码结构嵌入到模板中，就能实现 SSR。</p>
        <ul>

          <li><a href="https://github.com/ofajs/ofa.js/tree/main/test/ssr-case/go" target="_blank">Go SSR 案例</a></li>
        </ul>
        <h3>同构渲染模板结构</h3>
        <p>要实现 同构渲染模式，只需在服务端使用以下通用模板结构：</p>

        <p><strong>注意：</strong> 服务端返回的 HTML 必须设置正确的 HTTP 头部：<code>Content-Type: text/html; charset=UTF-8</code></p>
        <p><code>scsr.mjs</code> 是 ofa.js 提供的 同构渲染运行引擎，它会根据当前页面的运行状态自动判断渲染策略，确保在任何环境下都能提供最佳的用户体验。</p>
        <p>同样的，SSG 也可以套用这个结构实现静态站点生成。</p>
        <h2>ofa.js 和 SSR 以及其他前端框架的差异</h2>
        <p>ofa.js 的 Symphony Client-Server Rendering（以下简称 SCSR）本质上也是 SSR 模式。</p>
        <p>与 Vue、React、Angular 等现有前端框架的 SSR 方案相比，ofa.js 最大的优势在于<strong>不需要强制绑定 Node.js</strong>。这意味着任意后端模板渲染引擎（如 PHP 的 Smarty、Python 的 Jinja2、Java 的 Thymeleaf 等），都能轻松集成 ofa.js 实现 SSR。</p>
        <h2>网页渲染方式概述</h2>
        <p>现代网页应用主要有四种渲染方式：传统服务端模板引擎渲染、CSR（Client Side Rendering，客户端渲染）、SSR（Server Side Rendering，服务器端渲染）和 SSG（Static Site Generation，静态站点生成）。每种方式都有其优势和适用场景。</p>
        <h3>传统服务端模板引擎渲染</h3>
        <p>在众多 Web 产品中，服务端模板引擎依旧是最主流的页面渲染手段。Go、PHP 等后端语言借助内置或第三方模板引擎（如 Go 的 <code>html/template</code>、PHP 的 Smarty/Twig/Blade 等），把动态数据注入 HTML 模板，一次性生成完整的 HTML 页面并返回给客户端。</p>
        <p><strong>优点：</strong></p>
        <ul>
          <li>SEO 友好，首屏加载快</li>
          <li>服务器端控制，安全性较高</li>
          <li>对于团队技术栈要求较低，后端开发者即可独立完成开发</li>
        </ul>
        <p><strong>缺点：</strong></p>
        <ul>
          <li>用户体验较差，每次交互都需要页面刷新</li>
          <li>服务端压力大</li>
          <li>前后端耦合度高，不利于分工协作</li>
        </ul>
        <h3>CSR（客户端渲染）</h3>
        <p>在 CSR 模式下，页面内容完全由浏览器端 JavaScript 渲染，ofa.js 的<a href="./routes.html" olink="">单页面应用</a>就是典型的 CSR 实现。这种方式提供了流畅的用户体验，无需页面跳转即可完成所有交互。使用 React 或 Vue 配合其对应的路由库（如 React Router 或 Vue Router）开发的单页应用（SPA），都是典型的 CSR 实现。</p>
        <p><strong>优点：</strong></p>
        <ul>
          <li>用户体验流畅，页面切换无刷新</li>
          <li>客户端处理能力强，响应迅速</li>
        </ul>
        <p><strong>缺点：</strong></p>
        <ul>
          <li>不利于 SEO，搜索引擎难以索引内容</li>
        </ul>
        <h3>SSR（服务器端渲染）</h3>
        <p>在保留 CSR 流畅体验的同时，改由服务器实时渲染页面：当用户发起请求时，服务器即时生成完整的 HTML 并返回，实现真正的服务端渲染。</p>
        <p><strong>优点：</strong></p>
        <ul>
          <li>SEO 友好，首屏加载快</li>
          <li>支持动态内容</li>
        </ul>
        <p><strong>缺点：</strong></p>
        <ul>
          <li>服务器压力大</li>
          <li>通常需要 Node.js 环境作为运行时，或至少需要一层 Node.js 中间层</li>
          <li>仍需后续客户端激活才能实现完整交互</li>
        </ul>
        <h3>SSG（静态站点生成）</h3>
        <p>在构建阶段将所有页面预先渲染为静态 HTML 文件，部署后可直接由服务器返回给用户。</p>
        <p><strong>优点：</strong></p>
        <ul>
          <li>首次加载速度快，SEO 友好</li>
          <li>服务器负载低，性能稳定</li>
          <li>安全性高</li>
        </ul>
        <p><strong>缺点：</strong></p>
        <ul>
          <li>动态内容更新困难</li>
          <li>构建时间随页面数量增加而增长</li>
        </ul>

          const {
