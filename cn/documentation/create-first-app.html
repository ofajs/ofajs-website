<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>创建第一个应用</title>
  <script src="https://cdn.jsdelivr.net/gh/kirakiray/ofa.js@4.6.20/dist/ofa.mjs#debug" type="module"></script>
  <script src="https://cdn.jsdelivr.net/gh/kirakiray/ofa.js@4.6.20/libs/scsr/dist/scsr.min.mjs" type="module"></script>
  <link rel="icon" href="../../img/logo.svg" />
  <link rel="stylesheet" href="../../css/palette.css" pui-colors />
  <link rel="stylesheet" href="../../css/theme.css" />
  <link rel="stylesheet" href="../../css/github-markdown.css" />
  <link rel="stylesheet" href="../../css/hljs.css" />
  <style>
    html,
    body {
      height: 100%;
      padding: 0;
      margin: 0;
      overflow: hidden;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        Segoe UI,
        Microsoft Yahei,
        Helvetica,
        Arial,
        sans-serif,
        Apple Color Emoji,
        Segoe UI Emoji;
    }

    o-app {
      height: 100%;
    }

    @keyframes fadein {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    o-app {
      animation: fadein 0.1s ease-in-out;
    }
  </style>
  <script type="module" src="../../js/util.js"></script>
</head>

<body>
  <o-app src="../../js/app-config.js">
    <template page>
      <link rel="stylesheet" href="../../css/github-markdown.css" />
      <link rel="stylesheet" href="../../css/hljs.css" />
      <l-m src="../../comps/center-block.html"></l-m>
      <l-m src="../../comps/article-code.html"></l-m>
      <l-m src="https://playground.ofajs.com/comps/o-playground/o-playground.html"></l-m>
      <style>
        :host {
          display: block;
          height: 100%;
          box-sizing: border-box;
          overflow: auto;
        }
      </style>
      <link rel="stylesheet" href="../../css/page.css" />
      <article class="markdown-body">
        <h1>创建第一个应用</h1>
        <p>如果你不想折腾其他繁琐步骤，想直接使用 ofa.js 开发整个项目，可以借助 ofa.js 官方提供的在线构建与预览工具，在浏览器里一键创建你的第一个本地应用。</p>
        <p>该工具托管于静态服务器，所有操作均在浏览器本地完成，无需连接动态服务器，请放心使用。</p>
        <h2>启动程序</h2>
        <p>点击 <a href="https://core.noneos.com?redirect=studio" target="_blank">OFA Studio</a> 打开 ofa.js 构建工具。该工具直接使用浏览器的本地文件系统，无需安装或配置。按照以下步骤操作：</p>
        <ol>
          <li>访问网站并等待程序加载</li>
          <li>点击 "创建新项目" 按钮</li>
          <li>选择 "ofa.js 应用" 类型，输入项目名称，然后选择本地目录</li>
          <li>在弹出的权限确认对话框中全部点击允许，然后点击 "确认创建"</li>
          <li>等待几秒后，项目将在所选目录中初始化完成</li>
        </ol>
        <p>项目初始化完成后，您可使用 <a href="https://code.visualstudio.com/" target="_blank">VSCode</a> 等编辑器打开该目录，开始编写应用代码。</p>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
  </o-app>
  <o-root-provider name="pui" theme="dark"></o-root-provider>
</body>

</html>
