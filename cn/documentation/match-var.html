      <article class="markdown-body">
        <h1>样式查询</h1>
        <p><code>match-var</code> 是 ofa.js 中用于根据 CSS 变量进行样式匹配的功能组件。通过 <code>match-var</code>，可以根据当前组件的 CSS 变量值动态匹配并应用不同的样式。这种特性专门用于样式相关的上下文状态传递，不需要使用 JavaScript，使用起来更加方便，适合主题色等样式传递需求。</p>
        <h2>核心概念</h2>
        <ul>
          <li><strong>match-var</strong>: 样式匹配组件，根据 CSS 变量值决定是否应用内部样式</li>
          <li><strong>属性匹配</strong>: 通过组件属性定义需要匹配的 CSS 变量和期望值</li>
          <li><strong>样式应用</strong>: 匹配成功时，内部 <code>&lt;style&gt;</code> 标签的样式会被应用到组件上</li>
        </ul>
        <h2>基本用法</h2>
        <p><code>match-var</code> 组件通过属性来定义需要匹配的 CSS 变量和期望值。当组件的 CSS 变量值与指定的属性值匹配时，内部定义的样式就会被应用。</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">match-var</span> <span class="hljs-attr">theme</span>=<span class="hljs-string">&quot;dark&quot;</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
    <span class="hljs-selector-pseudo">:host</span> {
      <span class="hljs-attribute">background-color</span>: <span class="hljs-number">#333</span>;
      <span class="hljs-attribute">color</span>: white;
    }
  </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">match-var</span>&gt;</span></code></pre>
        <h3>属性</h3>
        <p><code>match-var</code> 组件使用任意属性来定义 CSS 变量的匹配规则。属性名对应 CSS 变量名（不含 <code>--</code> 前缀），属性值就是期望匹配的值。</p>
        <h3>工作原理</h3>
        <ol>
          <li><strong>浏览器支持</strong>: 如果浏览器支持 <code>@container style()</code> 查询，会直接使用 CSS 原生能力</li>
          <li><strong>降级处理</strong>: 如果不支持，会通过轮询检测 CSS 变量值的变化，匹配成功后动态注入样式</li>
          <li><strong>手动刷新</strong>: 可以通过 <code>$.checkMatch()</code> 方法手动触发样式检测</li>
        </ol>
        <h2>基础示例</h2>
        <o-playground name="基础示例" style="--editor-height: 500px">
          <code path="demo.html" preview unimportant>
    <template>
      <o-page src="./page1.html"></o-page>
    </template>
  </code>
          <code path="page1.html">
    <template page>
      <l-m src="./theme-box.html"></l-m>
      <style>
        :host{
            display: block;
        }
      </style>
      <style>
        .container{
           --theme: data(currentTheme);
        }
      </style>
      <button on:click="changeTheme">切换主题</button> - Theme:{{currentTheme}}
      <div class="container">
        <theme-box>
          根据 CSS 变量显示不同样式
        </theme-box>
      </div>
        <theme-box style="--theme: light;">
          显示亮色主题
        </theme-box>
        <theme-box style="--theme: dark;">
          显示暗色主题
        </theme-box>
      </div>
      <script>
        export default async ()=>{
          return {
            data: {
                currentTheme: "light",
            },
            proto:{
                changeTheme(){
                    this.currentTheme = this.currentTheme === "light" ? "dark" : "light";
                }
            }
          };
        };
      </script>
    </template>
  </code>
          <code path="theme-box.html" active>
    <template component>
      <style>

          }
        </style>

      <match-var theme="dark">

          .content {
            background-color: #333;

          }
        </style>
      </match-var>
      <div class="content">
        <slot></slot>
      </div>
      <script>
        export default {
          tag: "theme-box",

            theme: "light",
          },
        };
      </script>
    </template>
  </code>

        <h2>多条件匹配</h2>
        <p>可以同时使用多个属性来定义更复杂的匹配条件，只有当所有 CSS 变量都匹配时，样式才会被应用。</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">match-var</span> <span class="hljs-attr">theme</span>=<span class="hljs-string">&quot;dark&quot;</span> <span class="hljs-attr">size</span>=<span class="hljs-string">&quot;large&quot;</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
    <span class="hljs-selector-pseudo">:host</span> {
      <span class="hljs-attribute">padding</span>: <span class="hljs-number">20px</span>;
      <span class="hljs-attribute">font-size</span>: <span class="hljs-number">18px</span>;
    }
  </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">match-var</span>&gt;</span></code></pre>

    <template page>

      <div>尺寸: {{size}} <button on:click="changeSize">切换尺寸</button></div>
      <div class="content">
        <test-card>

        </test-card>
      </div>
      <script>
        export default async ()=>{
            return {
                data:{
                    theme:"light",
                    size:"small"
                },
                proto:{
                    changeTheme(){
                        this.theme = this.theme === "light" ? "dark" : "light";
                    },

      </match-var>
      <match-var theme="dark" size="large">
        <style>

        <h2>checkMatch 手动刷新</h2>
        <p>在某些情况下，CSS 变量的变化可能无法被自动检测到，这时可以手动调用 <code>$.checkMatch()</code> 方法来触发样式检测。</p>
        <blockquote>
          <p>当前 Firefox 尚未支持 <code>@container style()</code> 查询，因此需手动调用 <code>$.checkMatch()</code>；待未来浏览器原生支持后，系统将自动检测变量变化，无需再手动触发。</p>
        </blockquote>
        <pre><code class="hljs language-javascript"><span class="hljs-attr">proto</span>: {
  <span class="hljs-title function_">updateTheme</span>(<span class="hljs-params"></span>) {
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">theme</span> = <span class="hljs-string">&#x27;dark&#x27;</span>;
    <span class="hljs-comment">// 手动触发样式检测</span>
    $.<span class="hljs-title function_">checkMatch</span>();
  }
}</code></pre>
        <h2>最佳实践</h2>
        <ol>
          <li><strong>优先使用 CSS 原生能力</strong>: <code>match-var</code> 会优先使用浏览器原生的 <code>@container style()</code> 查询，现代浏览器中性能更好</li>
          <li><strong>合理组织样式</strong>: 将相关的匹配样式放在一起，便于维护和理解</li>
          <li><strong>使用 data() 绑定</strong>: 结合 <code>data()</code> 指令可以实现响应式的样式切换</li>
        </ol>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
  </o-app>
