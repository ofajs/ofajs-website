        <h1>单页面应用</h1>
        <p>单页面应用是将 <code>o-app</code> 组件与浏览器地址栏绑定，使网页 URL 与应用内的页面路径保持同步。启用单页面应用后：</p>
        <ul>
          <li>刷新网页可以保持当前的路由状态</li>
          <li>复制地址栏的 URL，在其他浏览器或标签页打开，同样可以还原应用状态</li>
          <li>浏览器的前进/后退按钮可以正常使用</li>
        </ul>
        <h2>基本用法</h2>
        <p>使用官方的 <code>o-router</code> 组件包裹 <code>o-app</code> 组件，即可实现单页面应用。</p>

        <h2>fix-body 属性</h2>
        <p>添加 <code>fix-body</code> 属性后，<code>o-router</code> 会自动重置 <code>html</code> 和 <code>body</code> 的样式，消除默认的 margin 和 padding。</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">o-router</span> <span class="hljs-attr">fix-body</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">o-app</span> <span class="hljs-attr">src</span>=<span class="hljs-string">&quot;./app-config.js&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-app</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">o-router</span>&gt;</span></code></pre>
        <p>这在以下场景特别有用：</p>
        <ul>
          <li>需要 <code>o-app</code> 完全填满视口</li>
          <li>应用作为页面唯一内容时</li>
        </ul>

        <h2>工作原理</h2>
        <p>单页面应用基于浏览器的 Hash 模式实现：</p>
        <ol>
          <li>当应用内发生页面切换时，<code>o-router</code> 会自动更新地址栏的 hash 值（如 <code>#/about.html</code>）</li>
          <li>当用户刷新页面或通过 URL 访问时，<code>o-router</code> 会读取 hash 值并加载对应页面</li>
          <li>浏览器的前进/后退按钮会触发 hash 变化，进而控制应用的页面导航</li>
        </ol>
        <h2>URL 变化示例</h2>
        <p>假设应用有两个页面 <code>home.html</code> 和 <code>about.html</code>：</p>
        <table>
          <thead>
            <tr>
              <th>用户操作</th>
              <th>地址栏变化</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>打开应用</td>
              <td><code>index.html</code> → <code>index.html#/home.html</code></td>
            </tr>
            <tr>
              <td>跳转到关于页</td>
              <td><code>index.html#/home.html</code> → <code>index.html#/about.html</code></td>
            </tr>
            <tr>
              <td>点击返回</td>
              <td><code>index.html#/about.html</code> → <code>index.html#/home.html</code></td>
            </tr>
            <tr>
              <td>刷新页面</td>
              <td>保持当前 hash 不变</td>
            </tr>
          </tbody>
        </table>
        <h2>使用限制</h2>
        <ul>
          <li>单页面应用只能与<strong>一个</strong> <code>o-app</code> 组件配合使用</li>
        </ul>
      </article>

      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
