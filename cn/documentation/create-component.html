<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>创建组件</title>
  <script src="https://cdn.jsdelivr.net/gh/kirakiray/ofa.js@4.6.20/dist/ofa.mjs#debug" type="module"></script>
  <script src="https://cdn.jsdelivr.net/gh/kirakiray/ofa.js@4.6.20/libs/scsr/dist/scsr.min.mjs" type="module"></script>
  <link rel="icon" href="../../img/logo.svg" />
  <link rel="stylesheet" href="../../css/palette.css" pui-colors />
  <link rel="stylesheet" href="../../css/theme.css" />
  <link rel="stylesheet" href="../../css/github-markdown.css" />
  <link rel="stylesheet" href="../../css/hljs.css" />
  <style>
    html,
    body {
      height: 100%;
      padding: 0;
      margin: 0;
      overflow: hidden;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        Segoe UI,

      height: 100%;

<body>
  <o-app src="../../js/app-config.js">
    <template page>
      <link rel="stylesheet" href="../../css/github-markdown.css" />
      <link rel="stylesheet" href="../../css/hljs.css" />
      <l-m src="../../comps/center-block.html"></l-m>
      <l-m src="../../comps/article-code.html"></l-m>
      <l-m src="https://playground.ofajs.com/comps/o-playground/o-playground.html"></l-m>
      <style>
        :host {
          display: block;
          height: 100%;
          box-sizing: border-box;
          overflow: auto;
        }
      </style>
      <link rel="stylesheet" href="../../css/page.css" />
      <article class="markdown-body">
        <h1>创建组件</h1>
        <p>在 ofa.js 中，组件是实现页面复用和模块化的核心机制。组件本质上是一个自定义的 Web Component，通过定义模板、样式和逻辑，可以创建可复用的 UI 元素。</p>
        <h2>组件的基本结构</h2>
        <p>与页面模块不同，组件模块的 <code>&lt;template&gt;</code> 元素改用 <code>component</code> 属性，并声明 <code>tag</code> 属性指定组件标签名。</p>
        <p>在需要使用组件的位置，通过 <code>l-m</code> 标签异步加载组件模块，系统会自动完成注册；随后即可像普通 HTML 标签一样直接使用该组件。</p>
        <o-playground name="组件基本示例" style="--editor-height: 500px">
          <code path="demo.html" preview>
    <template>
      <l-m src="./demo-comp.html"></l-m>
      <demo-comp></demo-comp>
    </template>
  </code>
          <code path="demo-comp.html" active>
    <template component>
      <style>
        :host {
          display: block;
          border: 1px solid green;
          padding: 10px;
        }
      </style>
      <h3>{{title}}</h3>
      <script>
        export default async () => {
          return {
            tag: "demo-comp",
            data: {
              title: "OFAJS 组件示例",
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>组件核心概念</h2>
        <h3>tag - 组件标签名</h3>
        <p><code>tag</code> 是组件的标签名，<strong>必须和组件的使用标签名一致</strong>。例如，如果你的组件 <code>tag</code> 定义为 <code>&quot;demo-comp&quot;</code>，那么在 HTML 中使用时就必须写 <code>&lt;demo-comp&gt;&lt;/demo-comp&gt;</code>。</p>
        <h3>组件模块引用</h3>
        <p>通过 <code>l-m</code> 标签引入组件模块，组件模块会自动注册组件。这类似于使用 <code>script</code> 标签引入脚本，但 <code>l-m</code> 专门用于组件模块的加载和注册。</p>
        <blockquote>
          <p>注意：<code>l-m</code> 引用标签是<strong>异步引用</strong>，适合在页面加载时按需加载组件。</p>
        </blockquote>
        <h2>同步引用组件</h2>
        <p>在某些场景下，你可能需要同步加载组件（例如确保组件在使用前已经注册完成）。这时可以使用 <code>load</code> 方法搭配 <code>await</code> 关键字来实现同步引用。</p>
        <p>在组件模块和页面模块中，都会自动注入 <code>load</code> 函数，供开发者同步加载所需资源。</p>
        <o-playground name="同步引用组件示例" style="--editor-height: 500px">
          <code path="demo.html" preview>
    <template>
      <o-page src="page1.html"></o-page>
    </template>
  </code>
          <code path="page1.html" active>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <div>
        <demo-comp></demo-comp>
      </div>
      <script>
        // eslint-disable-next-line
        export default async ({ load }) => {
          await load("./demo-comp.html");
          return {
            data: {},
            proto: {},
          };
        };
      </script>
    </template>
  </code>
          <code path="demo-comp.html">
    <template component>
      <style>
        :host {
          display: block;
          border: 1px solid green;
          padding: 10px;
        }
      </style>
      <h3>{{title}}</h3>
      <script>
        export default async ({ load }) => {
          return {
            tag: "demo-comp",
            data: {
              title: "OFAJS 组件示例",
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>异步引用 vs 同步引用</h2>
        <table>
          <thead>
            <tr>
              <th>引用方式</th>
              <th>关键词</th>
              <th>特点</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>异步引用</td>
              <td><code>l-m</code> 标签</td>
              <td>非阻塞加载，适合按需加载组件</td>
            </tr>
            <tr>
              <td>同步引用</td>
              <td><code>load</code> 方法搭配 <code>await</code> 关键字</td>
              <td>阻塞加载，确保组件在使用前已注册</td>
            </tr>
          </tbody>
        </table>
        <p><code>l-m</code> 标签引用和 <code>load</code> 方法都可以加载组件模块，普遍情况建议使用 <code>l-m</code> 标签异步引用组件，以实现非阻塞加载和按需加载。</p>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
  </o-app>
  <o-root-provider name="pui" theme="dark"></o-root-provider>
</body>

</html>
