      <article class="markdown-body">
        <h1>生产与部署</h1>
        <p>使用 ofa.js 开发的项目，直接部署到静态服务器上即可使用。</p>
        <h2>开发环境</h2>
        <p>你可以使用官方的 <a href="https://core.noneos.com/?redirect=studio" target="_blank">ofa Studio</a> 进行开发，它提供了一键式的项目创建和预览。</p>
        <p>你还可以自建静态服务器：</p>
        <ul>
          <li>使用 Nginx 或 Apache 等静态服务器软件</li>
          <li>使用 Node.js 的 <a href="https://www.npmjs.com/package/http-server" target="_blank">http-server</a> 模块</li>
          <li>直接使用编辑器的静态服务器插件来预览</li>
        </ul>
        <h2>生产环境</h2>
        <h3>导出项目</h3>
        <p>如果你使用的是 <a href="https://core.noneos.com/?redirect=studio" target="_blank">ofa Studio</a> 构建的项目，直接使用工具自带的导出功能即可。</p>
        <p>如果是手动构建的项目，你可以直接将项目文件夹部署到静态服务器上即可，保持和开发环境的模式一致。</p>
        <h3>压缩混淆</h3>
        <p>生产环境通常需要使用压缩混淆工具来减小文件体积，提高加载速度。你可以使用 <a href="https://terser.org/docs/cli-usage/" target="_blank">Terser CLI</a> 进行压缩混淆。</p>
        <p>如果你不想使用命令行工具，可以使用 <a href="https://builder.ofajs.com/" target="_blank">ofa build</a> 在线进行文件压缩混淆。该工具目前为测试版，后期会合并到 ofa Studio 中。</p>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
