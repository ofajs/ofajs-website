<body>
  <o-app src="../../js/app-config.js">
    <template page>
      <link rel="stylesheet" href="../../css/github-markdown.css" />
      <link rel="stylesheet" href="../../css/hljs.css" />
      <l-m src="../../comps/center-block.html"></l-m>
      <l-m src="../../comps/article-code.html"></l-m>
      <l-m src="https://playground.ofajs.com/comps/o-playground/o-playground.html"></l-m>
      <style>
        :host {
          display: block;
          height: 100%;
          box-sizing: border-box;
          overflow: auto;
        }
      </style>
      <link rel="stylesheet" href="../../css/page.css" />
      <article class="markdown-body">
        <h1>属性绑定</h1>
        <p>ofa.js 支持将数据绑定到元素实例化后对象的属性上，如 input 元素的 value 或 checked 属性等。</p>
        <h2>单向属性绑定</h2>
        <p>单向属性绑定使用 <code>:toKey=&quot;fromKey&quot;</code> 语法，将组件数据“单向”同步到 DOM 元素的属性。组件数据变动时，元素属性即时更新；但元素自身的变动（如用户输入）不会反向写回组件，保持数据流的单一与可控。</p>
        <o-playground name="单向属性绑定" style="--editor-height: 500px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
        input {
          margin: 5px 0;
          padding: 8px;
          width: 100%;
          box-sizing: border-box;
        }
      </style>
      <p>当前值: {{val}}</p>
      <input type="text" :value="val" placeholder="这是一个单向绑定的输入框">
      <p>注意：直接在输入框中修改内容不会改变上面显示的值</p>
      <script>
        export default async () => {
          return {
            data: { val: "Hello ofa.js Demo Code" }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>双向属性绑定</h2>
        <p>双向属性绑定采用 <code>sync:xxx</code> 语法，实现了组件数据与DOM元素之间的双向同步。当组件数据变化时，DOM 元素的属性会更新；当 DOM 元素的属性发生变化时（如用户输入），也会同步更新组件数据。</p>
        <o-playground name="双向属性绑定" style="--editor-height: 500px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid #007acc;
          padding: 10px;
        }
        input {
          margin: 5px 0;
          padding: 8px;
          width: 100%;
          box-sizing: border-box;
        }
      </style>
      <p>当前值: {{val}}</p>
      <input type="text" sync:value="val" placeholder="这是一个双向绑定的输入框">
      <p>提示：在输入框中修改内容会实时更新上面显示的值</p>
      <script>
        export default async () => {
          return {
            data: { val: "Hello ofa.js Demo Code" }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h3>双向绑定的特点</h3>
        <ul>
          <li>数据流向：组件 ↔ DOM 元素（双向）</li>
          <li>组件数据变化 → DOM 元素更新</li>
          <li>DOM 元素变化 → 组件数据更新</li>
          <li>适用于需要用户输入和数据同步的场景</li>
        </ul>
        <h3>常见的双向绑定场景</h3>
        <o-playground name="表单双向绑定示例" style="--editor-height: 700px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          padding: 15px;
          font-family: Arial, sans-serif;
        }
        .form-group {
          margin: 10px 0;
        }
        input, textarea, select {
          padding: 8px;
          margin: 5px 0;
          box-sizing: border-box;
        }
        .preview {
          margin-top: 15px;
          padding: 10px;
          background-color: #7b7b7bff;
          border-radius: 4px;
        }
      </style>
      <h3>表单双向绑定示例</h3>
      <div class="form-group">
        <label>文本输入框:</label>
        <input type="text" sync:value="textInput" placeholder="输入文本">
      </div>
      <div class="form-group">
        <label>数字输入框:</label>
        <input type="number" sync:value="numberInput" placeholder="输入数字">
      </div>
      <div class="form-group">
        <label>多行文本:</label>
        <textarea sync:value="textareaInput" rows="3" placeholder="输入多行文本"></textarea>
      </div>
      <div class="form-group">
        <label>选择框:</label>
        <select sync:value="selectedOption">
          <option value="">请选择...</option>
          <option value="option1">选项1</option>
          <option value="option2">选项2</option>
          <option value="option3">选项3</option>
        </select>
      </div>
      <div class="form-group">
        <label>复选框:</label>
        <label style="display:flex;">
          <input type="checkbox" sync:checked="isChecked" /> 我同意条款
        </label>
      </div>
      <div class="preview">
        <h4>实时预览:</h4>
        <p>文本: {{textInput}}</p>
        <p>数字: {{numberInput}}</p>
        <p>多行文本: {{textareaInput}}</p>
        <p>选择: {{selectedOption}}</p>
        <p>复选框状态: {{isChecked ? '已勾选' : '未勾选'}}</p>
      </div>
      <script>
        export default async () => {
          return {
            data: { textInput: '', numberInput: 0, textareaInput: '', selectedOption: '', isChecked: false }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>注意事项</h2>
        <ol>
          <li><strong>性能考虑</strong>：双向绑定会创建数据监听器，大量使用可能影响性能</li>
          <li><strong>数据一致性</strong>：双向绑定确保数据和视图的一致性，但要注意避免无限循环更新</li>
          <li><strong>初始值设置</strong>：确保绑定的数据有合适的初始值，避免 undefined 显示问题</li>
          <li><strong>事件冲突</strong>：避免在同一元素上同时使用双向绑定和手动事件处理，以免造成冲突</li>
        </ol>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
  </o-app>
  <o-root-provider name="pui" theme="dark"></o-root-provider>
</body>

</html>
