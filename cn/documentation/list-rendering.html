      <article class="markdown-body">
        <h1>列表渲染</h1>
        <p>在 ofa.js 中，<code>o-fill</code> 组件提供了强大的列表渲染功能，能够高效地将数组数据渲染为多个相似的元素。它支持两种主要的使用方式：直接渲染和模板渲染。</p>
        <h2>o-fill 组件介绍</h2>
        <p><code>o-fill</code> 是 ofa.js 中用于列表渲染的核心组件，它接收一个数组类型的 <code>value</code> 属性，并为数组中的每一项生成对应的 DOM 元素。在渲染过程中，ofa.js 会自动追踪数组的变化并高效地更新 DOM。</p>
        <h3>主要特性：</h3>
        <ul>
          <li><strong>高效更新</strong>：通过键值跟踪数组变化，仅更新需要变更的部分</li>
          <li><strong>索引访问</strong>：通过 <code>$index</code> 访问当前项的索引</li>
          <li><strong>数据访问</strong>：通过 <code>$data</code> 访问当前项的数据</li>
          <li><strong>宿主访问</strong>：通过 <code>$host</code> 访问当前组件实例，可调用组件方法或访问组件数据</li>
          <li><strong>父级访问</strong>：在嵌套的 <code>o-fill</code> 中，通过 <code>$parent</code> 访问父级项的数据</li>
          <li><strong>模板复用</strong>：支持使用命名模板进行复杂列表渲染</li>
        </ul>
        <h2>直接渲染</h2>
        <p>直接渲染是最简单的使用方式，将模板内容直接写在 <code>o-fill</code> 标签内部。当数组变化时，<code>o-fill</code> 会自动为每项数据创建对应的元素。</p>
        <o-playground name="o-fill - 直接渲染" style="--editor-height: 600px">
          <code>
    <template page>
      <style>
        :host { display: block; padding: 10px; }
        ul { list-style: none; padding: 0; }
        li { padding: 8px; margin: 5px 0; background: #7e7e7e; border-radius: 4px; }
      </style>
      <h3>水果列表</h3>
      <button on:click="addItem">添加水果</button>
      <button on:click="removeItem">移除最后一个</button>
      <ul>
        <o-fill :value="fruits">
          <li> {{$index + 1}}. {{$data.name}} - 价格: ¥{{$data.price}} <button on:click="$host.removeItem($index)">删除</button></li>
        </o-fill>
      </ul>
      <script>
        export default async () => ({
          data: { 
            fruits: [
              { name: "🍎 苹果", price: 5 },
              { name: "🍊 橙子", price: 6 },
              { name: "🍌 香蕉", price: 3 }
            ],
            fruitIndex: 0,
          },
          proto: {
            addItem() {
              const fruitNames = ["🍇 葡萄", "🍓 草莓", "🥝 猕猴桃", "🍑 桃子", "🥭 芒果"];
              const name = fruitNames[this.fruitIndex % fruitNames.length];
              this.fruits.push({ 
                name: name, 
                price: Math.floor(Math.random() * 10) + 1 
              });
              this.fruitIndex++;
            },
            removeItem(index) {
              if (index >= 0 && index < this.fruits.length) {
                this.fruits.splice(index, 1);
                return;
              }
              this.fruits.length && this.fruits.pop();
            }
          }
        });
      </script>
    </template>
  </code>
        </o-playground>
        <p>在这个例子中，我们可以看到：</p>
        <ul>
          <li><code>$index</code> 代表当前项的索引（从0开始）</li>
          <li><code>$data</code> 代表当前项的数据对象</li>
          <li><code>$host</code> 代表当前组件实例，可用于调用组件方法或访问组件数据</li>
          <li>当数组发生变化时，列表会自动更新</li>
        </ul>
        <h2>模板渲染</h2>
        <p>对于更复杂的列表项结构，可以使用命名模板的方式。将模板定义在 <code>template</code> 标签中，然后在 <code>o-fill</code> 中通过 <code>name</code> 属性引用。</p>
        <o-playground name="o-fill - 模板渲染" style="--editor-height: 600px">
          <code>
    <template page>
      <style>
        :host { display: block; padding: 10px; }
        .product-card { border: 1px solid #747474; border-radius: 8px; padding: 12px; margin: 10px 0; }
        .product-name { font-weight: bold; font-size: 1.1em; }
        .product-price { color: #832c22; font-weight: bold; }
        .product-desc { color: #929292; font-size: 0.9em; margin-top: 5px; }
      </style>
      <h3>商品列表</h3>
      <button on:click="addProduct">添加商品</button>
      <div class="products-container">
        <o-fill :value="products" name="product-template"></o-fill>
      </div>
      <template name="product-template">
        <div class="product-card">
          <div class="product-name">{{$data.name}}</div>
          <div class="product-price">¥{{$data.price}}</div>
          <div class="product-desc">{{$data.description}}</div>
          <small>序号: {{$index + 1}}</small>
        </div>
      </template>
      <script>
        export default async () => ({
          data: {
            products: [
              { name: "MacBook Pro", price: 12999, description: "高性能笔记本电脑，适合专业工作" },
              { name: "iPhone 15", price: 5999, description: "最新款智能手机，拍照效果出色" },
              { name: "AirPods Pro", price: 1999, description: "无线降噪耳机，音质优秀" }
            ],
            productIndex: 0,
          },
          proto: {
            addProduct() {
              const productNames = ["iPad Air", "Apple Watch", "Magic Mouse", "Pro Display"];
              const productDescs = ["轻薄便携的平板电脑", "智能手表，健康监测", "人体工学设计鼠标", "专业级显示器"];
              const name = productNames[this.productIndex % productNames.length];
              const desc = productDescs[this.productIndex % productDescs.length];
              this.products.push({
                name: name,
                price: Math.floor(Math.random() * 5000) + 1000,
                description: desc
              });
              this.productIndex++;
            }
          }
        });
      </script>
    </template>
  </code>
        </o-playground>
        <h2>嵌套列表渲染</h2>
        <p><code>o-fill</code> 支持嵌套使用，可以处理复杂的层次数据结构，如树形菜单、分类列表等。</p>
        <o-playground name="o-fill - 嵌套列表渲染" style="--editor-height: 800px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
        .category {
          border-left: 3px solid #3498db;

        }
        .subcategory {
          border-left: 2px solid #9b59b6;

      </style>
      <h3>商品分类导航</h3>
      <div class="navigation">

        <div class="category">

                    },

                    }
                  ]
                },
                {
                  name: "家居用品",
                  subcategories: [
                    {
                      name: "厨房用品",
                      items: ["锅具", "餐具", "小家电"]
                    },
                    {
                      name: "卧室用品",
                      items: ["床品", "衣柜", "装饰"]
                    }
                  ]
                },
                {
                  name: "服装配饰",
                  subcategories: [
                    {
                      name: "男装",
                      items: ["T恤", "衬衫", "外套"]
                    },
                    {
                      name: "女装",
                      items: ["连衣裙", "裤子", "配饰"]

  </code>
        </o-playground>
        <p>上面的示例展示了基本的嵌套列表渲染。如果你需要在嵌套的 <code>o-fill</code> 中访问父级项的数据，可以使用 <code>$parent</code>。</p>
        <h3>使用 $parent 访问父级数据</h3>
        <blockquote>
          <p><strong>版本要求</strong>：<code>$parent</code> 特性需要 ofa.js v4.7.0 及以上版本支持。</p>
        </blockquote>
        <p>在嵌套的 <code>o-fill</code> 中，可以使用 <code>$parent</code> 来访问父级项的数据。要启用 <code>$parent</code>，需要在嵌套的 <code>o-fill</code> 上添加 <code>:_$parent=&quot;$data&quot;</code> 属性。</p>
        <p><strong>重要规则：</strong></p>
        <ul>
          <li>第一层 <code>o-fill</code> 不需要 <code>_$parent</code>，使用 <code>$host</code> 访问组件数据</li>
          <li>嵌套的 <code>o-fill</code>（第二层开始）使用 <code>:_$parent=&quot;$data&quot;</code> 传递父级数据</li>
          <li><code>_$parent</code> 只接受 <code>$data</code>，确保数据流向清晰</li>
        </ul>
        <h3>$parent 使用示例</h3>
        <p>下面的示例展示了如何在嵌套的 <code>o-fill</code> 中使用 <code>$parent</code> 访问父级项的数据：</p>
        <o-playground name="o-fill - $parent 使用示例" style="--editor-height: 600px">
          <code>
    <template page>
      <style>
        :host { display: block; padding: 20px; }
        .category { background: #e3f2fd; padding: 10px; margin: 10px 0; border-radius: 4px; }
        .item { background: #fff; padding: 8px; margin: 5px 0; border-radius: 4px; border-left: 3px solid #2196f3; }
      </style>
      <h3>分类列表</h3>
      <o-fill :value="categories">
        <div class="category">
          <h4>分类: {{$data.name}}</h4>
          <o-fill :value="$data.items" :_$parent="$data">
            <div class="item">
              <div>商品: {{$data}}</div>
              <div>所属分类: {{$parent.name}}</div>
            </div>
          </o-fill>
        </div>
      </o-fill>
      <script>
        export default async () => {
          return {
            data: {
              categories: [
                {
                  name: "水果",
                  items: ["苹果", "香蕉", "橙子"]
                },
                {
                  name: "蔬菜",
                  items: ["西红柿", "黄瓜", "茄子"]
                }
              ]
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>在这个简单的示例中：</p>
        <ul>
          <li><strong>第一层 o-fill</strong>：遍历分类数组，<code>$data.name</code> 是分类名称</li>
          <li><strong>嵌套 o-fill</strong>：使用 <code>:_$parent=&quot;$data&quot;</code> 传递父级分类数据</li>
          <li><strong>$parent 访问</strong>：在嵌套层中，通过 <code>$parent.name</code> 访问父级分类的名称</li>
        </ul>
        <h2>性能优化和键值管理</h2>
        <p>对于需要频繁更新的列表，可以通过 <code>fill-key</code> 属性指定唯一标识符，以提高渲染性能。</p>
        <pre><code class="hljs language-html"><span class="hljs-comment">&lt;!-- 使用自定义键值提升性能 --&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">o-fill</span> <span class="hljs-attr">:value</span>=<span class="hljs-string">&quot;items&quot;</span> <span class="hljs-attr">fill-key</span>=<span class="hljs-string">&quot;id&quot;</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">div</span>&gt;</span>{{$data.name}}<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">o-fill</span>&gt;</span></code></pre>
        <p>在上面的例子中，<code>fill-key=&quot;id&quot;</code> 告诉 ofa.js 使用每项数据的 <code>id</code> 属性作为唯一标识符，这样即使数组顺序发生变化，也能正确识别和更新对应的元素。</p>
        <h2>列表渲染最佳实践</h2>
        <ol>
          <li><strong>事件处理</strong>：在列表项中使用事件时，注意 <code>$host</code> 指向当前组件实例，<code>$data</code> 指向当前项数据</li>
          <li><strong>选择合适的渲染方式</strong>：简单列表使用直接渲染，复杂结构使用模板渲染</li>
          <li><strong>性能考虑</strong>：对于大列表或频繁更新的列表，使用 <code>fill-key</code> 指定键值</li>
          <li><strong>数据结构</strong>：确保数组中的每一项都是有效的数据对象</li>
          <li><strong>避免深层嵌套</strong>：虽然支持嵌套，但应避免过深的嵌套层级</li>
          <li><strong>正确使用 $parent</strong>：<ul>
              <li>只在嵌套的 <code>o-fill</code> 中使用 <code>$parent</code></li>
              <li>必须使用 <code>:_$parent=&quot;$data&quot;</code> 来启用 <code>$parent</code></li>
              <li>第一层 <code>o-fill</code> 使用 <code>$host</code> 访问组件数据，不要使用 <code>$parent</code></li>
              <li><code>_$parent</code> 只接受 <code>$data</code>，不要传递其他值</li>
            </ul>
          </li>
        </ol>
        <h2>变量使用总结</h2>
        <p>在 <code>o-fill</code> 中，不同的变量有不同的用途和使用场景：</p>
        <table>
          <thead>
            <tr>
              <th>变量</th>
              <th>用途</th>
              <th>使用场景</th>
              <th>示例</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><code>$host</code></td>
              <td>访问组件实例的数据和方法</td>
              <td>第一层 <code>o-fill</code></td>
              <td><code>{{$host.totalAmount}}</code></td>
            </tr>
            <tr>
              <td><code>$data</code></td>
              <td>当前迭代项的数据</td>
              <td>所有层级的 <code>o-fill</code></td>
              <td><code>{{$data.name}}</code></td>
            </tr>
            <tr>
              <td><code>$index</code></td>
              <td>当前项的索引</td>
              <td>所有层级的 <code>o-fill</code></td>
              <td><code>{{$index + 1}}</code></td>
            </tr>
            <tr>
              <td><code>$parent</code></td>
              <td>父级项的数据</td>
              <td>嵌套 <code>o-fill</code>（第二层开始）</td>
              <td><code>{{$parent.orderName}}</code></td>
            </tr>
          </tbody>
        </table>
        <h3>数据访问层级示例</h3>
        <pre><code class="hljs">组件 data (totalAmount, orders)
  │
  └─ 第一层 o-fill: :<span class="hljs-attribute">value</span>=<span class="hljs-string">&quot;orders&quot;</span>
      │  使用 <span class="hljs-variable">$host</span> 访问组件数据: {{<span class="hljs-variable">$host</span>.totalAmount}}
      │  使用 <span class="hljs-variable">$data</span> 访问当前订单: {{<span class="hljs-variable">$data</span>.orderName}}
      │
      └─ 第二层 o-fill: :<span class="hljs-attribute">value</span>=<span class="hljs-string">&quot;<span class="hljs-variable">$data</span>.items&quot;</span> :_<span class="hljs-variable">$parent</span>=<span class="hljs-string">&quot;<span class="hljs-variable">$data</span>&quot;</span>
          │  <span class="hljs-variable">$parent</span> 指向第一层的订单数据
          │  <span class="hljs-variable">$data</span> 是 items 的每一项
          │  可以访问: {{<span class="hljs-variable">$parent</span>.orderName}}, {{<span class="hljs-variable">$data</span>.name}}</code></pre>
        <p>通过正确使用这些变量，可以轻松处理复杂的嵌套列表渲染场景。</p>
      </article>

      <script>
