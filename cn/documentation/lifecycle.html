      <article class="markdown-body">
        <h1>生命周期</h1>
        <p>ofa.js 组件具有完整的生命周期钩子函数，允许你在组件的不同阶段执行特定的逻辑。这些钩子函数让你能够在组件创建、挂载、更新和销毁等关键时刻介入并执行相应的操作。</p>
        <h2>生命周期钩子函数</h2>
        <p>ofa.js 提供了以下几个主要的生命周期钩子函数，按照常用的顺序排列：</p>
        <h3>attached</h3>
        <p><code>attached</code> 钩子在组件被插入到文档中时调用，表示组件已经挂载到页面上。这是最常用的生命周期钩子，通常用于执行需要在组件实际显示在页面上之后才能进行的初始化操作，避免在组件不可见时执行不必要的计算。此钩子也非常适合进行元素尺寸测量、动画启动等依赖于组件已渲染到页面的操作。</p>
        <ul>
          <li><strong>调用时机</strong>: 组件被添加到 DOM 树中</li>
          <li><strong>主要用途</strong>: 启动定时器、添加事件监听器、执行需要可见性的操作</li>
        </ul>
        <h3>detached</h3>
        <p><code>detached</code> 钩子在组件从文档中移除时调用，表示组件即将被卸载。这个钩子适合清理资源，如清除定时器、移除事件监听器等。</p>
        <ul>
          <li><strong>调用时机</strong>: 组件从 DOM 树中被移除</li>
          <li><strong>主要用途</strong>: 清理资源、取消订阅、移除事件监听器</li>
        </ul>
        <h3>ready</h3>
        <p><code>ready</code> 钩子在组件准备就绪时调用，此时组件的模板已经渲染完成，DOM 元素已经创建，但可能尚未插入到文档中。这个钩子适合进行 DOM 操作或初始化第三方库。</p>
        <ul>
          <li><strong>调用时机</strong>: 组件模板渲染完成，DOM 已创建</li>
          <li><strong>主要用途</strong>: 执行依赖 DOM 的初始化操作</li>
        </ul>
        <h3>loaded</h3>
        <p><code>loaded</code> 钩子在组件及其所有子组件、异步资源全部加载完毕后触发，此时可安全移除 loading 状态或执行依赖完整组件树的后续操作。如果没有依赖，它会在 <code>ready</code> 钩子之后调用。</p>
        <ul>
          <li><strong>调用时机</strong>: 组件及其子组件完全加载完成</li>
          <li><strong>主要用途</strong>: 执行依赖完整组件树的操作</li>
        </ul>
        <h2>生命周期执行顺序</h2>
        <p>组件的生命周期钩子按照以下顺序执行：</p>
        <ol start="2">
          <li><code>ready</code> - 组件准备就绪（DOM 已创建）</li>
          <li><code>attached</code> - 组件挂载到 DOM</li>
          <li><code>loaded</code> - 组件完全加载完成</li>
        </ol>
        <p>当组件从 DOM 移除时，会调用 <code>detached</code> 钩子。</p>
        <h2>使用示例</h2>
        <p>下面的示例展示了如何在组件中使用生命周期钩子函数：</p>
        <o-playground name="生命周期示例" style="--editor-height: 700px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
        .counter {
          margin: 10px 0;
        }
        button {
          margin-right: 10px;
          padding: 5px 10px;
        }
      </style>
      <h3>生命周期演示</h3>
      <div class="counter">计数器: {{count}}</div>
      <button on:click="count += 10">增加10</button>
      <button on:click="removeSelf">移除组件</button>
      <div class="log">
        <h4>生命周期日志:</h4>
        <ul>
          <o-fill :value="logs">
            <li>{{$data}}</li>
          </o-fill>
        </ul>
      </div>
      <script>
        export default async () => {
          return {
            data: {
              count: 0,
              logs: [],
            },
            proto: {
              removeSelf() {
                this.remove(); // 从DOM中移除自身以触发detached钩子
              },
              addLog(message) {
                this.logs = [...this.logs, `${new Date().toLocaleTimeString()} - ${message}`];
              }
            },
            ready() {
              this.addLog("ready: 组件准备就绪，DOM已创建");
              console.log("组件已就绪");
            },
            attached() {
              this.addLog("attached: 组件已挂载到DOM");
              this._timer = setInterval(() => {
                this.count++;
              }, 1000);
              console.log("组件已挂载");
            },
            detached() {
              this.addLog("detached: 组件已从DOM移除");
              // 清除定时器，防止内存泄漏
              clearInterval(this._timer); 
              console.log("组件已卸载");
            },
            loaded() {
              this.addLog("loaded: 组件完全加载完成");
              console.log("组件已完全加载");
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>在这个示例中，你可以观察到不同生命周期钩子的执行顺序和时机。当你点击&quot;移除组件&quot;按钮时，可以看到 <code>detached</code> 钩子被触发。</p>
        <h2>实际应用场景</h2>
        <h3>初始化操作</h3>
        <p>在 <code>ready</code> 钩子中进行数据初始化：</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">async</span> () =&gt; {
  <span class="hljs-keyword">return</span> {
    <span class="hljs-attr">data</span>: {
      <span class="hljs-attr">items</span>: []
    },
    <span class="hljs-title function_">ready</span>(<span class="hljs-params"></span>) {
      <span class="hljs-comment">// DOM操作</span>
      <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">initDomElements</span>();
    }
  };
};</code></pre>
        <h3>资源管理</h3>
        <p>在 <code>attached</code> 钩子中启动定时器，在 <code>detached</code> 钩子中清理资源：</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">async</span> () =&gt; {
  <span class="hljs-keyword">return</span> {
    <span class="hljs-attr">data</span>: {
      <span class="hljs-attr">timer</span>: <span class="hljs-literal">null</span>
    },
    <span class="hljs-title function_">attached</span>(<span class="hljs-params"></span>) {
      <span class="hljs-comment">// 启动定时器</span>
      <span class="hljs-variable language_">this</span>.<span class="hljs-property">timer</span> = <span class="hljs-built_in">setInterval</span>(<span class="hljs-function">() =&gt;</span> {
        <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&#x27;定时任务执行&#x27;</span>);
      }, <span class="hljs-number">1000</span>);
    },
    <span class="hljs-title function_">detached</span>(<span class="hljs-params"></span>) {
      <span class="hljs-comment">// 清理定时器</span>
      <span class="hljs-keyword">if</span>(<span class="hljs-variable language_">this</span>.<span class="hljs-property">timer</span>) {
        <span class="hljs-built_in">clearInterval</span>(<span class="hljs-variable language_">this</span>.<span class="hljs-property">timer</span>);
        <span class="hljs-variable language_">this</span>.<span class="hljs-property">timer</span> = <span class="hljs-literal">null</span>;
      }
    }
  };
};</code></pre>
        <p>生命周期钩子函数是 ofa.js 组件开发中的重要概念，正确使用它们可以帮助你更好地管理组件状态和资源，提升应用性能。</p>
      </article>

              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },

        };
