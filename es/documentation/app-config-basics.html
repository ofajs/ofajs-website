        <h1>Conceptos básicos de configuración de aplicaciones</h1>
        <p>El archivo de configuración <code>app-config.js</code> se utiliza para definir diversos comportamientos de la aplicación. Este capítulo presenta la estructura básica del archivo de configuración y todas las opciones de configuración disponibles.</p>
        <h2>Estructura del archivo de configuración</h2>
        <p>Crea el archivo <code>app-config.js</code>, utiliza la sintaxis de módulos ES6 para exportar elementos de configuración:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// app-config.js</span>

<span class="hljs-comment">// Dirección de la página de inicio de la aplicación (obligatorio)</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> home = <span class="hljs-string">"./home.html"</span>;

<span class="hljs-comment">// Configuración de animación de transición de página (opcional)</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">"translate(0, 0)"</span>,
  },
  <span class="hljs-attr">next</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">"translate(30px, 0)"</span>,
  },
  <span class="hljs-attr">previous</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">"translate(-30px, 0)"</span>,
  },
};

<span class="hljs-comment">// Estado de carga (opcional)</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> <span class="hljs-title function_">loading</span> = (<span class="hljs-params"></span>) =&gt; {
  <span class="hljs-keyword">return</span> <span class="hljs-string">"&lt;div&gt;Loading...&lt;/div&gt;"</span>;
};

<span class="hljs-comment">// Manejo de errores (opcional)</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> <span class="hljs-title function_">fail</span> = (<span class="hljs-params">{ src, error }</span>) =&gt; {
  <span class="hljs-keyword">return</span> <span class="hljs-string">`&lt;div&gt;Failed to load: <span class="hljs-subst">${src}</span>&lt;/div&gt;`</span>;
};

<span class="hljs-comment">// Inicialización de la aplicación (opcional)</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> ready = <span class="hljs-keyword">function</span>(<span class="hljs-params"></span>) {
  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">"App is ready"</span>);
};

<span class="hljs-comment">// Extensión de prototipo (opcional)</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> proto = {
  <span class="hljs-title function_">customMethod</span>(<span class="hljs-params"></span>) {
    <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">"Custom method"</span>);
  },
};

<span class="hljs-comment">// Habilitar función de avance (opcional)</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> allowForward = <span class="hljs-literal">true</span>;</code></pre>
        <h2>Resumen de elementos de configuración</h2>
        <p><code>app-config.js</code> admite las siguientes opciones de configuración:</p>
        <table>
          <thead>
            <tr>
              <th>Opción</th>
              <th>Requerido</th>
              <th>Descripción</th>
              <th>Documentación detallada</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><code>home</code></td>
              <td>✅ Obligatorio</td>
              <td>Dirección de la página de inicio de la aplicación</td>
              <td>Este capítulo</td>
            </tr>
            <tr>
              <td><code>pageAnime</code></td>
              <td>Opcional</td>
              <td>Configuración de la animación de cambio de página</td>
              <td><a href="./page-transition-animation.html" olink="">Animación de cambio de página</a></td>
            </tr>
            <tr>
              <td><code>loading</code></td>
              <td>Opcional</td>
              <td>Contenido mostrado durante la carga de la página</td>
              <td><a href="./app-loading-error.html" olink="">Carga y manejo de errores</a></td>
            </tr>
            <tr>
              <td><code>fail</code></td>
              <td>Opcional</td>
              <td>Contenido mostrado cuando falla la carga de la página</td>
              <td><a href="./app-loading-error.html" olink="">Carga y manejo de errores</a></td>
            </tr>
            <tr>
              <td><code>ready</code></td>
              <td>Opcional</td>
              <td>Callback después de que la aplicación se haya inicializado</td>
              <td><a href="./app-initialization.html" olink="">Inicialización de la aplicación</a></td>
            </tr>
            <tr>
              <td><code>proto</code></td>
              <td>Opcional</td>
              <td>Métodos y propiedades añadidos al prototipo de la aplicación</td>
              <td><a href="./app-initialization.html" olink="">Inicialización de la aplicación</a></td>
            </tr>
            <tr>
              <td><code>allowForward</code></td>
              <td>Opcional</td>
              <td>Habilitar la función de avance del navegador</td>
              <td><a href="./app-navigation.html" olink="">Enrutamiento y navegación</a></td>
            </tr>
          </tbody>
        </table>
        <p><code>home</code> es un elemento de configuración obligatorio que especifica la ruta del módulo de la página de inicio que se carga al iniciar la aplicación.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> home = <span class="hljs-string">"./pages/home.html"</span>;</code></pre>
        <p><strong>Reglas de ruta:</strong>- Soporta rutas relativas（relativas al archivo <code>app-config.js</code>）</p>
        <ul>
          <li>Soporta rutas absolutas</li>
          <li>La ruta apunta a un archivo de módulo de página（archivo <code>.html</code>）</li>
        </ul>
        <h2>pageAnime - Animación de transición de página</h2>
        <p><code>pageAnime</code> es un elemento de configuración opcional que se utiliza para controlar los efectos de animación de transición al cambiar de página.</p>
        <h3>Uso básico</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">"translate(0, 0)"</span>,
  },
  <span class="hljs-attr">next</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">"translate(30px, 0)"</span>,
  },
  <span class="hljs-attr">previous</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">"translate(-30px, 0)"</span>,
  },
};</code></pre>
        <h3>Descripción del estado de la animación</h3>
        <p>La animación de cambio de página incluye tres estados:</p>
        <table>
          <thead>
            <tr>
              <th>Estado</th>
              <th>Descripción</th>
              <th>Momento de activación</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><code>current</code></td>
              <td>Estilo después de la animación de la página actual</td>
              <td>Cuando se completa el cambio de página</td>
            </tr>
            <tr>
              <td><code>next</code></td>
              <td>Estilo inicial al entrar la nueva página</td>
              <td>Cuando comienza a entrar la nueva página</td>
            </tr>
            <tr>
              <td><code>previous</code></td>
              <td>Estilo objetivo al salir la página anterior</td>
              <td>Cuando comienza a salir la página anterior</td>
            </tr>
          </tbody>
        </table>
        <p>La animación de cambio de página admite múltiples efectos, incluyendo:- Deslizar horizontalmente (predeterminado)</p>
        <ul>
          <li>Fundido de entrada/salida</li>
          <li>Deslizar verticalmente</li>
          <li>Efecto de zoom</li>
          <li>Efecto de volteo</li>
          <li>Animación personalizada</li>
        </ul>
        <p>Para obtener ejemplos detallados de configuración y efectos de animación, consulte el capítulo <a href="./page-transition-animation.html" olink="">Animaciones de transición de página</a>.</p>
        <h2>Uso de archivos de configuración en HTML</h2>
        <p>En un archivo HTML, importe el archivo de configuración a través de la etiqueta <code>o-app</code>:</p>
        <pre><code class="hljs language-html"><span class="hljs-meta">&lt;!DOCTYPE <span class="hljs-keyword">html</span>&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">html</span>&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">head</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">script</span> <span class="hljs-attr">src</span>=<span class="hljs-string">"https://cdn.jsdelivr.net/gh/kirakiray/ofa.js/dist/ofa.min.mjs"</span> <span class="hljs-attr">type</span>=<span class="hljs-string">"module"</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">head</span>&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">body</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">o-app</span> <span class="hljs-attr">src</span>=<span class="hljs-string">"./app-config.js"</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-app</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">body</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">html</span>&gt;</span></code></pre><o-playground name="Ejemplo básico de configuración de la aplicación" style="--editor-height: 500px">

        export const parent = "../../layout.html";
