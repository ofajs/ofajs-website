        <h1>Consulta de estilos</h1>
        <p><code>match-var</code> es un componente funcional en ofa.js que se utiliza para la coincidencia de estilos según variables CSS. A través de <code>match-var</code>, se pueden coincidir y aplicar dinámicamente diferentes estilos según el valor de las variables CSS del componente actual. Esta característica está diseñada específicamente para la transmisión de estados relacionados con estilos en el contexto, sin necesidad de usar JavaScript, lo que la hace más conveniente, adecuada para necesidades de transmisión de estilos como colores temáticos.</p>
        <h2>Conceptos centrales</h2>
        <ul>
          <li><strong>match-var</strong>: Componente de coincidencia de estilos, que decide si aplicar estilos internos según el valor de la variable CSS</li>
          <li><strong>Atributo de coincidencia</strong>: Define las variables CSS y valores esperados a través de los atributos del componente</li>
          <li><strong>Aplicación de estilos</strong>: Cuando la coincidencia es exitosa, los estilos de la etiqueta <code>&lt;style&gt;</code> interna se aplican al componente</li>
        </ul>
        <h2>Uso básico</h2>
        <p><code>match-var</code> componente define, mediante atributos, las variables CSS que deben coincidir y los valores esperados. Cuando el valor de la variable CSS del componente coincide con el valor del atributo especificado, se aplican los estilos definidos internamente.</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">match-var</span> <span class="hljs-attr">theme</span>=<span class="hljs-string">&quot;dark&quot;</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
    <span class="hljs-selector-pseudo">:host</span> {
      <span class="hljs-attribute">background-color</span>: <span class="hljs-number">#333</span>;
      <span class="hljs-attribute">color</span>: white;
    }
  </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">match-var</span>&gt;</span></code></pre>
        <h3>Propiedades</h3>
        <p>El componente <code>match-var</code> utiliza atributos arbitrarios para definir reglas de coincidencia de variables CSS. El nombre del atributo corresponde al nombre de la variable CSS (sin el prefijo <code>--</code>), y el valor del atributo es el valor que se espera que coincida.</p>
        <h3>Cómo funciona</h3>
        <ol>
          <li><strong>Compatibilidad del navegador</strong>: Si el navegador admite la consulta <code>@container style()</code>, se utilizará directamente la capacidad nativa de CSS.</li>
          <li><strong>Manejo de degradación</strong>: Si no es compatible, se detectarán los cambios en los valores de las variables CSS mediante sondeo y se inyectarán estilos dinámicamente cuando coincidan.</li>
          <li><strong>Actualización manual</strong>: Se puede activar manualmente la detección de estilos mediante el método <code>$.checkMatch()</code>.</li>
        </ol>

        <h2>Coincidencia de múltiples condiciones</h2>
        <p>Se pueden usar múltiples atributos para definir condiciones de coincidencia más complejas, y el estilo solo se aplicará cuando todas las variables CSS coincidan.</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">match-var</span> <span class="hljs-attr">theme</span>=<span class="hljs-string">&quot;dark&quot;</span> <span class="hljs-attr">size</span>=<span class="hljs-string">&quot;large&quot;</span>&gt;</span>

    <span class="hljs-selector-pseudo">:host</span> {
      <span class="hljs-attribute">padding</span>: <span class="hljs-number">20px</span>;
      <span class="hljs-attribute">font-size</span>: <span class="hljs-number">18px</span>;
    }
  </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">match-var</span>&gt;</span></code></pre>

        <h2>checkMatch actualización manual</h2>
        <p>En algunos casos, los cambios en las variables CSS pueden no ser detectados automáticamente, en cuyo caso se puede llamar manualmente al método <code>$.checkMatch()</code> para activar la detección de estilos.</p>
        <blockquote>
          <p>Actualmente, Firefox aún no admite las consultas <code>@container style()</code>, por lo que es necesario invocar manualmente <code>$.checkMatch()</code>; cuando el navegador lo soporte de forma nativa en el futuro, el sistema detectará automáticamente los cambios en las variables y no será necesario activarlo manualmente.</p>
        </blockquote>
        <pre><code class="hljs language-javascript"><span class="hljs-attr">proto</span>: {
  <span class="hljs-title function_">updateTheme</span>(<span class="hljs-params"></span>) {
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">theme</span> = <span class="hljs-string">&#x27;dark&#x27;</span>;
    <span class="hljs-comment">// Activar manualmente la detección de estilos</span>
    $.<span class="hljs-title function_">checkMatch</span>();
  }
}</code></pre>
        <h2>Mejores prácticas</h2>
        <ol>
          <li><strong>Priorizar el uso de capacidades nativas de CSS</strong>: <code>match-var</code> priorizará el uso de la consulta nativa <code>@container style()</code> del navegador, con mejor rendimiento en navegadores modernos.</li>
          <li><strong>Organizar los estilos de manera lógica</strong>: agrupar los estilos de coincidencia relacionados para facilitar el mantenimiento y la comprensión.</li>
          <li><strong>Usar el enlace <code>data()</code></strong>: combinado con la directiva <code>data()</code> se puede lograr un cambio de estilo reactivo.</li>
        </ol>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
