        <h1>Comprender la vinculación de propiedades</h1>
        <p>En el contenido anterior, ya se presentó brevemente el uso básico del <a href="./property-binding.html" olink="">enlace de propiedades</a>. El caso anterior se utilizó para enlazar la propiedad <code>value</code> de elementos nativos del navegador (como <code>textarea</code>); en esta sección se profundizará en la esencia del enlace de propiedades: en realidad se enlaza a la propiedad JavaScript del componente después de su instanciación, no al atributo HTML.</p>
        <h2>Mecanismo de enlace de propiedades del componente</h2>
        <p>En ofa.js, cuando usamos la sintaxis <code>:toProp="fromProp"</code> en el componente padre, estamos estableciendo la propiedad JavaScript de la instancia del componente hijo, no el atributo HTML. Esto difiere significativamente de establecer directamente un atributo HTML (como <code>attr:toKey="fromKey"</code>).</p>
        <p>El siguiente ejemplo demuestra cómo pasar datos a un componente personalizado mediante enlace de propiedades:</p>
        <o-playground name="Comprender el enlace de atributos" style="--editor-height: 500px">

      <h3 style="color:blue;">{{val}}</h3>
      <demo-comp :full-name="val"></demo-comp>
      <script>
        export default async () => {
          return {
            data: {
              val: "ofajs",
            },

        <p>En este ejemplo:- El dato <code>val</code> del componente padre se enlaza a la propiedad <code>fullName</code> del componente hijo <code>&lt;demo-comp&gt;</code></p>
        <ul>
          <li>Utiliza la sintaxis <code>:full-name="val"</code> para pasar el valor de <code>val</code> del componente padre a la propiedad <code>fullName</code> del componente hijo</li>
          <li>Después de recibir el valor, el componente hijo lo muestra en la plantilla mediante <code>{{fullName}}</code></li>
        </ul>
        <h2>Enlace de atributos vs herencia de propiedades de características</h2>
        <p>Es importante tener en cuenta que el enlace de atributos (<code>:）y la herencia de atributos de características (</code>attr:`）presentan las siguientes diferencias clave：</p>
        <h3>Enlace de atributos (<code>:</code>)</h3>
        <ul>
          <li>Propiedades de JavaScript vinculadas a la instancia del componente</li>
          <li>Los datos pasados mantienen su tipo original (cadena, número, booleano, etc.)</li>
          <li>Se pueden acceder y modificar directamente dentro del componente, incluso sin definir <code>data</code> previamente dentro del componente</li>
        </ul>
        <h3>Herencia de atributos de características (<code>attr:</code>)</h3>
        <ul>
          <li>Establecer atributos HTML</li>
          <li>Todos los valores se convertirán en cadenas</li>
          <li>Se utiliza principalmente para pasar atributos a elementos DOM subyacentes</li>
          <li>Requiere un manejo especial para analizar datos complejos</li>
          <li>Debe definir <code>attrs</code> dentro del componente por adelantado para recibir los valores de los atributos</li>
        </ul>
        <p>Comparación de gramática:```html</p>
        <!-- Enlace de atributos: pasar valores JavaScript, mantener tipos de datos -->
        <p><my-component :data-value="complexObject"></my-component>
          <my-component :count="42"></my-component>
          <my-component :is-active="true"></my-component>
        </p>
        <!-- Herencia de atributos: establecer atributos HTML, todos los valores se convierten en cadenas -->
        <p><my-component attr:data-value="simpleString"></my-component>
          <my-component attr:count="42"></my-component> <!-- Se pasa realmente la cadena "42" -->
        </p>

## Enlace de datos bidireccional

Los componentes instanciados también admiten el enlace de datos bidireccional, utilizando la sintaxis `sync:toProp="fromProp"`. El enlace bidireccional permite la sincronización de datos entre el componente padre y el componente hijo; cuando los datos en cualquiera de los lados cambian, el otro lado también se actualiza en consecuencia.

&gt; A diferencia de Angular y Vue, ofa.js no requiere configuración especial u operaciones adicionales para los componentes, y puede soportar de forma nativa la sintaxis de enlace de datos bidireccional.

En este ejemplo:- El `val` del componente padre y el `fullName` del componente hijo implementan el enlace bidireccional a través de `sync:full-name="val"`
- Cuando se introduce contenido en el cuadro de entrada del componente padre, el componente hijo muestra inmediatamente el nuevo valor
- Cuando se introduce contenido en el cuadro de entrada del componente hijo, el componente padre también actualiza la visualización inmediatamente

### Diferencia entre el enlace bidireccional y el enlace de propiedades común

| Característica | Enlace de propiedad normal (`:)` | Enlace bidireccional (`sync:`) |
|----------------|----------------------------------|--------------------------------|
| Flujo de datos | Unidireccional: padre → hijo | Bidireccional: padre ↔ hijo |
| Sintaxis | `:prop="value"` | `sync:prop="value"` |
| Modificación del componente hijo | No afecta al componente padre | Afecta al componente padre |
| Escenario de uso | Pasar configuración del padre al hijo | Necesita sincronización de datos padre-hijo |### Precauciones

1. **Consideraciones de rendimiento**: El enlace bidireccional desencadena un nuevo renderizado cuando cambian los datos, por lo que debe usarse con precaución en escenarios complejos.
2. **Control del flujo de datos**: Un exceso de enlaces bidireccionales puede dificultar el seguimiento del flujo de datos; se recomienda diseñar de manera adecuada la comunicación entre componentes.
3. **Compatibilidad de componentes**: No todos los componentes son adecuados para usar enlace bidireccional; es necesario considerar el propósito de diseño del componente.</span></code></pre>
