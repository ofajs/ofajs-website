        <h1>Enrutamiento y navegación</h1>
        <p>La navegación de páginas dentro de la aplicación es una característica central de las aplicaciones de una sola página. Este capítulo presenta cómo usar la navegación programática, gestionar el historial de rutas y escuchar los cambios en las rutas.</p>
        <h2>allowForward - Función de avance</h2>
        <p>De forma predeterminada, la aplicación solo admite navegación hacia atrás. Después de establecer <code>allowForward</code> como <code>true</code> en <code>app-config.js</code>, se puede habilitar la funcionalidad de avance de la aplicación.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// app-config.js</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> allowForward = <span class="hljs-literal">true</span>;</code></pre>
        <p>Al habilitar:</p>
        <ul>
          <li>Los usuarios pueden usar los botones adelante/atrás del navegador para navegar</li>
          <li>El método <code>forward()</code> de la aplicación funciona correctamente</li>
        </ul>
        <h2>Navegación programática</h2>
        <p>Además de usar enlaces con el atributo <code>olink</code>, también se pueden invocar métodos de navegación en JavaScript.</p>
        <blockquote>
          <p><strong>Nota importante</strong>:</p>
          <ul>
            <li>Los métodos <code>goto</code>, <code>replace</code>, <code>back</code> están disponibles tanto en la <strong>instancia de página (page)</strong> como en la <strong>instancia de aplicación (app)</strong></li>
            <li>El método <code>forward</code> solo está disponible en la <strong>instancia de aplicación (app)</strong></li>
            <li>En una página, use: <code>this.goto()</code> o <code>this.app.goto()</code></li>
            <li>En un componente, use: <code>this.app.goto()</code> (es necesario llamarlo a través de la instancia app)</li>
          </ul>
          <p><strong>Nota sobre la relatividad de las rutas</strong>:</p>
          <ul>
            <li>Al usar <code>goto</code> o <code>replace</code> en un <strong>módulo de página</strong>, la ruta es relativa a la dirección del <strong>módulo de página actual</strong></li>
            <li>Al usar <code>goto</code> o <code>replace</code> en la <strong>instancia de aplicación (app)</strong>, la ruta es relativa a la dirección de la <strong>navegación de la aplicación actual</strong></li>
          </ul>
        </blockquote>
        <h3>goto - Ir a página</h3>
        <p>Ir a la página especificada y añadir al historial:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// Saltar a la página especificada</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-title function_">goto</span>(<span class="hljs-string">&quot;./about.html&quot;</span>);

<span class="hljs-comment">// Saltar con parámetros</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-title function_">goto</span>(<span class="hljs-string">&quot;./detail.html?id=123&quot;</span>);</code></pre>
        <h3>replace - reemplazar página</h3>
        <p>Reemplazar la página actual, sin añadir al historial:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// Reemplazar la página actual</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-title function_">replace</span>(<span class="hljs-string">&quot;./login.html&quot;</span>);</code></pre>
        <p>Se usa comúnmente para redirigir después del inicio de sesión y evitar que el usuario vuelva a la página de inicio de sesión al hacer clic en el botón de retroceso.</p>
        <h3>back - atrás</h3>
        <p>Volver a la página anterior:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-variable language_">this</span>.<span class="hljs-title function_">back</span>();</code></pre>
        <h3>forward - adelante</h3>
        <p>Avanzar a la página siguiente (es necesario establecer <code>allowForward: true</code>):</p>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// Llamar en una página o componente</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-property">app</span>.<span class="hljs-title function_">forward</span>();</code></pre>
        <blockquote>
          <p><strong>Nota</strong>: El método <code>forward</code> debe llamarse en la instancia de la aplicación (<code>app</code>), no en la instancia de la página. Por ejemplo, use <code>this.app.forward()</code> en lugar de <code>this.forward()</code>.</p>
        </blockquote>
        <h3>Comparación de métodos de navegación</h3>
        <table>
          <thead>
            <tr>
              <th>Método</th>
              <th>Historial</th>
              <th>Escenario de uso</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><code>goto</code></td>
              <td>Agregar nuevo registro</td>
              <td>Navegación normal de página</td>
            </tr>
            <tr>
              <td><code>replace</code></td>
              <td>Reemplazar registro actual</td>
              <td>Redirección después de iniciar sesión, redireccionamiento</td>
            </tr>
            <tr>
              <td><code>back</code></td>
              <td>Retroceder al anterior</td>
              <td>Operación de regreso</td>
            </tr>
            <tr>
              <td><code>forward</code></td>
              <td>Avanzar al siguiente</td>
              <td>Operación de avance (requiere habilitación)</td>
            </tr>
          </tbody>
        </table>
        <h3>Obtener historial de enrutamiento</h3>
        <p>Obten todo el historial de rutas a través de la propiedad <code>routers</code>:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> history = app.<span class="hljs-property">routers</span>;
<span class="hljs-comment">// Formato de retorno: [{ src: &quot;./page1.html&quot; }, { src: &quot;./page2.html&quot; }, ...]</span></code></pre>
        <h3>Obtener la página actual</h3>
        <p>Obtener la instancia de la página actual mediante la propiedad <code>current</code>:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> currentPage = app.<span class="hljs-property">current</span>;
<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;Página actual:&quot;</span>, currentPage.<span class="hljs-property">src</span>);</code></pre>
        <h3>Ejemplo del historial de enrutamiento</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> proto = {
  <span class="hljs-keyword">get</span> <span class="hljs-title function_">canGoBack</span>() {
    <span class="hljs-keyword">return</span> <span class="hljs-variable language_">this</span>.<span class="hljs-property">routers</span> &amp;&amp; <span class="hljs-variable language_">this</span>.<span class="hljs-property">routers</span>.<span class="hljs-property">length</span> &gt; <span class="hljs-number">1</span>;
  },

  <span class="hljs-keyword">get</span> <span class="hljs-title function_">canGoForward</span>() {
    <span class="hljs-comment">// Se debe usar junto con allowForward</span>
    <span class="hljs-keyword">return</span> <span class="hljs-variable language_">this</span>.<span class="hljs-property">routers</span> &amp;&amp; <span class="hljs-variable language_">this</span>.<span class="hljs-property">currentIndex</span> &lt; <span class="hljs-variable language_">this</span>.<span class="hljs-property">routers</span>.<span class="hljs-property">length</span> - <span class="hljs-number">1</span>;
  },

  <span class="hljs-keyword">get</span> <span class="hljs-title function_">currentPath</span>() {
    <span class="hljs-keyword">return</span> <span class="hljs-variable language_">this</span>.<span class="hljs-property">current</span>?.<span class="hljs-property">src</span> || <span class="hljs-string">&quot;&quot;</span>;
  },
};</code></pre>
        <h2>Escuchar cambios de ruta</h2>
        <p>Responder a los cambios de ruta escuchando el evento <code>router-change</code>.</p>
        <h3>Uso básico</h3>
        <pre><code class="hljs language-javascript">app.<span class="hljs-title function_">on</span>(<span class="hljs-string">&quot;router-change&quot;</span>, <span class="hljs-function">(<span class="hljs-params">e</span>) =&gt;</span> {
  <span class="hljs-keyword">const</span> { data } = e;
  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;Cambio de ruta:&quot;</span>, data.<span class="hljs-property">name</span>);
  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;URL de la página:&quot;</span>, data.<span class="hljs-property">src</span>);
});</code></pre>
        <h3>Datos del evento</h3>
        <p>El objeto de datos del evento <code>router-change</code> contiene:</p>
        <table>
          <thead>
            <tr>
              <th>Atributo</th>
              <th>Descripción</th>
              <th>Valores posibles</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><code>name</code></td>
              <td>Tipo de navegación</td>
              <td><code>goto</code>, <code>replace</code>, <code>forward</code>, <code>back</code></td>
            </tr>
            <tr>
              <td><code>src</code></td>
              <td>Dirección de la página de destino</td>
              <td>Ruta de la página</td>
            </tr>
          </tbody>
        </table>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> ready = <span class="hljs-keyword">function</span> (<span class="hljs-params"></span>) {
  <span class="hljs-comment">// Escuchar cambios de ruta</span>
  <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">on</span>(<span class="hljs-string">&quot;router-change&quot;</span>, <span class="hljs-function">(<span class="hljs-params">e</span>) =&gt;</span> {
    <span class="hljs-keyword">const</span> { name, src } = e.<span class="hljs-property">data</span>;

    <span class="hljs-comment">// Registrar visita a la página</span>
    <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">`[<span class="hljs-subst">${name}</span>] Navegar a: <span class="hljs-subst">${src}</span>`</span>);

    <span class="hljs-comment">// Actualizar título de la página</span>
    <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">updateTitle</span>(src);

    <span class="hljs-comment">// Enviar datos estadísticos</span>
    <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">trackPageView</span>(src);
  });
};

<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> proto = {
  <span class="hljs-title function_">updateTitle</span>(<span class="hljs-params">src</span>) {
    <span class="hljs-keyword">const</span> titles = {
      <span class="hljs-string">&quot;home.html&quot;</span>: <span class="hljs-string">&quot;Inicio&quot;</span>,
      <span class="hljs-string">&quot;about.html&quot;</span>: <span class="hljs-string">&quot;Acerca de nosotros&quot;</span>,
      <span class="hljs-string">&quot;contact.html&quot;</span>: <span class="hljs-string">&quot;Contáctenos&quot;</span>,
    };

    <span class="hljs-keyword">const</span> pageName = src.<span class="hljs-title function_">split</span>(<span class="hljs-string">&quot;/&quot;</span>).<span class="hljs-title function_">pop</span>();
    <span class="hljs-variable language_">document</span>.<span class="hljs-property">title</span> = titles[pageName] || <span class="hljs-string">&quot;Aplicación&quot;</span>;
  },

  <span class="hljs-title function_">trackPageView</span>(<span class="hljs-params">src</span>) {
    <span class="hljs-comment">// Enviar estadísticas de visita de página</span>
    <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;Estadísticas de visita de página:&quot;</span>, src);
  },
};</code></pre>
        <h2>Guardias de navegación de página</h2>
        <p>Combinando la escucha de rutas, se puede implementar la funcionalidad de guardias de navegación:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> ready = <span class="hljs-keyword">function</span> (<span class="hljs-params"></span>) {
  <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">on</span>(<span class="hljs-string">&quot;router-change&quot;</span>, <span class="hljs-function">(<span class="hljs-params">e</span>) =&gt;</span> {
    <span class="hljs-keyword">const</span> { src } = e.<span class="hljs-property">data</span>;

    <span class="hljs-comment">// Comprobar si se requiere inicio de sesión</span>
    <span class="hljs-keyword">if</span> (<span class="hljs-variable language_">this</span>.requiresAuth(src) &amp;&amp; !<span class="hljs-variable language_">this</span>.<span class="hljs-title function_">isLoggedIn</span>()) {
      e.<span class="hljs-title function_">preventDefault</span>();
      <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">goto</span>(<span class="hljs-string">&quot;./login.html&quot;</span>);
    }
  });
};

<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> proto = {
  <span class="hljs-title function_">requiresAuth</span>(<span class="hljs-params">src</span>) {
    <span class="hljs-keyword">const</span> authPages = [<span class="hljs-string">&quot;profile.html&quot;</span>, <span class="hljs-string">&quot;settings.html&quot;</span>];
    <span class="hljs-keyword">return</span> authPages.<span class="hljs-title function_">some</span>(<span class="hljs-function">(<span class="hljs-params">page</span>) =&gt;</span> src.<span class="hljs-title function_">includes</span>(page));
  },

  <span class="hljs-title function_">isLoggedIn</span>(<span class="hljs-params"></span>) {
    <span class="hljs-keyword">return</span> !!<span class="hljs-variable language_">this</span>.<span class="hljs-property">globalData</span>?.<span class="hljs-property">user</span>;
  },
};</code></pre>
