        <h1>Introducción</h1>
        <h2>¿Qué es ofa.js?</h2>
        <p>ofa.js es un marco de trabajo de front-end web muy fácil de usar, diseñado para construir aplicaciones web, con el objetivo de mejorar la eficiencia del desarrollo y reducir el umbral de entrada.</p>
        <blockquote>
          <p>Si ya estás <strong>bastante familiarizado</strong> con HTML, CSS y JavaScript, entonces ofa.js es una excelente opción.</p>
        </blockquote>
        <h2>¿Por qué desarrollé ofa.js?</h2>
        <p>Aunque ya existen frameworks frontend como React y Vue, todos ellos presentan una barrera de entrada relativamente alta. Los desarrolladores deben aprender primero una serie de conocimientos previos, como instalar Node.js, utilizar npm para instalar paquetes y configurar un entorno de scaffolding.</p>
        <p>Estos pasos iniciales no son indispensables para el desarrollo real, sino que se convierten en una "caja negra" durante la fase de inicio del proyecto, cargando la aplicación con una complejidad innecesaria desde el principio. El nacimiento de ofa.js tiene como objetivo precisamente romper este dilema.</p>
        <h2>Propósito de ofa.js</h2>
        <h3>Simplificar el flujo de trabajo del desarrollo frontend</h3>
        <p>ofa.js simplifica el tedioso proceso del desarrollo frontend tradicional. Los desarrolladores no necesitan aprender Node.js, npm ni herramientas de andamiaje para crear rápidamente aplicaciones frontend. Solo tienen que abrir el programa de construcción oficial (versión web) en el navegador, seleccionar un directorio local y comenzar a desarrollar.</p>
        <h3>Reducir el umbral de desarrollo</h3>
        <p>Muchas personas desean desarrollar sus propias aplicaciones o convertirse en desarrolladores, pero al enfrentarse a la ruta tradicional de desarrollo web (incluyendo Android, iOS, etc.), se desaniman al tener que aprender una gran cantidad de conocimientos previos, como instalar el entorno de desarrollo y configurar el andamiaje.</p>
        <p>ofa.js se dedica a hacer que todo sea sencillo. Solo necesitas un navegador Chrome, abre una página web y podrás construir aplicaciones, selecciona y abre directamente un directorio local, ahorrando los preparativos previos al desarrollo. Todos los cálculos, operaciones de datos y almacenamiento se ejecutan localmente en el usuario, sin necesidad de depender de servicios en la nube.</p>
        <h3>La solución definitiva para convertirse en micro-frontends</h3>
        <p>ofa.js permite que el desarrollo frontend web se subdivida, al igual que los microservicios, en varios módulos independientes, cada uno de los cuales puede ser desarrollado y desplegado por separado. Cuando los límites tradicionales del frontend web se rompen, la tecnología frontend irá traspasando gradualmente las fronteras de la tecnología del servidor.</p>
        <blockquote>
          <p>Los microservicios (Microservices) son un estilo de arquitectura de software que divide una aplicación grande y compleja en varios servicios pequeños, de granularidad fina, desplegados y ejecutados de forma independiente.</p>
        </blockquote>

        </ul>
