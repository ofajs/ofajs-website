      <article class="markdown-body">
        <h1>Crear la primera aplicación</h1>
        <p>Si no quieres lidiar con otros pasos complicados y prefieres usar ofa.js para desarrollar todo el proyecto, puedes aprovechar la herramienta de construcción y vista previa en línea proporcionada oficialmente por ofa.js para crear tu primera aplicación local directamente en el navegador con un solo clic.</p>
        <p>Esta herramienta está alojada en un servidor estático, todas las operaciones se realizan localmente en el navegador, no es necesario conectarse a un servidor dinámico, por favor, úsela con confianza.</p>
        <h2>Iniciar el programa</h2>
        <p>Haz clic en <a href="https://core.noneos.com?redirect=studio" target="_blank">OFA Studio</a> para abrir la herramienta de construcción ofa.js. Esta herramienta utiliza directamente el sistema de archivos local del navegador, sin necesidad de instalación ni configuración. Sigue los siguientes pasos:</p>
        <ol>
          <li>Visita el sitio web y espera a que se cargue el programa</li>
          <li>Haz clic en el botón "Crear nuevo proyecto"</li>
          <li>Selecciona el tipo "Aplicación ofa.js", introduce el nombre del proyecto y luego elige el directorio local</li>
          <li>En el cuadro de diálogo de confirmación de permisos, haz clic en permitir todo y luego en "Confirmar creación"</li>
          <li>Tras unos segundos, el proyecto se inicializará en el directorio seleccionado</li>
        </ol>
        <p>Una vez completada la inicialización del proyecto, puede usar un editor como <a href="https://code.visualstudio.com/" target="_blank">VSCode</a> para abrir ese directorio y comenzar a escribir el código de la aplicación.</p>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
