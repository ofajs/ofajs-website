        <h1>Microaplicación</h1>
        <p>使用 <code>o-app</code> 进行应用化，这个标签就代表着一个微应用，它会加载 <code>app-config.js</code> 配置文件，该文件定义了应用的首页地址和页面切换动画配置。</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">o-app</span> <span class="hljs-attr">src</span>=<span class="hljs-string">&quot;./app-config.js&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-app</span>&gt;</span></code></pre>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// app-config.js</span>
<span class="hljs-comment">// Dirección de la página de inicio de la aplicación</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> home = <span class="hljs-string">&quot;./home.html&quot;</span>;

<span class="hljs-comment">// Configuración de animación de cambio de página</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(0, 0)&quot;</span>,

  <span class="hljs-attr">previous</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(-30px, 0)&quot;</span>,

};</code></pre><o-playground name="微应用示例" style="--editor-height: 500px">

## <span class="hljs-keyword">M</span>étodos <span class="hljs-keyword">de</span> paso <span class="hljs-keyword">de</span> parámetros

<span class="hljs-keyword">En</span> `o-<span class="hljs-keyword">app</span>`, <span class="hljs-keyword">la</span> navegació<span class="hljs-keyword">n</span> entre páginas admite el paso <span class="hljs-keyword">de</span> parámetros mediante URL <span class="hljs-keyword">Query</span>, y <span class="hljs-keyword">la</span> página destino los recibe a través del parámetro `<span class="hljs-keyword">query</span>` <span class="hljs-keyword">de</span> <span class="hljs-keyword">la</span> funció<span class="hljs-keyword">n</span> del <span class="hljs-keyword">m</span>ódulo.

## Navegació<span class="hljs-keyword">n</span> <span class="hljs-keyword">de</span> página

<span class="hljs-keyword">En</span> <span class="hljs-keyword">la</span> aplicació<span class="hljs-keyword">n</span> o-<span class="hljs-keyword">app</span>, cada <span class="hljs-keyword">m</span>ódulo <span class="hljs-keyword">de</span> página puede usar <span class="hljs-keyword">la</span> etiqueta `&lt;a&gt;` con el atributo `olink` para cambiar <span class="hljs-keyword">de</span> página. Esta etiqueta activa el enrutamiento <span class="hljs-keyword">de</span> <span class="hljs-keyword">la</span> aplicació<span class="hljs-keyword">n</span>, incluye animaciones <span class="hljs-keyword">de</span> transició<span class="hljs-keyword">n</span> y <span class="hljs-keyword">no</span> recarga toda <span class="hljs-keyword">la</span> página.

```html
&lt;a href=<span class="hljs-string">&quot;./about.html&quot;</span> olink&gt;<span class="hljs-keyword">Ir</span> a <span class="hljs-keyword">la</span> página <span class="hljs-keyword">about</span>&lt;/a&gt;</code></pre>

<span class="hljs-tag">&lt;/<span class="hljs-name">template</span>&gt;</span></code></pre>

      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
