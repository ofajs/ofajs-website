        <h1>Gestión de estado</h1>
        <h2>¿Qué es el estado?</h2>
        <p>En ofa.js, el <strong>estado</strong> se refiere al atributo <code>data</code> del propio componente o módulo de página. Este estado solo puede usarse en el componente actual para almacenar y gestionar los datos internos de dicho componente.</p>
        <p>Cuando varios componentes o páginas necesitan compartir los mismos datos, el enfoque tradicional consiste en transmitirlos mediante eventos o pasar propiedades (props) de capa en capa, lo que en aplicaciones complejas dificulta el mantenimiento del código. Por lo tanto, se necesita una <strong>gestión del estado</strong> —definiendo un objeto de estado compartido que permita a múltiples componentes o módulos de página acceder y modificar estos datos, logrando así la compartición del estado.</p>
        <blockquote>
          <p><strong>Consejo</strong>: La gestión de estado es adecuada para escenarios que requieren compartir datos entre componentes y páginas, como información de usuario, carrito de compras, configuración de temas, configuración global, etc.</p>
        </blockquote>
        <h2>Generar objeto de estado</h2>
        <p>Para crear un objeto de estado reactivo mediante <code>$.stanz({})</code>. Este método recibe un objeto normal como datos iniciales y devuelve un proxy de estado reactivo.</p>
        <h3>Uso básico</h3>

        <h2>Características del objeto de estado</h2>
        <h3>1. Actualización responsiva</h3>
        <p><code>$.stanz()</code> crea un objeto de estado reactivo. Cuando los datos del estado cambian, todos los componentes que hacen referencia a esos datos se actualizan automáticamente.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> store = $.<span class="hljs-title function_">stanz</span>({ <span class="hljs-attr">count</span>: <span class="hljs-number">0</span> });

<span class="hljs-comment">// En el componente</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> {
  <span class="hljs-attr">data</span>: {
    <span class="hljs-attr">store</span>: {}
  },
  <span class="hljs-attr">proto</span>:{
    <span class="hljs-title function_">increment</span>(<span class="hljs-params"></span>) {
        store.<span class="hljs-property">count</span>++; <span class="hljs-comment">// Todos los componentes que hacen referencia a store.count se actualizarán automáticamente</span>
    }
  },
  <span class="hljs-title function_">attached</span>(<span class="hljs-params"></span>) {
    <span class="hljs-comment">// Hacer referencia directa a la propiedad del objeto de estado</span>
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">store</span> = store;
  },
  <span class="hljs-title function_">detached</span>(<span class="hljs-params"></span>){
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">store</span> = {}; <span class="hljs-comment">// Al destruir el componente, limpiar los datos de estado montados</span>
  }
};</code></pre>
        <h3>2. Respuesta profunda</h3>
        <p>El objeto de estado admite reactividad profunda; los cambios en objetos y arrays anidados también serán detectados.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> store = $.<span class="hljs-title function_">stanz</span>({
  <span class="hljs-attr">user</span>: {
    <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;Zhang San&quot;</span>,
    <span class="hljs-attr">settings</span>: {
      <span class="hljs-attr">theme</span>: <span class="hljs-string">&quot;dark&quot;</span>
    }
  },
  <span class="hljs-attr">list</span>: []
});

<span class="hljs-comment">// Modificar propiedades anidadas también desencadena una actualización</span>
store.<span class="hljs-property">user</span>.<span class="hljs-property">name</span> = <span class="hljs-string">&quot;Li Si&quot;</span>;
store.<span class="hljs-property">user</span>.<span class="hljs-property">settings</span>.<span class="hljs-property">theme</span> = <span class="hljs-string">&quot;light&quot;</span>;
store.<span class="hljs-property">list</span>.<span class="hljs-title function_">push</span>({ <span class="hljs-attr">id</span>: <span class="hljs-number">1</span>, <span class="hljs-attr">title</span>: <span class="hljs-string">&quot;nueva tarea&quot;</span> });</code></pre>
        <h2>Mejores prácticas</h2>
        <h3>1. Montar el estado durante la fase attached del componente</h3>
        <p>Se recomienda montar el estado compartido en el ciclo de vida <code>attached</code> del componente:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> {
  <span class="hljs-attr">data</span>: {
    <span class="hljs-attr">list</span>: []
  },
  <span class="hljs-title function_">attached</span>(<span class="hljs-params"></span>) {
    <span class="hljs-comment">// Montar el estado compartido en los datos del componente</span>
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">list</span> = data.<span class="hljs-property">list</span>;
  },
  <span class="hljs-title function_">detached</span>(<span class="hljs-params"></span>) {
    <span class="hljs-comment">// Al destruir el componente, limpiar los datos de estado montados para evitar fugas de memoria</span>
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">list</span> = [];
  }
};</code></pre>
        <h3>2. Gestión razonable del ámbito del estado</h3>
        <ul>
          <li><strong>Estado global</strong>: adecuado para datos que toda la aplicación necesita acceder (como información del usuario, configuración global)</li>
          <li><strong>Estado del módulo</strong>: adecuado para datos compartidos dentro de un módulo de funcionalidad específica</li>
        </ul>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// Estado de llamada global</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> globalStore = $.<span class="hljs-title function_">stanz</span>({ <span class="hljs-attr">user</span>: <span class="hljs-literal">null</span>, <span class="hljs-attr">theme</span>: <span class="hljs-string">&quot;light&quot;</span> });

<span class="hljs-comment">// Estado utilizado dentro del módulo</span>
<span class="hljs-keyword">const</span> cartStore = $.<span class="hljs-title function_">stanz</span>({ <span class="hljs-attr">total</span>: <span class="hljs-number">0</span> });</code></pre>

        <h2>Notas importantes</h2>
        <ol>
          <li>
            <p><strong>Limpieza de estado</strong>: en el ciclo de vida <code>detached</code> del componente, limpia oportunamente las referencias a los datos de estado para evitar fugas de memoria.</p>
          </li>
          <li>
            <p><strong>Evita dependencias cíclicas</strong>: los objetos de estado no deben formar referencias cíclicas, ya que podrían causar problemas en el sistema reactivo.</p>
          </li>
          <li>
            <p><strong>Estructuras de datos grandes</strong>: para estructuras de datos grandes, considera usar propiedades computadas o gestión por fragmentos para evitar sobrecargas de rendimiento innecesarias.</p>
          </li>
          <li>
            <p><strong>Consistencia del estado</strong>: en operaciones asíncronas, presta atención a la consistencia del estado; puedes usar transacciones o actualizaciones por lotes para garantizar la integridad de los datos.</p>
          </li>
        </ol>
