        <h1>Estado del contexto</h1>
        <p>El estado de contexto es un mecanismo en ofa.js para compartir datos entre componentes. A través del patrón de proveedor (Provider) y consumidor (Consumer), se puede lograr la transferencia de datos entre componentes padre e hijo, así como entre componentes de diferentes niveles, sin necesidad de pasar datos a través de props de nivel en nivel.</p>
        <h2>Conceptos centrales</h2>
        <ul>
          <li><strong>o-provider</strong>: proveedor de datos, define los datos que deben compartirse</li>
          <li><strong>o-consumer</strong>: consumidor de datos, obtiene datos del proveedor más cercano</li>
          <li><strong>watch:xxx</strong>: monitorea los cambios en los datos del consumidor y los vincula a las propiedades del componente o módulo de página</li>
        </ul>
        <h2>o-provider proveedor</h2>
        <p><code>o-provider</code> componente se utiliza para definir el proveedor de datos compartidos. Se identifica por el atributo <code>name</code>, y los datos a compartir se definen a través de atributos (por ejemplo, <code>custom-a=&quot;value&quot;</code>).</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">o-provider</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;userInfo&quot;</span> <span class="hljs-attr">custom-name</span>=<span class="hljs-string">&quot;Zhang San&quot;</span> <span class="hljs-attr">custom-age</span>=<span class="hljs-string">&quot;25&quot;</span>&gt;</span>
  ...
<span class="hljs-tag">&lt;/<span class="hljs-name">o-provider</span>&gt;</span></code></pre>
        <h3>Propiedades</h3>
        <ul>
          <li><code>name</code>: Nombre único del proveedor, utilizado por los consumidores para encontrar al proveedor correspondiente.</li>
        </ul>
        <h3>Características</h3>
        <ol>
          <li><strong>Transmisión automática de atributos</strong>: todos los atributos no reservados del provider se transmiten como datos compartidos</li>
          <li><strong>Actualización reactiva</strong>: cuando cambian los datos del provider, el consumer correspondiente con el mismo name se actualiza automáticamente</li>
          <li><strong>Búsqueda jerárquica</strong>: el consumer busca los datos correspondientes al name comenzando desde el provider más cercano ascendente</li>
        </ol>
        <h2>o-consumer consumidor</h2>
        <p><code>o-consumer</code> componente se utiliza para consumir (usar) los datos del proveedor. Especifica el nombre del proveedor a consumir mediante el atributo <code>name</code>.</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">o-consumer</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;userInfo&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-consumer</span>&gt;</span></code></pre>
        <h3>Propiedades</h3>
        <ul>
          <li><code>name</code>: Nombre del proveedor a consumir</li>
        </ul>
        <h3>Características</h3>
        <ol>
          <li><strong>Obtención automática de datos</strong>: el consumidor obtendrá automáticamente los datos correspondientes al nombre del proveedor ascendente más cercano.</li>
          <li><strong>Fusión de atributos</strong>: si varios proveedores con el mismo nombre tienen un atributo determinado, el atributo del proveedor más cercano al consumidor tiene prioridad.</li>
          <li><strong>Escucha de atributos</strong>: se puede escuchar cambios en atributos específicos mediante <code>watch:xxx</code>.</li>
        </ol>
        <h2>Monitorear cambios de datos</h2>
        <p>A través de <code>watch:xxx</code> se puede monitorear los cambios en los datos del proveedor:</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">o-consumer</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;userInfo&quot;</span> <span class="hljs-attr">watch:custom-age</span>=<span class="hljs-string">&quot;age&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-consumer</span>&gt;</span>

<span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">
<span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> {
  <span class="hljs-attr">data</span>:{
    <span class="hljs-attr">age</span>: <span class="hljs-number">0</span>,
  },
};
</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span></code></pre>

        <h2>o-root-provider proveedor raíz</h2>
        <p><code>o-root-provider</code> es un proveedor global de nivel raíz, cuyo ámbito de aplicación es todo el documento. Incluso sin un proveedor padre, los consumidores pueden obtener los datos del proveedor raíz.</p>
        <pre><code class="hljs language-html"><span class="hljs-comment">&lt;!-- Define el proveedor raíz global --&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">o-root-provider</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;globalConfig&quot;</span> <span class="hljs-attr">custom-theme</span>=<span class="hljs-string">&quot;dark&quot;</span> <span class="hljs-attr">custom-language</span>=<span class="hljs-string">&quot;es-ES&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-root-provider</span>&gt;</span>

<span class="hljs-comment">&lt;!-- Se puede consumir en cualquier parte de la página --&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">o-consumer</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;globalConfig&quot;</span> <span class="hljs-attr">watch:custom-theme</span>=<span class="hljs-string">&quot;theme&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-consumer</span>&gt;</span></code></pre>
        <h3>Características</h3>
        <ol>
          <li><strong>Ámbito global</strong>: Los datos del proveedor raíz están disponibles en toda la página.</li>
          <li><strong>Prioridad</strong>: Cuando existen simultáneamente un provider y un root-provider con el mismo nombre, el provider más cercano al consumidor tiene prioridad.</li>
          <li><strong>Eliminable</strong>: Al eliminar el root-provider, el consumidor retrocede para buscar otros providers.</li>
        </ol>

        <h2>Método getProvider(name)</h2>
        <p><code>getProvider(name)</code> es un método de instancia que se utiliza para obtener el elemento proveedor correspondiente al nombre. Busca hacia arriba en el DOM el proveedor superior más cercano; si no lo encuentra, devuelve root-provider.</p>
        <h3>Uso del método getProvider(name) dentro de un componente o módulo de página</h3>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">
...
<span class="hljs-attr">proto</span>:{
  <span class="hljs-title function_">changeValue</span>(<span class="hljs-params"></span>){
    <span class="hljs-keyword">const</span> provider = <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">getProvider</span>(<span class="hljs-string">&quot;name&quot;</span>);
    provider.<span class="hljs-property">customValue</span> = <span class="hljs-string">&quot;new value&quot;</span>;
  }
}
...
</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span></code></pre>

        <h3>Escenarios de uso</h3>
        <ol>
          <li><strong>Obtención manual de datos</strong>: se utiliza cuando se necesita acceder directamente a los datos del proveedor </li>
          <li><strong>A través de Shadow DOM</strong>: busca el proveedor superior dentro del Shadow DOM </li>
          <li><strong>Manejo de eventos</strong>: obtiene el proveedor correspondiente en la devolución de llamada del evento</li>
        </ol>
        <h2>dispatch despacho de eventos</h2>
        <p>El proveedor puede enviar eventos a todos los consumidores que lo consumen:</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">o-provider</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;test&quot;</span> <span class="hljs-attr">id</span>=<span class="hljs-string">&quot;myProvider&quot;</span> <span class="hljs-attr">custom-value</span>=<span class="hljs-string">&quot;Hello&quot;</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">o-consumer</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;test&quot;</span> <span class="hljs-attr">on:custom-event</span>=<span class="hljs-string">&quot;handleEvent&quot;</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">div</span>&gt;</span>{{customValue}}<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span>
  <span class="hljs-tag">&lt;/<span class="hljs-name">o-consumer</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">o-provider</span>&gt;</span>

<span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">
<span class="hljs-comment">// Desencadenar evento</span>
$(<span class="hljs-string">&quot;#myProvider&quot;</span>).<span class="hljs-title function_">dispatch</span>(<span class="hljs-string">&quot;custom-event&quot;</span>, {
  <span class="hljs-attr">data</span>: { <span class="hljs-attr">message</span>: <span class="hljs-string">&quot;Hello World&quot;</span> }
});
</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span></code></pre>

        button {
          padding: 8px 16px;
          background: #007acc;
          color: white;
          border: none;
          cursor: pointer;
        }
      </style>
      <input type="text" sync:value="inputText" placeholder="Escribe un mensaje...">
      <button on:click="sendMessage">Enviar</button>
      <script>
        export default {
          tag:"chat-input",
          data: {
            inputText: "",
          },
          proto: {
            sendMessage() {
              const provider = this.getProvider("chat");
              if (provider && this.inputText.trim()) {
                provider.dispatch("new-message", {
                  data: { text: this.inputText }
                });
                this.inputText = "";
              }
            },
          },
        };
      </script>

        <h2>Mejores prácticas</h2>
        <ol>
          <li><strong>Nombrado adecuado</strong>: Utiliza nombres significativos para provider y consumer, para facilitar el seguimiento y el mantenimiento.</li>
          <li><strong>Evitar el uso excesivo</strong>: El estado de contexto es adecuado para compartir datos entre componentes, para componentes padre-hijo normales se recomienda usar props.</li>
          <li><strong>Proveedor raíz para configuración global</strong>: Temas, idiomas, estado global, etc., son adecuados para usar root-provider.</li>
          <li><strong>Limpieza oportuna</strong>: Cuando se elimina un provider, el consumer limpia automáticamente los datos, sin necesidad de manejo manual.</li>
        </ol>

      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
