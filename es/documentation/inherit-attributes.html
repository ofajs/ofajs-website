        <h1>Transmitir atributos de características</h1>
        <p>En ofa.js, <a href="https://developer.mozilla.org/zh-CN/docs/Web/API/Element/attributes" target="_blank">atributos（Attribute）</a> es una de las formas más comunes de transferir datos entre componentes. Solo necesita declarar los atributos requeridos en el objeto <code>attrs</code> del componente para pasar datos externos al componente cuando se usa.</p>
        <h2>Uso básico</h2>
        <h3>Definir propiedades de recepción</h3>
        <p>Antes de usar el componente, es necesario declarar las propiedades que se recibirán en el objeto <code>attrs</code> del componente. Las propiedades pueden tener valores predeterminados.</p>
        <o-playground name="Ejemplo de uso básico" style="--editor-height: 500px">
          <code path="demo.html" preview="">
    <template>
      <l-m src="./demo-comp.html"></l-m>
      <demo-comp first="OFA" full-name="Ejemplo de componente OFA"></demo-comp>
      <br>
      <demo-comp first="NoneOS" full-name="Caso de uso de NoneOS"></demo-comp>
    </template>
  </code>
          <code path="demo-comp.html" active="">
    <template component="">
      <style>
        :host {
          display: block;
          border: 1px solid green;
          padding: 8px;
        }
      </style>
      <p>First: {{first}}</p>
      <p>Full Name: {{fullName}}</p>
      <script>
        export default async ({ load }) => {
          return {
            tag: "demo-comp",
            attrs: {
              first: null,
              fullName:""
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h3>Reglas importantes</h3>
        <ol>
          <li>
            <p><strong>Limitación de tipo</strong>: El valor del atributo pasado debe ser una cadena de texto; otros tipos se convertirán automáticamente a cadenas.</p>
          </li>
          <li>
            <p><strong>Conversión de nombres</strong>: Dado que los atributos HTML no distinguen entre mayúsculas y minúsculas, al pasar atributos que contienen letras mayúsculas, se debe usar el formato con guiones (kebab-case).</p>
            <ul>
              <li>Por ejemplo: <code>fullName</code> → <code>full-name</code></li>
            </ul>
          </li>
          <li>
            <p><strong>Debe estar definido</strong>: Si el componente no define la propiedad correspondiente en el objeto <code>attrs</code>, no podrá recibir ese atributo. El valor establecido es el valor predeterminado; si no se desea un valor predeterminado, se establece como <code>null</code>.</p>
          </li>
        </ol>
        <o-playground name="Ejemplo de regla importante" style="--editor-height: 500px">
          <code path="demo.html" preview="">
    <template>
      <l-m src="./demo-comp.html"></l-m>
      <demo-comp></demo-comp>
      <demo-comp user-name="Zhang San" age="25"></demo-comp>
    </template>
  </code>
          <code path="demo-comp.html" active="">
    <template component="">
      <style>
        :host {
          display: block;
          border: 1px solid green;
          padding: 8px;
        }
      </style>
      <p>User Name: {{userName}}</p>
      <p>Age: {{age}}</p>
      <script>
        export default async ({ load }) => {
          return {
            tag: "demo-comp",
            attrs: {
              userName: "nombre predeterminado",
              age: "0"
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Sintaxis de plantilla para pasar atributos</h2>
        <p>En la plantilla del componente, se puede usar la sintaxis <code>attr:toKey="fromKey"</code> para pasar los datos <code>fromKey</code> del componente actual al atributo <code>toKey</code> del componente hijo.</p>
        <o-playground name="Ejemplo de paso de atributos" style="--editor-height: 500px">
          <code path="demo.html" preview="">
    <template>
      <o-page src="page1.html"></o-page>
    </template>
  </code>
          <code path="page1.html" active="">
    <template page="">
      <l-m src="./demo-comp.html"></l-m>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <textarea sync:value="val"></textarea>
      <br>
      👇
      <demo-comp attr:full-name="val"></demo-comp>
      <script>
        export default async () => {
          return {
            data: {
              val: "Hello ofa.js Demo Code",
            },
          };
        };
      </script>
    </template>
  </code>
          <code path="demo-comp.html" active="">
    <template component="">
      <style>
        :host {
          display: block;
          border: 1px solid green;
          padding: 8px;

      <p>Full Name: {{fullName}}</p>
      <script>

            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Transmisión multinivel</h2>
        <p>Se puede pasar attribute a través de componentes anidados en múltiples capas.</p>
        <p>Si el componente necesita depender de otros componentes, es necesario introducir los módulos de otros componentes en el componente.</p>
        <o-playground name="Ejemplo de transmisión multinivel" style="--editor-height: 700px">
          <code path="demo.html" preview="">
    <template>
      <l-m src="./outer-comp.html"></l-m>
      <outer-comp user-name="Datos de nivel superior"></outer-comp>
    </template>
  </code>
          <code path="outer-comp.html" active="">
    <template component="">
      <l-m src="./inner-comp.html"></l-m>
      <style>
        :host {
          display: block;
          border: 1px solid blue;
          padding: 8px;
          margin-bottom: 8px;
        }
      </style>
      <p>Componente externo recibe: {{userName}}</p>
      <inner-comp attr:user-name="userName"></inner-comp>
      <script>
        export default async ({ load }) => {
          return {
            tag: "outer-comp",
            attrs: {
              userName: ""
            },
          };
        };
      </script>
    </template>
  </code>
          <code path="inner-comp.html" active="">
    <template component="">
      <style>
        :host {
          display: block;
          border: 1px solid green;
          padding: 8px;
          margin-left: 20px;
        }
      </style>
      <p>Componente interno recibe: {{userName}}</p>
      <script>
        export default async ({ load }) => {
          return {
            tag: "inner-comp",
            attrs: {
              userName: ""
            },
          };
        };
      </script>
    </template>
  </code>

      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
