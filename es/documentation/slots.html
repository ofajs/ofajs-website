<body>
  <o-app src="../../js/app-config.js">
    <template page>
      <link rel="stylesheet" href="../../css/github-markdown.css" />
      <link rel="stylesheet" href="../../css/hljs.css" />
      <l-m src="../../comps/center-block.html"></l-m>
      <l-m src="../../comps/article-code.html"></l-m>
      <l-m src="https://playground.ofajs.com/comps/o-playground/o-playground.html"></l-m>
      <style>
        :host {
          display: block;
          height: 100%;
          box-sizing: border-box;
          overflow: auto;
        }
      </style>
      <link rel="stylesheet" href="../../css/page.css" />
      <article class="markdown-body">
        <h1>Slot</h1>
        <p>Las ranuras son espacios reservados en un componente para recibir contenido externo. Al utilizar ranuras, puedes crear componentes reutilizables y, al mismo tiempo, permitir que quien use el componente personalice su contenido interno.</p>
        <h2>Slot predeterminado</h2>
        <o-playground name="Ejemplo de ranura predeterminada" style="--editor-height: 500px">
          <code path="demo.html" preview>
    <template>
      <l-m src="./demo-comp.html"></l-m>
      <demo-comp>
        <div>¡Hola, OFAJS!</div>
      </demo-comp>
    </template>
  </code>
          <code path="demo-comp.html" active>
    <template component>
      <style>
        :host {
          display: block;
          border: 1px solid green;
          padding: 8px;
        }
      </style>Contenido de la ranura:
      <br />
      <span style="color: red;">
        <slot></slot>
      </span>
      <script>
        export default async ({ load }) => {
          return {
            tag: "demo-comp",
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h3>Contenido predeterminado del slot</h3>
        <p>Cuando el componente padre no proporciona contenido para el slot, los elementos dentro de <code>&lt;slot&gt;&lt;/slot&gt;</code> se mostrarán como contenido predeterminado.</p>
        <o-playground name="Ejemplo de contenido predeterminado de slot" style="--editor-height: 500px">
          <code path="demo.html" preview>
    <template>
      <l-m src="./demo-comp.html"></l-m>
      <h3>Con contenido de slot:</h3>
      <demo-comp>
        <div>Contenido personalizado</div>
      </demo-comp>
      <h3>Sin contenido de slot (muestra el contenido predeterminado):</h3>
      <demo-comp></demo-comp>
    </template>
  </code>
          <code path="demo-comp.html" active>
    <template component>
      <style>
        :host {
          display: block;
          border: 1px solid green;
          padding: 8px;
          margin-bottom: 10px;
        }
      </style>Contenido del slot:
      <span style="color: red;">
        <slot>
          <div>Este es el contenido predeterminado</div>
        </slot>
      </span>
      <script>
        export default async ({ load }) => {
          return {
            tag: "demo-comp",
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Slots con nombre</h2>
        <p>Cuando un componente necesita múltiples posiciones de slot, se pueden usar slots con nombre para distinguir diferentes slots. Para definir slots con nombre, se utiliza <code>&lt;slot name=&quot;xxx&quot;&gt;</code>, y al usarlos, se especifica en qué slot se coloca el contenido mediante el atributo <code>slot=&quot;xxx&quot;</code>.</p>
        <o-playground name="Ejemplo de ranuras con nombre" style="--editor-height: 500px">
          <code path="demo.html" preview>
    <template>
      <l-m src="./demo-comp.html"></l-m>
      <demo-comp>
        <div>¡Hola, OFAJS!</div>
        <div slot="footer">Contenido del pie de página</div>
      </demo-comp>
    </template>
  </code>
          <code path="demo-comp.html" active>
    <template component>
      <style>
        :host {
          display: block;
          border: 1px solid green;
          padding: 8px;
        }
      </style>Contenido de la ranura:
      <br />
      <span style="color: red;">
        <slot></slot>
      </span>
      <br />
      <span style="color: blue;">
        <slot name="footer"></slot>
      </span>
      <script>
        export default async ({ load }) => {
          return {
            tag: "demo-comp",
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Paso de ranuras multinivel</h2>
        <p>El contenido de los slots puede transmitirse a través de múltiples niveles de componentes. Cuando un componente padre transmite contenido de slot a un componente hijo, este hijo puede seguir transmitiendo ese contenido de slot a sus propios componentes hijos, logrando así una propagación de slots en varias capas.</p>
        <o-playground name="Ejemplo de paso de slots multinivel" style="--editor-height: 500px">
          <code path="demo.html" preview>
    <template>
      <l-m src="./outer-comp.html"></l-m>
      <outer-comp>
        <div style="color: red;">Título del nivel más externo</div>
      </outer-comp>
    </template>
  </code>
          <code path="outer-comp.html">
    <template component>
      <style>
        :host {
          display: block;
          border: 1px solid green;
          padding: 8px;
          margin-bottom: 10px;
        }
      </style>
      <h3>Componente externo</h3>
      <l-m src="./inner-comp.html"></l-m>
      <inner-comp>
        <div style="color: inherit;">
          <slot></slot>
        </div>
      </inner-comp>
      <script>
        export default async ({ load }) => {
          return {
            tag: "outer-comp",
          };
        };
      </script>
    </template>
  </code>
          <code path="inner-comp.html" active>
    <template component>
      <style>
        :host {
          display: block;
          border: 1px solid blue;
          padding: 8px;
        }
      </style>
      <h4>Componente interno</h4>
      <slot></slot>
      <script>
        export default async ({ load }) => {
          return {
            tag: "inner-comp",
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>En el ejemplo anterior:- El componente padre más externo define el contenido de <code>slot=&quot;header&quot;</code></p>
        <ul>
          <li>El componente externo (outer-comp) recibe este contenido de slot y lo pasa al componente interno (inner-comp)</li>
          <li>El componente interno finalmente renderiza el contenido del slot proveniente del nivel más externo</li>
        </ul>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
  </o-app>
  <o-root-provider name="pui" theme="dark"></o-root-provider>
</body>

</html>
