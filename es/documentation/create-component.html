        <h1>Crear componente</h1>
        <p>En ofa.js, los componentes son el mecanismo central para lograr la reutilización de páginas y la modularización. Un componente es esencialmente un Web Component personalizado que, al definir plantillas, estilos y lógica, permite crear elementos de interfaz de usuario reutilizables.</p>
        <h2>Estructura básica del componente</h2>
        <p>A diferencia de los módulos de página, el elemento <code>&lt;template&gt;</code> del módulo de componente utiliza el atributo <code>component</code> y declara el atributo <code>tag</code> para especificar el nombre de la etiqueta del componente.</p>
        <p>En la ubicación donde se necesita utilizar el componente, carga de forma asíncrona el módulo del componente mediante la etiqueta <code>l-m</code>; el sistema completará automáticamente el registro; después, puedes utilizar el componente directamente como una etiqueta HTML común.</p>
        <o-playground name="Ejemplo básico de componente" style="--editor-height: 500px">
          <code path="demo.html" preview>
    <template>
      <l-m src="./demo-comp.html"></l-m>

  </code>

        <h2>Conceptos centrales del componente</h2>
        <h3>tag - nombre de la etiqueta del componente</h3>
        <p><code>tag</code> es el nombre de la etiqueta del componente, <strong>debe coincidir con el nombre de la etiqueta utilizada para el componente</strong>. Por ejemplo, si el <code>tag</code> de tu componente se define como <code>&quot;demo-comp&quot;</code>, entonces al usarlo en HTML debes escribir <code>&lt;demo-comp&gt;&lt;/demo-comp&gt;</code>.</p>
        <h3>Referencia al módulo de componentes</h3>
        <p>Se introduce el módulo de componente mediante la etiqueta <code>l-m</code>, y el módulo se registra automáticamente. Es similar a incluir un script con la etiqueta <code>script</code>, pero <code>l-m</code> está diseñada específicamente para cargar y registrar módulos de componentes.</p>
        <blockquote>
          <p>Nota: La etiqueta de referencia <code>l-m</code> es una <strong>referencia asíncrona</strong>, adecuada para cargar componentes bajo demanda al cargar la página.</p>
        </blockquote>
        <h2>Componente de referencia sincrónica</h2>
        <p>En ciertos escenarios, es posible que necesites cargar componentes de forma síncrona (por ejemplo, asegurarte de que el componente esté registrado antes de usarlo). En este caso, puedes usar el método <code>load</code> junto con la palabra clave <code>await</code> para lograr una referencia síncrona.</p>
        <p>En los módulos de componentes y en los módulos de páginas, se inyecta automáticamente la función <code>load</code>, que permite a los desarrolladores cargar de forma sincrónica los recursos necesarios.</p>
        <o-playground name="Ejemplo de componente con referencia síncrona" style="--editor-height: 500px">
          <code path="demo.html" preview>
    <template>
      <o-page src="page1.html"></o-page>

  </code>

      <script>
        // eslint-disable-next-line
        export default async ({ load }) => {
          await load("./demo-comp.html");
          return {
            data: {},
            proto: {},

  </code>

        <h2>Referencia asíncrona vs referencia síncrona</h2>
        <table>
          <thead>
            <tr>
              <th>Modo de referencia</th>
              <th>Palabra clave</th>
              <th>Característica</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Referencia asíncrona</td>
              <td>Etiqueta <code>l-m</code></td>
              <td>Carga no bloqueante, adecuada para cargar componentes bajo demanda</td>
            </tr>
            <tr>
              <td>Referencia síncrona</td>
              <td>Método <code>load</code> con la palabra clave <code>await</code></td>
              <td>Carga bloqueante, asegura que los componentes estén registrados antes de su uso</td>
            </tr>
          </tbody>
        </table>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
