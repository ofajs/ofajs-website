        <h1>Renderizado de listas</h1>
        <p>En ofa.js, el componente <code>o-fill</code> proporciona una potente función de renderizado de listas, capaz de renderizar eficientemente datos de array en múltiples elementos similares. Admite dos formas principales de uso: renderizado directo y renderizado de plantilla.</p>
        <h2>Introducción del componente o-fill</h2>
        <p><code>o-fill</code> es el componente principal en ofa.js para el renderizado de listas; recibe una propiedad <code>value</code> de tipo array y genera un elemento DOM correspondiente para cada ítem del array. Durante el renderizado, ofa.js rastrea automáticamente los cambios en el array y actualiza el DOM de manera eficiente.</p>
        <h3>Características principales：</h3>
        <ul>
          <li><strong>高效更新</strong>：通过键值跟踪数组变化，仅更新需要变更的部分</li>
          <li><strong>索引访问</strong>：通过 <code>$index</code> 访问当前项的索引</li>
          <li><strong>数据访问</strong>：通过 <code>$data</code> 访问当前项的数据</li>
          <li><strong>宿主访问</strong>：通过 <code>$host</code> 访问当前组件实例，可调用组件方法或访问组件数据</li>
          <li><strong>模板复用</strong>：支持使用命名模板进行复杂列表渲染</li>
        </ul>
        <h2>Renderizado directo</h2>
        <p>La renderización directa es la forma más sencilla de uso: se escribe el contenido de la plantilla directamente dentro de la etiqueta <code>o-fill</code>. Cuando el array cambia, <code>o-fill</code> crea automáticamente los elementos correspondientes para cada dato.</p>
        <o-playground name="o-fill - renderizado directo" style="--editor-height: 600px">
          <code>
    <template page>
      <style>
        :host { display: block; padding: 10px; }
        ul { list-style: none; padding: 0; }
        li { padding: 8px; margin: 5px 0; background: #7e7e7e; border-radius: 4px; }
      </style>
      <h3>Lista de frutas</h3>
      <button on:click="addItem">Añadir fruta</button>
      <button on:click="removeItem">Eliminar última</button>
      <ul>
        <o-fill :value="fruits">
          <li> {{$index + 1}}. {{$data.name}} - Precio: ¥{{$data.price}} <button on:click="$host.removeItem($index)">Eliminar</button></li>
        </o-fill>
      </ul>
      <script>
        export default async () => ({
          data: { 
            fruits: [
              { name: "🍎 Manzana", price: 5 },
              { name: "🍊 Naranja", price: 6 },
              { name: "🍌 Plátano", price: 3 }
            ],
            fruitIndex: 0,
          },
          proto: {
            addItem() {
              const fruitNames = ["🍇 Uva", "🍓 Fresa", "🥝 Kiwi", "🍑 Durazno", "🥭 Mango"];
              const name = fruitNames[this.fruitIndex % fruitNames.length];
              this.fruits.push({ 
                name: name, 
                price: Math.floor(Math.random() * 10) + 1 
              });
              this.fruitIndex++;
            },
            removeItem(index) {
              if (index >= 0 && index < this.fruits.length) {
                this.fruits.splice(index, 1);
                return;
              }
              this.fruits.length && this.fruits.pop();
            }
          }
        });
      </script>
    </template>
  </code>
        </o-playground>
        <p>En este ejemplo, podemos ver:- <code>$index</code> representa el índice del elemento actual (comenzando desde 0)</p>
        <ul>
          <li><code>$data</code> representa el objeto de datos del elemento actual</li>
          <li><code>$host</code> representa la instancia del componente actual, se puede utilizar para invocar métodos del componente o acceder a los datos del componente</li>
          <li>Cuando el array cambia, la lista se actualiza automáticamente</li>
        </ul>
        <h2>Renderizado de plantillas</h2>
        <p>Para estructuras de elementos de lista más complejas, puede utilizar plantillas con nombre. Defina la plantilla dentro de la etiqueta <code>template</code> y luego refiérase a ella en <code>o-fill</code> mediante el atributo <code>name</code>.</p>
        <o-playground name="o-fill - Renderizado de plantilla" style="--editor-height: 600px">
          <code>
    <template page>
      <style>
        :host { display: block; padding: 10px; }
        .product-card { border: 1px solid #747474; border-radius: 8px; padding: 12px; margin: 10px 0; }
        .product-name { font-weight: bold; font-size: 1.1em; }
        .product-price { color: #832c22; font-weight: bold; }
        .product-desc { color: #929292; font-size: 0.9em; margin-top: 5px; }
      </style>
      <h3>Lista de Productos</h3>
      <button on:click="addProduct">Agregar Producto</button>
      <div class="products-container">
        <o-fill :value="products" name="product-template"></o-fill>
      </div>
      <template name="product-template">
        <div class="product-card">
          <div class="product-name">{{$data.name}}</div>
          <div class="product-price">¥{{$data.price}}</div>
          <div class="product-desc">{{$data.description}}</div>
          <small>Número de serie: {{$index + 1}}</small>
        </div>
      </template>
      <script>
        export default async () => ({
          data: {
            products: [
              { name: "MacBook Pro", price: 12999, description: "Computadora portátil de alto rendimiento, adecuada para trabajo profesional" },
              { name: "iPhone 15", price: 5999, description: "Último modelo de teléfono inteligente, excelente calidad de fotos" },
              { name: "AirPods Pro", price: 1999, description: "Auriculares inalámbricos con cancelación de ruido, excelente calidad de sonido" }
            ],
            productIndex: 0,
          },
          proto: {
            addProduct() {
              const productNames = ["iPad Air", "Apple Watch", "Magic Mouse", "Pro Display"];
              const productDescs = ["Tableta ligera y portátil", "Reloj inteligente, monitoreo de salud", "Ratón con diseño ergonómico", "Monitor de nivel profesional"];
              const name = productNames[this.productIndex % productNames.length];
              const desc = productDescs[this.productIndex % productDescs.length];
              this.products.push({
                name: name,
                price: Math.floor(Math.random() * 5000) + 1000,
                description: desc
              });
              this.productIndex++;
            }
          }
        });
      </script>
    </template>
  </code>

        <h2>Optimización del rendimiento y gestión de claves-valor</h2>
        <p>Para listas que requieren actualizaciones frecuentes, puedes especificar un identificador único mediante el atributo <code>fill-key</code> para mejorar el rendimiento de renderizado.</p>
        <pre><code class="hljs language-html"><span class="hljs-comment">&lt;!-- Usar claves personalizadas para mejorar el rendimiento --&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">o-fill</span> <span class="hljs-attr">:value</span>=<span class="hljs-string">&quot;items&quot;</span> <span class="hljs-attr">fill-key</span>=<span class="hljs-string">&quot;id&quot;</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">div</span>&gt;</span>{{$data.name}}<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">o-fill</span>&gt;</span></code></pre>
        <p>En el ejemplo anterior, <code>fill-key=&quot;id&quot;</code> le dice a ofa.js que use el atributo <code>id</code> de cada elemento de datos como identificador único, de modo que incluso si el orden del array cambia, puede identificar y actualizar correctamente los elementos correspondientes.</p>
        <h2>Mejores prácticas para renderizado de listas</h2>
        <ol>
          <li><strong>Manejo de eventos</strong>: Al usar eventos en elementos de lista, tenga en cuenta que <code>$host</code> apunta a la instancia del componente actual, y <code>$data</code> apunta a los datos del elemento actual</li>
          <li><strong>Elegir el método de renderizado adecuado</strong>: Use renderizado directo para listas simples, y renderizado de plantilla para estructuras complejas</li>
          <li><strong>Consideraciones de rendimiento</strong>: Para listas grandes o listas que se actualizan frecuentemente, use <code>fill-key</code> para especificar el valor de la clave</li>
          <li><strong>Estructura de datos</strong>: Asegúrese de que cada elemento en el array sea un objeto de datos válido</li>
          <li><strong>Evitar anidación profunda</strong>: Aunque se soporta el anidamiento, se debe evitar niveles de anidación excesivamente profundos</li>
        </ol>
