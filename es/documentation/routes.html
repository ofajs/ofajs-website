        <h1>Aplicación de página única</h1>
        <p>Una aplicación de una sola página vincula el componente <code>o-app</code> con la barra de direcciones del navegador, manteniendo sincronizada la URL de la página con la ruta de la página dentro de la aplicación. Tras habilitar la aplicación de una sola página:</p>
        <ul>
          <li>Actualizar la página web puede mantener el estado actual de la ruta</li>
          <li>Copiar la URL de la barra de direcciones y abrirla en otro navegador o pestaña también puede restaurar el estado de la aplicación</li>
          <li>Los botones de avance/retroceso del navegador funcionan correctamente</li>
        </ul>
        <h2>Uso básico</h2>
        <p>Envuelve el componente <code>o-app</code> con el componente oficial <code>o-router</code> para implementar una aplicación de una sola página.</p>

        <h2>atributo fix-body</h2>
        <p>Después de agregar el atributo <code>fix-body</code>, <code>o-router</code> restablecerá automáticamente los estilos de <code>html</code> y <code>body</code>, eliminando los márgenes y rellenos predeterminados.</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">o-router</span> <span class="hljs-attr">fix-body</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">o-app</span> <span class="hljs-attr">src</span>=<span class="hljs-string">&quot;./app-config.js&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-app</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">o-router</span>&gt;</span></code></pre>
        <p>Esto es especialmente útil en los siguientes escenarios:- Se requiere que <code>o-app</code> llene completamente el viewport</p>
        <ul>
          <li>Cuando la aplicación es el único contenido de la página</li>
        </ul>

        <h2>Cómo funciona</h2>
        <p>Aplicación de una sola página implementada con el modo Hash del navegador:</p>
        <ol>
          <li>Cuando se produce un cambio de página dentro de la aplicación, <code>o-router</code> actualiza automáticamente el valor hash en la barra de direcciones (por ejemplo, <code>#/about.html</code>)</li>
          <li>Cuando el usuario actualiza la página o accede a través de una URL, <code>o-router</code> lee el valor hash y carga la página correspondiente</li>
          <li>Los botones de avance/retroceso del navegador activan cambios en el hash, controlando así la navegación de páginas de la aplicación</li>
        </ol>
        <h2>Ejemplo de cambio de URL</h2>
        <p>Supongamos que la aplicación tiene dos páginas <code>home.html</code> y <code>about.html</code>:</p>
        <table>
          <thead>
            <tr>
              <th>Acción del usuario</th>
              <th>Cambio en la barra de direcciones</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Abrir la aplicación</td>
              <td><code>index.html</code> → <code>index.html#/home.html</code></td>
            </tr>
            <tr>
              <td>Saltar a la página Acerca de</td>
              <td><code>index.html#/home.html</code> → <code>index.html#/about.html</code></td>
            </tr>
            <tr>
              <td>Hacer clic en Atrás</td>
              <td><code>index.html#/about.html</code> → <code>index.html#/home.html</code></td>
            </tr>
            <tr>
              <td>Actualizar la página</td>
              <td>Mantiene el hash actual sin cambios</td>
            </tr>
          </tbody>
        </table>
        <ul>
          <li>Las aplicaciones de página única solo pueden funcionar con <strong>un</strong> componente <code>o-app</code></li>
        </ul>

            },
            detached() {
