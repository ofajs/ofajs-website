        <h1>Respuesta de atributos</h1>
        <p>En el <a href="./property-binding.html" olink="">enlace de propiedades</a> anterior, presentamos el mecanismo simple de respuesta de propiedades, es decir, cómo renderizar los valores de propiedades de un componente en la visualización de texto.</p>
        <p>ofa.js no solo admite la reactividad de valores de propiedades básicas, sino también la renderización reactiva de valores de propiedades dentro de objetos anidados en múltiples niveles.</p>
        <o-playground name="Ejemplo de datos no reactivos" style="--editor-height: 500px">
          <code>
    <template page="">
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <p style="color: blue;">count: {{count}}</p>
      <p style="color: green;">count2: {{obj.count2}}</p>
      <button on:click="handleAddCount">Aumentar</button>
      <script>
        export default async () => {
          return {
            data: {
              count: 20,
              obj: {
                count2: 100,
              },
            },
            proto:{
              handleAddCount(){
                this.count++;
                this.obj.count2++;
              }
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>Todos los datos vinculados al objeto de instancia de ofa.js se convertirán automáticamente en datos reactivos. Los datos reactivos solo admiten tipos de datos básicos como cadenas, números, booleanos, arreglos y objetos. Para tipos de datos complejos como funciones e instancias de clase, deben almacenarse como <strong>propiedades no reactivas</strong>, cuyos cambios no activarán el re-renderizado del componente.</p>
        <h2>Datos no reactivos</h2>
        <p>A veces necesitamos almacenar datos que no requieren actualizaciones reactivas, como instancias de Promise, objetos de expresión regular u otros objetos complejos. En estos casos, es necesario utilizar propiedades no reactivas. Los cambios en estas propiedades no desencadenan un nuevo renderizado del componente, y son adecuados para almacenar datos que no necesitan estar sincronizados con la vista.</p>
        <p>Los nombres de las propiedades no reactivas generalmente se prefijan con un guion bajo <code>_</code> antes del nombre de la propiedad, para distinguirlas de las propiedades reactivas.</p>
        <o-playground name="Ejemplo de datos no reactivos" style="--editor-height: 500px">
          <code>
    <template page="">
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <p style="color: blue;">count: {{count}}</p>
      <p style="color: green;">count2: {{_count2}}</p>
      <button on:click="count++">Blue increases</button>
      <button on:click="_count2++">Green increments</button>
      <script>
        export default async () => {
          return {
            data: {
              count: 20,
              _count2: 100,
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>Al hacer clic en el botón <code>Incrementos verdes</code>, aunque el valor de <code>_count2</code> ya ha aumentado, al ser una propiedad no reactiva, no desencadena una actualización de la vista, por lo que la visualización en la interfaz no cambia. Al hacer clic en el botón <code>Aumentos azules</code>, dado que <code>count</code> es una propiedad reactiva, desencadena un nuevo renderizado de todo el componente, momento en el que se actualiza sincrónicamente el contenido de la visualización verde.</p>
        <p>Los datos de objetos no reactivos tienen un mejor rendimiento que los datos de objetos reactivos, porque los datos no reactivos no desencadenan el re-renderizado de los componentes.</p>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
