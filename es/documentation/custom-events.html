        <h1>Eventos personalizados</h1>
        <p>En ofa.js, además de los eventos DOM integrados, también se pueden crear y utilizar eventos personalizados para lograr la comunicación entre componentes. Los eventos personalizados son un mecanismo importante en el desarrollo basado en componentes, ya que permiten a los componentes difundir mensajes o cambios de estado hacia arriba.</p>
        <h2>método emit - desencadenar evento personalizado</h2>
        <p>El método <code>emit</code> se utiliza para disparar eventos personalizados, notificando a los oyentes externos sobre los cambios de estado internos del componente o las acciones del usuario.</p>
        <h3>Uso básico</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// Dispara un evento personalizado simple</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-title function_">emit</span>(<span class="hljs-string">'custom-event'</span>);

<span class="hljs-comment">// Dispara un evento personalizado con datos</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-title function_">emit</span>(<span class="hljs-string">'data-changed'</span>, {
  <span class="hljs-attr">data</span>: {
    <span class="hljs-comment">// Datos personalizados, estructura libre según necesidad</span>
    <span class="hljs-attr">newValue</span>: <span class="hljs-number">100</span>,
    <span class="hljs-attr">oldValue</span>: <span class="hljs-number">50</span>
  }
});</code></pre>
        <h3>Parámetros del método emit</h3>
        <p>El método <code>emit</code> acepta dos argumentos:</p>
        <ol>
          <li><strong>Nombre del evento</strong>: cadena, que indica el nombre del evento a desencadenar</li>
          <li><strong>Objeto de opciones</strong> (opcional): contiene las opciones de configuración del evento<ul>
              <li><code>data</code>: datos a transmitir</li>
              <li><code>bubbles</code>: valor booleano, controla si el evento burbujea (por defecto es true)</li>
              <li><code>composed</code>: valor booleano, controla si el evento puede atravesar los límites del Shadow DOM</li>
              <li><code>cancelable</code>: valor booleano, controla si el evento puede ser cancelado</li>
            </ul>
          </li>
        </ol>
        <p>Luego, el elemento de nivel superior puede usar el método <code>on</code> <a href="./event-binding.html" olink="">(enlace de eventos)</a> para escuchar este evento personalizado.</p>
        <h3>Ejemplo de uso de emit</h3>

        <h2>bubbles - Mecanismo de propagación de eventos</h2>
        <p>La propiedad <code>bubbles</code> controla si el evento se propagará hacia arriba a los elementos padres. Cuando se establece en <code>true</code>, el evento se propaga por el árbol DOM hacia arriba. El valor predeterminado es <code>true</code>. Si se establece en <code>false</code>, el evento no burbujea.</p>
        <h3>Explicación detallada del mecanismo de burbujeo</h3>
        <ul>
          <li><strong>Comportamiento predeterminado</strong>: los eventos emitidos con <code>emit</code> tienen propagación activada por defecto (<code>bubbles: true</code>)</li>
          <li><strong>Ruta de propagación</strong>: el evento se propaga hacia arriba, nivel por nivel, desde el elemento que lo desencadena</li>
          <li><strong>Detener propagación</strong>: invocar <code>event.stopPropagation()</code> en el manejador del evento detiene la propagación</li>
        </ul>
        <h3>Ejemplo de burbuja</h3>
        <o-playground name="Ejemplo de Eventos Personalizados" style="--editor-height: 500px">
          <code path="demo.html" preview="" unimportant="">
    <template>

    <template page="">

      <style>
        :host {
          display: block;
          padding: 20px;
          border: 1px solid blue;
        }
      </style>
      <div on:child-event="handleChildEventFromComponent">
        <bubble-component on:child-event="handleDirectChildEvent"></bubble-component>
      </div>
      <p>Contenedor externo (escucha eventos de burbuja): {{bubbledEventCount}} veces</p>
      <p>Componente interno (escucha eventos directos): {{directEventCount}} veces</p>
      <p>Datos recibidos: <span style="color:red;">{{result}}</span></p>
      <script>
        export default async () => {
          return {
            data: {
              result:"-",
              bubbledEventCount: 0,
              directEventCount: 0
            },
            proto: {
              handleDirectChildEvent(event) {
                this.directEventCount++;
                this.result = event.data;
              },
              handleChildEventFromComponent(event) {
                this.bubbledEventCount++;
                this.result = event.data;
              },
            }
          };
        };
      </script>
    </template>
  </code>
          <code path="bubble-component.html" active="">
    <template component="">
      <style>
        :host {
          display: block;
          padding: 15px;
          border: 1px solid green;
        }
      </style>
      <button on:click="triggerNonBubblingEvent">Disparar evento no burbujeante</button>
      <button on:click="triggerBubblingEvent">Disparar evento burbujeante</button>
      <script>
        export default async () => {
          return {
            tag: "bubble-component",
            proto: {
              triggerNonBubblingEvent() {
                // Evento no burbujeante, solo será capturado por oyentes directos
                this.emit('child-event', {
                  data: { type: 'non-bubbling', message: 'Evento no burbujeante disparado', timestamp: Date.now() },
                  bubbles: false
                });
              },
              triggerBubblingEvent() {
                // Evento burbujeante, se propagará hacia arriba a elementos padre
                this.emit('child-event', {
                  data: { type: 'bubbling', message: 'Evento burbujeante disparado', timestamp: Date.now() },
                  bubbles: true
                });
              }
            }
          };
        };
      </script>
    </template>
  </code>

        <h2>composed - atraviesa los límites del Shadow DOM</h2>
        <p>El atributo <code>composed</code> controla si el evento puede cruzar el límite del Shadow DOM. Esto es especialmente importante para el desarrollo de Web Components, el valor predeterminado es <code>false</code>.</p>
        <h3>Mecanismo de penetración explicado en detalle</h3>
        <ul>
          <li><strong>Aislamiento de Shadow DOM</strong>: por defecto, los eventos no pueden cruzar los límites del Shadow DOM</li>
          <li><strong>Habilitar la propagación</strong>: establecer <code>composed: true</code> permite que el evento atraviese los límites del Shadow DOM</li>
          <li><strong>Casos de uso</strong>: cuando un componente necesita enviar eventos al entorno anfitrión, debe establecer <code>composed: true</code></li>
        </ul>

    <template component="">
      <style>

      <button on:click="triggerNonComposedEvent">Activar evento no composed</button>
      <button on:click="triggerComposedEvent">Activar evento composed</button>
      <script>
        export default async () => {
          return {
            tag: "child-component",
            proto: {
              triggerNonComposedEvent() {
                // Evento no composed, solo será capturado por el oyente directo
                this.emit('child-event', {
                  data: { type: 'non-composed', message: 'Evento no composed activado', timestamp: Date.now() },
                  composed: false
                });
              },
              triggerComposedEvent() {
                // Evento composed, cruzará el límite del Shadow DOM
                this.emit('child-event', {
                  data: { type: 'composed', message: 'Evento composed activado', timestamp: Date.now() },
                  composed: true
                });
              }
            }
          };
        };
      </script>
    </template>
  </code>
