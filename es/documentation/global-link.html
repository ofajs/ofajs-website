        <h1>componente global-link</h1>
        <p><code>global-link</code> es un componente de herramienta que permite a todos los componentes compartir estilos.</p>
        <h2>Uso básico</h2>
        <p>Después de referenciar el componente <code>global-link</code> en <code>ofa.js</code>, puedes hacer que todos los componentes carguen ese archivo de estilo referenciando el archivo de estilo a través de <code>global-link</code>.</p>
        <pre><code class="hljs language-html"><span class="hljs-meta">&lt;!DOCTYPE <span class="hljs-keyword">html</span>&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">html</span> <span class="hljs-attr">lang</span>=<span class="hljs-string">&quot;es&quot;</span>&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">head</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">meta</span> <span class="hljs-attr">charset</span>=<span class="hljs-string">&quot;UTF-8&quot;</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">title</span>&gt;</span>Ejemplo de global-link<span class="hljs-tag">&lt;/<span class="hljs-name">title</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">script</span> <span class="hljs-attr">src</span>=<span class="hljs-string">&quot;https://cdn.jsdelivr.net/gh/ofajs/ofa.js/dist/ofa.min.mjs&quot;</span> <span class="hljs-attr">type</span>=<span class="hljs-string">&quot;module&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">script</span> <span class="hljs-attr">src</span>=<span class="hljs-string">&quot;https://cdn.jsdelivr.net/gh/ofajs/ofa.js/libs/global-link/dist/global-link.min.mjs&quot;</span> <span class="hljs-attr">type</span>=<span class="hljs-string">&quot;module&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">head</span>&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">body</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">o-global-link</span> <span class="hljs-attr">href</span>=<span class="hljs-string">&quot;./global.css&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-global-link</span>&gt;</span>

        <h2>Escenarios aplicables</h2>
        <p>⚠️ <strong>Advertencia</strong>: <code>global-link</code> contamina el ámbito de estilos global, como una variable global.</p>
        <p><strong>¡Absolutamente no uses este componente en proyectos nuevos!</strong> Si utilizas <code>global-link</code> en un proyecto nuevo, significa que el diseño de la arquitectura de tu proyecto tiene problemas, es una señal de un proyecto de mala calidad.</p>
        <p>Usar solo en los siguientes escenarios:</p>
        <ul>
          <li>Migración de proyectos antiguos (solución temporal)</li>
          <li>Código espagueti, proyecto basura (apagafuegos temporal)</li>
        </ul>
        <h2>Alternativas</h2>
        <p>Puedes crear un archivo <code>public.css</code> y luego importarlo por separado en cada uno de tus módulos de componentes (usando la etiqueta <code>link</code>), así lograrás el efecto que deseas y evitarás contaminar los estilos globales.</p>
        <pre><code class="hljs language-html"><span class="hljs-comment">&lt;!-- En el módulo del componente --&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">link</span> <span class="hljs-attr">rel</span>=<span class="hljs-string">&quot;stylesheet&quot;</span> <span class="hljs-attr">href</span>=<span class="hljs-string">&quot;./public.css&quot;</span>&gt;</span></code></pre>
        <h2>Notas importantes</h2>
        <p>Debe priorizarse el uso de la etiqueta <code>o-global-link</code> para la inicialización. Solo después de completar la inicialización, los componentes posteriores aplicarán los estilos globales.</p>
      </article>

      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
