        <h1>Animación de cambio de página</h1>
        <p>El elemento de configuración <code>pageAnime</code> se utiliza para controlar los efectos de animación de transición al cambiar de página, mejorando la experiencia del usuario.</p>
        <h2>Configuración básica</h2>
        <p>En <code>app-config.js</code>, configure la animación de cambio de página:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(0, 0)&quot;</span>,
  },
  <span class="hljs-attr">next</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(30px, 0)&quot;</span>,
  },
  <span class="hljs-attr">previous</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(-30px, 0)&quot;</span>,
  },
};</code></pre>
        <h2>Estado de animación</h2>
        <p>La animación de cambio de página incluye tres estados:</p>
        <table>
          <thead>
            <tr>
              <th>Estado</th>
              <th>Descripción</th>
              <th>Momento de activación</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><code>current</code></td>
              <td>Estilo después de la animación de la página actual</td>
              <td>Cuando se completa el cambio de página</td>
            </tr>
            <tr>
              <td><code>next</code></td>
              <td>Estilo inicial al entrar la nueva página</td>
              <td>Cuando comienza a entrar la nueva página</td>
            </tr>
            <tr>
              <td><code>previous</code></td>
              <td>Estilo objetivo al salir la página anterior</td>
              <td>Cuando comienza a salir la página anterior</td>
            </tr>
          </tbody>
        </table>
        <p><strong>current (estado actual)</strong>- El estilo final después de completar la transición de página</p>
        <ul>
          <li>Generalmente, el estado de visualización normal de la página</li>
          <li>Por ejemplo: <code>opacity: 1, transform: &quot;translate(0, 0)&quot;</code></li>
        </ul>
        <p><strong>next (estado de la página siguiente)</strong>- Estilo inicial al entrar en una nueva página</p>
        <ul>
          <li>Se utiliza para definir desde dónde comienza a entrar una nueva página</li>
          <li>Por ejemplo: <code>opacity: 0, transform: &quot;translate(30px, 0)&quot;</code> significa entrar desde el lado derecho</li>
        </ul>
        <p><strong>anterior (estado de la página anterior)</strong>- Estilo de destino cuando la página antigua sale</p>
        <ul>
          <li>Se usa para definir hacia dónde va la página antigua</li>
          <li>Por ejemplo: <code>opacity: 0, transform: &quot;translate(-30px, 0)&quot;</code> significa salir hacia la izquierda</li>
        </ul>
        <h2>Efectos de animación integrados</h2>
        <h3>Deslizar hacia la izquierda o derecha (predeterminado)</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(0, 0)&quot;</span>,
  },
  <span class="hljs-attr">next</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(30px, 0)&quot;</span>,
  },
  <span class="hljs-attr">previous</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(-30px, 0)&quot;</span>,
  },
};</code></pre>
        <p>Descripción de efectos:- La nueva página se desliza desde la derecha (posición inicial: 30px a la derecha, opacidad 0)</p>
        <ul>
          <li>La página anterior se desliza hacia la izquierda (posición final: -30px a la izquierda, opacidad 0)</li>
          <li>Finalmente, ambas páginas vuelven a su posición normal (opacidad 1, posición 0)</li>
        </ul>
        <h3>Fundido de Entrada y Salida</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>,
  },
  <span class="hljs-attr">next</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
  },
  <span class="hljs-attr">previous</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
  },
};</code></pre>
        <p>Descripción de efectos:- La página nueva pasa de transparente a visible</p>
        <ul>
          <li>La página vieja pasa de visible a transparente</li>
          <li>Adecuado para un estilo de aplicación sencillo y elegante</li>
        </ul>
        <h3>Deslizar hacia arriba y abajo</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(0, 0)&quot;</span>,
  },
  <span class="hljs-attr">next</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(0, 30px)&quot;</span>,
  },
  <span class="hljs-attr">previous</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(0, -30px)&quot;</span>,
  },
};</code></pre>
        <p>Descripción de efectos:- La nueva página se desliza desde abajo</p>
        <ul>
          <li>La página anterior se desliza hacia arriba</li>
          <li>Ideal para aplicaciones con estilo de desplazamiento vertical</li>
        </ul>
        <h3>Efecto de zoom</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;scale(1)&quot;</span>,
  },
  <span class="hljs-attr">next</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;scale(0.8)&quot;</span>,
  },
  <span class="hljs-attr">previous</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;scale(1.2)&quot;</span>,
  },
};</code></pre>
        <p>Descripción de efectos:- La nueva página se amplía de pequeña a tamaño normal</p>
        <ul>
          <li>La página anterior se amplía desde el tamaño normal hasta desaparecer</li>
          <li>Adecuado para aplicaciones con estilo de tarjeta o ventana modal</li>
        </ul>
        <h3>Efecto de volteo</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;rotateY(0deg)&quot;</span>,
  },
  <span class="hljs-attr">next</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;rotateY(-90deg)&quot;</span>,
  },
  <span class="hljs-attr">previous</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;rotateY(90deg)&quot;</span>,
  },
};</code></pre>
        <p>Descripción de efectos:- La nueva página entra volteando desde la izquierda</p>
        <ul>
          <li>La página anterior sale volteando hacia la derecha</li>
          <li>Adecuado para aplicaciones que requieren efectos 3D</li>
        </ul>
        <h2>Animación personalizada</h2>
        <h3>Combinar múltiples atributos</h3>
        <p>Se pueden combinar múltiples propiedades CSS para crear animaciones complejas:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(0, 0) scale(1)&quot;</span>,
  },
  <span class="hljs-attr">next</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(50px, 50px) scale(0.9)&quot;</span>,
  },
  <span class="hljs-attr">previous</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(-50px, -50px) scale(1.1)&quot;</span>,
  },
};</code></pre>
        <h3>Usar diferentes funciones de suavizado</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(0, 0)&quot;</span>,
    <span class="hljs-attr">transition</span>: <span class="hljs-string">&quot;all 0.3s cubic-bezier(0.4, 0, 0.2, 1)&quot;</span>,
  },
  <span class="hljs-attr">next</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(30px, 0)&quot;</span>,
  },
  <span class="hljs-attr">previous</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(-30px, 0)&quot;</span>,
  },
};</code></pre>
        <h2>Propiedades CSS compatibles</h2>
        <p><code>pageAnime</code> soporta todas las propiedades CSS animables：</p>
        <h3>Atributos comunes</h3>
        <ul>
          <li><code>opacity</code> - opacidad (0-1)</li>
          <li><code>transform</code> - transformación<ul>
              <li><code>translate(x, y)</code> - traslación</li>
              <li><code>scale(n)</code> - escala</li>
              <li><code>rotate(deg)</code> - rotación</li>
              <li><code>rotateX/Y(deg)</code> - rotación 3D</li>
            </ul>
          </li>
          <li><code>width</code> / <code>height</code> - ancho / alto</li>
          <li><code>margin</code> / <code>padding</code> - margen / relleno</li>
          <li><code>background-color</code> - color de fondo</li>
          <li><code>border-radius</code> - radio de borde</li>
        </ul>
        <h3>Precauciones</h3>
        <ol>
          <li><strong>Optimización de rendimiento</strong>: Prioriza el uso de <code>transform</code> y <code>opacity</code>, que ofrecen el mejor rendimiento</li>
          <li><strong>Evita el desplazamiento de diseño</strong>: Evita usar propiedades que desencadenan un reflujo de diseño (como <code>width</code>, <code>height</code>, <code>margin</code>)</li>
          <li><strong>Tiempo de transición</strong>: ofa.js añadirá automáticamente efectos de transición, por defecto 300ms</li>
        </ol>

        <h2>Mejores prácticas</h2>
        <h3>1. Mantener la animación simple</h3>
        <p>Evite animaciones demasiado complejas, las animaciones simples son mejores:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// ✅ Recomendado: simple y eficaz</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: { <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>, <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(0, 0)&quot;</span> },
  <span class="hljs-attr">next</span>: { <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>, <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(30px, 0)&quot;</span> },
  <span class="hljs-attr">previous</span>: { <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>, <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(-30px, 0)&quot;</span> },
};

<span class="hljs-comment">// ❌ No recomendado: demasiado complejo</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(0, 0) rotate(0deg) scale(1)&quot;</span>,
    <span class="hljs-attr">borderRadius</span>: <span class="hljs-string">&quot;0&quot;</span>,
  },
  <span class="hljs-attr">next</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(30px, 30px) rotate(45deg) scale(0.5)&quot;</span>,
    <span class="hljs-attr">borderRadius</span>: <span class="hljs-string">&quot;50%&quot;</span>,
  },
  <span class="hljs-attr">previous</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(-30px, -30px) rotate(-45deg) scale(1.5)&quot;</span>,
    <span class="hljs-attr">borderRadius</span>: <span class="hljs-string">&quot;100%&quot;</span>,
  },
};</code></pre>
        <h3>2. Considerar la experiencia de usuario</h3>
        <ul>
          <li>El tiempo de animación no debe ser demasiado largo (se recomienda 200-400ms)</li>
          <li>Evite usar animaciones que provoquen mareos al usuario</li>
          <li>Asegúrese de que la animación sea fluida y sin interrupciones</li>
        </ul>
        <h3>3. Adaptarse a diferentes dispositivos</h3>
        <p>En dispositivos de gama baja, se puede considerar desactivar o simplificar las animaciones:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// Detectar el rendimiento del dispositivo</span>
<span class="hljs-keyword">const</span> isLowEndDevice = navigator.<span class="hljs-property">hardwareConcurrency</span> &lt; <span class="hljs-number">4</span>;

<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = isLowEndDevice ? {
  <span class="hljs-attr">current</span>: { <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span> },
  <span class="hljs-attr">next</span>: { <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span> },
  <span class="hljs-attr">previous</span>: { <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span> },
} : {
  <span class="hljs-attr">current</span>: { <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>, <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(0, 0)&quot;</span> },
  <span class="hljs-attr">next</span>: { <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>, <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(30px, 0)&quot;</span> },
  <span class="hljs-attr">previous</span>: { <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>, <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(-30px, 0)&quot;</span> },
};</code></pre>

        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
