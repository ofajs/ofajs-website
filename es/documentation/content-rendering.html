      <article class="markdown-body">
        <h1>Renderizado de plantillas</h1>
        <p>ofa.js proporciona un potente motor de renderizado de plantillas, con una rica sintaxis que permite a los desarrolladores construir aplicaciones rápidamente. Empezaremos por la representación de texto más común.</p>
        <h2>Enlace de datos de página</h2>
        <p>En ofa.js, cada página tiene un objeto <code>data</code> donde puedes definir las variables que necesitas usar en la página. Cuando la página comienza a renderizarse, los datos del objeto <code>data</code> se enlazan automáticamente con la plantilla, y luego se utiliza la sintaxis <code>{{nombreDeVariable}}</code> en la plantilla para renderizar el valor de la variable correspondiente.</p>
        <h2>Renderizado de texto</h2>
        <p>El renderizado de texto es la forma más básica de renderizado. Puedes usar la sintaxis <code>{{variable}}</code> en plantillas para mostrar los valores de las variables correspondientes en el objeto <code>data</code>.</p>
        <o-playground name="Ejemplo de renderizado de texto" style="--editor-height: 500px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <p>{{val}}</p>
      <script>
        export default async () => {
          return {
            data: {
              val: "Hola, código de demostración de ofa.js",
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Renderizar contenido HTML</h2>
        <p>Al añadir la directiva <code>:html</code> a un elemento, la cadena HTML contenida en la variable correspondiente se analiza e inserta de forma segura dentro del elemento, permitiendo renderizar dinámicamente texto enriquecido o incrustar fragmentos HTML externos sin esfuerzo.</p>
        <o-playground name="Ejemplo de Renderización de Contenido HTML" style="--editor-height: 500px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <p :html="val"></p>
      <script>
        export default async () => {
          return {
            data: {
              val: '<span style="color:green;">Hello ofa.js Demo Code</span>',
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
