      <article class="markdown-body">
        <h1>Ciclo de vida</h1>
        <p>ofa.js componentes tienen funciones de ciclo de vida completas, que te permiten ejecutar lógica específica en diferentes etapas del componente. Estas funciones de ciclo de vida te permiten intervenir y realizar operaciones correspondientes en momentos clave como la creación, montaje, actualización y destrucción del componente.</p>
        <h2>Funciones de gancho del ciclo de vida</h2>
        <p>ofa.js proporciona los siguientes hooks del ciclo de vida principales, ordenados según el uso habitual:</p>
        <h3>attached</h3>
        <p>El hook <code>attached</code> se invoca cuando el componente se inserta en el documento, indicando que el componente ya está montado en la página. Es el hook del ciclo de vida más utilizado, generalmente se usa para realizar operaciones de inicialización que necesitan ejecutarse después de que el componente se muestra realmente en la página, evitando realizar cálculos innecesarios cuando el componente no es visible. Este hook también es muy adecuado para medir el tamaño de elementos, iniciar animaciones y otras operaciones que dependen de que el componente se haya renderizado en la página.</p>
        <ul>
          <li><strong>Momento de invocación</strong>: el componente se añade al árbol DOM</li>
          <li><strong>Uso principal</strong>: iniciar temporizadores, añadir detectores de eventos, ejecutar operaciones que requieren visibilidad</li>
        </ul>
        <h3>detached</h3>
        <p>El hook <code>detached</code> se llama cuando el componente se elimina del documento, lo que indica que el componente está a punto de ser desmontado. Este hook es adecuado para limpiar recursos, como borrar temporizadores, eliminar escuchadores de eventos, etc.</p>
        <ul>
          <li><strong>Momento de llamada</strong>: el componente es eliminado del árbol DOM</li>
          <li><strong>Uso principal</strong>: limpiar recursos, cancelar suscripciones, eliminar oyentes de eventos</li>
        </ul>
        <h3>ready</h3>
        <p>El hook <code>ready</code> se llama cuando el componente está listo, en este momento la plantilla del componente ya se ha renderizado, los elementos DOM ya se han creado, pero es posible que aún no se hayan insertado en el documento. Este hook es adecuado para realizar operaciones DOM o inicializar bibliotecas de terceros.</p>
        <ul>
          <li><strong>Momento de invocación</strong>: la plantilla del componente se ha renderizado y el DOM ha sido creado</li>
          <li><strong>Uso principal</strong>: ejecutar operaciones de inicialización que dependen del DOM</li>
        </ul>
        <h3>loaded</h3>
        <p>El gancho <code>loaded</code> se dispara cuando el componente, todos sus componentes secundarios y los recursos asíncronos se han cargado completamente. En este punto, se puede eliminar de forma segura el estado de carga o ejecutar operaciones posteriores que dependan del árbol de componentes completo. Si no hay dependencias, se llama después del gancho <code>ready</code>.</p>
        <ul>
          <li><strong>Momento de invocación</strong>: cuando el componente y sus componentes hijos se han cargado completamente</li>
          <li><strong>Propósito principal</strong>: ejecutar operaciones que dependen del árbol de componentes completo</li>
        </ul>
        <h2>Orden de ejecución del ciclo de vida</h2>
        <p>Los hooks del ciclo de vida del componente se ejecutan en el siguiente orden:</p>
        <ol start="2">
          <li><code>ready</code> - El componente está listo (el DOM ha sido creado)</li>
          <li><code>attached</code> - El componente está montado en el DOM</li>
          <li><code>loaded</code> - El componente está completamente cargado</li>
        </ol>
        <p>Cuando el componente se elimina del DOM, se invoca el gancho <code>detached</code>.</p>
        <h2>Ejemplo de uso</h2>
        <p>El siguiente ejemplo demuestra cómo usar ganchos de ciclo de vida en un componente:</p>
        <o-playground name="Ejemplo de ciclo de vida" style="--editor-height: 700px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
        .counter {
          margin: 10px 0;
        }
        button {
          margin-right: 10px;
          padding: 5px 10px;
        }
      </style>
      <h3>Demostración del ciclo de vida</h3>
      <div class="counter">Contador: {{count}}</div>
      <button on:click="count += 10">Aumentar 10</button>
      <button on:click="removeSelf">Eliminar componente</button>
      <div class="log">
        <h4>Registro del ciclo de vida:</h4>
        <ul>
          <o-fill :value="logs">
            <li>{{$data}}</li>
          </o-fill>
        </ul>
      </div>
      <script>
        export default async () => {
          return {
            data: {
              count: 0,
              logs: [],
            },
            proto: {
              removeSelf() {
                this.remove(); // Eliminarse del DOM para activar el hook detached
              },
              addLog(message) {
                this.logs = [...this.logs, `${new Date().toLocaleTimeString()} - ${message}`];
              }
            },
            ready() {
              this.addLog("ready: Componente listo, DOM creado");
              console.log("Componente listo");
            },
            attached() {
              this.addLog("attached: Componente montado en el DOM");
              this._timer = setInterval(() => {
                this.count++;
              }, 1000);
              console.log("Componente montado");
            },
            detached() {
              this.addLog("detached: Componente eliminado del DOM");
              // Limpiar el temporizador para evitar fugas de memoria
              clearInterval(this._timer); 
              console.log("Componente desmontado");
            },
            loaded() {
              this.addLog("loaded: Componente completamente cargado");
              console.log("Componente completamente cargado");
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>En este ejemplo, puedes observar el orden y el momento de ejecución de los diferentes hooks del ciclo de vida. Cuando haces clic en el botón &quot;移除组件&quot;, puedes ver que se activa el hook <code>detached</code>.</p>
        <h2>Escenarios de aplicación reales</h2>
        <h3>Operación de inicialización</h3>
        <p>En el hook <code>ready</code> realizar la inicialización de datos:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">async</span> () =&gt; {
  <span class="hljs-keyword">return</span> {
    <span class="hljs-attr">data</span>: {
      <span class="hljs-attr">items</span>: []
    },
    <span class="hljs-title function_">ready</span>(<span class="hljs-params"></span>) {
      <span class="hljs-comment">// Operaciones del DOM</span>
      <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">initDomElements</span>();
    }
  };
};</code></pre>
        <h3>Gestión de recursos</h3>
        <p>Inicia el temporizador en el gancho <code>attached</code> y limpia los recursos en el gancho <code>detached</code>:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">async</span> () =&gt; {
  <span class="hljs-keyword">return</span> {
    <span class="hljs-attr">data</span>: {
      <span class="hljs-attr">timer</span>: <span class="hljs-literal">null</span>
    },
    <span class="hljs-title function_">attached</span>(<span class="hljs-params"></span>) {
      <span class="hljs-comment">// Iniciar temporizador</span>
      <span class="hljs-variable language_">this</span>.<span class="hljs-property">timer</span> = <span class="hljs-built_in">setInterval</span>(<span class="hljs-function">() =&gt;</span> {
        <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&#x27;Tarea programada ejecutada&#x27;</span>);
      }, <span class="hljs-number">1000</span>);
    },
    <span class="hljs-title function_">detached</span>(<span class="hljs-params"></span>) {
      <span class="hljs-comment">// Limpiar temporizador</span>
      <span class="hljs-keyword">if</span>(<span class="hljs-variable language_">this</span>.<span class="hljs-property">timer</span>) {
        <span class="hljs-built_in">clearInterval</span>(<span class="hljs-variable language_">this</span>.<span class="hljs-property">timer</span>);
        <span class="hljs-variable language_">this</span>.<span class="hljs-property">timer</span> = <span class="hljs-literal">null</span>;
      }
    }
  };
};</code></pre>
        <p>Las funciones de ciclo de vida (lifecycle hooks) son un concepto importante en el desarrollo de componentes de ofa.js. Usarlas correctamente puede ayudarte a gestionar mejor el estado y los recursos de los componentes, mejorando el rendimiento de la aplicación.</p>
      </article>

              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
