        <h1>Componentes implícitos</h1>
        <p>ofa.js incluye internamente dos tipos de componentes no explícitos:</p>
        <ul>
          <li>Componentes de renderizado condicional: <code>x-if</code>, <code>x-else-if</code>, <code>x-else</code></li>
          <li>Componente de relleno: <code>x-fill</code></li>
        </ul>
        <p>Estos dos componentes tienen la misma funcionalidad que los componentes <code>o-if</code> y <code>o-fill</code>, pero ellos mismos no se renderizan realmente en el DOM, sino que renderizan sus elementos internos directamente en la zona correspondiente.</p>
        <p>Por ejemplo:</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
    <span class="hljs-selector-class">.container</span> &gt; <span class="hljs-selector-class">.item</span>{
        <span class="hljs-attribute">color</span>:red;
    }
</span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">div</span> <span class="hljs-attr">class</span>=<span class="hljs-string">"container"</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">o-if</span> <span class="hljs-attr">:value</span>=<span class="hljs-string">"true"</span>&gt;</span>
        <span class="hljs-comment">&lt;!-- El estilo no es rojo porque el componente o-if está presente en el DOM --&gt;</span>
        <span class="hljs-tag">&lt;<span class="hljs-name">div</span> <span class="hljs-attr">class</span>=<span class="hljs-string">"item"</span>&gt;</span>1<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span>
    <span class="hljs-tag">&lt;/<span class="hljs-name">o-if</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">x-if</span> <span class="hljs-attr">:value</span>=<span class="hljs-string">"true"</span>&gt;</span>
        <span class="hljs-comment">&lt;!-- El estilo es rojo porque el componente x-if no se renderiza en el DOM --&gt;</span>
        <span class="hljs-tag">&lt;<span class="hljs-name">div</span> <span class="hljs-attr">class</span>=<span class="hljs-string">"item"</span>&gt;</span>2<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span>
    <span class="hljs-tag">&lt;/<span class="hljs-name">x-if</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span></code></pre><o-playground name="Componente no explícito" style="--editor-height: 500px">

        <h2>Componente de renderizado condicional x-if</h2>
        <p><code>x-if</code> tiene exactamente la misma funcionalidad que <a href="./conditional-rendering.html" olink="">o-if</a>, se utiliza para decidir si se renderiza contenido en función del valor de verdad de una expresión condicional. La diferencia es que <code>x-if</code> en sí mismo no existe como elemento DOM, y su contenido interno se renderiza directamente en el contenedor padre.</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">div</span> <span class="hljs-attr">class</span>=<span class="hljs-string">"container"</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">x-if</span> <span class="hljs-attr">:value</span>=<span class="hljs-string">"isLoggedIn"</span>&gt;</span>
        <span class="hljs-tag">&lt;<span class="hljs-name">p</span>&gt;</span>¡Bienvenido de nuevo, usuario!<span class="hljs-tag">&lt;/<span class="hljs-name">p</span>&gt;</span>
    <span class="hljs-tag">&lt;/<span class="hljs-name">x-if</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span></code></pre>
        <p><code>x-if</code> también se puede usar con <code>x-else-if</code> y <code>x-else</code>:</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">div</span> <span class="hljs-attr">class</span>=<span class="hljs-string">"container"</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">x-if</span> <span class="hljs-attr">:value</span>=<span class="hljs-string">"role === 'admin'"</span>&gt;</span>
        <span class="hljs-tag">&lt;<span class="hljs-name">p</span>&gt;</span>Panel de administración<span class="hljs-tag">&lt;/<span class="hljs-name">p</span>&gt;</span>
    <span class="hljs-tag">&lt;/<span class="hljs-name">x-if</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">x-else-if</span> <span class="hljs-attr">:value</span>=<span class="hljs-string">"role === 'user'"</span>&gt;</span>
        <span class="hljs-tag">&lt;<span class="hljs-name">p</span>&gt;</span>Centro de usuario<span class="hljs-tag">&lt;/<span class="hljs-name">p</span>&gt;</span>
    <span class="hljs-tag">&lt;/<span class="hljs-name">x-else-if</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">x-else</span>&gt;</span>
        <span class="hljs-tag">&lt;<span class="hljs-name">p</span>&gt;</span>Inicie sesión<span class="hljs-tag">&lt;/<span class="hljs-name">p</span>&gt;</span>
    <span class="hljs-tag">&lt;/<span class="hljs-name">x-else</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span></code></pre>
        <h2>x-fill Componente de relleno</h2>
        <p><code>x-fill</code> tiene exactamente la misma funcionalidad que <a href="./list-rendering.html" olink="">o-fill</a>, se utiliza para renderizar datos de un array como múltiples elementos DOM. Al igual que <code>x-if</code>, <code>x-fill</code> no se renderiza en el DOM, sino que su plantilla interna se renderiza directamente en el contenedor padre.</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">ul</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">x-fill</span> <span class="hljs-attr">:value</span>=<span class="hljs-string">"items"</span>&gt;</span>
        <span class="hljs-tag">&lt;<span class="hljs-name">li</span>&gt;</span>{{$data.name}}<span class="hljs-tag">&lt;/<span class="hljs-name">li</span>&gt;</span>
    <span class="hljs-tag">&lt;/<span class="hljs-name">x-fill</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">ul</span>&gt;</span></code></pre>
        <p>Ejemplo de uso de plantillas con nombre:</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">ul</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">x-fill</span> <span class="hljs-attr">name</span>=<span class="hljs-string">"li"</span> <span class="hljs-attr">:value</span>=<span class="hljs-string">"items"</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">x-fill</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">ul</span>&gt;</span>

<span class="hljs-tag">&lt;<span class="hljs-name">template</span> <span class="hljs-attr">name</span>=<span class="hljs-string">"li"</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">li</span> <span class="hljs-attr">class:active</span>=<span class="hljs-string">"$data.active"</span>&gt;</span>
        <span class="hljs-tag">&lt;<span class="hljs-name">a</span> <span class="hljs-attr">attr:href</span>=<span class="hljs-string">"$data.href"</span>&gt;</span>{{$data.name}}<span class="hljs-tag">&lt;/<span class="hljs-name">a</span>&gt;</span>
    <span class="hljs-tag">&lt;/<span class="hljs-name">li</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">template</span>&gt;</span></code></pre>
        <h2>Notas de rendimiento</h2>
        <p>Además de las diferencias funcionales, el rendimiento de renderizado de los componentes no explícitos es <strong>mucho peor</strong> que el de los componentes explícitos (<code>o-if</code>, <code>o-fill</code>). Esto se debe a que los componentes no explícitos no se renderizan realmente en el DOM, y requieren lógica de renderizado simulada adicional para manejar la posición y actualización de los elementos internos.</p>
        <p>Además, los componentes no explícitos pueden provocar algunos errores difíciles de detectar: debido a que no ingresan realmente al DOM, las operaciones que dependen de la estructura del DOM (como la vinculación de eventos, el cálculo de estilos o las consultas de bibliotecas de terceros) pueden fallar o comportarse de manera anómala.</p>
        <p>Por lo tanto, se recomienda <strong>utilizar primero los componentes explícitos</strong> (<code>o-if</code>, <code>o-else-if</code>, <code>o-else</code>, <code>o-fill</code>) y emplear los componentes no explícitos solo en escenarios específicos.</p>
        <h2>Escenarios de uso</h2>
        <p>Aunque los componentes no explícitos tienen un rendimiento deficiente, pueden ser utilizados en los siguientes escenarios:</p>
        <ol>
          <li><strong>Evita niveles adicionales del DOM</strong>: cuando no quieres que los elementos <code>o-if</code> o <code>o-fill</code> formen parte de la estructura del DOM</li>
          <li><strong>Herencia de estilos</strong>: cuando necesitas que los elementos internos hereden directamente los estilos del contenedor padre, sin verse afectados por elementos de componentes intermedios</li>
          <li><strong>Limitaciones de selectores CSS</strong>: cuando necesitas utilizar selectores de hijo directo del padre (como <code>.container &gt; .item</code>) para controlar con precisión los estilos, pero no deseas tener elementos de envoltura adicionales</li>
        </ol>
