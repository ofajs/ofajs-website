        <h1>SSR y renderizado isomórfico</h1>
        <blockquote>
          <p>Si no sabes qué es SSR, significa que actualmente no lo necesitas. Puedes saltarte este capítulo y volver a aprenderlo cuando lo necesites en el futuro.</p>
        </blockquote>
        <h2>Renderizado isomorfo</h2>
        <p>Para mantener la experiencia fluida de CSR, un mejor reconocimiento de los bots de rastreo (SEO) y una mayor libertad en la elección del lenguaje de desarrollo del backend, ofa.js ofrece un modo único de renderizado isomórfico (Symphony Client-Server Rendering).</p>
        <blockquote>
          <p>Para conocer las definiciones específicas y diferencias de CSR / SSR / SSG, lea directamente la sección al final de este artículo.</p>
        </blockquote>
        <p>El concepto central del renderizado isomorfo es:- Renderice el contenido inicial de la página en el lado del servidor para garantizar el SEO y la velocidad de carga de la primera pantalla</p>
        <ul>
          <li>El cliente asume el enrutamiento para mantener la experiencia de usuario fluida de CSR</li>
          <li>Adecuado para cualquier entorno de servidor, logrando una representación verdaderamente isomórfica</li>
        </ul>
        <h3>Principio de implementación de renderizado isomórfico</h3>
        <p>El modo de renderización isomórfica de ofa.js se basa en el siguiente mecanismo:</p>
        <ol>
          <li>El servidor genera una página HTML completa con una estructura de ejecución universal</li>
          <li>El cliente carga el motor de ejecución CSR</li>
          <li>Identifica automáticamente el entorno de ejecución actual y decide la estrategia de renderizado</li>
        </ol>

        <p>Por lo tanto, puedes usar cualquier lenguaje de desarrollo (Go, Java, PHP, Nodejs, Python, etc.), cualquier motor de renderizado de plantillas del backend (como <code>html/template</code> de Go, Smarty/Twig/Blade de PHP, etc.), e incrustar la estructura de código de renderizado isomórfico de ofa.js en la plantilla para lograr SSR.</p>

          <li><a href="https://github.com/ofajs/ofa.js/tree/main/test/ssr-case/go" target="_blank">Caso SSR de Go</a></li>
        </ul>
        <h3>Estructura de plantilla de renderizado isomórfico</h3>

        <p><strong>Nota:</strong> El HTML devuelto por el servidor debe establecer el encabezado HTTP correcto: <code>Content-Type: text/html; charset=UTF-8</code></p>
        <p><code>scsr.mjs</code> es el motor de ejecución de renderizado isomórfico proporcionado por ofa.js, que determina automáticamente la estrategia de renderizado según el estado de ejecución de la página actual, asegurando la mejor experiencia de usuario en cualquier entorno.</p>
        <p>Del mismo modo, SSG también puede aplicar esta estructura para lograr la generación de sitios estáticos.</p>
        <h2>Diferencias entre ofa.js, SSR y otros frameworks frontend</h2>
        <p>El Symphony Client-Server Rendering (en adelante SCSR) de ofa.js también es fundamentalmente un modo SSR.</p>
        <p>En comparación con las soluciones SSR de frameworks front-end existentes como Vue, React, Angular, la mayor ventaja de ofa.js es que <strong>no necesita vincularse obligatoriamente a Node.js</strong>. Esto significa que cualquier motor de renderizado de plantillas de backend (como Smarty de PHP, Jinja2 de Python, Thymeleaf de Java, etc.) puede integrar fácilmente ofa.js para implementar SSR.</p>
        <h2>Resumen de métodos de renderización web</h2>
        <p>Las aplicaciones web modernas tienen principalmente cuatro métodos de renderizado: el renderizado tradicional basado en plantillas del lado del servidor, CSR (Client Side Rendering, renderizado del lado del cliente), SSR (Server Side Rendering, renderizado del lado del servidor) y SSG (Static Site Generation, generación de sitios estáticos). Cada método tiene sus ventajas y escenarios de aplicación adecuados.</p>
        <h3>Renderizado tradicional de motor de plantillas del lado del servidor</h3>
        <p>Entre los muchos productos web, el motor de plantillas del lado del servidor sigue siendo el método más común para la renderización de páginas. Lenguajes de backend como Go y PHP, mediante motores de plantillas integrados o de terceros (como el <code>html/template</code> de Go, Smarty/Twig/Blade de PHP, etc.), inyectan datos dinámicos en plantillas HTML, generan una página HTML completa de una sola vez y la devuelven al cliente.</p>
        <p><strong>Ventajas:</strong>- SEO amigable, carga rápida en la primera pantalla</p>
        <ul>
          <li>Control del lado del servidor, alta seguridad</li>
          <li>Requisitos de pila tecnológica bajos para el equipo, los desarrolladores de backend pueden completar el desarrollo de forma independiente</li>
        </ul>
        <p><strong>Desventajas:</strong>- La experiencia del usuario es deficiente, ya que cada interacción requiere una recarga de la página.</p>
        <ul>
          <li>La presión del servidor es alta.</li>
          <li>El acoplamiento entre el frontend y el backend es alto, lo que no favorece la división del trabajo y la colaboración.</li>
        </ul>
        <h3>CSR（renderizado del lado del cliente）</h3>
        <p>En el modo CSR, el contenido de la página se renderiza completamente mediante JavaScript del lado del navegador. La <a href="./routes.html" olink="">aplicación de página única</a> de ofa.js es un ejemplo típico de implementación de CSR. Este método proporciona una experiencia de usuario fluida, permitiendo todas las interacciones sin necesidad de cambiar de página. Las aplicaciones de página única (SPA) desarrolladas con React o Vue junto con sus bibliotecas de enrutamiento correspondientes (como React Router o Vue Router) son implementaciones típicas de CSR.</p>
        <p><strong>Ventajas:</strong>- Experiencia de usuario fluida, cambios de página sin recarga</p>
        <ul>
          <li>Fuerte capacidad de procesamiento del cliente, respuesta rápida</li>
        </ul>
        <p><strong>Desventajas:</strong>- No es favorable para el SEO, los motores de búsqueda tienen dificultades para indexar el contenido</p>
        <h3>SSR（renderizado del lado del servidor）</h3>
        <p>Manteniendo la experiencia fluida de CSR, se pasa a renderizar la página en tiempo real desde el servidor: cuando el usuario realiza una solicitud, el servidor genera instantáneamente el HTML completo y lo devuelve, logrando un verdadero renderizado del lado del servidor.</p>
        <p><strong>Ventajas:</strong>- SEO friendly, carga rápida en la primera pantalla</p>
        <ul>
          <li>Soporta contenido dinámico</li>
        </ul>
        <p><strong>Desventajas:</strong>- La presión del servidor es alta</p>
        <ul>
          <li>Normalmente se necesita un entorno Node.js como tiempo de ejecución, o al menos una capa intermedia de Node.js</li>
          <li>Todavía se necesita la activación posterior del cliente para lograr una interacción completa</li>
        </ul>
        <h3>SSG（Generación de Sitios Estáticos）</h3>
        <p>Durante la fase de construcción, todas las páginas se prerenderizan como archivos HTML estáticos, que pueden ser devueltos directamente por el servidor al usuario después del despliegue.</p>
        <p><strong>Ventajas:</strong>- Velocidad de carga inicial rápida, SEO amigable</p>
        <ul>
          <li>Baja carga del servidor, rendimiento estable</li>
          <li>Alta seguridad</li>
        </ul>
        <p><strong>Desventajas:</strong>- Dificultad para actualizar contenido dinámico</p>
        <ul>
          <li>El tiempo de construcción aumenta con la cantidad de páginas</li>
        </ul>
