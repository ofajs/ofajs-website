      <article class="markdown-body">
        <h1>Producción y Despliegue</h1>
        <p>Los proyectos desarrollados con ofa.js se pueden desplegar directamente en un servidor estático y estarán listos para usar.</p>
        <h2>Entorno de desarrollo</h2>
        <p>Puedes usar el <a href="https://core.noneos.com/?redirect=studio" target="_blank">ofa Studio</a> oficial para desarrollar, el cual ofrece la creación de proyectos y vista previa con un solo clic.</p>
        <p>También puedes construir tu propio servidor estático:</p>
        <ul>
          <li>Usar software de servidor estático como Nginx o Apache</li>
          <li>Usar el módulo <a href="https://www.npmjs.com/package/http-server" target="_blank">http-server</a> de Node.js</li>
          <li>Usar directamente el plugin de servidor estático del editor para previsualizar</li>
        </ul>
        <h2>Entorno de Producción</h2>
        <h3>Exportar proyecto</h3>
        <p>Si estás usando <a href="https://core.noneos.com/?redirect=studio" target="_blank">ofa Studio</a> para construir proyectos, simplemente utiliza la función de exportación integrada en la herramienta.</p>
        <p>Si es un proyecto construido manualmente, puedes implementar directamente la carpeta del proyecto en un servidor estático, manteniendo el mismo modo que en el entorno de desarrollo.</p>
        <h3>Compresión y ofuscación</h3>
        <p>En un entorno de producción, normalmente se necesitan herramientas de compresión y ofuscación para reducir el tamaño de los archivos y mejorar la velocidad de carga. Puedes usar <a href="https://terser.org/docs/cli-usage/" target="_blank">Terser CLI</a> para comprimir y ofuscar.</p>
        <p>Si no deseas usar herramientas de línea de comandos, puedes usar <a href="https://builder.ofajs.com/" target="_blank">ofa build</a> para comprimir y ofuscar archivos en línea. Esta herramienta está actualmente en versión beta y se integrará en ofa Studio en el futuro.</p>
      </article>
