        <h1>Vinculación de eventos</h1>
        <p>En ofa.js, el enlace de eventos es un mecanismo importante para lograr la interacción del usuario. Puedes vincular manejadores de eventos a los elementos de varias maneras para responder a las acciones del usuario.</p>
        <h2>Enlace de eventos desde proto</h2>
        <p>Esta es la forma recomendada de enlace de eventos, adecuada para lógica de manejo de eventos compleja. Definir las funciones de manejo de eventos en el objeto <code>proto</code> permite organizar mejor la lógica del código y facilita el mantenimiento y la reutilización.</p>
        <o-playground name="Enlazar eventos desde proto" style="--editor-height: 500px">
          <code>
    <template page="">
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <button on:click="clickMe">Click Me - {{count}}</button>
      <script>
        export default async () => {
          return {
            data: {
              count: 1,
            },
            proto:{
              clickMe(){
                this.count++;
              }
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Ejecutar función directamente</h2>
        <p>Para operaciones simples (como incrementar un contador, cambiar un estado, etc.), se pueden escribir expresiones breves directamente en los atributos de evento. Este método es conciso y claro, adecuado para manejar lógica simple.</p>
        <o-playground name="Ejecutar función directamente" style="--editor-height: 500px">
          <code>
    <template page="">
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <button on:click="count++">Click Me - {{count}}</button>
      <script>
        export default async () => {
          return {
            data: {
              count: 1,
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Tipos de eventos compatibles</h2>
        <p>ofa.js soporta todos los eventos DOM estándar, incluyendo pero no limitado a:</p>
        <ul>
          <li>Eventos de ratón: <code>click</code>, <code>dblclick</code>, <code>mousedown</code>, <code>mouseup</code>, <code>mouseover</code>, <code>mouseout</code>, etc.</li>
          <li>Eventos de teclado: <code>keydown</code>, <code>keyup</code>, <code>keypress</code>, etc.</li>
          <li>Eventos de formulario: <code>submit</code>, <code>change</code>, <code>input</code>, <code>focus</code>, <code>blur</code>, etc.</li>
          <li>Eventos táctiles: <code>touchstart</code>, <code>touchmove</code>, <code>touchend</code>, etc.</li>
        </ul>
        <p>ofa.js admite los mismos tipos de eventos que los eventos DOM nativos; para más detalles, consulte la <a href="https://developer.mozilla.org/es/docs/Web/API/Event" target="_blank">documentación de eventos de MDN</a>.</p>
        <h2>Pasar parámetros al manejador de eventos</h2>
        <p>También puedes pasar parámetros al manejador de eventos:</p>
        <o-playground name="Pasar parámetros al manejador de eventos" style="--editor-height: 600px">
          <code>
    <template page="">
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <button on:click="addNumber(5)">Add 5 - Current: {{count}}</button>
      <button on:click="addNumber(10)">Add 10 - Current: {{count}}</button>
      <script>
        export default async () => {
          return {
            data: {
              count: 0,
            },
            proto: {
              addNumber(num) {
                this.count += num;
              }
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Acceder al objeto de evento</h2>
        <p>En los manejadores de eventos, puedes acceder al objeto de evento nativo a través del parámetro <code>event</code>:</p>
        <o-playground name="Acceder al objeto de evento" style="--editor-height: 700px">
          <code>
    <template page="">
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
        .container {
          width: 300px;
          height: 200px;
          background-color: #f0f0f0;
          display: flex;
          align-items: center;
          justify-content: center;
        }
      </style>
      <div class="container" on:click="handleClick">Haga clic en cualquier lugar para ver las coordenadas</div>
      <p>X: {{x}}, Y: {{y}}</p>
      <script>
        export default async () => {
          return {
            data: {
              x: 0,
              y: 0,
            },
            proto: {
              handleClick(event) {
                this.x = event.clientX;
                this.y = event.clientY;
              }
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>También puedes usar el parámetro <code>$event</code> en las expresiones para acceder al objeto de evento nativo, por ejemplo, para obtener las coordenadas del clic del mouse:</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">div</span> <span class="hljs-attr">class</span>=<span class="hljs-string">"container"</span> <span class="hljs-attr">on:click</span>=<span class="hljs-string">"handleClick($event)"</span>&gt;</span>Haga clic en cualquier lugar para ver las coordenadas<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span></code></pre>
        <h2>Escuchar eventos personalizados</h2>
        <p>Además de escuchar eventos nativos del DOM, también puedes escuchar fácilmente eventos personalizados emitidos por componentes:</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">custom-comp</span> <span class="hljs-attr">on:custom-event</span>=<span class="hljs-string">"handleCustomEvent"</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">custom-comp</span>&gt;</span></code></pre>
        <p>Para profundizar en los eventos personalizados, consulte el capítulo <a href="custom-events.html" olink="">Eventos personalizados</a>. Se recomienda seguir el tutorial en orden, ya que los contenidos posteriores se desarrollarán de forma natural; sin embargo, también puede consultarlo en cualquier momento para adelantarse.</p>
      </article>
