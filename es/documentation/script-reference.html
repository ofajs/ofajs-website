        <h1>Introducción de scripts</h1>
        <p>ofa.js admite la incorporación directa mediante la etiqueta script. Solo añade el siguiente código en la sección <code>&lt;head&gt;</code> o <code>&lt;body&gt;</code> de tu archivo HTML:</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">script</span> <span class="hljs-attr">src</span>=<span class="hljs-string">&quot;https://cdn.jsdelivr.net/gh/ofajs/ofa.js/dist/ofa.min.mjs&quot;</span> <span class="hljs-attr">type</span>=<span class="hljs-string">&quot;module&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span></code></pre>
        <h2>Uso básico</h2>
        <p>Después de introducir el script, ofa.js creará una variable <code>$</code> en el ámbito global, y todas las funciones principales se proporcionarán a través de este objeto. Puedes acceder a varios métodos y propiedades de ofa.js a través de este objeto. Los tutoriales posteriores detallarán su uso específico.</p>
        <h2>Modo de depuración</h2>
        <p>Durante el desarrollo, puede activar el modo de depuración añadiendo el parámetro <code>#debug</code> al final de la URL del script:</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">script</span> <span class="hljs-attr">src</span>=<span class="hljs-string">&quot;https://cdn.jsdelivr.net/gh/ofajs/ofa.js/dist/ofa.min.mjs#debug&quot;</span> <span class="hljs-attr">type</span>=<span class="hljs-string">&quot;module&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span></code></pre>
        <p>El modo de depuración habilita la función de mapas de origen (source map), permitiéndole ver y depurar directamente el código fuente original de los archivos en las herramientas de desarrollo del navegador, lo que mejora significativamente la eficiencia del desarrollo.</p>
        <h2>Módulo ESM</h2>
        <p>ofa.js también admite la importación mediante módulos ESM. Puede usar la sentencia <code>import</code> en su proyecto para importar ofa.js:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">import</span> <span class="hljs-string">&#x27;https://cdn.jsdelivr.net/gh/ofajs/ofa.js/dist/ofa.min.mjs&#x27;</span>;</code></pre>
        <p>Al usar módulos ESM, puede usar directamente la variable <code>$</code> en el código, sin necesidad de acceder a través del ámbito global.</p>
      </article>

      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
