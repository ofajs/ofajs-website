        <h1>Uso de las habilidades de IA de ofa.js en el proyecto</h1>
        <p>Debido a que ofa.js aún no es un marco ampliamente conocido, los modelos de IA convencionales no cuentan todavía con la capacidad de usar ofa.js directamente. Por ello, hemos preparado cuidadosamente un paquete de habilidades especializado para ayudar a la IA a aprender y consultar el método de uso de ofa.js.</p>
        <h2>Cómo utilizar</h2>
        <p>En las herramientas de IA compatibles con habilidades, seleccione la dirección de habilidad correspondiente según el idioma del modelo de IA que utilice:</p>
        <p><strong>Nota:</strong> Dado que la documentación de ofa.js se escribió originalmente en chino, el contenido del paquete de habilidades en la versión china es más completo y preciso. Si tiene problemas al usar la versión en inglés, le recomendamos que pruebe la versión en chino.</p>
        <h3>Modelo chino</h3>
        <p>Si está utilizando un modelo de IA en chino, utilice la siguiente dirección:</p>
        <pre><code class="hljs">https:<span class="hljs-regexp">//</span>raw.githubusercontent.com<span class="hljs-regexp">/ofajs/</span>ofa.js<span class="hljs-regexp">/main/</span>skills/ofajs-docs.zip</code></pre>
        <p>Los modelos de IA chinos más comunes incluyen: DeepSeek, Kimi, GLM, MiniMax, Qwen, etc.</p>
        <h3>Modelo en inglés</h3>
        <p>Si utiliza modelos de IA en inglés, utilice la siguiente dirección:</p>
        <pre><code class="hljs">https:<span class="hljs-regexp">//</span>raw.githubusercontent.com<span class="hljs-regexp">/ofajs/</span>ofa.js<span class="hljs-regexp">/main/</span>skills/ofajs-docs-en.zip</code></pre>
        <p>A través de este paquete de habilidades, la IA puede aprender y desarrollar de manera eficiente componentes o módulos de página de ofa.js, ayudando a los desarrolladores a utilizar más convenientemente las herramientas de IA para el desarrollo de proyectos de ofa.js, mejorando la eficiencia del desarrollo.</p>
        <h2>Obtener más ayuda</h2>
        <p>Si las habilidades de IA no resuelven su problema, le invitamos a enviar su pregunta a nuestro foro de discusión:</p>
        <p><a href="https://github.com/ofajs/discussion/discussions" target="_blank">https://github.com/ofajs/discussion/discussions</a></p>
        <p>Le responderemos lo antes posible.</p>
