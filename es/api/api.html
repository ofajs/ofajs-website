<body>
  <o-app src="../../js/app-config.js">
    <template page>
      <link rel="stylesheet" href="../../css/github-markdown.css" />
      <link rel="stylesheet" href="../../css/hljs.css" />
      <l-m src="../../comps/center-block.html"></l-m>
      <l-m src="../../comps/article-code.html"></l-m>
      <l-m src="https://playground.ofajs.com/comps/o-playground/o-playground.html"></l-m>
      <style>
        :host {
          display: block;
          height: 100%;
          box-sizing: border-box;
          overflow: auto;
        }
      </style>
      <link rel="stylesheet" href="../../css/page.css" />
      <l-m src="./_comps/api-container.html"></l-m>
      <style>
        article a {
          color: var(--md-sys-color-primary);
          text-decoration: none;
          align-items: center !important;
        }
      </style>
      <article>
        <h1>Documentación de la API</h1>
        <p> ofa.js no solo admite sintaxis de plantilla, sino que también proporciona una rica API para manipular directamente el DOM. Al igual que <a href="https://jquery.com/" target="_blank">jQuery</a>, puedes utilizar la sintaxis concisa de ofa.js en lugar del prolijo JavaScript nativo para realizar operaciones DOM fácilmente. </p>
        <p> En las funciones del ciclo de vida de componentes o módulos de página y en los métodos personalizados, puedes invocar en cualquier momento las API proporcionadas por ofa.js para manipular elementos DOM de manera flexible y eficiente. </p>
        <api-container>
          <api-list>
            <h3>Relacionado con instancias</h3>
            <api-item>
              <a href="./instance/dollar.html" olink="">$(selector)</a>
              <p>Función central en ofa.js, utilizada para obtener y manipular instancias de elementos DOM</p>
            </api-item>
            <api-item>
              <a href="./instance/all.html" olink="">all</a>
              <p>Obtiene todas las instancias de elementos secundarios del elemento actual</p>
            </api-item>
            <api-item>
              <a href="./instance/shadow.html" olink="">shadow</a>
              <p>Obtiene el shadow root del elemento actual</p>
            </api-item>
            <api-item>
              <a href="./instance/prev.html" olink="">prev</a>
              <p>Obtiene el elemento hermano anterior del elemento actual</p>
            </api-item>
            <api-item>
              <a href="./instance/prevs.html" olink="">prevs</a>
              <p>Obtiene todos los elementos hermanos anteriores del elemento actual</p>
            </api-item>
            <api-item>
              <a href="./instance/next.html" olink="">next</a>
              <p>Obtiene el siguiente elemento hermano del elemento actual</p>
            </api-item>
            <api-item>
              <a href="./instance/nexts.html" olink="">nexts</a>
              <p>Obtiene todos los elementos hermanos posteriores del elemento actual</p>
            </api-item>
            <api-item>
              <a href="./instance/siblings.html" olink="">siblings</a>
              <p>Obtiene todos los elementos hermanos del elemento actual</p>
            </api-item>
            <api-item>
              <a href="./instance/parent.html" olink="">parent</a>
              <p>Obtiene el elemento padre del elemento actual</p>
            </api-item>
            <api-item>
              <a href="./instance/parents.html" olink="">parents</a>
              <p>Obtiene todos los elementos ancestros del elemento actual</p>
            </api-item>
            <api-item>
              <a href="./instance/clone.html" olink="">clone</a>
              <p>Copia el elemento actual y sus elementos secundarios</p>
            </api-item>
            <api-item>
              <a href="./instance/ele.html" olink="">ele</a>
              <p>Obtiene la instancia de elemento secundario del elemento actual</p>
            </api-item>
            <api-item>
              <a href="./instance/root.html" olink="">root</a>
              <p>Obtiene la instancia raíz a la que pertenece el elemento actual</p>
            </api-item>
            <api-item>
              <a href="./instance/children.html" olink="">Elementos secundarios</a>
              <p>Obtiene todos los elementos secundarios del elemento actual</p>
            </api-item>
            <api-item>
              <a href="./instance/host.html" olink="">host</a>
              <p>Obtiene el elemento host del web component al que pertenece el elemento actual</p>
            </api-item>
            <api-item>
              <a href="./instance/app.html" olink="">app</a>
              <p>Obtiene la instancia del componente o-app al que pertenece el elemento actual</p>
            </api-item>
          </api-list>
          <api-list>
            <h3>Operaciones de nodos</h3>
            <api-item>
              <a href="./operation/array-like.html" olink="">push</a>
              <p>Añade elementos secundarios al elemento actual</p>
            </api-item>
            <api-item>
              <a href="./operation/array-like.html?L=11" olink="">pop</a>
              <p>Elimina el último elemento secundario del elemento actual</p>
            </api-item>
            <api-item>
              <a href="./operation/array-like.html?L=14" olink="">shift</a>
              <p>Elimina el primer elemento secundario del elemento actual</p>
            </api-item>
            <api-item>
              <a href="./operation/array-like.html?L=8" olink="">unshift</a>
              <p>Añade el primer elemento secundario al elemento actual</p>
            </api-item>
            <api-item>
              <a href="./operation/array-like.html?L=17" olink="">splice</a>
              <p>Añade o elimina elementos secundarios del elemento actual</p>
            </api-item>
            <api-item>
              <a href="./operation/before.html" olink="">before</a>
              <p>Añade elementos secundarios antes del elemento actual</p>
            </api-item>
            <api-item>
              <a href="./operation/after.html" olink="">after</a>
              <p>Añade elementos secundarios después del elemento actual</p>
            </api-item>
            <api-item>
              <a href="./operation/remove.html" olink="">remove</a>
              <p>Elimina el elemento actual</p>
            </api-item>
            <api-item>
              <a href="./operation/wrap.html" olink="">wrap</a>
              <p>Envuelve el elemento actual dentro de un elemento especificado</p>
            </api-item>
            <api-item>
              <a href="./operation/unwrap.html" olink="">unwrap</a>
              <p>Elimina el elemento padre que envuelve al elemento actual</p>
            </api-item>
          </api-list>
          <api-list>
            <h3>Operaciones de atributos</h3>
            <api-item>
              <a href="./props/text.html" olink="">text</a>
              <p>Obtiene o establece el contenido de texto del elemento</p>
            </api-item>
            <api-item>
              <a href="./props/html.html" olink="">html</a>
              <p>Obtiene o establece el contenido HTML del elemento</p>
            </api-item>
            <api-item>
              <a href="./props/attr.html" olink="">attr</a>
              <p>Obtiene o establece los atributos del elemento</p>
            </api-item>
            <api-item>
              <a href="./props/css.html" olink="">css</a>
              <p>Obtiene o establece los estilos del elemento</p>
            </api-item>
            <api-item>
              <a href="./props/style.html" olink="">style</a>
              <p>Obtiene el objeto style del elemento</p>
            </api-item>
            <api-item>
              <a href="./props/class-list.html" olink="">classList</a>
              <p>Obtiene la lista de clases del elemento</p>
            </api-item>
            <api-item>
              <a href="./props/data.html" olink="">data</a>
              <p>Obtiene o establece los atributos data del elemento</p>
            </api-item>
          </api-list>
          <api-list>
            <h3>Relacionado con eventos</h3>
            <api-item>
              <a href="./event/on.html" olink="">on</a>
              <p>Añade un listener de eventos al elemento</p>
            </api-item>
            <api-item>
              <a href="./event/one.html" olink="">one</a>
              <p>Añade un listener de eventos que se ejecuta solo una vez al elemento</p>
            </api-item>
            <api-item>
              <a href="./event/emit.html" olink="">emit</a>
              <p>Dispara un evento personalizado del elemento</p>
            </api-item>
            <api-item>
              <a href="./event/off.html" olink="">off</a>
              <p>Elimina el listener de eventos del elemento</p>
            </api-item>
          </api-list>
          <api-list>
            <h3>Otros</h3>
            <api-item>
              <a href="./others/app.html" olink="">Componente o-app</a>
              <p>Componente raíz de la aplicación ofa.js, utilizado para gestionar el estado y el enrutamiento de la aplicación</p>
            </api-item>
            <api-item>
              <a href="./others/page.html" olink="">Componente o-page</a>
              <p>Componente de página de ofa.js, utilizado para crear páginas de aplicación de una sola página</p>
            </api-item>
            <api-item>
              <a href="./others/form-data.html" olink="">formData</a>
              <p>Obtiene los datos del formulario</p>
            </api-item>
            <api-item>
              <a href="./others/tag.html" olink="">tag</a>
              <p>Obtiene el nombre de la etiqueta del elemento</p>
            </api-item>
            <api-item>
              <a href="./others/index.html" olink="">index</a>
              <p>Obtiene el índice del elemento en su elemento padre</p>
            </api-item>
            <api-item>
              <a href="./others/is.html" olink="">is</a>
              <p>Determina si el elemento coincide con un selector especificado</p>
            </api-item>
            <api-item>
              <a href="./others/refresh.html" olink="">refresh</a>
              <p>Actualiza el componente o página actual</p>
            </api-item>
            <api-item>
              <a href="./others/path.html" olink="">PATH</a>
              <p>Obtiene la ruta de la página actual</p>
            </api-item>
            <api-item>
              <a href="./others/extend.html" olink="">extend</a>
              <p>Extiende la funcionalidad de ofa.js</p>
            </api-item>
            <api-item>
              <a href="./others/version.html" olink="">version</a>
              <p>Obtiene el número de versión de ofa.js</p>
            </api-item>
            <api-item>
              <a href="./others/stanz.html" olink="">Características de datos de instancia</a>
              <p>Stanz es la característica de datos reactivos de ofa.js, que soporta la actualización automática de datos</p>
            </api-item>
          </api-list>
        </api-container>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
  </o-app>
  <o-root-provider name="pui" theme="dark"></o-root-provider>
</body>

</html>
