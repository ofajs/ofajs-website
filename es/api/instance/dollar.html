      <article class="markdown-body">
        <h1>$</h1>
        <p><code>$</code> es la función central en ofa.js, utilizada para obtener y manipular instancias de elementos del DOM. A continuación se detallan las principales funcionalidades de <code>$</code>:</p>
        <h2>Obtener instancia de elemento</h2>
        <p>Mediante el método <code>$</code>, puedes obtener la primera instancia de elemento en la página que coincida con un <a href="https://developer.mozilla.org/zh-CN/docs/Web/CSS/Reference/Selectors/Selector_list" target="_blank">selector CSS</a> y realizar operaciones sobre él. Aquí tienes un ejemplo:</p>
        <o-playground name="$ - 获取元素">
          <code path="demo.html">
    <template>
      <div id="target1">target 1 text</div>
      <script>
        setTimeout(()=>{
          \$("#target1").text = 'change target 1';
        },500);
      </script>
    </template>
  </code>
        </o-playground>
        <p>En el ejemplo anterior, utilizamos el símbolo <code>$</code> para seleccionar la instancia del elemento con <code>id</code> "target1", y modificamos su contenido de texto estableciendo la propiedad <code>text</code>.</p>
        <h2>Buscar instancias de elementos secundarios</h2>
        <p>La instancia también tiene el método <code>$</code>, que puede obtener la primera instancia de elemento secundario que cumpla con las condiciones a través del método <code>$</code> en la instancia.</p>
        <o-playground name="$ - Buscar elementos hijos">
          <code path="demo.html">
    <template>
      <div id="target1">
        <h3>target</h3>
        <p>I am target1</p>
      </div>
      <script>
        const tar = $("#target1");
        tar.$('h3').text = 'change target title';
      </script>
    </template>
  </code>
        </o-playground>
        <p>No insertes directamente la instancia de un elemento obtenida en otro lugar, ya que esta operación afectará al elemento original. Si necesitas crear una copia, puedes utilizar el método <a href="./clone.html" olink="">clone</a>.</p>
        <o-playground name="$ - 实例特性" style="--editor-height: 360px">
          <code path="demo.html">
    <template>
      <div id="pos1" style="border:red solid 1px;">
        <h3>position 1</h3>
        <p id="target1" style="color:green">I am target1</p>
      </div>
      <div id="pos2" style="border:blue solid 1px;margin:8px;">
        <h3>position 2</h3>
      </div>
      <script>
        setTimeout(()=>{
          const tar = $("#target1");
          \$("#pos2").push(tar);
        },500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Obtener elementos secundarios dentro de nodos sombra</h2>
        <p>Puedes obtener la instancia a través del atributo <a href="./shadow.html" olink="">shadow</a> y luego obtener el elemento deseado mediante el método <code>$</code>:</p>
        <pre><code class="hljs language-javascript">$(<span class="hljs-string">'my-component'</span>).<span class="hljs-property">shadow</span>.$(<span class="hljs-string">"selector"</span>).<span class="hljs-title function_">method</span>(xxx)</code></pre>
        <h2>Instanciación directa de elementos</h2>
        <p>Puedes inicializar directamente elementos nativos como instancias de objeto <code>$</code> de la siguiente manera:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> ele = <span class="hljs-variable language_">document</span>.<span class="hljs-title function_">createElement</span>(<span class="hljs-string">'div'</span>);
<span class="hljs-keyword">const</span> $ele = $(ele);</code></pre>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> ele = <span class="hljs-variable language_">document</span>.<span class="hljs-title function_">querySelector</span>(<span class="hljs-string">'#target'</span>);
<span class="hljs-keyword">const</span> $ele = $(ele);</code></pre>
        <p>De esta manera, puedes convertir convenientemente los elementos HTML existentes en instancias de <code>$</code> para operar y procesar con las funciones que proporciona <code>$</code>.</p>
        <h2>Generar instancias de elementos</h2>
        <p>Además de <code>$</code> para obtener instancias de elementos existentes, también se puede utilizar para crear nuevas instancias de elementos y agregarlas a la página.</p>
        <h3>Generación a través de cadenas de texto</h3>
        <p>Puedes usar la función <code>$</code> para crear nuevas instancias de elementos a partir de una cadena, de la siguiente manera:</p>
        <o-playground name="$ - Generación de cadenas" style="--editor-height: 260px">
          <code path="demo.html">
    <template>
      <div id="target1">
        <b>target1:</b>
      </div>
      <script>
        const newEl = $(`<div style="color:red">añadir texto target 1</div>`);
        \$('#target1').push(newEl);
      </script>
    </template>
  </code>
        </o-playground>
        <p>En este ejemplo, utilizamos la función <code>$</code> para crear una nueva instancia de elemento con los estilos y el contenido de texto especificados, y la añadimos dentro de la instancia de elemento existente con <code>id</code> "target1".</p>
        <h3>Generación a través de objetos</h3>
        <p>También puedes usar la función <code>$</code> para generar nuevas instancias de elementos a través de objetos, como se muestra a continuación:</p>
        <o-playground name="$ - Generación de objetos" style="--editor-height: 360px">
          <code path="demo.html">
    <template>
      <div id="target1">
        <b>target1:</b>
      </div>
      <script>
        const newEl = $({
          tag: "div",
          text: "add target 1 text",
          css: {
            color: "red"
          }
        });
        \$('#target1').push(newEl);
      </script>
    </template>
  </code>
        </o-playground>
        <p>En este ejemplo, usamos la función <code>$</code> para definir una nueva instancia de elemento mediante un objeto, incluyendo el tipo de etiqueta, el contenido de texto y los atributos de estilo, y la agregamos a un elemento existente con id "target1".</p>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
