<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <script src="https://cdn.jsdelivr.net/gh/kirakiray/ofa.js@4.6.20/dist/ofa.mjs#debug" type="module"></script>
  <script src="https://cdn.jsdelivr.net/gh/kirakiray/ofa.js@4.6.20/libs/scsr/dist/scsr.min.mjs" type="module"></script>
  <link rel="icon" href="../../../img/logo.svg" />
  <link rel="stylesheet" href="../../../css/palette.css" pui-colors />
  <link rel="stylesheet" href="../../../css/theme.css" />
  <link rel="stylesheet" href="../../../css/github-markdown.css" />
  <link rel="stylesheet" href="../../../css/hljs.css" />
  <style>
    html,
    body {
      height: 100%;
      padding: 0;
      margin: 0;
      overflow: hidden;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        Segoe UI,

<body>
  <o-app src="../../../js/app-config.js">
    <template page>
      <link rel="stylesheet" href="../../../css/github-markdown.css" />
      <link rel="stylesheet" href="../../../css/hljs.css" />
      <l-m src="../../../comps/center-block.html"></l-m>
      <l-m src="../../../comps/article-code.html"></l-m>
      <l-m src="https://playground.ofajs.com/comps/o-playground/o-playground.html"></l-m>
      <style>
        :host {
          display: block;
          height: 100%;
          box-sizing: border-box;
          overflow: auto;
        }
      </style>
      <link rel="stylesheet" href="../../../css/page.css" />
      <article class="markdown-body">
        <h1>host</h1>
        <p>Usando la propiedad <code>host</code>, puedes obtener la instancia del componente host del elemento. Esto es muy útil para acceder a los datos y métodos de su componente host desde dentro del componente.</p>
        <p>A continuación se muestra un ejemplo que demuestra cómo utilizar el atributo <code>host</code> para obtener la instancia del componente anfitrión:</p>
        <o-playground name="host - obtener anfitrión" style="--editor-height: 700px">
          <code path="demo.html" preview>
    <template>
      <o-page src="./page1.html"></o-page>
    </template>
  </code>
          <code path="page1.html">
    <template page>
      <l-m src="./user-card.html"></l-m>
      <user-card username="tom"></user-card>
      <script>
        export default async function(){
          return {
            data: {
              greeting: "Hola"
            },
            proto: {
              sayHi(){
                return `${this.greeting}, ¡soy el anfitrión!`;
              }
            }
          };
        }
      </script>
    </template>
  </code>
          <code path="user-card.html" active>
    <template component>
      <style>
        :host{display:block;border:1px solid #ddd;padding:12px;margin:8px;border-radius:4px;}
      </style>
      <div>Nombre de usuario: {{username}}</div>
      <button on:click="onClick">Saludar</button>
      <div>Respuesta: {{response}}</div>
      <script>
        export default {
          tag: "user-card",
          attrs:{
            username: null
          },
          data: {
            response: "-"
          },
          proto: {
            onClick(){
              this.response = this.host.sayHi();
            }
          },
          ready(){
            console.log("Método del anfitrión:", this.host.sayHi());
          },
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>En este ejemplo, creamos un componente personalizado <code>user-card</code> y, dentro del componente, accedemos al método <code>sayHi</code> del componente host (página) mediante <code>this.host</code>, logrando la interacción entre el componente y su host.</p>
        <p>Si el elemento no está dentro de un componente o módulo de página, el valor de <code>host</code> será <code>null</code>. Por ejemplo:</p>
        <o-playground name="host - Sin host" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <ul>
        <li id="target">
          I am target
        </li>
      </ul>
      <div id="logger" style="border:red solid 1px;padding:8px;">-</div>
      <script>
        setTimeout(()=>{
          $("#logger").text = String($("#target").host);
        },500);
      </script>
    </template>
  </code>
        </o-playground>
        <p>En este ejemplo, el elemento <code>#target</code> está dentro del body, no dentro de ningún componente o página, por lo que el valor de <code>$(&quot;#target&quot;).host</code> es <code>null</code>.</p>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
  </o-app>
  <o-root-provider name="pui" theme="dark"></o-root-provider>
</body>

</html>
