        <h1>Agregar o eliminar elementos hijos</h1>
        <p>Las instancias de elementos poseen características similares a las de los arrays. Para agregar o eliminar nodos, basta con usar los métodos de operación de arrays. Al utilizar los métodos <code>push</code>, <code>unshift</code>, <code>pop</code>, <code>shift</code> y <code>splice</code>, internamente se ejecuta automáticamente la inicialización del <a href="../instance/dollar.html" olink="">$ método</a>, por lo que se puede escribir directamente la cadena de elemento específico u objeto.</p>
        <p>Del mismo modo, también puede usar otros métodos de arreglo, como <code>forEach</code>, <code>map</code>, <code>some</code>, etc.</p>
        <p><strong>Tenga en cuenta que no debe agregar ni eliminar elementos secundarios en elementos con sintaxis de plantilla.</strong></p>
        <h2>push</h2>
        <p>Añadir elementos secundarios desde el final.</p>
        <o-playground name="array-like - push" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <ul>
        <li>I am 1</li>
        <li>I am 2</li>
        <li>I am 3</li>
      </ul>
      <script>
        setTimeout(()=>{
          \$("ul").push(`<li style="color:red;">new li</li>`);
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>unshift</h2>
        <p>Añadir elementos secundarios al principio de la matriz.</p>
        <o-playground name="array-like - unshift" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <ul>
        <li>I am 1</li>
        <li>I am 2</li>
        <li>I am 3</li>
      </ul>
      <script>
        setTimeout(()=>{
          \$("ul").unshift(`<li style="color:blue;">new li</li>`);
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>pop</h2>
        <p>Eliminar el último elemento hijo.</p>
        <o-playground name="array-like - pop" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <ul>
        <li>Soy 1</li>
        <li>Soy 2</li>
        <li>Soy 3</li>
      </ul>
      <script>
        setTimeout(()=>{
          \$("ul").pop();
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>shift</h2>
        <p>Eliminar subelementos al principio del array.</p>
        <o-playground name="array-like - shift" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <ul>
        <li>I am 1</li>
        <li>I am 2</li>
        <li>I am 3</li>
      </ul>
      <script>
        setTimeout(()=>{
          \$("ul").shift();
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>splice</h2>
        <p>Puede eliminar o reemplazar elementos secundarios existentes, y también puede agregar nuevos elementos secundarios. Su forma de uso es similar al método <code>splice</code> de un array.</p>
        <o-playground name="array-like - splice" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <ul>
        <li>I am 1</li>
        <li>I am 2</li>
        <li>I am 3</li>
      </ul>
      <script>
        setTimeout(()=>{
          \$("ul").splice(1, 2, `<li style="color:green;">new li 1</li>`, `<li style="color:green;">new li 2</li>`);
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
