      <article class="markdown-body">
        <h1>PATH</h1>
        <p>La propiedad <code>PATH</code> se utiliza comúnmente en componentes personalizados o en componentes de página para obtener la ruta del archivo donde se registró el componente. Esto puede ayudarte durante el desarrollo a conocer el origen del componente, especialmente cuando necesitas referenciar o cargar otros archivos de recursos, ya que puedes usar la propiedad <code>PATH</code> para construir la ruta del archivo.</p>
        <p>Aquí hay un ejemplo simple que demuestra cómo usar el atributo <code>PATH</code> en un componente personalizado:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> componentPath = $(<span class="hljs-string">&quot;#myCustomComponent&quot;</span>).<span class="hljs-property">PATH</span>;</code></pre>
        <p>En este ejemplo, seleccionamos un elemento <code>my-comp</code> con <code>id</code> &quot;myCustomComponent&quot;, y luego obtenemos la ruta del archivo de este componente personalizado a través del atributo <code>PATH</code>. Puedes utilizar la variable <code>componentPath</code> en la sección de script según sea necesario, por ejemplo, para construir rutas de otros archivos de recursos o realizar otras operaciones.</p>
      </article>
      <div class="footer"></div>
      <script>

            },
            detached() {
              revoke(this);
