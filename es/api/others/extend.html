        <h1>extend</h1>
        <p><code>extend</code> es un método de orden superior utilizado para extender las propiedades o métodos de una instancia.</p>
        <blockquote>
          <p>Normalmente, no se recomienda que los usuarios extiendan las propiedades o métodos de la instancia, ya que esto aumenta el costo de aprendizaje. A menos que haya escenarios específicos dentro del equipo que requieran personalizar el comportamiento de la instancia, no se recomienda hacerlo.</p>
        </blockquote>
        <o-playground name="extend - Ejemplo de extensión" style="--editor-height: 560px">
          <code path="demo.html">
    <template>
      <ul>
        <li>Soy 1</li>
        <li id="target">Soy el objetivo</li>
        <li>Soy 3</li>
      </ul>
      <div id="logger">registrador</div>
      <script>
        const target = $("#target");
        target.extend({
          get good(){
            return "ofa.js es bueno";
          },
          say(){
            return 'hola';
          }
        });
        setTimeout(() => {
          const target = $("#target");
          \$("#logger").html = `
          bueno : ${target.good} <br>
          decir() : ${target.say()}
          `;
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Extender $ capa inferior</h2>
        <p>Similar a jQuery, también puedes extender las propiedades o métodos de la instancia subyacente mediante fn.extend; las propiedades o métodos extendidos desde fn se aplicarán a todas las instancias.</p>
        <o-playground name="extend - extensión base" style="--editor-height: 560px">
          <code path="demo.html">
    <template>
      <ul>
        <li>I am 1</li>
        <li id="target">I am target</li>
        <li>I am 3</li>
      </ul>
      <div id="logger">logger</div>
      <script>
        \$.fn.extend({
          get good(){
            return "ofa.js is good";
          },
          say(){
            return 'hello';
          }
        });
        setTimeout(() => {
          \$("#logger").html = `
          target good : ${$("#target").good} <br>
          logger say() : ${$("#logger").say()}
          `;
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Sintaxis de plantilla ampliada</h2>
        <p>Mediante la extensión de propiedades o funciones con <code>extend</code>, se pueden aumentar las funcionalidades de la sintaxis de plantillas, e incluso proporcionar azúcar sintáctico exclusivo para componentes. Pero es importante tener en cuenta que <strong>no se debe usar</strong> sintaxis de plantilla no oficial, ya que imponen un cierto costo de aprendizaje para los usuarios, y una gran cantidad de azúcar sintáctico no oficial puede reducir la experiencia de desarrollo.</p>
        <h3>Propiedades extendidas</h3>
        <p>Puedes usar <code>:</code> en la plantilla a través de la extensión de atributos. A continuación, extenderemos un atributo <code>red</code>. Cuando <code>red</code> sea <code>true</code>, el color de la fuente se volverá rojo:</p>
        <pre><code class="hljs language-javascript">$.fn.<span class="hljs-title function_">extend</span>({
  <span class="hljs-keyword">set</span> <span class="hljs-title function_">red</span>(<span class="hljs-params">bool</span>){
    <span class="hljs-keyword">if</span>(bool){
      <span class="hljs-variable language_">this</span>.<span class="hljs-property">css</span>.<span class="hljs-property">color</span> = <span class="hljs-string">&quot;red&quot;</span>;
    }<span class="hljs-keyword">else</span>{
      <span class="hljs-variable language_">this</span>.<span class="hljs-property">css</span>.<span class="hljs-property">color</span> = <span class="hljs-string">&#x27;&#x27;</span>;
    }
  }
});</code></pre><o-playground name="extend - atributo extendido" style="--editor-height: 400px">
          <code path="demo.html" preview active>
    <template>
      <l-m src="./temp-one.html"></l-m>

      <script>
        \$.fn.extend({
          set red(bool){
            if(bool){
              this.css.color = "red";
            }else{
              this.css.color = '';
            }
          }
        });
      </script>
    </template>
  </code>

        <p>En este ejemplo, agregamos un atributo <code>red</code> a la sintaxis de la plantilla. Cuando <code>count % 3</code> no es igual a 0, el color de la fuente se vuelve rojo.</p>
        <h3>Métodos de extensión</h3>
        <p>También puedes hacerlo disponible en la sintaxis de plantilla mediante el método de extensión <code>extend</code>. El nombre del método es la parte antes de los dos puntos. Aquí, hemos extendido una sintaxis de plantilla <code>color</code>, y los parámetros que la siguen se pasarán al método de extensión definido.</p>
        <p>Aquí se ha establecido el atributo <code>always</code> como <code>true</code>, lo que significa que cada vez que el componente necesite refrescar la interfaz, se llamará a este método definido. Si no se establece <code>always</code>, esta función de sintaxis de plantilla solo se ejecutará una vez.</p>
        <p>Entre ellos, <code>options</code> proporciona más parámetros, que pueden ayudarte a desarrollar una sintaxis de plantilla más personalizada:</p>
        <pre><code class="hljs language-javascript">$.fn.<span class="hljs-title function_">extend</span>({
  <span class="hljs-title function_">color</span>(<span class="hljs-params">value, func, options</span>){
    <span class="hljs-keyword">const</span> bool = <span class="hljs-title function_">func</span>();
    <span class="hljs-keyword">if</span>(bool){
      <span class="hljs-variable language_">this</span>.<span class="hljs-property">css</span>.<span class="hljs-property">color</span> = value;
    }<span class="hljs-keyword">else</span>{
      <span class="hljs-variable language_">this</span>.<span class="hljs-property">css</span>.<span class="hljs-property">color</span> = <span class="hljs-string">&#x27;&#x27;</span>;
    }
  }
});

$.fn.<span class="hljs-property">color</span>.<span class="hljs-property">always</span> = <span class="hljs-literal">true</span>;</code></pre><o-playground name="extend - método de extensión" style="--editor-height: 400px">

    <template>

      <script>
        \$.fn.extend({
          color(color, func, options){
            const bool = func();
            if(bool){
              this.css.color = color;
            }else{
              this.css.color = '';
            }
          }
        });
        \$.fn.color.always = true;
      </script>
    </template>

        <h2>Principio de sintaxis de plantillas</h2>
        <p>Hasta ahora, deberías haber entendido que muchas de las sintaxis de plantillas en ofa.js en realidad se extienden a través de <code>extend</code>:</p>
        <ul>
          <li>Los métodos <code>class</code>, <code>attr</code> se ejecutan cada vez que se actualiza la vista</li>
          <li>La vinculación de funciones como <code>on</code>, <code>one</code> solo se ejecuta una vez</li>
        </ul>
        <p>Puedes consultar el siguiente ejemplo para comprender mejor el principio de renderizado de plantillas de ofa.js:</p>
        <o-playground name="extend - principio de la sintaxis de plantillas" style="--editor-height: 480px">
          <code path="demo.html" preview>
    <template>
      <l-m src="./temp-three.html"></l-m>
      <temp-three></temp-three>
    </template>
  </code>
          <code path="temp-three.html" active>
    <template component>
      <div>class always => {{classalways}}</div>
      <div>attr always => {{attralways}}</div>
      <div>on always => {{onalways}}</div>
      <script>
        export default {
          tag: "temp-three",
          data: {
            classalways:"",
            attralways:"",
            onalways:""
          },
          ready(){
            this.classalways = $.fn.class.always;
            this.attralways = $.fn.attr.always;
            this.onalways = !!$.fn.on.always;
          }
        };
      </script>
    </template>
  </code>
