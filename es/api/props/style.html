      <article class="markdown-body">
        <h1>style</h1>
        <p>El atributo <code>style</code> se mantiene igual que el nativo.</p>
        <p>Tenga en cuenta que el atributo <code>style</code> no puede obtener el valor real del estilo, sino solo el valor establecido en el atributo <code>style</code>. Aunque el método <code>style</code> es similar al <a href="./css.html" olink="">método css</a>, no puede sobrescribir todos los estilos. En comparación con <code>css</code>, el método <code>style</code> tiene una mayor eficiencia de ejecución interna.</p>
        <p>A continuación se presenta un ejemplo que demuestra cómo usar <code>style</code>：</p>
        <o-playground name="style - uso directo" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <div id="target">texto original</div>
      <br>
      <h4>registrador</h4>
      <div id="logger" style="border:#aaa solid 1px;padding:8px;"></div>
      <script>
        $("#logger").text = $("#target").style.color;
        setTimeout(()=> {
          $('#target').style.color = 'red';
          $("#logger").text = $("#target").style.color;
        }, 1000);
      </script>
    </template>
  </code>
        </o-playground>
        <p>Recuerda que el método <code>style</code> solo obtiene y establece los valores en el atributo <code>style</code>, no el estilo calculado real.</p>
        <h2>Uso mediante sintaxis de plantilla</h2>
        <p>También puedes usar la sintaxis de plantillas para establecer el estilo del elemento de destino.</p>
        <o-playground name="style - Sintaxis de plantilla" style="--editor-height: 400px">
          <code path="demo.html" preview="">
    <template>
      <l-m src="./style-demo.html"></l-m>
      <style-demo></style-demo>
      <script>
        setTimeout(()=>{
          \$("style-demo").txt = "blue";
        },1000);
      </script>
    </template>
  </code>
          <code path="style-demo.html" active="">
    <template component="">
      <div :style.color="txt">Soy el objetivo</div>
      <script>
        export default {
          tag: "style-demo",
          data: {
            txt: "red"
          },
          ready(){
            setTimeout(()=>{
              this.txt = "blue";
            }, 500);
          }
        };
      </script>
    </template>
  </code>
