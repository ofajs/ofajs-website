      <article class="markdown-body">
        <h1>css</h1>
        <p><code>css</code> método se utiliza para obtener o establecer el estilo del elemento objetivo.</p>
        <h2>Uso directo</h2>
        <p>Puedes usar directamente el método <code>css</code> para obtener o establecer el estilo de un elemento.</p>
        <o-playground name="css - uso directo" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <div id="target">origin text</div>
      <br>
      <h4>logger</h4>
      <div id="logger" style="border:#aaa solid 1px;padding:8px;"></div>
      <script>
        $("#logger").text = $("#target").css.color;
        setTimeout(()=> {
          $('#target').css.color = 'red';
          $("#logger").text = $("#target").css.color;
        }, 1000);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Configuración completa</h2>
        <p>A través del objeto <code>css</code> obtenido, puedes establecer directamente los valores de estilo en el elemento.</p>
        <o-playground name="css - Configuración completa" style="--editor-height: 400px">
          <code path="demo.html">
    <template>
      <div id="target" style="color:red">origin text</div>
      <br>
      <h4>logger</h4>
      <div id="logger" style="border:#aaa solid 1px;padding:8px;"></div>
      <script>
        $("#logger").text = Object.keys($("#target").css);
        setTimeout(()=>{
          \$("#target").css = {
            color: "blue",
            lineHeight: "5em"
          };
          \$("#logger").text = Object.keys($("#target").css);
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
        <p>Usando las características del objeto <code>css</code>, puedes ajustar rápidamente el estilo del elemento objetivo.</p>
        <h2>Uso de la sintaxis de plantillas</h2>
        <p>También puedes configurar el estilo del elemento objetivo mediante la sintaxis de plantilla.</p>
        <o-playground name="css - sintaxis de plantilla" style="--editor-height: 400px">
          <code path="demo.html" preview>
    <template>
      <l-m src="./css-demo.html"></l-m>
      <css-demo></css-demo>
      <script>
        setTimeout(()=>{
          \$("css-demo").txt = "blue";
        },1000);

    </template>
  </code>
          <code path="css-demo.html" active>
    <template component>
      <div :css.color="txt">I am target</div>
      <script>
        export default {
          tag: "css-demo",
          data: {
            txt: "red"
          },
          ready(){
            setTimeout(()=>{
              this.txt = "blue";
            }, 500);
          }
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Consejos para configurar CSS</h2>
        <p>Puedes modificar una propiedad de estilo de un elemento mediante <code>$ele.css = {...$ele.css, color:&#39;red&#39;}</code> sin afectar otras propiedades de estilo. Esta forma permite modificar solo una propiedad sin reescribir todo el estilo.</p>
        <h3>Ejemplo</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> myElement = $(<span class="hljs-string">&quot;#myElement&quot;</span>);

myElement.<span class="hljs-property">css</span> = { ...myElement.<span class="hljs-property">css</span>, <span class="hljs-attr">color</span>: <span class="hljs-string">&#x27;red&#x27;</span> };</code></pre>
        <p>En el ejemplo anterior, al usar <code>{ ...myElement.css, color: &#39;red&#39; }</code>, solo modificamos el color del elemento y mantenemos el resto de las propiedades de estilo sin cambios. Esta es una técnica muy conveniente para modificar dinámicamente los estilos de un elemento.</p>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
