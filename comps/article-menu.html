<template component>
  <l-m src="/gh/ofajs/Punch-UI@1/packages/list/list.html"></l-m>
  <style>
    :host {
      display: block;
    }
    p-list-item {
      border-radius: 0 16px 16px 0;
      margin: 2px 0;
      transition: all 0.1s ease-in-out;
    }

    p-list-item[active-item] {
      color: var(--md-sys-color-primary);
      background-color: var(--md-sys-color-on-primary);
    }

    p-list-item a {
      color: inherit;
      text-decoration: none;
    }

    n-icon[slot="prefix"] {
      font-size: 16px;
      margin: 0 8px 0 0;
    }
  </style>

  <p-list style="--ladder-left: 8px">
    <o-fill :value="list" name="list-item"></o-fill>
  </p-list>

  <template name="list-item">
    <p-list-item
      button="suffix"
      attr:active-item="$host.isUrlActive($data.finalUrl)"
      collapse-childs="open"
    >
      <x-if :value="$data.finalUrl">
        <n-icon icon="material-symbols:article-rounded" slot="prefix"></n-icon>
      </x-if>
      <x-else>
        <n-icon icon="entypo:list" slot="prefix"></n-icon>
      </x-else>
      <x-if :value="$data.finalUrl">
        <a
          attr:href="$data.finalUrl"
          olink
          on:click="$host.emit('clicked-item')"
        >
          {{$data.name}}
        </a>
      </x-if>
      <x-else>
        <div>{{$data.name}}</div>
      </x-else>

      <x-if :value="$data.content">
        <i toggle-collapse triangle slot="suffix" style="z-index: 3"></i>
      </x-if>

      <p-list slot="childs">
        <o-fill :value="$data.content" name="list-item"></o-fill>
      </p-list>
    </p-list-item>
  </template>
  <script>
    export default async ({ load, url: menuUrl }) => {
      const { getCurrentLang } = await load("../js/util.js");
      const lang = getCurrentLang();

      return {
        tag: "article-menu",
        data: {
          list: [],
          activeLeftUrl: "",
        },
        watch: {
          activeLeftUrl() {
            clearTimeout(this._leftScrollTimer);
            this._leftScrollTimer = setTimeout(() => {
              const targetEl = this.shadow.$("[active-item]");
              targetEl && scrollIntoViewIfNeeded(targetEl.ele);
            }, 800);
          },
        },
        proto: {
          isUrlActive(finalUrl) {
            if (!finalUrl) return false;
            const normalizeUrl = (url) => url.replace(/\.html$/, "");
            return normalizeUrl(this.activeLeftUrl) === normalizeUrl(finalUrl);
          },
          async refreshList() {
            const { header } = await load(`../${lang}/article-config.json`);

            let targetItem = null;
            const baseUrl = menuUrl.replace(/\/comps\/article-menu\.html$/, "");

            const findTargetItem = (items) => {
              for (const e of items) {
                const activePrefix = `${baseUrl}/${lang}/${e.prefix}`;
                const currentSrc = this.app.current.src;
                if (currentSrc.startsWith(activePrefix)) {
                  return e;
                }
                if (e.content) {
                  const found = findTargetItem(e.content);
                  if (found) return found;
                }
              }
              return null;
            };

            targetItem = findTargetItem(header);

            if (!targetItem) {
              this.emit("hide-left", {
                data: true,
              });
              sessionStorage.setItem("_old_hide_left", 1);
              return;
            }

            this.emit("hide-left", {
              data: false,
            });
            sessionStorage.setItem("_old_hide_left", 0);

            // 如果和之前的list一样，就不用更新
            if (!this.list.length || this._old_prefix !== targetItem.prefix) {
              // 更新左侧的列表
              const list = targetItem.data || [];

              const fixList = (list) => {
                list.forEach((item) => {
                  if (item.url) {
                    const finalUrl = `${menuUrl.replace(/\/comps\/article-menu\.html$/, "")}/${lang}/${targetItem.prefix}${item.url}`;
                    const urlData = new URL(finalUrl);
                    item.finalUrl = urlData.pathname;
                  }
                  if (item.content) {
                    fixList(item.content);
                  }
                });
              };

              fixList(list);

              this.list = list;

              this._old_prefix = targetItem.prefix;
            }

            // 更新左侧的active
            this.activeLeftUrl = location.pathname;
          },
        },
        attached() {
          this.refreshList();

          this.app.on(
            "router-change",
            (this._rc_func = () => {
              this.refreshList();
            }),
          );
        },
        detached() {
          this.app.off("router-change", this._rc_func);
        },
      };
    };

    function isInViewport(element, partial = true) {
      const rect = element.getBoundingClientRect();
      const viewHeight =
        window.innerHeight || document.documentElement.clientHeight;
      const viewWidth =
        window.innerWidth || document.documentElement.clientWidth;

      const fullyVisible =
        rect.top >= 0 &&
        rect.left >= 0 &&
        rect.bottom <= viewHeight &&
        rect.right <= viewWidth;

      const partiallyVisible =
        rect.top < viewHeight &&
        rect.bottom > 0 &&
        rect.left < viewWidth &&
        rect.right > 0;

      return partial ? partiallyVisible : fullyVisible;
    }

    function scrollIntoViewIfNeeded(element, options = {}) {
      if (!isInViewport(element, options.partial)) {
        element.scrollIntoView({
          behavior: options.behavior || "smooth",
          block: options.block || "center",
          inline: options.inline || "nearest",
        });
      }
    }
  </script>
</template>
