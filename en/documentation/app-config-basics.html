        <h1>Application Configuration Basics</h1>
        <p><code>app-config.js</code> configuration file is used to define various behaviors of the application. This chapter introduces the basic structure of the configuration file and all available configuration items.</p>
        <h2>Configuration file structure</h2>
        <p>Create the <code>app-config.js</code> file, using ES6 module syntax to export the configuration items：</p>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// app-config.js</span>

<span class="hljs-comment">// Application home page address (required)</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> home = <span class="hljs-string">"./home.html"</span>;

<span class="hljs-comment">// Page transition animation configuration (optional)</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">"translate(0, 0)"</span>,
  },
  <span class="hljs-attr">next</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">"translate(30px, 0)"</span>,
  },
  <span class="hljs-attr">previous</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">"translate(-30px, 0)"</span>,
  },
};

<span class="hljs-comment">// Loading state (optional)</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> <span class="hljs-title function_">loading</span> = (<span class="hljs-params"></span>) =&gt; {
  <span class="hljs-keyword">return</span> <span class="hljs-string">"&lt;div&gt;Loading...&lt;/div&gt;"</span>;
};

<span class="hljs-comment">// Error handling (optional)</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> <span class="hljs-title function_">fail</span> = (<span class="hljs-params">{ src, error }</span>) =&gt; {
  <span class="hljs-keyword">return</span> <span class="hljs-string">`&lt;div&gt;Failed to load: <span class="hljs-subst">${src}</span>&lt;/div&gt;`</span>;
};

<span class="hljs-comment">// Application initialization (optional)</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> ready = <span class="hljs-keyword">function</span>(<span class="hljs-params"></span>) {
  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">"App is ready"</span>);
};

<span class="hljs-comment">// Prototype extension (optional)</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> proto = {
  <span class="hljs-title function_">customMethod</span>(<span class="hljs-params"></span>) {
    <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">"Custom method"</span>);
  },
};

<span class="hljs-comment">// Enable forward navigation (optional)</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> allowForward = <span class="hljs-literal">true</span>;</code></pre>
        <h2>Configuration Overview</h2>
        <p><code>app-config.js</code> supports the following configuration items:</p>
        <table>
          <thead>
            <tr>
              <th>Configuration Item</th>
              <th>Required</th>
              <th>Description</th>
              <th>Detailed Documentation</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><code>home</code></td>
              <td>✅ Required</td>
              <td>App home page address</td>
              <td>This chapter</td>
            </tr>
            <tr>
              <td><code>pageAnime</code></td>
              <td>Optional</td>
              <td>Page transition animation configuration</td>
              <td><a href="./page-transition-animation.html" olink="">Page Transition Animation</a></td>
            </tr>
            <tr>
              <td><code>loading</code></td>
              <td>Optional</td>
              <td>Content displayed during page loading</td>
              <td><a href="./app-loading-error.html" olink="">Loading and Error Handling</a></td>
            </tr>
            <tr>
              <td><code>fail</code></td>
              <td>Optional</td>
              <td>Content displayed when page loading fails</td>
              <td><a href="./app-loading-error.html" olink="">Loading and Error Handling</a></td>
            </tr>
            <tr>
              <td><code>ready</code></td>
              <td>Optional</td>
              <td>Callback after app initialization is complete</td>
              <td><a href="./app-initialization.html" olink="">App Initialization</a></td>
            </tr>
            <tr>
              <td><code>proto</code></td>
              <td>Optional</td>
              <td>Methods and properties added to the app prototype</td>
              <td><a href="./app-initialization.html" olink="">App Initialization</a></td>
            </tr>
            <tr>
              <td><code>allowForward</code></td>
              <td>Optional</td>
              <td>Whether to enable browser forward functionality</td>
              <td><a href="./app-navigation.html" olink="">Routing and Navigation</a></td>
            </tr>
          </tbody>
        </table>
        <p><code>home</code> is a required configuration item, specifying the home page module path to load when the application starts.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> home = <span class="hljs-string">"./pages/home.html"</span>;</code></pre>
        <p><strong>Path Rules:</strong>- Supports relative paths (relative to the <code>app-config.js</code> file)</p>
        <ul>
          <li>Supports absolute paths</li>
          <li>Points to a page module file (<code>.html</code> file)</li>
        </ul>
        <h2>pageAnime - Page Switch Animation</h2>
        <p><code>pageAnime</code> is an optional configuration item, used to control the transition animation effect during page switching.</p>
        <h3>Basic Usage</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">"translate(0, 0)"</span>,
  },
  <span class="hljs-attr">next</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">"translate(30px, 0)"</span>,
  },
  <span class="hljs-attr">previous</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">"translate(-30px, 0)"</span>,
  },
};</code></pre>
        <h3>Animation Status Description</h3>
        <p>The page switching animation includes three states:</p>
        <table>
          <thead>
            <tr>
              <th>State</th>
              <th>Description</th>
              <th>Trigger Timing</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><code>current</code></td>
              <td>The style after the current page's animation ends</td>
              <td>When the page switch is complete</td>
            </tr>
            <tr>
              <td><code>next</code></td>
              <td>The starting style when the new page enters</td>
              <td>When the new page starts to enter</td>
            </tr>
            <tr>
              <td><code>previous</code></td>
              <td>The target style when the old page leaves</td>
              <td>When the old page starts to leave</td>
            </tr>
          </tbody>
        </table>
        <p>Page transition animations support multiple effects, including:- Slide left/right（default）</p>
        <ul>
          <li>Fade in/out</li>
          <li>Slide up/down</li>
          <li>Zoom effect</li>
          <li>Flip effect</li>
          <li>Custom animation</li>
        </ul>
        <p>For detailed animation configuration and effect examples, please refer to the <a href="./page-transition-animation.html" olink="">page transition animation</a> chapter.</p>
        <h2>Using configuration files in HTML</h2>
        <p>In HTML files, import the configuration file via the <code>o-app</code> tag:</p>

<span class="hljs-tag">&lt;<span class="hljs-name">html</span>&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">head</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">script</span> <span class="hljs-attr">src</span>=<span class="hljs-string">"https://cdn.jsdelivr.net/gh/kirakiray/ofa.js/dist/ofa.min.mjs"</span> <span class="hljs-attr">type</span>=<span class="hljs-string">"module"</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">head</span>&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">body</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">o-app</span> <span class="hljs-attr">src</span>=<span class="hljs-string">"./app-config.js"</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-app</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">body</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">html</span>&gt;</span></code></pre><o-playground name="Application Configuration Basic Example" style="--editor-height: 500px">

      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
