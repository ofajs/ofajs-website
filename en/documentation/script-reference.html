        <h1>Script Introduction</h1>
        <p>ofa.js can be used directly via a script tag. Just add the following code to the <code>&lt;head&gt;</code> or <code>&lt;body&gt;</code> section of your HTML file:</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">script</span> <span class="hljs-attr">src</span>=<span class="hljs-string">&quot;https://cdn.jsdelivr.net/gh/ofajs/ofa.js/dist/ofa.min.mjs&quot;</span> <span class="hljs-attr">type</span>=<span class="hljs-string">&quot;module&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span></code></pre>
        <h2>Basic Usage</h2>
        <p>After the script is loaded, ofa.js creates a <code>$</code> variable in the global scope, and all core functionality is provided through this object. You can access the various methods and properties of ofa.js via this object. Subsequent tutorials will detail its specific usage.</p>
        <h2>Debug Mode</h2>
        <p>During development, you can enable debug mode by appending the <code>#debug</code> parameter to the script URL.</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">script</span> <span class="hljs-attr">src</span>=<span class="hljs-string">&quot;https://cdn.jsdelivr.net/gh/ofajs/ofa.js/dist/ofa.min.mjs#debug&quot;</span> <span class="hljs-attr">type</span>=<span class="hljs-string">&quot;module&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span></code></pre>
        <p>Debug mode enables the source map feature, allowing you to view and debug the original source code directly in the browser developer tools, thereby greatly improving development efficiency.</p>
        <h2>ESM Modules</h2>
        <p>ofa.js also supports importing via ESM modules. You can use the <code>import</code> statement in your project to bring in ofa.js:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">import</span> <span class="hljs-string">&#x27;https://cdn.jsdelivr.net/gh/ofajs/ofa.js/dist/ofa.min.mjs&#x27;</span>;</code></pre>
        <p>When using ESM modules, you can directly use the <code>$</code> variable in your code without accessing it through the global scope.</p>
      </article>

      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
