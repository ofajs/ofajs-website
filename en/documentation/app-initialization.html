        <h1>Application Initialization</h1>
        <p>During the application initialization phase, some global settings can be performed, such as adding custom methods, monitoring events, etc. <code>app-config.js</code> provides <code>ready</code> and <code>proto</code> two configuration items to handle initialization logic.</p>
        <h2>ready - Initialization Callback</h2>
        <p><code>ready</code> is the callback function executed after the application configuration is loaded, where initialization operations can be performed.</p>
        <h3>Basic Usage</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> ready = <span class="hljs-keyword">function</span>(<span class="hljs-params"></span>) {
  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;Application initialized&quot;</span>);
  <span class="hljs-comment">// this points to the o-app element instance</span>
  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;Current page:&quot;</span>, <span class="hljs-variable language_">this</span>.<span class="hljs-property">current</span>);
};</code></pre>
        <blockquote>
          <p><strong>Note</strong>: <code>ready</code> must use a function declaration or function expression, not an arrow function (because correct <code>this</code> binding is required).</p>
        </blockquote>
        <h3>Accessing Application Instance</h3>
        <p>In the <code>ready</code> function, <code>this</code> refers to the <code>o-app</code> element instance, which can access all methods and properties of the app:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> ready = <span class="hljs-keyword">function</span>(<span class="hljs-params"></span>) {
  <span class="hljs-comment">// Get the current page</span>
  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;Current page:&quot;</span>, <span class="hljs-variable language_">this</span>.<span class="hljs-property">current</span>);
  
  <span class="hljs-comment">// Get the routing history</span>
  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;Routing history:&quot;</span>, <span class="hljs-variable language_">this</span>.<span class="hljs-property">routers</span>);
  
  <span class="hljs-comment">// Listen for route changes</span>
  <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">on</span>(<span class="hljs-string">&quot;router-change&quot;</span>, <span class="hljs-function">(<span class="hljs-params">e</span>) =&gt;</span> {
    <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;Route changed:&quot;</span>, e.<span class="hljs-property">data</span>);
  });
};</code></pre>
        <h3>Initialization Example</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> ready = <span class="hljs-keyword">function</span>(<span class="hljs-params"></span>) {
  <span class="hljs-comment">// Initialize global state</span>
  <span class="hljs-variable language_">this</span>.<span class="hljs-property">globalData</span> = {
    <span class="hljs-attr">user</span>: <span class="hljs-literal">null</span>,
    <span class="hljs-attr">theme</span>: <span class="hljs-string">&quot;light&quot;</span>,
  };
  
  <span class="hljs-comment">// Restore user info from local storage</span>
  <span class="hljs-keyword">const</span> savedUser = <span class="hljs-variable language_">localStorage</span>.<span class="hljs-title function_">getItem</span>(<span class="hljs-string">&quot;user&quot;</span>);
  <span class="hljs-keyword">if</span> (savedUser) {
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">globalData</span>.<span class="hljs-property">user</span> = <span class="hljs-title class_">JSON</span>.<span class="hljs-title function_">parse</span>(savedUser);
  }
  
  <span class="hljs-comment">// Listen for route changes</span>
  <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">on</span>(<span class="hljs-string">&quot;router-change&quot;</span>, <span class="hljs-function">(<span class="hljs-params">e</span>) =&gt;</span> {
    <span class="hljs-comment">// Log page visit</span>
    <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;Visited page:&quot;</span>, e.<span class="hljs-property">data</span>.<span class="hljs-property">src</span>);
  });
};</code></pre>
        <h2>proto - prototype extension</h2>
        <p><code>proto</code> is used to add custom methods and computed properties to the application instance, which can be accessed across all pages via <code>this.app</code>.</p>
        <h3>Adding Custom Methods</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> proto = {
  <span class="hljs-comment">// Custom methods</span>
  <span class="hljs-title function_">navigateToHome</span>(<span class="hljs-params"></span>) {
    <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">goto</span>(<span class="hljs-string">&quot;./home.html&quot;</span>);
  },
  
  <span class="hljs-title function_">navigateToProfile</span>(<span class="hljs-params"></span>) {
    <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">goto</span>(<span class="hljs-string">&quot;./profile.html&quot;</span>);
  },
  
  <span class="hljs-comment">// Method with parameters</span>
  <span class="hljs-title function_">navigateToDetail</span>(<span class="hljs-params">id</span>) {
    <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">goto</span>(<span class="hljs-string">`./detail.html?id=<span class="hljs-subst">${id}</span>`</span>);
  },
};</code></pre>
        <h3>Add computed properties</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> proto = {
  <span class="hljs-comment">// Computed properties</span>
  <span class="hljs-keyword">get</span> <span class="hljs-title function_">isAtHome</span>() {
    <span class="hljs-keyword">return</span> <span class="hljs-variable language_">this</span>.<span class="hljs-property">current</span>?.<span class="hljs-property">src</span>.<span class="hljs-title function_">includes</span>(<span class="hljs-string">&quot;home.html&quot;</span>);
  },
  
  <span class="hljs-keyword">get</span> <span class="hljs-title function_">currentPath</span>() {
    <span class="hljs-keyword">return</span> <span class="hljs-variable language_">this</span>.<span class="hljs-property">current</span>?.<span class="hljs-property">src</span> || <span class="hljs-string">&quot;&quot;</span>;
  },
  
  <span class="hljs-keyword">get</span> <span class="hljs-title function_">routerCount</span>() {
    <span class="hljs-keyword">return</span> <span class="hljs-variable language_">this</span>.<span class="hljs-property">routers</span>?.<span class="hljs-property">length</span> || <span class="hljs-number">0</span>;
  },
};</code></pre>
        <h3>Complete Example</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> proto = {
  <span class="hljs-comment">// Navigation methods</span>
  <span class="hljs-title function_">navigateToHome</span>(<span class="hljs-params"></span>) {
    <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">goto</span>(<span class="hljs-string">&quot;./home.html&quot;</span>);
  },
  
  <span class="hljs-title function_">navigateToProfile</span>(<span class="hljs-params"></span>) {
    <span class="hljs-keyword">if</span> (<span class="hljs-variable language_">this</span>.<span class="hljs-property">globalData</span>.<span class="hljs-property">user</span>) {
      <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">goto</span>(<span class="hljs-string">&quot;./profile.html&quot;</span>);
    } <span class="hljs-keyword">else</span> {
      <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">goto</span>(<span class="hljs-string">&quot;./login.html&quot;</span>);
    }
  },
  
  <span class="hljs-comment">// Computed properties</span>
  <span class="hljs-keyword">get</span> <span class="hljs-title function_">isAtHome</span>() {
    <span class="hljs-keyword">return</span> <span class="hljs-variable language_">this</span>.<span class="hljs-property">current</span>?.<span class="hljs-property">src</span>.<span class="hljs-title function_">includes</span>(<span class="hljs-string">&quot;home.html&quot;</span>);
  },
  
  <span class="hljs-keyword">get</span> <span class="hljs-title function_">isLoggedIn</span>() {
    <span class="hljs-keyword">return</span> !!<span class="hljs-variable language_">this</span>.<span class="hljs-property">globalData</span>?.<span class="hljs-property">user</span>;
  },
  
  <span class="hljs-comment">// Utility methods</span>
  <span class="hljs-title function_">showMessage</span>(<span class="hljs-params">message</span>) {
    <span class="hljs-title function_">alert</span>(message);
  },
};</code></pre>
        <h2>Using in Pages</h2>
        <p>In the page component, you can access the custom methods and properties of the application instance via <code>this.app</code>:</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">template</span> <span class="hljs-attr">page</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
    <span class="hljs-selector-pseudo">:host</span> {
      <span class="hljs-attribute">display</span>: block;
      <span class="hljs-attribute">padding</span>: <span class="hljs-number">10px</span>;
    }
  </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
  
  <span class="hljs-tag">&lt;<span class="hljs-name">button</span> <span class="hljs-attr">on:click</span>=<span class="hljs-string">&quot;app.navigateToHome()&quot;</span>&gt;</span>Back to Home<span class="hljs-tag">&lt;/<span class="hljs-name">button</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">button</span> <span class="hljs-attr">on:click</span>=<span class="hljs-string">&quot;app.navigateToProfile()&quot;</span>&gt;</span>Personal Center<span class="hljs-tag">&lt;/<span class="hljs-name">button</span>&gt;</span>
  
  <span class="hljs-tag">&lt;<span class="hljs-name">p</span>&gt;</span>Is at home: {{app.isAtHome}}<span class="hljs-tag">&lt;/<span class="hljs-name">p</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">p</span>&gt;</span>Is logged in: {{app.isLoggedIn}}<span class="hljs-tag">&lt;/<span class="hljs-name">p</span>&gt;</span>
  
  <span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">
    <span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">async</span> () =&gt; {
      <span class="hljs-keyword">return</span> {
        <span class="hljs-attr">data</span>: {},
        <span class="hljs-attr">proto</span>: {
          <span class="hljs-title function_">goToDetail</span>(<span class="hljs-params"></span>) {
            <span class="hljs-comment">// Call the method of the application instance</span>
            <span class="hljs-variable language_">this</span>.<span class="hljs-property">app</span>.<span class="hljs-title function_">navigateToDetail</span>(<span class="hljs-number">123</span>);
          },
        },
      };
    };
  </span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">template</span>&gt;</span></code></pre>
        <h2>Global State Management</h2>
        <p>Combining <code>ready</code> and <code>proto</code>, you can achieve simple global state management:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// app-config.js</span>

<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> ready = <span class="hljs-keyword">function</span>(<span class="hljs-params"></span>) {
  <span class="hljs-comment">// Initialize global state</span>
  <span class="hljs-variable language_">this</span>.<span class="hljs-property">globalData</span> = {
    <span class="hljs-attr">user</span>: <span class="hljs-literal">null</span>,
    <span class="hljs-attr">cart</span>: [],
    <span class="hljs-attr">theme</span>: <span class="hljs-variable language_">localStorage</span>.<span class="hljs-title function_">getItem</span>(<span class="hljs-string">&quot;theme&quot;</span>) || <span class="hljs-string">&quot;light&quot;</span>,
  };
  
  <span class="hljs-comment">// Restore data from local storage</span>
  <span class="hljs-keyword">const</span> savedCart = <span class="hljs-variable language_">localStorage</span>.<span class="hljs-title function_">getItem</span>(<span class="hljs-string">&quot;cart&quot;</span>);
  <span class="hljs-keyword">if</span> (savedCart) {
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">globalData</span>.<span class="hljs-property">cart</span> = <span class="hljs-title class_">JSON</span>.<span class="hljs-title function_">parse</span>(savedCart);
  }
};

<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> proto = {
  <span class="hljs-comment">// User related</span>
  <span class="hljs-keyword">get</span> <span class="hljs-title function_">isLoggedIn</span>() {
    <span class="hljs-keyword">return</span> !!<span class="hljs-variable language_">this</span>.<span class="hljs-property">globalData</span>.<span class="hljs-property">user</span>;
  },
  
  <span class="hljs-title function_">login</span>(<span class="hljs-params">userData</span>) {
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">globalData</span>.<span class="hljs-property">user</span> = userData;
    <span class="hljs-variable language_">localStorage</span>.<span class="hljs-title function_">setItem</span>(<span class="hljs-string">&quot;user&quot;</span>, <span class="hljs-title class_">JSON</span>.<span class="hljs-title function_">stringify</span>(userData));
  },
  
  <span class="hljs-title function_">logout</span>(<span class="hljs-params"></span>) {
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">globalData</span>.<span class="hljs-property">user</span> = <span class="hljs-literal">null</span>;
    <span class="hljs-variable language_">localStorage</span>.<span class="hljs-title function_">removeItem</span>(<span class="hljs-string">&quot;user&quot;</span>);
    <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">goto</span>(<span class="hljs-string">&quot;./login.html&quot;</span>);
  },
  
  <span class="hljs-comment">// Shopping cart related</span>
  <span class="hljs-keyword">get</span> <span class="hljs-title function_">cartCount</span>() {
    <span class="hljs-keyword">return</span> <span class="hljs-variable language_">this</span>.<span class="hljs-property">globalData</span>.<span class="hljs-property">cart</span>.<span class="hljs-property">length</span>;
  },
  
  <span class="hljs-title function_">addToCart</span>(<span class="hljs-params">item</span>) {
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">globalData</span>.<span class="hljs-property">cart</span>.<span class="hljs-title function_">push</span>(item);
    <span class="hljs-variable language_">localStorage</span>.<span class="hljs-title function_">setItem</span>(<span class="hljs-string">&quot;cart&quot;</span>, <span class="hljs-title class_">JSON</span>.<span class="hljs-title function_">stringify</span>(<span class="hljs-variable language_">this</span>.<span class="hljs-property">globalData</span>.<span class="hljs-property">cart</span>));
  },
  
  <span class="hljs-comment">// Theme related</span>
  <span class="hljs-keyword">get</span> <span class="hljs-title function_">currentTheme</span>() {
    <span class="hljs-keyword">return</span> <span class="hljs-variable language_">this</span>.<span class="hljs-property">globalData</span>.<span class="hljs-property">theme</span>;
  },
  
  <span class="hljs-title function_">toggleTheme</span>(<span class="hljs-params"></span>) {
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">globalData</span>.<span class="hljs-property">theme</span> = <span class="hljs-variable language_">this</span>.<span class="hljs-property">globalData</span>.<span class="hljs-property">theme</span> === <span class="hljs-string">&quot;light&quot;</span> ? <span class="hljs-string">&quot;dark&quot;</span> : <span class="hljs-string">&quot;light&quot;</span>;
    <span class="hljs-variable language_">localStorage</span>.<span class="hljs-title function_">setItem</span>(<span class="hljs-string">&quot;theme&quot;</span>, <span class="hljs-variable language_">this</span>.<span class="hljs-property">globalData</span>.<span class="hljs-property">theme</span>);
  },
};</code></pre>
