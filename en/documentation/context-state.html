        <h1>Context Status</h1>
        <p>Context state is the mechanism in ofa.js for cross-component data sharing. Through the Provider and Consumer pattern, data can be passed between parent and child components, as well as across different component levels, without the need for prop drilling.</p>
        <h2>Core Concepts</h2>
        <ul>
          <li><strong>o-provider</strong>: Data provider, defines the data to be shared</li>
          <li><strong>o-consumer</strong>: Data consumer, retrieves data from the nearest provider</li>
          <li><strong>watch:xxx</strong>: Listens for changes in consumer data and binds them to properties of components or page modules</li>
        </ul>
        <h2>o-provider Provider</h2>
        <p><code>o-provider</code> component is used to define a provider of shared data. It identifies itself via the <code>name</code> attribute and defines the data to be shared through attributes (e.g., <code>custom-a=&quot;value&quot;</code>).</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">o-provider</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;userInfo&quot;</span> <span class="hljs-attr">custom-name</span>=<span class="hljs-string">&quot;Zhang San&quot;</span> <span class="hljs-attr">custom-age</span>=<span class="hljs-string">&quot;25&quot;</span>&gt;</span>
  ...
<span class="hljs-tag">&lt;/<span class="hljs-name">o-provider</span>&gt;</span></code></pre>
        <h3>Attributes</h3>
        <ul>
          <li><code>name</code>: The unique identifier name of the provider, used by the consumer to locate the corresponding provider</li>
        </ul>
        <h3>Features</h3>
        <ol>
          <li><strong>Automatic Property Passing</strong>: All non-reserved properties on the provider are passed as shared data.</li>
          <li><strong>Reactive Updates</strong>: When the data in the provider changes, the consumer corresponding to the same name that consumes the provider will automatically update.</li>
          <li><strong>Hierarchical Lookup</strong>: The consumer starts looking for data with the corresponding name from the nearest ancestor provider.</li>
        </ol>
        <h2>o-consumer Consumer</h2>
        <p><code>o-consumer</code> component is used to consume (use) data from a provider. It specifies the provider name to consume via the <code>name</code> attribute.</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">o-consumer</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;userInfo&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-consumer</span>&gt;</span></code></pre>
        <h3>Attributes</h3>
        <ul>
          <li><code>name</code>: The name of the provider to be consumed</li>
        </ul>
        <h3>Features</h3>
        <ol>
          <li><strong>Automatic data acquisition</strong>: the consumer automatically fetches the data of the corresponding name from the nearest ancestor provider</li>
          <li><strong>Attribute merging</strong>: if several providers with the same name have a certain attribute, the attribute of the provider closest to the consumer takes precedence</li>
          <li><strong>Attribute watching</strong>: changes to a specific attribute can be watched via <code>watch:xxx</code></li>
        </ol>
        <h2>Listening for Data Changes</h2>
        <p>Using <code>watch:xxx</code> you can listen to changes in provider data:</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">o-consumer</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;userInfo&quot;</span> <span class="hljs-attr">watch:custom-age</span>=<span class="hljs-string">&quot;age&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-consumer</span>&gt;</span>

<span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">
<span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> {
  <span class="hljs-attr">data</span>:{
    <span class="hljs-attr">age</span>: <span class="hljs-number">0</span>,
  },
};
</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span></code></pre>

        <h2>o-root-provider Root Provider</h2>
        <p><code>o-root-provider</code> is a root-level global provider whose scope is the entire document. Even without a parent provider, consumers can still access the data from the root provider.</p>
        <pre><code class="hljs language-html"><span class="hljs-comment">&lt;!-- Define global root provider --&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">o-root-provider</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;globalConfig&quot;</span> <span class="hljs-attr">custom-theme</span>=<span class="hljs-string">&quot;dark&quot;</span> <span class="hljs-attr">custom-language</span>=<span class="hljs-string">&quot;zh-CN&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-root-provider</span>&gt;</span>

<span class="hljs-comment">&lt;!-- Can be consumed anywhere on the page --&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">o-consumer</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;globalConfig&quot;</span> <span class="hljs-attr">watch:custom-theme</span>=<span class="hljs-string">&quot;theme&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-consumer</span>&gt;</span></code></pre>
        <h3>Features</h3>
        <ol>
          <li><strong>Global Scope</strong>: The data of the root provider is available throughout the entire page</li>
          <li><strong>Priority</strong>: When there are both a provider and a root-provider with the same name, the provider closest to the consumer takes precedence</li>
          <li><strong>Removable</strong>: After removing the root-provider, the consumer will fall back to searching for other providers</li>
        </ol>

        <h2>getProvider(name) Method</h2>
        <p><code>getProvider(name)</code> is an instance method used to get the provider element corresponding to the name. It traverses up the DOM to find the nearest ancestor provider, and returns the root-provider if not found.</p>

        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">
...
<span class="hljs-attr">proto</span>:{

    <span class="hljs-keyword">const</span> provider = <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">getProvider</span>(<span class="hljs-string">&quot;name&quot;</span>);
    provider.<span class="hljs-property">customValue</span> = <span class="hljs-string">&quot;new value&quot;</span>;

}
...

$(<span class="hljs-string">&quot;#myProvider&quot;</span>).<span class="hljs-title function_">dispatch</span>(<span class="hljs-string">&quot;custom-event&quot;</span>, {

        <h2>Best Practices</h2>
        <ol>
          <li><strong>Rational Naming</strong>: Use meaningful names for provider and consumer to facilitate tracking and maintenance.</li>
          <li><strong>Avoid Overuse</strong>: Context state is suitable for sharing data across components; for ordinary parent-child components, props are recommended.</li>
          <li><strong>Root Provider for Global Configuration</strong>: Themes, languages, global states, etc., are suitable for use with root-provider.</li>
          <li><strong>Timely Cleanup</strong>: When a provider is removed, the consumer automatically clears data without manual handling.</li>
        </ol>

          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
  </o-app>
  <o-root-provider name="pui" theme="dark"></o-root-provider>
</body>
