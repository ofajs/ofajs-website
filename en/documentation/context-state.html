        <h1>Context Status</h1>
        <p>Context state is a mechanism in ofa.js for cross-component data sharing. Through the Provider and Consumer pattern, it enables data transfer between parent-child components and across hierarchical components without the need to pass data layer by layer via props.</p>
        <h2>Core Concepts</h2>
        <ul>
          <li><strong>o-provider</strong>: Data provider; defines the data to be shared.</li>
          <li><strong>o-consumer</strong>: Data consumer; fetches data from the nearest provider.</li>
          <li><strong>watch:xxx</strong>: Watches changes in consumer data and binds them to component or page module properties.</li>
        </ul>
        <h2>o-provider Provider</h2>
        <p>The <code>o-provider</code> component is used to define a provider of shared data. It identifies itself by the <code>name</code> attribute and defines the data to share through attributes such as <code>custom-a=&quot;value&quot;</code>.</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">o-provider</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;userInfo&quot;</span> <span class="hljs-attr">custom-name</span>=<span class="hljs-string">&quot;Zhang San&quot;</span> <span class="hljs-attr">custom-age</span>=<span class="hljs-string">&quot;25&quot;</span>&gt;</span>
  ...
<span class="hljs-tag">&lt;/<span class="hljs-name">o-provider</span>&gt;</span></code></pre>
        <h3>Attributes</h3>
        <ul>
          <li><code>name</code>: The unique identifier of the provider, used by consumers to locate the corresponding provider</li>
        </ul>
        <h3>Features</h3>
        <ol>
          <li><strong>Automatic Attribute Passing</strong>: All non-reserved attributes on a provider are passed as shared data. </li>
          <li><strong>Reactive Updates</strong>: When a provider’s data changes, consumers with the matching name automatically update. </li>
          <li><strong>Hierarchical Lookup</strong>: Consumers start searching for data with the given name from the nearest ancestor provider.</li>
        </ol>
        <h2>o-consumer Consumer</h2>
        <p>The <code>o-consumer</code> component is used to consume data from a provider. It specifies the provider to consume from via the <code>name</code> attribute.</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">o-consumer</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;userInfo&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-consumer</span>&gt;</span></code></pre>
        <h3>Attributes</h3>
        <ul>
          <li><code>name</code>: the name of the provider to consume</li>
        </ul>
        <h3>Features</h3>
        <ol>
          <li><strong>Automatic Data Retrieval</strong>: The consumer automatically fetches data corresponding to the name from the nearest parent provider.</li>
          <li><strong>Attribute Merging</strong>: If multiple providers with the same name have a certain attribute, the attribute from the provider closest to the consumer takes precedence.</li>
          <li><strong>Attribute Monitoring</strong>: Specific attribute changes can be monitored via <code>watch:xxx</code>.</li>
        </ol>
        <h2>Monitoring Data Changes</h2>
        <p>You can monitor changes in provider data via <code>watch:xxx</code>:</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">o-consumer</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;userInfo&quot;</span> <span class="hljs-attr">watch:custom-age</span>=<span class="hljs-string">&quot;age&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-consumer</span>&gt;</span>

<span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">
<span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> {
  <span class="hljs-attr">data</span>: {
    <span class="hljs-attr">age</span>: <span class="hljs-number">0</span>,
  },
};
</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span></code></pre>

        <h2>o-root-provider Root Provider</h2>
        <p><code>o-root-provider</code> is a root-level global provider whose scope covers the entire document. Consumers can access the root provider’s data even when no parent provider exists.</p>
        <pre><code class="hljs language-html"><span class="hljs-comment">&lt;!-- Define global root provider --&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">o-root-provider</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;globalConfig&quot;</span> <span class="hljs-attr">custom-theme</span>=<span class="hljs-string">&quot;dark&quot;</span> <span class="hljs-attr">custom-language</span>=<span class="hljs-string">&quot;zh-CN&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-root-provider</span>&gt;</span>

<span class="hljs-comment">&lt;!-- Can be consumed anywhere on the page --&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">o-consumer</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;globalConfig&quot;</span> <span class="hljs-attr">watch:custom-theme</span>=<span class="hljs-string">&quot;theme&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-consumer</span>&gt;</span></code></pre>
        <h3>Features</h3>
        <ol>
          <li><strong>Global Scope</strong>: Data from root providers is available across the entire page. </li>
          <li><strong>Precedence</strong>: When a provider and a root-provider share the same name, the provider closest to the consumer takes precedence. </li>
          <li><strong>Removability</strong>: After a root-provider is removed, consumers fall back to searching for other providers.</li>
        </ol>

        <h2>getProvider(name) Method</h2>
        <p><code>getProvider(name)</code> is an instance method that retrieves the provider element matching the given name. It walks up the DOM to find the closest ancestor provider; if none is found, it returns the root-provider.</p>
        <h3>Use the getProvider(name) method inside a component or page module.</h3>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">
...
<span class="hljs-attr">proto</span>:{
  <span class="hljs-title function_">changeValue</span>(<span class="hljs-params"></span>){
    <span class="hljs-keyword">const</span> provider = <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">getProvider</span>(<span class="hljs-string">&quot;name&quot;</span>);
    provider.<span class="hljs-property">customValue</span> = <span class="hljs-string">&quot;new value&quot;</span>;
  }
}
...
</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span></code></pre>

    <span class="hljs-tag">&lt;<span class="hljs-name">div</span>&gt;</span>{{customValue}}<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span>
  <span class="hljs-tag">&lt;/<span class="hljs-name">o-consumer</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">o-provider</span>&gt;</span>

<span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">
<span class="hljs-comment">// Dispatch event</span>
$(<span class="hljs-string">&quot;#myProvider&quot;</span>).<span class="hljs-title function_">dispatch</span>(<span class="hljs-string">&quot;custom-event&quot;</span>, {
  <span class="hljs-attr">data</span>: { <span class="hljs-attr">message</span>: <span class="hljs-string">&quot;Hello World&quot;</span> }

        <h2>Best Practices</h2>
        <ol>
          <li><strong>Reasonable Naming</strong>: Use meaningful names for providers and consumers to facilitate tracking and maintenance</li>
          <li><strong>Avoid Overuse</strong>: Context state is suitable for sharing data across components; props are recommended for regular parent-child components</li>
          <li><strong>Root Provider for Global Configuration</strong>: Themes, languages, global states, etc. are suitable for root-provider</li>
          <li><strong>Timely Cleanup</strong>: When a provider is removed, consumers will automatically clean up data without manual handling</li>
        </ol>

            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
  </o-app>
  <o-root-provider name="pui" theme="dark"></o-root-provider>
