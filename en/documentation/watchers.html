        <h1>Listener</h1>
        <p>A Watcher in ofa.js is a feature that listens for data changes and executes corresponding logic. When reactive data changes, the watcher automatically triggers a callback function, allowing you to perform tasks such as data transformation, side effect operations, or asynchronous processing.</p>
        <h2>Basic Usage</h2>
        <p>Listeners are defined in the component’s <code>watch</code> object, where the key names correspond to the data properties to be observed and the values are the callback functions executed when those data change.</p>
        <o-playground name="watchers - basic usage" style="--editor-height: 700px">
          <code>
    <template page="">
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <p>
        count:{{count}}
        <br>
        doubleCount:{{doubleCount}}
      </p>
      <input sync:value="count" type="number">
      <script>
        export default async () => {
          return {
            data: {
              count: 0,
              doubleCount: 0,
            },
            watch: {
              count(count) {
                setTimeout(() => {
                  this.doubleCount = count * 2;
                }, 500);
              },
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Callback Function Parameters</h2>
        <p>The listener callback function receives two parameters:- <code>newValue</code>: the new value after the change </p>
        <ul>
          <li><code>{watchers}</code>: all watcher objects of the current component</li>
        </ul>
        <p>After data changes are debounced, the callback in <code>watch</code> is executed; the <code>watchers</code> parameter is the set of all changes merged during this debounce cycle.</p>
        <p>The function in <code>watch</code> will be called immediately after the component is initialized, used to set up data listeners. You can determine whether it is the first call by checking if <code>watchers</code> has a length.</p>
        <o-playground name="watchers - callback arguments" style="--editor-height: 700px">
          <code>
    <template page="">
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
        .log {
          margin-top: 10px;
          padding: 10px;
          background-color: #7e7e7eff;
          font-family: monospace;
          white-space: pre-wrap;
        }
      </style>
      <p>Name: {{name}}</p>
      <p>Age: {{age}}</p>
      <input sync:value="name" placeholder="Enter name">
      <input sync:value="age" type="number" placeholder="Enter age">
      <div class="log">{{log}}</div>
      <script>
        export default async () => {
          return {
            data: {
              name: "Zhang San",
              age: 25,
              log: "",
            },
            watch: {
              name(newVal, {watchers}) {
                if (!watchers) {
                  return;
                }
                const watcher = watchers[0]; // pick one
                this.log += `Property "${watcher.name}" changed from "${watcher.oldValue}" to "${watcher.value}"\n`;
              },
              age(newVal, {watchers}) {
                if (!watchers) {
                  return;
                }
                const watcher = watchers[0]; // pick one
                this.log += `Property "${watcher.name}" changed from "${watcher.oldValue}" to "${watcher.value}"\n`;
              },
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Deep Watching</h2>
        <p>For nested data of object or array type, deep watching is automatically enabled inside watch.</p>
        <o-playground name="watchers - Deep Watching" style="--editor-height: 700px">
          <code>
    <template page="">
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
        button {
          margin: 5px;
          padding: 8px 12px;
        }
        .info {
          margin-top: 10px;
          padding: 10px;
          background-color: gray;
        }
      </style>
      <div>
        <p>User Information:</p>
        <p>Name: {{user.name}}</p>
        <p>Age: {{user.age}}</p>
        <p>Hobbies: {{user.hobbies.join(', ')}}</p>
      </div>
      <div>
        <button on:click="updateName">Change Name</button>
        <button on:click="updateAge">Change Age</button>
        <button on:click="addHobby">Add Hobby</button>
        <button on:click="updateHobby">Update Hobby</button>
      </div>
      <div class="info" :html="log"></div>
      <script>
        export default async () => {
          return {
            data: {
              user: {
                name: "Zhang San",
                age: 25,
                hobbies: ["Basketball", "Soccer"],
              },
              log: "",
            },
            watch: {
              user(newVal,{watchers}) {
                if(!watchers){
                  return;
                }
                const watcher = watchers[0]; // Get one of them
                console.log("Modified: ",watcher.target);
                if(watcher.type === 'set'){
                  this.log += `Modified value -> Property "${watcher.name}" changed from "${watcher.oldValue}" to "${watcher.value}" <br>`;
                }else{
                  this.log += `Executed method ${watcher.type} -> Function name "${watcher.name}"  Arguments "${watcher.args}" <br>`;
                }
              },
            },
            proto: {
              updateName() {
                this.user.name = "Li Si";
              },
              updateAge() {
                this.user.age = 30;
              },
              addHobby() {
                this.user.hobbies.push("Swimming");
              },
              updateHobby() {
                this.user.hobbies[0] = "Badminton";
              },
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Listening to Multiple Data Sources</h2>
        <p>You can listen for changes to multiple pieces of data simultaneously and execute corresponding logic in the callback function based on those changes.</p>
        <o-playground name="watchers - Multiple Data Sources" style="--editor-height: 600px">
          <code>
    <template page="">
      <style>
        :host {
          display: block;
          border: 1px solid red;

          margin: 5px;
          padding: 5px;
        }
      </style>
      <p>Width: {{rectWidth}}</p>
      <p>Height: {{rectHeight}}</p>
      <p>Area: {{area}}</p>
      <input sync:value="rectWidth" type="number" placeholder="Width">
      <input sync:value="rectHeight" type="number" placeholder="Height">
      <script>
        export default async () => {
          return {
            data: {
              rectWidth: 10,
              rectHeight: 5,
              area: 0,
            },
            watch: {
              // "rectWidth,rectHeight"(){
              ["rectWidth,rectHeight"](){
                this.area = (this.rectWidth || 0) * (this.rectheight || 0);
              }
            }
          };
        };
      </script>
    </template>
  </code>

        <h2>Real-World Application Scenarios</h2>
        <h3>1. Form Validation</h3>
        <o-playground name="watchers - form validation" style="--editor-height: 800px">
          <code>
    <template page="">
      <style>
        :host {
          display: block;
          padding: 15px;
        }
        input {
          display: block;
          margin: 10px 0;
          padding: 8px;
          width: 200px;
        }
        .error {
          color: red;
          font-size: 12px;
        }
      </style>
      <input sync:value="username" placeholder="Username (3-10 characters)">
      <span class="error">{{usernameError}}</span>
      <input sync:value="email" placeholder="Email">
      <span class="error">{{emailError}}</span>
      <script>
        export default async () => {
          return {
            data: {
              username: "",
              email: "",
              usernameError: "",
              emailError: "",
            },
            watch: {
              username(val) {
                if (val.length < 3 || val.length > 10) {
                  this.usernameError = "Username must be 3-10 characters";
                } else {
                  this.usernameError = "";
                }
              },
              email(val) {
                const emailRegex = /^.+@.+\..+$/;
                if (!emailRegex.test(val)) {
                  this.emailError = "Please enter a valid email address";
                } else {
                  this.emailError = "";
                }
              },
            },
          };
        };
      </script>
    </template>
  </code>

        export default async () => {
          return {
            data: {
              settings: {
                theme: "light",
              },
              saveStatus: "Saved",
            },
            watch: {
              settings(){
                  this.saveStatus = "Saving...";
                  setTimeout(() => {
                    this.saveStatus = "Saved";
                    console.log("Settings saved:", this.settings);
                  }, 500);
              }
            },
            proto: {
              setLight() {
                this.settings.theme = "light";
              },
              setDark() {
                this.settings.theme = "dark";
              },
              resetSettings() {
                this.settings = { theme: "light" };
              },
            },
          };
        };
      </script>
    </template>
  </code>

        <h2>Notes</h2>
        <ul>
          <li><strong>Avoid modifying the watched data</strong>: Modifying the watched data within a watcher callback may cause an infinite loop. If modification is necessary, ensure proper conditional checks.</li>
          <li><strong>Consider using computed properties</strong>: If you need to compute a new value based on changes in multiple data sources, it is recommended to use <a href="./computed-properties.html" olink="">computed properties</a> instead of watchers.</li>
        </ul>
