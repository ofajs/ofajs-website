        <h1>Custom Events</h1>
        <p>In ofa.js, besides built-in DOM events, you can also create and use custom events to achieve communication between components. Custom events are an important mechanism in component-based development, allowing components to broadcast messages or state changes upward.</p>
        <h2>emit Method - Triggering Custom Events</h2>
        <p>The <code>emit</code> method is used to trigger custom events, notifying external listeners of state changes or user actions within the component.</p>
        <h3>Basic Usage</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// Trigger a simple custom event</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-title function_">emit</span>(<span class="hljs-string">'custom-event'</span>);

<span class="hljs-comment">// Trigger a custom event with data</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-title function_">emit</span>(<span class="hljs-string">'data-changed'</span>, {
  <span class="hljs-attr">data</span>: {
    <span class="hljs-comment">// Custom data, can be structured arbitrarily based on requirements</span>
    <span class="hljs-attr">newValue</span>: <span class="hljs-number">100</span>,
    <span class="hljs-attr">oldValue</span>: <span class="hljs-number">50</span>
  }
});</code></pre>
        <h3>emit Method Parameters</h3>
        <p>The <code>emit</code> method accepts two parameters:</p>
        <ol>
          <li><strong>Event Name</strong>: String, representing the name of the event to be triggered</li>
          <li><strong>Options Object</strong> (Optional): Contains event configuration options<ul>
              <li><code>data</code>: The data to pass</li>
              <li><code>bubbles</code>: Boolean, controls whether the event bubbles (defaults to true)</li>
              <li><code>composed</code>: Boolean, controls whether the event can cross the Shadow DOM boundary</li>
              <li><code>cancelable</code>: Boolean, controls whether the event can be canceled</li>
            </ul>
          </li>
        </ol>
        <p>Then the parent element can use the <code>on</code> method <a href="./event-binding.html" olink="">(event binding)</a> to listen for this custom event.</p>

        <h2>bubbles - Event Bubbling Mechanism</h2>
        <p>The <code>bubbles</code> property controls whether an event bubbles up to parent elements. When set to <code>true</code>, the event propagates up the DOM tree. The default value is <code>true</code>. If set to <code>false</code>, the event will not bubble.</p>
        <h3>Detailed Explanation of the Bubble Mechanism</h3>
        <ul>
          <li><strong>Default behavior</strong>: events emitted with <code>emit</code> bubble by default (<code>bubbles: true</code>)</li>
          <li><strong>Bubble path</strong>: the event propagates upward from the triggering element level by level</li>
          <li><strong>Stop propagation</strong>: calling <code>event.stopPropagation()</code> in an event handler prevents bubbling</li>
        </ul>
        <h3>Bubble Sort Example</h3>
        <o-playground name="Custom Event Example" style="--editor-height: 500px">

    <template>

      <l-m src="./bubble-component.html"></l-m>
      <style>
        :host {
          display: block;
          padding: 20px;
          border: 1px solid blue;
        }
      </style>
      <div on:child-event="handleChildEventFromComponent">
        <bubble-component on:child-event="handleDirectChildEvent"></bubble-component>
      </div>
      <p>Outer Container (Listening for Bubbling Events): {{bubbledEventCount}} times</p>
      <p>Inner Component (Listening for Direct Events): {{directEventCount}} times</p>
      <p>Received Data: <span style="color:red;">{{result}}</span></p>
      <script>
        export default async () => {
          return {
            data: {
              result:"-",
              bubbledEventCount: 0,
              directEventCount: 0
            },
            proto: {
              handleDirectChildEvent(event) {
                this.directEventCount++;
                this.result = event.data;
              },
              handleChildEventFromComponent(event) {
                this.bubbledEventCount++;
                this.result = event.data;
              },
            }
          };
        };
      </script>
    </template>
  </code>

    <template component="">
      <style>
        :host {

      <button on:click="triggerNonBubblingEvent">Trigger Non-Bubbling Event</button>
      <button on:click="triggerBubblingEvent">Trigger Bubbling Event</button>
      <script>
        export default async () => {
          return {
            tag: "bubble-component",
            proto: {
              triggerNonBubblingEvent() {
                // Non-bubbling event, only captured by direct listeners
                this.emit('child-event', {
                  data: { type: 'non-bubbling', message: 'Non-bubbling event triggered', timestamp: Date.now() },
                  bubbles: false
                });
              },
              triggerBubblingEvent() {
                // Bubbling event, propagates up to parent elements
                this.emit('child-event', {
                  data: { type: 'bubbling', message: 'Bubbling event triggered', timestamp: Date.now() },
                  bubbles: true
                });
              }
            }
          };
        };
      </script>
    </template>
  </code>

        <h2>composed - Penetrates Shadow DOM boundaries</h2>
        <p>The <code>composed</code> property controls whether events can cross the Shadow DOM boundary. This is particularly important for Web Components development, with a default value of <code>false</code>.</p>
        <h3>Detailed Explanation of Penetration Mechanics</h3>
        <ul>
          <li><strong>Shadow DOM isolation</strong>: By default, events cannot cross Shadow DOM boundaries </li>
          <li><strong>Enable propagation</strong>: Setting <code>composed: true</code> allows events to pass through Shadow DOM boundaries </li>
          <li><strong>Use case</strong>: When a component needs to dispatch events to its host environment, <code>composed: true</code> must be set</li>
        </ul>
