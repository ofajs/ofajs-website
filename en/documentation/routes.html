        <h1>Single Page Application</h1>
        <p>A single-page application binds the <code>o-app</code> component to the browser’s address bar, keeping the web URL synchronized with the in-app page path. After enabling the single-page application:</p>
        <ul>
          <li>Refreshing the page preserves the current route state</li>
          <li>Copying the URL from the address bar and opening it in another browser or tab also restores the application state</li>
          <li>The browser&#39;s forward/back buttons work properly</li>
        </ul>
        <h2>Basic Usage</h2>
        <p>Wrap the <code>o-app</code> component with the official <code>o-router</code> component to implement a single-page application.</p>

        <h2>fix-body attribute</h2>
        <p>After adding the <code>fix-body</code> attribute, <code>o-router</code> will automatically reset the styles of <code>html</code> and <code>body</code>, removing the default margin and padding.</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">o-router</span> <span class="hljs-attr">fix-body</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">o-app</span> <span class="hljs-attr">src</span>=<span class="hljs-string">&quot;./app-config.js&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-app</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">o-router</span>&gt;</span></code></pre>
        <p>This is particularly useful in the following scenarios:- <code>o-app</code> needs to fill the viewport completely </p>
        <ul>
          <li>When the app is the only content of the page</li>
        </ul>

        <h2>How It Works</h2>
        <p>Single-page application implemented using browser-based Hash mode:</p>
        <ol>
          <li>When the page switches inside the app, <code>o-router</code> automatically updates the hash in the address bar (e.g., <code>#/about.html</code>).</li>
          <li>When users refresh the page or visit via URL, <code>o-router</code> reads the hash and loads the corresponding page.</li>
          <li>The browser’s forward/back buttons trigger hash changes, thereby controlling in-app navigation.</li>
        </ol>
        <h2>URL Change Examples</h2>
        <p>Assume the application has two pages, <code>home.html</code> and <code>about.html</code>.</p>
        <table>
          <thead>
            <tr>
              <th>User Action</th>
              <th>Address Bar Change</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Open App</td>
              <td><code>index.html</code> → <code>index.html#/home.html</code></td>
            </tr>
            <tr>
              <td>Navigate to About Page</td>
              <td><code>index.html#/home.html</code> → <code>index.html#/about.html</code></td>
            </tr>
            <tr>
              <td>Click Back</td>
              <td><code>index.html#/about.html</code> → <code>index.html#/home.html</code></td>
            </tr>
            <tr>
              <td>Refresh Page</td>
              <td>Keep current hash unchanged</td>
            </tr>
          </tbody>
        </table>
        <ul>
          <li>A single-page application can only work with <strong>one</strong> <code>o-app</code> component.</li>
        </ul>

            },
            detached() {
