        <h1>Routing and Navigation</h1>
        <p>In-app page navigation is a core feature of single-page applications. This chapter introduces how to use programmatic navigation, manage routing history, and listen for route changes.</p>
        <h2>allowForward - Forward Function</h2>
        <p>By default, the application only supports backward navigation. After setting <code>allowForward</code> to <code>true</code> in <code>app-config.js</code>, the forward function of the application can be enabled.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// app-config.js</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> allowForward = <span class="hljs-literal">true</span>;</code></pre>
        <p>When enabled:</p>
        <ul>
          <li>The user can navigate using the browser&#39;s forward/back buttons</li>
          <li>The application&#39;s <code>forward()</code> method works correctly</li>
        </ul>
        <h2>Programmatic Navigation</h2>
        <p>In addition to links that use the <code>olink</code> attribute, navigation methods can also be called in JavaScript.</p>
        <blockquote>
          <p><strong>Important Notes</strong>:</p>
          <ul>
            <li>The <code>goto</code>, <code>replace</code>, and <code>back</code> methods are available on both <strong>page instance</strong> and <strong>app instance</strong></li>
            <li>The <code>forward</code> method is only available on the <strong>app instance</strong></li>
            <li>In pages: use <code>this.goto()</code> or <code>this.app.goto()</code></li>
            <li>In components: use <code>this.app.goto()</code> (must be called via the app instance)</li>
          </ul>
          <p><strong>Path Relativity Notes</strong>:</p>
          <ul>
            <li>When using <code>goto</code> or <code>replace</code> on a <strong>page module</strong>, the path is relative to the address of the <strong>current page module</strong></li>
            <li>When using <code>goto</code> or <code>replace</code> on the <strong>app instance</strong>, the path is relative to the address of the <strong>current application navigation</strong></li>
          </ul>
        </blockquote>
        <h3>goto - Page Navigation</h3>
        <p>Navigate to specified page and add to history:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// Navigate to specified page</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-title function_">goto</span>(<span class="hljs-string">&quot;./about.html&quot;</span>);

<span class="hljs-comment">// Navigate with parameters</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-title function_">goto</span>(<span class="hljs-string">&quot;./detail.html?id=123&quot;</span>);</code></pre>
        <h3>replace - Replace Page</h3>
        <p>Replace the current page without adding to the history:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// Replace current page</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-title function_">replace</span>(<span class="hljs-string">&quot;./login.html&quot;</span>);</code></pre>
        <p>Often used for redirection after login to prevent users from clicking the back button and returning to the login page.</p>
        <h3>back - back</h3>
        <p>Back to previous page:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-variable language_">this</span>.<span class="hljs-title function_">back</span>();</code></pre>
        <h3>forward - forward</h3>
        <p>Go to the next page（requires setting <code>allowForward: true</code>）：</p>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// Called in the page or component</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-property">app</span>.<span class="hljs-title function_">forward</span>();</code></pre>
        <blockquote>
          <p><strong>Note</strong>：<code>forward</code> method must be called on the application instance（<code>app</code>），not on the page instance。For example use <code>this.app.forward()</code> instead of <code>this.forward()</code>。</p>
        </blockquote>
        <h3>Comparison of Navigation Methods</h3>
        <table>
          <thead>
            <tr>
              <th>Method</th>
              <th>History Record</th>
              <th>Use Case</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><code>goto</code></td>
              <td>Add new record</td>
              <td>Normal page navigation</td>
            </tr>
            <tr>
              <td><code>replace</code></td>
              <td>Replace current record</td>
              <td>Post-login navigation, redirect</td>
            </tr>
            <tr>
              <td><code>back</code></td>
              <td>Go back to previous</td>
              <td>Back operation</td>
            </tr>
            <tr>
              <td><code>forward</code></td>
              <td>Go forward to next</td>
              <td>Forward operation (needs to be enabled)</td>
            </tr>
          </tbody>
        </table>
        <h3>Get Routing History</h3>
        <p>Get all routing history through the <code>routers</code> attribute:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> history = app.<span class="hljs-property">routers</span>;
<span class="hljs-comment">// Return format: [{ src: &quot;./page1.html&quot; }, { src: &quot;./page2.html&quot; }, ...]</span></code></pre>
        <h3>Get Current Page</h3>
        <p>Use the <code>current</code> property to obtain the current page instance:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> currentPage = app.<span class="hljs-property">current</span>;
<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;Current page:&quot;</span>, currentPage.<span class="hljs-property">src</span>);</code></pre>
        <h3>Routing History Example</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> proto = {
  <span class="hljs-keyword">get</span> <span class="hljs-title function_">canGoBack</span>() {
    <span class="hljs-keyword">return</span> <span class="hljs-variable language_">this</span>.<span class="hljs-property">routers</span> &amp;&amp; <span class="hljs-variable language_">this</span>.<span class="hljs-property">routers</span>.<span class="hljs-property">length</span> &gt; <span class="hljs-number">1</span>;
  },

  <span class="hljs-keyword">get</span> <span class="hljs-title function_">canGoForward</span>() {
    <span class="hljs-comment">// Needs to be used in conjunction with allowForward</span>
    <span class="hljs-keyword">return</span> <span class="hljs-variable language_">this</span>.<span class="hljs-property">routers</span> &amp;&amp; <span class="hljs-variable language_">this</span>.<span class="hljs-property">currentIndex</span> &lt; <span class="hljs-variable language_">this</span>.<span class="hljs-property">routers</span>.<span class="hljs-property">length</span> - <span class="hljs-number">1</span>;
  },

  <span class="hljs-keyword">get</span> <span class="hljs-title function_">currentPath</span>() {
    <span class="hljs-keyword">return</span> <span class="hljs-variable language_">this</span>.<span class="hljs-property">current</span>?.<span class="hljs-property">src</span> || <span class="hljs-string">&quot;&quot;</span>;
  },
};</code></pre>
        <h2>Listening to Route Changes</h2>
        <p>Respond to route changes by listening to the <code>router-change</code> event.</p>
        <h3>Basic Usage</h3>
        <pre><code class="hljs language-javascript">app.<span class="hljs-title function_">on</span>(<span class="hljs-string">&quot;router-change&quot;</span>, <span class="hljs-function">(<span class="hljs-params">e</span>) =&gt;</span> {
  <span class="hljs-keyword">const</span> { data } = e;
  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;Route change:&quot;</span>, data.<span class="hljs-property">name</span>);
  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;Page address:&quot;</span>, data.<span class="hljs-property">src</span>);
});</code></pre>
        <h3>Event Data</h3>
        <p>The data object of the <code>router-change</code> event contains:</p>
        <table>
          <thead>
            <tr>
              <th>Property</th>
              <th>Description</th>
              <th>Possible Values</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><code>name</code></td>
              <td>Navigation type</td>
              <td><code>goto</code>, <code>replace</code>, <code>forward</code>, <code>back</code></td>
            </tr>
            <tr>
              <td><code>src</code></td>
              <td>Target page address</td>
              <td>Page path</td>
            </tr>
          </tbody>
        </table>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> ready = <span class="hljs-keyword">function</span> (<span class="hljs-params"></span>) {
  <span class="hljs-comment">// Listen to route changes</span>
  <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">on</span>(<span class="hljs-string">&quot;router-change&quot;</span>, <span class="hljs-function">(<span class="hljs-params">e</span>) =&gt;</span> {
    <span class="hljs-keyword">const</span> { name, src } = e.<span class="hljs-property">data</span>;

    <span class="hljs-comment">// Log page visit</span>
    <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">`[<span class="hljs-subst">${name}</span>] Navigate to: <span class="hljs-subst">${src}</span>`</span>);

    <span class="hljs-comment">// Update page title</span>
    <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">updateTitle</span>(src);

    <span class="hljs-comment">// Send statistics data</span>
    <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">trackPageView</span>(src);
  });
};

<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> proto = {
  <span class="hljs-title function_">updateTitle</span>(<span class="hljs-params">src</span>) {
    <span class="hljs-keyword">const</span> titles = {
      <span class="hljs-string">&quot;home.html&quot;</span>: <span class="hljs-string">&quot;Home&quot;</span>,
      <span class="hljs-string">&quot;about.html&quot;</span>: <span class="hljs-string">&quot;About Us&quot;</span>,
      <span class="hljs-string">&quot;contact.html&quot;</span>: <span class="hljs-string">&quot;Contact Us&quot;</span>,
    };

    <span class="hljs-keyword">const</span> pageName = src.<span class="hljs-title function_">split</span>(<span class="hljs-string">&quot;/&quot;</span>).<span class="hljs-title function_">pop</span>();
    <span class="hljs-variable language_">document</span>.<span class="hljs-property">title</span> = titles[pageName] || <span class="hljs-string">&quot;App&quot;</span>;
  },

  <span class="hljs-title function_">trackPageView</span>(<span class="hljs-params">src</span>) {
    <span class="hljs-comment">// Send page view statistics</span>
    <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;Statistics page view:&quot;</span>, src);
  },
};</code></pre>
        <h2>Page Navigation Guards</h2>
        <p>By combining route monitoring, navigation guard functionality can be implemented:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> ready = <span class="hljs-keyword">function</span> (<span class="hljs-params"></span>) {
  <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">on</span>(<span class="hljs-string">&quot;router-change&quot;</span>, <span class="hljs-function">(<span class="hljs-params">e</span>) =&gt;</span> {
    <span class="hljs-keyword">const</span> { src } = e.<span class="hljs-property">data</span>;

    <span class="hljs-comment">// Check if login is required</span>
    <span class="hljs-keyword">if</span> (<span class="hljs-variable language_">this</span>.requiresAuth(src) &amp;&amp; !<span class="hljs-variable language_">this</span>.<span class="hljs-title function_">isLoggedIn</span>()) {
      e.<span class="hljs-title function_">preventDefault</span>();
      <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">goto</span>(<span class="hljs-string">&quot;./login.html&quot;</span>);
    }
  });
};

<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> proto = {
  <span class="hljs-title function_">requiresAuth</span>(<span class="hljs-params">src</span>) {
    <span class="hljs-keyword">const</span> authPages = [<span class="hljs-string">&quot;profile.html&quot;</span>, <span class="hljs-string">&quot;settings.html&quot;</span>];
    <span class="hljs-keyword">return</span> authPages.<span class="hljs-title function_">some</span>(<span class="hljs-function">(<span class="hljs-params">page</span>) =&gt;</span> src.<span class="hljs-title function_">includes</span>(page));
  },

  <span class="hljs-title function_">isLoggedIn</span>(<span class="hljs-params"></span>) {
    <span class="hljs-keyword">return</span> !!<span class="hljs-variable language_">this</span>.<span class="hljs-property">globalData</span>?.<span class="hljs-property">user</span>;
  },
};</code></pre>
