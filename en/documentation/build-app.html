      <article class="markdown-body">
        <h1>Production and Deployment</h1>
        <p>Projects developed with ofa.js can be deployed directly to a static server for use.</p>
        <h2>Development Environment</h2>
        <p>You can develop using the official <a href="https://core.noneos.com/?redirect=studio" target="_blank">ofa Studio</a>, which provides one-click project creation and preview.</p>
        <p>You can also set up your own static server:</p>
        <ul>
          <li>Use static server software such as Nginx or Apache</li>
          <li>Use Node.js's <a href="https://www.npmjs.com/package/http-server" target="_blank">http-server</a> module</li>
          <li>Directly use the static server plugin of the editor to preview</li>
        </ul>
        <h2>Production Environment</h2>
        <h3>Export Project</h3>
        <p>If you are using a project built with <a href="https://core.noneos.com/?redirect=studio" target="_blank">ofa Studio</a>, simply use the export function provided by the tool.</p>
        <p>If it is a manually built project, you can directly deploy the project folder to a static server, keeping the same pattern as the development environment.</p>
        <h3>Compression and Obfuscation</h3>
        <p>Production environments typically require the use of compression and obfuscation tools to reduce file size and improve loading speed. You can use <a href="https://terser.org/docs/cli-usage/" target="_blank">Terser CLI</a> for compression and obfuscation.</p>
        <p>If you prefer not to use the command-line tool, you can use <a href="https://builder.ofajs.com/" target="_blank">ofa build</a> to compress and obfuscate files online. The tool is currently in beta and will be integrated into ofa Studio later.</p>
      </article>

      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
