      <article class="markdown-body">
        <h1>Create Your First App</h1>
        <p>If you don't want to go through other cumbersome steps and prefer to use ofa.js to develop the entire project directly, you can leverage the online build and preview tool provided by the official ofa.js. This allows you to create your first local application with just one click in the browser.</p>
        <p>This tool is hosted on a static server, and all operations are completed locally in the browser without requiring any connection to dynamic servers. Please feel free to use it with confidence.</p>
        <h2>Startup Procedure</h2>
        <p>Click <a href="https://core.noneos.com?redirect=studio" target="_blank">OFA Studio</a> to open the ofa.js build tool. This tool uses the browser's native file system directly, with no installation or configuration required. Follow the steps below:</p>
        <ol>
          <li>Visit the website and wait for the program to load</li>
          <li>Click the "Create New Project" button</li>
          <li>Select the "ofa.js App" type, enter the project name, and then select a local directory</li>
          <li>Click "Allow" on all items in the permission confirmation dialog that appears, then click "Confirm Creation"</li>
          <li>Wait a few seconds, and the project will be initialized in the selected directory</li>
        </ol>
        <p>After the project initialization is complete, you can open the directory with editors such as <a href="https://code.visualstudio.com/" target="_blank">VSCode</a> to start writing application code.</p>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
