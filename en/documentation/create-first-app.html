      <article class="markdown-body">
        <h1>Creating the First Application</h1>
        <p>If you don’t want to fuss with cumbersome steps and prefer to build the whole project directly with ofa.js, you can use the official online build-and-preview tool provided by ofa.js to create your first local app in the browser with one click.</p>
        <p>The tool is hosted on a static server; all operations are performed locally in the browser, with no need to connect to a dynamic server—feel free to use it with confidence.</p>
        <h2>Launch the Program</h2>
        <p>Click <a href="https://core.noneos.com?redirect=studio" target="_blank">OFA Studio</a> to open the ofa.js construction tool. This tool directly uses the browser's local file system, no installation or configuration required. Follow these steps:</p>
        <ol>
          <li>Visit the website and wait for the program to load</li>
          <li>Click the "Create New Project" button</li>
          <li>Select the "ofa.js App" type, enter the project name, and then choose a local directory</li>
          <li>In the permission confirmation dialog that pops up, click Allow for all requests, then click "Confirm Creation"</li>
          <li>After a few seconds, the project will be initialized in the selected directory</li>
        </ol>
        <p>After project initialization is complete, you can open the directory with editors such as <a href="https://code.visualstudio.com/" target="_blank">VSCode</a> and start writing application code.</p>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
