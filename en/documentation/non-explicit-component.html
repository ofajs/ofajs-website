        <h1>Non-explicit Components</h1>
        <p>ofa.js has two built-in implicit components:</p>
        <ul>
          <li>Conditional rendering components: <code>x-if</code>、<code>x-else-if</code>、<code>x-else</code></li>
          <li>Fill component: <code>x-fill</code></li>
        </ul>
        <p>The functions of these two components are respectively the same as those of the <code>o-if</code> and <code>o-fill</code> components, but they themselves are not rendered to the DOM; instead, their internal elements are directly rendered to the corresponding area.</p>
        <p>for example:</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
    <span class="hljs-selector-class">.container</span> &gt; <span class="hljs-selector-class">.item</span>{
        <span class="hljs-attribute">color</span>:red;
    }
</span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">div</span> <span class="hljs-attr">class</span>=<span class="hljs-string">"container"</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">o-if</span> <span class="hljs-attr">:value</span>=<span class="hljs-string">"true"</span>&gt;</span>
        <span class="hljs-comment">&lt;!-- The style is not red, because the o-if component itself exists in the DOM --&gt;</span>
        <span class="hljs-tag">&lt;<span class="hljs-name">div</span> <span class="hljs-attr">class</span>=<span class="hljs-string">"item"</span>&gt;</span>1<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span>
    <span class="hljs-tag">&lt;/<span class="hljs-name">o-if</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">x-if</span> <span class="hljs-attr">:value</span>=<span class="hljs-string">"true"</span>&gt;</span>
        <span class="hljs-comment">&lt;!-- The style is red, because the x-if component does not render to the DOM --&gt;</span>
        <span class="hljs-tag">&lt;<span class="hljs-name">div</span> <span class="hljs-attr">class</span>=<span class="hljs-string">"item"</span>&gt;</span>2<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span>
    <span class="hljs-tag">&lt;/<span class="hljs-name">x-if</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span></code></pre><o-playground name="Non-explicit Component" style="--editor-height: 500px">

        <h2>x-if Conditional Rendering Component</h2>
        <p><code>x-if</code> has exactly the same functionality as <a href="./conditional-rendering.html" olink="">o-if</a>, used to decide whether to render content based on the truthiness of a conditional expression. The difference is that <code>x-if</code> itself does not exist as a DOM element; its inner content will be directly rendered into the parent container.</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">div</span> <span class="hljs-attr">class</span>=<span class="hljs-string">"container"</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">x-if</span> <span class="hljs-attr">:value</span>=<span class="hljs-string">"isLoggedIn"</span>&gt;</span>
        <span class="hljs-tag">&lt;<span class="hljs-name">p</span>&gt;</span>Welcome back, user!<span class="hljs-tag">&lt;/<span class="hljs-name">p</span>&gt;</span>
    <span class="hljs-tag">&lt;/<span class="hljs-name">x-if</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span></code></pre>
        <p><code>x-if</code> can also be used together with <code>x-else-if</code> and <code>x-else</code>:</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">div</span> <span class="hljs-attr">class</span>=<span class="hljs-string">"container"</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">x-if</span> <span class="hljs-attr">:value</span>=<span class="hljs-string">"role === 'admin'"</span>&gt;</span>
        <span class="hljs-tag">&lt;<span class="hljs-name">p</span>&gt;</span>Admin Panel<span class="hljs-tag">&lt;/<span class="hljs-name">p</span>&gt;</span>
    <span class="hljs-tag">&lt;/<span class="hljs-name">x-if</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">x-else-if</span> <span class="hljs-attr">:value</span>=<span class="hljs-string">"role === 'user'"</span>&gt;</span>
        <span class="hljs-tag">&lt;<span class="hljs-name">p</span>&gt;</span>User Center<span class="hljs-tag">&lt;/<span class="hljs-name">p</span>&gt;</span>
    <span class="hljs-tag">&lt;/<span class="hljs-name">x-else-if</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">x-else</span>&gt;</span>
        <span class="hljs-tag">&lt;<span class="hljs-name">p</span>&gt;</span>Please log in<span class="hljs-tag">&lt;/<span class="hljs-name">p</span>&gt;</span>
    <span class="hljs-tag">&lt;/<span class="hljs-name">x-else</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span></code></pre>
        <h2>x-fill fill component</h2>
        <p><code>x-fill</code> has exactly the same functionality as <a href="./list-rendering.html" olink="">o-fill</a>, used to render array data into multiple DOM elements. Similar to <code>x-if</code>, <code>x-fill</code> itself will not be rendered into the DOM; its internal template will be directly rendered into the parent container.</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">ul</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">x-fill</span> <span class="hljs-attr">:value</span>=<span class="hljs-string">"items"</span>&gt;</span>
        <span class="hljs-tag">&lt;<span class="hljs-name">li</span>&gt;</span>{{$data.name}}<span class="hljs-tag">&lt;/<span class="hljs-name">li</span>&gt;</span>
    <span class="hljs-tag">&lt;/<span class="hljs-name">x-fill</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">ul</span>&gt;</span></code></pre>
        <p>Example of using named templates:</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">ul</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">x-fill</span> <span class="hljs-attr">name</span>=<span class="hljs-string">"li"</span> <span class="hljs-attr">:value</span>=<span class="hljs-string">"items"</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">x-fill</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">ul</span>&gt;</span>

<span class="hljs-tag">&lt;<span class="hljs-name">template</span> <span class="hljs-attr">name</span>=<span class="hljs-string">"li"</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">li</span> <span class="hljs-attr">class:active</span>=<span class="hljs-string">"$data.active"</span>&gt;</span>
        <span class="hljs-tag">&lt;<span class="hljs-name">a</span> <span class="hljs-attr">attr:href</span>=<span class="hljs-string">"$data.href"</span>&gt;</span>{{$data.name}}<span class="hljs-tag">&lt;/<span class="hljs-name">a</span>&gt;</span>
    <span class="hljs-tag">&lt;/<span class="hljs-name">li</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">template</span>&gt;</span></code></pre>
        <h2>Performance Notes</h2>
        <p>In addition to functional differences, the rendering performance of non-explicit components will be <strong>much worse</strong> than that of explicit components (<code>o-if</code>, <code>o-fill</code>). This is because non-explicit components are not actually rendered into the DOM, requiring additional simulated rendering logic to handle the positioning and updating of internal elements.</p>
        <p>In addition, non-explicit components may introduce subtle bugs: since they do not actually enter the DOM, operations that depend on DOM structure (such as event binding, style calculation, or third-party library queries) may fail or behave unexpectedly.</p>
        <p>Therefore, it is recommended to <strong>prioritize explicit components</strong> (<code>o-if</code>, <code>o-else-if</code>, <code>o-else</code>, <code>o-fill</code>), and only use non-explicit components in specific scenarios.</p>
        <h2>Use Cases</h2>
        <p>Although non-explicit components have poor performance, they may be used in the following scenarios:</p>
        <ol>
          <li><strong>Avoid extra DOM levels</strong>: When you don’t want <code>o-if</code> or <code>o-fill</code> elements to become part of the DOM structure </li>
          <li><strong>Style inheritance</strong>: When you need inner elements to inherit the parent container’s styles directly, without interference from intermediate component elements </li>
          <li><strong>CSS selector constraints</strong>: When you must use parent-child selectors (e.g., <code>.container &gt; .item</code>) for precise styling but don’t want an extra wrapper element in between</li>
        </ol>
      </article>
