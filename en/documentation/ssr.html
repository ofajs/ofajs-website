        <h1>SSR and Isomorphic Rendering</h1>
        <blockquote>
          <p>If you are not clear about what SSR is, it means you don't need it yet. You can skip this chapter and come back to learn when you need it in the future.</p>
        </blockquote>
        <h2>Isomorphic Rendering</h2>
        <p>To simultaneously retain the smooth CSR experience, better machine crawler recognition (SEO), and greater freedom in backend language choice, ofa.js offers a unique isomorphic rendering mode—Symphony Client-Server Rendering.</p>
        <blockquote>
          <p>To learn about the specific definitions and differences of CSR / SSR / SSG, please directly read the chapter at the end of this article.</p>
        </blockquote>
        <p>The core concept of isomorphic rendering is:- Render initial page content on the server side to ensure SEO and fast first-screen loading</p>
        <ul>
          <li>Handle routing on the client side to maintain the smooth user experience of CSR</li>
          <li>Applicable to any server-side environment, enabling true isomorphic rendering</li>
        </ul>
        <h3>Principles of Isomorphic Rendering Implementation</h3>
        <p>The isomorphic rendering mode of ofa.js is based on the following mechanism:</p>
        <ol>
          <li>The server generates a complete HTML page with a universal runtime structure</li>
          <li>The client loads the CSR runtime engine</li>
          <li>Automatically identifies the current runtime environment and determines the rendering strategy</li>
        </ol>

        <p>So, you can use any development language (Go, Java, PHP, Nodejs, Python, etc.), any backend template rendering engine (such as Go's <code>html/template</code>, PHP's Smarty/Twig/Blade, etc.), and embed the isomorphic rendering code structure of ofa.js into the template to achieve SSR.</p>

        <p><code>scsr.mjs</code> is an isomorphic rendering engine provided by ofa.js. It automatically determines the rendering strategy based on the current page's running state, ensuring the best user experience in any environment.</p>
        <p>Similarly, SSG can also apply this structure to implement static site generation.</p>
        <h2>Differences between ofa.js and SSR and Other Frontend Frameworks</h2>
        <p>ofa.js's Symphony Client-Server Rendering (hereinafter referred to as SCSR) is essentially also an SSR mode.</p>
        <p>Compared with SSR solutions of existing front-end frameworks such as Vue, React, and Angular, the biggest advantage of ofa.js is that it <strong>does not require binding to Node.js</strong>. This means that any backend template rendering engine (such as PHP's Smarty, Python's Jinja2, Java's Thymeleaf, etc.) can easily integrate ofa.js to implement SSR.</p>
        <h2>Overview of Web Page Rendering Methods</h2>
        <p>Modern web applications mainly have four rendering methods: traditional server-side template engine rendering, CSR (Client Side Rendering), SSR (Server Side Rendering), and SSG (Static Site Generation). Each method has its own advantages and applicable scenarios.</p>
        <h3>Traditional Server-Side Template Engine Rendering</h3>
        <p>In many web products, server-side template engines remain the most mainstream method for page rendering. Backend languages such as Go and PHP use built-in or third-party template engines (e.g., Go’s <code>html/template</code>, PHP’s Smarty/Twig/Blade, etc.) to inject dynamic data into HTML templates, generating a complete HTML page in one go and returning it to the client.</p>
        <p><strong>Advantages：</strong>- SEO-friendly, fast first-screen loading</p>
        <ul>
          <li>Server-side control, higher security</li>
          <li>Lower technical stack requirements for the team; backend developers can complete development independently</li>
        </ul>
        <p><strong>Disadvantages:</strong>- Poor user experience, each interaction requires a page refresh</p>
        <ul>
          <li>High server load</li>
          <li>High front-end and back-end coupling, which is not conducive to division of labor and collaboration</li>
        </ul>
        <h3>CSR (Client-Side Rendering)</h3>
        <p>In CSR mode, page content is completely rendered by client-side JavaScript. ofa.js's <a href="./routes.html" olink="">single-page application</a> is a typical CSR implementation. This approach provides a smooth user experience, allowing all interactions to be completed without page navigation. Single-page applications (SPA) developed using React or Vue with their corresponding routing libraries (such as React Router or Vue Router) are all typical CSR implementations.</p>
        <p><strong>Advantages：</strong>- Smooth user experience, page switching without refresh</p>
        <ul>
          <li>Strong client-side processing capability, fast response</li>
        </ul>
        <p><strong>Disadvantages:</strong>- detrimental to SEO, search engines have difficulty indexing the content</p>
        <h3>SSR (Server-Side Rendering)</h3>
        <p>While preserving the fluid CSR experience, the page is instead rendered in real time by the server: when a user initiates a request, the server instantly generates the complete HTML and returns it, achieving true server-side rendering.</p>
        <p><strong>Advantages：</strong>- SEO-friendly, fast first-screen loading</p>
        <ul>
          <li>Supports dynamic content</li>
        </ul>
        <p><strong>Disadvantages:</strong>- Server pressure is high</p>
        <ul>
          <li>Typically requires Node.js environment as runtime, or at least a Node.js middleware layer</li>
          <li>Still requires subsequent client activation for full interaction</li>
        </ul>
        <h3>SSG (Static Site Generation)</h3>
        <p>During the build phase, pre-render all pages into static HTML files, which can be directly served to users by the server after deployment.</p>
        <p><strong>Advantages：</strong>- Fast initial load speed, SEO-friendly</p>
        <ul>
          <li>Low server load, stable performance</li>
          <li>High security</li>
        </ul>
        <p><strong>Disadvantages:</strong>- Dynamic content updates are difficult</p>
        <ul>
          <li>Build time increases with the number of pages</li>
        </ul>

          const {
            init,
