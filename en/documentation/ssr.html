        <h1>SSR and Isomorphic Rendering</h1>
        <p>If you don't know what SSR is, it means you don't need it yet. You can skip this chapter and come back to study it later when you need it.</p>
        <h2>Isomorphic Rendering</h2>
        <p>To simultaneously retain the smooth CSR experience, achieve better crawler recognition for SEO, and enjoy more freedom in choosing backend development languages, ofa.js provides a unique isomorphic rendering mode called Symphony Client-Server Rendering.</p>
        <blockquote>
          <p>To understand the specific definitions and differences between CSR, SSR, and SSG, please read the final section of this article.</p>
        </blockquote>
        <p>The core concept of isomorphic rendering is:- Render the initial page on the server for SEO and fast first-screen load </p>
        <ul>
          <li>Let the client take over routing afterward, preserving the smooth UX of CSR </li>
          <li>Works with any server stack, enabling true isomorphic rendering</li>
        </ul>
        <h3>Implementation Principles of Isomorphic Rendering</h3>
        <p>The isomorphic rendering mode of ofa.js is based on the following mechanisms:</p>
        <ol>
          <li>Server generates a complete HTML page with a universal runtime structure</li>
          <li>Client loads CSR runtime engine</li>
          <li>Automatically detects current runtime environment and decides rendering strategy</li>
        </ol>

        <p>So, you can use any development language (Go, Java, PHP, Node.js, Python, etc.) and any backend template rendering engine (such as Go's <code>html/template</code>, PHP's Smarty/Twig/Blade, etc.) to embed the isomorphic rendering code structure of ofa.js into the template, thereby achieving SSR.</p>

        <p>To implement the isomorphic rendering mode, simply use the following universal template structure on the server side:</p>

        <p><strong>Note:</strong> The HTML returned by the server must have the correct HTTP header set: <code>Content-Type: text/html; charset=UTF-8</code></p>
        <p><code>scsr.mjs</code> is the isomorphic rendering engine provided by ofa.js; it automatically selects the rendering strategy based on the current page’s runtime state, ensuring an optimal user experience in any environment.</p>
        <p>Similarly, SSG can also use this structure to implement static site generation.</p>
        <h2>Differences between ofa.js, SSR, and other front-end frameworks</h2>
        <p>ofa.js's Symphony Client-Server Rendering (SCSR) is essentially also an SSR pattern.</p>
        <p>Compared to SSR solutions of existing front-end frameworks like Vue, React, and Angular, the biggest advantage of ofa.js is that <strong>it does not require mandatory binding to Node.js</strong>. This means that any backend template rendering engine (such as Smarty for PHP, Jinja2 for Python, Thymeleaf for Java, etc.) can easily integrate ofa.js to achieve SSR.</p>
        <h2>Overview of Web Rendering Methods</h2>
        <p>Modern web applications mainly have four rendering methods: traditional server-side template engine rendering, CSR (Client Side Rendering), SSR (Server Side Rendering), and SSG (Static Site Generation). Each method has its own advantages and applicable scenarios.</p>
        <h3>Traditional Server-Side Template Engine Rendering</h3>
        <p>Among the many Web solutions, server-side template engines remain the most mainstream way to render pages. Back-end languages like Go and PHP rely on built-in or third-party template engines—such as Go’s html/template or PHP’s Smarty/Twig/Blade—to inject dynamic data into HTML templates, generating a complete HTML page in one pass and returning it to the client.</p>
        <p><strong>Pros:</strong>- SEO-friendly with fast first-screen loading</p>
        <ul>
          <li>Server-side control, offering higher security</li>
          <li>Lower technical stack requirements for the team, allowing backend developers to complete development independently</li>
        </ul>
        <p><strong>Disadvantages:</strong>- Poor user experience; each interaction requires a page refresh</p>
        <ul>
          <li>High server-side load</li>
          <li>High coupling between front-end and back-end, hindering division of labor and collaboration</li>
        </ul>
        <h3>CSR (Client-Side Rendering)</h3>
        <p>In CSR mode, the page content is entirely rendered by browser-side JavaScript. The <a href="./routes.html" olink="">single-page application</a> of ofa.js is a typical CSR implementation. This approach provides a smooth user experience, allowing all interactions to be completed without page navigation. Single-page applications (SPA) developed with React or Vue using their corresponding routing libraries (such as React Router or Vue Router) are all typical CSR implementations.</p>
        <p><strong>Pros:</strong>- Smooth user experience with seamless page transitions</p>
        <ul>
          <li>Strong client-side processing power and rapid response</li>
        </ul>
        <p><strong>Disadvantages:</strong>- Not conducive to SEO; search engines struggle to index the content</p>
        <h3>SSR (Server-Side Rendering)</h3>
        <p>While preserving the fluid CSR experience, the page is now rendered in real time by the server: upon a user request, the server instantly generates the full HTML and returns it, achieving true server-side rendering.</p>
        <p><strong>Pros:</strong>- SEO-friendly with fast first-screen loading</p>
        <ul>
          <li>Supports dynamic content</li>
        </ul>
        <p><strong>Disadvantages:</strong>- High server load</p>
        <ul>
          <li>Typically requires a Node.js environment as a runtime or at least a Node.js middleware layer</li>
          <li>Still requires subsequent client-side activation to achieve full interactivity</li>
        </ul>
        <h3>SSG (Static Site Generation)</h3>
        <p>During the build phase, all pages are pre-rendered as static HTML files, which can be served directly to users by the server after deployment.</p>
        <p><strong>Pros:</strong>- Fast first-load speed, SEO-friendly</p>
        <ul>
          <li>Low server load, stable performance</li>
          <li>High security</li>
        </ul>
        <p><strong>Disadvantages:</strong>- Difficult to update dynamic content</p>
        <ul>
          <li>Build time increases with the number of pages</li>
        </ul>

          const {
