<body>
  <o-app src="../../js/app-config.js">
    <template page>
      <link rel="stylesheet" href="../../css/github-markdown.css" />
      <link rel="stylesheet" href="../../css/hljs.css" />
      <l-m src="../../comps/center-block.html"></l-m>
      <l-m src="../../comps/article-code.html"></l-m>
      <l-m src="https://playground.ofajs.com/comps/o-playground/o-playground.html"></l-m>
      <style>
        :host {
          display: block;
          height: 100%;
          box-sizing: border-box;
          overflow: auto;
        }
      </style>
      <link rel="stylesheet" href="../../css/page.css" />
      <article class="markdown-body">
        <h1>Template Rendering</h1>
        <p>ofa.js provides a powerful template rendering engine with rich template syntax, enabling developers to build applications quickly. Let&#39;s start with the most commonly used text rendering.</p>
        <h2>Page Data Binding</h2>
        <p>In ofa.js, every page has a <code>data</code> object where you can define variables to be used within the page. When the page starts rendering, the data in the <code>data</code> object is automatically bound to the template, and the template renders the corresponding variable values using the <code>{{variableName}}</code> syntax.</p>
        <h2>Text Rendering</h2>
        <p>Text rendering is the most basic rendering method. You can use the <code>{{variableName}}</code> syntax in templates to display the value of the corresponding variable in the <code>data</code> object.</p>
        <o-playground name="Text Rendering Example" style="--editor-height: 500px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <p>{{val}}</p>
      <script>
        export default async () => {
          return {
            data: {
              val: "Hello ofa.js Demo Code",
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Rendering HTML Content</h2>
        <p>By adding the <code>:html</code> directive to an element, the HTML string in the corresponding variable is parsed and safely inserted into the element, enabling effortless dynamic rich-text rendering or embedding of external HTML fragments.</p>
        <o-playground name="Render HTML Content Example" style="--editor-height: 500px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <p :html="val"></p>
      <script>
        export default async () => {
          return {
            data: {
              val: '<span style="color:green;">Hello ofa.js Demo Code</span>',
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
