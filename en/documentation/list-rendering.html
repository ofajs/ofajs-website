        <h1>List Rendering</h1>
        <p>In ofa.js, the <code>o-fill</code> component provides powerful list rendering capabilities, efficiently rendering array data into multiple similar elements. It supports two main usage methods: direct rendering and template rendering.</p>
        <h2>Introduction to o-fill Component</h2>
        <p><code>o-fill</code> is a core component in ofa.js for list rendering, it accepts a <code>value</code> property of array type and generates corresponding DOM elements for each item in the array. During rendering, ofa.js automatically tracks changes to the array and efficiently updates the DOM.</p>
        <h3>Main Features:</h3>
        <ul>
          <li><strong>Efficient Updates</strong>: Track array changes via key values, only update the parts that need to change</li>
          <li><strong>Index Access</strong>: Access the index of the current item via <code>$index</code></li>
          <li><strong>Data Access</strong>: Access the data of the current item via <code>$data</code></li>
          <li><strong>Host Access</strong>: Access the current component instance via <code>$host</code>, allowing calls to component methods or access to component data</li>
          <li><strong>Template Reuse</strong>: Support complex list rendering using named templates</li>
        </ul>
        <h2>Direct Rendering</h2>
        <p>Direct rendering is the simplest way to use it—write the template content directly inside the <code>o-fill</code> tag. When the array changes, <code>o-fill</code> automatically creates the corresponding element for each data item.</p>
        <o-playground name="o-fill - direct rendering" style="--editor-height: 600px">
          <code>
    <template page>
      <style>
        :host { display: block; padding: 10px; }
        ul { list-style: none; padding: 0; }
        li { padding: 8px; margin: 5px 0; background: #7e7e7e; border-radius: 4px; }
      </style>
      <h3>Fruit List</h3>
      <button on:click="addItem">Add Fruit</button>
      <button on:click="removeItem">Remove Last</button>
      <ul>
        <o-fill :value="fruits">
          <li> {{$index + 1}}. {{$data.name}} - Price: ¥{{$data.price}} <button on:click="$host.removeItem($index)">Delete</button></li>
        </o-fill>
      </ul>
      <script>
        export default async () => ({
          data: { 
            fruits: [
              { name: "🍎 Apple", price: 5 },
              { name: "🍊 Orange", price: 6 },
              { name: "🍌 Banana", price: 3 }
            ],
            fruitIndex: 0,
          },
          proto: {
            addItem() {
              const fruitNames = ["🍇 Grape", "🍓 Strawberry", "🥝 Kiwi", "🍑 Peach", "🥭 Mango"];
              const name = fruitNames[this.fruitIndex % fruitNames.length];
              this.fruits.push({ 
                name: name, 
                price: Math.floor(Math.random() * 10) + 1 
              });
              this.fruitIndex++;
            },
            removeItem(index) {
              if (index >= 0 && index < this.fruits.length) {
                this.fruits.splice(index, 1);
                return;
              }
              this.fruits.length && this.fruits.pop();
            }
          }
        });
      </script>
    </template>
  </code>
        </o-playground>
        <p>In this example, we can see:- <code>$index</code> represents the index of the current item (starting from 0)</p>
        <ul>
          <li><code>$data</code> represents the data object of the current item</li>
          <li><code>$host</code> represents the current component instance, which can be used to call component methods or access component data</li>
          <li>When the array changes, the list updates automatically</li>
        </ul>
        <h2>Template Rendering</h2>
        <p>For more complex list-item structures, you can use named templates. Define the template inside a <code>template</code> tag and reference it in <code>o-fill</code> via the <code>name</code> attribute.</p>
        <o-playground name="o-fill - Template Rendering" style="--editor-height: 600px">
          <code>
    <template page>
      <style>
        :host { display: block; padding: 10px; }
        .product-card { border: 1px solid #747474; border-radius: 8px; padding: 12px; margin: 10px 0; }
        .product-name { font-weight: bold; font-size: 1.1em; }
        .product-price { color: #832c22; font-weight: bold; }
        .product-desc { color: #929292; font-size: 0.9em; margin-top: 5px; }
      </style>
      <h3>Product List</h3>
      <button on:click="addProduct">Add Product</button>
      <div class="products-container">
        <o-fill :value="products" name="product-template"></o-fill>
      </div>
      <template name="product-template">
        <div class="product-card">
          <div class="product-name">{{$data.name}}</div>
          <div class="product-price">¥{{$data.price}}</div>
          <div class="product-desc">{{$data.description}}</div>
          <small>No.: {{$index + 1}}</small>
        </div>
      </template>
      <script>
        export default async () => ({
          data: {
            products: [
              { name: "MacBook Pro", price: 12999, description: "High-performance laptop, suitable for professional work" },

              { name: "AirPods Pro", price: 1999, description: "Wireless noise-cancelling headphones with excellent sound quality" }
            ],
            productIndex: 0,
          },
          proto: {
            addProduct() {
              const productNames = ["iPad Air", "Apple Watch", "Magic Mouse", "Pro Display"];
              const productDescs = ["Lightweight and portable tablet", "Smartwatch, health monitoring", "Ergonomic mouse", "Professional-grade monitor"];
              const name = productNames[this.productIndex % productNames.length];
              const desc = productDescs[this.productIndex % productDescs.length];
              this.products.push({
                name: name,
                price: Math.floor(Math.random() * 5000) + 1000,
                description: desc
              });
              this.productIndex++;
            }
          }
        });
      </script>
    </template>
  </code>

        <h2>Performance Optimization and Key-Value Management</h2>
        <p>For lists that require frequent updates, you can specify a unique identifier through the <code>fill-key</code> attribute to improve rendering performance.</p>
        <pre><code class="hljs language-html"><span class="hljs-comment">&lt;!-- Use custom key to improve performance --&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">o-fill</span> <span class="hljs-attr">:value</span>=<span class="hljs-string">&quot;items&quot;</span> <span class="hljs-attr">fill-key</span>=<span class="hljs-string">&quot;id&quot;</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">div</span>&gt;</span>{{$data.name}}<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">o-fill</span>&gt;</span></code></pre>
        <p>In the example above, <code>fill-key=&quot;id&quot;</code> tells ofa.js to use the <code>id</code> property of each data item as the unique identifier, so that even if the order of the array changes, the corresponding elements can still be correctly identified and updated.</p>
        <h2>Best Practices for List Rendering</h2>
        <ol>
          <li><strong>Event Handling</strong>: When using events in list items, note that <code>$host</code> points to the current component instance and <code>$data</code> points to the current item data.</li>
          <li><strong>Choose the Appropriate Rendering Method</strong>: Use direct rendering for simple lists and template rendering for complex structures.</li>
          <li><strong>Performance Considerations</strong>: For large lists or lists that update frequently, use <code>fill-key</code> to specify a key value.</li>
          <li><strong>Data Structure</strong>: Ensure that every item in the array is a valid data object.</li>
          <li><strong>Avoid Deep Nesting</strong>: Although nesting is supported, excessively deep nesting levels should be avoided.</li>
        </ol>
