      <link rel="stylesheet" href="../../css/page.css" />
      <article class="markdown-body">
        <h1>replace-temp Component</h1>
        <p>When attempting list rendering inside special elements like <code>&lt;select&gt;</code> or <code>&lt;table&gt;</code>, the browser may automatically remove the <code>&lt;x-fill&gt;</code> component, causing the list rendering to fail. In such cases, the <code>replace-temp</code> approach can be used to solve the problem.</p>
        <p>The usage method is: set <code>is=&quot;replace-temp&quot;</code> on the <code>&lt;template&gt;</code> tag, and place it inside an element that the browser will automatically correct.</p>
        <o-playground name="replace-temp component" style="--editor-height: 500px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <div>
        <select>
            <template is="replace-temp">
                <x-fill :value="items">
                    <option>{{$data}}</option>
                </x-fill>
            </template>
        </select>
      </div>
      <script>
        export default async () => {
          return {
            data: {
              items: ["A", "B", "C"],
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
  </o-app>
  <o-root-provider name="pui" theme="dark"></o-root-provider>
</body>
