        <h1>Passing Feature Attributes</h1>
        <p>In ofa.js, <a href="https://developer.mozilla.org/en-US/docs/Web/API/Element/attributes" target="_blank">attributes</a> are one of the most common ways to pass data between components. Simply declare the required attributes in the component's <code>attrs</code> object, and external data can be passed into the component when it is used.</p>
        <h2>Basic Usage</h2>
        <h3>Define Receiving Attributes</h3>
        <p>Before using a component, you need to declare the attributes you want to receive in the component's <code>attrs</code> object. Default values can be set for these attributes.</p>
        <o-playground name="Basic Usage Example" style="--editor-height: 500px">
          <code path="demo.html" preview="">
    <template>
      <l-m src="./demo-comp.html"></l-m>
      <demo-comp first="OFA" full-name="OFA Component Example"></demo-comp>
      <br>
      <demo-comp first="NoneOS" full-name="NoneOS Use Case"></demo-comp>
    </template>
  </code>
          <code path="demo-comp.html" active="">
    <template component="">
      <style>
        :host {
          display: block;
          border: 1px solid green;
          padding: 8px;
        }
      </style>
      <p>First: {{first}}</p>
      <p>Full Name: {{fullName}}</p>
      <script>
        export default async ({ load }) => {
          return {
            tag: "demo-comp",
            attrs: {
              first: null,
              fullName:""
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h3>Important Rules</h3>
        <ol>
          <li>
            <p><strong>Type restriction</strong>: The passed attribute value must be a string; other types are automatically converted to strings.</p>
          </li>
          <li>
            <p><strong>Naming conversion</strong>: Because HTML attributes are case-insensitive, attributes containing uppercase letters must be written in kebab-case with hyphens.</p>
            <ul>
              <li>Example: <code>fullName</code> → <code>full-name</code></li>
            </ul>
          </li>
          <li>
            <p><strong>Must be defined</strong>: If the component does not declare the corresponding property in the <code>attrs</code> object, it cannot receive that attribute. The assigned value becomes the default; set it to <code>null</code> if no default is desired.</p>
          </li>
        </ol>
        <o-playground name="Important Rule Example" style="--editor-height: 500px">
          <code path="demo.html" preview="">
    <template>
      <l-m src="./demo-comp.html"></l-m>
      <demo-comp></demo-comp>
      <demo-comp user-name="Zhang San" age="25"></demo-comp>
    </template>
  </code>
          <code path="demo-comp.html" active="">
    <template component="">
      <style>
        :host {
          display: block;
          border: 1px solid green;
          padding: 8px;
        }
      </style>
      <p>User Name: {{userName}}</p>
      <p>Age: {{age}}</p>
      <script>
        export default async ({ load }) => {
          return {
            tag: "demo-comp",
            attrs: {
              userName: "Default Name",
              age: "0"
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Passing Attributes via Template Syntax</h2>
        <p>In a component's template, you can use the <code>attr:toKey="fromKey"</code> syntax to pass the current component's <code>fromKey</code> data to the child component's <code>toKey</code> property.</p>
        <o-playground name="Props Passing Example" style="--editor-height: 500px">
          <code path="demo.html" preview="">
    <template>
      <o-page src="page1.html"></o-page>
    </template>
  </code>
          <code path="page1.html" active="">
    <template page="">
      <l-m src="./demo-comp.html"></l-m>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <textarea sync:value="val"></textarea>
      <br>
      👇
      <demo-comp attr:full-name="val"></demo-comp>
      <script>
        export default async () => {
          return {
            data: {
              val: "Hello ofa.js Demo Code",
            },
          };
        };
      </script>
    </template>
  </code>
          <code path="demo-comp.html" active="">
    <template component="">
      <style>
        :host {
          display: block;
          border: 1px solid green;
          padding: 8px;
        }
      </style>
      <p>Full Name: {{fullName}}</p>
      <script>
        export default async ({ load }) => {
          return {
            tag: "demo-comp",
            attrs: {
              fullName:""
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Multi-level Transfer</h2>
        <p>Attributes can be passed through multiple levels of nested components.</p>
        <p>If a component depends on other components, it needs to import the modules of those other components within the component.</p>
        <o-playground name="Multi-level Passing Example" style="--editor-height: 700px">
          <code path="demo.html" preview="">
    <template>
      <l-m src="./outer-comp.html"></l-m>
      <outer-comp user-name="Top-level Data"></outer-comp>
    </template>
  </code>
          <code path="outer-comp.html" active="">
    <template component="">
      <l-m src="./inner-comp.html"></l-m>
      <style>
        :host {
          display: block;
          border: 1px solid blue;
          padding: 8px;
          margin-bottom: 8px;
        }
      </style>
      <p>Outer Component Receives: {{userName}}</p>
      <inner-comp attr:user-name="userName"></inner-comp>
      <script>
        export default async ({ load }) => {
          return {
            tag: "outer-comp",
            attrs: {
              userName: ""
            },
          };
        };
      </script>
    </template>
  </code>
          <code path="inner-comp.html" active="">
    <template component="">
      <style>
        :host {
          display: block;
          border: 1px solid green;

      <p>Inner Component Receives: {{userName}}</p>

          return {
            tag: "inner-comp",
            attrs: {
              userName: ""
            },
          };
        };
      </script>
    </template>
  </code>

          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
