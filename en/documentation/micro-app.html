        <h1>Mini App</h1>
        <p>Use <code>o-app</code> for application encapsulation; this tag represents a micro-app. It will load the <code>app-config.js</code> configuration file, which defines the app&#39;s home page URL and page transition animation settings.</p>

        <pre><code class="hljs language-javascript"><span class="hljs-comment">// app-config.js</span>
<span class="hljs-comment">// Application home page URL</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> home = <span class="hljs-string">&quot;./home.html&quot;</span>;

<span class="hljs-comment">// Page transition animation configuration</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>,

};</code></pre><o-playground name="Micro App Example" style="--editor-height: 500px">

## Parameter passing methods

In `o-app`, page navigation supports passing parameters through URL Query, <span class="hljs-literal">and</span> the target page receives them through the `query` parameter of the module function.

## Page Navigation

Within the o-app, each page module can use an `&lt;a&gt;` tag with the `olink` attribute for page navigation. This tag triggers the application&#x27;s route switching, includes transition animations, <span class="hljs-literal">and</span> does <span class="hljs-literal">not</span> refresh the entire page.

```html
&lt;a href=<span class="hljs-string">&quot;./about.html&quot;</span> olink&gt;Go to About page&lt;/a&gt;</code></pre>
        <p>In page components, you can use the <code>back()</code> method to return to the previous page:</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">template</span> <span class="hljs-attr">page</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">button</span> <span class="hljs-attr">on:click</span>=<span class="hljs-string">&quot;back()&quot;</span>&gt;</span>Back<span class="hljs-tag">&lt;/<span class="hljs-name">button</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">template</span>&gt;</span></code></pre>

      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
