        <h1>Micro App</h1>
        <p><code>o-app</code> is the core container component in ofa.js, used to create independent micro applications. It will load the <code>app-config.js</code> configuration file, which defines various behaviors of the application.</p>
        <h2>Basic Usage</h2>
        <p>Use the <code>o-app</code> tag in HTML to create a micro-application:</p>
        <pre><code class="hljs language-html"><span class="hljs-meta">&lt;!DOCTYPE <span class="hljs-keyword">html</span>&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">html</span>&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">head</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">script</span> <span class="hljs-attr">src</span>=<span class="hljs-string">&quot;https://cdn.jsdelivr.net/gh/kirakiray/ofa.js/dist/ofa.min.mjs&quot;</span> <span class="hljs-attr">type</span>=<span class="hljs-string">&quot;module&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">head</span>&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">body</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">o-app</span> <span class="hljs-attr">src</span>=<span class="hljs-string">&quot;./app-config.js&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-app</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">body</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">html</span>&gt;</span></code></pre>
        <h2>Creating a Configuration File</h2>
        <p>Create the <code>app-config.js</code> file and define the basic configuration of the application:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// app-config.js</span>

<span class="hljs-comment">// Application home page URL (required)</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> home = <span class="hljs-string">&quot;./home.html&quot;</span>;

<span class="hljs-comment">// Page transition animation configuration (optional)</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(0, 0)&quot;</span>,
  },
  <span class="hljs-attr">next</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(30px, 0)&quot;</span>,
  },
  <span class="hljs-attr">previous</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(-30px, 0)&quot;</span>,
  },
};</code></pre><o-playground name="Micro App Example" style="--editor-height: 500px">
          <code path="demo.html" preview>
    <template>
      <o-app src="./app-config.js"></o-app>
    </template>
  </code>
          <code path="app-config.js">
    // Home page address of the app
    export const home = "./home.html";
    // Page transition animation configuration
    export const pageAnime = {
      current: {
        opacity: 1,
        transform: "translate(0, 0)",
      },
      next: {
        opacity: 0,
        transform: "translate(30px, 0)",
      },
      previous: {
        opacity: 0,
        transform: "translate(-30px, 0)",
      },
    };
  </code>

      <br>
      <br>
      <a href="./about.html?id=10030" olink>Go to About (10030)</a>
      <script>
        export default async () => {
          return {
            data: {
              val: "Hello ofa.js App Demo",

  </code>
          <code path="about.html">
    <template page>
      <style>
        :host {
          display: block;
          padding: 10px;
        }
      </style>
      <div style="padding: 8px;"> <button on:click="back()">Back</button> </div>

      <script>

              val: `Hello ofa.js App Demo (from ${query.id})`,
            },
          };
        };
      </script>
    </template>
  </code>

        <h2>Page Navigation</h2>
        <h3>Using the olink attribute</h3>
        <p>Inside <code>o-app</code>, use <code>&lt;a&gt;</code> tags with the <code>olink</code> attribute for page switching:</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">a</span> <span class="hljs-attr">href</span>=<span class="hljs-string">&quot;./about.html&quot;</span> <span class="hljs-attr">olink</span>&gt;</span>Go to About page<span class="hljs-tag">&lt;/<span class="hljs-name">a</span>&gt;</span></code></pre>
        <p><code>olink</code> triggers the application&#39;s route switching, includes transition animations, and does not refresh the entire page.</p>
        <h3>Programmatic Navigation</h3>
        <p>In page components, you can use navigation methods:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// Navigate to the specified page</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-title function_">goto</span>(<span class="hljs-string">&quot;./about.html&quot;</span>);

<span class="hljs-comment">// Replace the current page (not added to history)</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-title function_">replace</span>(<span class="hljs-string">&quot;./about.html&quot;</span>);

<span class="hljs-comment">// Go back to the previous page</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-title function_">back</span>();</code></pre>
        <h2>Page Parameter Passing</h2>
        <p>Pass parameters via URL Query, and the target page receives them through the <code>query</code> parameter of the module function:</p>
        <p><strong>Send Page:</strong></p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">a</span> <span class="hljs-attr">href</span>=<span class="hljs-string">&quot;./detail.html?id=123&quot;</span> <span class="hljs-attr">olink</span>&gt;</span>View Details<span class="hljs-tag">&lt;/<span class="hljs-name">a</span>&gt;</span></code></pre>
        <p><strong>Receive page:</strong></p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">template</span> <span class="hljs-attr">page</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">
    <span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">async</span> ({ query }) =&gt; {
      <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(query.<span class="hljs-property">id</span>); <span class="hljs-comment">// &quot;123&quot;</span>
      <span class="hljs-keyword">return</span> {
        <span class="hljs-attr">data</span>: {
          <span class="hljs-attr">id</span>: query.<span class="hljs-property">id</span>
        }
      };
    };
  </span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">template</span>&gt;</span></code></pre>
        <h2>Configuration File Details</h2>
        <p><code>app-config.js</code> supports multiple configuration options to control the behavior of the application:</p>
        <table>
          <thead>
            <tr>
              <th>Configuration</th>
              <th>Required</th>
              <th>Description</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><code>home</code></td>
              <td>Required</td>
              <td>Application homepage address</td>
            </tr>
            <tr>
              <td><code>pageAnime</code></td>
              <td>Optional</td>
              <td>Page transition animation configuration</td>
            </tr>
            <tr>
              <td><code>loading</code></td>
              <td>Optional</td>
              <td>Content displayed during page loading</td>
            </tr>
            <tr>
              <td><code>fail</code></td>
              <td>Optional</td>
              <td>Content displayed when page loading fails</td>
            </tr>
            <tr>
              <td><code>ready</code></td>
              <td>Optional</td>
              <td>Callback after application initialization completes</td>
            </tr>
            <tr>
              <td><code>proto</code></td>
              <td>Optional</td>
              <td>Methods and properties added to the application prototype</td>
            </tr>
            <tr>
              <td><code>allowForward</code></td>
              <td>Optional</td>
              <td>Whether to enable browser forward functionality</td>
            </tr>
          </tbody>
        </table>
        <h3>Independence</h3>
        <p>Each <code>o-app</code> instance is an independent micro-application with its own:- Route History</p>
        <ul>
          <li>Page Stack</li>
          <li>State Management</li>
          <li>Configuration Options</li>
        </ul>
        <h3>Nested Usage</h3>
        <p><code>o-app</code> can be nested to achieve complex application structures:</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">template</span> <span class="hljs-attr">page</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">o-app</span> <span class="hljs-attr">src</span>=<span class="hljs-string">&quot;./sub-app-config.js&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-app</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">template</span>&gt;</span></code></pre>
        <h3>Differences from Components</h3>
        <p>The main differences between <code>o-app</code> and regular components:</p>
        <table>
          <thead>
            <tr>
              <th>Feature</th>
              <th>o-app</th>
              <th>Regular Component</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Routing management</td>
              <td>✅ Built-in routing system</td>
              <td>❌ None</td>
            </tr>
            <tr>
              <td>Page stack</td>
              <td>✅ Manages page history</td>
              <td>❌ None</td>
            </tr>
            <tr>
              <td>Configuration file</td>
              <td>✅ Independent configuration</td>
              <td>❌ None</td>
            </tr>
            <tr>
              <td>Page transition animation</td>
              <td>✅ Supported</td>
              <td>❌ None</td>
            </tr>
            <tr>
              <td>Applicable scenario</td>
              <td>Application-level container</td>
              <td>Functional component</td>
            </tr>
          </tbody>
        </table>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
  </o-app>
