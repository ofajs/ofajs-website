      <article class="markdown-body">
        <h1>Injecting host styles</h1>
        <p>In Web Components, due to the limitations of the <code>slot</code> element, it is not possible to directly set styles for multi-level elements within the slot. To solve this problem, ofa.js provides the <code>&lt;inject-host&gt;</code> component, which allows injecting styles from within the component into the host element, thereby enabling style control over multi-level elements in the slot content.</p>
        <blockquote>
          <p>Note: It is recommended to use the <a href="https://developer.mozilla.org/en-US/docs/Web/CSS/Reference/Selectors/::slotted" target="_blank">::slotted()</a> selector to style slot content first. Only use the <code>&lt;inject-host&gt;</code> component when the selector cannot meet the requirements.</p>
        </blockquote>
        <h2>Basic Usage</h2>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">template</span> <span class="hljs-attr">component</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
        <span class="hljs-selector-pseudo">:host</span> {
            <span class="hljs-attribute">display</span>: block;
            <span class="hljs-attribute">border</span>: <span class="hljs-number">1px</span> solid <span class="hljs-number">#007acc</span>;
            <span class="hljs-attribute">padding</span>: <span class="hljs-number">10px</span>;
        }
        <span class="hljs-comment">/* Set styles for direct child level elements */</span>
        <span class="hljs-comment">/* ::slotted(user-list-item) {
            background-color: aqua;
        } */</span>
    </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">inject-host</span>&gt;</span>
        <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
            user-list user-list-item {
                <span class="hljs-attribute">background-color</span>: aqua;
            }
            <span class="hljs-comment">/* You can also set styles for multi-level nesting */</span>
            user-list user-list-item <span class="hljs-selector-class">.user-list-item-content</span> {
                <span class="hljs-attribute">color</span>: red;
            }
        </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
    <span class="hljs-tag">&lt;/<span class="hljs-name">inject-host</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">
        <span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">async</span> () =&gt; {
            <span class="hljs-keyword">return</span> {
                <span class="hljs-attr">tag</span>: <span class="hljs-string">"user-list"</span>,
                <span class="hljs-comment">// ...</span>
            };
        };
    </span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">template</span>&gt;</span></code></pre>
        <h2>Case</h2>
        <p>The following example demonstrates how to use <code>&lt;inject-host&gt;</code> to style nested elements within a slot. We create two components: a <code>user-list</code> component as the list container, and a <code>user-list-item</code> component as the list item. Through <code>&lt;inject-host&gt;</code>, we can style the <code>user-list-item</code> and its internal elements in the <code>user-list</code> component.</p>
        <o-playground name="Inject Host Styles" style="--editor-height: 500px">

    <template>
      <l-m src="./user-list.html"></l-m>
      <l-m src="./user-list-item.html"></l-m>
      <user-list>
        <user-list-item>
          <span>Zhang San</span>
          <span slot="age">25</span>
        </user-list-item>
        <user-list-item>
          <span class="item-name">Li Si</span>
          <span slot="age">30</span>
        </user-list-item>
      </user-list>
    </template>
  </code>
          <code path="user-list.html" active="">
    <template component="">
      <style>
        :host {
          display: block;
          border: 1px solid gray;
          padding: 10px;
        }
      </style>
      <inject-host>
        <style>
          user-list user-list-item {
            background-color: blue;
            display: block;
            padding: 10px;
            margin: 5px 0;
          }
          user-list user-list-item .item-name {
            color: red;
            font-weight: bold;
          }
        </style>
      </inject-host>
      <slot></slot>
      <script>
        export default async () => {
          return {
            tag: "user-list",
          };
        };
      </script>
    </template>
  </code>

        :host {
          display: block;
        }
      </style>
      <slot></slot>
      <div class="item-age">
        Age: <slot name="age"></slot>
      </div>
      <script>
        export default async () => {

          };
        };
      </script>

        <p>You can see in the output:- The background color of the <code>user-list-item</code> component is aqua (set via the <code>&lt;inject-host&gt;</code> of the <code>user-list</code> component) </p>
        <ul>
          <li>The text color of the name is red (set via the <code>&lt;inject-host&gt;</code> of the <code>user-list</code> component, styling <code>user-list-item .item-name</code>)</li>
        </ul>
        <h2>How It Works</h2>
        <p><code>&lt;inject-host&gt;</code> component will inject the content of the <code>&lt;style&gt;</code> tag it contains into the component's host element. In this way, the injected style rules can penetrate the component boundary and affect elements inside the slot.</p>
        <p>In this way, you can:- Set styles for elements at any depth within slot content </p>
        <ul>
          <li>Use a full selector path to ensure styles apply only to the target element </li>
          <li>Maintain component style encapsulation while enabling flexible style piercing</li>
        </ul>
        <h2>Notes</h2>
        <p>⚠️ <strong>Style contamination risk</strong>: Since injected styles act on the scope where the host element is located, they may affect elements within other components. When using, be sure to follow the following principles:</p>
        <ol>
          <li><strong>Use specific selectors</strong>: Try to use complete component tag paths, avoid overly broad selectors</li>
          <li><strong>Add namespace prefixes</strong>: Add unique prefixes to your style classes to reduce the possibility of conflicts with other components</li>
          <li><strong>Avoid using generic tag selectors</strong>: Try to use class names or attribute selectors instead of tag selectors</li>
          <li><strong>Rethink component design</strong>: Consider whether you can avoid using <code>&lt;inject-host&gt;</code> by optimizing component design. For example, using the <a href="https://developer.mozilla.org/en-US/docs/Web/CSS/Reference/Selectors/::slotted" target="_blank">::slotted()</a> selector on child components is often more elegant.</li>
        </ol>
        <pre><code class="hljs language-html"><span class="hljs-comment">&lt;!-- Recommended ✅: Use specific selectors --&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">inject-host</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
        user-list <span class="hljs-selector-class">.list-item-content</span> {
            <span class="hljs-attribute">color</span>: red;
        }
    </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">inject-host</span>&gt;</span>

<span class="hljs-comment">&lt;!-- Not Recommended ❌: Use overly generic selectors --&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">inject-host</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-xml">
        .content {  <span class="hljs-comment">&lt;!-- Prone to conflict with other components --&gt;</span>
            color: red;
        }
    </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">inject-host</span>&gt;</span></code></pre>
        <h3>Performance Tips</h3>
        <p>Since <code>&lt;inject-host&gt;</code> triggers re-injection of host styles, which may cause component re-layout or re-rendering, use it with caution in frequently updated scenarios.<br>If you only need to style the first-level elements within the slot, give priority to the <a href="https://developer.mozilla.org/en-US/docs/Web/CSS/Reference/Selectors/::slotted" target="_blank">::slotted()</a> pseudo-class selector, which can avoid the extra rendering overhead caused by penetration injection, thereby achieving better performance.</p>
      </article>

              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
