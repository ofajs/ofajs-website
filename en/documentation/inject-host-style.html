      <article class="markdown-body">
        <h1>Inject host styles</h1>
        <p>In Web Components, due to the limitations of <code>slot</code>, it is impossible to directly style multi-level elements within the slot. To solve this, ofa.js provides the <code>&lt;inject-host&gt;</code> component, allowing styles to be injected from inside the component into the host element, thereby enabling styling of multi-level elements in slotted content.</p>
        <blockquote>
          <p>Note: It is recommended to prioritize using the <a href="https://developer.mozilla.org/en-US/docs/Web/CSS/Reference/Selectors/::slotted" target="_blank">::slotted()</a> selector for styling slotted content. Only use the <code>&lt;inject-host&gt;</code> component when it is necessary to meet specific requirements.</p>
        </blockquote>
        <h2>Basic Usage</h2>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">template</span> <span class="hljs-attr">component</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
        <span class="hljs-selector-pseudo">:host</span> {
            <span class="hljs-attribute">display</span>: block;
            <span class="hljs-attribute">border</span>: <span class="hljs-number">1px</span> solid <span class="hljs-number">#007acc</span>;
            <span class="hljs-attribute">padding</span>: <span class="hljs-number">10px</span>;
        }
        <span class="hljs-comment">/* Style direct first-level children */</span>
        <span class="hljs-comment">/* ::slotted(user-list-item) {
            background-color: aqua;
        } */</span>
    </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">inject-host</span>&gt;</span>
        <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
            user-list user-list-item {
                <span class="hljs-attribute">background-color</span>: aqua;
            }
            <span class="hljs-comment">/* You can also style deeply nested elements */</span>
            user-list user-list-item <span class="hljs-selector-class">.user-list-item-content</span> {
                <span class="hljs-attribute">color</span>: red;
            }
        </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
    <span class="hljs-tag">&lt;/<span class="hljs-name">inject-host</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">
        <span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">async</span> () =&gt; {
            <span class="hljs-keyword">return</span> {
                <span class="hljs-attr">tag</span>: <span class="hljs-string">"user-list"</span>,
                <span class="hljs-comment">// ...</span>
            };
        };
    </span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">template</span>&gt;</span></code></pre>
        <h2>Case</h2>
        <p>The example below demonstrates how to use <code>&lt;inject-host&gt;</code> to style nested elements within a slot. We create two components: the <code>user-list</code> component serves as the list container, and the <code>user-list-item</code> component serves as the list item. Through <code>&lt;inject-host&gt;</code>, we can style <code>user-list-item</code> and its internal elements within the <code>user-list</code> component.</p>
        <o-playground name="Inject Host Styles" style="--editor-height: 500px">
          <code path="index.html" preview="">
    <template>
      <l-m src="./user-list.html"></l-m>
      <l-m src="./user-list-item.html"></l-m>
      <user-list>
        <user-list-item>
          <span>Zhang San</span>
          <span slot="age">25</span>
        </user-list-item>
        <user-list-item>
          <span class="item-name">Li Si</span>
          <span slot="age">30</span>
        </user-list-item>
      </user-list>
    </template>
  </code>
          <code path="user-list.html" active="">
    <template component="">
      <style>
        :host {
          display: block;
          border: 1px solid gray;
          padding: 10px;
        }
      </style>
      <inject-host>
        <style>
          user-list user-list-item {
            background-color: blue;
            display: block;
            padding: 10px;
            margin: 5px 0;
          }
          user-list user-list-item .item-name {
            color: red;
            font-weight: bold;
          }
        </style>
      </inject-host>
      <slot></slot>
      <script>
        export default async () => {
          return {
            tag: "user-list",
          };
        };
      </script>
    </template>
  </code>
          <code path="user-list-item.html">
    <template component="">
      <style>
        :host {
          display: block;
        }
      </style>
      <slot></slot>
      <div class="item-age">
        Age: <slot name="age"></slot>
      </div>
      <script>
        export default async () => {
          return {
            tag: "user-list-item",
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>As can be seen in the running results:- The background color of the <code>user-list-item</code> component is aqua (set via <code>&lt;inject-host&gt;</code> of the <code>user-list</code> component)</p>
        <ul>
          <li>The text color of the name is red (set via <code>&lt;inject-host&gt;</code> of the <code>user-list</code> component to style <code>user-list-item .item-name</code>)</li>
        </ul>
        <h2>How It Works</h2>
        <p>The <code>&lt;inject-host&gt;</code> component injects the content of the internal <code>&lt;style&gt;</code> tag into the component's host element. This way, the injected style rules can penetrate the component boundary and apply to elements within the slot.</p>
        <p>In this way, you can:- Set styles for elements at any depth within slot content</p>
        <ul>
          <li>Use complete selector paths to ensure styles only affect target elements</li>
          <li>Maintain component style encapsulation while achieving flexible style penetration</li>
        </ul>
        <h2>Notes</h2>
        <p>⚠️ <strong>Style Pollution Risk</strong>: Since the injected styles will take effect in the scope where the host element is located, they may affect elements within other components. When using it, be sure to follow the following principles:</p>
        <ol>
          <li><strong>Use specific selectors</strong>: Prefer full component tag paths; avoid overly broad selectors. </li>
          <li><strong>Add namespace prefixes</strong>: Give your style classes a unique prefix to reduce collision risk. </li>
          <li><strong>Avoid universal tag selectors</strong>: Favor class or attribute selectors over tag selectors. </li>
          <li><strong>Rethink component design</strong>: Consider whether you can avoid <code>&lt;inject-host&gt;</code> by refining the component. For example, combining child components with <a href="https://developer.mozilla.org/en-US/docs/Web/CSS/Reference/Selectors/::slotted" target="_blank">::slotted()</a> selectors is often cleaner.</li>
        </ol>
        <pre><code class="hljs language-html"><span class="hljs-comment">&lt;!-- Recommended ✅: Use specific selectors --&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">inject-host</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
        user-list <span class="hljs-selector-class">.list-item-content</span> {
            <span class="hljs-attribute">color</span>: red;
        }
    </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">inject-host</span>&gt;</span>

<span class="hljs-comment">&lt;!-- Not recommended ❌: Using overly generic selectors --&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">inject-host</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
        <span class="hljs-selector-class">.content</span> {  <span class="hljs-comment">/* Prone to conflicts with other components */</span>
            <span class="hljs-attribute">color</span>: red;
        }
    </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">inject-host</span>&gt;</span></code></pre>
        <h3>Performance Tips</h3>
        <p>Since <code>&lt;inject-host&gt;</code> triggers style re-injection into the host, which may lead to component reflow or repaint, use it with caution in frequently updated scenarios. If you only need to style the first-level elements inside a slot, prefer using the <a href="https://developer.mozilla.org/en-US/docs/Web/CSS/Reference/Selectors/::slotted" target="_blank">::slotted()</a> pseudo-class selector instead, as it avoids the extra rendering overhead from penetrating injection and provides better performance.</p>
      </article>

        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
