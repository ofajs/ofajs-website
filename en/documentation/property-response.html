        <h1>Attribute Response</h1>
        <p>In the previous <a href="./property-binding.html" olink="">attribute binding</a>, we introduced a simple attribute response mechanism, that is, how to render the attribute values of a component into text display.</p>
        <p>ofa.js not only supports reactivity for basic property values, but also supports reactive rendering of nested object internal property values.</p>
        <o-playground name="Non-reactive Data Example" style="--editor-height: 500px">
          <code>
    <template page="">
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <p style="color: blue;">count: {{count}}</p>
      <p style="color: green;">count2: {{obj.count2}}</p>
      <button on:click="handleAddCount">Increase</button>
      <script>
        export default async () => {
          return {
            data: {
              count: 20,
              obj: {
                count2: 100,
              },
            },
            proto:{
              handleAddCount(){
                this.count++;
                this.obj.count2++;
              }
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>All data bound to the ofa.js instance object will be automatically converted into reactive data. Reactive data only supports basic data types such as strings, numbers, booleans, arrays, and objects. For complex data types like functions and class instances, they need to be stored as <strong>non-reactive properties</strong>, and changes to these properties will not trigger component re-rendering.</p>
        <h2>Non-reactive Data</h2>
        <p>Sometimes we need to store data that does not require reactive updates, such as Promise instances, regular expression objects, or other complex objects. In this case, we need to use non-reactive properties. Changes to these properties will not trigger component re-rendering and are suitable for storing data that does not need to be synchronized with the view.</p>
        <p>Non-reactive properties are usually named with an underscore <code>_</code> as a prefix before the property name to distinguish them from reactive properties.</p>
        <o-playground name="Non-reactive data example" style="--editor-height: 500px">
          <code>
    <template page="">
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <p style="color: blue;">count: {{count}}</p>
      <p style="color: green;">count2: {{_count2}}</p>
      <button on:click="count++">Blue increases</button>
      <button on:click="_count2++">Green increments</button>
      <script>
        export default async () => {
          return {
            data: {
              count: 20,
              _count2: 100,
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>When the <code>Green increments</code> button is clicked, although the value of <code>_count2</code> has actually increased, because it is a non-reactive property, it will not trigger a view update, so the display on the interface remains unchanged. When the <code>Blue increases</code> button is clicked, since <code>count</code> is a reactive property, it triggers a full component re-render, at which point the Green display is synchronized and updated.</p>
        <p>Non-reactive object data has better performance than reactive object data because non-reactive data does not trigger component re-rendering.</p>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
