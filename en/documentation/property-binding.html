<body>
  <o-app src="../../js/app-config.js">
    <template page>
      <link rel="stylesheet" href="../../css/github-markdown.css" />
      <link rel="stylesheet" href="../../css/hljs.css" />
      <l-m src="../../comps/center-block.html"></l-m>
      <l-m src="../../comps/article-code.html"></l-m>

      <style>
        :host {
          display: block;
          height: 100%;
          box-sizing: border-box;
          overflow: auto;
        }
      </style>
      <link rel="stylesheet" href="../../css/page.css" />
      <article class="markdown-body">
        <h1>Property Binding</h1>
        <p>ofa.js supports binding data to properties of instantiated element objects, such as the value or checked attributes of input elements.</p>
        <h2>One-way property binding</h2>
        <p>One-way property binding uses the <code>:toKey=&quot;fromKey&quot;</code> syntax to synchronize component data &quot;one-way&quot; to DOM element properties. When the component data changes, the element properties update immediately; however, changes to the element itself (such as user input) are not written back to the component, maintaining a single and controllable data flow.</p>
        <o-playground name="One-way Property Binding" style="--editor-height: 500px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
        input {
          margin: 5px 0;
          padding: 8px;
          width: 100%;
          box-sizing: border-box;
        }
      </style>
      <p>Current value: {{val}}</p>
      <input type="text" :value="val" placeholder="This is a one-way bound input">
      <p>Note: editing the input directly won't change the displayed value above</p>
      <script>
        export default async () => {
          return {
            data: { val: "Hello ofa.js Demo Code" }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Two-way Property Binding</h2>
        <p>Two-way property binding uses the <code>sync:xxx</code> syntax to synchronize component data with DOM element attributes bidirectionally. When the component data changes, the DOM element’s attribute is updated; when the attribute changes (e.g., through user input), the component data is updated in sync.</p>
        <o-playground name="Two-way Property Binding" style="--editor-height: 500px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid #007acc;
          padding: 10px;
        }
        input {
          margin: 5px 0;
          padding: 8px;
          width: 100%;
          box-sizing: border-box;
        }
      </style>
      <p>Current Value: {{val}}</p>
      <input type="text" sync:value="val" placeholder="This is a two-way bound input field">
      <p>Tip: Modifying content in the input field will update the displayed value above in real-time.</p>
      <script>
        export default async () => {
          return {
            data: { val: "Hello ofa.js Demo Code" }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h3>Features of Two-way Binding</h3>
        <ul>
          <li>Data Flow: Component ↔ DOM Element (Two-way)</li>
          <li>Component data changes → DOM element updates</li>
          <li>DOM element changes → Component data updates</li>
          <li>Applicable to scenarios requiring user input and data synchronization</li>
        </ul>
        <h3>Common Two-Way Binding Scenarios</h3>
        <o-playground name="Two-way Form Binding Example" style="--editor-height: 700px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          padding: 15px;
          font-family: Arial, sans-serif;
        }
        .form-group {
          margin: 10px 0;
        }
        input, textarea, select {
          padding: 8px;
          margin: 5px 0;
          box-sizing: border-box;
        }
        .preview {
          margin-top: 15px;
          padding: 10px;
          background-color: #7b7b7bff;
          border-radius: 4px;
        }
      </style>
      <h3>Two-way Form Binding Example</h3>
      <div class="form-group">
        <label>Text Input:</label>
        <input type="text" sync:value="textInput" placeholder="Enter text">
      </div>
      <div class="form-group">
        <label>Number Input:</label>
        <input type="number" sync:value="numberInput" placeholder="Enter number">
      </div>
      <div class="form-group">
        <label>Textarea:</label>
        <textarea sync:value="textareaInput" rows="3" placeholder="Enter multi-line text"></textarea>
      </div>
      <div class="form-group">
        <label>Select Box:</label>
        <select sync:value="selectedOption">
          <option value="">Please choose...</option>
          <option value="option1">Option 1</option>
          <option value="option2">Option 2</option>
          <option value="option3">Option 3</option>
        </select>
      </div>
      <div class="form-group">
        <label>Checkbox:</label>
        <label style="display:flex;">
          <input type="checkbox" sync:checked="isChecked" /> I agree to the terms
        </label>
      </div>
      <div class="preview">
        <h4>Live Preview:</h4>
        <p>Text: {{textInput}}</p>
        <p>Number: {{numberInput}}</p>
        <p>Textarea: {{textareaInput}}</p>
        <p>Select: {{selectedOption}}</p>
        <p>Checkbox status: {{isChecked ? 'checked' : 'unchecked'}}</p>
      </div>
      <script>
        export default async () => {
          return {
            data: { textInput: '', numberInput: 0, textareaInput: '', selectedOption: '', isChecked: false }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Notes</h2>
        <ol>
          <li><strong>Performance</strong>: Two-way binding creates data watchers; heavy use can impact performance. </li>
          <li><strong>Data Consistency</strong>: It keeps data and view in sync, but guard against infinite update loops. </li>
          <li><strong>Initial Values</strong>: Provide proper initial values for bound data to prevent undefined display issues. </li>
          <li><strong>Event Conflicts</strong>: Avoid combining two-way binding with manual event handling on the same element to prevent conflicts.</li>
        </ol>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
