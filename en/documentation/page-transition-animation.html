        <h1>Page transition animation</h1>
        <p><code>pageAnime</code> configuration item is used to control the transition animation effects during page switching, enhancing the user experience.</p>
        <h2>Basic Configuration</h2>
        <p>Configure page transition animation in <code>app-config.js</code>:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(0, 0)&quot;</span>,
  },
  <span class="hljs-attr">next</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(30px, 0)&quot;</span>,
  },
  <span class="hljs-attr">previous</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(-30px, 0)&quot;</span>,
  },
};</code></pre>
        <h2>Animation State</h2>
        <p>The page switching animation includes three states:</p>
        <table>
          <thead>
            <tr>
              <th>State</th>
              <th>Description</th>
              <th>Trigger Timing</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><code>current</code></td>
              <td>The style after the current page&#39;s animation ends</td>
              <td>When the page switch is complete</td>
            </tr>
            <tr>
              <td><code>next</code></td>
              <td>The starting style when the new page enters</td>
              <td>When the new page starts to enter</td>
            </tr>
            <tr>
              <td><code>previous</code></td>
              <td>The target style when the old page leaves</td>
              <td>When the old page starts to leave</td>
            </tr>
          </tbody>
        </table>
        <p><strong>current（Current Status）</strong>- Final style after page transition completes</p>
        <ul>
          <li>Usually the normal display state of the page</li>
          <li>Example: <code>opacity: 1, transform: &quot;translate(0, 0)&quot;</code></li>
        </ul>
        <p><strong>next (next page state)</strong>- Initial style when a new page enters</p>
        <ul>
          <li>Used to define where a new page starts from when entering</li>
          <li>For example: <code>opacity: 0, transform: &quot;translate(30px, 0)&quot;</code> means entering from the right side</li>
        </ul>
        <p><strong>previous (previous page state)</strong>- Target style when the old page leaves</p>
        <ul>
          <li>Used to define where the old page goes to</li>
          <li>Example: <code>opacity: 0, transform: &quot;translate(-30px, 0)&quot;</code> indicates leaving to the left</li>
        </ul>
        <h2>Built-in Animation Effects</h2>
        <h3>Left and Right Swipe (Default)</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(0, 0)&quot;</span>,
  },
  <span class="hljs-attr">next</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(30px, 0)&quot;</span>,
  },
  <span class="hljs-attr">previous</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(-30px, 0)&quot;</span>,
  },
};</code></pre>
        <p>Effect Description：- The new page slides in from the right (initial position at 30px on the right, opacity 0)</p>
        <ul>
          <li>The old page slides out to the left (final position at -30px on the left, opacity 0)</li>
          <li>Finally, both pages return to their normal positions (opacity 1, position 0)</li>
        </ul>
        <h3>Fade In and Fade Out</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>,
  },
  <span class="hljs-attr">next</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
  },
  <span class="hljs-attr">previous</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
  },
};</code></pre>
        <p>Effect Description：- The new page gradually changes from transparent to visible.</p>
        <ul>
          <li>The old page gradually changes from visible to transparent.</li>
          <li>Suitable for a simple and elegant application style.</li>
        </ul>
        <h3>Swipe Up and Down</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(0, 0)&quot;</span>,
  },
  <span class="hljs-attr">next</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(0, 30px)&quot;</span>,
  },
  <span class="hljs-attr">previous</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(0, -30px)&quot;</span>,
  },
};</code></pre>
        <p>Effect Description：- New page slides in from the bottom</p>
        <ul>
          <li>Old page slides out upwards</li>
          <li>Suitable for apps with vertical scrolling style</li>
        </ul>
        <h3>Zoom Effect</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;scale(1)&quot;</span>,
  },
  <span class="hljs-attr">next</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;scale(0.8)&quot;</span>,
  },
  <span class="hljs-attr">previous</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;scale(1.2)&quot;</span>,
  },
};</code></pre>
        <p>Effect Description：- New page scales up from small to normal size</p>
        <ul>
          <li>Old page scales up from normal size and disappears</li>
          <li>Suitable for card-style or modal-style applications</li>
        </ul>
        <h3>Flip Effect</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;rotateY(0deg)&quot;</span>,
  },
  <span class="hljs-attr">next</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;rotateY(-90deg)&quot;</span>,
  },
  <span class="hljs-attr">previous</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;rotateY(90deg)&quot;</span>,
  },
};</code></pre>
        <p>Effect Description：- New page flips in from the left</p>
        <ul>
          <li>Old page flips out to the right</li>
          <li>Suitable for applications requiring 3D effects</li>
        </ul>
        <h2>Custom Animation</h2>
        <h3>Combining Multiple Attributes</h3>
        <p>You can combine multiple CSS properties to create complex animations:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(0, 0) scale(1)&quot;</span>,
  },
  <span class="hljs-attr">next</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(50px, 50px) scale(0.9)&quot;</span>,
  },
  <span class="hljs-attr">previous</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(-50px, -50px) scale(1.1)&quot;</span>,
  },
};</code></pre>
        <h3>Using Different Easing Functions</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(0, 0)&quot;</span>,
    <span class="hljs-attr">transition</span>: <span class="hljs-string">&quot;all 0.3s cubic-bezier(0.4, 0, 0.2, 1)&quot;</span>,
  },
  <span class="hljs-attr">next</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(30px, 0)&quot;</span>,
  },
  <span class="hljs-attr">previous</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(-30px, 0)&quot;</span>,
  },
};</code></pre>
        <h2>Supported CSS Properties</h2>
        <p><code>pageAnime</code> supports all CSS animatable properties:</p>
        <h3>Common Attributes</h3>
        <ul>
          <li><code>opacity</code> - Transparency (0-1)</li>
          <li><code>transform</code> - Transformation<ul>
              <li><code>translate(x, y)</code> - Translation</li>
              <li><code>scale(n)</code> - Scaling</li>
              <li><code>rotate(deg)</code> - Rotation</li>
              <li><code>rotateX/Y(deg)</code> - 3D Rotation</li>
            </ul>
          </li>
          <li><code>width</code> / <code>height</code> - Width/Height</li>
          <li><code>margin</code> / <code>padding</code> - Margin/Padding</li>
          <li><code>background-color</code> - Background Color</li>
          <li><code>border-radius</code> - Border Radius</li>
        </ul>
        <h3>Precautions</h3>
        <ol>
          <li><strong>Performance Optimization</strong>: Prioritize using <code>transform</code> and <code>opacity</code>, as they offer the best performance</li>
          <li><strong>Avoid Layout Thrashing</strong>: Avoid using properties that trigger layout reflow (such as <code>width</code>, <code>height</code>, <code>margin</code>)</li>
          <li><strong>Transition Duration</strong>: ofa.js automatically adds transition effects, with a default of 300ms</li>
        </ol>

        <h2>Best Practices</h2>
        <h3>1. Keep Animations Simple</h3>
        <p>Avoid overly complex animations, simple animation effects are better:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// ✅ Recommended: Concise and effective</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: { <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>, <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(0, 0)&quot;</span> },
  <span class="hljs-attr">next</span>: { <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>, <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(30px, 0)&quot;</span> },
  <span class="hljs-attr">previous</span>: { <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>, <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(-30px, 0)&quot;</span> },
};

<span class="hljs-comment">// ❌ Not recommended: Overly complex</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(0, 0) rotate(0deg) scale(1)&quot;</span>,
    <span class="hljs-attr">borderRadius</span>: <span class="hljs-string">&quot;0&quot;</span>,
  },
  <span class="hljs-attr">next</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(30px, 30px) rotate(45deg) scale(0.5)&quot;</span>,
    <span class="hljs-attr">borderRadius</span>: <span class="hljs-string">&quot;50%&quot;</span>,
  },
  <span class="hljs-attr">previous</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(-30px, -30px) rotate(-45deg) scale(1.5)&quot;</span>,
    <span class="hljs-attr">borderRadius</span>: <span class="hljs-string">&quot;100%&quot;</span>,
  },
};</code></pre>
        <h3>2. Consider User Experience</h3>
        <ul>
          <li>Animation duration should not be too long (recommended 200-400ms)</li>
          <li>Avoid animations that cause dizziness or disorientation</li>
          <li>Ensure animations are smooth and free from stuttering</li>
        </ul>
        <h3>3. Adapt to Different Devices</h3>
        <p>On low-end devices, consider disabling or simplifying animations:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// Detect device performance</span>
<span class="hljs-keyword">const</span> isLowEndDevice = navigator.<span class="hljs-property">hardwareConcurrency</span> &lt; <span class="hljs-number">4</span>;

<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = isLowEndDevice ? {
  <span class="hljs-attr">current</span>: { <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span> },
  <span class="hljs-attr">next</span>: { <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span> },
  <span class="hljs-attr">previous</span>: { <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span> },
} : {
  <span class="hljs-attr">current</span>: { <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>, <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(0, 0)&quot;</span> },
  <span class="hljs-attr">next</span>: { <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>, <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(30px, 0)&quot;</span> },
  <span class="hljs-attr">previous</span>: { <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>, <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(-30px, 0)&quot;</span> },
};</code></pre>

          load,
          query

          const {
