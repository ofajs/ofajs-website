        <h1>Style Query</h1>
        <p><code>match-var</code> is a utility in ofa.js for styling based on CSS variables. It dynamically applies different styles according to the current component’s CSS variable values, enabling context-aware styling without JavaScript—ideal for theme colors and similar use cases.</p>
        <h2>Core Concepts</h2>
        <ul>
          <li><strong>match-var</strong>: A style-matching component that applies internal styles only when a CSS variable equals a given value. </li>
          <li><strong>Attribute Matching</strong>: Define the CSS variable and expected value to match via component attributes. </li>
          <li><strong>Style Application</strong>: When the match succeeds, the rules inside the <code>&lt;style&gt;</code> tag are applied to the component.</li>
        </ul>
        <h2>Basic Usage</h2>
        <p>The <code>match-var</code> component uses attributes to define the CSS variable to match and its expected value. When the component&#39;s CSS variable equals the specified attribute value, the internally defined styles are applied.</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">match-var</span> <span class="hljs-attr">theme</span>=<span class="hljs-string">&quot;dark&quot;</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
    <span class="hljs-selector-pseudo">:host</span> {
      <span class="hljs-attribute">background-color</span>: <span class="hljs-number">#333</span>;
      <span class="hljs-attribute">color</span>: white;
    }
  </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">match-var</span>&gt;</span></code></pre>
        <h3>Attributes</h3>
        <p>The <code>match-var</code> component uses arbitrary attributes to define matching rules for CSS variables. The attribute name corresponds to the CSS variable name (without the <code>--</code> prefix), and the attribute value is the expected value to match.</p>
        <h3>How it works</h3>
        <ol>
          <li><strong>Browser support</strong>: If the browser supports <code>@container style()</code> queries, the native CSS capability is used directly. </li>
          <li><strong>Fallback</strong>: If not supported, it polls for changes in CSS variable values and dynamically injects styles once a match is found. </li>
          <li><strong>Manual refresh</strong>: Style detection can be triggered manually via the <code>$.checkMatch()</code> method.</li>
        </ol>

        <h2>Multi-condition matching</h2>
        <p>Multiple attributes can be used simultaneously to define more complex matching conditions, and the styles will only be applied when all CSS variables match.</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">match-var</span> <span class="hljs-attr">theme</span>=<span class="hljs-string">&quot;dark&quot;</span> <span class="hljs-attr">size</span>=<span class="hljs-string">&quot;large&quot;</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
    <span class="hljs-selector-pseudo">:host</span> {
      <span class="hljs-attribute">padding</span>: <span class="hljs-number">20px</span>;
      <span class="hljs-attribute">font-size</span>: <span class="hljs-number">18px</span>;
    }
  </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">match-var</span>&gt;</span></code></pre>

        <h2>checkMatch Manual Refresh</h2>
        <p>In some cases, changes to CSS variables may not be automatically detected; you can manually call the <code>$.checkMatch()</code> method to trigger style detection.</p>
        <blockquote>
          <p>Currently, Firefox does not yet support <code>@container style()</code> queries, so it is necessary to manually call <code>$.checkMatch()</code>; once future browsers natively support it, the system will automatically detect variable changes, eliminating the need for manual triggering.</p>
        </blockquote>
        <pre><code class="hljs language-javascript"><span class="hljs-attr">proto</span>: {
  <span class="hljs-title function_">updateTheme</span>(<span class="hljs-params"></span>) {
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">theme</span> = <span class="hljs-string">&#x27;dark&#x27;</span>;
    <span class="hljs-comment">// Manually trigger style detection</span>
    $.<span class="hljs-title function_">checkMatch</span>();
  }
}</code></pre>
        <h2>Best Practices</h2>
        <ol>
          <li><strong>Prioritize Native CSS Capabilities</strong>: <code>match-var</code> prioritizes the use of the browser&#39;s native <code>@container style()</code> queries, offering better performance in modern browsers. </li>
          <li><strong>Organize Styles Reasonably</strong>: Keep related matching styles together for easier maintenance and understanding. </li>
          <li><strong>Utilize data() Binding</strong>: Combine with the <code>data()</code> directive to achieve responsive style switching.</li>
        </ol>
      </article>

      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
