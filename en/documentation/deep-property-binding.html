        <h1>Understanding Attribute Binding</h1>
        <p>In the previous content, the basic usage of <a href="./property-binding.html" olink="">property binding</a> was initially introduced. The previous example was used to bind the <code>value</code> property of a native browser element (such as <code>textarea</code>). This section will delve into the essence of property binding—it is actually binding to the JavaScript properties of a component after instantiation, not to HTML attributes.</p>
        <h2>Component Property Binding Mechanism</h2>
        <p>In ofa.js, when we use the <code>:toProp="fromProp"</code> syntax in a parent component, we are setting the JavaScript property of the child component instance, not the HTML attribute. This is an important distinction from directly setting HTML attributes (such as <code>attr:toKey="fromKey"</code>).</p>
        <p>The following example shows how to pass data to a custom component through property binding：</p>
        <o-playground name="Understanding Property Binding" style="--editor-height: 500px">
          <code path="demo.html" preview="" unimportant="">
    <template>
      <o-page src="page1.html"></o-page>
    </template>
  </code>
          <code path="page1.html" active="">
    <template page="">
      <l-m src="./demo-comp.html"></l-m>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <h3 style="color:blue;">{{val}}</h3>
      <demo-comp :full-name="val"></demo-comp>
      <script>
        export default async () => {
          return {
            data: {
              val: "ofajs",
            },
          };
        };
      </script>
    </template>
  </code>

        <p>In this example:- The <code>val</code> data in the parent component is bound to the <code>fullName</code> prop of the child component <code>&lt;demo-comp&gt;</code></p>
        <ul>
          <li>The syntax <code>:full-name="val"</code> is used to pass the parent component's <code>val</code> value to the child component's <code>fullName</code> prop</li>
          <li>After receiving this value, the child component displays it in the template via <code>{{fullName}}</code></li>
        </ul>
        <h2>Attribute Binding vs Feature Property Inheritance</h2>
        <p>It should be noted that attribute binding (<code>:</code>) and characteristic attribute inheritance (<code>attr:</code>) have the following key differences:</p>
        <h3>Property Binding (':')</h3>
        <ul>
          <li>JavaScript properties bound to the component instance</li>
          <li>The passed data retains its original type (string, number, boolean, etc.)</li>
          <li>It can be directly accessed and modified within the component, even without predefining <code>data</code> inside the component</li>
        </ul>
        <h3>Feature attribute inheritance (<code>attr:</code>)</h3>
        <ul>
          <li>Set HTML attributes</li>
          <li>All values are converted to strings</li>
          <li>Mainly used to pass attributes to the underlying DOM elements</li>
          <li>Requires special handling to parse complex data</li>
          <li>Must define <code>attrs</code> in advance inside the component to receive attribute values</li>
        </ul>
        <p>Grammar Comparison:```html</p>
        <!-- Attribute binding: pass JavaScript values, keep data types -->
        <p><my-component :data-value="complexObject"></my-component>
          <my-component :count="42"></my-component>
          <my-component :is-active="true"></my-component>
        </p>
        <!-- Attribute inheritance: set HTML attributes, all values become strings -->
        <p><my-component attr:data-value="simpleString"></my-component>
          <my-component attr:count="42"></my-component> <!-- Actual passed string "42" -->
        </p>

## Two-way Data Binding

The instantiated component also supports two-way data binding, using the `sync:toProp="fromProp"` syntax. Two-way binding allows data synchronization between parent and child components; when the data on either side changes, the other side updates accordingly.

&gt; Unlike Angular and Vue, ofa.js natively supports two-way data binding syntax without requiring any special configuration or additional operations for components.

In this example:- The `val` of the parent component and the `fullName` of the child component achieve two-way binding through `sync:full-name="val"`
- When content is entered in the parent component's input box, the child component immediately displays the new value
- When content is entered in the child component's input box, the parent component also updates the display immediately

### The Difference Between Two-Way Binding and Regular Property Binding

| Feature | Normal Property Binding (`:`) | Two-Way Binding (`sync:`) |
|--------|-------------------------------|----------------------------|
| Data Flow | One-way: Parent → Child | Two-way: Parent ↔ Child |
| Syntax | `:prop="value"` | `sync:prop="value"` |
| Child Component Modification | Does not affect parent component | Affects parent component |
| Suitable Scenarios | Parent passes configuration to child | Need synchronous data between parent and child |### Precautions

1. **Performance Consideration**: Two-way binding triggers re-rendering when data changes; use it cautiously in complex scenarios  
2. **Data Flow Control**: Excessive two-way binding can make data flow hard to track; design inter-component communication wisely  
3. **Component Compatibility**: Not all components are suited for two-way binding; consider the component’s design purpose</span></code></pre>
