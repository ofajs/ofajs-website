        <h1>Understanding Property Binding</h1>
        <p>In the previous content, we briefly introduced the basic usage of <a href="./property-binding.html" olink="">property binding</a>. The earlier example bound the <code>value</code> property of a native browser element (<code>textarea</code>); this section explores the essence of property binding—it actually binds to the JavaScript property of the instantiated component, not the HTML attribute.</p>
        <h2>Component Property Binding Mechanism</h2>
        <p>In ofa.js, when we use the <code>:toProp="fromProp"</code> syntax in a parent component, we are setting a JavaScript property of the child component instance, not an HTML attribute. This is an important distinction from directly setting HTML attributes (such as <code>attr:toKey="fromKey"</code>).</p>
        <p>The following example demonstrates how to pass data to a custom component through property binding:</p>
        <o-playground name="Understanding Property Binding" style="--editor-height: 500px">
          <code path="demo.html" preview="" unimportant="">
    <template>
      <o-page src="page1.html"></o-page>
    </template>
  </code>
          <code path="page1.html" active="">
    <template page="">
      <l-m src="./demo-comp.html"></l-m>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <h3 style="color:blue;">{{val}}</h3>
      <demo-comp :full-name="val"></demo-comp>
      <script>
        export default async () => {
          return {
            data: {
              val: "ofajs",
            },
          };
        };
      </script>
    </template>
  </code>

        </o-playground>
        <p>In this example:- The <code>val</code> data in the parent component is bound to the <code>fullName</code> prop of the child component <code>&lt;demo-comp&gt;</code>.</p>
        <ul>
          <li>The parent's <code>val</code> is passed to the child's <code>fullName</code> prop using the syntax <code>:full-name="val"</code>.</li>
          <li>After receiving the value, the child component displays it in the template via <code>{{fullName}}</code>.</li>
        </ul>
        <h2>Attribute Binding vs. Feature Attribute Inheritance</h2>
        <p>It is worth noting that property binding (<code>:</code>) and attribute inheritance (<code>attr:</code>) have the following key differences:</p>
        <h3>Property Binding (<code>:</code>)</h3>
        <ul>
          <li>JavaScript properties bound to component instances</li>
          <li>Passed data maintains its original type (strings, numbers, booleans, etc.)</li>
          <li>Can be directly accessed and modified within the component, even without the component internally defining <code>data</code> in advance</li>
        </ul>
        <h3>Feature Attribute Inheritance (<code>attr:</code>)</h3>
        <ul>
          <li>Setting HTML attributes</li>
          <li>All values are converted to strings</li>
          <li>Primarily used for passing attributes to underlying DOM elements</li>
          <li>Requires special handling to parse complex data</li>
          <li>Must define <code>attrs</code> inside the component in advance to receive attribute values</li>
        </ul>
        <p>请提供您需要对比的语法内容或句子，我将为您翻译。```html</p>
        <!-- Property binding: pass JavaScript values while preserving data types -->
        <p><my-component :data-value="complexObject"></my-component>
          <my-component :count="42"></my-component>
          <my-component :is-active="true"></my-component>
        </p>
        <!-- Attribute inheritance: set HTML attributes, all values become strings -->
        <p><my-component attr:data-value="simpleString"></my-component>
          <my-component attr:count="42"></my-component> <!-- actually receives the string "42" -->
        </p>

## Two-way Data Binding

Instantiated components also support two-way data binding using the `sync:toProp="fromProp"` syntax. Two-way binding allows data synchronization between parent and child components—when data changes on either side, the other side updates accordingly.

Unlike Angular and Vue, ofa.js natively supports two-way data binding syntax without requiring special configuration or extra operations for components.

- When text is entered in the parent's input, the child instantly reflects the new value
- When text is entered in the child's input, the parent is immediately updated

### The Difference Between Two-Way Binding and Regular Property Binding

| Feature | Normal Property Binding (`:`) | Two-way Binding (`sync:`) |
|---|---|---|
| Data Flow | One-way: Parent → Child | Two-way: Parent ↔ Child |
| Syntax | `:prop="value"` | `sync:prop="value"` |
| Child Component Modification | Does not affect parent component | Affects parent component |
| Use Cases | Parent passes configuration to child | Need to synchronize data between parent and child |### Precautions

1. **Performance considerations**: Two-way binding triggers re-renders on data changes; use sparingly in complex scenarios.  
2. **Data-flow control**: Excessive two-way binding can make data flow hard to trace; design inter-component communication carefully.  
3. **Component compatibility**: Not every component suits two-way binding; consider the component’s design intent.</span></code></pre>
