        <h1>PATH</h1>
        <p>The <code>PATH</code> attribute is typically used on custom components or page components to obtain the file address of the registered component. During development, this can help you understand the source of the component, especially when you need to reference or load other resource files. You can use the <code>PATH</code> attribute to construct file paths.</p>
        <p>Below is a simple example demonstrating how to use the <code>PATH</code> property in a custom component:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> componentPath = $(<span class="hljs-string">&quot;#myCustomComponent&quot;</span>).<span class="hljs-property">PATH</span>;</code></pre>
        <p>In this example, we selected a <code>my-comp</code> element with the <code>id</code> &quot;myCustomComponent&quot;, and then obtained the file path of this custom component through the <code>PATH</code> attribute. You can use the <code>componentPath</code> variable in the script section as needed, for example, to construct paths for other resource files or perform other operations.</p>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
