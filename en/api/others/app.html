        <h1>o-app component</h1>
        <p><code>o-app</code> is one of the core components in ofa.js, used to configure and manage the entire application. Below are some key properties and methods of the app:</p>
        <h2>src</h2>
        <p>The <code>src</code> attribute is used to specify the exact address of the application parameter configuration module.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> app = $(<span class="hljs-string">&quot;o-app&quot;</span>);
<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(app.<span class="hljs-property">src</span>);</code></pre>
        <h2>current</h2>
        <p><code>current</code> property is used to obtain the currently displayed page instance. This can help you access and manipulate the page that is currently being displayed, for example, to update its content or perform specific operations.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> currentPage = app.<span class="hljs-property">current</span>;</code></pre>
        <h2>goto</h2>
        <p><code>goto</code> method is used to navigate to a specified page. You can pass the address of the target page, and the app will load and display that page. This is an important method for app navigation.</p>
        <pre><code class="hljs language-javascript">app.<span class="hljs-title function_">goto</span>(<span class="hljs-string">&quot;/page2.html&quot;</span>);</code></pre>
        <h2>replace</h2>
        <p><code>replace</code> is similar to the <code>goto</code> method, but it is used to replace the current page instead of adding a new page to the stack. This can be used to implement page replacement instead of stack navigation.</p>
        <pre><code class="hljs language-javascript">app.<span class="hljs-title function_">replace</span>(<span class="hljs-string">&quot;/new-page.html&quot;</span>);</code></pre>
        <h2>back</h2>
        <p><code>back</code> method is used to return to the previous page, implementing the backward operation of page navigation. This will navigate the user back to the previous page.</p>
        <pre><code class="hljs language-javascript">app.<span class="hljs-title function_">back</span>();</code></pre>
        <h2>routers</h2>
        <p><code>routers</code> attribute contains the routing configuration information of the application. This is an important attribute that defines the routing rules and mappings for each page in the application. The routing configuration determines the navigation between pages and how URLs are handled.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> routeConfig = app.<span class="hljs-property">routers</span>;</code></pre>
      </article>

      <script>
        export const parent = "../../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
