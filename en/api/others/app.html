        <h1>o-app Component</h1>
        <p><code>o-app</code> is one of the core components in ofa.js, used to configure and manage the entire application. Here are some key properties and methods of app:</p>
        <h2>src</h2>
        <p>The &quot;src&quot; attribute is used to specify the specific address of the application parameter configuration module.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> app = <span class="hljs-variable language_">document</span>.<span class="hljs-title function_">querySelector</span>(<span class="hljs-string">&quot;o-app&quot;</span>);
<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(app.<span class="hljs-property">src</span>);</code></pre>
        <h2>current</h2>
        <p>The <code>current</code> property is used to obtain the page instance currently being displayed. It lets you access and manipulate the page that is on screen, such as updating its content or performing specific actions.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> currentPage = app.<span class="hljs-property">current</span>;</code></pre>
        <h2>goto</h2>
        <p>The <code>goto</code> method is used to navigate to a specified page. You pass the address of the target page, and the app will load and display it. This is a key method for application navigation.</p>
        <pre><code class="hljs language-javascript">app.<span class="hljs-title function_">goto</span>(<span class="hljs-string">&quot;/page2.html&quot;</span>);</code></pre>
        <h2>replace</h2>
        <p>The <code>replace</code> method is similar to <code>goto</code>, but it is used to replace the current page instead of adding a new page to the stack. This can be used to implement page replacement rather than stack navigation.</p>
        <pre><code class="hljs language-javascript">app.<span class="hljs-title function_">replace</span>(<span class="hljs-string">&quot;/new-page.html&quot;</span>);</code></pre>
        <h2>back</h2>
        <p>The <code>back</code> method is used to return to the previous page, implementing the backward operation of page navigation. This navigates the user back to the previous page.</p>
        <pre><code class="hljs language-javascript">app.<span class="hljs-title function_">back</span>();</code></pre>
        <h2>routers</h2>
        <p>The <code>routers</code> property contains the application&#39;s routing configuration. It is a critical property that defines the routing rules and mappings for each page in the application. The routing configuration determines navigation between pages and how URLs are handled.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> routeConfig = app.<span class="hljs-property">routers</span>;</code></pre>
      </article>

      <script>
        export const parent = "../../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
