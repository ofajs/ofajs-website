      <article class="markdown-body">
        <h1>Instance Data Characteristics</h1>
        <p>Instances obtained or created via <code>$</code> possess the full data capabilities of stanz, because the <code>$</code> instance inherits from stanz. This means you can use stanz’s data manipulation methods and features to operate on and observe the instance’s data.</p>
        <blockquote>
          <p>The following examples use regular elements because custom components typically come with pre-registered data, whereas regular elements usually contain only tag information, making them more suitable for demonstration purposes.</p>
        </blockquote>
        <h2>watch</h2>
        <p>Instances can monitor value changes via the <code>watch</code> method; even if a nested property of an object is modified, the change is still detected in the object's <code>watch</code> method.</p>
        <p>Here is an example demonstrating how to use the <code>$</code> instance and the <code>watch</code> method:</p>
        <o-playground name="stanz - watch" style="--editor-height: 480px">
          <code path="demo.html">
    <template>
      <div id="target"></div>
      <br>
      <div id="logger" style="border: #aaa solid 1px; padding: 8px"></div>
      <script>
        const target = $("#target");
        \$("#logger").text = target;
        target.watch(() => {
          \$("#logger").text = target;
        });
        setTimeout(() => {
          target.aaa = "I am aaa";
        }, 600);
        setTimeout(() => {
          target.bbb = {
            child: {
              val: "I am bbb child val",
            },
          };
        }, 1200);
        setTimeout(() => {
          target.bbb.child.val = "change bbb child val";
        }, 1800);
      </script>
    </template>
  </code>
        </o-playground>
        <p>In this example, we first create a <code>$</code> instance named <code>target</code>, then use the <code>watch</code> method to observe its changes. Even when we modify a nested property such as <code>target.bbb.child.val</code>, the <code>watch</code> method detects the change and updates the content of the <code>logger</code> element. This demonstrates the powerful feature of the <code>$</code> instance, allowing you to effortlessly monitor object mutations.</p>
        <h2>Watch Tick</h2>
        <p><code>watchTick</code> behaves similarly to <code>watch</code>, but it internally throttles execution to once per single thread, making it more efficient for monitoring data changes in performance-critical scenarios.</p>
        <p>Here is an example demonstrating how to use the <code>watchTick</code> method on a <code>$</code> instance:</p>
        <o-playground name="stanz - watchTick" style="--editor-height: 480px">
          <code path="demo.html">
    <template>
      <div id="target"></div>
      <br>
      <div id="logger1" style="border: blue solid 1px; margin: 8px"></div>
      <div id="logger2" style="border: red solid 1px; margin: 8px"></div>
      <script>
        const target = $("#target");
        let count1 = 0;
        target.watch(() => {
          count1++;
          \$("#logger1").text = 'watch runs: ' + count1;
        });
        let count2 = 0;
        target.watchTick(()=>{
          count2++;
          \$("#logger2").text = 'watchTick runs: ' + count2;
        });
        setTimeout(() => {
          target.aaa = "I am aaa";
          target.bbb = "I am bbb";
          target.ccc = "I am ccc";
        }, 1000);
      </script>
    </template>
  </code>
        </o-playground>
        <p>In this example, we first create a <code>$</code> instance named <code>target</code>. Then we use the <code>watch</code> and <code>watchTick</code> methods to observe changes to the object. <code>watch</code> runs immediately when data changes, whereas <code>watchTick</code> executes once per tick under a single thread, thus throttling the frequency of observation. You can choose either <code>watch</code> or <code>watchTick</code> according to your needs.</p>
        <h2>unwatch</h2>
        <p>The <code>unwatch</code> method is used to cancel data monitoring and can revoke previously registered <code>watch</code> or <code>watchTick</code> listeners.</p>
        <p>Below is an example demonstrating how to use the <code>unwatch</code> method on a <code>$</code> instance:</p>
        <o-playground name="stanz - unwatch" style="--editor-height: 480px">
          <code path="demo.html">
    <template>
      <div id="target"></div>
      <br>
      <div id="logger1" style="border: blue solid 1px; margin: 8px"></div>
      <div id="logger2" style="border: red solid 1px; margin: 8px"></div>
      <script>
        const target = $("#target");
        const tid1 = target.watch(() => {
          \$("#logger1").text = JSON.stringify(target);
        });
        const tid2 = target.watchTick(()=>{
          \$("#logger2").text = JSON.stringify(target);
        });
        setTimeout(() => {
          target.aaa = "I am aaa";
          target.unwatch(tid1);
          target.unwatch(tid2);
        }, 500);
        setTimeout(() => {
          target.bbb = "I am aaa";
        }, 1000);
      </script>
    </template>
  </code>
        </o-playground>
        <p>In this example, we first create a <code>$</code> instance object named <code>target</code>, then register two listeners using the <code>watch</code> and <code>watchTick</code> methods. Later, we revoke these two listeners by passing the previously saved listener return values <code>tid1</code> and <code>tid2</code> to the <code>unwatch</code> method. This means that the property change in the first <code>setTimeout</code> will not trigger any listener, because the listeners have been revoked.</p>
        <h2>unmonitored values</h2>
        <p>In a <code>$</code> instance, property names that start with an underscore <code>_</code> indicate values that will not be observed by the <code>watch</code> or <code>watchTick</code> methods. This is useful for temporary or private properties, letting you change them freely without triggering any watchers.</p>
        <p>Within templates, this is referred to as <a href="../../documentation/state-management.html" olink="">non-reactive data</a>.</p>
        <p>Here's an example showing how to use underscore-prefixed property values to avoid being watched:</p>
        <o-playground name="stanz - non-reactive data" style="--editor-height: 480px">
          <code path="demo.html">
    <template>
      <div id="target"></div>
      <br>
      <div id="logger" style="border: #aaa solid 1px; padding: 8px"></div>
      <script>
        const target = $("#target");
        \$("#logger").text = target;
        target.watch(() => {
          \$("#logger").text = target;
        });
        setTimeout(() => {
          target._aaa = "I am aaa";
        }, 600);
        setTimeout(() => {
          target._aaa = "change aaa";
        }, 1200);
      </script>
    </template>
  </code>
        </o-playground>
        <p>In this example, we create a <code>$</code> instance object named <code>target</code> and use the <code>watch</code> method to listen for changes in property values. Inside <code>setTimeout</code>, we attempt to modify the <code>_aaa</code> property, but this change does not trigger the listener. This is useful when you need to update a property without triggering the watch.</p>
        <h2>Basic Features</h2>
        <p>Object data set on an instance will be converted to a Stanz instance, which allows listening.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> obj = {
  <span class="hljs-attr">val</span>: <span class="hljs-string">"I am obj"</span>
};

$(<span class="hljs-string">"#target"</span>).<span class="hljs-property">obj</span> = obj;
<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>($(<span class="hljs-string">"#target"</span>).<span class="hljs-property">obj</span>.<span class="hljs-property">val</span> === obj.<span class="hljs-property">val</span>);
<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>($(<span class="hljs-string">"#target"</span>).<span class="hljs-property">obj</span> === obj);</code></pre>
        <p>We can also use <code>$.stanz</code> to create a Stanz data that is not bound to an instance.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> data = $.<span class="hljs-title function_">stanz</span>({
  <span class="hljs-attr">val</span>: <span class="hljs-string">"I am val"</span>
});

data.<span class="hljs-title function_">watch</span>(<span class="hljs-function">() =&gt;</span> {
  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(data.<span class="hljs-property">val</span>);
});

data.<span class="hljs-property">val</span> = <span class="hljs-string">"change val"</span>;</code></pre>
        <p>These examples demonstrate the basic characteristics of setting object data as Stanz instances for listening.</p>
        <p>For more complete features, please refer to <a href="https://github.com/ofajs/stanz" target="_blank">stanz</a>.</p>
