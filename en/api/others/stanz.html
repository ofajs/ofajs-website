      <article class="markdown-body">
        <h1>Instance Data Features</h1>
        <p>Instance objects obtained or created through <code>$</code> possess complete stanz data characteristics, because <code>$</code> instances are inherited from stanz. This means you can utilize the data manipulation methods and features provided by <code>stanz</code> to operate on and listen to the data of the instance object.</p>
        <blockquote>
          <p>The following example uses regular elements, because custom components usually come with pre-registered data, whereas regular elements typically contain only tag information and are therefore more suitable for demonstration.</p>
        </blockquote>
        <h2>watch</h2>
        <p>Instances can listen for value changes through the <code>watch</code> method; even if the value of a sub-object of an object is modified, the change can be detected in the object's <code>watch</code> method.</p>
        <p>Below is an example showing how to use the <code>$</code> instance and the <code>watch</code> method:</p>
        <o-playground name="stanz - watch" style="--editor-height: 480px">
          <code path="demo.html">
    <template>
      <div id="target"></div>
      <br>
      <div id="logger" style="border: #aaa solid 1px; padding: 8px"></div>
      <script>
        const target = $("#target");
        \$("#logger").text = target;
        target.watch(() => {
          \$("#logger").text = target;
        });
        setTimeout(() => {
          target.aaa = "I am aaa";
        }, 600);
        setTimeout(() => {
          target.bbb = {
            child: {
              val: "I am bbb child val",
            },
          };
        }, 1200);
        setTimeout(() => {
          target.bbb.child.val = "change bbb child val";
        }, 1800);
      </script>
    </template>
  </code>
        </o-playground>
        <p>In this example, we first create a <code>$</code> instance object <code>target</code>, and then use the <code>watch</code> method to monitor its changes. Even if we modify the value of a sub-object of the object, such as the value of <code>target.bbb.child.val</code>, the <code>watch</code> method can detect these changes and update the content of the <code>logger</code> element. This demonstrates the powerful features of the <code>$</code> instance object, allowing you to easily monitor changes in objects.</p>
        <h2>watchTick</h2>
        <p><code>watchTick</code> is similar to the <code>watch</code> method in functionality, but <code>watchTick</code> has a throttling operation inside, which executes once in a single thread, so in some scenarios with higher performance requirements, it can monitor data changes more effectively.</p>
        <p>Below is an example demonstrating how to use the <code>watchTick</code> method of the <code>$</code> instance:</p>
        <o-playground name="stanz - watchTick" style="--editor-height: 480px">
          <code path="demo.html">
    <template>
      <div id="target"></div>
      <br>
      <div id="logger1" style="border: blue solid 1px; margin: 8px"></div>
      <div id="logger2" style="border: red solid 1px; margin: 8px"></div>
      <script>
        const target = $("#target");
        let count1 = 0;
        target.watch(() => {
          count1++;
          \$("#logger1").text = 'watch runs: ' + count1;
        });
        let count2 = 0;
        target.watchTick(()=>{
          count2++;
          \$("#logger2").text = 'watchTick runs: ' + count2;
        });
        setTimeout(() => {
          target.aaa = "I am aaa";
          target.bbb = "I am bbb";
          target.ccc = "I am ccc";
        }, 1000);
      </script>
    </template>
  </code>
        </o-playground>
        <p>In this example, we first create a <code>$</code> instance object <code>target</code>. Then, we use the <code>watch</code> method and the <code>watchTick</code> method to listen for changes in the object. The <code>watch</code> method runs immediately when the data changes, whereas the <code>watchTick</code> method executes once under a single thread, thus limiting the frequency of the listening operation. You can choose to use either the <code>watch</code> or the <code>watchTick</code> method to listen for data changes according to your needs.</p>
        <h2>unwatch</h2>
        <p><code>unwatch</code> method is used to cancel the monitoring of data, and can revoke the previously registered <code>watch</code> or <code>watchTick</code> listeners.</p>
        <p>Here is an example demonstrating how to use the <code>unwatch</code> method of a <code>$</code> instance:</p>
        <o-playground name="stanz - unwatch" style="--editor-height: 480px">
          <code path="demo.html">
    <template>
      <div id="target"></div>
      <br>
      <div id="logger1" style="border: blue solid 1px; margin: 8px"></div>
      <div id="logger2" style="border: red solid 1px; margin: 8px"></div>
      <script>
        const target = $("#target");
        const tid1 = target.watch(() => {
          \$("#logger1").text = JSON.stringify(target);
        });
        const tid2 = target.watchTick(()=>{
          \$("#logger2").text = JSON.stringify(target);
        });
        setTimeout(() => {
          target.aaa = "I am aaa";
          target.unwatch(tid1);
          target.unwatch(tid2);
        }, 500);
        setTimeout(() => {
          target.bbb = "I am aaa";
        }, 1000);
      </script>
    </template>
  </code>
        </o-playground>
        <p>In this example, we first create a <code>$</code> instance object <code>target</code>, and then use the <code>watch</code> method and the <code>watchTick</code> method to register two listeners respectively. After that, we pass the previously saved listener return values <code>tid1</code> and <code>tid2</code> to the <code>unwatch</code> method to revoke these two listeners. This means that the property change in the first <code>setTimeout</code> will not trigger any listener, because the listeners have been revoked.</p>
        <h2>Values that are not listened to</h2>
        <p>In the <code>$</code> instance, property names starting with an underscore <code>_</code> indicate that these values will not be watched by the <code>watch</code> or <code>watchTick</code> methods. This is useful for temporary or private properties, allowing you to modify them freely without triggering watchers.</p>
        <p>Inside the template, this is called <a href="../../documentation/state-management.html" olink="">non-reactive data</a>.</p>
        <p>Below is an example demonstrating how to use attribute values starting with an underscore to avoid being listened to:</p>
        <o-playground name="stanz - Non-reactive data" style="--editor-height: 480px">
          <code path="demo.html">
    <template>
      <div id="target"></div>
      <br>
      <div id="logger" style="border: #aaa solid 1px; padding: 8px"></div>
      <script>
        const target = $("#target");
        \$("#logger").text = target;
        target.watch(() => {
          \$("#logger").text = target;
        });
        setTimeout(() => {
          target._aaa = "I am aaa";
        }, 600);
        setTimeout(() => {
          target._aaa = "change aaa";
        }, 1200);
      </script>
    </template>
  </code>
        </o-playground>
        <p>In this example, we create a <code>$</code> instance object <code>target</code>, and then use the <code>watch</code> method to listen for changes to property values. In <code>setTimeout</code>, we attempt to change the <code>_aaa</code> property value, but this change will not trigger the listener. This is very useful for situations where you need to update property values without triggering a listener.</p>
        <h2>Basic Features</h2>
        <p>Object data set on the instance will be converted into a Stanz instance, and this Stanz instance allows for monitoring.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> obj = {
  <span class="hljs-attr">val</span>: <span class="hljs-string">"I am obj"</span>
};

$(<span class="hljs-string">"#target"</span>).<span class="hljs-property">obj</span> = obj;
<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>($(<span class="hljs-string">"#target"</span>).<span class="hljs-property">obj</span>.<span class="hljs-property">val</span> === obj.<span class="hljs-property">val</span>);
<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>($(<span class="hljs-string">"#target"</span>).<span class="hljs-property">obj</span> === obj);</code></pre>
        <p>We can also use <code>$.stanz</code> to create a Stanz data object that is not bound to an instance.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> data = $.<span class="hljs-title function_">stanz</span>({
  <span class="hljs-attr">val</span>: <span class="hljs-string">"I am val"</span>
});

data.<span class="hljs-title function_">watch</span>(<span class="hljs-function">() =&gt;</span> {
  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(data.<span class="hljs-property">val</span>);
});

data.<span class="hljs-property">val</span> = <span class="hljs-string">"change val"</span>;</code></pre>
        <p>These examples demonstrate the basic feature of setting object data as a Stanz instance for monitoring.</p>
        <p>For more complete features, please refer to <a href="https://github.com/ofajs/stanz" target="_blank">stanz</a>.</p>
