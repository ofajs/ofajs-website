        <h1>Module returns object properties</h1>
        <p>In ofa.js, whether it's a page module or a component module, you need to return an object via <code>export default async () =&gt; {}</code> to define the module's configuration and behavior. This document summarizes all properties that can be included in the returned object.</p>
        <h2>Property Overview</h2>
        <table>
          <thead>
            <tr>
              <th>Property</th>
              <th>Type</th>
              <th align="center">Page Module</th>
              <th align="center">Component Module</th>
              <th>Description</th>
              <th>Related Documentation</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><code>tag</code></td>
              <td><code>string</code></td>
              <td align="center">❌</td>
              <td align="center">✅ Required</td>
              <td>Component tag name</td>
              <td><a href="../../documentation/create-component.html" olink="">Create Component</a></td>
            </tr>
            <tr>
              <td><code>data</code></td>
              <td><code>object</code></td>
              <td align="center">✅</td>
              <td align="center">✅</td>
              <td>Reactive data object</td>
              <td><a href="../../documentation/property-response.html" olink="">Property Response</a></td>
            </tr>
            <tr>
              <td><code>attrs</code></td>
              <td><code>object</code></td>
              <td align="center">❌</td>
              <td align="center">✅</td>
              <td>Component attribute definitions</td>
              <td><a href="../../documentation/inherit-attributes.html" olink="">Inherit Attributes</a></td>
            </tr>
            <tr>
              <td><code>proto</code></td>
              <td><code>object</code></td>
              <td align="center">✅</td>
              <td align="center">✅</td>
              <td>Methods and computed properties</td>
              <td><a href="../../documentation/computed-properties.html" olink="">Computed Properties</a></td>
            </tr>
            <tr>
              <td><code>watch</code></td>
              <td><code>object</code></td>
              <td align="center">✅</td>
              <td align="center">✅</td>
              <td>Watchers</td>
              <td><a href="../../documentation/watchers.html" olink="">Watchers</a></td>
            </tr>
            <tr>
              <td><code>ready</code></td>
              <td><code>function</code></td>
              <td align="center">✅</td>
              <td align="center">✅</td>
              <td>Called when DOM is created</td>
              <td><a href="../../documentation/lifecycle.html" olink="">Lifecycle</a></td>
            </tr>
            <tr>
              <td><code>attached</code></td>
              <td><code>function</code></td>
              <td align="center">✅</td>
              <td align="center">✅</td>
              <td>Called when attached to DOM</td>
              <td><a href="../../documentation/lifecycle.html" olink="">Lifecycle</a></td>
            </tr>
            <tr>
              <td><code>detached</code></td>
              <td><code>function</code></td>
              <td align="center">✅</td>
              <td align="center">✅</td>
              <td>Called when removed from DOM</td>
              <td><a href="../../documentation/lifecycle.html" olink="">Lifecycle</a></td>
            </tr>
            <tr>
              <td><code>loaded</code></td>
              <td><code>function</code></td>
              <td align="center">✅</td>
              <td align="center">✅</td>
              <td>Called when fully loaded</td>
              <td><a href="../../documentation/lifecycle.html" olink="">Lifecycle</a></td>
            </tr>
            <tr>
              <td><code>routerChange</code></td>
              <td><code>function</code></td>
              <td align="center">✅ Parent Page</td>
              <td align="center">❌</td>

          </tbody>
        </table>
        <h2>Core Attributes</h2>
        <h3>tag</h3>
        <p><code>tag</code> is the tag name of the component, and <strong>this attribute must be defined for component modules</strong>. Page modules do not need to define <code>tag</code>.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">async</span> () =&gt; {
  <span class="hljs-keyword">return</span> {
    <span class="hljs-attr">tag</span>: <span class="hljs-string">"my-component"</span>,
    <span class="hljs-comment">// ...</span>
  };
};</code></pre>
        <blockquote>
          <p>Note: The value of <code>tag</code> must match the tag name used when using the component.</p>
        </blockquote>
        <h3>data</h3>
        <p><code>data</code> is a reactive data object used to store the state data of a component or page. The view automatically updates when the data changes.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">async</span> () =&gt; {
  <span class="hljs-keyword">return</span> {
    <span class="hljs-attr">data</span>: {
      <span class="hljs-attr">message</span>: <span class="hljs-string">"Hello"</span>,
      <span class="hljs-attr">count</span>: <span class="hljs-number">0</span>,
      <span class="hljs-attr">user</span>: {
        <span class="hljs-attr">name</span>: <span class="hljs-string">"Zhang San"</span>,
        <span class="hljs-attr">age</span>: <span class="hljs-number">25</span>
      },
      <span class="hljs-attr">items</span>: [<span class="hljs-number">1</span>, <span class="hljs-number">2</span>, <span class="hljs-number">3</span>]
    }
  };
};</code></pre>
        <blockquote>
          <p>Note: <code>data</code> is an object, not a function, unlike in the Vue framework.</p>
        </blockquote>
        <h3>attrs</h3>
        <p><code>attrs</code> is used to define component properties and receive externally passed data. Only component modules need to define <code>attrs</code>.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">async</span> () =&gt; {
  <span class="hljs-keyword">return</span> {
    <span class="hljs-attr">tag</span>: <span class="hljs-string">"my-component"</span>,
    <span class="hljs-attr">attrs</span>: {
      <span class="hljs-attr">title</span>: <span class="hljs-literal">null</span>,      <span class="hljs-comment">// no default value</span>
      <span class="hljs-attr">disabled</span>: <span class="hljs-string">""</span>,     <span class="hljs-comment">// has default value</span>
      <span class="hljs-attr">size</span>: <span class="hljs-string">"medium"</span>    <span class="hljs-comment">// has default value</span>
    }
  };
};</code></pre>
        <p>When using the component, pass properties:</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">my-component</span> <span class="hljs-attr">title</span>=<span class="hljs-string">"Title"</span> <span class="hljs-attr">disabled</span> <span class="hljs-attr">size</span>=<span class="hljs-string">"large"</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">my-component</span>&gt;</span></code></pre>
        <blockquote>
          <p>Important Rules:</p>
          <ul>
            <li>The passed attribute value must be a string; if it is not a string, it will be automatically converted to a string</li>
            <li>Name conversion: <code>fullName</code> → <code>full-name</code> (kebab-case format)</li>
            <li>The keys in <code>attrs</code> and <code>data</code> must not be duplicated</li>
          </ul>
        </blockquote>
        <h3>proto</h3>
        <p><code>proto</code> is used to define methods and computed properties. Computed properties are defined using JavaScript's <code>get</code> and <code>set</code> keywords.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">async</span> () =&gt; {
  <span class="hljs-keyword">return</span> {
    <span class="hljs-attr">data</span>: {
      <span class="hljs-attr">count</span>: <span class="hljs-number">0</span>
    },
    <span class="hljs-attr">proto</span>: {
      <span class="hljs-comment">// Method definition</span>
      <span class="hljs-title function_">increment</span>(<span class="hljs-params"></span>) {
        <span class="hljs-variable language_">this</span>.<span class="hljs-property">count</span>++;
      },
      
      <span class="hljs-comment">// Computed property (getter)</span>
      <span class="hljs-keyword">get</span> <span class="hljs-title function_">doubleCount</span>() {
        <span class="hljs-keyword">return</span> <span class="hljs-variable language_">this</span>.<span class="hljs-property">count</span> * <span class="hljs-number">2</span>;
      },
      
      <span class="hljs-comment">// Computed property</span>
      <span class="hljs-keyword">set</span> <span class="hljs-title function_">doubleCount</span>(<span class="hljs-params">val</span>) {
        <span class="hljs-variable language_">this</span>.<span class="hljs-property">count</span> = val / <span class="hljs-number">2</span>;
      }
    }
  };
};</code></pre>
        <blockquote>
          <p>Note: ofa.js uses the <code>get</code>/<code>set</code> keywords to define computed properties, not Vue's <code>computed</code> option.</p>
        </blockquote>
        <h3>watch</h3>
        <p><code>watch</code> is used to define watchers, monitor data changes, and execute corresponding logic.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">async</span> () =&gt; {
  <span class="hljs-keyword">return</span> {
    <span class="hljs-attr">data</span>: {
      <span class="hljs-attr">count</span>: <span class="hljs-number">0</span>,
      <span class="hljs-attr">name</span>: <span class="hljs-string">""</span>
    },
    <span class="hljs-attr">watch</span>: {
      <span class="hljs-comment">// Listen to a single property</span>
      <span class="hljs-title function_">count</span>(<span class="hljs-params">newVal, { watchers }</span>) {
        <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">'count changed:'</span>, newVal);
      },
      
      <span class="hljs-comment">// Listen to multiple properties</span>
      <span class="hljs-string">"count,name"</span>() {
        <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">'count or name changed'</span>);
      }
    }
  };
};</code></pre>
        <p>The listener callback function receives two parameters:- <code>newValue</code>: The new value after the change</p>
        <ul>
          <li><code>{ watchers }</code>: All watcher objects of the current component</li>
        </ul>
        <h2>Lifecycle Hooks</h2>
        <p>Lifecycle hooks allow you to execute specific logic at different stages of a component.</p>
        <h3>ready</h3>
        <p>The <code>ready</code> hook is called when the component is ready, at which point the component's template has been rendered, DOM elements have been created, but may not yet be inserted into the document.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-title function_">ready</span>(<span class="hljs-params"></span>) {
  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">'DOM created'</span>);
  <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">initDomElements</span>();
}</code></pre>
        <h3>attached</h3>
        <p>The <code>attached</code> hook is called when the component is inserted into the document, indicating that the component has been mounted to the page.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-title function_">attached</span>(<span class="hljs-params"></span>) {
  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">'Mounted to DOM'</span>);
  <span class="hljs-variable language_">this</span>.<span class="hljs-property">_timer</span> = <span class="hljs-built_in">setInterval</span>(<span class="hljs-function">() =&gt;</span> {
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">count</span>++;
  }, <span class="hljs-number">1000</span>);
}</code></pre>
        <h3>detached</h3>
        <p><code>detached</code> hook is called when the component is removed from the document, indicating that the component is about to be unmounted.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-title function_">detached</span>(<span class="hljs-params"></span>) {
  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">'Removed from DOM'</span>);
  <span class="hljs-built_in">clearInterval</span>(<span class="hljs-variable language_">this</span>.<span class="hljs-property">_timer</span>);
}</code></pre>
        <h3>loaded</h3>
        <p>The <code>loaded</code> hook is triggered after the component, all its child components, and all asynchronous resources have been fully loaded.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-title function_">loaded</span>(<span class="hljs-params"></span>) {
  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">'Fully loaded'</span>);
}</code></pre>
        <h3>routerChange</h3>
        <p><code>routerChange</code> hook is called when the route changes, and is only used for parent pages to listen to child page switching.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-title function_">routerChange</span>(<span class="hljs-params"></span>) {
  <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">refreshActive</span>();
}</code></pre>
        <h2>Lifecycle Execution Order</h2>
        <pre><code class="hljs">ready → attached → loaded
                 ↓
              detached（removed）</code></pre>
        <h2>Special Export：parent</h2>
        <p><code>parent</code> is used for nested routes, specifying the parent page path of the current page. It's a standalone export, not part of the returned object.</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">template</span> <span class="hljs-attr">page</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css"><span class="hljs-selector-pseudo">:host</span> { <span class="hljs-attribute">display</span>: block; }</span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">div</span>&gt;</span>Subpage content<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">
    <span class="hljs-comment">// Specify parent page</span>
    <span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> parent = <span class="hljs-string">"./layout.html"</span>;
    
    <span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">async</span> () =&gt; {
      <span class="hljs-keyword">return</span> {
        <span class="hljs-attr">data</span>: {}
      };
    };
  </span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">template</span>&gt;</span></code></pre>
        <h2>Complete Example</h2>
        <h3>Component Module</h3>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">template</span> <span class="hljs-attr">component</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
    <span class="hljs-selector-pseudo">:host</span> { <span class="hljs-attribute">display</span>: block; <span class="hljs-attribute">padding</span>: <span class="hljs-number">10px</span>; }
  </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">div</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">p</span>&gt;</span>{{title}}<span class="hljs-tag">&lt;/<span class="hljs-name">p</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">p</span>&gt;</span>Count: {{count}}<span class="hljs-tag">&lt;/<span class="hljs-name">p</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">p</span>&gt;</span>Double: {{doubleCount}}<span class="hljs-tag">&lt;/<span class="hljs-name">p</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">button</span> <span class="hljs-attr">on:click</span>=<span class="hljs-string">"increment"</span>&gt;</span>Increase<span class="hljs-tag">&lt;/<span class="hljs-name">button</span>&gt;</span>
  <span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">
    <span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">async</span> () =&gt; {
      <span class="hljs-keyword">return</span> {
        <span class="hljs-attr">tag</span>: <span class="hljs-string">"my-component"</span>,
        <span class="hljs-attr">attrs</span>: {
          <span class="hljs-attr">title</span>: <span class="hljs-string">"Default Title"</span>
        },
        <span class="hljs-attr">data</span>: {
          <span class="hljs-attr">count</span>: <span class="hljs-number">0</span>
        },
        <span class="hljs-attr">proto</span>: {
          <span class="hljs-title function_">increment</span>(<span class="hljs-params"></span>) {
            <span class="hljs-variable language_">this</span>.<span class="hljs-property">count</span>++;
          },
          <span class="hljs-keyword">get</span> <span class="hljs-title function_">doubleCount</span>() {
            <span class="hljs-keyword">return</span> <span class="hljs-variable language_">this</span>.<span class="hljs-property">count</span> * <span class="hljs-number">2</span>;
          }
        },
        <span class="hljs-attr">watch</span>: {
          <span class="hljs-title function_">count</span>(<span class="hljs-params">newVal</span>) {
            <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">'count changed to:'</span>, newVal);
          }
        },
        <span class="hljs-title function_">ready</span>(<span class="hljs-params"></span>) {
          <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">'Component is ready'</span>);
        },
        <span class="hljs-title function_">attached</span>(<span class="hljs-params"></span>) {
          <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">'Component attached'</span>);
        },
        <span class="hljs-title function_">detached</span>(<span class="hljs-params"></span>) {
          <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">'Component detached'</span>);
        }
      };
    };
  </span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">template</span>&gt;</span></code></pre>
        <h3>Page Module</h3>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">template</span> <span class="hljs-attr">page</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
    <span class="hljs-selector-pseudo">:host</span> { <span class="hljs-attribute">display</span>: block; <span class="hljs-attribute">padding</span>: <span class="hljs-number">10px</span>; }
  </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">div</span>&gt;</span>{{message}}<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">
    <span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> parent = <span class="hljs-string">"./layout.html"</span>;
    
    <span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">async</span> ({ load, query }) =&gt; {
      <span class="hljs-keyword">return</span> {
        <span class="hljs-attr">data</span>: {
          <span class="hljs-attr">message</span>: <span class="hljs-string">"Hello ofa.js"</span>
        },
        
        <span class="hljs-attr">proto</span>: {
          <span class="hljs-title function_">handleClick</span>(<span class="hljs-params"></span>) {
            <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">'clicked'</span>);
          }
        },
        
        <span class="hljs-attr">watch</span>: {
          <span class="hljs-title function_">message</span>(<span class="hljs-params">val</span>) {
            <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">'message changed:'</span>, val);
          }
        },
        
        <span class="hljs-title function_">ready</span>(<span class="hljs-params"></span>) {
          <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">'Page is ready'</span>);
        },
        
        <span class="hljs-title function_">attached</span>(<span class="hljs-params"></span>) {
          <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">'Page is attached'</span>);
          <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">'Query params:'</span>, query);
        },
        
        <span class="hljs-title function_">detached</span>(<span class="hljs-params"></span>) {
          <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">'Page is detached'</span>);
        }
      };
    };
  </span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">template</span>&gt;</span></code></pre>
        <h2>Common Errors</h2>
        <h3>1. Duplicate keys in attrs and data</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// ❌ Incorrect</span>
<span class="hljs-keyword">return</span> {
  <span class="hljs-attr">attrs</span>: { <span class="hljs-attr">title</span>: <span class="hljs-string">""</span> },
  <span class="hljs-attr">data</span>: { <span class="hljs-attr">title</span>: <span class="hljs-string">"Hello"</span> }  <span class="hljs-comment">// Duplicate with attrs</span>
};

<span class="hljs-comment">// ✅ Correct</span>
<span class="hljs-keyword">return</span> {
  <span class="hljs-attr">attrs</span>: { <span class="hljs-attr">title</span>: <span class="hljs-string">""</span> },
  <span class="hljs-attr">data</span>: { <span class="hljs-attr">message</span>: <span class="hljs-string">"Hello"</span> }  <span class="hljs-comment">// Use a different key</span>
};</code></pre>
        <h3>2. Defining Computed Properties in Vue Style</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// ❌ Incorrect</span>
<span class="hljs-keyword">return</span> {
  <span class="hljs-attr">computed</span>: {
    <span class="hljs-title function_">doubleCount</span>(<span class="hljs-params"></span>) {
      <span class="hljs-keyword">return</span> <span class="hljs-variable language_">this</span>.<span class="hljs-property">count</span> * <span class="hljs-number">2</span>;
    }
  }
};

<span class="hljs-comment">// ✅ Correct</span>
<span class="hljs-keyword">return</span> {
  <span class="hljs-attr">proto</span>: {
    <span class="hljs-keyword">get</span> <span class="hljs-title function_">doubleCount</span>() {
      <span class="hljs-keyword">return</span> <span class="hljs-variable language_">this</span>.<span class="hljs-property">count</span> * <span class="hljs-number">2</span>;
    }
  }
};</code></pre>
        <h3>3. data defined as a function</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// ❌ Wrong</span>
<span class="hljs-keyword">return</span> {
  <span class="hljs-title function_">data</span>(<span class="hljs-params"></span>) {
    <span class="hljs-keyword">return</span> { <span class="hljs-attr">count</span>: <span class="hljs-number">0</span> };
  }
};

<span class="hljs-comment">// ✅ Correct</span>
<span class="hljs-keyword">return</span> {
  <span class="hljs-attr">data</span>: {
    <span class="hljs-attr">count</span>: <span class="hljs-number">0</span>
  }
};</code></pre>
        <h3>4. Method Defined in Wrong Location</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// ❌ Wrong</span>
<span class="hljs-keyword">return</span> {
  <span class="hljs-attr">methods</span>: {
    <span class="hljs-title function_">handleClick</span>(<span class="hljs-params"></span>) {}
  }
};

<span class="hljs-comment">// ✅ Correct</span>
<span class="hljs-keyword">return</span> {
  <span class="hljs-attr">proto</span>: {
    <span class="hljs-title function_">handleClick</span>(<span class="hljs-params"></span>) {}
  }
};</code></pre>
