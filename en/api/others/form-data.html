        <h1>formData</h1>
        <p>The <code>formData</code> method is used to generate object data bound to form elements, making it simpler and more efficient to handle form elements. This method generates an object that contains the values of all form elements within the target element, and the object reflects changes to the form elements in real time.</p>
        <p>In the following example, we demonstrate how to use the <code>formData</code> method to generate object data bound to form elements:</p>
        <o-playground name="formData - Basic Usage" style="--editor-height: 500px">
          <code path="demo.html">
    <template>
      <form id="myForm">
        <input type="text" name="username" value="John Doe" />
        <div>
          sex:
          <label>
            man
            <input type="radio" name="sex" value="man" />
          </label>
          <label>
            woman
            <input type="radio" name="sex" value="woman" />
          </label>
        </div>
        <textarea name="message">Hello World!</textarea>
      </form>
      <br />
      <div id="logger"></div>
      <script>
        const data = $("#myForm").formData();
        \$("#logger").text = data;
        data.watch(() => {
          \$("#logger").text = data;
        });
      </script>
    </template>
  </code>
        </o-playground>
        <p>In this example, we created a form containing a text input, radio buttons, and a text area, and used the <code>formData</code> method to create an object <code>data</code> that includes the values of these form elements. We also used the <code>watch</code> method to monitor changes in the data and display the data in real-time on the page. When the user modifies the values of form elements, the <code>data</code> object updates accordingly, making data processing very simple and efficient.</p>
        <h2>Reverse Data Binding</h2>
        <p>The generated object data also has reverse binding capability, which means that when you modify an object&#39;s properties, the corresponding form element values will automatically update. This is very useful when processing form data, as you can easily achieve two-way data binding.</p>
        <p>In the following example, we demonstrate how to use the object data generated by the <code>formData</code> method, and how to perform reverse data binding:</p>
        <o-playground name="formData - Reverse binding" style="--editor-height: 500px">
          <code path="demo.html">
    <template>
      <form id="myForm">
        <input type="text" name="username" value="John Doe" />
        <div>
          sex:
          <label>
            man
            <input type="radio" name="sex" value="man" />
          </label>
          <label>
            woman
            <input type="radio" name="sex" value="woman" />
          </label>
        </div>
        <textarea name="message">Hello World!</textarea>
      </form>
      <br />
      <div id="logger"></div>
      <script>
        const data = $("#myForm").formData();
        setTimeout(()=>{
          data.username = "Yao";
          data.sex = "man";
          data.message = "ofa.js is good!";
        },1000);
      </script>
    </template>
  </code>
        </o-playground>
        <p>In this example, we first created a form containing a text input, radio buttons, and a text area, then used the <code>formData</code> method to generate a data object <code>data</code>. Subsequently, by modifying the properties of the <code>data</code> object, we achieved reverse data binding, meaning that the values of the form elements automatically update as the object&#39;s properties change. This two-way data binding feature makes interaction with form data more convenient.</p>
        <h2>Monitor specific forms</h2>
        <p>By default, the <code>formData()</code> method listens to all <code>input</code>, <code>select</code>, and <code>textarea</code> elements within the target element. However, if you only want to listen to specific form elements, you can achieve this by passing a CSS selector.</p>
        <p>In the following example, we demonstrate how to listen to specific form elements by passing CSS selectors:</p>
        <o-playground name="formData - specific form" style="--editor-height: 500px">
          <code path="demo.html">
    <template>
      <form id="myForm">
        <input type="text" name="username" value="John Doe" class="use-it" />
        <div>
          sex:
          <label>
            man
            <input type="radio" name="sex" value="man" class="use-it" />
          </label>
          <label>
            woman
            <input type="radio" name="sex" value="woman" class="use-it" />
          </label>
        </div>
        <textarea name="message">This form element is not bound</textarea>
      </form>
      <br />
      <div id="logger"></div>
      <script>
        const data = $("#myForm").formData(".use-it");
        \$("#logger").text = data;
        data.watch(() => {
          \$("#logger").text = data;
        });
      </script>
    </template>
  </code>
        </o-playground>
        <p>In this example, we only want to listen to form elements with a <code>class</code> of &quot;use-it&quot;, so we passed <code>&quot;.use-it&quot;</code> as a parameter to the <code>formData()</code> method. In this way, only form elements with that class name will be listened to and included in the generated data object. This is useful for selectively listening to form elements to manage your form data more precisely.</p>
        <h2>Custom Form</h2>
        <p>The use of custom form components is very simple, just add a <strong>value attribute</strong> to the custom component and set the <strong>name feature</strong>.</p>
        <o-playground name="formData - Custom Form" style="--editor-height: 500px">
          <code path="demo.html" preview active>
    <template>
      <div id="myForm">
        <input type="text" name="username" value="John Doe" />
        <l-m src="./custom-input.html"></l-m>
        <custom-input name="message"></custom-input>
        <div id="logger"></div>
      </div>
      <script>
        const data = $("#myForm").formData("input,custom-input");
        \$("#logger").text = data;
        data.watch(() => {
          \$("#logger").text = data;
        });
      </script>
    </template>
  </code>
          <code path="custom-input.html">
    <template component>
      <style>
        :host{
          display: block;
        }
        .editor {
          display: inline-block;
          min-width: 200px;
          line-height: 30px;
          height: 30px;
          border: #aaa solid 1px;
          border-radius: 4px;
          padding: 4px;
          font-size: 14px;
        }
      </style>
      <div
        class="editor"
        contenteditable="plaintext-only"
        :text="value"
        on:input="changeText"
      ></div>
      <script>
        export default {
          tag:"custom-input",
          attrs: {
            name: "",
          },
          data: {
            value: "Default txt",
          },
          proto: {
            changeText(e) {
              this.value = $(e.target).text;
            },
          },
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>When using custom form components, you only need to add them to your form and set the required <code>name</code> attribute. In the example above, we use a custom form component by adding a <code>&lt;custom-input&gt;</code> element and setting the <code>name</code> attribute. Subsequently, we use the <code>formData()</code> method to listen to the values of input elements and custom components, so as to obtain and process form data in real time. This approach allows you to easily extend your form to include custom form components, thereby meeting your specific needs.</p>
        <h2>Using Form Data within Components or Pages</h2>
        <p>Sometimes, you may need to use form data within a component or page, and you need to generate the data during the <code>attached</code> lifecycle cycle and bind it to the component.</p>
        <o-playground name="formData - Used Inside Component" style="--editor-height: 600px">
          <code path="demo.html" preview>
    <template>
      <l-m src="./form-data-demo.html"></l-m>
      <form-data-demo></form-data-demo>
    </template>
  </code>
          <code path="form-data-demo.html" active>
    <template component>
      <style>
        :host{
          display: block;
        }
      </style>
      <input type="text" name="username" value="John Doe" />
      <div>{{logtext}}</div>
      <script>
        export default {
          tag:"form-data-demo",
          data: {
            fdata:{},
            logtext: ""
          },
          watch:{
            fdata(data){
              if(data){
                this.logtext = JSON.stringify(data);
              }
            }
          },
          attached(){
            this.fdata = this.shadow.formData();
          }
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>Through the <code>attached</code> lifecycle, after the component is ready, we use the <code>this.shadow.formData()</code> method to generate the form data object <code>fdata</code>.</p>
        <p><code>formData()</code> is more suitable for form scenarios with relatively simple interaction logic.</p>
