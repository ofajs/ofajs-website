        <h1>formData</h1>
        <p>The <code>formData</code> method is used to generate object data bound to form elements, making it simpler and more efficient to handle form elements. This method creates an object containing the values of all form elements within the target element, and this object updates in real-time to reflect changes in the form elements.</p>
        <p>In the example below, we demonstrate how to use the <code>formData</code> method to generate object data bound to form elements:</p>
        <o-playground name="formData - Basic Usage" style="--editor-height: 500px">
          <code path="demo.html">
    <template>
      <form id="myForm">
        <input type="text" name="username" value="John Doe" />
        <div>
          sex:
          <label>
            male
            <input type="radio" name="sex" value="man" />
          </label>
          <label>
            female
            <input type="radio" name="sex" value="woman" />
          </label>
        </div>
        <textarea name="message">Hello World!</textarea>
      </form>
      <br />
      <div id="logger"></div>
      <script>
        const data = $("#myForm").formData();
        \$("#logger").text = data;
        data.watch(() => {
          \$("#logger").text = data;
        });
      </script>
    </template>
  </code>
        </o-playground>
        <p>In this example, we created a form containing text input fields, radio buttons, and text areas, and used the <code>formData</code> method to create an object named <code>data</code> that contains the values of these form elements. We also used the <code>watch</code> method to monitor data changes and display the data on the page in real-time. When the user modifies the value of a form element, the <code>data</code> object updates accordingly, making data processing very simple and efficient.</p>
        <h2>Reverse Data Binding</h2>
        <p>The generated object data also has the capability of reverse binding, meaning that when you modify the properties of the object, the values of the related form elements will automatically update as well. This is particularly useful when handling form data, as it allows you to easily achieve two-way data binding.</p>
        <p>In the example below, we demonstrate how to use the object data generated by the <code>formData</code> method and how to perform reverse data binding:</p>
        <o-playground name="formData - Reverse Binding" style="--editor-height: 500px">
          <code path="demo.html">
    <template>
      <form id="myForm">
        <input type="text" name="username" value="John Doe" />
        <div>
          sex:
          <label>
            man
            <input type="radio" name="sex" value="man" />
          </label>
          <label>
            woman
            <input type="radio" name="sex" value="woman" />
          </label>
        </div>
        <textarea name="message">Hello World!</textarea>
      </form>
      <br />
      <div id="logger"></div>
      <script>
        const data = $("#myForm").formData();
        setTimeout(()=>{
          data.username = "Yao";
          data.sex = "man";
          data.message = "ofa.js is good!";
        },1000);
      </script>
    </template>
  </code>
        </o-playground>
        <p>In this example, we first created a form containing a text input, radio buttons, and a textarea, then generated a data object <code>data</code> using the <code>formData</code> method. Subsequently, by modifying the properties of the <code>data</code> object, we implemented reverse data binding, where the values of form elements automatically update as the object properties change. This two-way data binding functionality makes interacting with form data more convenient.</p>
        <h2>Listen to a specific form</h2>
        <p>By default, the <code>formData()</code> method listens to all <code>input</code>, <code>select</code>, and <code>textarea</code> elements within the target element. To listen only to specific form elements, pass a CSS selector.</p>
        <p>In the example below, we demonstrate how to listen to specific form elements by passing a CSS selector:</p>
        <o-playground name="formData - Specific Form" style="--editor-height: 500px">
          <code path="demo.html">
    <template>
      <form id="myForm">
        <input type="text" name="username" value="John Doe" class="use-it" />
        <div>
          Sex:
          <label>
            man
            <input type="radio" name="sex" value="man" class="use-it" />
          </label>
          <label>
            woman
            <input type="radio" name="sex" value="woman" class="use-it" />
          </label>
        </div>
        <textarea name="message">This form element is not bound</textarea>
      </form>
      <br />
      <div id="logger"></div>
      <script>
        const data = $("#myForm").formData(".use-it");
        \$("#logger").text = data;
        data.watch(() => {
          \$("#logger").text = data;
        });
      </script>
    </template>
  </code>
        </o-playground>
        <p>In this example, we only want to listen to form elements whose class is &quot;use-it&quot;, so we pass &quot;.use-it&quot; as an argument to the formData() method. Only elements carrying that class will be monitored and included in the resulting data object, which is useful for selectively watching form fields and managing your form data more precisely.</p>
        <h2>Custom Form</h2>
        <p>Using custom form components is very simple; you just need to add a <strong>value property</strong> and set the <strong>name attribute</strong> to the custom component.</p>
        <o-playground name="formData - Custom Form" style="--editor-height: 500px">
          <code path="demo.html" preview active>
    <template>
      <div id="myForm">
        <input type="text" name="username" value="John Doe" />
        <l-m src="./custom-input.html"></l-m>
        <custom-input name="message"></custom-input>
        <div id="logger"></div>
      </div>
      <script>
        const data = $("#myForm").formData("input,custom-input");
        \$("#logger").text = data;
        data.watch(() => {
          \$("#logger").text = data;
        });
      </script>
    </template>
  </code>
          <code path="custom-input.html">
    <template component>
      <style>
        :host{
          display: block;
        }
        .editor {
          display: inline-block;
          min-width: 200px;
          line-height: 30px;
          height: 30px;
          border: #aaa solid 1px;
          border-radius: 4px;
          padding: 4px;
          font-size: 14px;
        }
      </style>
      <div
        class="editor"
        contenteditable="plaintext-only"
        :text="value"
        on:input="changeText"
      ></div>
      <script>
        export default {
          tag:"custom-input",
          attrs: {
            name: "",
          },
          data: {
            value: "Default txt",
          },
          proto: {
            changeText(e) {
              this.value = $(e.target).text;
            },
          },
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>When using a custom form component, simply add it to your form and set the required <code>name</code> attribute. In the example above, we include the <code>&lt;custom-input&gt;</code> element and assign it a <code>name</code>. We then use the <code>formData()</code> method to listen for values from both input elements and custom components, capturing and processing form data in real time. This approach lets you effortlessly extend your form with custom components to meet specific needs.</p>
        <h2>Using form data within components or pages</h2>
        <p>Sometimes, you may need to use form data within a component or page, and you must generate and bind the data to the component during the <code>attached</code> lifecycle.</p>
        <o-playground name="formData - Usage inside component" style="--editor-height: 600px">
          <code path="demo.html" preview>
    <template>
      <l-m src="./form-data-demo.html"></l-m>
      <form-data-demo></form-data-demo>
    </template>
  </code>
          <code path="form-data-demo.html" active>
    <template component>
      <style>
        :host{
          display: block;
        }
      </style>
      <input type="text" name="username" value="John Doe" />
      <div>{{logtext}}</div>
      <script>
        export default {
          tag:"form-data-demo",
          data: {
            fdata:{},
            logtext: ""
          },
          watch:{
            fdata(data){
              if(data){
                this.logtext = JSON.stringify(data);
              }
            }
          },
          attached(){
            this.fdata = this.shadow.formData();
          }
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>Through the <code>attached</code> lifecycle hook, after the component is ready, we use the <code>this.shadow.formData()</code> method to generate the form data object <code>fdata</code>.</p>
        <p><code>formData()</code> is more suitable for form scenarios with relatively simple interaction logic.</p>
