        <h1>refresh</h1>
        <p>The <code>refresh</code> method is used to proactively refresh a component's rendered view. When the data on the component hasn't updated, you can use this method to refresh the component's view.</p>
        <p>Applicable to scenarios that require manual refreshing of <a href="../../documentation/property-response.html" olink="">non-reactive data</a>.</p>

          <code path="refresh-demo.html" active="">
    <template component="">
      <div>{{_count}}</div>
      <button on:click="refresh()">Refresh</button>
      <script>
        export default {
          tag: "refresh-demo",
          data: {
            _count: 0,
          },
          attached() {
            this._timer = setInterval(() => {
              this._count++;
            }, 200);
          },
        };
      </script>
    </template>

      <div class="footer"></div>
      <script>
        export const parent = "../../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
