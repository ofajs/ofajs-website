        <h1>extend</h1>
        <p><code>extend</code> is a higher-order method used to augment an instance with additional properties or methods.</p>
        <blockquote>
          <p>In general, it is not recommended to extend the properties or methods of an instance, as this increases the learning curve. Unless there is a specific need within the team to customize the behavior of an instance, such extensions are discouraged.</p>
        </blockquote>
        <o-playground name="extend - Extend Instance" style="--editor-height: 560px">
          <code path="demo.html">
    <template>
      <ul>
        <li>I am 1</li>
        <li id="target">I am target</li>
        <li>I am 3</li>
      </ul>
      <div id="logger">logger</div>
      <script>
        const target = $("#target");
        target.extend({
          get good(){
            return "ofa.js is good";
          },
          say(){
            return 'hello';
          }
        });
        setTimeout(() => {
          const target = $("#target");
          \$("#logger").html = `
          good : ${target.good} <br>
          say() : ${target.say()}
          `;
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Extending the $ Bottom Layer</h2>
        <p>Similar to jQuery, you can also use fn.extend to extend the properties or methods of the underlying instance; properties or methods extended from fn will be applied to all instances.</p>
        <o-playground name="extend - Extend Underlying Layer" style="--editor-height: 560px">
          <code path="demo.html">
    <template>
      <ul>
        <li>I am 1</li>
        <li id="target">I am target</li>
        <li>I am 3</li>
      </ul>
      <div id="logger">logger</div>
      <script>
        \$.fn.extend({
          get good(){
            return "ofa.js is good";
          },
          say(){
            return 'hello';
          }
        });
        setTimeout(() => {
          \$("#logger").html = `
          target good : ${$("#target").good} <br>
          logger say() : ${$("#logger").say()}
          `;
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Extended Template Syntax</h2>
        <p>Using <code>extend</code> to add attributes or functions can enhance template syntax functionality and even provide component-specific syntactic sugar. However, avoid unofficial template syntaxes, as they impose learning costs and degrade the development experience when overused.</p>
        <h3>Extended Attributes</h3>
        <p>You can set extended attributes in templates using <code>:</code>. Below, we extend a <code>red</code> attribute; when <code>red</code> is <code>true</code>, the text color becomes red:</p>
        <pre><code class="hljs language-javascript">$.fn.<span class="hljs-title function_">extend</span>({
  <span class="hljs-keyword">set</span> <span class="hljs-title function_">red</span>(<span class="hljs-params">bool</span>){
    <span class="hljs-keyword">if</span>(bool){
      <span class="hljs-variable language_">this</span>.<span class="hljs-property">css</span>.<span class="hljs-property">color</span> = <span class="hljs-string">&quot;red&quot;</span>;
    }<span class="hljs-keyword">else</span>{
      <span class="hljs-variable language_">this</span>.<span class="hljs-property">css</span>.<span class="hljs-property">color</span> = <span class="hljs-string">&#x27;&#x27;</span>;
    }
  }
});</code></pre><o-playground name="extend - extended properties" style="--editor-height: 400px">
          <code path="demo.html" preview active>
    <template>
      <l-m src="./temp-one.html"></l-m>
      <temp-one></temp-one>
      <script>
        \$.fn.extend({
          set red(bool){
            if(bool){
              this.css.color = "red";
            }else{
              this.css.color = '';
            }
          }
        });
      </script>
    </template>
  </code>
          <code path="temp-one.html">
    <template component>
      <button on:click="addCount">Add Count</button>
      <div :red="count % 3">{{count}}</div>
      <script>
        export default {
          tag: "temp-one",
          data: {
            count: 0
          },
          proto:{
            addCount(){
              this.count++;
            },
          }
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>In this example, we added a <code>red</code> attribute to the template syntax. When <code>count % 3</code> is not 0, the font color will change to red.</p>
        <h3>Extension Methods</h3>
        <p>You can also make the method available in template syntax by extending it with <code>extend</code>. The method name is the part before the colon. Here, we extend a <code>color</code> template syntax, and the following arguments will be passed to the defined extension method.</p>
        <p>Here, the <code>always</code> attribute is set to <code>true</code>, indicating that the defined method will be called every time the component needs to refresh the interface. If <code>always</code> is not set, this template syntax function will only run once.</p>
        <p>Among them, <code>options</code> provides additional parameters to help you develop more customized template syntax:</p>
        <pre><code class="hljs language-javascript">$.fn.<span class="hljs-title function_">extend</span>({
  <span class="hljs-title function_">color</span>(<span class="hljs-params">value, func, options</span>){
    <span class="hljs-keyword">const</span> bool = <span class="hljs-title function_">func</span>();
    <span class="hljs-keyword">if</span>(bool){
      <span class="hljs-variable language_">this</span>.<span class="hljs-property">css</span>.<span class="hljs-property">color</span> = value;
    }<span class="hljs-keyword">else</span>{
      <span class="hljs-variable language_">this</span>.<span class="hljs-property">css</span>.<span class="hljs-property">color</span> = <span class="hljs-string">&#x27;&#x27;</span>;
    }
  }
});

$.fn.<span class="hljs-property">color</span>.<span class="hljs-property">always</span> = <span class="hljs-literal">true</span>;</code></pre><o-playground name="extend - extension methods" style="--editor-height: 400px">
          <code path="demo.html" preview active>
    <template>
      <l-m src="./temp-two.html"></l-m>
      <temp-two></temp-two>
      <script>
        \$.fn.extend({
          color(color, func, options){
            const bool = func();
            if(bool){
              this.css.color = color;
            }else{
              this.css.color = '';
            }
          }
        });
        \$.fn.color.always = true;
      </script>
    </template>
  </code>

        <h2>Template Syntax Principles</h2>
        <p>So far, you should have realized that many template syntax features on ofa.js are actually extended through <code>extend</code>:</p>
        <ul>
          <li><code>class</code>, <code>attr</code> methods run every time the view is refreshed</li>
          <li><code>on</code>, <code>one</code> function bindings only run once</li>
        </ul>
        <p>You can refer to the example below to better understand the template rendering principle of ofa.js.</p>
        <o-playground name="Template Syntax Principle" style="--editor-height: 480px">
          <code path="demo.html" preview>
    <template>
      <l-m src="./temp-three.html"></l-m>
      <temp-three></temp-three>
    </template>
  </code>
          <code path="temp-three.html" active>
    <template component>
      <div>class always => {{classalways}}</div>
      <div>attr always => {{attralways}}</div>
      <div>on always => {{onalways}}</div>
      <script>
        export default {
          tag: "temp-three",
          data: {
            classalways:"",
            attralways:"",
            onalways:""
          },
          ready(){
            this.classalways = $.fn.class.always;
            this.attralways = $.fn.attr.always;
            this.onalways = !!$.fn.on.always;
          }
        };
      </script>
    </template>
  </code>
