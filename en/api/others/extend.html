        <h1>extend</h1>
        <p><code>extend</code> is a high-order method used to extend the properties or methods of an instance.</p>
        <blockquote>
          <p>Under normal circumstances, it is not recommended for users to extend the properties or methods of an instance, as this increases the learning cost. Unless there is a special scenario within the team that requires customizing the behavior of the instance, it is not recommended to do so.</p>
        </blockquote>
        <o-playground name="extend - Extend Example" style="--editor-height: 560px">
          <code path="demo.html">
    <template>
      <ul>
        <li>I am 1</li>
        <li id="target">I am target</li>
        <li>I am 3</li>
      </ul>
      <div id="logger">logger</div>
      <script>
        const target = $("#target");
        target.extend({
          get good(){
            return "ofa.js is good";
          },
          say(){
            return 'hello';
          }
        });
        setTimeout(() => {
          const target = $("#target");
          \$("#logger").html = `
          good : ${target.good} <br>
          say() : ${target.say()}
          `;
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Extend $ Bottom Layer</h2>
        <p>Similar to jQuery, you can also extend the properties or methods of the underlying instance through fn.extend; properties or methods extended from fn will apply to all instances.</p>
        <o-playground name="extend - Extend the Core" style="--editor-height: 560px">
          <code path="demo.html">
    <template>
      <ul>
        <li>I am 1</li>
        <li id="target">I am target</li>
        <li>I am 3</li>
      </ul>
      <div id="logger">logger</div>
      <script>
        \$.fn.extend({
          get good(){
            return "ofa.js is good";
          },
          say(){
            return 'hello';
          }
        });
        setTimeout(() => {
          \$("#logger").html = `
          target good : ${$("#target").good} <br>
          logger say() : ${$("#logger").say()}
          `;
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Extended Template Syntax</h2>
        <p>By using <code>extend</code> to extend properties or functions, you can enhance the functionality of template syntax, and even provide exclusive template syntactic sugar for components. However, it is important to note that you should try <strong>not to use</strong> non-official template syntax, as they impose a certain learning cost on users, and a large amount of non-official template syntactic sugar can degrade the development experience.</p>
        <h3>Extended Attributes</h3>
        <p>You can set extended attributes in the template using <code>:</code>. Below, we will extend a <code>red</code> attribute; when <code>red</code> is <code>true</code>, the font color turns red:</p>
        <pre><code class="hljs language-javascript">$.fn.<span class="hljs-title function_">extend</span>({
  <span class="hljs-keyword">set</span> <span class="hljs-title function_">red</span>(<span class="hljs-params">bool</span>){
    <span class="hljs-keyword">if</span>(bool){
      <span class="hljs-variable language_">this</span>.<span class="hljs-property">css</span>.<span class="hljs-property">color</span> = <span class="hljs-string">&quot;red&quot;</span>;
    }<span class="hljs-keyword">else</span>{
      <span class="hljs-variable language_">this</span>.<span class="hljs-property">css</span>.<span class="hljs-property">color</span> = <span class="hljs-string">&#x27;&#x27;</span>;
    }
  }
});</code></pre><o-playground name="extend - Extended Properties" style="--editor-height: 400px">
          <code path="demo.html" preview active>
    <template>
      <l-m src="./temp-one.html"></l-m>
      <temp-one></temp-one>
      <script>
        \$.fn.extend({
          set red(bool){
            if(bool){
              this.css.color = "red";
            }else{
              this.css.color = '';
            }
          }
        });
      </script>
    </template>
  </code>

    <template component>

        </o-playground>
        <p>In this example, we added a <code>red</code> property to the template syntax. When <code>count % 3</code> is not 0, the font color will turn red.</p>
        <h3>Extension Methods</h3>
        <p>You can also use the <code>extend</code> extension method to make it available in template syntax. The method name is the part before the colon. Here, we extended a <code>color</code> template syntax, and the following parameters will be passed to the defined extension method.</p>
        <p>Here, the <code>always</code> attribute is set to <code>true</code>, which means that the defined method will be called every time the component needs to refresh the interface. If <code>always</code> is not set, this template syntax function will only run once.</p>
        <p>Among them, <code>options</code> provides more parameters that can help you develop more customized template syntax:</p>
        <pre><code class="hljs language-javascript">$.fn.<span class="hljs-title function_">extend</span>({
  <span class="hljs-title function_">color</span>(<span class="hljs-params">value, func, options</span>){
    <span class="hljs-keyword">const</span> bool = <span class="hljs-title function_">func</span>();
    <span class="hljs-keyword">if</span>(bool){
      <span class="hljs-variable language_">this</span>.<span class="hljs-property">css</span>.<span class="hljs-property">color</span> = value;
    }<span class="hljs-keyword">else</span>{
      <span class="hljs-variable language_">this</span>.<span class="hljs-property">css</span>.<span class="hljs-property">color</span> = <span class="hljs-string">&#x27;&#x27;</span>;
    }
  }
});

$.fn.<span class="hljs-property">color</span>.<span class="hljs-property">always</span> = <span class="hljs-literal">true</span>;</code></pre><o-playground name="extend - Extension Method" style="--editor-height: 400px">

            if(bool){

            }else{

            }

        <h2>Template Syntax Principles</h2>
        <p>By now, you should have understood that many template syntaxes on ofa.js are actually extended through <code>extend</code>:</p>
        <ul>
          <li><code>class</code>, <code>attr</code> methods run every time the view is refreshed</li>
          <li><code>on</code>, <code>one</code> function bindings run only once</li>
        </ul>
        <p>You can look at the example below to better understand the template rendering principle of ofa.js:</p>
        <o-playground name="extend - Template Syntax Principle" style="--editor-height: 480px">
          <code path="demo.html" preview>
    <template>
      <l-m src="./temp-three.html"></l-m>
      <temp-three></temp-three>
    </template>
  </code>
          <code path="temp-three.html" active>
    <template component>
      <div>class always => {{classalways}}</div>
      <div>attr always => {{attralways}}</div>
      <div>on always => {{onalways}}</div>
      <script>
        export default {
          tag: "temp-three",
          data: {
            classalways:"",
            attralways:"",
            onalways:""
          },
          ready(){
            this.classalways = $.fn.class.always;
            this.attralways = $.fn.attr.always;
            this.onalways = !!$.fn.on.always;
          }
        };
      </script>
    </template>
  </code>
