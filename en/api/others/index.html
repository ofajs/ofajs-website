      <article class="markdown-body">
        <h1>index</h1>
        <p>The <code>index</code> attribute is used to retrieve the position of an element within its parent element. This position is zero-based, meaning the first element is at position 0, the second at position 1, and so on.</p>
        <p>In the following example, we demonstrate how to use the <code>index</code> property to get an element&#39;s position within its parent element:</p>
        <o-playground name="index - Get Position" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <ul>
        <li>I am 1</li>
        <li id="target">I am target</li>
        <li>I am 3</li>
      </ul>
      <div id="logger" style="color: green">logger</div>
      <script>
        setTimeout(() => {
          $("#logger").text = $("#target").index;
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
        <p>In this example, we first select an <code>&lt;li&gt;</code> element with the <code>id</code> &quot;target&quot;. Then, we use the <code>index</code> property to get its position under its parent element <code>&lt;ul&gt;</code>, which is the second element, so the value of <code>index</code> is 1. We then display this value in the <code>&lt;div&gt;</code> element with the <code>id</code> &quot;logger&quot;.</p>
      </article>
