        <h1>Add or remove child elements</h1>
        <p>Element instances behave like arrays; nodes can be added or removed with the usual array methods. When using <code>push</code>, <code>unshift</code>, <code>pop</code>, <code>shift</code>, or <code>splice</code>, the internal <a href="../instance/dollar.html" olink="">$ method</a> is automatically invoked for initialization, so you can pass element strings or objects directly.</p>
        <p>Likewise, you can use other array methods such as <code>forEach</code>, <code>map</code>, <code>some</code>, and so on.</p>
        <p><strong>Please note: Do not add or remove child elements on elements with template syntax.</strong></p>
        <h2>push</h2>
        <p>Add child element at the end</p>
        <o-playground name="array-like - push" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <ul>
        <li>I am 1</li>
        <li>I am 2</li>
        <li>I am 3</li>
      </ul>
      <script>
        setTimeout(()=>{
          \$("ul").push(`<li style="color:red;">new li</li>`);
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>unshift</h2>
        <p>Add a child element to the beginning of the array.</p>
        <o-playground name="array-like - unshift" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <ul>
        <li>I am 1</li>
        <li>I am 2</li>
        <li>I am 3</li>
      </ul>
      <script>
        setTimeout(()=>{
          \$("ul").unshift(`<li style="color:blue;">new li</li>`);
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>pop</h2>
        <p>Delete child elements from the end.</p>
        <o-playground name="array-like - pop" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <ul>
        <li>I am 1</li>
        <li>I am 2</li>
        <li>I am 3</li>
      </ul>
      <script>
        setTimeout(()=>{
          \$("ul").pop();
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>shift</h2>
        <p>Remove sub-elements from the beginning of the array.</p>
        <o-playground name="array-like - shift" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <ul>
        <li>I am 1</li>
        <li>I am 2</li>
        <li>I am 3</li>
      </ul>
      <script>
        setTimeout(()=>{
          \$("ul").shift();
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>splice</h2>
        <p>You can delete or replace existing child elements, or add new child elements. Its usage is similar to the <code>splice</code> method of arrays.</p>
        <o-playground name="array-like - splice" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <ul>
        <li>I am 1</li>
        <li>I am 2</li>
        <li>I am 3</li>
      </ul>
      <script>
        setTimeout(()=>{
          \$("ul").splice(1, 2, `<li style="color:green;">new li 1</li>`, `<li style="color:green;">new li 2</li>`);
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
      </article>
