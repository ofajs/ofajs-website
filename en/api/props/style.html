<body>
  <o-app src="../../../js/app-config.js">
    <template page>
      <link rel="stylesheet" href="../../../css/github-markdown.css" />

        }
      </style>
      <link rel="stylesheet" href="../../../css/page.css" />
      <article class="markdown-body">
        <h1>style</h1>
        <p>The <code>style</code> attribute remains consistent with the native implementation.</p>
        <p>Note: the <code>style</code> attribute can only retrieve values explicitly set on it, not the actual computed styles. Although the <code>style</code> method resembles the <a href="./css.html" olink="">css method</a>, it cannot perform a full style override. Compared with <code>css</code>, the <code>style</code> method is more efficient internally.</p>
        <p>Here is an example demonstrating how to use <code>style</code>:</p>
        <o-playground name="style - direct usage" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <div id="target">origin text</div>
      <br>
      <h4>logger</h4>
      <div id="logger" style="border:#aaa solid 1px;padding:8px;"></div>
      <script>
        $("#logger").text = $("#target").style.color;
        setTimeout(()=> {
          $('#target').style.color = 'red';
          $("#logger").text = $("#target").style.color;
        }, 1000);
      </script>
    </template>
  </code>
        </o-playground>
        <p>Please remember that the <code>style</code> method only gets and sets values on the <code>style</code> attribute, not the actual computed styles.</p>
        <h2>Template Syntax Usage</h2>
        <p>You can also use template syntax to set the style of the target element.</p>
        <o-playground name="style - Template Syntax" style="--editor-height: 400px">
          <code path="demo.html" preview="">
    <template>
      <l-m src="./style-demo.html"></l-m>
      <style-demo></style-demo>
      <script>
        setTimeout(()=>{
          \$("style-demo").txt = "blue";
        },1000);
      </script>
    </template>
  </code>
          <code path="style-demo.html" active="">
    <template component="">
      <div :style.color="txt">I am target</div>
      <script>
        export default {
          tag: "style-demo",
          data: {
            txt: "red"
          },
          ready(){
            setTimeout(()=>{
              this.txt = "blue";
            }, 500);
          }
        };
      </script>
    </template>
  </code>
        </o-playground>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
