      <article class="markdown-body">
        <h1>one</h1>
        <p>Using the <code>one</code> method, you can register a one-time event handler for a target element, meaning the handler will automatically unbind after the first trigger and will not fire again.</p>
        <p>Below is an example demonstrating how to use the <code>one</code> method to register a click event handler for a button element:</p>
        <o-playground name="one - click one-time event" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <button id="target">add count</button>
      <br>
      <br>
      <div id="logger" style="border:red solid 1px;padding:8px;">-</div>
      <script>
        let count = 0;
        \$("#target").one("click", ()=> {
          \$("#logger").text = count++;
        });
      </script>
    </template>
  </code>
        </o-playground>
        <p>In this example, we use the <code>one</code> method to add a click event handler to the button element. When the user clicks the button, the event handler triggers but will not fire again afterward because it has been unbound.</p>
        <h2>Template Syntax Usage</h2>
        <p>You can also use template syntax to bind a one-time event handler to the target element.</p>
        <o-playground name="one - Template Syntax" style="--editor-height: 400px">
          <code path="demo.html" preview>
    <template>
      <l-m src="./one-demo.html"></l-m>
      <one-demo></one-demo>
    </template>
  </code>
          <code path="one-demo.html" active>
    <template component>
      <button one:click="addCount">Add Count</button>
      <div>{{count}}</div>
      <script>
        export default {
          tag: "one-demo",
          data: {
            count: 0
          },
          proto:{
            addCount(){
              this.count++;
            }
          }
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>In this example, we bind a method named <code>addCount</code> to the button element using <code>one:click</code>. When the user clicks the button, this method will be called, but it will not trigger again afterward because it is a one-time event handler.</p>
      </article>
