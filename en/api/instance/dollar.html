      <article class="markdown-body">
        <h1>$</h1>
        <p>The <code>$</code> method is the core function in ofa.js, used to obtain and manipulate DOM element instances. The main features of <code>$</code> are detailed below:</p>
        <h2>Getting Element Instances</h2>
        <p>By using the <code>$</code> method, you can obtain the first element instance on the page that matches the <a href="https://developer.mozilla.org/en-US/docs/Web/CSS/Reference/Selectors/Selector_list" target="_blank">CSS selector</a> and perform operations on it. Here is an example:</p>
        <o-playground name="$ - Get Element">
          <code path="demo.html">
    <template>
      <div id="target1">target 1 text</div>
      <script>
        setTimeout(()=>{
          \$("#target1").text = 'change target 1';
        },500);
      </script>
    </template>
  </code>
        </o-playground>
        <p>In the example above, we used the <code>$</code> symbol to select the element instance with <code>id</code> "target1" and modified its text content by setting the <code>text</code> property.</p>
        <h2>Example of Finding Child Elements</h2>
        <p>The instance also has a <code>$</code> method, which can be used to obtain the first matching child element instance of an element instance.</p>
        <o-playground name="$ - Find Child Elements">
          <code path="demo.html">
    <template>
      <div id="target1">
        <h3>target</h3>
        <p>I am target1</p>
      </div>
      <script>
        const tar = $("#target1");
        tar.$('h3').text = 'change target title';
      </script>
    </template>
  </code>
        </o-playground>
        <p>Please do not insert the obtained element instance directly elsewhere, as such an operation will affect the original element. If you need to create a copy, you can use the <a href="./clone.html" olink="">clone</a> method.</p>
        <o-playground name="$ - Instance Features" style="--editor-height: 360px">
          <code path="demo.html">
    <template>
      <div id="pos1" style="border:red solid 1px;">
        <h3>position 1</h3>
        <p id="target1" style="color:green">I am target1</p>
      </div>
      <div id="pos2" style="border:blue solid 1px;margin:8px;">
        <h3>position 2</h3>
      </div>
      <script>
        setTimeout(()=>{
          const tar = $("#target1");
          \$("#pos2").push(tar);
        },500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Get Child Elements in Shadow Node</h2>
        <p>You can obtain the instance via the <a href="./shadow.html" olink="">shadow</a> property, and then use the <code>$</code> method to get the desired element:</p>
        <pre><code class="hljs language-javascript">$(<span class="hljs-string">'my-component'</span>).<span class="hljs-property">shadow</span>.$(<span class="hljs-string">"selector"</span>).<span class="hljs-title function_">method</span>(xxx)</code></pre>
        <h2>Instantiating Elements Directly</h2>
        <p>You can directly initialize native elements as <code>$</code> instance objects in the following ways:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> ele = <span class="hljs-variable language_">document</span>.<span class="hljs-title function_">createElement</span>(<span class="hljs-string">'div'</span>);
<span class="hljs-keyword">const</span> $ele = $(ele);</code></pre>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> ele = <span class="hljs-variable language_">document</span>.<span class="hljs-title function_">querySelector</span>(<span class="hljs-string">'#target'</span>);
<span class="hljs-keyword">const</span> $ele = $(ele);</code></pre>
        <p>In this way, you can easily convert existing HTML elements into <code>$</code> instances so that you can use the functionality provided by <code>$</code> to operate and process them.</p>
        <h2>Generate Element Instance</h2>
        <p>Besides, the <code>$</code> can be used not only to get existing element instances but also to create new element instances and add them to the page.</p>
        <h3>Generated via String</h3>
        <p>You can use the <code>$</code> function to create new element instances from strings, as shown below:</p>
        <o-playground name="$ - String Generation" style="--editor-height: 260px">
          <code path="demo.html">
    <template>
      <div id="target1">
        <b>target1:</b>
      </div>
      <script>
        const newEl = $(`<div style="color:red">add target 1 text</div>`);
        \$('#target1').push(newEl);
      </script>
    </template>
  </code>
        </o-playground>
        <p>In this example， we use the <code>$</code> function to create a new element instance with specified styles and text content， and add it to the existing element instance with the <code>id</code> of "target1".</p>
        <h3>Generate via Object</h3>
        <p>You can also use the <code>$</code> function to generate new element instances in an object-oriented way, as shown below:</p>
        <o-playground name="$ - Object Generation" style="--editor-height: 360px">
          <code path="demo.html">
    <template>
      <div id="target1">
        <b>target1:</b>
      </div>
      <script>
        const newEl = $({
          tag: "div",
          text: "add target 1 text",
          css: {
            color: "red"
          }
        });
        \$('#target1').push(newEl);
      </script>
    </template>
  </code>
        </o-playground>
        <p>In this example, we use the <code>$</code> function to define a new element instance through an object, including the tag type, text content, and style attributes, and add it to an existing element instance with the <code>id</code> of "target1".</p>
        <h2>Relationship between acquired examples and page/component instances</h2>
        <p>The <code>$</code> method can be used to obtain the instance of the corresponding page or component element from the global scope, and its function is the same as the <code>this</code> reference in the lifecycle methods within the page or component module.</p>

            detached() {
              revoke(this);
            },
