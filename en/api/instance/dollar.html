      <article class="markdown-body">
        <h1>$</h1>
        <p><code>$</code> is the core function in ofa.js, used to get and manipulate DOM element instances. Below is a detailed introduction to the main features of <code>$</code>:</p>
        <h2>Obtaining Element Instances</h2>
        <p>With the <code>$</code> method, you can retrieve the first element instance on the page that matches the <a href="https://developer.mozilla.org/zh-CN/docs/Web/CSS/Reference/Selectors/Selector_list" target="_blank">CSS selector</a> and perform operations on it. Here’s an example:</p>
        <o-playground name="$ - Get element">
          <code path="demo.html">
    <template>
      <div id="target1">target 1 text</div>
      <script>
        setTimeout(()=>{
          \$("#target1").text = 'change target 1';
        },500);
      </script>
    </template>
  </code>
        </o-playground>
        <p>In the example above, we used the <code>$</code> symbol to select the element instance with <code>id</code> "target1" and modified its text content by setting the <code>text</code> property.</p>
        <h2>Find Child Element Instance</h2>
        <p>Instances also have the <code>$</code> method, which can be used to retrieve the first child element instance that meets the criteria from the instance.</p>
        <o-playground name="$ - Find child elements">
          <code path="demo.html">
    <template>
      <div id="target1">
        <h3>target</h3>
        <p>I am target1</p>
      </div>
      <script>
        const tar = $("#target1");
        tar.$('h3').text = 'change target title';
      </script>
    </template>
  </code>
        </o-playground>
        <p>Do not insert the obtained element instance directly elsewhere, as this will affect the original element. If you need to create a copy, use the <a href="./clone.html" olink="">clone</a> method.</p>
        <o-playground name="$ - Instance Features" style="--editor-height: 360px">
          <code path="demo.html">
    <template>
      <div id="pos1" style="border:red solid 1px;">
        <h3>position 1</h3>
        <p id="target1" style="color:green">I am target1</p>
      </div>
      <div id="pos2" style="border:blue solid 1px;margin:8px;">
        <h3>position 2</h3>
      </div>
      <script>
        setTimeout(()=>{
          const tar = $("#target1");
          \$("#pos2").push(tar);
        },500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Get child elements within the shadow node</h2>
        <p>After obtaining the instance through the <a href="./shadow.html" olink="">shadow</a> attribute, you can use the <code>$</code> method to get the desired element:</p>
        <pre><code class="hljs language-javascript">$(<span class="hljs-string">'my-component'</span>).<span class="hljs-property">shadow</span>.$(<span class="hljs-string">"selector"</span>).<span class="hljs-title function_">method</span>(xxx)</code></pre>
        <h2>Instantiating Elements Directly</h2>
        <p>You can directly initialize a native element as a <code>$</code> instance object in the following way:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> ele = <span class="hljs-variable language_">document</span>.<span class="hljs-title function_">createElement</span>(<span class="hljs-string">'div'</span>);
<span class="hljs-keyword">const</span> $ele = $(ele);</code></pre>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> ele = <span class="hljs-variable language_">document</span>.<span class="hljs-title function_">querySelector</span>(<span class="hljs-string">'#target'</span>);
<span class="hljs-keyword">const</span> $ele = $(ele);</code></pre>
        <p>This way, you can conveniently convert existing HTML elements into <code>$</code> instances, enabling you to use the functionalities provided by <code>$</code> for manipulation and processing.</p>
        <h2>Generate Element Instance</h2>
        <p>Besides, <code>$</code> can be used not only to obtain existing element instances but also to create new ones and add them to the page.</p>
        <h3>Generate via String</h3>
        <p>You can create a new element instance from a string using the <code>$</code> function, as shown below:</p>
        <o-playground name="$ - String Generation" style="--editor-height: 260px">
          <code path="demo.html">
    <template>
      <div id="target1">
        <b>target1:</b>
      </div>
      <script>
        const newEl = $(`<div style="color:red">add target 1 text</div>`);
        \$('#target1').push(newEl);
      </script>
    </template>
  </code>
        </o-playground>
        <p>In this example, we use the <code>$</code> function to create a new element instance with specified styles and text content, and add it inside an existing element instance with the <code>id</code> "target1".</p>
        <h3>Generate via object</h3>
        <p>You can also use the <code>$</code> function to generate new element instances in an object-oriented manner, as shown below:</p>
        <o-playground name="$ - Object Creation" style="--editor-height: 360px">
          <code path="demo.html">
    <template>
      <div id="target1">
        <b>target1:</b>
      </div>
      <script>
        const newEl = $({
          tag: "div",
          text: "add target 1 text",
          css: {
            color: "red"
          }
        });
        \$('#target1').push(newEl);
      </script>
    </template>
  </code>
        </o-playground>
        <p>In this example, we use the <code>$</code> function to define a new element instance in an object-oriented way, including the tag type, text content, and style attributes, and add it inside an existing element instance with an <code>id</code> of "target1".</p>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
