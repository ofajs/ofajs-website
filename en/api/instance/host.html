<head>
  <meta charset="UTF-8" />

  <script src="https://cdn.jsdelivr.net/gh/kirakiray/ofa.js@4.6.20/dist/ofa.mjs#debug" type="module"></script>
  <script src="https://cdn.jsdelivr.net/gh/kirakiray/ofa.js@4.6.20/libs/scsr/dist/scsr.min.mjs" type="module"></script>
  <link rel="icon" href="../../../img/logo.svg" />
  <link rel="stylesheet" href="../../../css/palette.css" pui-colors />
  <link rel="stylesheet" href="../../../css/theme.css" />
  <link rel="stylesheet" href="../../../css/github-markdown.css" />
  <link rel="stylesheet" href="../../../css/hljs.css" />
  <style>
    html,
    body {
      height: 100%;
      padding: 0;
      margin: 0;
      overflow: hidden;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        Segoe UI,

    @keyframes fadein {

<body>
  <o-app src="../../../js/app-config.js">
    <template page>
      <link rel="stylesheet" href="../../../css/github-markdown.css" />
      <link rel="stylesheet" href="../../../css/hljs.css" />
      <l-m src="../../../comps/center-block.html"></l-m>
      <l-m src="../../../comps/article-code.html"></l-m>
      <l-m src="https://playground.ofajs.com/comps/o-playground/o-playground.html"></l-m>
      <style>
        :host {
          display: block;
          height: 100%;
          box-sizing: border-box;
          overflow: auto;
        }
      </style>
      <link rel="stylesheet" href="../../../css/page.css" />
      <article class="markdown-body">
        <h1>host</h1>
        <p>Using the <code>host</code> property, you can obtain the instance of the element&#39;s host component. This is useful for accessing the data and methods of its host component from within the component.</p>
        <p>Below is an example demonstrating how to use the <code>host</code> property to get an instance of the host component:</p>
        <o-playground name="host - Get Host" style="--editor-height: 700px">
          <code path="demo.html" preview>
    <template>
      <o-page src="./page1.html"></o-page>
    </template>
  </code>
          <code path="page1.html">
    <template page>
      <l-m src="./user-card.html"></l-m>
      <user-card username="tom"></user-card>
      <script>
        export default async function(){
          return {
            data: {
              greeting: "Hello"
            },
            proto: {
              sayHi(){
                return `${this.greeting}, I'm the host!`;
              }
            }
          };
        }
      </script>
    </template>
  </code>
          <code path="user-card.html" active>
    <template component>
      <style>
        :host{display:block;border:1px solid #ddd;padding:12px;margin:8px;border-radius:4px;}
      </style>
      <div>Username: {{username}}</div>
      <button on:click="onClick">Say Hi</button>
      <div>Response: {{response}}</div>
      <script>
        export default {
          tag: "user-card",
          attrs:{
            username: null
          },
          data: {
            response: "-"
          },
          proto: {
            onClick(){
              this.response = this.host.sayHi();
            }
          },
          ready(){
            console.log("Host method:", this.host.sayHi());
          },
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>In this example, we create a custom component <code>user-card</code>, and access the host component&#39;s (page&#39;s) method <code>sayHi</code> from within the component via <code>this.host</code>, achieving interaction between the component and the host.</p>
        <p>If the element is not within a component or page module, the value of <code>host</code> will be <code>null</code>. For example:</p>
        <o-playground name="host - no host situation" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <ul>
        <li id="target">
          I am target
        </li>
      </ul>
      <div id="logger" style="border:red solid 1px;padding:8px;">-</div>
      <script>
        setTimeout(()=>{
          $("#logger").text = String($("#target").host);
        },500);
      </script>
    </template>
  </code>
        </o-playground>
        <p>In this example, the <code>#target</code> element is under the body and not inside any component or page, so the value of <code>$(&quot;#target&quot;).host</code> is <code>null</code>.</p>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
  </o-app>
  <o-root-provider name="pui" theme="dark"></o-root-provider>
</body>

</html>
