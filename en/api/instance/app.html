<body>
  <o-app src="../../../js/app-config.js">
    <template page>
      <link rel="stylesheet" href="../../../css/github-markdown.css" />

      <article class="markdown-body">
        <h1>app</h1>
        <p>Elements within <code>o-app</code>, including those inside the shadow nodes of <code>o-page</code> within <code>o-app</code>, or further nested child components, all have their <code>app</code> property pointing to this <code>o-app</code> element instance.</p>
        <h2>Get Application Instance</h2>
        <p>Here is an example demonstrating how to access the <code>app</code> property within elements inside <code>o-app</code>:</p>
        <o-playground name="app - Get App Instance" style="--editor-height: 500px">
          <code path="demo.html" preview="" unimportant="">
    <template>
      <o-app src="./app-config.js"></o-app>
    </template>
  </code>
          <code path="app-config.js">
    // Home address of the app
    export const home = "./home.html";
    // Available methods on the app
    export const proto = {
      getSomeData(){
        return "Hello ofa.js App Demo";
      }
    };
    // Page transition animation configuration
    export const pageAnime = {
      current: {
        opacity: 1,
        transform: "translate(0, 0)",
      },
      next: {
        opacity: 0,
        transform: "translate(30px, 0)",
      },
      previous: {
        opacity: 0,
        transform: "translate(-30px, 0)",
      },
    };
  </code>
          <code path="home.html" active="">
    <template page="">
      <l-m src="./test-comp.html"></l-m>
      <style>
        :host {
          display: block;
          padding: 10px;
          border: 1px solid gray;
        }
      </style>
      <p>{{val}}</p>
      <test-comp></test-comp>
      <script>
        export default async () => {
          return {
            data: {
              val: "-",
            },
            attached(){
              this.val = this.app.getSomeData();
            }
          };
        };
      </script>
    </template>
  </code>
          <code path="test-comp.html">
    <template component="">
      <style>
        :host {
          display: inline-block;
          padding: 10px;
          border: 1px solid red;
        }
      </style>
      <p>✨ {{val}} ✨</p>
      <script>
        export default async () => {
          return {
            tag: "test-comp",
            data: {
              val: "-",
            },
            attached(){
              this.val = this.app.getSomeData();
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Usage Examples</h2>
        <p>After obtaining the <code>app</code> instance, you can:</p>
        <h3>1. Custom Methods for Accessing the Application</h3>
        <p>Custom methods added via the <code>proto</code> configuration item in <code>app-config.js</code> can be called from any page or component using <code>this.app</code>:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// app-config.js</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> proto = {
  <span class="hljs-title function_">navigateToHome</span>(<span class="hljs-params"></span>) {
    <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">goto</span>(<span class="hljs-string">"./home.html"</span>);
  },
  
  <span class="hljs-keyword">get</span> <span class="hljs-title function_">isLoggedIn</span>() {
    <span class="hljs-keyword">return</span> !!<span class="hljs-variable language_">this</span>.<span class="hljs-property">globalData</span>?.<span class="hljs-property">user</span>;
  },
  
  <span class="hljs-title function_">showMessage</span>(<span class="hljs-params">message</span>) {
    <span class="hljs-title function_">alert</span>(message);
  },
};</code></pre>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// Use in page or component</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-property">app</span>.<span class="hljs-title function_">navigateToHome</span>();
<span class="hljs-variable language_">this</span>.<span class="hljs-property">app</span>.<span class="hljs-title function_">showMessage</span>(<span class="hljs-string">"Hello World"</span>);

<span class="hljs-keyword">if</span> (<span class="hljs-variable language_">this</span>.<span class="hljs-property">app</span>.<span class="hljs-property">isLoggedIn</span>) {
  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">"User is logged in"</span>);
}</code></pre>
        <h3>2. Accessing Application Properties</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// Get current page</span>
<span class="hljs-keyword">const</span> currentPage = <span class="hljs-variable language_">this</span>.<span class="hljs-property">app</span>.<span class="hljs-property">current</span>;

<span class="hljs-comment">// Get route history</span>
<span class="hljs-keyword">const</span> routers = <span class="hljs-variable language_">this</span>.<span class="hljs-property">app</span>.<span class="hljs-property">routers</span>;

<span class="hljs-comment">// Access global data</span>
<span class="hljs-keyword">const</span> user = <span class="hljs-variable language_">this</span>.<span class="hljs-property">app</span>.<span class="hljs-property">globalData</span>?.<span class="hljs-property">user</span>;</code></pre>
        <h3>3. Invoke Navigation Methods</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// Navigate to page</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-property">app</span>.<span class="hljs-title function_">goto</span>(<span class="hljs-string">"./about.html"</span>);

<span class="hljs-comment">// Go back to previous page</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-property">app</span>.<span class="hljs-title function_">back</span>();

<span class="hljs-comment">// Replace current page</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-property">app</span>.<span class="hljs-title function_">replace</span>(<span class="hljs-string">"./login.html"</span>);</code></pre>
        <h3>4. Listening to Application Events</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// Listen for route changes</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-property">app</span>.<span class="hljs-title function_">on</span>(<span class="hljs-string">"router-change"</span>, <span class="hljs-function">(<span class="hljs-params">e</span>) =&gt;</span> {
  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">"Route change:"</span>, e.<span class="hljs-property">data</span>);
});</code></pre>
        <h2>Detailed Documentation</h2>
        <p>For how to configure application initialization logic and add custom methods in <code>app-config.js</code>, please refer to:</p>
        <ul>
          <li><strong><a href="../../documentation/app-initialization.html" olink="">App Initialization</a></strong> - Detailed introduction to the usage of <code>ready</code> and <code>proto</code> configuration options</li>
          <li><strong><a href="../../documentation/app-navigation.html" olink="">Routing and Navigation</a></strong> - Detailed introduction to application navigation methods and route monitoring</li>
        </ul>
        <h2>Common Properties and Methods of Application Instances</h2>
        <table>
          <thead>
            <tr>
              <th>Attribute/Method</th>
              <th>Description</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><code>current</code></td>
              <td>Current page instance</td>
            </tr>
            <tr>
              <td><code>routers</code></td>
              <td>Route history</td>
            </tr>
            <tr>
              <td><code>globalData</code></td>
              <td>Global data (needs to be initialized in <code>ready</code>)</td>
            </tr>
            <tr>
              <td><code>goto(src)</code></td>
              <td>Navigate to a specified page</td>
            </tr>
            <tr>
              <td><code>back()</code></td>
              <td>Go back to the previous page</td>
            </tr>
            <tr>
              <td><code>replace(src)</code></td>
              <td>Replace the current page</td>
            </tr>
            <tr>
              <td><code>forward()</code></td>
              <td>Go forward to the next page</td>
            </tr>
            <tr>
              <td><code>on(event, callback)</code></td>
              <td>Listen to application events</td>
            </tr>
            <tr>
              <td>Custom methods</td>
              <td>Methods added through <code>proto</code> configuration</td>
            </tr>
          </tbody>
        </table>
      </article>

      <script>
        export const parent = "../../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
