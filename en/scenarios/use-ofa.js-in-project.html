      <article class="markdown-body">
        <h1>AI Prompts for Using ofa.js in Projects</h1>
        <p>Since ofa.js is not yet a widely known framework, mainstream AI models do not have the ability to use ofa.js directly. To address this, we have carefully prepared dedicated prompts to help AI learn and reference how to use ofa.js.</p>
        <p>We provide two versions of prompts:</p>
        <h2>Streamlined Prompt Words</h2>
        <p>This is a condensed and optimized version designed to minimize the consumption of prefix tokens, suitable for most scenarios:</p>
        <pre><code class="hljs">https:<span class="hljs-regexp">//</span>raw.githubusercontent.com<span class="hljs-regexp">/ofajs/</span>ofa.js<span class="hljs-regexp">/main/</span>llms<span class="hljs-regexp">/tiny/</span>start.md</code></pre>
        <p>Using this prompt, AI can efficiently develop components or page modules for ofa.js.</p>
        <h2>Complete Version Prompt</h2>
        <p>If the AI model you are using is relatively less intelligent, you can try using the full, unconcentrated version of the prompt. Although it will occupy more tokens during initialization, it may yield better results:</p>
        <pre><code class="hljs">https:<span class="hljs-regexp">//</span>raw.githubusercontent.com<span class="hljs-regexp">/ofajs/</span>ofa.js<span class="hljs-regexp">/main/</span>llms<span class="hljs-regexp">/origin/</span>start.md</code></pre>
        <p>By providing these prompts, we hope to help developers more conveniently leverage AI tools for ofa.js project development and improve development efficiency.</p>
      </article>
