        <h1>Using ofa.js AI Skills in Projects</h1>
        <p>Since ofa.js has not yet become a widely recognized framework, mainstream AI models do not yet have the ability to directly use ofa.js. To address this, we have carefully prepared a dedicated skill package to help AI learn and reference how to use ofa.js.</p>
        <h2>Usage</h2>
        <p>In AI tools that support skills, select the corresponding skill address based on the AI model language you are using:</p>
        <p><strong>Note:</strong> Since the documentation for ofa.js was originally written in Chinese, the Chinese version of the skill package is more complete and accurate. If you encounter problems while using the English version, it is recommended to try the Chinese version.</p>
        <h3>Chinese Model</h3>
        <p>If you are using a Chinese AI model, please use the following address:</p>
        <pre><code class="hljs">https:<span class="hljs-regexp">//</span>raw.githubusercontent.com<span class="hljs-regexp">/ofajs/</span>ofa.js<span class="hljs-regexp">/main/</span>skills/ofajs-docs.zip</code></pre>
        <p>Common Chinese AI models include: DeepSeek, Kimi, GLM, MiniMax, Qwen, etc.</p>
        <h3>English Model</h3>
        <p>If you are using an English AI model, please use the following address:</p>
        <pre><code class="hljs">https:<span class="hljs-regexp">//</span>raw.githubusercontent.com<span class="hljs-regexp">/ofajs/</span>ofa.js<span class="hljs-regexp">/main/</span>skills/ofajs-docs-en.zip</code></pre>
        <p>With this skill package, AI can efficiently learn and develop ofa.js components or page modules, helping developers more conveniently use AI tools for ofa.js project development and improve development efficiency.</p>
        <h2>Get More Help</h2>
        <p>If the AI skills did not solve your problem, feel free to post your question in our discussion forum:</p>
        <p><a href="https://github.com/ofajs/discussion/discussions" target="_blank">https://github.com/ofajs/discussion/discussions</a></p>
        <p>We will answer your question as soon as possible.</p>
      </article>
