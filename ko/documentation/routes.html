        <h1>싱글 페이지 애플리케이션</h1>
        <p>싱글 페이지 애플리케이션은 <code>o-app</code> 컴포넌트를 브라우저 주소 표시줄에 바인딩하여 웹 페이지 URL과 애플리케이션 내부의 페이지 경로를 동기화합니다. 싱글 페이지 애플리케이션을 활성화하면:</p>
        <ul>
          <li>웹페이지를 새로 고침하면 현재의 라우팅 상태를 유지할 수 있습니다</li>
          <li>주소창의 URL을 복사하여 다른 브라우저나 탭에서 열면, 동일하게 애플리케이션 상태를 복원할 수 있습니다</li>
          <li>브라우저의 앞으로/뒤로 버튼을 정상적으로 사용할 수 있습니다</li>
        </ul>
        <h2>기본 사용법</h2>
        <p>공식 <code>o-router</code> 컴포넌트로 <code>o-app</code> 컴포넌트를 감싸면 단일 페이지 애플리케이션을 구현할 수 있습니다.</p>

        <h2>fix-body 속성</h2>
        <p><code>fix-body</code> 속성을 추가하면 <code>o-router</code>가 자동으로 <code>html</code>과 <code>body</code>의 스타일을 재설정하여 기본 margin과 padding을 제거합니다.</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">o-router</span> <span class="hljs-attr">fix-body</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">o-app</span> <span class="hljs-attr">src</span>=<span class="hljs-string">&quot;./app-config.js&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-app</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">o-router</span>&gt;</span></code></pre>
        <p>이것은 다음 시나리오에서 특히 유용합니다：- <code>o-app</code>이 뷰포트를 완전히 채워야 합니다</p>
        <ul>
          <li>애플리케이션이 페이지의 유일한 콘텐츠일 때</li>
        </ul>

        <h2>작동 원리</h2>
        <p>싱글 페이지 애플리케이션은 브라우저의 Hash 모드를 기반으로 구현됩니다:</p>
        <ol>
          <li>앱 내에서 페이지 전환이 발생할 때, <code>o-router</code>는 주소 표시줄의 해시 값(예: <code>#/about.html</code>)을 자동으로 업데이트합니다.</li>
          <li>사용자가 페이지를 새로고침하거나 URL로 접근할 때, <code>o-router</code>는 해시 값을 읽어 해당 페이지를 로드합니다.</li>
          <li>브라우저의 앞/뒤 버튼은 해시 변경을 트리거하여 앱의 페이지 탐색을 제어합니다.</li>
        </ol>
        <h2>URL 변경 예시</h2>
        <p>애플리케이션에 <code>home.html</code>과 <code>about.html</code> 두 개의 페이지가 있다고 가정합니다:</p>
        <table>
          <thead>
            <tr>
              <th>사용자 작업</th>
              <th>주소 표시줄 변화</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>앱 열기</td>
              <td><code>index.html</code> → <code>index.html#/home.html</code></td>
            </tr>
            <tr>
              <td>소개 페이지로 이동</td>
              <td><code>index.html#/home.html</code> → <code>index.html#/about.html</code></td>
            </tr>
            <tr>
              <td>뒤로 가기 클릭</td>
              <td><code>index.html#/about.html</code> → <code>index.html#/home.html</code></td>
            </tr>
            <tr>
              <td>페이지 새로고침</td>
              <td>현재 hash 유지</td>
            </tr>
          </tbody>
        </table>
        <ul>
          <li>단일 페이지 애플리케이션은 <strong>하나</strong>의 <code>o-app</code> 컴포넌트와만 함께 사용할 수 있습니다</li>
        </ul>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
