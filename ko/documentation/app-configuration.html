<span class="hljs-comment">// 로딩 중 표시할 내용</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> <span class="hljs-title function_">loading</span> = (<span class="hljs-params"></span>) =&gt; <span class="hljs-string">&quot;&lt;div&gt;Loading...&lt;/div&gt;&quot;</span>;

<span class="hljs-comment">// 페이지 로드 실패 시 표시할 컴포넌트</span>

<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> <span class="hljs-title function_">ready</span>(<span class="hljs-params"></span>) {

<span class="hljs-comment">// 애플리케이션 프로토타입에 추가할 메서드와 속성</span>

        </o-playground> ## loading - 로딩 상태 <p>페이지 로드 중에 표시되는 컴포넌트로, 문자열 템플릿이거나 템플릿을 반환하는 함수일 수 있습니다.</p>

        <h2>fail - 오류 처리</h2>
        <p>페이지 로딩 실패 시 표시되는 컴포넌트로, 함수는 <code>src</code>(실패한 페이지의 주소)와 <code>error</code>(오류 정보)를 포함하는 객체 매개변수를 받습니다.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> <span class="hljs-title function_">fail</span> = (<span class="hljs-params">{src, error}</span>) =&gt; {
  <span class="hljs-keyword">return</span> <span class="hljs-string">`&lt;div class=&#x27;error&#x27;&gt;
    &lt;p&gt;페이지 로드 실패&lt;/p&gt;
    &lt;p&gt;주소: <span class="hljs-subst">${src}</span>&lt;/p&gt;
    &lt;button on:click=&quot;back()&quot;&gt;돌아가기&lt;/button&gt;
  &lt;/div&gt;`</span>;
};</code></pre>
        <h2>proto - 프로토타입 확장</h2>
        <p>애플리케이션 인스턴스에 사용자 정의 메서드와 계산된 속성을 추가하면, 페이지 컴포넌트 내에서 <code>this.app</code>로 이들에 접근할 수 있습니다.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> proto = {
  <span class="hljs-comment">// 사용자 정의 메서드</span>
  <span class="hljs-title function_">navigateToHome</span>(<span class="hljs-params"></span>) {
    <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">goto</span>(<span class="hljs-string">&quot;home.html&quot;</span>);
  },
  <span class="hljs-comment">// 계산된 속성</span>
  <span class="hljs-keyword">get</span> <span class="hljs-title function_">isAtHome</span>() {
    <span class="hljs-keyword">return</span> <span class="hljs-variable language_">this</span>.<span class="hljs-property">current</span>?.<span class="hljs-property">src</span>.<span class="hljs-title function_">includes</span>(<span class="hljs-string">&quot;home.html&quot;</span>);
  },
};</code></pre>
        <p>페이지에서 호출:</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">template</span> <span class="hljs-attr">page</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">button</span> <span class="hljs-attr">on:click</span>=<span class="hljs-string">&quot;app.navigateToHome()&quot;</span>&gt;</span>첫 페이지로 돌아가기<span class="hljs-tag">&lt;/<span class="hljs-name">button</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">p</span>&gt;</span>첫 페이지에 있는지 여부: {{app.isAtHome}}<span class="hljs-tag">&lt;/<span class="hljs-name">p</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">template</span>&gt;</span></code></pre>
        <h2>ready - 초기화 콜백</h2>
        <p>애플리케이션 설정 로드가 완료된 후 실행되는 콜백 함수로, 여기에서 초기화 작업을 수행할 수 있습니다. <code>this</code>를 통해 애플리케이션 인스턴스의 메서드와 속성에 접근할 수 있습니다.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> <span class="hljs-title function_">ready</span>(<span class="hljs-params"></span>) {
  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;애플리케이션이 초기화되었습니다&quot;</span>);
  <span class="hljs-comment">// this에 접근 가능 (o-app 요소 인스턴스)</span>
  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-variable language_">this</span>.<span class="hljs-property">current</span>); <span class="hljs-comment">// 현재 페이지 o-page 요소 인스턴스 가져오기</span>
  <span class="hljs-comment">// this.someMethod();</span>
}</code></pre>
        <h2>allowForward - 전진 기능</h2>
        <p>브라우저 앞으로 기능 활성화 여부를 제어합니다. <code>true</code>로 설정하면 브라우저의 뒤로 및 앞으로 버튼을 사용하여 탐색할 수 있습니다.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> allowForward = <span class="hljs-literal">true</span>;</code></pre>
        <p>활성화되면 사용자가 브라우저의 앞/뒤 버튼으로 탐색할 수 있으며, 앱의 탐색 메서드 <code>forward()</code>도 작동합니다.</p>
        <h2>프로그래밍 방식 내비게이션</h2>
        <p><code>olink</code> 링크 외에도 JavaScript에서 네비게이션 메서드를 호출할 수 있습니다:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// 지정된 페이지로 이동(히스토리에 추가)</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-title function_">goto</span>(<span class="hljs-string">&quot;./about.html&quot;</span>);

<span class="hljs-comment">// 현재 페이지를 교체(히스토리에 추가되지 않음)</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-title function_">replace</span>(<span class="hljs-string">&quot;./about.html&quot;</span>);

<span class="hljs-comment">// 이전 페이지로 뒤로 가기</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-title function_">back</span>();

<span class="hljs-comment">// 다음 페이지로 앞으로 가기(allowForward: true 설정 필요)</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-title function_">forward</span>();</code></pre>
        <h2>라우팅 기록</h2>
        <p><code>routers</code> 속성을 통해 브라우저 히스토리 기록을 얻을 수 있습니다:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// 모든 라우트 히스토리 가져오기</span>
<span class="hljs-keyword">const</span> history = app.<span class="hljs-property">routers</span>;
<span class="hljs-comment">// 반환 형식: [{ src: &quot;./page1.html&quot; }, { src: &quot;./page2.html&quot; }, ...]</span>

<span class="hljs-comment">// 현재 페이지 가져오기</span>
<span class="hljs-keyword">const</span> currentPage = app.<span class="hljs-property">current</span>;</code></pre>
        <h2>라우트 변경 감시</h2>
        <p><code>router-change</code> 이벤트를 모니터링하여 라우팅 변경에 대응할 수 있습니다：</p>
        <pre><code class="hljs language-javascript">app.<span class="hljs-title function_">on</span>(<span class="hljs-string">&quot;router-change&quot;</span>, <span class="hljs-function">(<span class="hljs-params">e</span>) =&gt;</span> {
  <span class="hljs-keyword">const</span> { data } = e;
  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;라우터 변경:&quot;</span>, data.<span class="hljs-property">name</span>); <span class="hljs-comment">// goto, replace, forward, back</span>
  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&quot;페이지 주소:&quot;</span>, data.<span class="hljs-property">src</span>);
});</code></pre>

        export const parent = "../../layout.html";
        export default async ({
          load,
          query

          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
