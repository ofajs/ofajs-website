      <article class="markdown-body">
        <h1>생산 및 배포</h1>
        <p>ofa.js로 개발한 프로젝트는 정적 서버에 바로 배포하여 사용할 수 있습니다.</p>
        <h2>개발 환경</h2>
        <p>공식 <a href="https://core.noneos.com/?redirect=studio" target="_blank">ofa Studio</a>를 사용하여 개발할 수 있으며, 이는 원클릭 프로젝트 생성 및 미리보기를 제공합니다.</p>
        <p>당신은 또한 정적 서버를 직접 구축할 수 있습니다:</p>
        <ul>
          <li>Nginx 또는 Apache와 같은 정적 서버 소프트웨어 사용</li>
          <li>Node.js의 <a href="https://www.npmjs.com/package/http-server" target="_blank">http-server</a> 모듈 사용</li>
          <li>직접 편집기의 정적 서버 플러그인을 사용하여 미리보기</li>
        </ul>
        <h2>생산 환경</h2>
        <h3>프로젝트 내보내기</h3>
        <p>만약 <a href="https://core.noneos.com/?redirect=studio" target="_blank">ofa Studio</a>로 구축한 프로젝트를 사용 중이라면, 도구에 내장된 내보내기 기능을 바로 사용하면 됩니다.</p>
        <p>수동으로 구축한 프로젝트라면, 프로젝트 폴더를 정적 서버에 직접 배포하면 됩니다. 개발 환경의 모드를 동일하게 유지하세요.</p>
        <h3>압축 난독화</h3>
        <p>프로덕션 환경에서는 일반적으로 압축 및 난독화 도구를 사용하여 파일 크기를 줄이고 로딩 속도를 높여야 합니다. <a href="https://terser.org/docs/cli-usage/" target="_blank">Terser CLI</a>를 사용하여 압축 및 난독화를 수행할 수 있습니다.</p>
        <p>명령줄 도구를 사용하고 싶지 않다면, <a href="https://builder.ofajs.com/" target="_blank">ofa build</a>를 사용하여 온라인으로 파일 압축 및 난독화를 할 수 있습니다. 이 도구는 현재 베타 버전이며, 추후 ofa Studio에 통합될 예정입니다.</p>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
