        <h1>속성 바인딩 이해하기</h1>
        <p>이전 내용에서는 <a href="./property-binding.html" olink="">속성 바인딩</a>의 기본 사용법에 대해初步적으로介绍했습니다. 이전의案例是用来绑定浏览器原生元素（如 <code>textarea</code>）의 <code>value</code> 속성으로, 이번 섹션에서는 속성 바인딩의본질——컴포넌트 인스턴스화 후의 JavaScript 속성에 실제로 바인딩되는 것이며 HTML 속성이 아니라는 점——을深入적으로探讨합니다.</p>
        <h2>컴포넌트 속성 바인딩 메커니즘</h2>
        <p>ofa.js에서 부모 컴포넌트에서 <code>:toProp="fromProp"</code> 구문을 사용할 때, 우리는 HTML 속성이 아니라 자식 컴포넌트 인스턴스의 JavaScript 속성을 설정하고 있습니다. 이는 HTML 속성을 직접 설정하는 것(예: <code>attr:toKey="fromKey"</code>)과 중요한 차이가 있습니다.</p>
        <p>다음 예제는 속성 바인딩을 통해 사용자 정의 컴포넌트에 데이터를 전달하는 방법을 보여줍니다:</p>
        <o-playground name="속성 바인딩 이해" style="--editor-height: 500px">

        <p>이 예에서는:- 부모 컴포넌트의 <code>val</code> 데이터가 자식 컴포넌트 <code>&lt;demo-comp&gt;</code>의 <code>fullName</code> 속성에 바인딩됨</p>
        <ul>
          <li><code>:full-name="val"</code> 문법을 사용하여 부모 컴포넌트의 <code>val</code> 값을 자식 컴포넌트의 <code>fullName</code> 속성에 전달함</li>
          <li>자식 컴포넌트가 해당 값을 받은 후, 템플릿에서 <code>{{fullName}}</code>을 통해 표시함</li>
        </ul>
        <h2>속성 바인딩 vs 속성 상속</h2>
        <p>주의해야 할 점은 속성 바인딩(<code>:</code>)과 특성 속성 상속(<code>attr:</code>) 사이에는 다음과 같은 주요 차이점이 있다는 것입니다:</p>
        <h3>속성 바인딩 (<code>:</code>)</h3>
        <ul>
          <li>컴포넌트 인스턴스에 바인딩된 JavaScript 속성</li>
          <li>전달된 데이터는 원시 타입을 유지합니다(문자열, 숫자, 부울 등)</li>
          <li>컴포넌트 내부에서 직접 접근하고 수정할 수 있으며, 심지어 컴포넌트 내부에서 <code>data</code>를 미리 정의할 필요가 없습니다</li>
        </ul>
        <h3>특성 속성 상속 (<code>attr:</code>)</h3>
        <ul>
          <li>HTML 속성 설정</li>
          <li>모든 값은 문자열로 변환됨</li>
          <li>주로 기본 DOM 요소에 속성을 전달하는 데 사용됨</li>
          <li>복잡한 데이터를 파싱하려면 특별한 처리가 필요함</li>
          <li>속성 값을 수신하려면 컴포넌트 내부에 <code>attrs</code>를 미리 정의해야 함</li>
        </ul>
        <p>문법 비교:```html</p>
        <!-- 속성 바인딩: JavaScript 값을 전달하고 데이터 타입 유지 -->
        <p><my-component :data-value="complexObject"></my-component>
          <my-component :count="42"></my-component>
          <my-component :is-active="true"></my-component>
        </p>
        <!-- 속성 상속: HTML 속성을 설정하고 모든 값을 문자열로 변환 -->
        <p><my-component attr:data-value="simpleString"></my-component>
          <my-component attr:count="42"></my-component> <!-- 실제로는 문자열 "42"가 전달됨 -->
        </p>

## 양방향 데이터 바인딩

인스턴스화된 컴포넌트는 여전히 양방향 데이터 바인딩을 지원하며, `sync:toProp="fromProp"` 구문을 사용합니다. 양방향 바인딩은 부모 컴포넌트와 자식 컴포넌트 간의 데이터 동기화를 허용하여, 어느 한쪽의 데이터가 변경되면 다른 쪽도 그에 따라 업데이트됩니다.

&gt; Angular 및 Vue와 달리, ofa.js는 컴포넌트에 특별한 설정이나 추가 작업 없이도 네이티브로 양방향 데이터 바인딩 구문을 지원합니다.

이 예에서는:- 부모 컴포넌트의 `val`과 자식 컴포넌트의 `fullName`은 `sync:full-name="val"`로 양방향 바인딩됩니다
- 부모 컴포넌트의 입력 상자에 내용을 입력하면 자식 컴포넌트가 즉시 새로운 값을 표시합니다
- 자식 컴포넌트의 입력 상자에 내용을 입력하면 부모 컴포넌트도 즉시 업데이트되어 표시됩니다

### 양방향 바인딩과 일반 속성 바인딩의 차이

| 특성 | 일반 속성 바인딩 (`:`) | 양방향 바인딩 (`sync:`) |
|------|-------------------|-------------------|
| 데이터 흐름 | 단방향: 부모 → 자식 | 양방향: 부모 ↔ 자식 |
| 문법 | `:prop="value"` | `sync:prop="value"` |
| 자식 컴포넌트 수정 | 부모 컴포넌트에 영향 없음 | 부모 컴포넌트에 영향 |
| 적용 시나리오 | 부모 컴포넌트가 자식 컴포넌트에 설정 전달 | 부모-자식 간 데이터 동기화 필요 |### 주의사항

1. **성능 고려**：양방향 바인딩은 데이터가 변경될 때 재렌더링을 트리거하므로 복잡한 시나리오에서 신중하게 사용해야 합니다.
2. **데이터 흐름 제어**：과도한 양방향 바인딩은 데이터 흐름 추적을 어렵게 만들 수 있으므로 컴포넌트 간 통신 방식을 합리적으로 설계하는 것이 좋습니다.
3. **컴포넌트 호환성**：모든 컴포넌트가 양방향 바인딩에 적합한 것은 아니므로 컴포넌트의 설계 목적을 고려해야 합니다.</span></code></pre>
