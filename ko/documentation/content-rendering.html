<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>템플릿 렌더링</title>
  <script src="https://cdn.jsdelivr.net/gh/kirakiray/ofa.js@4.6.20/dist/ofa.mjs#debug" type="module"></script>
  <script src="https://cdn.jsdelivr.net/gh/kirakiray/ofa.js@4.6.20/libs/scsr/dist/scsr.min.mjs" type="module"></script>
  <link rel="icon" href="../../img/logo.svg" />
  <link rel="stylesheet" href="../../css/palette.css" pui-colors />
  <link rel="stylesheet" href="../../css/theme.css" />
  <link rel="stylesheet" href="../../css/github-markdown.css" />
  <link rel="stylesheet" href="../../css/hljs.css" />
  <style>
    html,
    body {
      height: 100%;
      padding: 0;
      margin: 0;
      overflow: hidden;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        Segoe UI,
        Microsoft Yahei,
        Helvetica,
        Arial,
        sans-serif,
        Apple Color Emoji,
        Segoe UI Emoji;
    }

    o-app {
      height: 100%;
    }

    @keyframes fadein {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    o-app {
      animation: fadein 0.1s ease-in-out;
    }
  </style>
</head>

<body>
  <o-app src="../../js/app-config.js">
    <template page>
      <link rel="stylesheet" href="../../css/github-markdown.css" />
      <link rel="stylesheet" href="../../css/hljs.css" />
      <l-m src="../../comps/center-block.html"></l-m>
      <l-m src="../../comps/article-code.html"></l-m>
      <l-m src="https://playground.ofajs.com/comps/o-playground/o-playground.html"></l-m>
      <style>
        :host {
          display: block;
          height: 100%;
          box-sizing: border-box;
          overflow: auto;
        }
      </style>
      <link rel="stylesheet" href="../../css/page.css" />
      <article class="markdown-body">
        <h1>템플릿 렌더링</h1>
        <p>ofa.js는 강력한 템플릿 렌더링 엔진을 제공하며, 풍부한 템플릿 구문을 포함하고 있어 개발자가 애플리케이션을 빠르게 구축할 수 있도록 도와줍니다. 먼저 가장 일반적으로 사용되는 텍스트 렌더링부터 소개하겠습니다.</p>
        <h2>페이지 데이터 바인딩</h2>
        <p>ofa.js에서는 각 페이지마다 <code>data</code> 객체가 있으며, 이곳에 페이지에서 사용할 변수들을 정의할 수 있습니다. 페이지가 렌더링되기 시작하면 자동으로 <code>data</code> 객체의 데이터가 템플릿에 바인딩되고, 템플릿에서는 <code>{{변수명}}</code> 구문을 사용해 해당 변수의 값을 렌더링합니다.</p>
        <h2>텍스트 렌더링</h2>
        <p>텍스트 렌더링은 가장 기본적인 렌더링 방식으로, 템플릿에서 <code>{{변수명}}</code> 문법을 사용하여 <code>data</code> 객체에서 해당 변수의 값을 표시할 수 있습니다.</p>
        <o-playground name="텍스트 렌더링 예제" style="--editor-height: 500px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <p>{{val}}</p>
      <script>
        export default async () => {
          return {
            data: {
              val: "Hello ofa.js Demo Code",
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>HTML 콘텐츠 렌더링</h2>
        <p>요소에 <code>:html</code> 지시어를 추가하면 해당 변수의 HTML 문자열을 파싱하여 안전하게 요소 내부에 삽입할 수 있으며, 이를 통해 손쉽게 리치 텍스트 동적 렌더링이나 외부 HTML 조각의 임베드를 구현할 수 있습니다.</p>
        <o-playground name="HTML 콘텐츠 렌더링 예제" style="--editor-height: 500px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <p :html="val"></p>
      <script>
        export default async () => {
          return {
            data: {
              val: '<span style="color:green;">Hello ofa.js Demo Code</span>',
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
  </o-app>
  <o-root-provider name="pui" theme="dark"></o-root-provider>
</body>

</html>
