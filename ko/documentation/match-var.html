      <article class="markdown-body">
        <h1>스타일 쿼리</h1>
        <p><code>match-var</code>는 ofa.js에서 CSS 변수를 기반으로 스타일을 매칭하는 기능 컴포넌트입니다. <code>match-var</code>를 통해 현재 컴포넌트의 CSS 변수 값에 따라 동적으로 다른 스타일을 매칭하고 적용할 수 있습니다. 이러한 특성은 스타일과 관련된 컨텍스트 상태 전달에 특화되어 있으며, JavaScript를 사용할 필요 없이 더욱 편리하게 사용할 수 있어, 테마 색상 등 스타일 전달 요구사항에 적합합니다.</p>
        <h2>핵심 개념</h2>
        <ul>
          <li><strong>match-var</strong>: CSS 변수 값에 따라 내부 스타일을 적용할지 결정하는 스타일 매칭 컴포넌트</li>
          <li><strong>속성 매칭</strong>: 컴포넌트 속성을 통해 매칭할 CSS 변수와 기대값을 정의</li>
          <li><strong>스타일 적용</strong>: 매칭 성공 시 내부 <code>&lt;style&gt;</code> 태그의 스타일이 컴포넌트에 적용됨</li>
        </ul>
        <h2>기본 사용법</h2>
        <p><code>match-var</code> 컴포넌트는 속성을 통해 일치시켜야 할 CSS 변수와 기대값을 정의합니다. 컴포넌트의 CSS 변수 값이 지정된 속성 값과 일치할 때, 내부에 정의된 스타일이 적용됩니다.</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">match-var</span> <span class="hljs-attr">theme</span>=<span class="hljs-string">&quot;dark&quot;</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
    <span class="hljs-selector-pseudo">:host</span> {
      <span class="hljs-attribute">background-color</span>: <span class="hljs-number">#333</span>;
      <span class="hljs-attribute">color</span>: white;
    }
  </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">match-var</span>&gt;</span></code></pre>
        <h3>속성</h3>
        <p><code>match-var</code> 컴포넌트는 CSS 변수의 매칭 규칙을 정의하기 위해 임의의 속성을 사용합니다. 속성 이름은 CSS 변수 이름(<code>--</code> 접두사 제외)에 해당하고, 속성 값은 기대하는 매칭 값입니다.</p>
        <h3>작동 원리</h3>
        <ol>
          <li><strong>브라우저 지원</strong>: 브라우저가 <code>@container style()</code> 쿼리를 지원하면 CSS 네이티브 기능을 바로 사용합니다</li>
          <li><strong>폴백 처리</strong>: 지원하지 않을 경우, CSS 변수 값 변화를 폴링하며 감지하고 매치 성공 시 동적으로 스타일을 주입합니다</li>
          <li><strong>수동 새로고침</strong>: <code>$.checkMatch()</code> 메서드로 수동으로 스타일 감지를 트리거할 수 있습니다</li>
        </ol>
        <h2>기본 예제</h2>
        <o-playground name="기본 예시" style="--editor-height: 500px">
          <code path="demo.html" preview unimportant>
    <template>
      <o-page src="./page1.html"></o-page>
    </template>
  </code>
          <code path="page1.html">
    <template page>
      <l-m src="./theme-box.html"></l-m>
      <style>
        :host{
            display: block;
        }
      </style>
      <style>
        .container{
           --theme: data(currentTheme);
        }
      </style>
      <button on:click="changeTheme">테마 전환</button> - 테마:{{currentTheme}}
      <div class="container">
        <theme-box>
          CSS 변수에 따라 다른 스타일 표시
        </theme-box>
      </div>
        <theme-box style="--theme: light;">
          밝은 테마 표시
        </theme-box>
        <theme-box style="--theme: dark;">
          어두운 테마 표시
        </theme-box>
      </div>
      <script>
        export default async ()=>{
          return {
            data: {
                currentTheme: "light",
            },
            proto:{
                changeTheme(){
                    this.currentTheme = this.currentTheme === "light" ? "dark" : "light";
                }
            }
          };
        };
      </script>
    </template>
  </code>
          <code path="theme-box.html" active>
    <template component>
      <style>
        :host {
          display: block;
          margin: 8px 0;
        }

      <match-var theme="light">
        <style>

            background-color: #f5f5f5;
            color: #333;
          }
        </style>
      </match-var>
      <match-var theme="dark">

          .content {

          }
        </style>

      <div class="content">
        <slot></slot>
      </div>

          tag: "theme-box",
          data: {
            theme: "light",
          },
        };
      </script>
    </template>
  </code>

        <h2>다중 조건 매칭</h2>
        <p>여러 속성을 동시에 사용하여 더 복잡한 일치 조건을 정의할 수 있으며, 모든 CSS 변수가 일치할 때만 스타일이 적용됩니다.</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">match-var</span> <span class="hljs-attr">theme</span>=<span class="hljs-string">&quot;dark&quot;</span> <span class="hljs-attr">size</span>=<span class="hljs-string">&quot;large&quot;</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
    <span class="hljs-selector-pseudo">:host</span> {
      <span class="hljs-attribute">padding</span>: <span class="hljs-number">20px</span>;
      <span class="hljs-attribute">font-size</span>: <span class="hljs-number">18px</span>;
    }
  </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">match-var</span>&gt;</span></code></pre>
        <h2>다중 조건 매칭 예시</h2>
        <o-playground name="속성 매칭 예제" style="--editor-height: 500px">
          <code path="demo.html" preview unimportant>
    <template>
      <o-page src="./page1.html"></o-page>
    </template>
  </code>
          <code path="page1.html">
    <template page>
      <style>
        :host {
            display: block;
        }
      </style>
      <style>
        .content{
            --theme: data(theme);
            --size: data(size);
        }
      </style>
      <l-m src="./test-card.html"></l-m>
      <div>테마: {{theme}} <button on:click="changeTheme">테마 전환</button></div>
      <div>사이즈: {{size}} <button on:click="changeSize">사이즈 전환</button></div>
      <div class="content">
        <test-card>
          <div>다중 조건 스타일 매칭 예제</div>
        </test-card>
      </div>
      <script>
        export default async ()=>{
            return {
                data:{
                    theme:"light",
                    size:"small"
                },
                proto:{
                    changeTheme(){
                        this.theme = this.theme === "light" ? "dark" : "light";
                    },
                    changeSize(){
                        this.size = this.size === "small" ? "large" : "small";
                    }
                }
            };
        }
      </script>
    </template>
  </code>
          <code path="test-card.html" active>
    <template component>
      <style>
        :host {
          display: block;
          padding: 20px;

      <match-var theme="dark" size="small">
        <style>
          :host {
            background-color: #424242;
            border: 1px solid #757575;
            color: white;
          }
        </style>
      </match-var>
      <match-var theme="dark" size="large">
        <style>
          :host {
            background-color: #212121;
            border: 2px solid #616161;
            color: white;
          }
        </style>

        <h2>checkMatch 수동 새로고침</h2>
        <p>어떤 경우에는 CSS 변수의 변경 사항이 자동으로 감지되지 않을 수 있으며, 이때 수동으로 <code>$.checkMatch()</code> 메서드를 호출하여 스타일 감지를 트리거할 수 있습니다.</p>
        <blockquote>
          <p>현재 Firefox는 아직 <code>@container style()</code> 쿼리를 지원하지 않으므로, 수동으로 <code>$.checkMatch()</code>를 호출해야 합니다. 브라우저가 향후 네이티브로 지원하게 되면, 시스템이 변수 변경을 자동으로 감지하여 수동으로 트리거할 필요가 없어집니다.</p>
        </blockquote>
        <pre><code class="hljs language-javascript"><span class="hljs-attr">proto</span>: {
  <span class="hljs-title function_">updateTheme</span>(<span class="hljs-params"></span>) {
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">theme</span> = <span class="hljs-string">&#x27;dark&#x27;</span>;
    <span class="hljs-comment">// 수동으로 스타일 감지 트리거</span>
    $.<span class="hljs-title function_">checkMatch</span>();
  }
}</code></pre>
        <h2>모범 사례</h2>
        <ol>
          <li><strong>CSS 네이티브 기능 우선 사용</strong>: <code>match-var</code>는 브라우저 네이티브 <code>@container style()</code> 쿼리를 우선 사용하며, 최신 브라우저에서 성능이 더 우수합니다 </li>
          <li><strong>스타일을 합리적으로 구성</strong>: 관련 있는 매칭 스타일을 한데 모아 유지보수와 이해를 용이하게 합니다 </li>
          <li><strong>data() 바인딩 활용</strong>: <code>data()</code> 디렉티브와 결합하면 반응형 스타일 전환이 가능합니다</li>
        </ol>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
  </o-app>
  <o-root-provider name="pui" theme="dark"></o-root-provider>
