<body>
  <o-app src="../../js/app-config.js">
    <template page>
      <link rel="stylesheet" href="../../css/github-markdown.css" />
      <link rel="stylesheet" href="../../css/hljs.css" />
      <l-m src="../../comps/center-block.html"></l-m>
      <l-m src="../../comps/article-code.html"></l-m>
      <l-m src="https://playground.ofajs.com/comps/o-playground/o-playground.html"></l-m>
      <style>
        :host {
          display: block;
          height: 100%;
          box-sizing: border-box;
          overflow: auto;
        }
      </style>
      <link rel="stylesheet" href="../../css/page.css" />
      <article class="markdown-body">
        <h1>이벤트 바인딩</h1>
        <p>ofa.js에서 이벤트 바인딩은 사용자 상호작용을 구현하는 중요한 메커니즘입니다. 다양한 방법으로 요소에 이벤트 핸들러를 바인딩하여 사용자의 조작에 응답할 수 있습니다.</p>
        <h2>proto에서 이벤트 바인딩하기</h2>
        <p>이것은 권장되는 이벤트 바인딩 방식이며, 복잡한 이벤트 처리 로직에 적합합니다. 이벤트 처리 함수를 <code>proto</code> 객체에 정의하면 코드를 더 잘 구성할 수 있으며, 유지 관리와 재사용이 더 편리합니다.</p>
        <o-playground name="프로토에서 이벤트 바인딩" style="--editor-height: 500px">
          <code>
    <template page="">
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <button on:click="clickMe">Click Me - {{count}}</button>
      <script>
        export default async () => {
          return {
            data: {
              count: 1,
            },
            proto:{
              clickMe(){
                this.count++;
              }
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>함수 직접 실행하기</h2>
        <p>간단한 작업(예: 카운터 증가, 상태 전환 등)은 이벤트 속성에 짧은 표현식을 바로 작성할 수 있습니다. 이 방식은 간결하고 명확하여 단순한 로직을 처리하기에 적합합니다.</p>
        <o-playground name="직접 함수 실행" style="--editor-height: 500px">
          <code>
    <template page="">
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <button on:click="count++">Click Me - {{count}}</button>
      <script>
        export default async () => {
          return {
            data: {
              count: 1,
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>지원되는 이벤트 유형</h2>
        <p>ofa.js는 모든 표준 DOM 이벤트를 지원합니다. 다음을 포함하여(단, 이에 한정되지 않음):</p>
        <ul>
          <li>마우스 이벤트: <code>click</code>, <code>dblclick</code>, <code>mousedown</code>, <code>mouseup</code>, <code>mouseover</code>, <code>mouseout</code> 등</li>
          <li>키보드 이벤트: <code>keydown</code>, <code>keyup</code>, <code>keypress</code> 등</li>
          <li>폼 이벤트: <code>submit</code>, <code>change</code>, <code>input</code>, <code>focus</code>, <code>blur</code> 등</li>
          <li>터치 이벤트: <code>touchstart</code>, <code>touchmove</code>, <code>touchend</code> 등</li>
        </ul>
        <p>ofa.js가 지원하는 이벤트 유형은 네이티브 DOM 이벤트와 완전히 일치합니다. 자세한 내용은 다음을 참조하세요: <a href="https://developer.mozilla.org/zh-CN/docs/Web/API/Event" target="_blank">MDN 이벤트 문서</a>.</p>
        <h2>이벤트 핸들러에 매개변수 전달</h2>
        <p>이벤트 핸들러에 매개변수를 전달할 수도 있습니다:</p>
        <o-playground name="이벤트 핸들러에 매개변수 전달" style="--editor-height: 600px">
          <code>
    <template page="">
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <button on:click="addNumber(5)">5 추가 - 현재: {{count}}</button>
      <button on:click="addNumber(10)">10 추가 - 현재: {{count}}</button>
      <script>
        export default async () => {
          return {
            data: {
              count: 0,
            },
            proto: {
              addNumber(num) {
                this.count += num;
              }
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>이벤트 객체 접근</h2>
        <p>이벤트 핸들러에서는 <code>event</code> 매개변수를 통해 네이티브 이벤트 객체에 접근할 수 있습니다:</p>
        <o-playground name="이벤트 객체 접근" style="--editor-height: 700px">
          <code>
    <template page="">
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
        .container {
          width: 300px;
          height: 200px;
          background-color: #f0f0f0;
          display: flex;
          align-items: center;
          justify-content: center;
        }
      </style>
      <div class="container" on:click="handleClick">아무 곳이나 클릭하여 좌표 확인</div>
      <p>X: {{x}}, Y: {{y}}</p>
      <script>
        export default async () => {
          return {
            data: {
              x: 0,
              y: 0,
            },
            proto: {
              handleClick(event) {
                this.x = event.clientX;
                this.y = event.clientY;
              }
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>표현식에서도 <code>$event</code> 매개변수를 사용해 네이티브 이벤트 객체에 접근할 수 있으며, 예를 들어 마우스 클릭 좌표를 얻는 방법은 다음과 같습니다:</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">div</span> <span class="hljs-attr">class</span>=<span class="hljs-string">"container"</span> <span class="hljs-attr">on:click</span>=<span class="hljs-string">"handleClick($event)"</span>&gt;</span>아무 위치나 클릭하여 좌표를 확인하세요<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span></code></pre>
        <h2>사용자 정의 이벤트 감시</h2>
        <p>기본 DOM 이벤트를 감시하는 것 외에도, 컴포넌트가 발생시키는 커스텀 이벤트도 쉽게 감시할 수 있습니다:</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">custom-comp</span> <span class="hljs-attr">on:custom-event</span>=<span class="hljs-string">"handleCustomEvent"</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">custom-comp</span>&gt;</span></code></pre>
        <p>사용자 정의 이벤트에 대해 더 깊이 알고 싶다면 <a href="custom-events.html" olink="">사용자 정의 이벤트</a> 챕터를 참조하세요. 튜토리얼 순서에 따라 차근차근 진행하는 것을 권장하며, 이후 내용은 자연스럽게 이어집니다; 물론 언제든지 찾아보고 미리 익혀도 좋습니다.</p>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
  </o-app>
  <o-root-provider name="pui" theme="dark"></o-root-provider>
</body>

</html>
