        <h1>상태 관리</h1>
        <h2>상태란 무엇인가</h2>
        <p>ofa.js에서 <strong>상태</strong>는 컴포넌트나 페이지 모듈 자체의 <code>data</code> 속성을 의미합니다. 이 상태는 현재 컴포넌트 내에서만 사용할 수 있으며, 해당 컴포넌트의 내부 데이터를 저장하고 관리하는 데 사용됩니다.</p>
        <p>여러 컴포넌트나 페이지가 동일한 데이터를 공유해야 할 때, 전통적인 방법은 이벤트 전달이나 props를 계층적으로 전달하는 방식입니다. 이 방식은 복잡한 애플리케이션에서 코드 유지보수를 어렵게 만듭니다. 따라서 <strong>상태 관리</strong>가 필요합니다 — 공유 상태 객체를 정의하여 여러 컴포넌트나 페이지 모듈이 이 데이터에 접근하고 수정할 수 있도록 함으로써 상태 공유를 실현합니다.</p>
        <blockquote>
          <p><strong>提示</strong>：상태 관리는 컴포넌트와 페이지를 넘나들며 데이터를 공유해야 하는 시나리오(예: 사용자 정보, 장바구니, 테마 설정, 전역 설정 등)에 적합합니다.</p>
        </blockquote>
        <h2>상태 객체 생성</h2>
        <p><code>$.stanz({})</code>를 통해 반응형 상태 객체를 생성합니다. 이 메서드는 일반 객체를 초기 데이터로 받아 반응형 상태 프록시를 반환합니다.</p>
        <h3>기본 사용법</h3>

        <h2>상태 객체의 특성</h2>
        <h3>1. 반응형 업데이트</h3>
        <p><code>$.stanz()</code>로 생성된 상태 객체는 반응형입니다. 상태 데이터가 변경되면 해당 데이터를 참조하는 모든 컴포넌트가 자동으로 업데이트됩니다.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> store = $.<span class="hljs-title function_">stanz</span>({ <span class="hljs-attr">count</span>: <span class="hljs-number">0</span> });

<span class="hljs-comment">// 컴포넌트에서</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> {
  <span class="hljs-attr">data</span>: {
    <span class="hljs-attr">store</span>: {}
  },
  <span class="hljs-attr">proto</span>:{
    <span class="hljs-title function_">increment</span>(<span class="hljs-params"></span>) {
        store.<span class="hljs-property">count</span>++; <span class="hljs-comment">// store.count를 참조하는 모든 컴포넌트가 자동으로 업데이트됩니다.</span>
    }
  },
  <span class="hljs-title function_">attached</span>(<span class="hljs-params"></span>) {
    <span class="hljs-comment">// 상태 객체의 속성을 직접 참조합니다.</span>
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">store</span> = store;
  },
  <span class="hljs-title function_">detached</span>(<span class="hljs-params"></span>){
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">store</span> = {}; <span class="hljs-comment">// 컴포넌트가 소멸될 때, 마운트된 상태 데이터를 비웁니다.</span>
  }
};</code></pre>
        <h3>2. 심층 반응형</h3>
        <p>상태 객체는 깊은 반응형을 지원하며, 중첩된 객체와 배열의 변화도 감시됩니다.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> store = $.<span class="hljs-title function_">stanz</span>({
  <span class="hljs-attr">user</span>: {
    <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;장삼&quot;</span>,
    <span class="hljs-attr">settings</span>: {
      <span class="hljs-attr">theme</span>: <span class="hljs-string">&quot;dark&quot;</span>
    }
  },
  <span class="hljs-attr">list</span>: []
});

<span class="hljs-comment">// 중첩 속성 수정 시에도 업데이트 트리거됨</span>
store.<span class="hljs-property">user</span>.<span class="hljs-property">name</span> = <span class="hljs-string">&quot;이사&quot;</span>;
store.<span class="hljs-property">user</span>.<span class="hljs-property">settings</span>.<span class="hljs-property">theme</span> = <span class="hljs-string">&quot;light&quot;</span>;
store.<span class="hljs-property">list</span>.<span class="hljs-title function_">push</span>({ <span class="hljs-attr">id</span>: <span class="hljs-number">1</span>, <span class="hljs-attr">title</span>: <span class="hljs-string">&quot;새 작업&quot;</span> });</code></pre>
        <h2>모범 사례</h2>
        <h3>1. 컴포넌트 attached 단계에서 상태 마운트</h3>
        <p>컴포넌트의 <code>attached</code> 라이프사이클에서 공유 상태를 마운트하는 것을 권장합니다:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> {
  <span class="hljs-attr">data</span>: {
    <span class="hljs-attr">list</span>: []
  },
  <span class="hljs-title function_">attached</span>(<span class="hljs-params"></span>) {
    <span class="hljs-comment">// 공유 상태를 컴포넌트의 data에 마운트</span>
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">list</span> = data.<span class="hljs-property">list</span>;
  },
  <span class="hljs-title function_">detached</span>(<span class="hljs-params"></span>) {
    <span class="hljs-comment">// 컴포넌트가 파괴될 때, 마운트된 상태 데이터를 비워 메모리 누수를 방지</span>
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">list</span> = [];
  }
};</code></pre>
        <h3>2. 합리적인 상태 범위 관리</h3>
        <ul>
          <li><strong>전역 상태</strong>：전체 애플리케이션에서 접근해야 하는 데이터（사용자 정보, 전역 구성 등）</li>
          <li><strong>모듈 상태</strong>：특정 기능 모듈 내부에서 공유하는 데이터</li>
        </ul>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// 전역 호출 상태</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> globalStore = $.<span class="hljs-title function_">stanz</span>({ <span class="hljs-attr">user</span>: <span class="hljs-literal">null</span>, <span class="hljs-attr">theme</span>: <span class="hljs-string">&quot;light&quot;</span> });

<span class="hljs-comment">// 모듈 내에서 사용하는 상태</span>
<span class="hljs-keyword">const</span> cartStore = $.<span class="hljs-title function_">stanz</span>({ <span class="hljs-attr">total</span>: <span class="hljs-number">0</span> });</code></pre>

        <h2>주의사항</h2>
        <ol>
          <li>
            <p><strong>상태 정리</strong>: 컴포넌트의 <code>detached</code> 생명 주기에서 상태 데이터에 대한 참조를 적시에 정리하여 메모리 누수를 방지합니다.</p>
          </li>
          <li>
            <p><strong>순환 의존성 방지</strong>: 상태 객체 간에 순환 참조가 형성되지 않도록 하여 반응형 시스템에 문제가 발생하는 것을 방지합니다.</p>
          </li>
          <li>
            <p><strong>대규모 데이터 구조</strong>: 대규모 데이터 구조의 경우 계산된 속성 또는 분할 관리를 고려하여 불필요한 성능 오버헤드를 피합니다.</p>
          </li>
          <li>
            <p><strong>상태 일관성</strong>: 비동기 작업에서 상태의 일관성에 주의하며, 트랜잭션 또는 일괄 업데이트를 사용하여 데이터 무결성을 보장할 수 있습니다.</p>
          </li>
        </ol>
      </article>

      <script>
        export const parent = "../../layout.html";

          load,
          query
        }) => {
          const {
