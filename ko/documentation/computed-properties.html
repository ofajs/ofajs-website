      <article class="markdown-body">
        <h1>계산된 속성</h1>
        <p>계산 속성은 반응형 데이터를 기반으로 새로운 데이터를 파생시키는 방식으로, 의존하는 데이터의 변화에 따라 자동으로 업데이트됩니다. ofa.js에서 계산 속성은 <code>proto</code> 객체 내에 정의된 특별한 메서드로, JavaScript의 <code>get</code> 또는 <code>set</code> 키워드를 사용하여 정의됩니다.</p>
        <h2>특징과 장점</h2>
        <ul>
          <li><strong>캐싱성</strong>: 계산된 속성의 결과는 캐시되며, 의존하는 데이터가 변경될 때만 다시 계산된다</li>
          <li><strong>반응성</strong>: 의존하는 데이터가 업데이트되면 계산된 속성이 자동으로 갱신된다</li>
          <li><strong>선언형</strong>: 선언적인 방식으로 의존 관계를 생성하므로 코드가 더 명확하고 이해하기 쉽다</li>
        </ul>
        <h2>get 계산 속성</h2>
        <p>get 계산 속성은 반응형 데이터에서 새로운 값을 파생하는 데 사용되며, 매개변수를 받지 않고 다른 데이터를 기반으로 계산된 값만 반환합니다.</p>
        <o-playground name="get 계산 속성 예제" style="--editor-height: 600px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <button on:click="clickMe">Click Me - {{count}} - {{countDouble}}</button>
      <p>계산 속성 countDouble의 값: {{countDouble}}</p>
      <script>
        export default async () => {
          return {
            data: {
              count: 1,
            },
            proto: {
              get countDouble() {
                console.log('countDouble 접근됨');
                return this.count * 2;
              },
              clickMe() {
                this.count++;
              },
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h3>실제 적용 시나리오 예시</h3>
        <p>계산된 속성은 복잡한 데이터 변환 로직을 처리하는 데 자주 사용됩니다. 예를 들어 배열 필터링, 표시 텍스트 서식 지정 등이 있습니다:</p>
        <o-playground name="계산 속성 예제" style="--editor-height: 500px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          padding: 10px;
        }
        ul {
          list-style-type: none;
          padding: 0;
        }
        li {
          padding: 5px;
          margin: 3px 0;
          background-color: #838383ff;
        }
      </style>
      <input type="text" sync:value="filterText" placeholder="이름 필터...">
      <ul>
        <o-fill :value="filteredNames">
          <li>{{$data}}</li>
        </o-fill>
      </ul>
      <script>
        export default async () => {
          return {
            data: {
              filterText: '',
              names: ['장3', '이4', '왕54']
            },
            proto: {
              get filteredNames() {
                if (!this.filterText) {
                  return this.names;
                }
                return this.names.filter(name => 
                  name.includes(this.filterText)
                );
              },
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>set 계산 속성</h2>
        <p>set 계산 속성은 할당 연산을 통해 기본 데이터 상태를 수정할 수 있도록 해줍니다. 이는 보통 그것에 의존하는 원본 데이터를 역방향으로 업데이트하는 데 사용되는 하나의 매개변수를 받습니다.</p>
        <o-playground name="set 계산 속성 예제" style="--editor-height: 700px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
        button {
          margin: 5px;
          padding: 8px 12px;
        }
      </style>
      <div>
        <p>기본 값: {{count}}</p>
        <p>두 배 값: {{countDouble}}</p>
        <button on:click="resetCount">카운트 재설정</button>
        <button on:click="setCountDouble">두 배 값을 10으로 설정</button>
        <button on:click="incrementCount">기본 값 증가</button>
      </div>
      <script>
        export default async () => {
          return {
            data: {
              count: 1,
            },
            proto: {
              get countDouble() {
                return this.count * 2;
              },
              set countDouble(val) {
                this.count = Math.max(0, val / 2); // count가 음수가 되지 않도록 보장
              },
              resetCount() {
                this.count = 0;
              },
              setCountDouble() {
                this.countDouble = 10;
              },
              incrementCount() {
                this.count++;
              }
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>계산 속성 vs 메서드</h2>
        <p>메서드도 유사한 기능을 구현할 수 있지만, 계산된 속성은 캐싱 특성을 가지므로, 의존하는 데이터가 변경될 때만 다시 평가되어 성능이 더 우수합니다.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// 계산된 속성 사용(권장) - 캐시 있음</span>
<span class="hljs-keyword">get</span> <span class="hljs-title function_">fullName</span>() {
  <span class="hljs-keyword">return</span> <span class="hljs-variable language_">this</span>.<span class="hljs-property">firstName</span> + <span class="hljs-string">&#x27; &#x27;</span> + <span class="hljs-variable language_">this</span>.<span class="hljs-property">lastName</span>;
}

<span class="hljs-comment">// 메서드 사용 - 호출할 때마다 실행</span>
<span class="hljs-title function_">fullName</span>(<span class="hljs-params"></span>) {
  <span class="hljs-keyword">return</span> <span class="hljs-variable language_">this</span>.<span class="hljs-property">firstName</span> + <span class="hljs-string">&#x27; &#x27;</span> + <span class="hljs-variable language_">this</span>.<span class="hljs-property">lastName</span>;
}</code></pre>
        <h2>주의사항</h2>
        <ol>
          <li><strong>비동기 작업 피하기</strong>: 계산 속성은 동기적이고 부작용이 없어야 하며, 비동기 호출이나 컴포넌트 상태 직접 수정을 금지합니다. </li>
          <li><strong>의존성 추적</strong>: 반응형 데이터에만 의존해야 하며, 그렇지 않으면 업데이트가 예측 불가능해질 수 있습니다. </li>
          <li><strong>오류 방지</strong>: 계산 속성 내부에 순환 의존성이나 예외적인 할당이 발생하면 렌더링 실패나 심지어 무한 루프가 발생할 수 있으므로, 반드시 사전에 경계 조건을 설정하고 예외 처리를 철저히 해야 합니다.</li>
        </ol>
        <h2>실제 응용 예시</h2>
        <p>다음은 계산된 속성의 실용성을 보여주는 간단한 폼 검증 예제입니다：</p>
        <o-playground name="폼 검증 예제" style="--editor-height: 600px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          padding: 15px;
          font-family: Arial, sans-serif;
        }
        input {
          margin: 5px 0;
          padding: 8px;
          width: 200px;
        }
        .status {
          margin-top: 10px;
          padding: 8px;
          border-radius: 4px;
        }
        .valid {
          background-color: #d4edda;
          color: green;
        }
        .invalid {
          background-color: #f8d7da;
          color: red;
        }
      </style>
      <h3>간단한 검증 예제</h3>
      <input type="text" sync:value="username" placeholder="사용자명 입력(최소 3자)">
      <p class="status" class:valid="isValid" class:invalid="!isValid">
        상태: {{statusMessage}}
      </p>
      <script>
        export default async () => {
          return {
            data: {
              username: ''
            },
            proto: {
              get isValid() {
                return this.username.length >= 3;
              },
              get statusMessage() {
                return this.isValid ? '사용자명 유효' : '사용자명 길이 부족';
              },
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {

              setTimeout(() => {
