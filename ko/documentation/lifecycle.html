      <article class="markdown-body">
        <h1>라이프사이클</h1>
        <p>ofa.js 컴포넌트는 완전한 라이프사이클 훅 함수를 가지고 있어, 컴포넌트의 다양한 단계에서 특정 로직을 실행할 수 있습니다. 이러한 훅 함수를 통해 컴포넌트 생성, 마운트, 업데이트 및 소멸과 같은 중요한 시점에 개입하여 해당 작업을 수행할 수 있습니다.</p>
        <h2>라이프사이클 훅 함수</h2>
        <p>ofa.js는 다음과 같은 주요 생명주기 훅 함수를 제공하며, 일반적으로 사용되는 순서로 배열되어 있습니다:</p>
        <h3>attached</h3>
        <p><code>attached</code> 훅은 컴포넌트가 문서에 삽입될 때 호출되며, 컴포넌트가 페이지에 마운트되었음을 나타냅니다. 이는 가장 일반적으로 사용되는 생명주기 훅으로, 보통 컴포넌트가 실제로 페이지에 표시된 후에만 수행할 수 있는 초기화 작업을 실행하는 데 사용되며, 컴포넌트가 보이지 않을 때 불필요한 계산이 실행되는 것을 방지합니다. 이 훅은 또한 요소 크기 측정, 애니메이션 시작 등 컴포넌트가 페이지에 렌더링된 후에만 가능한 작업을 수행하기에 매우 적합합니다.</p>
        <ul>
          <li><strong>호출 시점</strong>: 컴포넌트가 DOM 트리에 추가될 때</li>
          <li><strong>주요 용도</strong>: 타이머 시작, 이벤트 리스너 추가, 가시성이 필요한 작업 수행</li>
        </ul>
        <h3>detached</h3>
        <p><code>detached</code> 훅은 컴포넌트가 문서에서 제거될 때 호출되며, 컴포넌트가 곧 언마운트될 것을 나타냅니다. 이 훅은 타이머 정리, 이벤트 리스너 제거 등과 같은 리소스 정리에 적합합니다.</p>
        <ul>
          <li><strong>호출 시점</strong>: 컴포넌트가 DOM 트리에서 제거됨</li>
          <li><strong>주요 용도</strong>: 리소스 정리, 구독 취소, 이벤트 리스너 제거</li>
        </ul>
        <h3>ready</h3>
        <p><code>ready</code> 훅은 컴포넌트가 준비되었을 때 호출되며, 이때 컴포넌트의 템플릿이 이미 렌더링되었고 DOM 요소가 생성되었지만 아직 문서에 삽입되지 않았을 수 있습니다. 이 훅은 DOM 조작이나 서드파티 라이브러리 초기화에 적합합니다.</p>
        <ul>
          <li><strong>호출 시점</strong>: 컴포넌트 템플릿 렌더링 완료, DOM이 생성됨</li>
          <li><strong>주요 용도</strong>: DOM에 의존하는 초기화 작업 수행</li>
        </ul>
        <h3>loaded</h3>
        <p><code>loaded</code> 훅은 컴포넌트와 모든 하위 컴포넌트, 비동기 리소스가 모두 로드된 후에 트리거되며, 이 시점에서 로딩 상태를 안전하게 제거하거나 완전한 컴포넌트 트리에 의존하는 후속 작업을 실행할 수 있습니다. 의존성이 없다면 <code>ready</code> 훅 이후에 호출됩니다.</p>
        <ul>
          <li><strong>호출 시기</strong>: 컴포넌트와 그 하위 컴포넌트가 완전히 로드된 후</li>
          <li><strong>주요 용도</strong>: 완전한 컴포넌트 트리에 의존하는 작업을 실행</li>
        </ul>
        <h2>생명 주기 실행 순서</h2>
        <p>컴포넌트의 생명주기 훅은 다음 순서대로 실행됩니다:</p>
        <ol start="2">
          <li><code>ready</code> - 컴포넌트 준비 완료 (DOM 생성됨)</li>
          <li><code>attached</code> - 컴포넌트가 DOM에 마운트됨</li>
          <li><code>loaded</code> - 컴포넌트 완전 로드 완료</li>
        </ol>
        <p>컴포넌트가 DOM에서 제거되면, <code>detached</code> 훅이 호출됩니다。</p>
        <h2>사용 예시</h2>
        <p>아래 예시는 컴포넌트에서 라이프사이클 훅 함수를 사용하는 방법을 보여줍니다：</p>
        <o-playground name="라이프사이클 예제" style="--editor-height: 700px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
        .counter {
          margin: 10px 0;
        }
        button {
          margin-right: 10px;
          padding: 5px 10px;
        }
      </style>
      <h3>라이프사이클 데모</h3>
      <div class="counter">카운터: {{count}}</div>
      <button on:click="count += 10">10 증가</button>
      <button on:click="removeSelf">컴포넌트 제거</button>
      <div class="log">
        <h4>라이프사이클 로그:</h4>
        <ul>
          <o-fill :value="logs">
            <li>{{$data}}</li>
          </o-fill>
        </ul>
      </div>
      <script>
        export default async () => {
          return {
            data: {
              count: 0,
              logs: [],
            },
            proto: {
              removeSelf() {
                this.remove(); // DOM에서 자기 자신을 제거하여 detached 훅을 트리거
              },
              addLog(message) {
                this.logs = [...this.logs, `${new Date().toLocaleTimeString()} - ${message}`];
              }
            },
            ready() {
              this.addLog("ready: 컴포넌트 준비 완료, DOM이 생성됨");
              console.log("컴포넌트가 준비됨");
            },
            attached() {
              this.addLog("attached: 컴포넌트가 DOM에 마운트됨");
              this._timer = setInterval(() => {
                this.count++;
              }, 1000);
              console.log("컴포넌트가 마운트됨");
            },
            detached() {
              this.addLog("detached: 컴포넌트가 DOM에서 제거됨");
              // 타이머를 정리하여 메모리 누수 방지
              clearInterval(this._timer); 
              console.log("컴포넌트가 언마운트됨");
            },
            loaded() {
              this.addLog("loaded: 컴포넌트가 완전히 로드됨");
              console.log("컴포넌트가 완전히 로드됨");
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>이 예시에서 여러 생명 주기 훅의 실행 순서와 시점을 관찰할 수 있습니다. &quot;컴포넌트 제거&quot; 버튼을 클릭하면 <code>detached</code> 훅이 트리거되는 것을 볼 수 있습니다.</p>
        <h2>실제 적용 시나리오</h2>
        <h3>초기화 작업</h3>
        <p><code>ready</code> 훅에서 데이터 초기화:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">async</span> () =&gt; {
  <span class="hljs-keyword">return</span> {
    <span class="hljs-attr">data</span>: {
      <span class="hljs-attr">items</span>: []
    },
    <span class="hljs-title function_">ready</span>(<span class="hljs-params"></span>) {
      <span class="hljs-comment">// DOM 조작</span>
      <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">initDomElements</span>();
    }
  };
};</code></pre>
        <h3>리소스 관리</h3>
        <p><code>attached</code> 훅에서 타이머를 시작하고 <code>detached</code> 훅에서 리소스를 정리합니다：</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">async</span> () =&gt; {
  <span class="hljs-keyword">return</span> {
    <span class="hljs-attr">data</span>: {
      <span class="hljs-attr">timer</span>: <span class="hljs-literal">null</span>
    },
    <span class="hljs-title function_">attached</span>(<span class="hljs-params"></span>) {
      <span class="hljs-comment">// 타이머 시작</span>
      <span class="hljs-variable language_">this</span>.<span class="hljs-property">timer</span> = <span class="hljs-built_in">setInterval</span>(<span class="hljs-function">() =&gt;</span> {
        <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&#x27;정기 작업 실행&#x27;</span>);
      }, <span class="hljs-number">1000</span>);
    },
    <span class="hljs-title function_">detached</span>(<span class="hljs-params"></span>) {
      <span class="hljs-comment">// 타이머 정리</span>
      <span class="hljs-keyword">if</span>(<span class="hljs-variable language_">this</span>.<span class="hljs-property">timer</span>) {
        <span class="hljs-built_in">clearInterval</span>(<span class="hljs-variable language_">this</span>.<span class="hljs-property">timer</span>);
        <span class="hljs-variable language_">this</span>.<span class="hljs-property">timer</span> = <span class="hljs-literal">null</span>;
      }
    }
  };
};</code></pre>
        <p>라이프사이클 훅 함수는 ofa.js 컴포넌트 개발에서 중요한 개념이며, 올바르게 사용하면 컴포넌트 상태와 리소스를 더 잘 관리하고 애플리케이션 성능을 향상시킬 수 있습니다.</p>
      </article>

      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
