        <h1>중첩 페이지/라우트</h1>
        <p>ofa.js에서 중첩 페이지(중첩 라우트라고도 함)는 강력한 기능으로, 부모-자식 계층 관계를 가진 페이지 구조를 만들 수 있게 해줍니다. 부모 페이지는 레이아웃 컨테이너 역할을 하며, <code>&lt;slot&gt;</code> 슬롯을 통해 자식 페이지의 콘텐츠를 렌더링합니다.</p>
        <h2>기본 개념</h2>
        <ul>
          <li><strong>부모 페이지(Layout)</strong> : 레이아웃 컨테이너 역할을 하는 페이지로, 네비게이션 바, 사이드바 등 공통 UI 요소를 포함합니다</li>
          <li><strong>자식 페이지</strong> : 구체적인 비즈니스 페이지 콘텐츠로, 부모 페이지의 <code>&lt;slot&gt;</code> 슬롯 위치에 렌더링됩니다</li>
        </ul>
        <h2>상위 페이지 작성 방법</h2>
        <p>부모 페이지는 <code>&lt;slot&gt;&lt;/slot&gt;</code> 태그를 사용하여 자식 페이지에 렌더링할 위치를 예약해야 합니다.</p>
        <pre><code class="hljs language-html"><span class="hljs-comment">&lt;!-- layout.html --&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">template</span> <span class="hljs-attr">page</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
    <span class="hljs-selector-pseudo">:host</span> {
      <span class="hljs-attribute">display</span>: block;
      <span class="hljs-attribute">height</span>: <span class="hljs-number">100%</span>;
    }
    ...
  </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
  ...
  <span class="hljs-tag">&lt;<span class="hljs-name">div</span> <span class="hljs-attr">class</span>=<span class="hljs-string">&quot;content&quot;</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">slot</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">slot</span>&gt;</span>
  <span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span>
  ...
<span class="hljs-tag">&lt;/<span class="hljs-name">template</span>&gt;</span></code></pre>

        <p>부모 페이지는 <code>routerChange</code> 라이프사이클 훅을 통해 라우팅 변경을 감지할 수 있으며, 이는 현재 라우트에 따라 네비게이션 상태를 업데이트해야 할 때 매우 유용합니다.</p>

        <h2>주의사항</h2>
        <ul>
          <li><code>parent</code> 속성값은 상대 경로(예: <code>./layout.html</code>) 또는 절대 경로(예: <code>/pages/layout.html</code>)일 수 있습니다.</li>
          <li>부모 페이지는 반드시 <code>&lt;slot&gt;&lt;/slot&gt;</code> 태그를 포함해야 하며, 그렇지 않으면 자식 페이지 콘텐츠가 표시되지 않습니다.</li>
          <li>부모 페이지의 스타일이 자식 페이지에 상속되며, 자식 페이지도 자체 스타일을 정의할 수 있습니다.</li>
          <li><code>routerChange</code> 훅을 사용하면 라우트 변경을 감지하여 내비게이션 하이라이트 등의 기능을 구현할 수 있습니다.</li>

      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
