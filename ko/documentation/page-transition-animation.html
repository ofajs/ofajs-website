        <h1>페이지 전환 애니메이션</h1>
        <p><code>pageAnime</code> 구성 항목은 페이지 전환 시의 전환 애니메이션 효과를 제어하여 사용자 경험을 향상시키는 데 사용됩니다.</p>
        <h2>기본 구성</h2>
        <p><code>app-config.js</code>에서 페이지 전환 애니메이션을 설정합니다:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(0, 0)&quot;</span>,
  },
  <span class="hljs-attr">next</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(30px, 0)&quot;</span>,
  },
  <span class="hljs-attr">previous</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(-30px, 0)&quot;</span>,
  },
};</code></pre>
        <h2>애니메이션 상태</h2>
        <p>페이지 전환 애니메이션에는 세 가지 상태가 포함됩니다:</p>
        <table>
          <thead>
            <tr>
              <th>상태</th>
              <th>설명</th>
              <th>트리거 시점</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><code>current</code></td>
              <td>현재 페이지 애니메이션 종료 후 스타일</td>
              <td>페이지 전환 완료 후</td>
            </tr>
            <tr>
              <td><code>next</code></td>
              <td>새 페이지 진입 시 시작 스타일</td>
              <td>새 페이지 진입 시작 시</td>
            </tr>
            <tr>
              <td><code>previous</code></td>
              <td>이전 페이지 이탈 시 목표 스타일</td>
              <td>이전 페이지 이탈 시작 시</td>
            </tr>
          </tbody>
        </table>
        <p><strong>current（현재 상태）</strong>- 페이지 전환이 완료된 후의 최종 스타일</p>
        <ul>
          <li>일반적으로 페이지의 정상 표시 상태</li>
          <li>예: <code>opacity: 1, transform: &quot;translate(0, 0)&quot;</code></li>
        </ul>
        <p><strong>next（다음 페이지 상태）</strong>- 새 페이지 진입 시의 초기 스타일</p>
        <ul>
          <li>새 페이지가 어디에서 진입을 시작할지 정의하는 데 사용</li>
          <li>예: <code>opacity: 0, transform: &quot;translate(30px, 0)&quot;</code> 는 오른쪽에서 진입함을 나타냅니다</li>
        </ul>
        <p><strong>previous（이전 페이지 상태）</strong>- 이전 페이지가 떠날 때의 대상 스타일</p>
        <ul>
          <li>이전 페이지가 어디로 가는지 정의하는 데 사용</li>
          <li>예: <code>opacity: 0, transform: &quot;translate(-30px, 0)&quot;</code>는 왼쪽으로 떠나는 것을 나타냄</li>
        </ul>
        <h2>내장 애니메이션 효과</h2>
        <h3>좌우 스와이프 (기본값)</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(0, 0)&quot;</span>,
  },
  <span class="hljs-attr">next</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(30px, 0)&quot;</span>,
  },
  <span class="hljs-attr">previous</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(-30px, 0)&quot;</span>,
  },
};</code></pre>
        <p>효과 설명:- 새 페이지가 오른쪽에서 슬라이드 인(초기 위치는 오른쪽 30px, 투명도 0)</p>
        <ul>
          <li>이전 페이지가 왼쪽으로 슬라이드 아웃(최종 위치는 왼쪽 -30px, 투명도 0)</li>
          <li>마지막으로 두 페이지 모두 정상 위치로 돌아옴(투명도 1, 위치 0)</li>
        </ul>
        <h3>페이드 인/아웃</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>,
  },
  <span class="hljs-attr">next</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
  },
  <span class="hljs-attr">previous</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
  },
};</code></pre>
        <p>효과 설명:- 새 페이지가 투명에서 가시로 전환됩니다</p>
        <ul>
          <li>기존 페이지가 가시에서 투명으로 전환됩니다</li>
          <li>간결하고 우아한 앱 스타일에 적합</li>
        </ul>
        <h3>위아래 스와이프</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(0, 0)&quot;</span>,
  },
  <span class="hljs-attr">next</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(0, 30px)&quot;</span>,
  },
  <span class="hljs-attr">previous</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(0, -30px)&quot;</span>,
  },
};</code></pre>
        <p>효과 설명:- 새 페이지가 아래에서 슬라이드 인</p>
        <ul>
          <li>기존 페이지가 위로 슬라이드 아웃</li>
          <li>세로 스크롤 스타일의 앱에 적합</li>
        </ul>
        <h3>확대/축소 효과</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;scale(1)&quot;</span>,
  },
  <span class="hljs-attr">next</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;scale(0.8)&quot;</span>,
  },
  <span class="hljs-attr">previous</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;scale(1.2)&quot;</span>,
  },
};</code></pre>
        <p>효과 설명:- 새 페이지가 작은 크기에서 정상 크기로 확대됩니다</p>
        <ul>
          <li>기존 페이지는 정상 크기에서 확대되어 사라집니다</li>
          <li>카드 스타일이나 모달 스타일의 애플리케이션에 적합합니다</li>
        </ul>
        <h3>뒤집기 효과</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;rotateY(0deg)&quot;</span>,
  },
  <span class="hljs-attr">next</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;rotateY(-90deg)&quot;</span>,
  },
  <span class="hljs-attr">previous</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;rotateY(90deg)&quot;</span>,
  },
};</code></pre>
        <p>효과 설명:- 새 페이지가 왼쪽에서 뒤집혀 들어옵니다</p>
        <ul>
          <li>기존 페이지는 오른쪽으로 뒤집혀 나갑니다</li>
          <li>3D 효과가 필요한 앱에 적합</li>
        </ul>
        <h2>사용자 정의 애니메이션</h2>
        <h3>여러 속성 결합</h3>
        <p>여러 CSS 속성을 조합하여 복잡한 애니메이션을 만들 수 있습니다:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(0, 0) scale(1)&quot;</span>,
  },
  <span class="hljs-attr">next</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(50px, 50px) scale(0.9)&quot;</span>,
  },
  <span class="hljs-attr">previous</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(-50px, -50px) scale(1.1)&quot;</span>,
  },
};</code></pre>
        <h3>다른 이징 함수 사용하기</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(0, 0)&quot;</span>,
    <span class="hljs-attr">transition</span>: <span class="hljs-string">&quot;all 0.3s cubic-bezier(0.4, 0, 0.2, 1)&quot;</span>,
  },
  <span class="hljs-attr">next</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(30px, 0)&quot;</span>,
  },
  <span class="hljs-attr">previous</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(-30px, 0)&quot;</span>,
  },
};</code></pre>
        <h2>지원되는 CSS 속성</h2>
        <p><code>pageAnime</code>는 모든 CSS 애니메이션 가능 속성을 지원합니다:</p>
        <h3>자주 사용하는 속성</h3>
        <ul>
          <li><code>opacity</code> - 투명도 (0-1)</li>
          <li><code>transform</code> - 변형<ul>
              <li><code>translate(x, y)</code> - 이동</li>
              <li><code>scale(n)</code> - 확대/축소</li>
              <li><code>rotate(deg)</code> - 회전</li>
              <li><code>rotateX/Y(deg)</code> - 3D 회전</li>
            </ul>
          </li>
          <li><code>width</code> / <code>height</code> - 너비/높이</li>
          <li><code>margin</code> / <code>padding</code> - 바깥 여백/안쪽 여백</li>
          <li><code>background-color</code> - 배경색</li>
          <li><code>border-radius</code> - 모서리 둥글기</li>
        </ul>
        <h3>주의사항</h3>
        <ol>
          <li><strong>성능 최적화</strong>: <code>transform</code>과 <code>opacity</code>를 우선 사용하세요. 이들은 가장 좋은 성능을 제공합니다.</li>
          <li><strong>레이아웃 스레싱 방지</strong>: 레이아웃 재배치를 유발하는 속성(<code>width</code>, <code>height</code>, <code>margin</code> 등)의 사용을 피하세요.</li>
          <li><strong>트랜지션 시간</strong>: ofa.js는 자동으로 트랜지션 효과를 추가하며, 기본값은 300ms입니다.</li>
        </ol>

        <h2>모범 사례</h2>
        <h3>1. 애니메이션을 간결하게 유지</h3>
        <p>지나치게 복잡한 애니메이션은 피하고, 간결한 애니메이션 효과가 더 좋습니다:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// ✅ 권장: 간결하고 효과적</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: { <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>, <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(0, 0)&quot;</span> },
  <span class="hljs-attr">next</span>: { <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>, <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(30px, 0)&quot;</span> },
  <span class="hljs-attr">previous</span>: { <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>, <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(-30px, 0)&quot;</span> },
};

<span class="hljs-comment">// ❌ 비추천: 지나치게 복잡함</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(0, 0) rotate(0deg) scale(1)&quot;</span>,
    <span class="hljs-attr">borderRadius</span>: <span class="hljs-string">&quot;0&quot;</span>,
  },
  <span class="hljs-attr">next</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(30px, 30px) rotate(45deg) scale(0.5)&quot;</span>,
    <span class="hljs-attr">borderRadius</span>: <span class="hljs-string">&quot;50%&quot;</span>,
  },
  <span class="hljs-attr">previous</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(-30px, -30px) rotate(-45deg) scale(1.5)&quot;</span>,
    <span class="hljs-attr">borderRadius</span>: <span class="hljs-string">&quot;100%&quot;</span>,
  },
};</code></pre>
        <h3>2. 사용자 경험 고려</h3>
        <ul>
          <li>애니메이션 시간이 너무 길지 않게 합니다(200-400ms 권장)</li>
          <li>사용자에게 어지러움을 유발하는 애니메이션은 피합니다</li>
          <li>애니메이션이 부드럽고 끊김 없이 진행되도록 합니다</li>
        </ul>
        <h3>3. 다양한 기기 대응</h3>
        <p>저사양 기기에서는 애니메이션을 비활성화하거나 단순화하는 것을 고려할 수 있습니다:</p>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// 기기 성능 감지</span>
