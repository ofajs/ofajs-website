<body>
  <o-app src="../../js/app-config.js">
    <template page>
      <link rel="stylesheet" href="../../css/github-markdown.css" />
      <link rel="stylesheet" href="../../css/hljs.css" />
      <l-m src="../../comps/center-block.html"></l-m>
      <l-m src="../../comps/article-code.html"></l-m>
      <l-m src="https://playground.ofajs.com/comps/o-playground/o-playground.html"></l-m>
      <style>
        :host {
          display: block;
          height: 100%;
          box-sizing: border-box;
          overflow: auto;
        }
      </style>
      <link rel="stylesheet" href="../../css/page.css" />
      <article class="markdown-body">
        <h1>슬롯</h1>
        <p>슬롯은 컴포넌트 외부의 콘텐츠를 받아들이기 위한 자리 표시자입니다. 슬롯을 사용하면 재사용 가능한 컴포넌트를 만들면서도, 해당 컴포넌트를 사용하는 사람이 내부 콘텐츠를 직접 지정할 수 있게 해줍니다.</p>
        <h2>기본 슬롯</h2>
        <o-playground name="기본 슬롯 예제" style="--editor-height: 500px">
          <code path="demo.html" preview>
    <template>
      <l-m src="./demo-comp.html"></l-m>
      <demo-comp>
        <div>Hello, OFAJS!</div>
      </demo-comp>
    </template>
  </code>
          <code path="demo-comp.html" active>
    <template component>
      <style>
        :host {
          display: block;
          border: 1px solid green;
          padding: 8px;
        }
      </style>슬롯 내용:
      <br />
      <span style="color: red;">
        <slot></slot>
      </span>
      <script>
        export default async ({ load }) => {
          return {
            tag: "demo-comp",
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h3>슬롯 기본 콘텐츠</h3>
        <p>부모 컴포넌트가 슬롯 콘텐츠를 제공하지 않을 때, <code>&lt;slot&gt;&lt;/slot&gt;</code> 내부의 요소가 기본 콘텐츠로 표시됩니다.</p>
        <o-playground name="슬롯 기본 콘텐츠 예제" style="--editor-height: 500px">
          <code path="demo.html" preview>
    <template>
      <l-m src="./demo-comp.html"></l-m>
      <h3>슬롯 콘텐츠 있음：</h3>
      <demo-comp>
        <div>이것은 사용자 정의 콘텐츠입니다</div>
      </demo-comp>
      <h3>슬롯 콘텐츠 없음（기본 콘텐츠 표시）：</h3>
      <demo-comp></demo-comp>
    </template>
  </code>
          <code path="demo-comp.html" active>
    <template component>
      <style>
        :host {
          display: block;
          border: 1px solid green;
          padding: 8px;
          margin-bottom: 10px;
        }
      </style>슬롯 콘텐츠：
      <span style="color: red;">
        <slot>
          <div>이것은 기본 콘텐츠입니다</div>
        </slot>
      </span>
      <script>
        export default async ({ load }) => {
          return {
            tag: "demo-comp",
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>명명 슬롯</h2>
        <p>컴포넌트에 여러 슬롯 위치가 필요할 때, 명명된 슬롯을 사용하여 다른 슬롯을 구분할 수 있습니다. <code>&lt;slot name=&quot;xxx&quot;&gt;</code>를 통해 명명된 슬롯을 정의하고, 사용 시 <code>slot=&quot;xxx&quot;</code> 속성을 통해 콘텐츠를 어느 슬롯에 넣을지 지정합니다.</p>
        <o-playground name="이름이 지정된 슬롯 예제" style="--editor-height: 500px">
          <code path="demo.html" preview>
    <template>
      <l-m src="./demo-comp.html"></l-m>
      <demo-comp>
        <div>Hello, OFAJS!</div>
        <div slot="footer">Footer Content</div>
      </demo-comp>
    </template>
  </code>
          <code path="demo-comp.html" active>
    <template component>
      <style>
        :host {
          display: block;
          border: 1px solid green;
          padding: 8px;
        }
      </style>슬롯 콘텐츠：
      <br />
      <span style="color: red;">
        <slot></slot>
      </span>
      <br />
      <span style="color: blue;">
        <slot name="footer"></slot>
      </span>
      <script>
        export default async ({ load }) => {
          return {
            tag: "demo-comp",
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>다중 레벨 슬롯 전달</h2>
        <p>슬롯 콘텐츠는 여러 계층의 컴포넌트를 걸쳐 전달될 수 있습니다. 부모 컴포넌트가 자식 컴포넌트에 슬롯 콘텐츠를 전달하면, 자식 컴포넌트는 이 슬롯 콘텐츠를 자신의 자식 컴포넌트로 계속 전달하여 슬롯의 다중 계층 투과 전달을 구현할 수 있습니다.</p>
        <o-playground name="다중 레벨 슬롯 전달 예제" style="--editor-height: 500px">
          <code path="demo.html" preview>
    <template>
      <l-m src="./outer-comp.html"></l-m>
      <outer-comp>
        <div style="color: red;">가장 바깥쪽 레이어의 제목</div>
      </outer-comp>
    </template>
  </code>
          <code path="outer-comp.html">
    <template component>
      <style>
        :host {
          display: block;
          border: 1px solid green;
          padding: 8px;
          margin-bottom: 10px;
        }
      </style>
      <h3>외부 컴포넌트</h3>
      <l-m src="./inner-comp.html"></l-m>
      <inner-comp>
        <div style="color: inherit;">
          <slot></slot>
        </div>
      </inner-comp>
      <script>
        export default async ({ load }) => {
          return {
            tag: "outer-comp",
          };
        };
      </script>
    </template>
  </code>
          <code path="inner-comp.html" active>
    <template component>
      <style>
        :host {
          display: block;
          border: 1px solid blue;
          padding: 8px;
        }
      </style>
      <h4>내부 컴포넌트</h4>
      <slot></slot>
      <script>
        export default async ({ load }) => {
          return {
            tag: "inner-comp",
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>위의 예시에서:- 최상위 부모 컴포넌트가 <code>slot=&quot;header&quot;</code> 내용을 정의합니다</p>
        <ul>
          <li>외부 컴포넌트(outer-comp)가 이 슬롯 내용을 수신한 후, 이를 내부 컴포넌트(inner-comp)로 계속 전달합니다</li>
          <li>내부 컴포넌트가 최종적으로 최상위에서 전달된 슬롯 내용을 렌더링합니다</li>
        </ul>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
  </o-app>
  <o-root-provider name="pui" theme="dark"></o-root-provider>
</body>

</html>
