## 파라미터 전달 방식

`o-app`에서 페이지 이동은 URL Query를 통해 매개변수를 전달하는 것을 지원하며, 대상 페이지는 모듈 함수의 `query` 매개변수를 통해 수신합니다.

## 페이지 탐색

o-app 내에서 각 페이지 모듈은 `olink` 속성이 있는 `&lt;a&gt;` 태그를 사용하여 페이지 전환을 할 수 있습니다. 이 태그는 전환 애니메이션과 함께 애플리케이션의 라우팅 전환을 트리거하며 전체 페이지를 새로고침하지 않습니다.

```html
&lt;a href=<span class="hljs-string">&quot;./about.html&quot;</span> olink&gt;소개 페이지로 이동&lt;/a&gt;</code></pre>
        <p>페이지 컴포넌트에서 <code>back()</code> 메서드를 사용하여 이전 페이지로 돌아갈 수 있습니다：</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">template</span> <span class="hljs-attr">page</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">button</span> <span class="hljs-attr">on:click</span>=<span class="hljs-string">&quot;back()&quot;</span>&gt;</span>돌아가기<span class="hljs-tag">&lt;/<span class="hljs-name">button</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">template</span>&gt;</span></code></pre>

      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
