        <h1>사용자 정의 이벤트</h1>
        <p>ofa.js에서는 내장된 DOM 이벤트 외에도 사용자 정의 이벤트를 생성하고 사용하여 구성 요소 간의 통신을 구현할 수 있습니다. 사용자 정의 이벤트는 구성 요소 개발에서 중요한 메커니즘으로, 이를 통해 구성 요소는 메시지나 상태 변경 사항을 위로 브로드캐스트할 수 있습니다.</p>
        <h2>emit 메서드 - 사용자 정의 이벤트 트리거</h2>
        <p><code>emit</code> 메서드는 사용자 정의 이벤트를 발생시켜 컴포넌트 내부의 상태 변화나 사용자 조작을 외부 리스너에게 알리는 데 사용됩니다.</p>
        <h3>기본 사용법</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// 간단한 사용자 정의 이벤트 발생시키기</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-title function_">emit</span>(<span class="hljs-string">'custom-event'</span>);

<span class="hljs-comment">// 데이터가 포함된 사용자 정의 이벤트 발생시키기</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-title function_">emit</span>(<span class="hljs-string">'data-changed'</span>, {
  <span class="hljs-attr">data</span>: {
    <span class="hljs-comment">// 사용자 정의 데이터, 요구 사항에 따라 임의의 구조 가능</span>
    <span class="hljs-attr">newValue</span>: <span class="hljs-number">100</span>,
    <span class="hljs-attr">oldValue</span>: <span class="hljs-number">50</span>
  }
});</code></pre>
        <h3>emit 메서드 매개변수</h3>
        <p><code>emit</code> 메서드는 두 개의 인자를 받습니다：</p>
        <ol>
          <li><strong>이벤트 이름</strong>: 문자열, 트리거할 이벤트 이름을 나타냄</li>
          <li><strong>옵션 객체</strong> (선택): 이벤트 구성 옵션을 포함<ul>
              <li><code>data</code>: 전달할 데이터</li>
              <li><code>bubbles</code>: 불리언, 이벤트가 버블링되는지 제어 (기본값 true)</li>
              <li><code>composed</code>: 불리언, 이벤트가 Shadow DOM 경계를 통과할 수 있는지 제어</li>
              <li><code>cancelable</code>: 불리언, 이벤트를 취소할 수 있는지 제어</li>
            </ul>
          </li>
        </ol>
        <p>그러면 상위 요소는 <code>on</code> 메서드 <a href="./event-binding.html" olink="">(이벤트 바인딩)</a>를 사용하여 이 사용자 정의 이벤트를 수신할 수 있습니다.</p>
        <h3>emit 사용 예시</h3>

        <h2>bubbles - 이벤트 버블링 메커니즘</h2>
        <p><code>bubbles</code> 속성은 이벤트가 부모 요소로 위로 버블링되는지 여부를 제어합니다. <code>true</code>로 설정하면 이벤트가 DOM 트리를 따라 위로 전파됩니다. 기본값은 <code>true</code>입니다. <code>false</code>로 설정하면 이벤트는 버블링되지 않습니다.</p>
        <h3>버블링 메커니즘 상세 설명</h3>
        <ul>
          <li><strong>기본 동작</strong>: <code>emit</code>을 사용하여 발생시킨 이벤트는 기본적으로 버블링이 활성화됨(<code>bubbles: true</code>)</li>
          <li><strong>버블링 경로</strong>: 이벤트는 트리거된 요소에서 시작하여 상위 요소로 단계적으로 전파됨</li>
          <li><strong>버블링 방지</strong>: 이벤트 핸들러에서 <code>event.stopPropagation()</code>을 호출하여 버블링을 방지할 수 있음</li>
        </ul>
        <h3>버블 정렬 예시</h3>
        <o-playground name="커스텀 이벤트 예제" style="--editor-height: 500px">
          <code path="demo.html" preview="" unimportant="">
    <template>
      <o-page src="page1.html"></o-page>
    </template>
  </code>
          <code path="page1.html">
    <template page="">
      <l-m src="./bubble-component.html"></l-m>
      <style>
        :host {
          display: block;
          padding: 20px;
          border: 1px solid blue;
        }
      </style>
      <div on:child-event="handleChildEventFromComponent">
        <bubble-component on:child-event="handleDirectChildEvent"></bubble-component>
      </div>
      <p>외부 컨테이너（버블 이벤트 감지）: {{bubbledEventCount}} 회</p>
      <p>내부 컴포넌트（직접 이벤트 감지）: {{directEventCount}} 회</p>
      <p>받은 데이터: <span style="color:red;">{{result}}</span></p>
      <script>
        export default async () => {
          return {
            data: {
              result:"-",
              bubbledEventCount: 0,
              directEventCount: 0
            },
            proto: {
              handleDirectChildEvent(event) {
                this.directEventCount++;
                this.result = event.data;
              },
              handleChildEventFromComponent(event) {
                this.bubbledEventCount++;
                this.result = event.data;
              },
            }
          };
        };
      </script>
    </template>
  </code>
          <code path="bubble-component.html" active="">
    <template component="">
      <style>
        :host {
          display: block;
          padding: 15px;
          border: 1px solid green;
        }
      </style>
      <button on:click="triggerNonBubblingEvent">비버블 이벤트 트리거</button>
      <button on:click="triggerBubblingEvent">버블 이벤트 트리거</button>
      <script>
        export default async () => {
          return {
            tag: "bubble-component",
            proto: {
              triggerNonBubblingEvent() {
                // 비버블 이벤트, 직접 감지자만 캐치
                this.emit('child-event', {
                  data: { type: 'non-bubbling', message: '비버블 이벤트 트리거됨', timestamp: Date.now() },
                  bubbles: false
                });
              },
              triggerBubblingEvent() {
                // 버블 이벤트, 상위 요소로 전파
                this.emit('child-event', {
                  data: { type: 'bubbling', message: '버블 이벤트 트리거됨', timestamp: Date.now() },
                  bubbles: true
                });
              }
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>composed - Shadow DOM 경계 침투</h2>
        <p><code>composed</code> 속성은 이벤트가 Shadow DOM 경계를 통과할 수 있는지를 제어합니다. 이는 Web Components 개발에서 특히 중요하며, 기본값은 <code>false</code>입니다.</p>
        <h3>관통 메커니즘 상세 설명</h3>
        <ul>
          <li><strong>Shadow DOM 격리</strong>: 기본적으로 이벤트는 Shadow DOM 경계를 넘을 수 없습니다</li>
          <li><strong>투과 활성화</strong>: <code>composed: true</code>를 설정하면 이벤트가 Shadow DOM 경계를 관통할 수 있습니다</li>
          <li><strong>사용 시나리오</strong>: 컴포넌트가 호스트 환경에 이벤트를 보낼 때 <code>composed: true</code>를 설정해야 합니다</li>
        </ul>

    <template component="">
      <style>
        :host {
          display: block;

        }
      </style>
      <button on:click="triggerNonComposedEvent">비투과 이벤트 트리거</button>
      <button on:click="triggerComposedEvent">투과 이벤트 트리거</button>
      <script>
        export default async () => {

            tag: "child-component",
            proto: {
              triggerNonComposedEvent() {
                // 비투과 이벤트, 직접 수신자만 캡처 가능
                this.emit('child-event', {
                  data: { type: 'non-composed', message: '비투과 이벤트 트리거', timestamp: Date.now() },
                  composed: false
                });
              },
              triggerComposedEvent() {
                // 투과 이벤트, Shadow DOM 경계를 넘어 전파됨
                this.emit('child-event', {
                  data: { type: 'composed', message: '투과 이벤트 트리거', timestamp: Date.now() },
                  composed: true
                });
              }
            }
          };
        };
      </script>
    </template>
