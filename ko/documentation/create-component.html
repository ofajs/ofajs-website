<body>
  <o-app src="../../js/app-config.js">
    <template page>
      <link rel="stylesheet" href="../../css/github-markdown.css" />
      <link rel="stylesheet" href="../../css/hljs.css" />
      <l-m src="../../comps/center-block.html"></l-m>
      <l-m src="../../comps/article-code.html"></l-m>

      <article class="markdown-body">
        <h1>컴포넌트 생성</h1>
        <p>ofa.js에서 컴포넌트는 페이지 재사용 및 모듈화를 실현하는 핵심 메커니즘입니다. 컴포넌트는 본질적으로 사용자 정의 Web Component로, 템플릿, 스타일 및 로직을 정의하여 재사용 가능한 UI 요소를 만들 수 있습니다.</p>
        <h2>컴포넌트의 기본 구조</h2>
        <p>페이지 모듈과 달리, 컴포넌트 모듈의 <code>&lt;template&gt;</code> 요소는 <code>component</code> 속성을 사용하며, <code>tag</code> 속성을 선언하여 컴포넌트 태그 이름을 지정합니다.</p>
        <p>컴포넌트를 사용해야 하는 위치에서 <code>l-m</code> 태그를 통해 비동기로 컴포넌트 모듈을 로드하면 시스템이 자동으로 등록을 완료합니다. 이후에는 일반 HTML 태그처럼 해당 컴포넌트를 바로 사용할 수 있습니다.</p>
        <o-playground name="컴포넌트 기본 예제" style="--editor-height: 500px">
          <code path="demo.html" preview>
    <template>
      <l-m src="./demo-comp.html"></l-m>
      <demo-comp></demo-comp>
    </template>
  </code>
          <code path="demo-comp.html" active>
    <template component>
      <style>
        :host {
          display: block;
          border: 1px solid green;
          padding: 10px;
        }
      </style>
      <h3>{{title}}</h3>
      <script>
        export default async () => {
          return {
            tag: "demo-comp",
            data: {
              title: "OFAJS 컴포넌트 예제",
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>컴포넌트 핵심 개념</h2>
        <h3>tag - 컴포넌트 태그 이름</h3>
        <p><code>tag</code>는 컴포넌트의 태그 이름이며, <strong>반드시 컴포넌트를 사용하는 태그 이름과 일치해야 합니다</strong>. 예를 들어, 컴포넌트의 <code>tag</code>가 <code>&quot;demo-comp&quot;</code>로 정의되어 있다면, HTML에서 사용할 때 반드시 <code>&lt;demo-comp&gt;&lt;/demo-comp&gt;</code>라고 작성해야 합니다.</p>
        <h3>구성 요소 모듈 참조</h3>
        <p><code>l-m</code> 태그를 통해 컴포넌트 모듈을 가져오면, 컴포넌트 모듈이 자동으로 컴포넌트를 등록합니다. 이는 <code>script</code> 태그를 사용하여 스크립트를 가져오는 것과 유사하지만, <code>l-m</code>은 컴포넌트 모듈의 로드 및 등록에 특화되어 있습니다.</p>
        <blockquote>
          <p>주의: <code>l-m</code> 인용 태그는 <strong>비동기 인용</strong>으로, 페이지 로딩 시 필요에 따라 컴포넌트를 로드하기에 적합합니다.</p>
        </blockquote>
        <h2>동기 참조 컴포넌트</h2>
        <p>어떤 시나리오에서는 동기적으로 컴포넌트를 로드해야 할 수도 있습니다 (예를 들어 컴포넌트가 사용 전에 이미 등록되었는지 확인). 이때 <code>load</code> 메서드와 <code>await</code> 키워드를 함께 사용하여 동기 참조를 구현할 수 있습니다.</p>
        <p>컴포넌트 모듈과 페이지 모듈에서는 자동으로 <code>load</code> 함수가 주입되어 개발자가 필요한 리소스를 동기식으로 로드할 수 있습니다.</p>
        <o-playground name="동기 참조 컴포넌트 예시" style="--editor-height: 500px">
          <code path="demo.html" preview>
    <template>
      <o-page src="page1.html"></o-page>
    </template>
  </code>
          <code path="page1.html" active>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <div>
        <demo-comp></demo-comp>
      </div>
      <script>
        // eslint-disable-next-line
        export default async ({ load }) => {
          await load("./demo-comp.html");
          return {
            data: {},
            proto: {},
          };
        };
      </script>
    </template>
  </code>
          <code path="demo-comp.html">
    <template component>
      <style>
        :host {
          display: block;
          border: 1px solid green;
          padding: 10px;
        }
      </style>
      <h3>{{title}}</h3>
      <script>
        export default async ({ load }) => {
          return {
            tag: "demo-comp",
            data: {
              title: "OFAJS 컴포넌트 예시",
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>비동기 참조 vs 동기 참조</h2>
        <table>
          <thead>
            <tr>
              <th>참조 방식</th>
              <th>키워드</th>
              <th>특징</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>비동기 참조</td>
              <td><code>l-m</code> 태그</td>
              <td>비차단 로딩, 필요에 따라 컴포넌트를 로드하는 데 적합</td>
            </tr>
            <tr>
              <td>동기 참조</td>
              <td><code>load</code> 메서드와 <code>await</code> 키워드 함께 사용</td>
              <td>차단 로딩, 컴포넌트가 사용 전에 등록되었음을 보장</td>
            </tr>
          </tbody>
        </table>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
  </o-app>
  <o-root-provider name="pui" theme="dark"></o-root-provider>
