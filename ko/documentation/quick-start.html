<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>빠른 시작</title>
  <script src="https://cdn.jsdelivr.net/gh/kirakiray/ofa.js@4.6.20/dist/ofa.mjs#debug" type="module"></script>
  <script src="https://cdn.jsdelivr.net/gh/kirakiray/ofa.js@4.6.20/libs/scsr/dist/scsr.min.mjs" type="module"></script>
  <link rel="icon" href="../../img/logo.svg" />
  <link rel="stylesheet" href="../../css/palette.css" pui-colors />
  <link rel="stylesheet" href="../../css/theme.css" />
  <link rel="stylesheet" href="../../css/github-markdown.css" />
  <link rel="stylesheet" href="../../css/hljs.css" />
  <style>
    html,
    body {
      height: 100%;
      padding: 0;
      margin: 0;
      overflow: hidden;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        Segoe UI,
        Microsoft Yahei,
        Helvetica,
        Arial,
        sans-serif,
        Apple Color Emoji,
        Segoe UI Emoji;
    }

    o-app {
      height: 100%;
    }

    @keyframes fadein {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    o-app {
      animation: fadein 0.1s ease-in-out;
    }
  </style>
</head>

<body>
  <o-app src="../../js/app-config.js">
    <template page>
      <link rel="stylesheet" href="../../css/github-markdown.css" />
      <link rel="stylesheet" href="../../css/hljs.css" />
      <l-m src="../../comps/center-block.html"></l-m>
      <l-m src="../../comps/article-code.html"></l-m>
      <l-m src="https://playground.ofajs.com/comps/o-playground/o-playground.html"></l-m>
      <style>
        :host {
          display: block;
          height: 100%;
          box-sizing: border-box;
          overflow: auto;
        }
      </style>
      <link rel="stylesheet" href="../../css/page.css" />
      <article class="markdown-body">
        <h1>빠른 시작</h1>
        <p>이번 절에서는 ofa.js를 빠르게 시작하는 방법을 소개합니다. 이후 튜토리얼에서는 index.html 진입 파일 생성 단계를 생략하고 페이지 모듈 파일의 코드만 보여줍니다. 템플릿을 기반으로 바로 개발할 수 있습니다.</p>
        <h2>기초 파일 준비</h2>
        <p>ofa.js를 빠르게 시작하려면 <strong>페이지 모듈</strong>을 하나 만들고 진입점 HTML과 함께 사용하면 됩니다. 필요한 핵심 파일은 다음과 같습니다:</p>
        <ul>
          <li><code>index.html</code>: 애플리케이션의 진입점 파일로, ofa.js 프레임워크를 로드하고 페이지 모듈을 가져오는 역할을 합니다</li>
          <li><code>demo-page.html</code>: 페이지 모듈 파일로, 페이지의 구체적인 내용, 스타일 및 데이터 로직을 정의합니다</li>
        </ul>
        <h3>index.html (애플리케이션 진입점)</h3>
        <pre><code class="hljs language-html"><span class="hljs-comment">&lt;!-- index.html --&gt;</span>
<span class="hljs-meta">&lt;!DOCTYPE <span class="hljs-keyword">html</span>&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">html</span> <span class="hljs-attr">lang</span>=<span class="hljs-string">&quot;en&quot;</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">head</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">meta</span> <span class="hljs-attr">charset</span>=<span class="hljs-string">&quot;UTF-8&quot;</span> /&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">meta</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;viewport&quot;</span> <span class="hljs-attr">content</span>=<span class="hljs-string">&quot;width=device-width, initial-scale=1.0&quot;</span> /&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">title</span>&gt;</span>ofa.js 예제<span class="hljs-tag">&lt;/<span class="hljs-name">title</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">script</span>
      <span class="hljs-attr">src</span>=<span class="hljs-string">&quot;https://cdn.jsdelivr.net/gh/kirakiray/ofa.js/dist/ofa.mjs&quot;</span>
      <span class="hljs-attr">type</span>=<span class="hljs-string">&quot;module&quot;</span>
    &gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>
  <span class="hljs-tag">&lt;/<span class="hljs-name">head</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">body</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">o-page</span> <span class="hljs-attr">src</span>=<span class="hljs-string">&quot;./demo-page.html&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-page</span>&gt;</span>
  <span class="hljs-tag">&lt;/<span class="hljs-name">body</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">html</span>&gt;</span></code></pre>
        <p>이 파일의 주요 역할은:- ofa.js 프레임워크 도입</p>
        <ul>
          <li><code>&lt;o-page&gt;</code> 컴포넌트를 사용하여 페이지 모듈 로드 및 렌더링</li>
        </ul>
        <h3>demo-page.html (페이지 모듈)</h3>
        <pre><code class="hljs language-html"><span class="hljs-comment">&lt;!-- demo-page.html --&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">template</span> <span class="hljs-attr">page</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
    <span class="hljs-selector-pseudo">:host</span> {
      <span class="hljs-attribute">display</span>: block;
      <span class="hljs-attribute">border</span>: <span class="hljs-number">1px</span> solid red;
      <span class="hljs-attribute">padding</span>: <span class="hljs-number">10px</span>;
    }
    <span class="hljs-selector-tag">p</span> {
      <span class="hljs-attribute">color</span>: pink;
    }
  </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">p</span>&gt;</span>{{val}}<span class="hljs-tag">&lt;/<span class="hljs-name">p</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">
    <span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">async</span> () =&gt; {
      <span class="hljs-keyword">return</span> {
        <span class="hljs-attr">data</span>: {
          <span class="hljs-attr">val</span>: <span class="hljs-string">&quot;Hello ofa.js Demo Code&quot;</span>,
        },
      };
    };
  </span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">template</span>&gt;</span></code></pre>
        <p>이 파일은 간단한 페이지 컴포넌트를 정의하며, 포함하는 내용은:- <code>&lt;template page&gt;</code> 태그, 페이지 모듈 정의</p>
        <ul>
          <li>CSS 스타일(Shadow DOM의 <code>:host</code> 선택기 사용)</li>
          <li>데이터 바인딩 표현식 <code>{{val}}</code></li>
          <li>JavaScript 로직, 초기 데이터를 포함한 객체 반환</li>
        </ul>
        <h2>온라인 데모</h2>
        <p>다음은 온라인 편집기의 실시간 예시입니다. 코드를 직접 수정하고 효과를 확인할 수 있습니다:</p>
        <o-playground name="온라인 데모" style="--editor-height: 500px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
        p {
          color: pink;
        }
      </style>
      <p>{{val}}</p>
      <script>
        export default async () => {
          return {
            data: {
              val: "Hello ofa.js Demo Code",
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>컴포넌트 내부의 <code>&lt;style&gt;</code> 태그를 통해 스타일을 정의하며, 이러한 내부 스타일은 컴포넌트 내부에만 적용되어 뛰어난 캡슐화를 제공하며 페이지의 다른 요소에 영향을 미치지 않습니다.</p>
        <p>여기서 <code>:host</code> 선택자는 컴포넌트의 호스트 요소에 대한 스타일을 정의하는 데 사용되며, 이 경우 컴포넌트를 블록 레벨 요소로 설정하고 빨간색 테두리와 10px의 안쪽 여백을 추가합니다.</p>
        <p><code>{{key}}</code> 표현식을 통해 컴포넌트 데이터에 해당하는 값을 페이지에 렌더링할 수 있습니다.</p>
        <p>이제 첫 번째 ofa.js 애플리케이션을 성공적으로 생성했습니다! 이제 ofa.js의 템플릿 렌더링 구문 및 고급 기능에 대해 자세히 살펴보겠습니다.</p>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
  </o-app>
  <o-root-provider name="pui" theme="dark"></o-root-provider>
</body>

</html>
