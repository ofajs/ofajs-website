<body>
  <o-app src="../../js/app-config.js">
    <template page>
      <link rel="stylesheet" href="../../css/github-markdown.css" />

      </style>
      <link rel="stylesheet" href="../../css/page.css" />
      <article class="markdown-body">
        <h1>리스트 렌더링</h1>
        <p>ofa.js에서 <code>o-fill</code> 컴포넌트는 강력한 리스트 렌더링 기능을 제공하여 배열 데이터를 여러 개의 유사한 요소로 효율적으로 렌더링할 수 있습니다. 이는 두 가지 주요 사용 방식을 지원합니다: 직접 렌더링과 템플릿 렌더링입니다.</p>
        <h2>o-fill 컴포넌트 소개</h2>
        <p><code>o-fill</code> 은 ofa.js에서 목록 렌더링을 위한 핵심 컴포넌트로, 배열 타입의 <code>value</code> 속성을 받아 배열의 각 항목에 대해 해당하는 DOM 요소를 생성합니다. 렌더링 과정에서 ofa.js는 배열의 변화를 자동으로 추적하고 DOM을 효율적으로 업데이트합니다.</p>
        <h3>주요 특징：</h3>
        <ul>
          <li><strong>효율적인 업데이트</strong>: 키-값을 통해 배열 변화를 추적하고, 변경이 필요한 부분만 업데이트</li>
          <li><strong>인덱스 접근</strong>: <code>$index</code>로 현재 항목의 인덱스에 접근</li>
          <li><strong>데이터 접근</strong>: <code>$data</code>로 현재 항목의 데이터에 접근</li>
          <li><strong>호스트 접근</strong>: <code>$host</code>로 현재 컴포넌트 인스턴스에 접근하여 컴포넌트 메서드를 호출하거나 컴포넌트 데이터에 접근</li>
          <li><strong>템플릿 재사용</strong>: 명명된 템플릿을 사용하여 복잡한 목록 렌더링 지원</li>
        </ul>
        <h2>직접 렌더링</h2>
        <p>직접 렌더링은 가장 간단한 사용 방식으로, 템플릿 내용을 <code>o-fill</code> 태그 내부에 직접 작성합니다. 배열이 변경될 때, <code>o-fill</code>은 각 데이터 항목에 대해 해당하는 요소를 자동으로 생성합니다.</p>
        <o-playground name="o-fill - 직접 렌더링" style="--editor-height: 600px">
          <code>
    <template page>
      <style>
        :host { display: block; padding: 10px; }
        ul { list-style: none; padding: 0; }
        li { padding: 8px; margin: 5px 0; background: #7e7e7e; border-radius: 4px; }
      </style>
      <h3>과일 목록</h3>
      <button on:click="addItem">과일 추가</button>
      <button on:click="removeItem">마지막 제거</button>
      <ul>
        <o-fill :value="fruits">
          <li> {{$index + 1}}. {{$data.name}} - 가격: ¥{{$data.price}} <button on:click="$host.removeItem($index)">삭제</button></li>
        </o-fill>
      </ul>
      <script>
        export default async () => ({
          data: { 
            fruits: [
              { name: "🍎 사과", price: 5 },
              { name: "🍊 오렌지", price: 6 },
              { name: "🍌 바나나", price: 3 }
            ],
            fruitIndex: 0,
          },
          proto: {
            addItem() {
              const fruitNames = ["🍇 포도", "🍓 딸기", "🥝 키위", "🍑 복숭아", "🥭 망고"];
              const name = fruitNames[this.fruitIndex % fruitNames.length];
              this.fruits.push({ 
                name: name, 
                price: Math.floor(Math.random() * 10) + 1 
              });
              this.fruitIndex++;
            },
            removeItem(index) {
              if (index >= 0 && index < this.fruits.length) {
                this.fruits.splice(index, 1);
                return;
              }
              this.fruits.length && this.fruits.pop();
            }
          }
        });
      </script>
    </template>
  </code>
        </o-playground>
        <p>이 예시에서 우리는 볼 수 있습니다:- <code>$index</code>은 현재 항목의 인덱스를 나타냅니다 (0부터 시작)</p>
        <ul>
          <li><code>$data</code>은 현재 항목의 데이터 객체를 나타냅니다</li>
          <li><code>$host</code>은 현재 컴포넌트 인스턴스를 나타내며, 컴포넌트 메서드를 호출하거나 컴포넌트 데이터에 접근하는 데 사용할 수 있습니다</li>
          <li>배열이 변경되면 목록이 자동으로 업데이트됩니다</li>
        </ul>
        <h2>템플릿 렌더링</h2>
        <p>더 복잡한 리스트 항목 구조의 경우, 명명된 템플릿 방식을 사용할 수 있습니다. 템플릿을 <code>template</code> 태그 내에 정의한 다음, <code>o-fill</code>에서 <code>name</code> 속성을 통해 참조합니다.</p>
        <o-playground name="o-fill - 템플릿 렌더링" style="--editor-height: 600px">
          <code>
    <template page>
      <style>
        :host { display: block; padding: 10px; }
        .product-card { border: 1px solid #747474; border-radius: 8px; padding: 12px; margin: 10px 0; }
        .product-name { font-weight: bold; font-size: 1.1em; }
        .product-price { color: #832c22; font-weight: bold; }
        .product-desc { color: #929292; font-size: 0.9em; margin-top: 5px; }
      </style>
      <h3>상품 목록</h3>
      <button on:click="addProduct">상품 추가</button>
      <div class="products-container">
        <o-fill :value="products" name="product-template"></o-fill>
      </div>
      <template name="product-template">
        <div class="product-card">
          <div class="product-name">{{$data.name}}</div>
          <div class="product-price">¥{{$data.price}}</div>
          <div class="product-desc">{{$data.description}}</div>
          <small>일련번호: {{$index + 1}}</small>
        </div>
      </template>
      <script>
        export default async () => ({
          data: {
            products: [
              { name: "MacBook Pro", price: 12999, description: "전문 작업에 적합한 고성능 노트북" },
              { name: "iPhone 15", price: 5999, description: "최신 스마트폰, 뛰어난 사진 촬영 효과" },
              { name: "AirPods Pro", price: 1999, description: "무선 노이즈 캔슬링 헤드폰, 뛰어난 음질" }
            ],
            productIndex: 0,
          },
          proto: {
            addProduct() {
              const productNames = ["iPad Air", "Apple Watch", "Magic Mouse", "Pro Display"];
              const productDescs = ["얇고 휴대하기 좋은 태블릿", "스마트워치, 건강 모니터링", "인체공학적 설계 마우스", "전문가용 모니터"];
              const name = productNames[this.productIndex % productNames.length];
              const desc = productDescs[this.productIndex % productDescs.length];
              this.products.push({
                name: name,
                price: Math.floor(Math.random() * 5000) + 1000,
                description: desc
              });
              this.productIndex++;
            }
          }
        });
      </script>
    </template>
  </code>
        </o-playground>
        <h2>중첩 리스트 렌더링</h2>
        <p><code>o-fill</code>은 중첩 사용을 지원하며, 트리 메뉴, 분류 목록 등과 같은 복잡한 계층 데이터 구조를 처리할 수 있습니다.</p>
        <o-playground name="o-fill - 중첩 목록 렌더링" style="--editor-height: 800px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
        .category {
          border-left: 3px solid #3498db;
          padding-left: 15px;
          margin: 10px 0;
        }
        .subcategory {
          border-left: 2px solid #9b59b6;
          padding-left: 15px;
          margin: 8px 0;
        }
        .item {
          padding: 5px 0;
          margin: 5px 0;
          color: #2c3e50;
        }
        h4 {
          margin: 10px 0 5px 0;
          color: #34495e;
        }
      </style>
      <h3>상품 카테고리 네비게이션</h3>
      <div class="navigation">
        <o-fill :value="categories" name="category-template"></o-fill>
      </div>
      <template name="category-template">
        <div class="category">
          <h4> {{$data.name}} </h4>
          <o-fill :value="$data.subcategories" name="subcategory-template"></o-fill>
        </div>
      </template>
      <template name="subcategory-template">
        <div class="subcategory">
          <strong>{{$data.name}}</strong>
          <o-fill :value="$data.items">
            <div class="item"> • {{$data}} </div>
          </o-fill>
        </div>
      </template>
      <script>
        export default async () => {
          return {
            data: {
              categories: [
                {
                  name: "전자제품",
                  subcategories: [
                    {
                      name: "스마트폰",
                      items: ["아이폰", "안드로이드 폰", "피처폰"]
                    },
                    {
                      name: "컴퓨터",
                      items: ["노트북", "데스크탑", "태블릿"]
                    }
                  ]
                },
                {
                  name: "생활용품",
                  subcategories: [
                    {
                      name: "주방용품",
                      items: ["냄비/프라이팬", "식기류", "소형 가전"]
                    },
                    {
                      name: "침실용품",
                      items: ["침구류", "옷장", "장식품"]
                    }
                  ]
                },
                {
                  name: "의류 및 액세서리",
                  subcategories: [
                    {
                      name: "남성 의류",
                      items: ["티셔츠", "셔츠", "아우터"]
                    },
                    {
                      name: "여성 의류",
                      items: ["원피스", "바지", "액세서리"]
                    }
                  ]
                }
              ]
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>성능 최적화 및 키-값 관리</h2>
        <p>빈번하게 업데이트되는 목록의 경우 <code>fill-key</code> 속성으로 고유 식별자를 지정하여 렌더링 성능을 향상시킬 수 있습니다.</p>
        <pre><code class="hljs language-html"><span class="hljs-comment">&lt;!-- 사용자 정의 키 값으로 성능 향상 --&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">o-fill</span> <span class="hljs-attr">:value</span>=<span class="hljs-string">&quot;items&quot;</span> <span class="hljs-attr">fill-key</span>=<span class="hljs-string">&quot;id&quot;</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">div</span>&gt;</span>{{$data.name}}<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">o-fill</span>&gt;</span></code></pre>
        <p>위의 예제에서 <code>fill-key=&quot;id&quot;</code>는 ofa.js에게 각 항목 데이터의 <code>id</code> 속성을 고유 식별자로 사용하도록 지시합니다. 이렇게 하면 배열의 순서가 변경되어도 해당 요소를 올바르게 식별하고 업데이트할 수 있습니다.</p>
        <h2>리스트 렌더링 베스트 프랙티스</h2>
        <ol>
          <li><strong>이벤트 처리</strong>: 목록 항목에서 이벤트를 사용할 때 <code>$host</code>는 현재 컴포넌트 인스턴스를, <code>$data</code>는 현재 항목 데이터를 가리킴에 유의</li>
          <li><strong>적절한 렌더링 방식 선택</strong>: 단순 목록은 직접 렌더링, 복잡한 구조는 템플릿 렌더링 사용</li>
          <li><strong>성능 고려</strong>: 대용량 목록이나 빈번히 갱신되는 목록의 경우 <code>fill-key</code>로 키값 지정</li>
          <li><strong>데이터 구조</strong>: 배열의 각 항목이 유효한 데이터 객체인지 확인</li>
          <li><strong>깊은 중첩 피하기</strong>: 중첩을 지원하나 너무 깊은 중첩 단계는 피해야 함</li>
        </ol>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
  </o-app>
  <o-root-provider name="pui" theme="dark"></o-root-provider>
</body>
