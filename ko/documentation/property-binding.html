<body>
  <o-app src="../../js/app-config.js">
    <template page>
      <link rel="stylesheet" href="../../css/github-markdown.css" />

        :host {

      <link rel="stylesheet" href="../../css/page.css" />
      <article class="markdown-body">
        <h1>속성 바인딩</h1>
        <p>ofa.js는 요소 인스턴스화 후 객체의 속성에 데이터를 바인딩하는 것을 지원합니다. 예를 들어 input 요소의 value 또는 checked 속성 등이 있습니다.</p>
        <h2>단방향 속성 바인딩</h2>
        <p>단방향 속성 바인딩은 <code>:toKey=&quot;fromKey&quot;</code> 구문을 사용하여 컴포넌트 데이터를 DOM 요소의 속성에 &quot;단방향&quot;으로 동기화합니다. 컴포넌트 데이터가 변경되면 요소 속성이 즉시 업데이트되지만, 요소 자체의 변경(예: 사용자 입력)은 컴포넌트로 다시 쓰여지지 않아 데이터 흐름의 단일성과 제어 가능성을 유지합니다.</p>
        <o-playground name="단방향 속성 바인딩" style="--editor-height: 500px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
        input {
          margin: 5px 0;
          padding: 8px;
          width: 100%;
          box-sizing: border-box;
        }
      </style>
      <p>현재 값: {{val}}</p>
      <input type="text" :value="val" placeholder="이것은 단방향 바인딩 입력 상자입니다">
      <p>주의: 입력 상자에서 직접 내용을 수정해도 위에 표시된 값은 변경되지 않습니다</p>
      <script>
        export default async () => {
          return {
            data: { val: "Hello ofa.js Demo Code" }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>양방향 속성 바인딩</h2>
        <p>양방향 속성 바인딩은 <code>sync:xxx</code> 구문을 사용하여 컴포넌트 데이터와 DOM 요소 사이의 양방향 동기화를 구현합니다. 컴포넌트 데이터가 변경되면 DOM 요소의 속성이 업데이트되고, DOM 요소의 속성이 변경될 때(예: 사용자 입력) 컴포넌트 데이터도 동기적으로 업데이트됩니다.</p>
        <o-playground name="양방향 속성 바인딩" style="--editor-height: 500px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid #007acc;
          padding: 10px;
        }
        input {
          margin: 5px 0;
          padding: 8px;
          width: 100%;
          box-sizing: border-box;
        }
      </style>
      <p>현재 값: {{val}}</p>
      <input type="text" sync:value="val" placeholder="양방향 바인딩된 입력 상자입니다">
      <p>힌트: 입력 상자에서 내용을 수정하면 위에 표시된 값이 실시간으로 업데이트됩니다.</p>
      <script>
        export default async () => {
          return {
            data: { val: "Hello ofa.js Demo Code" }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h3>양방향 바인딩의 특징</h3>
        <ul>
          <li>데이터 흐름: 컴포넌트 ↔ DOM 요소 (양방향)</li>
          <li>컴포넌트 데이터 변화 → DOM 요소 업데이트</li>
          <li>DOM 요소 변화 → 컴포넌트 데이터 업데이트</li>
          <li>사용자 입력과 데이터 동기화가 필요한 시나리오에 적합</li>
        </ul>
        <h3>일반적인 양방향 바인딩 시나리오</h3>
        <o-playground name="양방향 폼 바인딩 예제" style="--editor-height: 700px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          padding: 15px;
          font-family: Arial, sans-serif;
        }
        .form-group {
          margin: 10px 0;
        }
        input, textarea, select {
          padding: 8px;
          margin: 5px 0;
          box-sizing: border-box;
        }
        .preview {
          margin-top: 15px;
          padding: 10px;
          background-color: #7b7b7bff;
          border-radius: 4px;
        }
      </style>
      <h3>양방향 폼 바인딩 예제</h3>
      <div class="form-group">
        <label>텍스트 입력:</label>
        <input type="text" sync:value="textInput" placeholder="텍스트 입력">
      </div>
      <div class="form-group">
        <label>숫자 입력:</label>
        <input type="number" sync:value="numberInput" placeholder="숫자 입력">
      </div>
      <div class="form-group">
        <label>여러 줄 텍스트:</label>
        <textarea sync:value="textareaInput" rows="3" placeholder="여러 줄 텍스트 입력"></textarea>
      </div>
      <div class="form-group">
        <label>선택 상자:</label>
        <select sync:value="selectedOption">
          <option value="">선택하세요...</option>
          <option value="option1">옵션1</option>
          <option value="option2">옵션2</option>
          <option value="option3">옵션3</option>
        </select>
      </div>
      <div class="form-group">
        <label>체크박스:</label>
        <label style="display:flex;">
          <input type="checkbox" sync:checked="isChecked" /> 약관에 동의합니다
        </label>
      </div>
      <div class="preview">
        <h4>실시간 미리보기:</h4>
        <p>텍스트: {{textInput}}</p>
        <p>숫자: {{numberInput}}</p>
        <p>여러 줄 텍스트: {{textareaInput}}</p>
        <p>선택: {{selectedOption}}</p>
        <p>체크박스 상태: {{isChecked ? '체크됨' : '체크 안 됨'}}</p>
      </div>
      <script>
        export default async () => {
          return {
            data: { textInput: '', numberInput: 0, textareaInput: '', selectedOption: '', isChecked: false }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>주의사항</h2>
        <ol>
          <li><strong>성능 고려사항</strong>: 양방향 바인딩은 데이터 리스너를 생성하므로, 과도하게 사용하면 성능에 영향을 줄 수 있습니다.</li>
          <li><strong>데이터 일관성</strong>: 양방향 바인딩은 데이터와 뷰의 일관성을 보장하지만, 무한 루프 업데이트를 피하도록 주의해야 합니다.</li>
          <li><strong>초기값 설정</strong>: 바인딩된 데이터에 적절한 초기값을 설정하여 undefined 표시 문제를 방지하세요.</li>
          <li><strong>이벤트 충돌</strong>: 동일한 요소에 양방향 바인딩과 수동 이벤트 처리를 동시에 사용하지 않도록 하여 충돌을 방지하세요.</li>
        </ol>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
  </o-app>
  <o-root-provider name="pui" theme="dark"></o-root-provider>
</body>
