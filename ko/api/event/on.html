<body>
  <o-app src="../../../js/app-config.js">

      <article class="markdown-body">
        <h1>on</h1>
        <p><code>on</code> 메서드를 사용하면 대상 요소에 이벤트 핸들러를 등록할 수 있습니다. 이를 통해 사용자의 상호 작용을 쉽게 캡처하고 응답할 수 있습니다.</p>
        <p>다음은 <code>on</code> 메서드를 사용하여 버튼 요소에 클릭 이벤트 핸들러를 등록하는 방법을 보여주는 예제입니다：</p>
        <o-playground name="on - click 이벤트" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <button id="target">카운트 추가</button>
      <br>
      <br>
      <div id="logger" style="border:red solid 1px;padding:8px;">-</div>
      <script>
        let count = 0;
        \$("#target").on("click", ()=> {
          \$("#logger").text = count++;
        });
      </script>
    </template>
  </code>
        </o-playground>
        <p>在这个示例中，我们使用 <code>on</code> 方法为按钮元素添加了一个点击事件处理程序。当用户点击按钮时，会触发事件处理程序，计数器将递增并将结果显示在页面上。</p>
        <h2>템플릿 문법 방식 사용</h2>
        <p>또한 템플릿 구문을 사용하여 대상 요소에 메서드를 바인딩할 수 있습니다.</p>
        <o-playground name="on - 템플릿 문법" style="--editor-height: 400px">
          <code path="demo.html" preview>
    <template>
      <l-m src="./on-demo.html"></l-m>
      <on-demo></on-demo>
    </template>
  </code>
          <code path="on-demo.html" active>
    <template component>
      <button on:click="addCount">카운트 추가</button>
      <div>{{count}}</div>
      <script>
        export default {
          tag: "on-demo",
          data: {
            count: 0
          },
          proto:{
            addCount(){
              this.count++;
            }
          }
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>이 예제에서는 버튼 요소에 <code>on:click</code>을 사용해 <code>addCount</code>라는 메서드를 바인딩했습니다. 사용자가 버튼을 클릭하면 이 메서드가 호출되고, 카운터 값이 증가하여 페이지에 표시됩니다. 이러한 방식으로 이벤트 핸들러를 컴포넌트의 메서드와 연결하여 더 복잡한 상호작용을 구현할 수 있습니다.</p>
        <h2>event</h2>
        <p>이벤트를 등록한 뒤, 트리거되는 함수는 event를 함께 전달받으며 네이티브와 동일하게 동작합니다:</p>
        <o-playground name="on - event 매개변수" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <button id="target">add count</button>
      <br>
      <br>
      <div id="logger" style="border:red solid 1px;padding:8px;">-</div>
      <script>
        let count = 0;
        \$("#target").on("click", (event)=> {
          \$("#logger").text = event.type;
        });
      </script>
    </template>
  </code>
        </o-playground>
      </article>

      <script>
        export const parent = "../../../layout.html";

          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
