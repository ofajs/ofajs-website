  <style>
    html,
    body {
      height: 100%;
      padding: 0;
      margin: 0;

        -apple-system,

<body>
  <o-app src="../../../js/app-config.js">
    <template page>
      <link rel="stylesheet" href="../../../css/github-markdown.css" />
      <link rel="stylesheet" href="../../../css/hljs.css" />
      <l-m src="../../../comps/center-block.html"></l-m>
      <l-m src="../../../comps/article-code.html"></l-m>
      <l-m src="https://playground.ofajs.com/comps/o-playground/o-playground.html"></l-m>
      <style>
        :host {
          display: block;
          height: 100%;
          box-sizing: border-box;
          overflow: auto;
        }
      </style>
      <link rel="stylesheet" href="../../../css/page.css" />
      <article class="markdown-body">
        <h1>off</h1>
        <p><code>off</code> 메서드를 사용하면 등록된 이벤트 핸들러를 해제하여 이벤트 수신을 취소할 수 있습니다.</p>
        <p>다음은 <code>off</code> 메서드를 사용하여 이벤트 리스너를 취소하는 방법을 보여주는 예시입니다：</p>
        <o-playground name="off - 이벤트 리스너 제거" style="--editor-height: 400px">
          <code path="demo.html">
    <template>
      <button id="target">add count</button>
      <br>
      <br>
      <div id="logger" style="border:red solid 1px;padding:8px;">-</div>
      <script>
        let count = 0;
        const f = ()=> {
          \$("#logger").text = count++;
          if(count === 3){
            \$("#target").off("click", f);
          }
        }
        \$("#target").on("click", f);
      </script>
    </template>
  </code>
        </o-playground>
        <p>이 예제에서는 클릭 이벤트 핸들러 <code>f</code>를 등록했으며, 버튼이 클릭될 때 이벤트 핸들러가 <code>#logger</code>에 클릭 횟수를 표시합니다. <code>off</code> 메서드를 사용해 클릭 횟수가 3에 도달하면 이벤트 리스닝을 해제했습니다.</p>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
  </o-app>
  <o-root-provider name="pui" theme="dark"></o-root-provider>
</body>

</html>
