<body>
  <o-app src="../../../js/app-config.js">
    <template page>
      <link rel="stylesheet" href="../../../css/github-markdown.css" />
      <link rel="stylesheet" href="../../../css/hljs.css" />
      <l-m src="../../../comps/center-block.html"></l-m>
      <l-m src="../../../comps/article-code.html"></l-m>
      <l-m src="https://playground.ofajs.com/comps/o-playground/o-playground.html"></l-m>
      <style>
        :host {
          display: block;
          height: 100%;
          box-sizing: border-box;
          overflow: auto;
        }
      </style>
      <link rel="stylesheet" href="../../../css/page.css" />
      <article class="markdown-body">
        <h1>one</h1>
        <p><code>one</code> 메서드를 사용하면 대상 요소에 일회성 이벤트 핸들러를 등록할 수 있으며, 이는 이벤트 핸들러가 처음 발생한 후 자동으로 바인딩이 해제되어 다시는 발생하지 않음을 의미합니다.</p>
        <p>다음은 <code>one</code> 메서드를 사용하여 버튼 요소에 클릭 이벤트 핸들러를 등록하는 방법을 보여주는 예제입니다:</p>
        <o-playground name="one - click 일회성 이벤트" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <button id="target">add count</button>
      <br>
      <br>
      <div id="logger" style="border:red solid 1px;padding:8px;">-</div>
      <script>
        let count = 0;
        \$("#target").one("click", ()=> {
          \$("#logger").text = count++;
        });
      </script>
    </template>
  </code>
        </o-playground>
        <p>이 예제에서는 <code>one</code> 메서드를 사용하여 버튼 요소에 클릭 이벤트 핸들러를 추가했습니다. 사용자가 버튼을 클릭하면 이벤트 핸들러가 실행되지만, 그 이후에는 해제되어 다시 실행되지 않습니다.</p>
        <h2>템플릿 문법 방식 사용</h2>
        <p>당신은 또한 템플릿 문법을 사용하여 대상 요소에 일회성 이벤트 처리기를 바인딩할 수도 있습니다.</p>
        <o-playground name="one - 템플릿 문법" style="--editor-height: 400px">
          <code path="demo.html" preview>
    <template>
      <l-m src="./one-demo.html"></l-m>
      <one-demo></one-demo>
    </template>
  </code>
          <code path="one-demo.html" active>
    <template component>
      <button one:click="addCount">카운트 추가</button>
      <div>{{count}}</div>
      <script>
        export default {
          tag: "one-demo",
          data: {
            count: 0
          },
          proto:{
            addCount(){
              this.count++;
            }
          }
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>이 예제에서는 버튼 요소에 <code>one:click</code>을 사용하여 <code>addCount</code>라는 메서드를 바인딩했습니다. 사용자가 버튼을 클릭하면 이 메서드가 호출되지만, 그 이후에는 다시 트리거되지 않습니다. 왜냐하면 이는 일회성 이벤트 핸들러이기 때문입니다.</p>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
