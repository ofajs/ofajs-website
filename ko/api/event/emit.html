      <article class="markdown-body">
        <h1>emit</h1>
        <p><code>emit</code> 메서드를 사용하면 이벤트를 능동적으로 트리거할 수 있으며, 트리거된 이벤트에는 버블링 메커니즘이 있습니다. 버블링 메커니즘은 이벤트가 내부 요소에서 외부 요소로 전파되어 안쪽에서 바깥쪽 순으로 이벤트가 발생함을 의미합니다.</p>
        <p>다음은 <code>emit</code> 메소드를 사용하여 사용자 정의 이벤트를 발생시키고, 버블링 메커니즘을 활용하여 이벤트를 외부 요소로 전달하는 방법을 보여주는 예시입니다：</p>
        <o-playground name="emit - 이벤트 발생" style="--editor-height: 560px">
          <code path="demo.html">
    <template>
      <ul>
        <li id="target">
          나는 타겟이다
        </li>
      </ul>
      <div id="logger1" style="border:red solid 1px;padding:8px;">-</div>
      <div id="logger2" style="border:blue solid 1px;padding:8px;">-</div>
      <script>
        let count = 0;
        \$('ul').on('custom-event',()=>{
          count++;
          \$("#logger1").text = 'ul이 트리거됨 ' + count;
        });
        \$('#target').on('custom-event',()=>{
          count++;
          \$("#logger2").text = '타겟이 트리거됨 ' + count;
        });
        setTimeout(()=>{
          \$("#target").emit("custom-event",{
            data:"나는 데이터다"
          });
        },500);
      </script>
    </template>
  </code>
        </o-playground>
        <p>이 예시에서 우리는 <code>&lt;ul&gt;</code> 요소와 <code>&lt;li&gt;</code> 요소에 각각 동일한 커스텀 이벤트 <code>custom-event</code> 핸들러를 등록했습니다. <code>emit</code> 메서드를 사용하여 이벤트를 트리거할 때, 이 이벤트는 <code>&lt;li&gt;</code> 요소에서 <code>&lt;ul&gt;</code> 요소로 버블링되어 두 개의 이벤트 핸들러를 트리거합니다.</p>
        <h2>사용자 정의 데이터</h2>
        <p><code>data</code> 매개변수를 사용하면 이벤트 핸들러에 사용자 정의 데이터를 전달할 수 있습니다.</p>
        <o-playground name="emit - 사용자 정의 데이터" style="--editor-height: 560px">
          <code path="demo.html">
    <template>
      <ul>
        <li id="target">
          I am target
        </li>
      </ul>
      <div id="logger1" style="border:red solid 1px;padding:8px;">-</div>
      <div id="logger2" style="border:blue solid 1px;padding:8px;">-</div>
      <script>
        \$('ul').on('custom-event',(event)=>{
          \$("#logger1").text = 'ul is triggered;  =>  ' + event.data;
        });
        \$('#target').on('custom-event',(event)=>{
          \$("#logger2").text = 'target is triggered;  =>  ' + event.data;
        });
        setTimeout(()=>{
          \$("#target").emit("custom-event",{ 
            data:"I am data"
          });
        },500);
      </script>
    </template>
  </code>
        </o-playground>
        <p>이 예제에서는 <code>data</code> 매개변수를 통해 이벤트 핸들러에 사용자 정의 데이터를 전달했습니다. 이벤트 핸들러는 <code>event.data</code>로 전달된 데이터를 가져올 수 있습니다.</p>
        <h2>버블링되지 않는 이벤트 트리거</h2>
        <p>이벤트 버블링을 원하지 않는다면 이벤트를 트리거할 때 <code>bubbles: false</code> 매개변수를 전달할 수 있습니다:</p>
        <o-playground name="emit - 버블링 없음" style="--editor-height: 560px">
          <code path="demo.html">
    <template>
      <ul>
        <li id="target">
          나는 타겟입니다
        </li>
      </ul>
      <div id="logger1" style="border:red solid 1px;padding:8px;">-</div>
      <div id="logger2" style="border:blue solid 1px;padding:8px;">-</div>
      <script>
        \$('ul').on('custom-event',()=>{
          \$("#logger1").text = 'ul이 트리거됨';
        });
        \$('#target').on('custom-event',()=>{
          \$("#logger2").text = '타겟이 트리거됨';
        });
        setTimeout(()=>{
          \$("#target").emit("custom-event",{
            bubbles: false
          });
        },500);
      </script>
    </template>
  </code>
        </o-playground>
        <p>이 예제에서는 <code>bubbles: false</code> 매개변수를 사용하여 사용자 지정 이벤트를 트리거했습니다. 이 이벤트는 상위 요소로 버블링되지 않으므로 <code>&lt;li&gt;</code> 요소의 이벤트 핸들러만 트리거됩니다.</p>
        <h2>루트 노드 투과</h2>
        <p>기본적으로 이벤트는 사용자 정의 컴포넌트의 shadow DOM을 통과하지 않습니다. 그러나 <code>composed: true</code>를 설정함으로써 사용자 정의 이벤트가 루트 노드를 통과하여 루트 노트 외부의 요소를 트리거할 수 있습니다.</p>
        <o-playground name="emit - 투과 루트 노드" style="--editor-height: 560px">
          <code path="demo.html" preview>
    <template>
      <div id="outer-logger"></div>
      <l-m src="./composed-test.html"></l-m>
      <composed-test></composed-test>
    </template>
  </code>
          <code path="composed-test.html" active>
    <template component>
      <style>
        :host{
          display:block;
          border:red solid 1px;
        }
      </style>
      <div id="logger">{{loggerText}}</div>
      <div id="target"></div>
      <script>
        export default {
          tag: "composed-test",
          data:{
            loggerText: ""
          },
          ready(){
            this.on("custom-event",(event)=>{
              this.loggerText = 'custom event is triggered;  =>  ' + event.data;
            });
            setTimeout(()=>{
              this.shadow.$("#target").emit("custom-event",{
                composed: true,
                data:"I am composed event"
              });
            },500);
          }
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>이 예제에서는 사용자 정의 컴포넌트 <code>composed-test</code>를 생성했으며, 이는 쉐도우 DOM 내의 요소와 이벤트를 트리거하는 버튼을 포함합니다. 기본적으로 이벤트는 쉐도우 DOM을 통과하여 루트 노드로 도달하지 않습니다. 하지만 이벤트 트리거 시 <code>composed: true</code> 매개변수를 사용하여, 이벤트가 루트 노드까지 통과하도록 하여 루트 노드 외부의 요소를 트리거했습니다.</p>
      </article>

      <script>

              revoke(this);
            },
          };
