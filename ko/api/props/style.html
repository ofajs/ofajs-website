  <script src="https://cdn.jsdelivr.net/gh/kirakiray/ofa.js@4.6.20/libs/scsr/dist/scsr.min.mjs" type="module"></script>

<body>
  <o-app src="../../../js/app-config.js">
    <template page>
      <link rel="stylesheet" href="../../../css/github-markdown.css" />
      <link rel="stylesheet" href="../../../css/hljs.css" />
      <l-m src="../../../comps/center-block.html"></l-m>
      <l-m src="../../../comps/article-code.html"></l-m>
      <l-m src="https://playground.ofajs.com/comps/o-playground/o-playground.html"></l-m>
      <style>
        :host {
          display: block;
          height: 100%;
          box-sizing: border-box;
          overflow: auto;
        }
      </style>
      <link rel="stylesheet" href="../../../css/page.css" />
      <article class="markdown-body">
        <h1>style</h1>
        <p><code>style</code> 속성은 네이티브와 동일하게 유지됩니다.</p>
        <p>请注意，<code>style</code> 속성은 스타일의 실제 값을 가져올 수 없으며, 오직 <code>style</code> 속성에서 설정된 값만 가져올 수 있습니다. <code>style</code> 메서드는 <a href="./css.html" olink="">css 메서드</a>와 유사하지만, 전체 스타일 덮어쓰기는 할 수 없습니다. <code>css</code>에 비해, <code>style</code> 메서드의 내부 실행 효율이 더 높습니다.</p>
        <p>아래는 <code>style</code>을 사용하는 예시입니다:</p>
        <o-playground name="style - 직접 사용" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <div id="target">origin text</div>
      <br>
      <h4>logger</h4>
      <div id="logger" style="border:#aaa solid 1px;padding:8px;"></div>
      <script>
        $("#logger").text = $("#target").style.color;
        setTimeout(()=> {
          $('#target').style.color = 'red';
          $("#logger").text = $("#target").style.color;
        }, 1000);
      </script>
    </template>
  </code>
        </o-playground>
        <p>기억하세요, <code>style</code> 메서드는 <code>style</code> 속성의 값만 가져오기와 설정하며, 실제 계산된 스타일이 아닙니다.</p>
        <h2>템플릿 문법 방식 사용</h2>
        <p>또한 템플릿 구문을 사용하여 대상 요소의 스타일을 설정할 수도 있습니다.</p>
        <o-playground name="style - 템플릿 문법" style="--editor-height: 400px">
          <code path="demo.html" preview="">
    <template>
      <l-m src="./style-demo.html"></l-m>
      <style-demo></style-demo>
      <script>
        setTimeout(()=>{
          \$("style-demo").txt = "blue";
        },1000);
      </script>
    </template>
  </code>
          <code path="style-demo.html" active="">
    <template component="">
      <div :style.color="txt">I am target</div>
      <script>
        export default {
          tag: "style-demo",
          data: {
            txt: "red"
          },
          ready(){
            setTimeout(()=>{
              this.txt = "blue";
            }, 500);
          }
        };
      </script>
    </template>
  </code>
        </o-playground>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
  </o-app>
  <o-root-provider name="pui" theme="dark"></o-root-provider>
</body>

</html>
