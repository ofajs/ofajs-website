<body>
  <o-app src="../../../js/app-config.js">
    <template page>
      <link rel="stylesheet" href="../../../css/github-markdown.css" />
      <link rel="stylesheet" href="../../../css/hljs.css" />
      <l-m src="../../../comps/center-block.html"></l-m>
      <l-m src="../../../comps/article-code.html"></l-m>

          overflow: auto;
        }
      </style>
      <link rel="stylesheet" href="../../../css/page.css" />
      <article class="markdown-body">
        <h1>classList</h1>
        <p><code>classList</code> 속성은 네이티브와 동일하게 유지됩니다. <a href="https://developer.mozilla.org/zh-CN/docs/Web/API/Element/classList" target="_blank">classList</a>를 사용하여 클래스 이름을 추가, 삭제 및 전환할 수 있습니다.</p>
        <p>아래는 <code>classList</code>를 사용하는 예시입니다：</p>
        <o-playground name="classList - 사용 예제" style="--editor-height: 500px">
          <code path="demo.html">
    <template>
      <style>
        .t-red{
          color: red;
          font-size: 14px;
        }
        .t-blue{
          color: blue;
          font-weight:bold;
          font-size:20px;
        }
      </style>
      <div id="target" class="t-red">origin text</div>
      <script>
        setTimeout(()=> {
          $("#target").classList.remove('t-red');
          setTimeout(()=>{
            $("#target").classList.add('t-blue');
          },1000);
        }, 1000);
      </script>
    </template>
  </code>
        </o-playground>
        <p><code>classList</code> 속성을 사용하면 클래스 이름을 쉽게 추가, 제거 및 전환하여 요소의 스타일을 동적으로 변경할 수 있습니다.</p>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
  </o-app>
  <o-root-provider name="pui" theme="dark"></o-root-provider>
