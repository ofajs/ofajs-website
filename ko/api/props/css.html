      <article class="markdown-body">
        <h1>css</h1>
        <p><code>css</code> 메서드는 대상 요소의 스타일을 가져오거나 설정하는 데 사용됩니다.</p>
        <h2>직접 사용</h2>
        <p>당신은 직접 <code>css</code> 메서드를 사용하여 요소의 스타일을 가져오거나 설정할 수 있습니다.</p>
        <o-playground name="css - 직접 사용" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <div id="target">원본 텍스트</div>
      <br>
      <h4>로거</h4>
      <div id="logger" style="border:#aaa solid 1px;padding:8px;"></div>
      <script>
        $("#logger").text = $("#target").css.color;
        setTimeout(()=> {
          $('#target').css.color = 'red';
          $("#logger").text = $("#target").css.color;
        }, 1000);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>전체 설정</h2>
        <p>획득한 <code>css</code> 객체를 통해 요소에 직접 style 값을 설정할 수 있습니다.</p>
        <o-playground name="css - 전체 설정" style="--editor-height: 400px">
          <code path="demo.html">
    <template>
      <div id="target" style="color:red">origin text</div>
      <br>
      <h4>logger</h4>
      <div id="logger" style="border:#aaa solid 1px;padding:8px;"></div>
      <script>
        $("#logger").text = Object.keys($("#target").css);
        setTimeout(()=>{
          \$("#target").css = {
            color: "blue",
            lineHeight: "5em"
          };
          \$("#logger").text = Object.keys($("#target").css);
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
        <p><code>css</code> 객체의 특성을 사용하면 대상 요소의 스타일을 빠르게 조정할 수 있습니다.</p>
        <h2>템플릿 구문 방식 사용</h2>
        <p>템플릿 문법을 사용하여 대상 요소의 스타일을 설정할 수도 있습니다.</p>
        <o-playground name="css - 템플릿 구문" style="--editor-height: 400px">
          <code path="demo.html" preview>
    <template>
      <l-m src="./css-demo.html"></l-m>
      <css-demo></css-demo>
      <script>
        setTimeout(()=>{
          \$("css-demo").txt = "blue";
        },1000);
      </script>
    </template>
  </code>
          <code path="css-demo.html" active>
    <template component>
      <div :css.color="txt">I am target</div>
      <script>
        export default {
          tag: "css-demo",
          data: {
            txt: "red"
          },
          ready(){
            setTimeout(()=>{
              this.txt = "blue";
            }, 500);
          }
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>CSS를 설정하는 팁</h2>
        <p><code>$ele.css = {...$ele.css, color:&#39;red&#39;}</code> 방식을 통해 요소의 특정 스타일 속성을 수정할 수 있으며, 다른 스타일 속성에는 영향을 미치지 않습니다. 이 방식은 전체 스타일을 다시 작성하지 않고도 하나의 속성만 수정할 수 있습니다.</p>
        <h3>예시</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> myElement = $(<span class="hljs-string">&quot;#myElement&quot;</span>);

myElement.<span class="hljs-property">css</span> = { ...myElement.<span class="hljs-property">css</span>, <span class="hljs-attr">color</span>: <span class="hljs-string">&#x27;red&#x27;</span> };</code></pre>
        <p>위의 예시에서 <code>{ ...myElement.css, color: &#39;red&#39; }</code>를 사용하여 요소의 색상 스타일만 수정하고 다른 스타일 속성은 그대로 유지했습니다. 이는 요소의 스타일을 유연하게 수정할 수 있는 매우 편리한 기술입니다.</p>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
