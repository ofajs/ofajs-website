      <link rel="stylesheet" href="../../../css/github-markdown.css" />

      </style>
      <link rel="stylesheet" href="../../../css/page.css" />
      <article class="markdown-body">
        <h1>unwrap</h1>
        <p><code>unwrap</code> 메서드는 대상 요소의 외부를 감싸고 있는 요소를 제거하는 데 사용됩니다.</p>
        <o-playground name="unwrap - 래핑 제거" style="--editor-height: 440px">
          <code path="demo.html">
    <template>
      <style> div{border: #aaa solid 1px; margin:8px; padding:8px;} </style>
      <div style="color:red;border-color:red;">
        <div id="target">I am target</div>
      </div>
      <script>
        setTimeout(()=>{
          \$('#target').unwrap();
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>주의사항</h2>
        <p>대상 요소는 <strong>부모 노드를 반드시 가지고 있어야</strong> 하며, 그렇지 않으면 unwrap 연산을 실행할 수 없습니다.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> $el = $(<span class="hljs-string">`
&lt;div&gt;
    &lt;div id=&quot;target&quot;&gt;&lt;/div&gt;
&lt;/div&gt;
`</span>);

$el.<span class="hljs-title function_">unwrap</span>(); <span class="hljs-comment">// 오류, 부모 요소가 없어서 unwrap할 수 없음</span>
$el.$(<span class="hljs-string">&#x27;#target&#x27;</span>).<span class="hljs-title function_">unwrap</span>(); <span class="hljs-comment">// 올바름, 감싸는 요소를 제거함</span></code></pre>
        <p>대상 요소에 다른 형제 요소가 있을 때는 unwrap을 실행할 수 없습니다.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> $el = $(<span class="hljs-string">`
&lt;div&gt;
    &lt;div id=&quot;target&quot;&gt;&lt;/div&gt;
    &lt;div&gt;I am siblings&lt;/div&gt;
&lt;/div&gt;
`</span>);

$el.$(<span class="hljs-string">&#x27;#target&#x27;</span>).<span class="hljs-title function_">unwrap</span>(); <span class="hljs-comment">// 오류, 인접한 다른 노드가 존재하기 때문</span></code></pre>
        <p><strong>请 주의하세요. o-fill 또는 o-if 같은 템플릿 컴포넌트 내부에서 조작하지 마세요.</strong></p>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
