<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>하위 요소 추가 또는 삭제</title>
  <script src="https://cdn.jsdelivr.net/gh/kirakiray/ofa.js@4.6.20/dist/ofa.mjs#debug" type="module"></script>
  <script src="https://cdn.jsdelivr.net/gh/kirakiray/ofa.js@4.6.20/libs/scsr/dist/scsr.min.mjs" type="module"></script>
  <link rel="icon" href="../../../img/logo.svg" />
  <link rel="stylesheet" href="../../../css/palette.css" pui-colors />
  <link rel="stylesheet" href="../../../css/theme.css" />
  <link rel="stylesheet" href="../../../css/github-markdown.css" />

  <style>

        -apple-system,

<body>
  <o-app src="../../../js/app-config.js">
    <template page>
      <link rel="stylesheet" href="../../../css/github-markdown.css" />
      <link rel="stylesheet" href="../../../css/hljs.css" />
      <l-m src="../../../comps/center-block.html"></l-m>
      <l-m src="../../../comps/article-code.html"></l-m>
      <l-m src="https://playground.ofajs.com/comps/o-playground/o-playground.html"></l-m>
      <style>
        :host {
          display: block;
          height: 100%;
          box-sizing: border-box;
          overflow: auto;
        }
      </style>
      <link rel="stylesheet" href="../../../css/page.css" />
      <article class="markdown-body">
        <h1>하위 요소 추가 또는 삭제</h1>
        <p>요소 인스턴스는 배열과 유사한 특성을 가지며, 노드를 추가하거나 삭제할 때 배열의那几个 조작 메서드만 사용하면 됩니다. <code>push</code>, <code>unshift</code>, <code>pop</code>, <code>shift</code>, <code>splice</code> 메서드를 사용할 때는 내부적으로 자동으로 <a href="../instance/dollar.html" olink="">$ 메서드</a>의 초기화 작업이 수행되므로, 구체적인 요소 문자열이나 객체를 바로 입력할 수 있습니다.</p>
        <p>마찬가지로, <code>forEach</code>, <code>map</code>, <code>some</code> 등의 다른 배열 메서드를 사용할 수도 있습니다.</p>
        <p><strong>템플릿 구문이 있는 요소에서는 하위 요소를 추가하거나 삭제하지 마세요.</strong></p>
        <h2>push</h2>
        <p>끝에서 자식 요소를 추가합니다.</p>
        <o-playground name="array-like - push" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <ul>
        <li>나는 1</li>
        <li>나는 2</li>
        <li>나는 3</li>
      </ul>
      <script>
        setTimeout(()=>{
          \$("ul").push(`<li style="color:red;">새로운 li</li>`);
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>unshift</h2>
        <p>배열의 시작 부분에 하위 요소를 추가합니다.</p>
        <o-playground name="array-like - unshift" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <ul>
        <li>I am 1</li>
        <li>I am 2</li>
        <li>I am 3</li>
      </ul>
      <script>
        setTimeout(()=>{
          \$("ul").unshift(`<li style="color:blue;">new li</li>`);
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>pop</h2>
        <p>끝에서 하위 요소를 삭제합니다.</p>
        <o-playground name="array-like - pop" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <ul>
        <li>I am 1</li>
        <li>I am 2</li>
        <li>I am 3</li>
      </ul>
      <script>
        setTimeout(()=>{
          \$("ul").pop();
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>shift</h2>
        <p>배열의 시작 부분에서 요소를 삭제합니다.</p>
        <o-playground name="array-like - shift" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <ul>
        <li>나는 1입니다</li>
        <li>나는 2입니다</li>
        <li>나는 3입니다</li>
      </ul>
      <script>
        setTimeout(()=>{
          \$("ul").shift();
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>splice</h2>
        <p>기존 자식 요소를 삭제하거나 교체할 수 있으며, 새로운 자식 요소를 추가할 수도 있습니다. 사용 방식은 배열의 <code>splice</code> 메서드와 유사합니다.</p>
        <o-playground name="array-like - splice" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <ul>
        <li>나는 1입니다</li>
        <li>나는 2입니다</li>
        <li>나는 3입니다</li>
      </ul>
      <script>
        setTimeout(()=>{
          \$("ul").splice(1, 2, `<li style="color:green;">새로운 li 1</li>`, `<li style="color:green;">새로운 li 2</li>`);
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
  </o-app>
  <o-root-provider name="pui" theme="dark"></o-root-provider>
</body>

</html>
