        <h1>wrap</h1>
        <p><code>wrap</code> 메소드는 대상 요소의 외부에 한 层 요소를 감싸는 데 사용된다. <code>wrap</code> 작업을 실행하기 전에 <a href="../instance/dollar.html" olink="">$ 메소드</a>의 초기화 작업이 자동으로 실행되므로 구체적인 요소 문자열이나 객체를 직접 입력할 수 있다.</p>
        <o-playground name="wrap - 요소 감싸기" style="--editor-height: 440px">
          <code path="demo.html">
    <template>
      <style> div{border: #aaa solid 1px; margin:8px; padding:8px;} </style>
      <div>
        <div>나는 1입니다</div>
        <div id="target">나는 2입니다</div>
        <div>나는 3입니다</div>
      </div>
      <script>
        setTimeout(()=>{
          \$('#target').wrap(`<div style="border-color:red;">wrap</div>`);
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>주의사항</h2>
        <p>대상 요소는 <strong>부모 노드가 반드시 있어야</strong> 하며, 그렇지 않으면 래핑 작업이 실패합니다.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> $el = $(<span class="hljs-string">`
&lt;div&gt;
    &lt;div id="target"&gt;&lt;/div&gt;
&lt;/div&gt;
`</span>);

$el.<span class="hljs-title function_">wrap</span>(<span class="hljs-string">"&lt;div&gt;new div&lt;/div&gt;"</span>); <span class="hljs-comment">// 오류, 부모 요소가 없어 감쌀 수 없음</span>
$el.$(<span class="hljs-string">'#target'</span>).<span class="hljs-title function_">wrap</span>(<span class="hljs-string">"&lt;div&gt;new div&lt;/div&gt;"</span>); <span class="hljs-comment">// 정상, 부모 요소가 있음</span></code></pre>
        <p><strong>请 주의하세요. o-fill 또는 o-if 같은 템플릿 컴포넌트 내부에서 조작하지 마세요.</strong></p>
      </article>
