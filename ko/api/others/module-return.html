      <article class="markdown-body">
        <h1>모듈 반환 객체 속성</h1>
        <p>ofa.js에서 페이지 모듈이든 컴포넌트 모듈이든 모두 <code>export default async () =&gt; {}</code>를 통해 객체를 반환하여 모듈의 구성과 동작을 정의해야 합니다. 이 문서는 반환 객체에 포함될 수 있는 모든 속성을 정리하였습니다.</p>
        <h2>속성 개요</h2>
        <table>
          <thead>
            <tr>
              <th>속성</th>
              <th>타입</th>
              <th align="center">페이지 모듈</th>
              <th align="center">컴포넌트 모듈</th>
              <th>설명</th>
              <th>관련 문서</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><code>tag</code></td>
              <td><code>string</code></td>
              <td align="center">❌</td>
              <td align="center">✅ 필수</td>
              <td>컴포넌트 태그 이름</td>
              <td><a href="../../documentation/create-component.html" olink="">컴포넌트 생성</a></td>
            </tr>
            <tr>
              <td><code>data</code></td>
              <td><code>object</code></td>
              <td align="center">✅</td>
              <td align="center">✅</td>
              <td>반응형 데이터 객체</td>
              <td><a href="../../documentation/property-response.html" olink="">속성 반응</a></td>
            </tr>
            <tr>
              <td><code>attrs</code></td>
              <td><code>object</code></td>
              <td align="center">❌</td>
              <td align="center">✅</td>
              <td>컴포넌트 속성 정의</td>
              <td><a href="../../documentation/inherit-attributes.html" olink="">특성 속성 전달</a></td>
            </tr>
            <tr>
              <td><code>proto</code></td>
              <td><code>object</code></td>
              <td align="center">✅</td>
              <td align="center">✅</td>
              <td>메서드와 계산된 속성</td>
              <td><a href="../../documentation/computed-properties.html" olink="">계산된 속성</a></td>
            </tr>
            <tr>
              <td><code>watch</code></td>
              <td><code>object</code></td>
              <td align="center">✅</td>
              <td align="center">✅</td>
              <td>감시자</td>
              <td><a href="../../documentation/watchers.html" olink="">감시자</a></td>
            </tr>
            <tr>
              <td><code>ready</code></td>
              <td><code>function</code></td>
              <td align="center">✅</td>
              <td align="center">✅</td>
              <td>DOM 생성 완료 시 호출</td>
              <td><a href="../../documentation/lifecycle.html" olink="">라이프사이클</a></td>
            </tr>
            <tr>
              <td><code>attached</code></td>
              <td><code>function</code></td>
              <td align="center">✅</td>
              <td align="center">✅</td>
              <td>DOM에 마운트될 때 호출</td>
              <td><a href="../../documentation/lifecycle.html" olink="">라이프사이클</a></td>
            </tr>
            <tr>
              <td><code>detached</code></td>
              <td><code>function</code></td>
              <td align="center">✅</td>
              <td align="center">✅</td>
              <td>DOM에서 제거될 때 호출</td>

            </tr>
            <tr>
              <td><code>loaded</code></td>
              <td><code>function</code></td>
              <td align="center">✅</td>
              <td align="center">✅</td>
              <td>완전히 로드 완료 시 호출</td>
              <td><a href="../../documentation/lifecycle.html" olink="">라이프사이클</a></td>
            </tr>
            <tr>
              <td><code>routerChange</code></td>
              <td><code>function</code></td>
              <td align="center">✅ 부모 페이지</td>
              <td align="center">❌</td>
              <td>라우트 변경 시 호출</td>

            </tr>
          </tbody>
        </table>
        <h2>핵심 속성</h2>
        <h3>tag</h3>
        <p><code>tag</code>는 컴포넌트의 태그 이름이며, <strong>컴포넌트 모듈은 반드시 이 속성을 정의해야 합니다</strong>. 페이지 모듈은 <code>tag</code>를 정의할 필요가 없습니다.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">async</span> () =&gt; {
  <span class="hljs-keyword">return</span> {
    <span class="hljs-attr">tag</span>: <span class="hljs-string">"my-component"</span>,
    <span class="hljs-comment">// ...</span>
  };
};</code></pre>
        <blockquote>
          <p>주의: <code>tag</code>의 값은 구성 요소를 사용할 때의 태그 이름과 일치해야 합니다.</p>
        </blockquote>
        <h3>data</h3>
        <p><code>data</code>는 반응형 데이터 객체로, 컴포넌트나 페이지의 상태 데이터를 저장하는 데 사용됩니다. 데이터가 변경되면 자동으로 뷰가 업데이트됩니다.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">async</span> () =&gt; {
  <span class="hljs-keyword">return</span> {
    <span class="hljs-attr">data</span>: {
      <span class="hljs-attr">message</span>: <span class="hljs-string">"Hello"</span>,
      <span class="hljs-attr">count</span>: <span class="hljs-number">0</span>,
      <span class="hljs-attr">user</span>: {
        <span class="hljs-attr">name</span>: <span class="hljs-string">"장삼"</span>,
        <span class="hljs-attr">age</span>: <span class="hljs-number">25</span>
      },
      <span class="hljs-attr">items</span>: [<span class="hljs-number">1</span>, <span class="hljs-number">2</span>, <span class="hljs-number">3</span>]
    }
  };
};</code></pre>
        <blockquote>
          <p>주의: <code>data</code>는 함수가 아닌 객체이며, Vue 프레임워크와 다릅니다.</p>
        </blockquote>
        <h3>attrs</h3>
        <p><code>attrs</code>는 컴포넌트 속성을 정의하는 데 사용되며, 외부에서 전달된 데이터를 수신합니다. 컴포넌트 모듈만 <code>attrs</code>를 정의하면 됩니다.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">async</span> () =&gt; {
  <span class="hljs-keyword">return</span> {
    <span class="hljs-attr">tag</span>: <span class="hljs-string">"my-component"</span>,
    <span class="hljs-attr">attrs</span>: {
      <span class="hljs-attr">title</span>: <span class="hljs-literal">null</span>,      <span class="hljs-comment">// 기본값 없음</span>
      <span class="hljs-attr">disabled</span>: <span class="hljs-string">""</span>,     <span class="hljs-comment">// 기본값 있음</span>
      <span class="hljs-attr">size</span>: <span class="hljs-string">"medium"</span>    <span class="hljs-comment">// 기본값 있음</span>
    }
  };
};</code></pre>
        <p>컴포넌트 사용 시 속성 전달:</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">my-component</span> <span class="hljs-attr">title</span>=<span class="hljs-string">"제목"</span> <span class="hljs-attr">disabled</span> <span class="hljs-attr">size</span>=<span class="hljs-string">"large"</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">my-component</span>&gt;</span></code></pre>
        <blockquote>
          <p>중요 규칙:</p>
          <ul>
            <li>전달되는 attribute 값은 반드시 문자열이어야 하며, 문자열이 아닌 경우 자동으로 문자열로 변환됩니다.</li>
            <li>네이밍 변환: <code>fullName</code> → <code>full-name</code> (kebab-case 형식)</li>
            <li><code>attrs</code>와 <code>data</code>의 key는 중복될 수 없습니다.</li>
          </ul>
        </blockquote>
        <h3>proto</h3>
        <p><code>proto</code>는 메서드와 계산된 속성을 정의하는 데 사용됩니다. 계산된 속성은 JavaScript의 <code>get</code>과 <code>set</code> 키워드를 사용하여 정의됩니다.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">async</span> () =&gt; {
  <span class="hljs-keyword">return</span> {
    <span class="hljs-attr">data</span>: {
      <span class="hljs-attr">count</span>: <span class="hljs-number">0</span>
    },
    <span class="hljs-attr">proto</span>: {
      <span class="hljs-comment">// 메서드 정의</span>
      <span class="hljs-title function_">increment</span>(<span class="hljs-params"></span>) {
        <span class="hljs-variable language_">this</span>.<span class="hljs-property">count</span>++;
      },
      
      <span class="hljs-comment">// 계산된 속성 (getter)</span>
      <span class="hljs-keyword">get</span> <span class="hljs-title function_">doubleCount</span>() {
        <span class="hljs-keyword">return</span> <span class="hljs-variable language_">this</span>.<span class="hljs-property">count</span> * <span class="hljs-number">2</span>;
      },
      
      <span class="hljs-comment">// 계산된 속성</span>
      <span class="hljs-keyword">set</span> <span class="hljs-title function_">doubleCount</span>(<span class="hljs-params">val</span>) {
        <span class="hljs-variable language_">this</span>.<span class="hljs-property">count</span> = val / <span class="hljs-number">2</span>;
      }
    }
  };
};</code></pre>
        <p>참고: ofa.js는 Vue의 <code>computed</code> 옵션 대신 <code>get</code>/<code>set</code> 키워드를 사용하여 계산된 속성을 정의합니다.</p>
        <h3>watch</h3>
        <p><code>watch</code>는 감시자를 정의하는 데 사용되며, 데이터 변경을 모니터링하고 해당 로직을 실행합니다.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">async</span> () =&gt; {
  <span class="hljs-keyword">return</span> {
    <span class="hljs-attr">data</span>: {
      <span class="hljs-attr">count</span>: <span class="hljs-number">0</span>,
      <span class="hljs-attr">name</span>: <span class="hljs-string">""</span>
    },
    <span class="hljs-attr">watch</span>: {
      <span class="hljs-comment">// 단일 속성 감시</span>
      <span class="hljs-title function_">count</span>(<span class="hljs-params">newVal, { watchers }</span>) {
        <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">'count changed:'</span>, newVal);
      },
      
      <span class="hljs-comment">// 여러 속성 감시</span>
      <span class="hljs-string">"count,name"</span>() {
        <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">'count 또는 name이 변경되었습니다'</span>);
      }
    }
  };
};</code></pre>
        <p>리스너 콜백 함수는 두 개의 매개변수를 받습니다:- <code>newValue</code>：변경된 새로운 값</p>
        <ul>
          <li><code>{ watchers }</code>：현재 컴포넌트의 모든 감시자 객체</li>
        </ul>
        <h2>생명주기 훅</h2>
        <p>라이프사이클 훅을 사용하면 컴포넌트의 다양한 단계에서 특정 로직을 실행할 수 있습니다.</p>
        <h3>ready</h3>
        <p><code>ready</code> 훅은 컴포넌트가 준비될 때 호출되며, 이때 컴포넌트의 템플릿이 렌더링 완료되고 DOM 요소가 생성되었지만 아직 문서에 삽입되지 않았을 수 있습니다.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-title function_">ready</span>(<span class="hljs-params"></span>) {
  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">'DOM이 생성되었습니다'</span>);
  <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">initDomElements</span>();
}</code></pre>
        <h3>attached</h3>
        <p><code>attached</code> 훅은 컴포넌트가 문서에 삽입될 때 호출되며, 컴포넌트가 페이지에 마운트되었음을 나타냅니다.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-title function_">attached</span>(<span class="hljs-params"></span>) {
  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">'DOM에 마운트됨'</span>);
  <span class="hljs-variable language_">this</span>.<span class="hljs-property">_timer</span> = <span class="hljs-built_in">setInterval</span>(<span class="hljs-function">() =&gt;</span> {
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">count</span>++;
  }, <span class="hljs-number">1000</span>);
}</code></pre>
        <h3>detached</h3>
        <p><code>detached</code> 훅은 구성 요소가 문서에서 제거될 때 호출되며, 구성 요소가 곧 마운트 해제됨을 나타냅니다.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-title function_">detached</span>(<span class="hljs-params"></span>) {
  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">'DOM에서 제거됨'</span>);
  <span class="hljs-built_in">clearInterval</span>(<span class="hljs-variable language_">this</span>.<span class="hljs-property">_timer</span>);
}</code></pre>
        <h3>loaded</h3>
        <p><code>loaded</code> 훅은 컴포넌트와 모든 하위 컴포넌트, 비동기 리소스가 모두 로드된 후 트리거됩니다.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-title function_">loaded</span>(<span class="hljs-params"></span>) {
  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">'완전히 로드 완료'</span>);
}</code></pre>
        <h3>routerChange</h3>
        <p><code>routerChange</code> 훅은 라우트 변경 시 호출되며, 부모 페이지에서 자식 페이지 전환을 감지하는 데만 사용됩니다.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-title function_">routerChange</span>(<span class="hljs-params"></span>) {
  <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">refreshActive</span>();
}</code></pre>
        <h2>생명 주기 실행 순서</h2>
        <pre><code class="hljs">ready → attached → loaded
                 ↓
              detached（분리 시）</code></pre>
        <h2>특수 내보내기: parent</h2>
        <p><code>parent</code>는 중첩 라우팅에 사용되며, 현재 페이지의 상위 페이지 경로를 지정합니다. 이는 독립적인 내보내기로, 반환 객체에 포함되지 않습니다.</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">template</span> <span class="hljs-attr">page</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css"><span class="hljs-selector-pseudo">:host</span> { <span class="hljs-attribute">display</span>: block; }</span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">div</span>&gt;</span>하위 페이지 내용<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">
    <span class="hljs-comment">// 부모 페이지 지정</span>
    <span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> parent = <span class="hljs-string">"./layout.html"</span>;
    
    <span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">async</span> () =&gt; {
      <span class="hljs-keyword">return</span> {
        <span class="hljs-attr">data</span>: {}
      };
    };
  </span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">template</span>&gt;</span></code></pre>
        <h2>전체 예시</h2>
        <h3>컴포넌트 모듈</h3>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">template</span> <span class="hljs-attr">component</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
    <span class="hljs-selector-pseudo">:host</span> { <span class="hljs-attribute">display</span>: block; <span class="hljs-attribute">padding</span>: <span class="hljs-number">10px</span>; }
  </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">div</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">p</span>&gt;</span>{{title}}<span class="hljs-tag">&lt;/<span class="hljs-name">p</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">p</span>&gt;</span>카운트: {{count}}<span class="hljs-tag">&lt;/<span class="hljs-name">p</span>&gt;</span>

        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../../js/init.js");
          return {
