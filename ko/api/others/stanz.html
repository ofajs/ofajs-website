        <h1>인스턴스 데이터 특징</h1>
        <p><code>$</code>를 통해 얻거나 생성된 인스턴스 객체는 완전한 stanz 데이터 특성을 가지며, 이는 <code>$</code> 인스턴스가 stanz에서 상속되었기 때문입니다. 즉, stanz가 제공하는 데이터 조작 메서드와 특성을 활용하여 인스턴스 객체의 데이터를 조작하고 모니터링할 수 있습니다.</p>
        <blockquote>
          <p>다음 예에서는 사용자 정의 컴포넌트가 일반적으로 이미 등록된 데이터를 포함하는 반면, 일반 요소는 일반적으로 태그 정보만 포함하기 때문에 일반 요소를 사용합니다. 따라서 데모에 더 적합합니다.</p>
        </blockquote>
        <h2>watch</h2>
        <p>인스턴스는 <code>watch</code> 메서드를 통해 값의 변경을 감시할 수 있으며, 객체의 하위 객체 값이 변경되더라도 해당 객체의 <code>watch</code> 메서드에서 변경을 감지할 수 있다.</p>
        <p>아래는 <code>$</code> 인스턴스와 <code>watch</code> 메서드를 사용하는 예시입니다:</p>
        <o-playground name="stanz - watch" style="--editor-height: 480px">
          <code path="demo.html">
    <template>
      <div id="target"></div>
      <br>
      <div id="logger" style="border: #aaa solid 1px; padding: 8px"></div>
      <script>
        const target = $("#target");
        \$("#logger").text = target;
        target.watch(() => {
          \$("#logger").text = target;
        });
        setTimeout(() => {
          target.aaa = "I am aaa";
        }, 600);
        setTimeout(() => {
          target.bbb = {
            child: {
              val: "I am bbb child val",
            },
          };
        }, 1200);
        setTimeout(() => {
          target.bbb.child.val = "change bbb child val";
        }, 1800);
      </script>
    </template>
  </code>
        </o-playground>
        <p>이 예제에서는 먼저 <code>$</code> 인스턴스 객체 <code>target</code>을 생성한 후, <code>watch</code> 메서드를 사용하여 그 변경을 감지합니다. 심지어 우리가 객체의 하위 객체 값, 예를 들어 <code>target.bbb.child.val</code> 의 값을 변경하더라도 <code>watch</code> 메서드에서 이러한 변경을 감지하고 <code>logger</code> 요소의 내용을 업데이트할 수 있습니다. 이는 <code>$</code> 인스턴스 객체의 강력한 특성을 보여주며, 객체의 변화를 쉽게 모니터링할 수 있게 해줍니다.</p>
        <h2>watchTick</h2>
        <p><code>watchTick</code>와 <code>watch</code> 메서드는 기능이 유사하지만, <code>watchTick</code> 내부에 스로틀링(throttling) 작업이 있어 단일 스레드에서 한 번만 실행되므로 성능 요구가 더 높은 일부 시나리오에서 데이터 변동을 더 효과적으로 감시할 수 있습니다.</p>
        <p>아래는 <code>$</code> 인스턴스의 <code>watchTick</code> 메서드를 사용하는 예시입니다:</p>
        <o-playground name="stanz - watchTick" style="--editor-height: 480px">
          <code path="demo.html">
    <template>
      <div id="target"></div>
      <br>
      <div id="logger1" style="border: blue solid 1px; margin: 8px"></div>
      <div id="logger2" style="border: red solid 1px; margin: 8px"></div>
      <script>
        const target = $("#target");
        let count1 = 0;
        target.watch(() => {
          count1++;
          \$("#logger1").text = 'watch 실행 횟수: ' + count1;
        });
        let count2 = 0;
        target.watchTick(()=>{
          count2++;
          \$("#logger2").text = 'watchTick 실행 횟수: ' + count2;
        });
        setTimeout(() => {
          target.aaa = "I am aaa";
          target.bbb = "I am bbb";
          target.ccc = "I am ccc";
        }, 1000);
      </script>
    </template>
  </code>
        </o-playground>
        <p>이 예시에서는 먼저 <code>$</code> 인스턴스 객체 <code>target</code>을 생성합니다. 그런 다음 <code>watch</code> 메서드와 <code>watchTick</code> 메서드를 사용하여 객체의 변경을 감지합니다. <code>watch</code> 메서드는 데이터가 변경될 때 즉시 실행되는 반면, <code>watchTick</code> 메서드는 단일 스레드에서 한 번만 실행되므로 감지 작업의 빈도를 제한할 수 있습니다. 필요에 따라 <code>watch</code> 또는 <code>watchTick</code> 메서드를 사용하여 데이터 변화를 감지할 수 있습니다.</p>
        <h2>unwatch</h2>
        <p><code>unwatch</code> 메서드는 데이터 감시를 취소하는 데 사용되며, 이전에 등록된 <code>watch</code> 또는 <code>watchTick</code> 감시를 철회할 수 있습니다.</p>
        <p>아래는 <code>$</code> 인스턴스의 <code>unwatch</code> 메서드를 사용하는 예시입니다:</p>
        <o-playground name="stanz - unwatch" style="--editor-height: 480px">
          <code path="demo.html">
    <template>
      <div id="target"></div>
      <br>
      <div id="logger1" style="border: blue solid 1px; margin: 8px"></div>
      <div id="logger2" style="border: red solid 1px; margin: 8px"></div>
      <script>
        const target = $("#target");
        const tid1 = target.watch(() => {
          \$("#logger1").text = JSON.stringify(target);
        });
        const tid2 = target.watchTick(()=>{
          \$("#logger2").text = JSON.stringify(target);
        });
        setTimeout(() => {
          target.aaa = "I am aaa";
          target.unwatch(tid1);
          target.unwatch(tid2);
        }, 500);
        setTimeout(() => {
          target.bbb = "I am aaa";
        }, 1000);
      </script>
    </template>
  </code>
        </o-playground>
        <p>이 예제에서는 먼저 <code>$</code> 인스턴스 객체 <code>target</code>을 생성한 다음, <code>watch</code> 메서드와 <code>watchTick</code> 메서드를 사용하여 각각 두 개의 리스너를 등록했습니다. 그 후, <code>unwatch</code> 메서드를 통해 이전에 저장한 리스너 반환 값 <code>tid1</code>과 <code>tid2</code>를 전달하여 이 두 리스너를 취소합니다. 즉, 첫 번째 <code>setTimeout</code> 내의 속성 변경은 리스너가 취소되었기 때문에 어떤 리스너도 트리거하지 않습니다.</p>
        <h2>감시되지 않는 값</h2>
        <p><code>$</code> 인스턴스에서 밑줄 <code>_</code>로 시작하는 속성 이름은 이러한 값이 <code>watch</code> 또는 <code>watchTick</code> 메서드에 의해 감시되지 않음을 나타냅니다. 이는 일시적이거나 비공개인 속성에 매우 유용하며, 감시를 트리거하지 않고도 자유롭게 변경할 수 있습니다.</p>
        <p>템플릿 내에서 이는 <a href="../../documentation/state-management.html" olink="">비반응형 데이터</a>라고 합니다.</p>
        <p>아래는 밑줄로 시작하는 속성 값을 사용하여 감지를 피하는 방법을 보여주는 예시입니다:</p>
        <o-playground name="stanz - 비반응형 데이터" style="--editor-height: 480px">
          <code path="demo.html">
    <template>
      <div id="target"></div>
      <br>
      <div id="logger" style="border: #aaa solid 1px; padding: 8px"></div>
      <script>
        const target = $("#target");
        \$("#logger").text = target;
        target.watch(() => {
          \$("#logger").text = target;
        });
        setTimeout(() => {
          target._aaa = "I am aaa";
        }, 600);
        setTimeout(() => {
          target._aaa = "change aaa";
        }, 1200);
      </script>
    </template>
  </code>
        </o-playground>
        <p>이 예제에서는 <code>$</code> 인스턴스 객체 <code>target</code>을 생성한 후, <code>watch</code> 메서드를 사용하여 속성 값의 변경을 감시합니다. <code>setTimeout</code>에서 <code>_aaa</code> 속성 값을 변경하려고 시도하지만, 이 변경은 감시를 트리거하지 않습니다. 이는 감시를 트리거하지 않고 속성 값을 업데이트해야 하는 경우에 매우 유용합니다.</p>
        <h2>기본 특징</h2>
        <p>인스턴스에 설정된 객체 데이터는 Stanz 인스턴스로 변환되며, 이러한 Stanz 인스턴스는 리스닝이 가능합니다.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> obj = {
  <span class="hljs-attr">val</span>: <span class="hljs-string">"I am obj"</span>
};

$(<span class="hljs-string">"#target"</span>).<span class="hljs-property">obj</span> = obj;
<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>($(<span class="hljs-string">"#target"</span>).<span class="hljs-property">obj</span>.<span class="hljs-property">val</span> === obj.<span class="hljs-property">val</span>);
<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>($(<span class="hljs-string">"#target"</span>).<span class="hljs-property">obj</span> === obj);</code></pre>
        <p>우리는 <code>$.stanz</code>를 사용하여 인스턴스에 바인딩되지 않은 Stanz 데이터를 생성할 수도 있습니다.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> data = $.<span class="hljs-title function_">stanz</span>({
  <span class="hljs-attr">val</span>: <span class="hljs-string">"I am val"</span>
});

data.<span class="hljs-title function_">watch</span>(<span class="hljs-function">() =&gt;</span> {
  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(data.<span class="hljs-property">val</span>);
});

data.<span class="hljs-property">val</span> = <span class="hljs-string">"change val"</span>;</code></pre>
        <p>이 예시들은 객체 데이터를 Stanz 인스턴스로 설정하여 리스닝하는 기본적인 특징을 보여줍니다.</p>
        <p>더 완벽한 기능은 <a href="https://github.com/ofajs/stanz" target="_blank">stanz</a>를 참조하세요.</p>
