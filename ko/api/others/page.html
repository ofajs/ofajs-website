<body>
  <o-app src="../../../js/app-config.js">
    <template page>
      <link rel="stylesheet" href="../../../css/github-markdown.css" />
      <link rel="stylesheet" href="../../../css/hljs.css" />
      <l-m src="../../../comps/center-block.html"></l-m>
      <l-m src="../../../comps/article-code.html"></l-m>

          height: 100%;

      <link rel="stylesheet" href="../../../css/page.css" />
      <article class="markdown-body">
        <h1>o-page 컴포넌트</h1>
        <p><code>o-page</code>는 ofa.js의 핵심 컴포넌트 중 하나로, 하나의 독립적인 페이지 또는 페이지 모듈을 대표합니다. 다음은 <code>o-page</code>의 일부 주요 속성과 메서드입니다:</p>
        <h2>src 속성</h2>
        <p><code>src</code> 속성은 페이지 모듈의 구체적인 주소를 지정하는 데 사용됩니다. 이는 페이지의 콘텐츠와 동작을 지정하는 핵심 속성으로, 애플리케이션에 특정 페이지의 콘텐츠를 어디서 로드해야 하는지 알려줍니다.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> page = <span class="hljs-variable language_">this</span>;</code></pre>
        <h2>goto 메서드</h2>
        <p><code>goto</code> 메서드는 현재 페이지에서 다른 페이지로 이동하는 데 사용됩니다. <code>app</code>의 <code>goto</code> 메서드에 비해, <code>page</code>의 <code>goto</code> 메서드는 <strong>상대 주소</strong>를 사용하여 다른 페이지로 네비게이션할 수 있습니다.</p>
        <pre><code class="hljs language-javascript">page.<span class="hljs-title function_">goto</span>(<span class="hljs-string">&quot;./page2.html&quot;</span>);</code></pre>
        <h2>replace 메서드</h2>
        <p><code>replace</code> 메서드는 현재 페이지를 다른 페이지로 교체하는 데 사용됩니다. 이는 <code>app</code>의 <code>replace</code> 메서드와 유사하지만, 페이지 내에서 교체 작업을 수행합니다.</p>
        <pre><code class="hljs language-javascript">page.<span class="hljs-title function_">replace</span>(<span class="hljs-string">&quot;./new-page.html&quot;</span>);</code></pre>
        <h2>back 메서드</h2>
        <p><code>back</code> 메서드는 이전 페이지로 돌아가는 데 사용됩니다. 이는 사용자를 이전 페이지로 이동시키며, 브라우저의 뒤로 가기 작업과 유사합니다.</p>
        <pre><code class="hljs language-javascript">page.<span class="hljs-title function_">back</span>();</code></pre>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
