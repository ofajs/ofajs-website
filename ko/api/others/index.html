      <article class="markdown-body">
        <h1>index</h1>
        <p><code>index</code> 속성은 요소가 부모 요소 내에서 차지하는 위치를 가져올 때 사용됩니다. 이 위치는 0부터 세며, 첫 번째 요소의 위치는 0, 두 번째는 1, 이런 식으로 계속됩니다.</p>
        <p>아래 예제에서는 <code>index</code> 속성을 사용하여 요소가 부모 요소 아래에서의 위치를 가져오는 방법을 보여줍니다:</p>
        <o-playground name="index - 위치 가져오기" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <ul>
        <li>I am 1</li>
        <li id="target">I am target</li>
        <li>I am 3</li>
      </ul>
      <div id="logger" style="color: green">로거</div>
      <script>
        setTimeout(() => {
          $("#logger").text = $("#target").index;
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
        <p>이 예시에서는 먼저 <code>id</code>가 &quot;target&quot;인 <code>&lt;li&gt;</code> 요소를 선택합니다. 그런 다음 <code>index</code> 속성을 사용하여 해당 요소가 부모 요소 <code>&lt;ul&gt;</code> 아래에서의 위치, 즉 두 번째 요소를 가져오므로 <code>index</code> 값은 1입니다. 그런 다음 이 값을 <code>id</code>가 &quot;logger&quot;인 <code>&lt;div&gt;</code> 요소에 표시합니다.</p>
      </article>
