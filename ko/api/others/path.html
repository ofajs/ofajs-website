        <h1>PATH</h1>
        <p><code>PATH</code> 속성은 보통 사용자 정의 컴포넌트 또는 페이지 컴포넌트에 사용되며, 해당 컴포넌트의 등록된 컴포넌트 파일 경로를 가져오는 데 사용됩니다. 이는 개발 과정에서 컴포넌트의 출처를 파악하는 데 도움이 되며, 특히 다른 리소스 파일을 참조하거나 로드해야 할 때 <code>PATH</code> 속성을 사용하여 파일 경로를 구성할 수 있습니다.</p>
        <p>다음은 간단한 예시로, 사용자 정의 컴포넌트에서 <code>PATH</code> 속성을 사용하는 방법을 보여줍니다：</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> componentPath = $(<span class="hljs-string">&quot;#myCustomComponent&quot;</span>).<span class="hljs-property">PATH</span>;</code></pre>
        <p>이 예제에서는 <code>id</code>가 &quot;myCustomComponent&quot;인 <code>my-comp</code> 요소를 선택한 다음, <code>PATH</code> 속성을 통해 해당 사용자 정의 구성요소의 파일 경로를 가져왔습니다. 스크립트 부분에서 <code>componentPath</code> 변수를 필요에 따라 사용할 수 있습니다. 예를 들어, 다른 리소스 파일의 경로를 구성하거나 다른 작업을 수행하는 데 사용할 수 있습니다.</p>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
