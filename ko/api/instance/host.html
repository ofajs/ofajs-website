<body>
  <o-app src="../../../js/app-config.js">
    <template page>
      <link rel="stylesheet" href="../../../css/github-markdown.css" />
      <link rel="stylesheet" href="../../../css/hljs.css" />
      <l-m src="../../../comps/center-block.html"></l-m>
      <l-m src="../../../comps/article-code.html"></l-m>
      <l-m src="https://playground.ofajs.com/comps/o-playground/o-playground.html"></l-m>
      <style>
        :host {
          display: block;
          height: 100%;
          box-sizing: border-box;
          overflow: auto;
        }
      </style>
      <link rel="stylesheet" href="../../../css/page.css" />
      <article class="markdown-body">
        <h1>host</h1>
        <p><code>host</code> 속성을 사용하면 요소의 호스트 컴포넌트 인스턴스를 얻을 수 있습니다. 이는 컴포넌트 내부에서 호스트 컴포넌트의 데이터와 메서드에 접근하는 데 매우 유용합니다.</p>
        <p>아래는 <code>host</code> 속성을 사용하여 호스트 컴포넌트의 인스턴스를 가져오는 예시입니다:</p>
        <o-playground name="host - 호스트 가져오기" style="--editor-height: 700px">
          <code path="demo.html" preview>
    <template>
      <o-page src="./page1.html"></o-page>
    </template>
  </code>
          <code path="page1.html">
    <template page>
      <l-m src="./user-card.html"></l-m>
      <user-card username="tom"></user-card>
      <script>
        export default async function(){
          return {
            data: {
              greeting: "Hello"
            },
            proto: {
              sayHi(){
                return `${this.greeting}, I'm the host!`;
              }
            }
          };
        }
      </script>
    </template>
  </code>
          <code path="user-card.html" active>
    <template component>
      <style>
        :host{display:block;border:1px solid #ddd;padding:12px;margin:8px;border-radius:4px;}
      </style>
      <div>Username: {{username}}</div>
      <button on:click="onClick">Say Hi</button>
      <div>Response: {{response}}</div>
      <script>
        export default {
          tag: "user-card",
          attrs:{
            username: null
          },
          data: {
            response: "-"
          },
          proto: {
            onClick(){
              this.response = this.host.sayHi();
            }
          },
          ready(){
            console.log("Host method:", this.host.sayHi());
          },
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>이 예제에서는 사용자 정의 컴포넌트 <code>user-card</code>를 생성하고, 컴포넌트 내부에서 <code>this.host</code>를 통해 호스트 컴포넌트(페이지)의 메서드 <code>sayHi</code>에 접근하여 컴포넌트와 호스트 간의 상호작용을 구현했습니다.</p>
        <p>요소가 컴포넌트나 페이지 모듈 내에 없을 경우, <code>host</code>의 값은 <code>null</code>이 됩니다. 예:</p>
        <o-playground name="host - 호스트 없음" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <ul>
        <li id="target">
          I am target
        </li>
      </ul>
      <div id="logger" style="border:red solid 1px;padding:8px;">-</div>
      <script>
        setTimeout(()=>{
          $("#logger").text = String($("#target").host);
        },500);
      </script>
    </template>
  </code>
        </o-playground>
        <p>이 예시에서 <code>#target</code> 요소는 body 아래에 있으며, 어떤 컴포넌트나 페이지 내부에 있지 않으므로 <code>$(&quot;#target&quot;).host</code>의 값은 <code>null</code>입니다.</p>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
  </o-app>
