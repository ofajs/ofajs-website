  <o-app src="../../../js/app-config.js">
    <template page>
      <link rel="stylesheet" href="../../../css/github-markdown.css" />

      <l-m src="../../../comps/center-block.html"></l-m>
      <l-m src="../../../comps/article-code.html"></l-m>

          display: block;
          height: 100%;
          box-sizing: border-box;
          overflow: auto;
        }
      </style>
      <link rel="stylesheet" href="../../../css/page.css" />
      <article class="markdown-body">
        <h1>ele</h1>
        <p><code>ele</code> 속성을 통해 인스턴스의 실제 <a href="https://developer.mozilla.org/zh-CN/docs/Web/API/Element" target="_blank">Element 요소</a>를 가져올 수 있으며, 이를 통해 네이티브 속성이나 메서드를 사용할 수 있습니다.</p>
        <o-playground name="ele - 요소 가져오기" style="--editor-height: 320px">
          <code path="demo.html">
    <template>
      <ul>
        <li id="target">나는 대상입니다</li>
      </ul>
      <div id="logger" style="color:red;"></div>
      <script>
        setTimeout(()=>{
          var ele = $("#target").ele;
          ele.innerHTML = '<b>대상 변경</b>';
          \$("#logger").text = ele.clientWidth;
        },500);
      </script>
    </template>
  </code>
        </o-playground>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
