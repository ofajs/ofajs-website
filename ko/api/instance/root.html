<body>
  <o-app src="../../../js/app-config.js">
    <template page>
      <link rel="stylesheet" href="../../../css/github-markdown.css" />
      <link rel="stylesheet" href="../../../css/hljs.css" />
      <l-m src="../../../comps/center-block.html"></l-m>
      <l-m src="../../../comps/article-code.html"></l-m>
      <l-m src="https://playground.ofajs.com/comps/o-playground/o-playground.html"></l-m>
      <style>
        :host {
          display: block;
          height: 100%;
          box-sizing: border-box;
          overflow: auto;
        }
      </style>
      <link rel="stylesheet" href="../../../css/page.css" />
      <article class="markdown-body">
        <h1>root</h1>
        <p><code>root</code> 속성을 사용하여 요소의 루트 노드를 가져올 수 있습니다.</p>
        <p>페이지에서 일반 요소의 루트 노드는 모두 <code>document</code> 인스턴스이다.</p>
        <o-playground name="root - 루트 노드" style="--editor-height: 320px">
          <code path="demo.html">
    <template>
      <ul>
        <li id="target">I am target</li>
      </ul>
      <div id="logger" style="padding:16px;color:green;"></div>
      <script>
        setTimeout(()=>{
          $('#logger').text = $("#target").root.ele === document;
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>섀도우 노드 내부의 요소</h2>
        <p>컴포넌트 내부 요소와 외부 환경이 격리되어 있기 때문에, 섀도우 노드 내부 요소의 <code>root</code> 속성은 섀도우 루트 노드입니다.</p>
        <o-playground name="root - 섀도우 노드" style="--editor-height: 600px">
          <code path="demo.html" preview>
    <template>
      <l-m src="./test-root.html"></l-m>
      <test-root></test-root>
      <script>
        setTimeout(()=>{
          $("test-root").shadow.$("#target").text = '외부에서 대상 변경 - ' + new Date();
        },1000);
      </script>
    </template>
  </code>
          <code path="test-root.html" active>
    <template component>
        <ul>
            <li>항목 1</li>
            <li id="target">항목 2</li>
            <li>항목 3</li>
        </ul>
        <h3>로거1:</h3>
        <div id="logger1" style="color:red;">{{l1}}</div>
        <h3>로거2:</h3>
        <div id="logger2" style="color:green;">{{l2}}</div>
        <script>
            export default {
                tag:"test-root",
                data:{
                    l1:"",
                    l2:""
                },
                ready(){
                    this.l1 = this.shadow.$("#target").root === this.shadow;
                    this.l2 = this.root.ele === document;
                }
            };
        </script>
    </template>
  </code>
        </o-playground>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
  </o-app>
  <o-root-provider name="pui" theme="dark"></o-root-provider>
</body>

</html>
