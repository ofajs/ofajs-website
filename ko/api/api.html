        <h1>API 문서</h1>
        <p> ofa.js는 템플릿 문법뿐만 아니라 DOM을 직접 조작할 수 있는 풍부한 API도 제공합니다. <a href="https://jquery.com/" target="_blank">jQuery</a> 처럼, 간결한 ofa.js 문법으로 장황한 네이티브 JavaScript를 대체하여 쉽게 DOM 조작을 완료할 수 있습니다. </p>
        <p> 컴포넌트나 페이지 모듈의 생명 주기 함수 및 사용자 정의 메서드 내에서 언제든지 ofa.js가 제공하는 API를 호출하여 DOM 요소를 유연하고 효율적으로 조작할 수 있습니다. </p>

            <api-item>
              <a href="./instance/dollar.html" olink="">$(selector)</a>

            </api-item>
            <api-item>
              <a href="./instance/all.html" olink="">all</a>

            </api-item>
            <api-item>

            </api-item>
            <api-item>

            </api-item>
            <api-item>

      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
