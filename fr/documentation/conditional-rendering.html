        <h1>Rendu conditionnel</h1>
        <p>Dans ofa.js, le rendu conditionnel est une fonctionnalité importante qui permet de décider de l&#39;affichage d&#39;un élément ou d&#39;un composant en fonction de l&#39;état des données. ofa.js propose un schéma de rendu conditionnel basé sur les composants, implémenté via les composants <code>o-if</code>, <code>o-else-if</code> et <code>o-else</code>.</p>
        <h2>Composant o-if</h2>
        <p>Le composant <code>o-if</code> est utilisé pour décider si son contenu doit être rendu ou non selon la valeur de vérité d’une expression. Lorsque l’attribut lié <code>value</code> est vrai, le contenu du composant est rendu ; sinon, il n’apparaît pas dans le DOM.</p>
        <o-playground name="Exemple de fonctionnement d'o-if" style="--editor-height: 500px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <button on:click="isHide = !isHide">Basculer l'affichage</button>
      <o-if :value="!isHide">
        <p>{{val}}</p>
      </o-if>
      <script>
        export default async () => {
          return {
            data: {
              isHide: false,
              val: "Hello ofa.js Demo Code",
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h3>principe de fonctionnement de o-if</h3>
        <p><code>o-if</code> ne rendra le contenu dans le DOM que lorsque la condition est vraie ; lorsque la condition est fausse, les éléments DOM à l&#39;intérieur de <code>o-if</code> sont complètement supprimés. Cette approche convient aux cas où la condition change peu fréquemment, car elle implique la création et la destruction du DOM.</p>
        <h2>Composants o-else-if et o-else</h2>
        <p>Lorsque plusieurs branches conditionnelles sont nécessaires, vous pouvez utiliser les composants <code>o-else-if</code> et <code>o-else</code> avec <code>o-if</code> pour réaliser le rendu conditionnel multi-branches.</p>
        <ul>
          <li><code>o-if</code>：le premier composant de condition obligatoire</li>
          <li><code>o-else-if</code>：composant de condition intermédiaire optionnel, peut y en avoir plusieurs</li>
          <li><code>o-else</code>：composant de condition par défaut optionnel, placé en dernier</li>
        </ul>
        <o-playground name="Exemple de rendu conditionnel multi-branches" style="--editor-height: 500px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <button on:click="num++">Toggle Display - {{num}}</button>
      <!-- En fonction du résultat de num modulo 3, bascule l'affichage de différents contenus -->
      <o-if :value="num % 3 === 0">
        <p>❤️ 0 / 3</p>
      </o-if>
      <o-else-if :value="num % 3 === 1">
        <p>😊 1 / 3</p>
      </o-else-if>
      <o-else>
        <p>😭 2 / 3</p>
      </o-else>
      <script>
        export default async () => {
          return {
            data: {
              num: 0,
            },
          };
        };
      </script>
    </template>
  </code>

    <template page>
      <style>
        :host {

      <div>

        <p>Rôle actuel: {{role}}</p>
        <o-if :value="role === 'admin'">
          <div class="admin-panel">
            <h3>Panneau d'administration</h3>
            <button>Gérer les utilisateurs</button>
            <button>Paramètres système</button>
          </div>
        </o-if>
        <o-else-if :value="role === 'user'">
          <div class="user-info">
            <h3>Informations utilisateur</h3>
            <p>Bienvenue {{userName}}!</p>
          </div>
        </o-else-if>
        <o-else>
          <p>Veuillez vous connecter pour voir le contenu</p>
        </o-else>
      </div>
      <script>
        export default async () => {
          return {
            data: {
              role: 'guest',
              userName: 'Invité'
            },
            proto: {
              toggleUserRole() {
                if (this.role === 'guest') {
                  this.role = 'user';
                  this.userName = 'Zhang San';
                } else if (this.role === 'user') {
                  this.role = 'admin';
                } else {
                  this.role = 'guest';
                  this.userName = '';
                }
              }
            }
          };
        };
      </script>
    </template>
  </code>

        <h3>Affichage de l&#39;état de validation du formulaire</h3>
        <o-playground name="Exemple d'affichage de l'état de validation du formulaire" style="--editor-height: 500px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
        input {
          margin: 5px;
          padding: 5px;
        }
      </style>
      <div>
        <h3>Exemple de validation d'email</h3>
        <input type="email" :value="email" on:input="email = $event.target.value" placeholder="Entrez l'adresse email">
        <o-if :value="email && isValidEmail(email)">
          <p style="color:green;">✓ Format d'email valide</p>
        </o-if>
        <o-else-if :value="email && !isValidEmail(email) && email.length > 0">
          <p style="color:red;">✗ Format d'email invalide</p>
        </o-else-if>
        <o-else>
          <p style="color:orange;">Veuillez entrer une adresse email pour validation</p>
        </o-else>
      </div>
      <script>
        export default async () => {
          return {
            data: {
              email: ''
            },
            proto: {
              isValidEmail(email) {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return emailRegex.test(email);
              }
            }
          };
        };
      </script>
    </template>
  </code>

        <h2>Meilleures pratiques de rendu conditionnel</h2>
        <ol>
          <li>
            <p><strong>Cas d&#39;utilisation</strong> : Lorsque les éléments basculent rarement dans différentes conditions, il est plus approprié d&#39;utiliser <code>o-if</code>, car cela permet de supprimer complètement les éléments inutiles et d&#39;économiser de la mémoire.</p>
          </li>
          <li>
            <p><strong>Considérations de performance</strong> : Les éléments qui basculent fréquemment sont mieux adaptés à l&#39;utilisation de liaisons de classe (comme <code>class:hide</code>) plutôt qu&#39;au rendu conditionnel, car le rendu conditionnel implique la création et la destruction du DOM.</p>
          </li>
          <li>
            <p><strong>Clarté de la structure</strong> : Le rendu conditionnel est particulièrement adapté au basculement de contenu avec des structures différentes, comme les onglets, les guides d&#39;étapes, etc.</p>
          </li>
        </ol>
