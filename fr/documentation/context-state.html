        <h1>État du contexte</h1>
        <p>L&#39;état de contexte est le mécanisme dans ofa.js permettant le partage de données entre composants. Grâce au modèle fournisseur (Provider) et consommateur (Consumer), il est possible de transmettre des données entre composants parent-enfant ou à travers plusieurs niveaux, sans avoir à les faire passer par les props étage par étage.</p>
        <h2>Concepts clés</h2>
        <ul>
          <li><strong>o-provider</strong> : fournisseur de données, définit les données à partager</li>
          <li><strong>o-consumer</strong> : consommateur de données, récupère les données du fournisseur le plus proche</li>
          <li><strong>watch:xxx</strong> : surveille les changements de données du consommateur et les lie aux propriétés du composant ou du module de page</li>
        </ul>
        <h2>o-provider Fournisseur</h2>
        <p>Le composant <code>o-provider</code> sert à définir un fournisseur de données partagées. Il s’identifie par l’attribut <code>name</code> et définit les données à partager via des attributs (comme <code>custom-a=&quot;value&quot;</code>).</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">o-provider</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;userInfo&quot;</span> <span class="hljs-attr">custom-name</span>=<span class="hljs-string">&quot;张三&quot;</span> <span class="hljs-attr">custom-age</span>=<span class="hljs-string">&quot;25&quot;</span>&gt;</span>
  ...
<span class="hljs-tag">&lt;/<span class="hljs-name">o-provider</span>&gt;</span></code></pre>
        <h3>Attributs</h3>
        <ul>
          <li><code>name</code> : le nom d&#39;identification unique du fournisseur, utilisé par les consommateurs pour rechercher le fournisseur correspondant</li>
        </ul>
        <h3>Caractéristiques</h3>
        <ol>
          <li><strong>Transmission automatique des attributs</strong> : tous les attributs non réservés du provider sont transmis comme données partagées</li>
          <li><strong>Mise à jour réactive</strong> : lorsque les données du provider changent, le consumer correspondant au même name se met à jour automatiquement</li>
          <li><strong>Recherche hiérarchique</strong> : le consumer commence la recherche des données correspondant au name depuis le provider le plus proche dans la hiérarchie</li>
        </ol>
        <h2>o-consumer Consommateur</h2>
        <p>Le composant <code>o-consumer</code> est utilisé pour consommer (utiliser) les données d&#39;un fournisseur. Il spécifie le nom du fournisseur à consommer via l&#39;attribut <code>name</code>.</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">o-consumer</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;userInfo&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-consumer</span>&gt;</span></code></pre>
        <h3>Attributs</h3>
        <ul>
          <li><code>name</code>: Nom du fournisseur à consommer</li>
        </ul>
        <h3>Caractéristiques</h3>
        <ol>
          <li><strong>Acquisition automatique des données</strong> : le consommateur récupère automatiquement les données correspondantes au nom le plus récemment fournies par le fournisseur parent le plus proche </li>
          <li><strong>Fusion des propriétés</strong> : si plusieurs fournisseurs portant le même nom possèdent une certaine propriété, la propriété du fournisseur le plus proche du consommateur est prioritaire </li>
          <li><strong>Écoute des propriétés</strong> : il est possible d’écouter les changements d’une propriété spécifique via <code>watch:xxx</code></li>
        </ol>
        <h2>Écouter les changements de données</h2>
        <p>En utilisant <code>watch:xxx</code>, vous pouvez écouter les changements des données du fournisseur :</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">o-consumer</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;userInfo&quot;</span> <span class="hljs-attr">watch:custom-age</span>=<span class="hljs-string">&quot;age&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-consumer</span>&gt;</span>

<span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">
<span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> {
  <span class="hljs-attr">data</span>:{
    <span class="hljs-attr">age</span>: <span class="hljs-number">0</span>,
  },
};
</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span></code></pre>

        <h2>o-root-provider Fournisseur racine</h2>
        <p><code>o-root-provider</code> est un fournisseur global au niveau racine, dont la portée s&#39;étend à l&#39;ensemble du document. Même en l&#39;absence de fournisseur parent, le consommateur peut toujours accéder aux données du fournisseur racine.</p>
        <pre><code class="hljs language-html"><span class="hljs-comment">&lt;!-- Définir le fournisseur racine global --&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">o-root-provider</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;globalConfig&quot;</span> <span class="hljs-attr">custom-theme</span>=<span class="hljs-string">&quot;dark&quot;</span> <span class="hljs-attr">custom-language</span>=<span class="hljs-string">&quot;zh-CN&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-root-provider</span>&gt;</span>

<span class="hljs-comment">&lt;!-- Peut être consommé n&#x27;importe où dans la page --&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">o-consumer</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;globalConfig&quot;</span> <span class="hljs-attr">watch:custom-theme</span>=<span class="hljs-string">&quot;theme&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-consumer</span>&gt;</span></code></pre>
        <h3>Caractéristiques</h3>
        <ol>
          <li><strong>Portée globale</strong> : Les données du fournisseur racine sont disponibles sur toute la page</li>
          <li><strong>Priorité</strong> : Lorsqu&#39;un provider et un root-provider de même nom existent simultanément, le provider le plus proche du consommateur est prioritaire</li>
          <li><strong>Supprimable</strong> : Après suppression du root-provider, le consommateur revient à la recherche d&#39;autres providers</li>
        </ol>

        <h2>Méthode getProvider(name)</h2>
        <p><code>getProvider(name)</code> est une méthode d&#39;instance utilisée pour obtenir l&#39;élément fournisseur correspondant au nom. Elle recherche le fournisseur parent le plus proche en remontant le DOM, et retourne le fournisseur racine si aucun n&#39;est trouvé.</p>
        <h3>Utiliser la méthode getProvider(name) dans un composant ou un module de page</h3>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">
...
<span class="hljs-attr">proto</span>:{
  <span class="hljs-title function_">changeValue</span>(<span class="hljs-params"></span>){
    <span class="hljs-keyword">const</span> provider = <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">getProvider</span>(<span class="hljs-string">&quot;name&quot;</span>);
    provider.<span class="hljs-property">customValue</span> = <span class="hljs-string">&quot;nouvelle valeur&quot;</span>;
  }
}
...
</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span></code></pre>

<span class="hljs-keyword">if</span> (provider) {

}

        <h3>Cas d&#39;utilisation</h3>
        <ol>

          <li><strong>Traversée du Shadow DOM</strong> : Recherche du fournisseur parent à l&#39;intérieur du Shadow DOM</li>
          <li><strong>Gestion des événements</strong> : Obtention du fournisseur correspondant dans les rappels d&#39;événements</li>
        </ol>
        <h2>dispatch Distribution d&#39;événements</h2>
        <p>Le provider peut distribuer des événements à tous les consumers qui le consomment :</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">o-provider</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;test&quot;</span> <span class="hljs-attr">id</span>=<span class="hljs-string">&quot;myProvider&quot;</span> <span class="hljs-attr">custom-value</span>=<span class="hljs-string">&quot;Bonjour&quot;</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">o-consumer</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;test&quot;</span> <span class="hljs-attr">on:custom-event</span>=<span class="hljs-string">&quot;handleEvent&quot;</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">div</span>&gt;</span>{{customValue}}<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span>
  <span class="hljs-tag">&lt;/<span class="hljs-name">o-consumer</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">o-provider</span>&gt;</span>

<span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">
<span class="hljs-comment">// Émettre l&#x27;événement</span>
$(<span class="hljs-string">&quot;#myProvider&quot;</span>).<span class="hljs-title function_">dispatch</span>(<span class="hljs-string">&quot;custom-event&quot;</span>, {
  <span class="hljs-attr">data</span>: { <span class="hljs-attr">message</span>: <span class="hljs-string">&quot;Bonjour le Monde&quot;</span> }
});
</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span></code></pre>

              if (provider && this.inputText.trim()) {

          <li><strong>Nommage raisonnable</strong> : utilisez des noms explicites pour le provider et le consumer afin de faciliter le suivi et la maintenance </li>

          <li><strong>Nettoyage automatique</strong> : lorsqu’un provider est supprimé, le consumer efface automatiquement les données ; aucune action manuelle n’est requise</li>
