        <h1>État du contexte</h1>
        <p>Le contexte d&#39;état est un mécanisme de partage de données entre composants dans ofa.js. Grâce au modèle fournisseur (Provider) et consommateur (Consumer), il permet le transfert de données entre composants parents-enfants ou entre composants de différents niveaux hiérarchiques, sans avoir à transmettre les données via les props de manière séquentielle.</p>
        <h2>Concepts clés</h2>
        <ul>
          <li><strong>o-provider</strong>: fournisseur de données, définit les données à partager</li>
          <li><strong>o-consumer</strong>: consommateur de données, obtient les données du fournisseur le plus proche</li>
          <li><strong>watch:xxx</strong>: écoute les changements des données du consommateur et les lie aux propriétés du composant ou du module de page</li>
        </ul>
        <h2>o-provider fournisseur</h2>
        <p>Le composant <code>o-provider</code> sert à définir un fournisseur de données partagées. Il s’identifie par l’attribut <code>name</code> et définit les données à partager au moyen d’attributs (par exemple <code>custom-a=&quot;value&quot;</code>).</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">o-provider</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;userInfo&quot;</span> <span class="hljs-attr">custom-name</span>=<span class="hljs-string">&quot;Jean Dupont&quot;</span> <span class="hljs-attr">custom-age</span>=<span class="hljs-string">&quot;25&quot;</span>&gt;</span>
  ...
<span class="hljs-tag">&lt;/<span class="hljs-name">o-provider</span>&gt;</span></code></pre>
        <h3>Propriétés</h3>
        <ul>
          <li><code>name</code> : le nom d&#39;identification unique du fournisseur, utilisé par le consommateur pour trouver le fournisseur correspondant</li>
        </ul>
        <h3>Caractéristiques</h3>
        <ol>
          <li><strong>Transmission automatique des propriétés</strong> : toutes les propriétés non réservées du fournisseur sont partagées en tant que données</li>
          <li><strong>Mise à jour réactive</strong> : lorsque les données du fournisseur changent, le consommateur correspondant au nom spécifique de ce fournisseur se met à jour automatiquement</li>
          <li><strong>Recherche hiérarchique</strong> : le consommateur commence à rechercher les données du nom correspondant à partir du fournisseur le plus proche situé au niveau supérieur</li>
        </ol>
        <h2>o-consumer consommateur</h2>
        <p>Le composant <code>o-consumer</code> sert à consommer (utiliser) les données du fournisseur. Il spécifie le nom du fournisseur à consommer via l’attribut <code>name</code>.</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">o-consumer</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;userInfo&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-consumer</span>&gt;</span></code></pre>
        <h3>Propriétés</h3>
        <ul>
          <li><code>name</code>: Nom du fournisseur à consommer</li>
        </ul>
        <h3>Caractéristiques</h3>
        <ol>
          <li><strong>Acquisition automatique des données</strong> : le consommateur récupère automatiquement les données du fournisseur le plus proche portant le même nom.</li>
          <li><strong>Fusion des propriétés</strong> : si plusieurs fournisseurs du même nom possèdent une propriété, celle du fournisseur le plus proche du consommateur est prioritaire.</li>
          <li><strong>Surveillance des propriétés</strong> : il est possible d&#39;écouter les changements d&#39;une propriété spécifique via <code>watch:xxx</code>.</li>
        </ol>
        <h2>Surveiller les changements de données</h2>
        <p>En utilisant <code>watch:xxx</code> on peut écouter les changements de données du fournisseur :</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">o-consumer</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;userInfo&quot;</span> <span class="hljs-attr">watch:custom-age</span>=<span class="hljs-string">&quot;age&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-consumer</span>&gt;</span>

<span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">
<span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> {
  <span class="hljs-attr">data</span>:{
    <span class="hljs-attr">age</span>: <span class="hljs-number">0</span>,
  },
};
</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span></code></pre>

        <h2>o-root-provider fournisseur racine</h2>
        <p><code>o-root-provider</code> est un fournisseur global de niveau racine, dont la portée est l&#39;ensemble du document. Même en l&#39;absence d&#39;un fournisseur parent, les consommateurs peuvent accéder aux données du fournisseur racine.</p>
        <pre><code class="hljs language-html"><span class="hljs-comment">&lt;!-- Définir le fournisseur racine global --&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">o-root-provider</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;globalConfig&quot;</span> <span class="hljs-attr">custom-theme</span>=<span class="hljs-string">&quot;dark&quot;</span> <span class="hljs-attr">custom-language</span>=<span class="hljs-string">&quot;zh-CN&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-root-provider</span>&gt;</span>

<span class="hljs-comment">&lt;!-- Peut être consommé n&#x27;importe où dans la page --&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">o-consumer</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;globalConfig&quot;</span> <span class="hljs-attr">watch:custom-theme</span>=<span class="hljs-string">&quot;theme&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-consumer</span>&gt;</span></code></pre>
        <h3>Caractéristiques</h3>
        <ol>
          <li><strong>Portée globale</strong> : les données du fournisseur racine sont disponibles sur toute la page</li>
          <li><strong>Priorité</strong> : lorsqu’un fournisseur et un fournisseur-racine portant le même name coexistent, le fournisseur le plus proche du consommateur est prioritaire</li>
          <li><strong>Supprimable</strong> : après suppression du fournisseur-racine, le consommateur retombe sur la recherche d’un autre fournisseur</li>
        </ol>

        <h2>Méthode getProvider(name)</h2>
        <p><code>getProvider(name)</code> est une méthode d&#39;instance qui permet d&#39;obtenir l&#39;élément fournisseur correspondant au nom donné. Elle remonte le DOM pour trouver le fournisseur le plus proche, et si aucun n&#39;est trouvé, elle retourne le root-provider.</p>
        <h3>Utiliser la méthode getProvider(name) dans un composant ou un module de page</h3>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">
...
<span class="hljs-attr">proto</span>:{
  <span class="hljs-title function_">changeValue</span>(<span class="hljs-params"></span>){
    <span class="hljs-keyword">const</span> provider = <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">getProvider</span>(<span class="hljs-string">&quot;name&quot;</span>);
    provider.<span class="hljs-property">customValue</span> = <span class="hljs-string">&quot;new value&quot;</span>;
  }
}
...
</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span></code></pre>

<span class="hljs-keyword">if</span> (provider) {

        <h3>Scénarios d&#39;utilisation</h3>
        <ol>
          <li><strong>Récupération manuelle des données</strong>: Utilisé dans les scénarios où vous devez accéder directement aux données du fournisseur.</li>
          <li><strong>À travers Shadow DOM</strong>: Rechercher un fournisseur parent à l&#39;intérieur du Shadow DOM.</li>
          <li><strong>Gestion des événements</strong>: Obtenir le fournisseur correspondant dans le callback d&#39;événement.</li>
        </ol>

  <span class="hljs-tag">&lt;<span class="hljs-name">o-consumer</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;test&quot;</span> <span class="hljs-attr">on:custom-event</span>=<span class="hljs-string">&quot;handleEvent&quot;</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">div</span>&gt;</span>{{customValue}}<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span>
  <span class="hljs-tag">&lt;/<span class="hljs-name">o-consumer</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">o-provider</span>&gt;</span>

<span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">

      <script>
        export default {
          tag:"chat-input",
          data: {
            inputText: "",
          },
          proto: {
            sendMessage() {
              const provider = this.getProvider("chat");
              if (provider && this.inputText.trim()) {
                provider.dispatch("new-message", {
                  data: { text: this.inputText }
                });
                this.inputText = "";
              }
            },
          },
        };
      </script>

        <h2>Meilleures pratiques</h2>
        <ol>
          <li><strong>Nommage pertinent</strong> : utilisez des noms explicites pour les providers et consumers afin de faciliter le suivi et la maintenance </li>
          <li><strong>Évitez l’usage excessif</strong> : l’état de contexte sert au partage de données entre composants ; pour les composants parent-enfant, privilégiez les props </li>
          <li><strong>Provider racine pour la configuration globale</strong> : les thèmes, langues et états globaux conviennent à un root-provider </li>
          <li><strong>Nettoyage automatique</strong> : lorsqu’un provider est supprimé, les consumers effacent automatiquement leurs données, aucune action manuelle n’est requise</li>
        </ol>

        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
