        <h1>Liaison de propriété</h1>
        <p>ofa.js permet de lier des données aux propriétés des objets après l&#39;instanciation des éléments, telles que les attributs value ou checked d&#39;un élément input, etc.</p>
        <h2>Liaison de propriété unidirectionnelle</h2>
        <p>La liaison de propriété unidirectionnelle utilise la syntaxe <code>:toKey=&quot;fromKey&quot;</code> pour synchroniser les données du composant de manière « unidirectionnelle » vers les attributs de l&#39;élément DOM. Lorsque les données du composant changent, l&#39;attribut de l&#39;élément est mis à jour immédiatement ; mais les modifications de l&#39;élément lui-même (comme la saisie de l&#39;utilisateur) ne sont pas répercutées en sens inverse vers le composant, maintenant ainsi le flux de données unique et contrôlable.</p>
        <o-playground name="Liaison de propriété unidirectionnelle" style="--editor-height: 500px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
        input {
          margin: 5px 0;
          padding: 8px;
          width: 100%;
          box-sizing: border-box;
        }
      </style>
      <p>Valeur actuelle: {{val}}</p>
      <input type="text" :value="val" placeholder="Ceci est une zone de saisie à liaison unidirectionnelle">
      <p>Remarque : modifier le contenu directement dans la zone de saisie ne changera pas la valeur affichée ci-dessus.</p>
      <script>
        export default async () => {
          return {
            data: { val: "Hello ofa.js Demo Code" }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Liaison bidirectionnel des propriétés</h2>
        <p>La liaison de propriété bidirectionnelle utilise la syntaxe <code>sync:xxx</code>, réalisant une synchronisation bidirectionnelle entre les données du composant et les éléments DOM. Lorsque les données du composant changent, les attributs des éléments DOM sont mis à jour ; lorsque les attributs des éléments DOM changent (par exemple, lors de la saisie de l&#39;utilisateur), les données du composant sont également mises à jour en synchronisation.</p>
        <o-playground name="Liaison bidirectionnelle des propriétés" style="--editor-height: 500px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid #007acc;
          padding: 10px;
        }
        input {
          margin: 5px 0;
          padding: 8px;
          width: 100%;
          box-sizing: border-box;
        }
      </style>
      <p>Valeur actuelle : {{val}}</p>
      <input type="text" sync:value="val" placeholder="Ceci est une zone de saisie à liaison bidirectionnelle">
      <p>Astuce : modifier le contenu dans la zone de saisie mettra à jour en temps réel la valeur affichée ci-dessus</p>
      <script>
        export default async () => {
          return {
            data: { val: "Hello ofa.js Demo Code" }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h3>Caractéristiques de la liaison bidirectionnelle</h3>
        <ul>
          <li>Flux de données : composant ↔ élément DOM (bidirectionnel)</li>
          <li>Changement des données du composant → mise à jour de l&#39;élément DOM</li>
          <li>Changement de l&#39;élément DOM → mise à jour des données du composant</li>
          <li>Convient aux scénarios nécessitant une saisie utilisateur et une synchronisation des données</li>
        </ul>
        <h3>Scènes courantes de liaison bidirectionnelle</h3>
        <o-playground name="Exemple de liaison bidirectionnelle de formulaire" style="--editor-height: 700px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          padding: 15px;
          font-family: Arial, sans-serif;
        }
        .form-group {
          margin: 10px 0;
        }
        input, textarea, select {
          padding: 8px;
          margin: 5px 0;
          box-sizing: border-box;
        }
        .preview {
          margin-top: 15px;
          padding: 10px;
          background-color: #7b7b7bff;
          border-radius: 4px;
        }
      </style>
      <h3>Exemple de liaison bidirectionnelle de formulaire</h3>
      <div class="form-group">
        <label>Champ de texte :</label>
        <input type="text" sync:value="textInput" placeholder="Saisir du texte">
      </div>
      <div class="form-group">
        <label>Champ numérique :</label>
        <input type="number" sync:value="numberInput" placeholder="Saisir un nombre">
      </div>
      <div class="form-group">
        <label>Texte multilignes :</label>
        <textarea sync:value="textareaInput" rows="3" placeholder="Saisir du texte multilignes"></textarea>
      </div>
      <div class="form-group">
        <label>Liste déroulante :</label>
        <select sync:value="selectedOption">
          <option value="">Veuillez choisir...</option>
          <option value="option1">Option 1</option>
          <option value="option2">Option 2</option>
          <option value="option3">Option 3</option>
        </select>
      </div>
      <div class="form-group">
        <label>Case à cocher :</label>
        <label style="display:flex;">
          <input type="checkbox" sync:checked="isChecked" /> J'accepte les conditions
        </label>
      </div>
      <div class="preview">
        <h4>Aperçu en temps réel :</h4>
        <p>Texte : {{textInput}}</p>
        <p>Nombre : {{numberInput}}</p>
        <p>Texte multilignes : {{textareaInput}}</p>
        <p>Sélection : {{selectedOption}}</p>
        <p>État de la case à cocher : {{isChecked ? 'coché' : 'non coché'}}</p>
      </div>
      <script>
        export default async () => {
          return {
            data: { textInput: '', numberInput: 0, textareaInput: '', selectedOption: '', isChecked: false }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Points d&#39;attention</h2>
        <ol>
          <li><strong>Considérations de performance</strong> : la liaison bidirectionnelle crée des écouteurs de données ; un usage massif peut impacter les performances </li>
          <li><strong>Cohérence des données</strong> : la liaison bidirectionnelle garantit la cohérence entre données et vue, mais il faut éviter les mises à jour en boucle infinie </li>
          <li><strong>Valeur initiale</strong> : assurez-vous que les données liées possèdent une valeur initiale appropriée pour éviter l’affichage de undefined </li>
          <li><strong>Conflits d’événements</strong> : évitez d’utiliser simultanément la liaison bidirectionnelle et la gestion manuelle d’événements sur le même élément afin de prévenir tout conflit</li>
        </ol>
      </article>

            revoke
          } = await load("../../js/init.js");

            attached() {
              init(this, query);

            detached() {
              revoke(this);
            },
