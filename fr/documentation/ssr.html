        <h1>SSR et rendu isomorphe</h1>
        <blockquote>
          <p>Si vous ne savez pas ce qu’est le SSR, cela signifie que vous n’en avez pas encore besoin ; vous pouvez sauter ce chapitre pour le moment et revenir l’étudier plus tard, quand vous en ressentirez la nécessité.</p>
        </blockquote>
        <h2>Rendu isomorphe</h2>
        <p>Afin de préserver simultanément l’expérience fluide du CSR, une meilleure reconnaissance par les robots d’indexation (SEO) et un choix plus libre du langage de développement backend, ofa.js propose un mode de rendu isomorphe unique (Symphony Client-Server Rendering).</p>
        <blockquote>
          <p>Pour connaître les définitions et différences spécifiques entre CSR / SSR / SSG, veuillez directement lire la section à la fin de cet article.</p>
        </blockquote>
        <p>Le concept central du rendu isomorphe est :- Rendre le contenu initial de la page côté serveur pour garantir le SEO et la vitesse de chargement initiale</p>
        <ul>
          <li>Prendre en charge le traitement des itinéraires côté client pour maintenir l'expérience utilisateur fluide du CSR</li>
          <li>S'appliquer à tout environnement serveur pour une véritable rendu isomorphe</li>
        </ul>
        <h3>Les principes de mise en œuvre du rendu isomorphe</h3>
        <p>Le mode de rendu isomorphe d'ofa.js est basé sur le mécanisme suivant :</p>
        <ol>
          <li>Le serveur génère une page HTML complète avec une structure d'exécution universelle</li>
          <li>Le client charge le moteur d'exécution CSR</li>
          <li>Identifie automatiquement l'environnement d'exécution actuel et détermine la stratégie de rendu</li>
        </ol>

        <p><code>scsr.mjs</code> est le moteur de rendu isomorphe fourni par ofa.js ; il détermine automatiquement la stratégie de rendu selon l’état d’exécution de la page actuelle, garantissant ainsi la meilleure expérience utilisateur dans n’importe quel environnement.</p>
        <p>De même, SSG peut également appliquer cette structure pour générer des sites statiques.</p>
        <h2>Différences entre ofa.js, SSR et autres frameworks front-end</h2>
        <p>Le Symphony Client-Server Rendering (ci-après dénommé SCSR) de ofa.js est essentiellement également un mode SSR.</p>
        <p>Comparé aux solutions SSR des frameworks front-end existants tels que Vue, React, Angular, etc., le plus grand avantage d'ofa.js est qu'il <strong>ne nécessite pas de lier obligatoirement Node.js</strong>. Cela signifie que n'importe quel moteur de rendu de template côté serveur (comme Smarty pour PHP, Jinja2 pour Python, Thymeleaf pour Java, etc.) peut facilement intégrer ofa.js pour réaliser le SSR.</p>
        <h2>Aperçu des méthodes de rendu de pages web</h2>
        <p>Les applications web modernes utilisent principalement quatre méthodes de rendu : le rendu traditionnel par moteur de templates côté serveur, le CSR (Client Side Rendering, rendu côté client), le SSR (Server Side Rendering, rendu côté serveur) et le SSG (Static Site Generation, génération de sites statiques). Chaque méthode a ses avantages et ses cas d'utilisation appropriés.</p>
        <h3>Rendu de moteur de template côté serveur traditionnel</h3>
        <p>Parmi de nombreux produits Web, les moteurs de templates côté serveur restent les moyens de rendu de page les plus répandus. Les langages backend comme Go et PHP utilisent des moteurs de templates intégrés ou tiers (tels que <code>html/template</code> pour Go, Smarty/Twig/Blade pour PHP) pour injecter des données dynamiques dans les templates HTML, générer une page HTML complète en une seule fois et la renvoyer au client.</p>
        <p><strong>Avantages：</strong>- Convivial SEO, chargement rapide de la première écran</p>
        <ul>
          <li>Contrôle côté serveur, sécurité renforcée</li>
          <li>Exigences faibles sur la stack technique de l’équipe, les développeurs back-end peuvent réaliser seuls le développement</li>
        </ul>
        <p><strong>Inconvénients :</strong>- L'expérience utilisateur est médiocre, chaque interaction nécessite un rechargement de la page.</p>
        <ul>
          <li>Forte pression sur le serveur.</li>
          <li>Le couplage entre le front-end et le back-end est élevé, ce qui n'est pas propice à la division du travail et à la collaboration.</li>
        </ul>
        <h3>CSR (rendu côté client)</h3>
        <p>En mode CSR, le contenu de la page est entièrement rendu par JavaScript côté navigateur. L'<a href="./routes.html" olink="">application monopage</a> d'ofa.js en est une implémentation typique de CSR. Cette approche offre une expérience utilisateur fluide, permettant toutes les interactions sans avoir besoin de recharger la page. Les applications monopages (SPA) développées avec React ou Vue et leurs routeurs associés (tels que React Router ou Vue Router) sont des implémentations typiques de CSR.</p>
        <p><strong>Avantages：</strong>- Expérience utilisateur fluide, transitions de page sans rechargement</p>
        <ul>
          <li>Capacité de traitement côté client puissante, réponses rapides</li>
        </ul>
        <p><strong>Inconvénients :</strong>- Nuisible au SEO, les moteurs de recherche ont du mal à indexer le contenu.</p>
        <h3>SSR（rendu côté serveur）</h3>
        <p>En conservant l'expérience fluide du CSR, la page est désormais rendue en temps réel par le serveur : lorsque l'utilisateur envoie une requête, le serveur génère immédiatement le HTML complet et le renvoie, réalisant ainsi un véritable rendu côté serveur.</p>
        <p><strong>Avantages：</strong>- Convivial SEO, chargement rapide de la première écran </p>
        <ul>
          <li>Prise en charge du contenu dynamique</li>
        </ul>
        <p><strong>Inconvénients :</strong>- Serveur soumis à une forte pression</p>
        <ul>
          <li>Nécessite généralement un environnement Node.js comme runtime, ou au moins une couche intermédiaire Node.js</li>
          <li>Nécessite encore une activation côté client ultérieure pour obtenir une interaction complète</li>
        </ul>
        <h3>GSS (Génération de site statique)</h3>
        <p>Pendant la phase de construction, toutes les pages sont pré-rendues en fichiers HTML statiques, qui peuvent être directement renvoyés aux utilisateurs par le serveur après le déploiement.</p>
        <p><strong>Avantages：</strong>- Vitesse de chargement initiale rapide, SEO-friendly </p>
        <ul>
          <li>Faible charge du serveur, performances stables </li>
          <li>Haute sécurité</li>
        </ul>
        <p><strong>Inconvénients :</strong>- Mise à jour du contenu dynamique difficile</p>
        <ul>
          <li>Le temps de construction augmente avec le nombre de pages</li>
        </ul>
