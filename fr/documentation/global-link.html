        <h1>Composant global-link</h1>
        <p><code>global-link</code> est un composant outil qui permet à tous les composants de partager des styles.</p>
        <h2>Utilisation de base</h2>
        <p>Après avoir référencé <code>ofa.js</code>, référencez le composant <code>global-link</code>, référencez un fichier de style via <code>global-link</code>, pour que tous les composants chargent ce fichier de style.</p>
        <pre><code class="hljs language-html"><span class="hljs-meta">&lt;!DOCTYPE <span class="hljs-keyword">html</span>&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">html</span> <span class="hljs-attr">lang</span>=<span class="hljs-string">&quot;zh-CN&quot;</span>&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">head</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">meta</span> <span class="hljs-attr">charset</span>=<span class="hljs-string">&quot;UTF-8&quot;</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">title</span>&gt;</span>Exemple global-link<span class="hljs-tag">&lt;/<span class="hljs-name">title</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">script</span> <span class="hljs-attr">src</span>=<span class="hljs-string">&quot;https://cdn.jsdelivr.net/gh/ofajs/ofa.js/dist/ofa.min.mjs&quot;</span> <span class="hljs-attr">type</span>=<span class="hljs-string">&quot;module&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">script</span> <span class="hljs-attr">src</span>=<span class="hljs-string">&quot;https://cdn.jsdelivr.net/gh/ofajs/ofa.js/libs/global-link/dist/global-link.min.mjs&quot;</span> <span class="hljs-attr">type</span>=<span class="hljs-string">&quot;module&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">head</span>&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">body</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">o-global-link</span> <span class="hljs-attr">href</span>=<span class="hljs-string">&quot;./global.css&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-global-link</span>&gt;</span>

        <h2>Scénarios d&#39;application</h2>
        <p>⚠️ <strong>Avertissement</strong> : <code>global-link</code> pollue la portée des styles globaux, tout comme les variables globales.</p>
        <p><strong>Ne jamais utiliser ce composant dans les nouveaux projets !</strong> Si vous utilisez <code>global-link</code> dans un nouveau projet, cela signifie que la conception architecturale de votre projet est défaillante, c&#39;est le signe d&#39;un projet pourri.</p>
        <p>Utilisez uniquement dans les scénarios suivants :</p>
        <ul>
          <li>Migration de projets anciens (solution temporaire)</li>
          <li>Code pourri, projet poubelle (dépannage temporaire)</li>
        </ul>
        <h2>Solutions alternatives</h2>
        <p>Vous pouvez créer un fichier <code>public.css</code> et l’importer ensuite dans chacun de vos modules de composant (en utilisant la balise <code>link</code>). Cela vous permettra d’obtenir l’effet souhaité tout en évitant de polluer les styles globaux.</p>
        <pre><code class="hljs language-html"><span class="hljs-comment">&lt;!-- Dans le module de composant --&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">link</span> <span class="hljs-attr">rel</span>=<span class="hljs-string">&quot;stylesheet&quot;</span> <span class="hljs-attr">href</span>=<span class="hljs-string">&quot;./public.css&quot;</span>&gt;</span></code></pre>
        <h2>Points d&#39;attention</h2>
        <p>Il faut utiliser en priorité la balise <code>o-global-link</code> pour l&#39;initialisation. Ce n&#39;est qu&#39;une fois l&#39;initialisation terminée que les composants suivants appliqueront le style global.</p>
      </article>

      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
