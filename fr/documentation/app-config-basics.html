        <h1>Bases de la configuration d'application</h1>
        <p><code>app-config.js</code> Le fichier de configuration est utilisé pour définir les divers comportements de l'application. Ce chapitre présente la structure de base du fichier de configuration et tous les éléments de configuration disponibles.</p>
        <h2>Structure du fichier de configuration</h2>
        <p>Créez le fichier <code>app-config.js</code>, utilisez la syntaxe de module ES6 pour exporter les éléments de configuration :</p>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// app-config.js</span>

<span class="hljs-comment">// Adresse de la page d'accueil de l'application (obligatoire)</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> home = <span class="hljs-string">"./home.html"</span>;

<span class="hljs-comment">// Configuration de l'animation de transition de page (optionnel)</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">"translate(0, 0)"</span>,
  },
  <span class="hljs-attr">next</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">"translate(30px, 0)"</span>,
  },
  <span class="hljs-attr">previous</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">"translate(-30px, 0)"</span>,
  },
};

<span class="hljs-comment">// État de chargement (optionnel)</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> <span class="hljs-title function_">loading</span> = (<span class="hljs-params"></span>) =&gt; {
  <span class="hljs-keyword">return</span> <span class="hljs-string">"&lt;div&gt;Loading...&lt;/div&gt;"</span>;
};

<span class="hljs-comment">// Gestion des erreurs (optionnel)</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> <span class="hljs-title function_">fail</span> = (<span class="hljs-params">{ src, error }</span>) =&gt; {
  <span class="hljs-keyword">return</span> <span class="hljs-string">`&lt;div&gt;Failed to load: <span class="hljs-subst">${src}</span>&lt;/div&gt;`</span>;
};

<span class="hljs-comment">// Initialisation de l'application (optionnel)</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> ready = <span class="hljs-keyword">function</span>(<span class="hljs-params"></span>) {
  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">"App is ready"</span>);
};

<span class="hljs-comment">// Extension du prototype (optionnel)</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> proto = {
  <span class="hljs-title function_">customMethod</span>(<span class="hljs-params"></span>) {
    <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">"Custom method"</span>);
  },
};

<span class="hljs-comment">// Activer la fonction de navigation vers l'avant (optionnel)</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> allowForward = <span class="hljs-literal">true</span>;</code></pre>
        <h2>Vue d'ensemble des éléments de configuration</h2>
        <p><code>app-config.js</code> prend en charge les options de configuration suivantes :</p>
        <table>
          <thead>
            <tr>
              <th>Option de configuration</th>
              <th>Obligatoire</th>
              <th>Description</th>
              <th>Documentation détaillée</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><code>home</code></td>
              <td>✅ Obligatoire</td>
              <td>Adresse de la page d'accueil de l'application</td>
              <td>Ce chapitre</td>
            </tr>
            <tr>
              <td><code>pageAnime</code></td>
              <td>Optionnel</td>
              <td>Configuration de l'animation de transition entre pages</td>
              <td><a href="./page-transition-animation.html" olink="">Animation de transition de page</a></td>
            </tr>
            <tr>
              <td><code>loading</code></td>
              <td>Optionnel</td>
              <td>Contenu affiché lors du chargement de la page</td>
              <td><a href="./app-loading-error.html" olink="">Chargement et gestion des erreurs</a></td>
            </tr>
            <tr>
              <td><code>fail</code></td>
              <td>Optionnel</td>
              <td>Contenu affiché en cas d'échec de chargement de la page</td>
              <td><a href="./app-loading-error.html" olink="">Chargement et gestion des erreurs</a></td>
            </tr>
            <tr>
              <td><code>ready</code></td>
              <td>Optionnel</td>
              <td>Rappel exécuté après l'initialisation de l'application</td>
              <td><a href="./app-initialization.html" olink="">Initialisation de l'application</a></td>
            </tr>
            <tr>
              <td><code>proto</code></td>
              <td>Optionnel</td>
              <td>Méthodes et propriétés ajoutées au prototype de l'application</td>
              <td><a href="./app-initialization.html" olink="">Initialisation de l'application</a></td>
            </tr>
            <tr>
              <td><code>allowForward</code></td>
              <td>Optionnel</td>
              <td>Activer ou non la fonction de navigation avant du navigateur</td>
              <td><a href="./app-navigation.html" olink="">Routage et navigation</a></td>
            </tr>
          </tbody>
        </table>
        <p><code>home</code> est un élément de configuration obligatoire, spécifiant le chemin du module de la page d'accueil chargé au démarrage de l'application.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> home = <span class="hljs-string">"./pages/home.html"</span>;</code></pre>
        <p><strong>Règles de chemin :</strong>- Prend en charge les chemins relatifs (par rapport au fichier <code>app-config.js</code>)</p>
        <ul>
          <li>Prend en charge les chemins absolus</li>
          <li>Le chemin pointe vers un fichier de module de page (fichier <code>.html</code>)</li>
        </ul>
        <h2>pageAnime - Animation de changement de page</h2>
        <p><code>pageAnime</code> est une option de configuration facultative utilisée pour contrôler l'effet d'animation de transition lors du changement de page.</p>
        <h3>Utilisation de base</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">"translate(0, 0)"</span>,
  },
  <span class="hljs-attr">next</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">"translate(30px, 0)"</span>,
  },
  <span class="hljs-attr">previous</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">"translate(-30px, 0)"</span>,
  },
};</code></pre>
        <h3>Description de l'état de l'animation</h3>
        <p>L'animation de transition de page comporte trois états :</p>
        <table>
          <thead>
            <tr>
              <th>État</th>
              <th>Description</th>
              <th>Moment de déclenchement</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><code>current</code></td>
              <td>Style de la page actuelle après la fin de l'animation</td>
              <td>Une fois la commutation de page terminée</td>
            </tr>
            <tr>
              <td><code>next</code></td>
              <td>Style initial à l'entrée de la nouvelle page</td>
              <td>Lorsque la nouvelle page commence à entrer</td>
            </tr>
            <tr>
              <td><code>previous</code></td>
              <td>Style cible à la sortie de l'ancienne page</td>
              <td>Lorsque l'ancienne page commence à quitter</td>
            </tr>
          </tbody>
        </table>
        <p>Animation de transition de page prend en charge plusieurs effets, notamment :- Glissement gauche-droite (par défaut)</p>
        <ul>
          <li>Fondu enchaîné</li>
          <li>Glissement haut-bas</li>
          <li>Effet de zoom</li>
          <li>Effet de rotation</li>
          <li>Animation personnalisée</li>
        </ul>
        <p>Pour des exemples détaillés de configuration et d'effets d'animation, veuillez vous référer au chapitre <a href="./page-transition-animation.html" olink="">Animation de transition de page</a>.</p>
        <h2>Utiliser un fichier de configuration en HTML</h2>
        <p>Dans un fichier HTML, introduisez le fichier de configuration via la balise <code>o-app</code> :</p>

<span class="hljs-tag">&lt;<span class="hljs-name">html</span>&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">head</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">script</span> <span class="hljs-attr">src</span>=<span class="hljs-string">"https://cdn.jsdelivr.net/gh/kirakiray/ofa.js/dist/ofa.min.mjs"</span> <span class="hljs-attr">type</span>=<span class="hljs-string">"module"</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">head</span>&gt;</span>

<span class="hljs-tag">&lt;/<span class="hljs-name">body</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">html</span>&gt;</span></code></pre><o-playground name="Exemple de base de configuration d'application" style="--editor-height: 500px">

      <script>
        export const parent = "../../layout.html";

          load,
          query

          const {
            init,
            revoke
