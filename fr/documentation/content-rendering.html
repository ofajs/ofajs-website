<body>
  <o-app src="../../js/app-config.js">
    <template page>
      <link rel="stylesheet" href="../../css/github-markdown.css" />
      <link rel="stylesheet" href="../../css/hljs.css" />
      <l-m src="../../comps/center-block.html"></l-m>
      <l-m src="../../comps/article-code.html"></l-m>
      <l-m src="https://playground.ofajs.com/comps/o-playground/o-playground.html"></l-m>
      <style>
        :host {
          display: block;
          height: 100%;
          box-sizing: border-box;
          overflow: auto;
        }
      </style>
      <link rel="stylesheet" href="../../css/page.css" />
      <article class="markdown-body">
        <h1>Rendu de template</h1>
        <p>ofa.js fournit un puissant moteur de rendu de modèles, riche en syntaxe de modélisation, permettant aux développeurs de construire rapidement des applications. Commençons par présenter le rendu de texte le plus couramment utilisé.</p>
        <h2>Liaison de données de page</h2>
        <p>Dans ofa.js, chaque page a un objet <code>data</code> dans lequel vous pouvez définir les variables dont vous avez besoin dans la page. Lorsque la page commence à être rendue, les données de l&#39;objet <code>data</code> sont automatiquement liées au modèle, puis la syntaxe <code>{{nom de variable}}</code> est utilisée dans le modèle pour rendre la valeur de la variable correspondante.</p>
        <h2>Rendu de texte</h2>
        <p>Le rendu de texte est la méthode de rendu la plus basique, vous pouvez utiliser la syntaxe <code>{{nom de variable}}</code> dans le modèle pour afficher la valeur de la variable correspondante dans l&#39;objet <code>data</code>.</p>
        <o-playground name="Exemple de rendu de texte" style="--editor-height: 500px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <p>{{val}}</p>
      <script>
        export default async () => {
          return {
            data: {
              val: "Hello ofa.js Demo Code",
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Rendu du contenu HTML</h2>
        <p>En ajoutant la directive <code>:html</code> à un élément, il est possible de parser une chaîne HTML d&#39;une variable correspondante et de l&#39;insérer en toute sécurité à l&#39;intérieur de l&#39;élément, permettant de réaliser facilement le rendu dynamique de texte enrichi ou l&#39;intégration de fragments HTML externes.</p>
        <o-playground name="Exemple de rendu de contenu HTML" style="--editor-height: 500px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <p :html="val"></p>
      <script>
        export default async () => {
          return {
            data: {
              val: '<span style="color:green;">Hello ofa.js Demo Code</span>',
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
  </o-app>
  <o-root-provider name="pui" theme="dark"></o-root-provider>
