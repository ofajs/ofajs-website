        <h1>Observateurs</h1>
        <p>L'observateur (Watcher) est une fonctionnalité de ofa.js utilisée pour surveiller les changements de données et exécuter une logique correspondante. Lorsque les données réactives changent, l'observateur déclenche automatiquement une fonction de rappel, vous permettant d'effectuer des tâches telles que la transformation de données, des opérations à effet secondaire ou un traitement asynchrone.</p>
        <h2>Utilisation de base</h2>
        <p>Les observateurs sont définis dans l'objet <code>watch</code> du composant, où les noms de clé correspondent aux noms des propriétés de données à observer, et les valeurs sont les fonctions de rappel exécutées lorsque les données changent.</p>
        <o-playground name="watchers - utilisation de base" style="--editor-height: 700px">
          <code>
    <template page="">
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <p>
        count:{{count}}
        <br>
        doubleCount:{{doubleCount}}
      </p>
      <input sync:value="count" type="number">
      <script>
        export default async () => {
          return {
            data: {
              count: 0,
              doubleCount: 0,
            },
            watch: {
              count(count) {
                setTimeout(() => {
                  this.doubleCount = count * 2;
                }, 500);
              },
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Paramètres de la fonction de rappel</h2>
        <p>La fonction de rappel du listener reçoit deux paramètres :- <code>newValue</code>：la nouvelle valeur après le changement</p>
        <ul>
          <li><code>{watchers}</code>：l’ensemble des objets observateurs du composant actuel</li>
        </ul>
        <p>Après les changements de données, un traitement anti-rebond est d'abord effectué, puis le callback dans <code>watch</code> est exécuté ; le paramètre <code>watchers</code> est l'ensemble de toutes les modifications fusionnées pendant ce cycle anti-rebond.</p>
        <p>Les fonctions dans <code>watch</code> sont appelées immédiatement après l'initialisation du composant, afin d'établir l'écoute des données. On peut distinguer s'il s'agit du premier appel en vérifiant si <code>watchers</code> possède une longueur.</p>
        <o-playground name="watchers - paramètres de rappel" style="--editor-height: 700px">
          <code>
    <template page="">
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
        .log {
          margin-top: 10px;
          padding: 10px;
          background-color: #7e7e7eff;
          font-family: monospace;
          white-space: pre-wrap;
        }
      </style>
      <p>Nom : {{name}}</p>
      <p>Âge : {{age}}</p>
      <input sync:value="name" placeholder="Entrez le nom">
      <input sync:value="age" type="number" placeholder="Entrez l'âge">
      <div class="log">{{log}}</div>
      <script>
        export default async () => {
          return {
            data: {
              name: "ZhangShan",
              age: 25,
              log: "",
            },
            watch: {
              name(newVal,{watchers}) {
                if(!watchers){
                  return;
                }
                const watcher = watchers[0]; // obtenir l'un d'entre eux
                this.log += `propriété "${watcher.name}" est passée de "${watcher.oldValue}" à "${watcher.value}"\n`;
              },
              age(newVal,{watchers}) {
                if(!watchers){
                  return;
                }
                const watcher = watchers[0]; // obtenir l'un d'entre eux
                this.log += `propriété "${watcher.name}" est passée de "${watcher.oldValue}" à "${watcher.value}"\n`;
              },
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Écoute approfondie</h2>
        <p>Pour les données imbriquées de type objet ou tableau, une écoute profonde est automatiquement effectuée dans watch.</p>
        <o-playground name="watchers - Écoute approfondie" style="--editor-height: 700px">
          <code>
    <template page="">
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
        button {
          margin: 5px;
          padding: 8px 12px;
        }
        .info {
          margin-top: 10px;
          padding: 10px;
          background-color: gray;
        }
      </style>
      <div>
        <p>Informations utilisateur:</p>
        <p>Nom: {{user.name}}</p>
        <p>Âge: {{user.age}}</p>
        <p>Loisirs: {{user.hobbies.join(', ')}}</p>
      </div>
      <div>
        <button on:click="updateName">Modifier le nom</button>
        <button on:click="updateAge">Modifier l’âge</button>
        <button on:click="addHobby">Ajouter un loisir</button>
        <button on:click="updateHobby">Modifier un loisir</button>
      </div>
      <div class="info" :html="log"></div>
      <script>
        export default async () => {
          return {
            data: {
              user: {
                name: "Zhang San",
                age: 25,
                hobbies: ["basket-ball", "football"],
              },
              log: "",
            },
            watch: {
              user(newVal,{watchers}) {
                if(!watchers){
                  return;
                }
                const watcher = watchers[0]; // Obtenir l'un d'eux
                console.log("Modification: ",watcher.target);
                if(watcher.type === 'set'){
                  this.log += `Valeur modifiée -> Propriété "${watcher.name}" est passée de "${watcher.oldValue}" à "${watcher.value}" <br>`;
                }else{
                  this.log += `Méthode exécutée ${watcher.type} -> Nom de la fonction "${watcher.name}" arguments "${watcher.args}" <br>`;
                }
              },
            },
            proto: {
              updateName() {
                this.user.name = "Li Si";
              },
              updateAge() {
                this.user.age = 30;
              },
              addHobby() {
                this.user.hobbies.push("natation");
              },
              updateHobby() {
                this.user.hobbies[0] = "badminton";
              },
            },
          };
        };
      </script>
    </template>
  </code>

        <h2>Écouter plusieurs sources de données</h2>
        <p>Vous pouvez surveiller les changements de plusieurs données en même temps et exécuter la logique correspondante en fonction des changements des multiples données dans la fonction de rappel.</p>

    <template page="">

        :host {

      <p>Hauteur : {{rectHeight}}</p>
      <p>Surface : {{area}}</p>
      <input sync:value="rectWidth" type="number" placeholder="Largeur">
      <input sync:value="rectHeight" type="number" placeholder="Hauteur">
      <script>
        export default async () => {
          return {
            data: {
              rectWidth: 10,
              rectHeight: 5,
              area: 0,
            },
            watch: {
              // "rectWidth,rectHeight"(){
              ["rectWidth,rectHeight"](){
                this.area = (this.rectWidth || 0) * (this.rectheight || 0);
              }
            }
          };
        };
      </script>
    </template>
  </code>

        <o-playground name="watchers - validation de formulaire" style="--editor-height: 800px">

    <template page="">

        :host {
          display: block;

          font-size: 12px;
        }
      </style>
      <input sync:value="username" placeholder="Nom d'utilisateur (3-10 caractères)">
      <span class="error">{{usernameError}}</span>
      <input sync:value="email" placeholder="E-mail">
      <span class="error">{{emailError}}</span>
      <script>
        export default async () => {
          return {
            data: {
              username: "",
              email: "",
              usernameError: "",
              emailError: "",
            },
            watch: {
              username(val) {
                if (val.length < 3 || val.length > 10) {
                  this.usernameError = "Le nom d'utilisateur doit contenir entre 3 et 10 caractères";
                } else {
                  this.usernameError = "";
                }
              },
              email(val) {
                const emailRegex = /^.+@.+\..+$/;
                if (!emailRegex.test(val)) {
                  this.emailError = "Veuillez entrer une adresse e-mail valide";
                } else {
                  this.emailError = "";
                }
              },
            },
          };
        };
      </script>
    </template>
  </code>

            data: {

                theme: "light",
              },

            },
            watch: {
              settings(){
                  this.saveStatus = "Sauvegarde en cours...";
                  setTimeout(() => {
                    this.saveStatus = "Sauvegardé";
                    console.log("Paramètres sauvegardés:", this.settings);
                  }, 500);
              }
            },
            proto: {
              setLight() {
                this.settings.theme = "light";
              },
              setDark() {

              },

                this.settings = { theme: "light" };
              },
            },
          };
        };
      </script>
    </template>
  </code>

        <h2>Remarques</h2>
        <ul>
          <li><strong>Évitez de modifier les données surveillées</strong> : modifier les données surveillées dans le rappel du « watcher » peut entraîner une boucle infinie. Si une modification est nécessaire, assurez-vous d’avoir une condition appropriée.</li>
          <li><strong>Préférez une propriété calculée</strong> : si vous devez calculer une nouvelle valeur à partir de plusieurs données, il est recommandé d’utiliser une <a href="./computed-properties.html" olink="">propriété calculée</a> plutôt qu’un « watcher ».</li>
        </ul>
