        <h1>Requêtes de style</h1>
        <p><code>match-var</code> est un composant fonctionnel dans ofa.js utilisé pour la correspondance de styles en fonction des variables CSS. Avec <code>match-var</code>, vous pouvez dynamiquement faire correspondre et appliquer différents styles en fonction des valeurs des variables CSS du composant actuel. Cette fonctionnalité est spécifiquement conçue pour la transmission d&#39;états de contexte liés au style, sans nécessiter l&#39;utilisation de JavaScript, ce qui la rend plus pratique à utiliser et adaptée aux besoins de transmission de styles tels que les couleurs de thème.</p>
        <h2>Concepts clés</h2>
        <ul>
          <li><strong>match-var</strong> : Composant de correspondance de style, qui détermine s&#39;il faut appliquer le style interne en fonction de la valeur de la variable CSS</li>
          <li><strong>Correspondance d&#39;attributs</strong> : Définir les variables CSS à faire correspondre et les valeurs attendues via les attributs du composant</li>
          <li><strong>Application de style</strong> : En cas de correspondance réussie, les styles de la balise <code>&lt;style&gt;</code> interne seront appliqués au composant</li>
        </ul>
        <h2>Utilisation de base</h2>
        <p>Le composant <code>match-var</code> définit les variables CSS à faire correspondre et les valeurs attendues via des attributs. Lorsque la valeur de la variable CSS du composant correspond à la valeur d&#39;attribut spécifiée, les styles définis en interne sont appliqués.</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">match-var</span> <span class="hljs-attr">theme</span>=<span class="hljs-string">&quot;dark&quot;</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
    <span class="hljs-selector-pseudo">:host</span> {
      <span class="hljs-attribute">background-color</span>: <span class="hljs-number">#333</span>;
      <span class="hljs-attribute">color</span>: white;
    }
  </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">match-var</span>&gt;</span></code></pre>
        <h3>Attributs</h3>
        <p>Le composant <code>match-var</code> utilise des attributs arbitraires pour définir les règles de correspondance des variables CSS. Le nom de l&#39;attribut correspond au nom de la variable CSS (sans le préfixe <code>--</code>), et la valeur de l&#39;attribut est la valeur attendue pour la correspondance.</p>
        <h3>Comment ça marche</h3>
        <ol>
          <li><strong>Prise en charge du navigateur</strong> : Si le navigateur prend en charge la requête <code>@container style()</code>, il utilisera directement la capacité native du CSS</li>
          <li><strong>Traitement de dégradation</strong> : S&#39;il n&#39;est pas pris en charge, il détectera les changements de valeur des variables CSS par interrogation, et injectera dynamiquement les styles après une correspondance réussie</li>
          <li><strong>Rafraîchissement manuel</strong> : Vous pouvez déclencher manuellement la détection de style via la méthode <code>$.checkMatch()</code></li>
        </ol>

        <h2>Correspondance multicritère</h2>
        <p>Vous pouvez utiliser plusieurs attributs simultanément pour définir des conditions de correspondance plus complexes, et les styles ne seront appliqués que lorsque toutes les variables CSS correspondent.</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">match-var</span> <span class="hljs-attr">theme</span>=<span class="hljs-string">&quot;sombre&quot;</span> <span class="hljs-attr">taille</span>=<span class="hljs-string">&quot;grande&quot;</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
    <span class="hljs-selector-pseudo">:host</span> {
      rembourrage: <span class="hljs-number">20px</span>;
      taille-de-police: <span class="hljs-number">18px</span>;
    }
  </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">match-var</span>&gt;</span></code></pre>

        <h2>checkMatch 手动刷新</h2>
        <p>Dans certains cas, les changements des variables CSS peuvent ne pas être détectés automatiquement ; vous pouvez alors appeler manuellement la méthode <code>$.checkMatch()</code> pour déclencher la détection des styles.</p>
        <blockquote>
          <p>Firefox ne prend pas encore en charge la requête <code>@container style()</code>, il est donc nécessaire d&#39;appeler manuellement <code>$.checkMatch()</code> ; une fois que la prise en charge native sera disponible dans les navigateurs, le système détectera automatiquement les changements de variables, sans avoir besoin de les déclencher manuellement.</p>
        </blockquote>
        <pre><code class="hljs language-javascript"><span class="hljs-attr">proto</span>: {
  <span class="hljs-title function_">updateTheme</span>(<span class="hljs-params"></span>) {
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">theme</span> = <span class="hljs-string">&#x27;dark&#x27;</span>;
    <span class="hljs-comment">// Déclencher manuellement la détection de style</span>
    $.<span class="hljs-title function_">checkMatch</span>();
  }
}</code></pre>
        <h2>Bonnes pratiques</h2>
        <ol>
          <li><strong>Privilégier les capacités natives de CSS</strong> : <code>match-var</code> utilise en priorité la requête native <code>@container style()</code> du navigateur, offrant de meilleures performances dans les navigateurs modernes </li>
          <li><strong>Organiser les styles de manière logique</strong> : regrouper les styles correspondants pour faciliter la maintenance et la compréhension </li>
          <li><strong>Utiliser la liaison data()</strong> : combiner avec la directive <code>data()</code> permet de basculer les styles de manière réactive</li>
        </ol>

      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
