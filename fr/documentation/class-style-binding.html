        <h1>Liaison de classes et de styles</h1>
        <p>Dans ofa.js, vous pouvez réaliser une gestion flexible de l&#39;état de l&#39;interface utilisateur en liant dynamiquement les noms de classe、les styles et les propriétés。Cela permet à l&#39;interface de s&#39;adapter automatiquement aux changements de données。</p>
        <h2>Liaison de classe</h2>
        <p>La liaison de classes vous permet d’ajouter ou de supprimer dynamiquement des classes CSS en fonction de l’état des données. Vous pouvez utiliser la syntaxe <code>class:className=&quot;booleanExpression&quot;</code> pour lier une classe spécifique.</p>
        <p>Lorsque <code>booleanExpression</code> est <code>true</code>, le nom de classe est ajouté à l’élément ; lorsqu’il est <code>false</code>, le nom de classe est supprimé.</p>
        <h3>Liaison de classe de base</h3>
        <o-playground name="Liaison de classe de base" style="--editor-height: 500px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
        .hide {
          display: none;
        }
      </style>
      <button on:click="isHide = !isHide">Toggle Display</button>
      <p class="green" class:hide="isHide">{{val}}</p>
      <script>
        export default async () => {
          return {
            data: {
              isHide: false,
              val: "Hello ofa.js Demo Code",
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h3>Liaison de plusieurs classes</h3>
        <p>Vous pouvez également lier plusieurs classes en même temps, afin que l&#39;élément ait différents états d&#39;apparence selon différentes conditions.</p>
        <o-playground name="liaisons de classes multiples" style="--editor-height: 500px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
        .active {
          background-color: #e6f7ff;
          border: 2px solid #1890ff;
        }
        .disabled {
          opacity: 0.5;
          cursor: not-allowed;
        }
        .highlight {
          font-weight: bold;
          color: #52c41a;
        }
      </style>
      <button on:click="toggleStates">Toggle States</button>
      <p class:active="isActive" class:disabled="isDisabled" class:highlight="isHighlighted">
        Current State - Active: {{isActive}}, Disabled: {{isDisabled}}, Highlighted: {{isHighlighted}}
      </p>
      <script>
        export default async () => {
          return {
            data: {
              isActive: false,
              isDisabled: false,
              isHighlighted: false,
            },
            proto: {
              toggleStates() {
                this.isActive = !this.isActive;
                this.isDisabled = !this.isDisabled;
                this.isHighlighted = !this.isHighlighted;
              }
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Liaison de styles</h2>
        <p>La liaison de styles vous permet de définir directement les valeurs des styles en ligne, avec mise à jour dynamique. ofa.js propose deux méthodes de liaison de styles :</p>
        <h3>Liaison d&#39;attribut de style unique</h3>
        <p>Utilisez la syntaxe <code>:style.propertyName</code> pour lier une propriété de style spécifique.</p>
        <o-playground name="Liaison d'attribut de style unique" style="--editor-height: 500px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <p class="green" :style.color="isGreen ? 'green' : 'red'">{{val}}</p>
      <button on:click="isGreen = !isGreen">Toggle Color</button>
      <script>
        export default async () => {
          return {
            data: {
              isGreen: false,
              val: "Hello ofa.js Demo Code",
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h3>Liaison de propriété multi-style</h3>
        <p>Vous pouvez également lier plusieurs attributs de style à la fois :</p>
        <o-playground name="Liaison de propriétés multi-styles" style="--editor-height: 500px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <p :style.color="textColor" :style.fontSize="fontSize + 'px'" :style.backgroundColor="bgColor">
        Exemple de style dynamique
      </p>
      <button on:click="changeStyles">Changer les styles</button>
      <script>
        export default async () => {
          return {
            data: {
              textColor: 'blue',
              fontSize: 16,
              bgColor: '#f0f0f0'
            },
            proto: {
              changeStyles() {
                this.textColor = this.textColor === 'blue' ? 'red' : 'blue';
                this.fontSize = this.fontSize === 16 ? 20 : 16;
                this.bgColor = this.bgColor === '#f0f0f0' ? '#ffffcc' : '#f0f0f0';
              }
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Liaison de propriété</h2>
        <p>Outre la liaison de classes et de styles, vous pouvez également lier dynamiquement d&#39;autres attributs HTML. ofa.js utilise la syntaxe <code>attr:attributeName</code> pour réaliser la liaison d&#39;attributs.</p>
        <h3>Liaison des attributs de base</h3>
        <o-playground name="Liaison des propriétés de base" style="--editor-height: 700px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
        [bg-color="red"]{
            background-color: red;
        }
        [bg-color="green"]{
            background-color: green;
        }
      </style>
      <p attr:bg-color="bgColor" attr:title="tooltipText">{{val}}</p>
      <button on:click="changeColor">Change Color</button>  
      <script>
        export default async () => {
          return {
            data: {
              bgColor: "green",
              tooltipText: "Ceci est un message d'info",
              val: "Hover over me to see the title",
            },
            proto: {
              changeColor() {
                this.bgColor = this.bgColor === "green" ? "red" : "green";
              }
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h3>Traitement des attributs booléens</h3>
        <p>Pour les attributs de type booléen (tels que <code>disabled</code>, <code>hidden</code>), ofa.js décide d&#39;ajouter ou non cet attribut en fonction de la véracité de la valeur liée.</p>
        <o-playground name="Gestion des attributs booléens" style="--editor-height: 700px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <input type="text" attr:disabled="isDisabled" placeholder="Type here..." />
      <br /><br />
      <button attr:disabled="isButtonDisabled" on:click="handleButtonClick">Click Me</button>
      <br /><br />
      <label>
        <input type="checkbox" on:change="toggleAll" /> Toggle All States
      </label>
      <script>
        export default async () => {
          return {
            data: {
              isDisabled: false,
              isChecked: true,
              isButtonDisabled: false,
            },
            proto: {
              handleButtonClick() {
                alert('Button clicked!');
              },
              toggleAll(event) {
                const checked = event.target.checked;
                this.isDisabled = checked;
                this.isChecked = checked;
                this.isButtonDisabled = checked;
              }
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Fonction data()</h2>
        <p>On peut utiliser <code>data(key)</code> dans les styles pour lier les données du composant. Cela convient parfaitement aux scénarios où le style doit changer dynamiquement en fonction des données du composant.</p>
        <o-playground name="Fonction de données dans les balises de style" style="--editor-height: 500px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
        p {
          font-size: 10px;
          color:red;
          transition: all .3s ease;
        }
      </style>
      <style>
        p:hover {
          font-size: data(size);
          color: green;
          transition: all data(time)s ease;
        }
      </style>
      Hover FontSize: <input type="number" sync:value="size" placeholder="Ceci est une zone de saisie à liaison bidirectionnelle" />
      <br />
      TransitionTime: <input type="number" step="0.3" min="0" sync:value="time" placeholder="Ceci est une zone de saisie à liaison bidirectionnelle" />
      <p>{{val}} - size: {{size}}</p>
      <script>
        export default async () => {
          return {
            data: {
              size: 16,
              time: 0.3,
              val: "Hello ofa.js Demo Code",
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Points d&#39;attention</h2>
        <p>Le <code>data(key)</code> dans la balise <code>style</code> remplacera en principe tout le contenu du style. Pour éviter le rendu répété de styles non pertinents, il est recommandé de placer les styles contenant <code>data(key)</code> dans une balise <code>style</code> séparée, tandis que les styles ne nécessitant pas de liaison de données sont placés dans une autre balise <code>style</code>, afin d’obtenir de meilleures performances.</p>
        <pre><code class="hljs language-html"><span class="hljs-comment">&lt;!-- ❌ Les p:hover qui n&#x27;ont pas de data(key) seront aussi rafraîchis --&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
  <span class="hljs-selector-tag">p</span> {

    <span class="hljs-attribute">color</span>:green;

  }
  <span class="hljs-selector-tag">p</span><span class="hljs-selector-pseudo">:hover</span>{
    <span class="hljs-attribute">color</span>:red;
  }

          query

          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {

            attached() {
