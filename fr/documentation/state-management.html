        <h1>Gestion d&#39;état</h1>
        <h2>Qu&#39;est-ce que l&#39;état</h2>
        <p>Dans ofa.js, <strong>l&#39;état</strong> fait référence à la propriété <code>data</code> propre à un composant ou à un module de page. Cet état ne peut être utilisé que sur le composant actuel et sert à stocker et gérer les données internes de ce composant.</p>
        <p>Lorsque plusieurs composants ou pages doivent partager les mêmes données, la méthode traditionnelle consiste à les transmettre par événements ou à travers plusieurs niveaux de props, ce qui rend le code difficile à maintenir dans les applications complexes. Il est donc nécessaire d’avoir recours à la <strong>gestion d’état</strong> — en définissant un objet d’état partagé, plusieurs composants ou modules de page peuvent accéder à ces données et les modifier, réalisant ainsi le partage de l’état.</p>
        <blockquote>
          <p><strong>Astuce</strong> : La gestion d&#39;état est adaptée aux scénarios où des données doivent être partagées entre composants et pages, comme les informations utilisateur, le panier, la configuration du thème, la configuration globale, etc.</p>
        </blockquote>
        <h2>Générer un objet d&#39;état</h2>
        <p>En utilisant <code>$.stanz({})</code> pour créer un objet d&#39;état réactif. Cette méthode reçoit un objet ordinaire comme données initiales et renvoie un proxy d&#39;état réactif.</p>

        <h2>Caractéristiques de l&#39;objet d&#39;état</h2>
        <h3>1. Mise à jour réactive</h3>
        <p><code>$.stanz()</code> 创建的状态对象是响应式的。当状态数据发生变化时，所有引用该数据的组件都会自动更新。</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> store = $.<span class="hljs-title function_">stanz</span>({ <span class="hljs-attr">count</span>: <span class="hljs-number">0</span> });

<span class="hljs-comment">// Dans le composant</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> {
  <span class="hljs-attr">data</span>: {
    <span class="hljs-attr">store</span>: {}
  },
  <span class="hljs-attr">proto</span>:{
    <span class="hljs-title function_">increment</span>(<span class="hljs-params"></span>) {
        store.<span class="hljs-property">count</span>++; <span class="hljs-comment">// Tous les composants qui référencent store.count seront automatiquement mis à jour</span>
    }
  },
  <span class="hljs-title function_">attached</span>(<span class="hljs-params"></span>) {
    <span class="hljs-comment">// Référence directe aux propriétés de l&#x27;objet d&#x27;état</span>
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">store</span> = store;
  },
  <span class="hljs-title function_">detached</span>(<span class="hljs-params"></span>){
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">store</span> = {}; <span class="hljs-comment">// Lorsque le composant est détruit, videz les données d&#x27;état montées</span>
  }
};</code></pre>
        <h3>2. Réactivité en profondeur</h3>
        <p>L&#39;objet d&#39;état prend en charge la réactivité en profondeur ; les changements des objets et tableaux imbriqués sont également surveillés.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> store = $.<span class="hljs-title function_">stanz</span>({
  <span class="hljs-attr">user</span>: {
    <span class="hljs-attr">name</span>: <span class="hljs-string">&quot;张三&quot;</span>,
    <span class="hljs-attr">settings</span>: {
      <span class="hljs-attr">theme</span>: <span class="hljs-string">&quot;dark&quot;</span>
    }
  },
  <span class="hljs-attr">list</span>: []
});

<span class="hljs-comment">// La modification des propriétés imbriquées déclenche également la mise à jour</span>
store.<span class="hljs-property">user</span>.<span class="hljs-property">name</span> = <span class="hljs-string">&quot;李四&quot;</span>;
store.<span class="hljs-property">user</span>.<span class="hljs-property">settings</span>.<span class="hljs-property">theme</span> = <span class="hljs-string">&quot;light&quot;</span>;
store.<span class="hljs-property">list</span>.<span class="hljs-title function_">push</span>({ <span class="hljs-attr">id</span>: <span class="hljs-number">1</span>, <span class="hljs-attr">title</span>: <span class="hljs-string">&quot;Nouvelle tâche&quot;</span> });</code></pre>
        <h2>Bonnes pratiques</h2>
        <h3>1. Monter l&#39;état lors de la phase attached du composant</h3>
        <p>Il est recommandé de monter l’état partagé dans le cycle de vie <code>attached</code> du composant :</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> {
  <span class="hljs-attr">data</span>: {
    <span class="hljs-attr">list</span>: []
  },
  <span class="hljs-title function_">attached</span>(<span class="hljs-params"></span>) {
    <span class="hljs-comment">// Monter l&#x27;état partagé sur les data du composant</span>
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">list</span> = data.<span class="hljs-property">list</span>;
  },
  <span class="hljs-title function_">detached</span>(<span class="hljs-params"></span>) {
    <span class="hljs-comment">// Lors de la destruction du composant, vider les données d&#x27;état montées pour éviter les fuites mémoire</span>
    <span class="hljs-variable language_">this</span>.<span class="hljs-property">list</span> = [];
  }
};</code></pre>
        <h3>2. Gestion raisonnée de la portée des états</h3>
        <ul>
          <li><strong>État global</strong> : Convient aux données accessibles par toute l&#39;application (comme les informations utilisateur, la configuration globale)</li>
          <li><strong>État de module</strong> : Convient aux données partagées en interne par un module fonctionnel spécifique</li>
        </ul>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// État d&#x27;appel global</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> globalStore = $.<span class="hljs-title function_">stanz</span>({ <span class="hljs-attr">user</span>: <span class="hljs-literal">null</span>, <span class="hljs-attr">theme</span>: <span class="hljs-string">&quot;light&quot;</span> });

<span class="hljs-comment">// État utilisé dans le module</span>
<span class="hljs-keyword">const</span> cartStore = $.<span class="hljs-title function_">stanz</span>({ <span class="hljs-attr">total</span>: <span class="hljs-number">0</span> });</code></pre>

        <h2>Remarques</h2>
        <ol>
          <li>
            <p><strong>Nettoyage d&#39;état</strong> : Dans le cycle de vie <code>detached</code> du composant, nettoyez en temps opportun les références aux données d&#39;état pour éviter les fuites de mémoire.</p>
          </li>
          <li>
            <p><strong>Éviter les dépendances circulaires</strong> : Les objets d&#39;état ne doivent pas former de références circulaires entre eux, cela pourrait entraîner des problèmes dans le système réactif.</p>
          </li>
          <li>
            <p><strong>Structures de données volumineuses</strong> : Pour les structures de données volumineuses, envisagez d&#39;utiliser des propriétés calculées ou une gestion par tranches pour éviter des surcoûts de performance inutiles.</p>
          </li>
          <li>
            <p><strong>Cohérence de l&#39;état</strong> : Faites attention à la cohérence de l&#39;état lors des opérations asynchrones, vous pouvez utiliser des transactions ou des mises à jour par lots pour garantir l&#39;intégrité des données.</p>
          </li>
        </ol>
