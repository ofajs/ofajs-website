        <h1>Transmettre les attributs des caractéristiques</h1>
        <p>Dans ofa.js, les <a href="https://developer.mozilla.org/fr/docs/Web/API/Element/attributes" target="_blank">attributs (Attribute)</a> sont l’un des moyens les plus courants de transmettre des données entre composants. Il suffit de déclarer les attributs requis dans l’objet <code>attrs</code> du composant pour que les données externes soient transmises à l’intérieur du composant lors de son utilisation.</p>
        <h2>Utilisation de base</h2>
        <h3>Définir les propriétés de réception</h3>
        <p>Avant d'utiliser un composant, il est nécessaire de déclarer dans l'objet <code>attrs</code> du composant les propriétés à recevoir. Les propriétés peuvent avoir des valeurs par défaut.</p>
        <o-playground name="Exemple d'utilisation de base" style="--editor-height: 500px">
          <code path="demo.html" preview="">
    <template>
      <l-m src="./demo-comp.html"></l-m>
      <demo-comp first="OFA" full-name="Exemple de composant OFA"></demo-comp>
      <br>
      <demo-comp first="NoneOS" full-name="Cas d'utilisation NoneOS"></demo-comp>
    </template>
  </code>
          <code path="demo-comp.html" active="">
    <template component="">
      <style>
        :host {
          display: block;
          border: 1px solid green;
          padding: 8px;
        }
      </style>
      <p>First : {{first}}</p>
      <p>Nom complet : {{fullName}}</p>
      <script>
        export default async ({ load }) => {
          return {
            tag: "demo-comp",
            attrs: {
              first: null,
              fullName:""
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h3>Règles importantes</h3>
        <ol>
          <li>
            <p><strong>Restriction de type</strong> : La valeur d'attribut transmise doit être une chaîne de caractères, les autres types sont automatiquement convertis en chaîne.</p>
          </li>
          <li>
            <p><strong>Conversion de nom</strong> : Étant donné que les attributs HTML ne sont pas sensibles à la casse, lors de la transmission d'attributs contenant des lettres majuscules, il faut utiliser <code>-</code> pour séparer les noms (format kebab-case).</p>
            <ul>
              <li>Exemple : <code>fullName</code> → <code>full-name</code></li>
            </ul>
          </li>
          <li>
            <p><strong>Définition obligatoire</strong> : Si le composant n'a pas défini l'attribut correspondant dans l'objet <code>attrs</code>, il ne peut pas recevoir cet attribut. La valeur définie est la valeur par défaut ; si on ne veut pas de valeur par défaut, on la définit à <code>null</code>.</p>
          </li>
        </ol>
        <o-playground name="Exemple de règle importante" style="--editor-height: 500px">
          <code path="demo.html" preview="">
    <template>
      <l-m src="./demo-comp.html"></l-m>
      <demo-comp></demo-comp>
      <demo-comp user-name="ZhangShan" age="25"></demo-comp>
    </template>
  </code>
          <code path="demo-comp.html" active="">
    <template component="">

          border: 1px solid green;
          padding: 8px;
        }
      </style>
      <p>Nom d'utilisateur : {{userName}}</p>
      <p>Âge : {{age}}</p>
      <script>
        export default async ({ load }) => {
          return {
            tag: "demo-comp",
            attrs: {
              userName: "Nom par défaut",
              age: "0"
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Syntaxe du modèle pour passer les attributs</h2>
        <p>Dans le modèle du composant, vous pouvez utiliser la syntaxe <code>attr:toKey="fromKey"</code> pour transmettre les données <code>fromKey</code> du composant actuel à la propriété <code>toKey</code> du sous-composant.</p>
        <o-playground name="Exemple de transmission d'attributs" style="--editor-height: 500px">
          <code path="demo.html" preview="">
    <template>
      <o-page src="page1.html"></o-page>
    </template>
  </code>
          <code path="page1.html" active="">
    <template page="">
      <l-m src="./demo-comp.html"></l-m>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <textarea sync:value="val"></textarea>
      <br>
      👇
      <demo-comp attr:full-name="val"></demo-comp>
      <script>
        export default async () => {
          return {
            data: {
              val: "Hello ofa.js Demo Code",
            },
          };
        };
      </script>
    </template>
  </code>

        <h2>Transmission multi-niveaux</h2>
        <p>Les attributs peuvent être transmis couche par couche via des composants imbriqués à plusieurs niveaux.</p>
        <p>Si un composant doit dépendre d'autres composants, il est nécessaire d'importer les modules des autres composants dans le composant.</p>
        <o-playground name="Exemple de transmission multi-niveaux" style="--editor-height: 700px">
          <code path="demo.html" preview="">
    <template>
      <l-m src="./outer-comp.html"></l-m>
      <outer-comp user-name="Donnée du niveau supérieur"></outer-comp>
    </template>
  </code>

      <p>Composant externe reçoit : {{userName}}</p>
      <inner-comp attr:user-name="userName"></inner-comp>
      <script>
        export default async ({ load }) => {
          return {
            tag: "outer-comp",
            attrs: {
              userName: ""
            },

    </template>
  </code>

          query

          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);

            },
            detached() {

            },
