      <article class="markdown-body">
        <h1>Démarrage rapide</h1>
        <p>Cette section explique comment démarrer rapidement avec ofa.js. Dans les tutoriels suivants, nous omettrons l&#39;étape de création du fichier d&#39;entrée index.html et ne montrerons que le code des fichiers de modules de page. Vous pouvez directement développer à partir du modèle.</p>
        <h2>Préparer les fichiers de base</h2>
        <p>Pour démarrer rapidement avec ofa.js, il suffit de créer un <strong>module de page</strong> et de l&#39;associer à un HTML d&#39;entrée ; les fichiers essentiels sont les suivants :</p>
        <ul>
          <li><code>index.html</code> : Le fichier d&#39;entrée de l&#39;application, responsable du chargement du framework ofa.js et de l&#39;importation des modules de page</li>
          <li><code>demo-page.html</code> : Le fichier du module de page, définissant le contenu spécifique, le style et la logique des données de la page</li>
        </ul>
        <h3>index.html (point d&#39;entrée de l&#39;application)</h3>
        <pre><code class="hljs language-html"><span class="hljs-comment">&lt;!-- index.html --&gt;</span>
<span class="hljs-meta">&lt;!DOCTYPE <span class="hljs-keyword">html</span>&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">html</span> <span class="hljs-attr">lang</span>=<span class="hljs-string">&quot;en&quot;</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">head</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">meta</span> <span class="hljs-attr">charset</span>=<span class="hljs-string">&quot;UTF-8&quot;</span> /&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">meta</span> <span class="hljs-attr">name</span>=<span class="hljs-string">&quot;viewport&quot;</span> <span class="hljs-attr">content</span>=<span class="hljs-string">&quot;width=device-width, initial-scale=1.0&quot;</span> /&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">title</span>&gt;</span>ofa.js Exemple<span class="hljs-tag">&lt;/<span class="hljs-name">title</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">script</span>
      <span class="hljs-attr">src</span>=<span class="hljs-string">&quot;https://cdn.jsdelivr.net/gh/ofajs/ofa.js/dist/ofa.mjs&quot;</span>
      <span class="hljs-attr">type</span>=<span class="hljs-string">&quot;module&quot;</span>
    &gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>
  <span class="hljs-tag">&lt;/<span class="hljs-name">head</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">body</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">o-page</span> <span class="hljs-attr">src</span>=<span class="hljs-string">&quot;./demo-page.html&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-page</span>&gt;</span>
  <span class="hljs-tag">&lt;/<span class="hljs-name">body</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">html</span>&gt;</span></code></pre>
        <p>Le rôle principal de ce fichier est :- Introduction du framework ofa.js</p>
        <ul>
          <li>Utilisation du composant <code>&lt;o-page&gt;</code> pour charger et rendre le module de page</li>
        </ul>
        <h3>demo-page.html (module de page)</h3>
        <pre><code class="hljs language-html"><span class="hljs-comment">&lt;!-- demo-page.html --&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">template</span> <span class="hljs-attr">page</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">style</span>&gt;</span><span class="language-css">
    <span class="hljs-selector-pseudo">:host</span> {
      <span class="hljs-attribute">display</span>: block;
      <span class="hljs-attribute">border</span>: <span class="hljs-number">1px</span> solid red;
      <span class="hljs-attribute">padding</span>: <span class="hljs-number">10px</span>;
    }
    <span class="hljs-selector-tag">p</span> {
      <span class="hljs-attribute">color</span>: pink;
    }
  </span><span class="hljs-tag">&lt;/<span class="hljs-name">style</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">p</span>&gt;</span>{{val}}<span class="hljs-tag">&lt;/<span class="hljs-name">p</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">script</span>&gt;</span><span class="language-javascript">
    <span class="hljs-keyword">export</span> <span class="hljs-keyword">default</span> <span class="hljs-keyword">async</span> () =&gt; {
      <span class="hljs-keyword">return</span> {
        <span class="hljs-attr">data</span>: {
          <span class="hljs-attr">val</span>: <span class="hljs-string">&quot;Hello ofa.js Demo Code&quot;</span>,
        },
      };
    };
  </span><span class="hljs-tag">&lt;/<span class="hljs-name">script</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">template</span>&gt;</span></code></pre>
        <p>Ce fichier définit un composant de page simple, contenant :- la balise <code>&lt;template page&gt;</code> définit le module de page </p>
        <ul>
          <li>styles CSS (sélecteur <code>:host</code> du Shadow DOM) </li>
          <li>expression de liaison de données <code>{{val}}</code> </li>
          <li>logique JavaScript retournant un objet contenant les données initiales</li>
        </ul>
        <h2>Démonstration en ligne</h2>
        <p>Voici un exemple en direct dans l&#39;éditeur en ligne, vous pouvez modifier le code directement et voir l&#39;effet :</p>
        <o-playground name="Démonstration en ligne" style="--editor-height: 500px">
          <code>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
        p {
          color: pink;
        }
      </style>
      <p>{{val}}</p>
      <script>
        export default async () => {
          return {
            data: {
              val: "Bonjour, code de démonstration ofa.js",
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>Nous définissons les styles via la balise <code>&lt;style&gt;</code> à l&#39;intérieur du composant. Ces styles internes ne s&#39;appliquent qu&#39;à l&#39;intérieur du composant, avec un bon encapsulage, et n&#39;affectent pas les autres éléments de la page.</p>
        <p>Le sélecteur <code>:host</code> est utilisé pour définir le style de l’élément hôte du composant ; ici, nous définissons le composant comme un élément de bloc, avec une bordure rouge et un remplissage de 10 px.</p>
        <p>Grâce à l&#39;expression <code>{{key}}</code>, les valeurs correspondantes dans les données du composant peuvent être rendues sur la page.</p>
        <p>Vous avez maintenant créé avec succès votre première application ofa.js ! Ensuite, approfondissons la syntaxe de rendu des modèles d’ofa.js et ses fonctionnalités avancées.</p>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
