        <h1>Application à page unique</h1>
        <p>Une application monopage lie le composant <code>o-app</code> à la barre d’adresse du navigateur, synchronisant ainsi l’URL de la page avec le chemin des pages au sein de l’application. Après l’activation de l’application monopage :</p>
        <ul>
          <li>Actualiser la page web permet de conserver l’état actuel de la route</li>
          <li>Copier l’URL de la barre d’adresse et l’ouvrir dans un autre navigateur ou onglet permet également de restaurer l’état de l’application</li>
          <li>Les boutons Précédent/Suivant du navigateur fonctionnent normalement</li>
        </ul>
        <h2>Utilisation de base</h2>
        <p>Enveloppez le composant <code>o-app</code> avec le composant officiel <code>o-router</code> pour réaliser une application à page unique.</p>

        <h2>fix-body attribut</h2>
        <p>Après avoir ajouté l&#39;attribut <code>fix-body</code>, <code>o-router</code> réinitialisera automatiquement les styles de <code>html</code> et <code>body</code>, éliminant les marges et le padding par défaut.</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">o-router</span> <span class="hljs-attr">fix-body</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">o-app</span> <span class="hljs-attr">src</span>=<span class="hljs-string">&quot;./app-config.js&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-app</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">o-router</span>&gt;</span></code></pre>
        <p>Ceci est particulièrement utile dans les scénarios suivants：- nécessite que <code>o-app</code> remplisse complètement le viewport</p>
        <ul>
          <li>lorsque l&#39;application constitue le seul contenu de la page</li>
        </ul>

        <h2>Principe de fonctionnement</h2>
        <p>Implémentation du mode Hash basé sur le navigateur pour une application monopage :</p>
        <ol>
          <li>Lors du changement de page dans l&#39;application, <code>o-router</code> met automatiquement à jour la valeur de hash dans la barre d&#39;adresse (par exemple <code>#/about.html</code>)</li>
          <li>Lorsque l&#39;utilisateur actualise la page ou y accède via l&#39;URL, <code>o-router</code> lit la valeur de hash et charge la page correspondante</li>
          <li>Les boutons Précédent/Suivant du déclenchent un changement de hash, contrôlant ainsi la navigation dans l&#39;application</li>
        </ol>
        <h2>Exemples de changements d&#39;URL</h2>
        <p>Supposons que l&#39;application ait deux pages <code>home.html</code> et <code>about.html</code> :</p>
        <table>
          <thead>
            <tr>
              <th>Action utilisateur</th>
              <th>Changement de la barre d&#39;adresse</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Ouvrir l&#39;application</td>
              <td><code>index.html</code> → <code>index.html#/home.html</code></td>
            </tr>
            <tr>
              <td>Aller à la page À propos</td>
              <td><code>index.html#/home.html</code> → <code>index.html#/about.html</code></td>
            </tr>
            <tr>
              <td>Cliquer sur Retour</td>
              <td><code>index.html#/about.html</code> → <code>index.html#/home.html</code></td>
            </tr>
            <tr>
              <td>Actualiser la page</td>
              <td>Conserver le hash actuel inchangé</td>
            </tr>
          </tbody>
        </table>
        <ul>
          <li>Une application monopage ne peut fonctionner qu’avec <strong>un seul</strong> composant <code>o-app</code></li>
        </ul>
