        <h1>Application à page unique</h1>
        <p>Une application à page unique lie le composant <code>o-app</code> à la barre d&#39;adresse du navigateur, afin de synchroniser l&#39;URL de la page avec le chemin des pages au sein de l&#39;application. Après avoir activé l&#39;application à page unique :</p>
        <ul>
          <li>Rafraîchir la page permet de conserver l’état actuel de la route</li>
          <li>Copier l’URL de la barre d’adresse et l’ouvrir dans un autre navigateur ou onglet restaure également l’état de l’application</li>
          <li>Les boutons Précédent/Suivant du navigateur fonctionnent normalement</li>
        </ul>
        <h2>Utilisation de base</h2>
        <p>Utilisez le composant officiel <code>o-router</code> pour envelopper le composant <code>o-app</code>, afin de réaliser une application à page unique.</p>

        <h2>Attribut fix-body</h2>
        <p>Après l’ajout de l’attribut <code>fix-body</code>, <code>o-router</code> réinitialise automatiquement les styles de <code>html</code> et <code>body</code>, éliminant les marges et les rembourrages par défaut.</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">o-router</span> <span class="hljs-attr">fix-body</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">o-app</span> <span class="hljs-attr">src</span>=<span class="hljs-string">&quot;./app-config.js&quot;</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">o-app</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">o-router</span>&gt;</span></code></pre>
        <p>Cela est particulièrement utile dans les cas suivants :- nécessite que <code>o-app</code> remplisse entièrement la fenêtre</p>
        <ul>
          <li>lorsque l’application est le seul contenu de la page</li>
        </ul>

        <h2>Principe de fonctionnement</h2>
        <p>Applications à page unique implémentées via le mode Hash du navigateur :</p>
        <ol>
          <li>Lorsqu’un changement de page se produit dans l’application, <code>o-router</code> met automatiquement à jour la valeur de hash dans la barre d’adresse (par exemple <code>#/about.html</code>)</li>
          <li>Lorsque l’utilisateur actualise la page ou y accède via l’URL, <code>o-router</code> lit la valeur de hash et charge la page correspondante</li>
          <li>Les boutons Précédent/Suivant du déclenchent une modification du hash, contrôlant ainsi la navigation dans l’application</li>
        </ol>
        <h2>Exemple de changement d&#39;URL</h2>
        <p>Supposons que l&#39;application comporte deux pages <code>home.html</code> et <code>about.html</code> :</p>
        <table>
          <thead>
            <tr>
              <th>Opération utilisateur</th>
              <th>Changement dans la barre d’adresse</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Ouvrir l’application</td>
              <td><code>index.html</code> → <code>index.html#/home.html</code></td>
            </tr>
            <tr>
              <td>Naviguer vers la page À propos</td>
              <td><code>index.html#/home.html</code> → <code>index.html#/about.html</code></td>
            </tr>
            <tr>
              <td>Cliquer sur Retour</td>
              <td><code>index.html#/about.html</code> → <code>index.html#/home.html</code></td>
            </tr>
            <tr>
              <td>Actualiser la page</td>
              <td>Conserver le hash actuel</td>
            </tr>
          </tbody>
        </table>
        <ul>
          <li>Une application monopage ne peut être utilisée qu&#39;avec <strong>un</strong> seul composant <code>o-app</code></li>
        </ul>
