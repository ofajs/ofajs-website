        <h1>Rendu de liste</h1>
        <p>Dans ofa.js, le composant <code>o-fill</code> offre de puissantes fonctionnalités de rendu de liste, permettant de rendre efficacement les données d&#39;un tableau en plusieurs éléments similaires. Il prend en charge deux modes d&#39;utilisation principaux : le rendu direct et le rendu par modèle.</p>
        <h2>Présentation du composant o-fill</h2>
        <p><code>o-fill</code> est le composant central d&#39;ofa.js pour le rendu des listes ; il reçoit une propriété <code>value</code> de type tableau et génère, pour chaque élément de ce tableau, l’élément DOM correspondant. Lors du rendu, ofa.js suit automatiquement les modifications du tableau et met à jour le DOM de manière efficace.</p>
        <h3>Caractéristiques principales :</h3>
        <ul>
          <li><strong>Mise à jour efficace</strong> : en suivant les changements du tableau par clé-valeur, seules les parties nécessaires sont mises à jour</li>
          <li><strong>Accès par index</strong> : accéder à l’index de l’élément courant via <code>$index</code></li>
          <li><strong>Accès aux données</strong> : accéder aux données de l’élément courant via <code>$data</code></li>
          <li><strong>Accès à l’hôte</strong> : accéder à l’instance du composant courant via <code>$host</code>, permettant d’appeler des méthodes ou d’accéder aux données du composant</li>
          <li><strong>Réutilisation de modèles</strong> : prend en charge l’utilisation de modèles nommés pour le rendu de listes complexes</li>
        </ul>
        <h2>Rendu direct</h2>
        <p>Le rendu direct est la méthode d&#39;utilisation la plus simple : le contenu du modèle est écrit directement à l&#39;intérieur de la balise <code>o-fill</code>. Lorsque le tableau change, <code>o-fill</code> crée automatiquement un élément correspondant pour chaque donnée.</p>
        <o-playground name="o-fill - Rendu direct" style="--editor-height: 600px">
          <code>
    <template page>
      <style>
        :host { display: block; padding: 10px; }
        ul { list-style: none; padding: 0; }
        li { padding: 8px; margin: 5px 0; background: #7e7e7e; border-radius: 4px; }
      </style>
      <h3>Liste des fruits</h3>
      <button on:click="addItem">Ajouter un fruit</button>
      <button on:click="removeItem">Supprimer le dernier</button>
      <ul>
        <o-fill :value="fruits">
          <li> {{$index + 1}}. {{$data.name}} - Prix: ¥{{$data.price}} <button on:click="$host.removeItem($index)">Supprimer</button></li>
        </o-fill>
      </ul>
      <script>
        export default async () => ({
          data: { 
            fruits: [
              { name: "🍎 Pomme", price: 5 },
              { name: "🍊 Orange", price: 6 },
              { name: "🍌 Banane", price: 3 }
            ],
            fruitIndex: 0,
          },
          proto: {
            addItem() {
              const fruitNames = ["🍇 Raisin", "🍓 Fraise", "🥝 Kiwi", "🍑 Pêche", "🥭 Mangue"];
              const name = fruitNames[this.fruitIndex % fruitNames.length];
              this.fruits.push({ 
                name: name, 
                price: Math.floor(Math.random() * 10) + 1 
              });
              this.fruitIndex++;
            },
            removeItem(index) {
              if (index >= 0 && index < this.fruits.length) {
                this.fruits.splice(index, 1);
                return;
              }
              this.fruits.length && this.fruits.pop();
            }
          }
        });
      </script>
    </template>
  </code>
        </o-playground>
        <p>Dans cet exemple, nous pouvons voir :- <code>$index</code> représente l&#39;indice de l&#39;élément actuel (commence à 0)</p>
        <ul>
          <li><code>$data</code> représente l&#39;objet de données de l&#39;élément actuel</li>
          <li><code>$host</code> représente l&#39;instance du composant actuel, peut être utilisé pour appeler des méthodes du composant ou accéder aux données du composant</li>
          <li>Lorsque le tableau change, la liste se met automatiquement à jour</li>
        </ul>
        <h2>Rendu de modèle</h2>
        <p>Pour les structures d&#39;éléments de liste plus complexes, vous pouvez utiliser la méthode des modèles nommés. Définissez le modèle dans la balise <code>template</code>, puis référencez-le dans <code>o-fill</code> via l&#39;attribut <code>name</code>.</p>

        <h2>Optimisation des performances et gestion des clés-valeurs</h2>
        <p>Pour les listes nécessitant des mises à jour fréquentes, vous pouvez spécifier un identifiant unique via l&#39;attribut <code>fill-key</code> afin d&#39;améliorer les performances de rendu.</p>
        <pre><code class="hljs language-html"><span class="hljs-comment">&lt;!-- Utiliser une clé personnalisée pour améliorer les performances --&gt;</span>
<span class="hljs-tag">&lt;<span class="hljs-name">o-fill</span> <span class="hljs-attr">:value</span>=<span class="hljs-string">&quot;items&quot;</span> <span class="hljs-attr">fill-key</span>=<span class="hljs-string">&quot;id&quot;</span>&gt;</span>
  <span class="hljs-tag">&lt;<span class="hljs-name">div</span>&gt;</span>{{$data.name}}<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span>
<span class="hljs-tag">&lt;/<span class="hljs-name">o-fill</span>&gt;</span></code></pre>
        <p>Dans l&#39;exemple ci-dessus, <code>fill-key=&quot;id&quot;</code> indique à ofa.js d&#39;utiliser la propriété <code>id</code> de chaque élément de données comme identifiant unique, de sorte que même si l&#39;ordre du tableau change, il peut correctement identifier et mettre à jour les éléments correspondants.</p>
        <h2>Meilleures pratiques pour le rendu de liste</h2>
        <ol>
          <li><strong>Gestion des événements</strong> : lors de l&#39;utilisation d&#39;événements dans les éléments de liste, notez que <code>$host</code> fait référence à l&#39;instance du composant actuel, et <code>$data</code> fait référence aux données de l&#39;élément actuel.</li>
          <li><strong>Choisir le mode de rendu approprié</strong> : pour les listes simples, utilisez le rendu direct ; pour les structures complexes, utilisez le rendu par modèle.</li>
          <li><strong>Considérations de performance</strong> : pour les grandes listes ou les listes fréquemment mises à jour, utilisez <code>fill-key</code> pour spécifier la clé.</li>
          <li><strong>Structure des données</strong> : assurez-vous que chaque élément du tableau est un objet de données valide.</li>
          <li><strong>Éviter les imbrications profondes</strong> : bien que l&#39;imbrication soit prise en charge, il faut éviter des niveaux d&#39;imbrication trop profonds.</li>
        </ol>
