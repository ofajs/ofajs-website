        <h1>Production et déploiement</h1>
        <p>Les projets développés avec ofa.js peuvent être déployés directement sur un serveur statique pour être utilisés.</p>
        <h2>Environnement de développement</h2>
        <p>Vous pouvez utiliser le <a href="https://core.noneos.com/?redirect=studio" target="_blank">ofa Studio</a> officiel pour le développement, il offre une création et un aperçu de projet en un clic.</p>
        <p>Vous pouvez également créer votre propre serveur statique :</p>
        <ul>
          <li>Utiliser un serveur statique comme Nginx ou Apache</li>
          <li>Utiliser le module <a href="https://www.npmjs.com/package/http-server" target="_blank">http-server</a> de Node.js</li>
          <li>Utiliser directement le plugin de serveur statique de l'éditeur pour prévisualiser</li>
        </ul>
        <h2>Environnement de production</h2>
        <h3>Exporter le projet</h3>
        <p>Si vous utilisez un projet construit avec <a href="https://core.noneos.com/?redirect=studio" target="_blank">ofa Studio</a>, utilisez directement la fonction d'exportation intégrée de l'outil.</p>
        <p>Si le projet est construit manuellement, vous pouvez simplement déployer le dossier du projet sur un serveur statique, en conservant le même mode que l’environnement de développement.</p>
        <h3>Compression et Obfuscation</h3>
        <p>Les environnements de production nécessitent généralement l'utilisation d'outils de minification et d'obfuscation pour réduire la taille des fichiers et améliorer la vitesse de chargement. Vous pouvez utiliser <a href="https://terser.org/docs/cli-usage/" target="_blank">Terser CLI</a> pour la minification et l'obfuscation.</p>
        <p>Si vous ne souhaitez pas utiliser l’outil en ligne de commande, vous pouvez utiliser <a href="https://builder.ofajs.com/" target="_blank">ofa build</a> pour compresser et obfusquer vos fichiers en ligne. Cet outil est actuellement en version bêta et sera intégré ultérieurement dans ofa Studio.</p>
      </article>
