        <h1>Liaison d'événements</h1>
        <p>Dans ofa.js, la liaison d'événements est un mécanisme important pour réaliser des interactions utilisateur. Vous pouvez attacher des gestionnaires d'événements aux éléments de plusieurs manières afin de répondre aux actions des utilisateurs.</p>
        <h2>Lier les événements depuis proto</h2>
        <p>Ceci est la méthode recommandée pour la liaison des événements, adaptée aux logiques complexes de gestion des événements. Définir la fonction de gestion d'événements dans l'objet <code>proto</code> permet de mieux organiser la logique du code, et facilite la maintenance et la réutilisation.</p>
        <o-playground name="Lier un événement depuis proto" style="--editor-height: 500px">
          <code>
    <template page="">
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <button on:click="clickMe">Click Me - {{count}}</button>
      <script>
        export default async () => {
          return {
            data: {
              count: 1,
            },
            proto:{
              clickMe(){
                this.count++;
              }
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Exécuter directement la fonction</h2>
        <p>Pour des opérations simples (comme l'incrémentation d'un compteur, le basculement d'état, etc.), vous pouvez directement écrire des expressions courtes dans les attributs d'événement. Cette méthode est claire et concise, adaptée aux logiques simples.</p>
        <o-playground name="Fonction d'exécution directe" style="--editor-height: 500px">
          <code>
    <template page="">
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <button on:click="count++">Click Me - {{count}}</button>
      <script>
        export default async () => {
          return {
            data: {
              count: 1,
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Types d'événements pris en charge</h2>
        <p>ofa.js prend en charge tous les événements DOM standard, y compris mais sans s'y limiter :</p>
        <ul>
          <li>Événements de souris : <code>click</code>, <code>dblclick</code>, <code>mousedown</code>, <code>mouseup</code>, <code>mouseover</code>, <code>mouseout</code>, etc.</li>
          <li>Événements de clavier : <code>keydown</code>, <code>keyup</code>, <code>keypress</code>, etc.</li>
          <li>Événements de formulaire : <code>submit</code>, <code>change</code>, <code>input</code>, <code>focus</code>, <code>blur</code>, etc.</li>
          <li>Événements tactiles : <code>touchstart</code>, <code>touchmove</code>, <code>touchend</code>, etc.</li>
        </ul>
        <p>ofa.js prend en charge exactement les mêmes types d’événements que les événements DOM natifs ; pour plus de détails, reportez-vous à la <a href="https://developer.mozilla.org/fr/docs/Web/API/Event" target="_blank">documentation MDN sur les événements</a>.</p>
        <h2>Passer des paramètres au gestionnaire d'événements</h2>
        <p>Vous pouvez également passer des paramètres au gestionnaire d'événements :</p>
        <o-playground name="Passer des paramètres au gestionnaire d'événements" style="--editor-height: 600px">
          <code>
    <template page="">
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <button on:click="addNumber(5)">Add 5 - Current: {{count}}</button>
      <button on:click="addNumber(10)">Add 10 - Current: {{count}}</button>
      <script>
        export default async () => {
          return {
            data: {
              count: 0,
            },
            proto: {
              addNumber(num) {
                this.count += num;
              }
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Accéder à l'objet événement</h2>
        <p>Dans le gestionnaire d'événements, vous pouvez accéder à l'objet événement natif via le paramètre <code>event</code> :</p>
        <o-playground name="Accéder à l'objet événement" style="--editor-height: 700px">
          <code>
    <template page="">
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
        .container {
          width: 300px;
          height: 200px;
          background-color: #f0f0f0;
          display: flex;
          align-items: center;
          justify-content: center;
        }
      </style>
      <div class="container" on:click="handleClick">Cliquez n'importe où pour voir les coordonnées</div>
      <p>X: {{x}}, Y: {{y}}</p>
      <script>
        export default async () => {
          return {
            data: {
              x: 0,
              y: 0,
            },
            proto: {
              handleClick(event) {
                this.x = event.clientX;
                this.y = event.clientY;
              }
            }
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>Vous pouvez également accéder à l’objet d’événement natif via le paramètre <code>$event</code> dans l’expression, par exemple pour obtenir les coordonnées d’un clic de souris :</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">div</span> <span class="hljs-attr">class</span>=<span class="hljs-string">"container"</span> <span class="hljs-attr">on:click</span>=<span class="hljs-string">"handleClick($event)"</span>&gt;</span>Cliquez n'importe où pour voir les coordonnées<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span></code></pre>
        <h2>Écouter les événements personnalisés</h2>
        <p>En plus d’écouter les événements DOM natifs, vous pouvez également écouter facilement les événements personnalisés émis par les composants :</p>
        <pre><code class="hljs language-html"><span class="hljs-tag">&lt;<span class="hljs-name">custom-comp</span> <span class="hljs-attr">on:custom-event</span>=<span class="hljs-string">"handleCustomEvent"</span>&gt;</span><span class="hljs-tag">&lt;/<span class="hljs-name">custom-comp</span>&gt;</span></code></pre>
        <p>Pour approfondir les événements personnalisés, veuillez consulter le chapitre <a href="custom-events.html" olink="">Événements personnalisés</a>. Il est recommandé de suivre le tutoriel dans l’ordre, les contenus ultérieurs s’étendront naturellement ; bien sûr, n’hésitez pas à le consulter à tout moment pour vous familiariser à l’avance.</p>
      </article>

          const {
            init,
            revoke
          } = await load("../../js/init.js");

            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },

        };
