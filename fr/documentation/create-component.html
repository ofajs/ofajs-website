        <h1>Créer un composant</h1>
        <p>Dans ofa.js, les composants sont le mécanisme central pour la réutilisation de pages et la modularisation. Un composant est essentiellement un Web Component personnalisé ; en définissant un modèle, des styles et une logique, on peut créer des éléments d’interface réutilisables.</p>
        <h2>Structure de base d&#39;un composant</h2>
        <p>Contrairement aux modules de page, les modules de composants utilisent l’attribut <code>component</code> pour l’élément <code>&lt;template&gt;</code> et déclarent l’attribut <code>tag</code> pour spécifier le nom de la balise du composant.</p>
        <p>À l&#39;endroit où le composant doit être utilisé, chargez de manière asynchrone le module du composant via la balise <code>l-m</code> ; le système procèdera automatiquement à l&#39;enregistrement. Vous pourrez ensuite utiliser le composant directement comme une balise HTML ordinaire.</p>
        <o-playground name="Exemple de base du composant" style="--editor-height: 500px">
          <code path="demo.html" preview>
    <template>
      <l-m src="./demo-comp.html"></l-m>
      <demo-comp></demo-comp>
    </template>
  </code>
          <code path="demo-comp.html" active>
    <template component>
      <style>
        :host {
          display: block;
          border: 1px solid green;
          padding: 10px;
        }
      </style>
      <h3>{{title}}</h3>
      <script>
        export default async () => {
          return {
            tag: "demo-comp",
            data: {
              title: "Exemple de composant OFAJS",
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Concepts fondamentaux des composants</h2>
        <h3>tag - nom de la balise du composant</h3>
        <p><code>tag</code> est le nom de balise du composant, <strong>il doit correspondre exactement au nom de balise utilisé pour le composant</strong>. Par exemple, si le <code>tag</code> de votre composant est défini comme <code>&quot;demo-comp&quot;</code>, alors lors de son utilisation en HTML, vous devez écrire <code>&lt;demo-comp&gt;&lt;/demo-comp&gt;</code>.</p>
        <h3>Référence du module de composant</h3>
        <p>En utilisant la balise <code>l-m</code> pour importer un module de composant, le module de composant enregistre automatiquement le composant. Cela est similaire à l&#39;utilisation de la balise <code>script</code> pour importer un script, mais <code>l-m</code> est spécifiquement conçu pour le chargement et l&#39;enregistrement des modules de composants.</p>
        <blockquote>
          <p>Remarque : le tag de référence <code>l-m</code> est une <strong>référence asynchrone</strong>, adaptée au chargement à la demande des composants lors du chargement de la page.</p>
        </blockquote>
        <h2>Composant de référence synchrone</h2>
        <p>Dans certains scénarios, vous pourriez avoir besoin de charger les composants de manière synchrone (par exemple, pour vous assurer qu&#39;un composant est enregistré avant de l&#39;utiliser). Dans ce cas, vous pouvez utiliser la méthode <code>load</code> avec le mot-clé <code>await</code> pour réaliser un référencement synchrone.</p>
        <p>Dans les modules de composants et les modules de page, la fonction <code>load</code> est automatiquement injectée, permettant aux développeurs de charger de manière synchrone les ressources nécessaires.</p>
        <o-playground name="Exemple de composant de référence synchrone" style="--editor-height: 500px">
          <code path="demo.html" preview>
    <template>
      <o-page src="page1.html"></o-page>
    </template>
  </code>
          <code path="page1.html" active>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <div>
        <demo-comp></demo-comp>
      </div>
      <script>
        // eslint-disable-next-line
        export default async ({ load }) => {
          await load("./demo-comp.html");
          return {
            data: {},
            proto: {},
          };
        };
      </script>
    </template>
  </code>
          <code path="demo-comp.html">
    <template component>
      <style>
        :host {
          display: block;
          border: 1px solid green;
          padding: 10px;
        }
      </style>
      <h3>{{title}}</h3>
      <script>

          return {

        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Référence asynchrone vs Référence synchrone</h2>
        <table>
          <thead>
            <tr>
              <th>Mode de citation</th>
              <th>Mot-clé</th>
              <th>Caractéristiques</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Chargement asynchrone</td>
              <td>Tag <code>l-m</code></td>
              <td>Chargement non bloquant, adapté au chargement à la demande des composants</td>
            </tr>
            <tr>
              <td>Chargement synchrone</td>
              <td>Méthode <code>load</code> avec le mot-clé <code>await</code></td>
              <td>Chargement bloquant, garantit que le composant est enregistré avant utilisation</td>
            </tr>
          </tbody>
        </table>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
