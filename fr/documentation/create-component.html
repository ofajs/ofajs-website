        <h1>Créer un composant</h1>
        <p>Dans ofa.js, les composants sont le mécanisme central pour réaliser la réutilisation des pages et la modularisation. Un composant est essentiellement un Web Component personnalisé, qui permet de créer des éléments d&#39;interface utilisateur réutilisables en définissant des templates, des styles et de la logique.</p>
        <h2>Structure de base du composant</h2>
        <p>Contrairement aux modules de page, le module de composant utilise l’attribut <code>component</code> sur l’élément <code>&lt;template&gt;</code> et déclare l’attribut <code>tag</code> pour spécifier le nom de la balise du composant.</p>
        <p>À l&#39;emplacement où vous devez utiliser le composant, chargez de manière asynchrone le module du composant via la balise <code>l-m</code> ; le système effectuera automatiquement l&#39;enregistrement. Ensuite, vous pouvez utiliser directement ce composant comme une balise HTML normale.</p>
        <o-playground name="Exemple de composant de base" style="--editor-height: 500px">
          <code path="demo.html" preview>
    <template>
      <l-m src="./demo-comp.html"></l-m>
      <demo-comp></demo-comp>
    </template>
  </code>
          <code path="demo-comp.html" active>
    <template component>
      <style>
        :host {
          display: block;
          border: 1px solid green;
          padding: 10px;
        }
      </style>
      <h3>{{title}}</h3>
      <script>
        export default async () => {
          return {
            tag: "demo-comp",
            data: {
              title: "Exemple de composant OFAJS",
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Concepts clés des composants</h2>
        <h3>tag - nom de l&#39;étiquette du composant</h3>
        <p><code>tag</code> est le nom de la balise du composant, <strong>doit être identique au nom de la balise utilisée pour le composant</strong>. Par exemple, si votre composant <code>tag</code> est défini comme <code>&quot;demo-comp&quot;</code>, alors lors de l&#39;utilisation en HTML, vous devez écrire <code>&lt;demo-comp&gt;&lt;/demo-comp&gt;</code>.</p>
        <h3>Référence du module composant</h3>
        <p>En introduisant le module de composants via la balise <code>l-m</code>, le module de composants enregistre automatiquement les composants. Cela ressemble à l&#39;utilisation de la balise <code>script</code> pour introduire un script, mais <code>l-m</code> est spécifiquement destiné au chargement et à l&#39;enregistrement des modules de composants.</p>
        <blockquote>
          <p>Attention : la balise de référence <code>l-m</code> est une <strong>référence asynchrone</strong>, adaptée au chargement à la demande des composants lors du chargement de la page.</p>
        </blockquote>
        <h2>Composant de référence synchrone</h2>
        <p>Dans certains scénarios, vous pouvez avoir besoin de charger un composant de manière synchrone (par exemple, pour vous assurer que le composant est bien enregistré avant utilisation). Vous pouvez alors utiliser la méthode <code>load</code> avec le mot-clé <code>await</code> pour réaliser une référence synchrone.</p>
        <p>Dans les modules de composants et les modules de pages, la fonction <code>load</code> est automatiquement injectée pour permettre aux développeurs de charger de manière synchrone les ressources nécessaires.</p>
        <o-playground name="Exemple de composant de référence synchrone" style="--editor-height: 500px">
          <code path="demo.html" preview>
    <template>
      <o-page src="page1.html"></o-page>
    </template>
  </code>
          <code path="page1.html" active>
    <template page>
      <style>
        :host {
          display: block;
          border: 1px solid red;
          padding: 10px;
        }
      </style>
      <div>
        <demo-comp></demo-comp>
      </div>
      <script>
        // eslint-disable-next-line
        export default async ({ load }) => {
          await load("./demo-comp.html");
          return {
            data: {},
            proto: {},
          };
        };
      </script>
    </template>
  </code>
          <code path="demo-comp.html">
    <template component>
      <style>
        :host {
          display: block;
          border: 1px solid green;
          padding: 10px;
        }
      </style>
      <h3>{{title}}</h3>
      <script>
        export default async ({ load }) => {
          return {
            tag: "demo-comp",
            data: {
              title: "Exemple de composant OFAJS",
            },
          };
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>référence asynchrone vs référence synchrone</h2>
        <table>
          <thead>
            <tr>
              <th>Mode de référence</th>
              <th>Mot-clé</th>
              <th>Caractéristique</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Référence asynchrone</td>
              <td>Balise <code>l-m</code></td>
              <td>Chargement non bloquant, adapté pour le chargement à la demande des composants</td>
            </tr>
            <tr>
              <td>Référence synchrone</td>
              <td>Méthode <code>load</code> avec le mot-clé <code>await</code></td>
              <td>Chargement bloquant, garantit que le composant est enregistré avant utilisation</td>
            </tr>
          </tbody>
        </table>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
