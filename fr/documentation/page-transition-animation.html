        <h1>Animations de transition de page</h1>
        <p>La configuration <code>pageAnime</code> est utilisée pour contrôler les effets d&#39;animation de transition lors du changement de page, améliorant ainsi l&#39;expérience utilisateur.</p>
        <h2>Configuration de base</h2>
        <p>Configurez les animations de transition de page dans <code>app-config.js</code> :</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(0, 0)&quot;</span>,
  },
  <span class="hljs-attr">next</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(30px, 0)&quot;</span>,
  },
  <span class="hljs-attr">previous</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(-30px, 0)&quot;</span>,
  },
};</code></pre>
        <h2>État d&#39;animation</h2>
        <p>L&#39;animation de transition de page comporte trois états :</p>
        <table>
          <thead>
            <tr>
              <th>État</th>
              <th>Description</th>
              <th>Moment de déclenchement</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><code>current</code></td>
              <td>Style de la page actuelle après la fin de l&#39;animation</td>
              <td>Une fois la commutation de page terminée</td>
            </tr>
            <tr>
              <td><code>next</code></td>
              <td>Style initial à l&#39;entrée de la nouvelle page</td>
              <td>Lorsque la nouvelle page commence à entrer</td>
            </tr>
            <tr>
              <td><code>previous</code></td>
              <td>Style cible à la sortie de l&#39;ancienne page</td>
              <td>Lorsque l&#39;ancienne page commence à quitter</td>
            </tr>
          </tbody>
        </table>
        <p><strong>current (état actuel)</strong>- Style final après la fin de la transition de page</p>
        <ul>
          <li>Généralement, l&#39;état d&#39;affichage normal de la page</li>
          <li>Par exemple : <code>opacity: 1, transform: &quot;translate(0, 0)&quot;</code></li>
        </ul>
        <p>Suivant (état de la page suivante)- Style initial lors de l&#39;entrée d&#39;une nouvelle page</p>
        <ul>
          <li>Utilisé pour définir d&#39;où la nouvelle page commence son entrée</li>
          <li>Par exemple : <code>opacity: 0, transform: &quot;translate(30px, 0)&quot;</code> signifie une entrée depuis la droite</li>
        </ul>
        <p><strong>précédent (état de la page précédente)</strong>- Style cible lorsque l&#39;ancienne page quitte</p>
        <ul>
          <li>Utilisé pour définir où l&#39;ancienne page doit aller</li>
          <li>Par exemple : <code>opacity: 0, transform: &quot;translate(-30px, 0)&quot;</code> signifie qu&#39;elle quitte vers la gauche</li>
        </ul>
        <h2>Effets d&#39;animation intégrés</h2>
        <h3>Glisser à gauche et à droite (par défaut)</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(0, 0)&quot;</span>,
  },
  <span class="hljs-attr">next</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(30px, 0)&quot;</span>,
  },
  <span class="hljs-attr">previous</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(-30px, 0)&quot;</span>,
  },
};</code></pre>
        <p>Description de l&#39;effet :- La nouvelle page glisse depuis la droite (position initiale à 30px sur la droite, opacité 0)</p>
        <ul>
          <li>L&#39;ancienne page glisse vers la gauche (position finale à -30px sur la gauche, opacité 0)</li>
          <li>Les deux pages reviennent finalement à leur position normale (opacité 1, position 0)</li>
        </ul>
        <h3>Fondu entrant et sortant</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>,
  },
  <span class="hljs-attr">next</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
  },
  <span class="hljs-attr">previous</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
  },
};</code></pre>
        <p>Description de l&#39;effet :- La nouvelle page passe de transparente à visible</p>
        <ul>
          <li>L&#39;ancienne page passe de visible à transparente</li>
          <li>Convient à un style d&#39;application simple et élégant</li>
        </ul>
        <h3>Glisser vers le haut et vers le bas</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(0, 0)&quot;</span>,
  },
  <span class="hljs-attr">next</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(0, 30px)&quot;</span>,
  },
  <span class="hljs-attr">previous</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(0, -30px)&quot;</span>,
  },
};</code></pre>
        <p>Description de l&#39;effet :- La nouvelle page glisse depuis le bas</p>
        <ul>
          <li>L&#39;ancienne page glisse vers le haut</li>
          <li>Convient aux applications avec un style de défilement vertical</li>
        </ul>
        <h3>Effet de zoom</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;scale(1)&quot;</span>,
  },
  <span class="hljs-attr">next</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;scale(0.8)&quot;</span>,
  },
  <span class="hljs-attr">previous</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;scale(1.2)&quot;</span>,
  },
};</code></pre>
        <p>Description de l&#39;effet :- La nouvelle page s&#39;agrandit d&#39;une petite taille à une taille normale</p>
        <ul>
          <li>La page précédente s&#39;agrandit de sa taille normale jusqu&#39;à disparaître</li>
          <li>Convient aux applications de type carte ou fenêtre modale</li>
        </ul>
        <h3>Effet de retournement</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;rotateY(0deg)&quot;</span>,
  },
  <span class="hljs-attr">next</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;rotateY(-90deg)&quot;</span>,
  },
  <span class="hljs-attr">previous</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;rotateY(90deg)&quot;</span>,
  },
};</code></pre>
        <p>Description de l&#39;effet :- La nouvelle page arrive en pivotant depuis la gauche</p>
        <ul>
          <li>L&#39;ancienne page disparaît en pivotant vers la droite</li>
          <li>Convient aux applications nécessitant un effet 3D</li>
        </ul>
        <h2>Animation personnalisée</h2>
        <h3>Combiner plusieurs attributs</h3>
        <p>On peut combiner plusieurs propriétés CSS pour créer des animations complexes：</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(0, 0) scale(1)&quot;</span>,
  },
  <span class="hljs-attr">next</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(50px, 50px) scale(0.9)&quot;</span>,
  },
  <span class="hljs-attr">previous</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(-50px, -50px) scale(1.1)&quot;</span>,
  },
};</code></pre>
        <h3>Utiliser différentes fonctions d&#39;interpolation</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(0, 0)&quot;</span>,
    <span class="hljs-attr">transition</span>: <span class="hljs-string">&quot;all 0.3s cubic-bezier(0.4, 0, 0.2, 1)&quot;</span>,
  },
  <span class="hljs-attr">next</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(30px, 0)&quot;</span>,
  },
  <span class="hljs-attr">previous</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(-30px, 0)&quot;</span>,
  },
};</code></pre>
        <h2>Propriétés CSS prises en charge</h2>
        <p><code>pageAnime</code> prend en charge toutes les propriétés CSS animables :</p>
        <h3>Propriétés courantes</h3>
        <ul>
          <li><code>opacity</code> - opacité (0-1)</li>
          <li><code>transform</code> - transformation<ul>
              <li><code>translate(x, y)</code> - translation</li>
              <li><code>scale(n)</code> - mise à l&#39;échelle</li>
              <li><code>rotate(deg)</code> - rotation</li>
              <li><code>rotateX/Y(deg)</code> - rotation 3D</li>
            </ul>
          </li>
          <li><code>width</code> / <code>height</code> - largeur / hauteur</li>
          <li><code>margin</code> / <code>padding</code> - marge extérieure / marge intérieure</li>
          <li><code>background-color</code> - couleur de fond</li>
          <li><code>border-radius</code> - rayon de bordure</li>
        </ul>
        <h3>Remarques</h3>
        <ol>
          <li><strong>Optimisation des performances</strong> : privilégiez <code>transform</code> et <code>opacity</code>, ce sont les plus performants</li>
          <li><strong>Évitez les secousses de mise en page</strong> : évitez les propriétés qui déclenchent un reflow (comme <code>width</code>, <code>height</code>, <code>margin</code>)</li>
          <li><strong>Durée de transition</strong> : ofa.js ajoute automatiquement des effets de transition, par défaut 300 ms</li>
        </ol>

        <h2>Meilleures pratiques</h2>
        <h3>1. Gardez les animations simples</h3>
        <p>Évitez les animations trop complexes, des animations simples sont meilleures :</p>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// ✅ Recommandé : simple et efficace</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: { <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>, <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(0, 0)&quot;</span> },
  <span class="hljs-attr">next</span>: { <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>, <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(30px, 0)&quot;</span> },
  <span class="hljs-attr">previous</span>: { <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>, <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(-30px, 0)&quot;</span> },
};

<span class="hljs-comment">// ❌ Non recommandé : trop complexe</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = {
  <span class="hljs-attr">current</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(0, 0) rotate(0deg) scale(1)&quot;</span>,
    <span class="hljs-attr">borderRadius</span>: <span class="hljs-string">&quot;0&quot;</span>,
  },
  <span class="hljs-attr">next</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(30px, 30px) rotate(45deg) scale(0.5)&quot;</span>,
    <span class="hljs-attr">borderRadius</span>: <span class="hljs-string">&quot;50%&quot;</span>,
  },
  <span class="hljs-attr">previous</span>: {
    <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>,
    <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(-30px, -30px) rotate(-45deg) scale(1.5)&quot;</span>,
    <span class="hljs-attr">borderRadius</span>: <span class="hljs-string">&quot;100%&quot;</span>,
  },
};</code></pre>
        <h3>2. Prise en compte de l&#39;expérience utilisateur</h3>
        <ul>
          <li>La durée de l&#39;animation ne doit pas être trop longue (recommandé : 200-400 ms)</li>
          <li>Évitez les animations qui provoquent des vertiges chez l&#39;utilisateur</li>
          <li>Assurez-vous que l&#39;animation est fluide, sans saccades</li>
        </ul>
        <h3>3. S’adapter à différents appareils</h3>
        <p>Sur les appareils bas de gamme, on peut envisager de désactiver ou de simplifier les animations :</p>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// Détection des performances de l&#x27;appareil</span>
<span class="hljs-keyword">const</span> isLowEndDevice = navigator.<span class="hljs-property">hardwareConcurrency</span> &lt; <span class="hljs-number">4</span>;

<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> pageAnime = isLowEndDevice ? {
  <span class="hljs-attr">current</span>: { <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span> },
  <span class="hljs-attr">next</span>: { <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span> },
  <span class="hljs-attr">previous</span>: { <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span> },
} : {
  <span class="hljs-attr">current</span>: { <span class="hljs-attr">opacity</span>: <span class="hljs-number">1</span>, <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(0, 0)&quot;</span> },
  <span class="hljs-attr">next</span>: { <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>, <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(30px, 0)&quot;</span> },
  <span class="hljs-attr">previous</span>: { <span class="hljs-attr">opacity</span>: <span class="hljs-number">0</span>, <span class="hljs-attr">transform</span>: <span class="hljs-string">&quot;translate(-30px, 0)&quot;</span> },
};</code></pre>

      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
