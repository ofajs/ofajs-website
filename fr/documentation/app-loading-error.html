        <h1>Chargement et gestion des erreurs</h1>
        <p>Pendant l&#39;exécution de l&#39;application, le chargement de la page prend du temps, et il peut également se produire un échec de chargement. <code>app-config.js</code> fournit les options de configuration <code>loading</code> et <code>fail</code> pour gérer ces scénarios.</p>
        <h2>loading - état de chargement</h2>
        <p><code>loading</code> L&#39;option de configuration est utilisée pour afficher du contenu pendant le chargement de la page, améliorant ainsi l&#39;expérience utilisateur.</p>
        <h3>Modèle de chaîne simple</h3>
        <p>La manière la plus simple est d&#39;utiliser un modèle de chaîne de caractères :</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> loading = <span class="hljs-string">&quot;&lt;div class=&#x27;loading&#x27;&gt;Chargement...&lt;/div&gt;&quot;</span>;</code></pre>
        <h3>Génération dynamique de fonctions</h3>
        <p>En utilisant des fonctions, vous pouvez générer dynamiquement des composants de chargement plus complexes : </p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> <span class="hljs-title function_">loading</span> = (<span class="hljs-params"></span>) =&gt; {
  <span class="hljs-keyword">return</span> <span class="hljs-string">`&lt;div class=&#x27;loading&#x27;&gt;
    &lt;span&gt;Chargement...&lt;/span&gt;
  &lt;/div&gt;`</span>;
};</code></pre>
        <h3>Exemple de barre de progression</h3>
        <p>Voici un bel effet de chargement de barre de progression :</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> <span class="hljs-title function_">loading</span> = (<span class="hljs-params"></span>) =&gt; {
  <span class="hljs-keyword">const</span> loadingEl = $({
    <span class="hljs-attr">tag</span>: <span class="hljs-string">&quot;div&quot;</span>,
    <span class="hljs-attr">css</span>: {
      <span class="hljs-attr">width</span>: <span class="hljs-string">&quot;100%&quot;</span>,
      <span class="hljs-attr">height</span>: <span class="hljs-string">&quot;100%&quot;</span>,
      <span class="hljs-attr">position</span>: <span class="hljs-string">&quot;absolute&quot;</span>,
      <span class="hljs-attr">zIndex</span>: <span class="hljs-number">1000</span>,
    },
    <span class="hljs-attr">html</span>: <span class="hljs-string">`
      &lt;div style=&quot;transition: all 10s cubic-bezier(0, 0, 0.22, 0.84) 0s; height: 2px;width: 0;background-color: rgb(0, 161, 46);&quot;&gt;&lt;/div&gt;
    `</span>,
  });

  <span class="hljs-built_in">setTimeout</span>(<span class="hljs-function">() =&gt;</span> (loadingEl[<span class="hljs-number">0</span>].<span class="hljs-property">style</span>.<span class="hljs-property">width</span> = <span class="hljs-string">&quot;98%&quot;</span>));

  loadingEl.<span class="hljs-property">remove</span> = <span class="hljs-function">() =&gt;</span> {
    loadingEl[<span class="hljs-number">0</span>].<span class="hljs-property">style</span>[<span class="hljs-string">&quot;transition-duration&quot;</span>] = <span class="hljs-string">&quot;0.1s&quot;</span>;
    loadingEl[<span class="hljs-number">0</span>].<span class="hljs-property">style</span>.<span class="hljs-property">width</span> = <span class="hljs-string">&quot;100%&quot;</span>;
    <span class="hljs-built_in">setTimeout</span>(<span class="hljs-function">() =&gt;</span> {
      $.fn.<span class="hljs-property">remove</span>.<span class="hljs-title function_">call</span>(loadingEl);
    }, <span class="hljs-number">200</span>);
  };

  <span class="hljs-keyword">return</span> loadingEl;
};</code></pre>
        <p>Cette barre de progression est implémentée :- Pendant le chargement de la page, la barre de progression augmente lentement de 0 % à 98 %</p>
        <ul>
          <li>Une fois la page chargée, la barre de progression atteint rapidement 100 % puis disparaît</li>
          <li>Utilisez des animations de transition fluides</li>
        </ul>
        <h3>Animation de chargement personnalisée</h3>
        <p><strong>Animation de chargement rotative：</strong></p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> <span class="hljs-title function_">loading</span> = (<span class="hljs-params"></span>) =&gt; {
  <span class="hljs-keyword">return</span> <span class="hljs-string">`&lt;div style=&quot;display:flex;justify-content:center;align-items:center;height:100%;&quot;&gt;
    &lt;div style=&quot;width:40px;height:40px;border:4px solid #f3f3f3;border-top:4px solid #3498db;border-radius:50%;animation:spin 1s linear infinite;&quot;&gt;&lt;/div&gt;
    &lt;style&gt;
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    &lt;/style&gt;
  &lt;/div&gt;`</span>;
};</code></pre>
        <p><strong>Chargement du squelette d’écran :</strong></p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> <span class="hljs-title function_">loading</span> = (<span class="hljs-params"></span>) =&gt; {
  <span class="hljs-keyword">return</span> <span class="hljs-string">`&lt;div style=&quot;padding: 20px;&quot;&gt;
    &lt;div style=&quot;height: 20px; background: #f0f0f0; margin-bottom: 10px; border-radius: 4px;&quot;&gt;&lt;/div&gt;
    &lt;div style=&quot;height: 20px; background: #f0f0f0; margin-bottom: 10px; border-radius: 4px; width: 80%;&quot;&gt;&lt;/div&gt;
    &lt;div style=&quot;height: 20px; background: #f0f0f0; border-radius: 4px; width: 60%;&quot;&gt;&lt;/div&gt;
  &lt;/div&gt;`</span>;
};</code></pre>
        <h2>fail - gestion des erreurs</h2>
        <p><code>fail</code> l&#39;élément de configuration est utilisé pour afficher un composant d&#39;indication d&#39;erreur lorsque le chargement de la page échoue.</p>
        <h3>Utilisation de base</h3>
        <p><code>fail</code> La fonction reçoit un paramètre d&#39;objet, comprenant :- <code>src</code> - Adresse de la page d&#39;erreur</p>
        <ul>
          <li><code>error</code> - Objet d&#39;information d&#39;erreur</li>
        </ul>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> <span class="hljs-title function_">fail</span> = (<span class="hljs-params">{ src, error }</span>) =&gt; {
  <span class="hljs-keyword">return</span> <span class="hljs-string">`&lt;div style=&quot;padding: 20px; color: #c00;&quot;&gt;
    &lt;h3&gt;Échec du chargement de la page&lt;/h3&gt;
    &lt;p&gt;Adresse: <span class="hljs-subst">${src}</span>&lt;/p&gt;
    &lt;p&gt;Erreur: <span class="hljs-subst">${error.message}</span>&lt;/p&gt;
    &lt;button on:click=&quot;back()&quot;&gt;Retour à la page précédente&lt;/button&gt;
  &lt;/div&gt;`</span>;
};</code></pre>
        <h3>Exemple de gestion complète des erreurs</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> <span class="hljs-title function_">fail</span> = (<span class="hljs-params">{ src, error }</span>) =&gt; {
  <span class="hljs-keyword">return</span> <span class="hljs-string">`&lt;div style=&quot;padding: 40px; text-align: center;&quot;&gt;
    &lt;div style=&quot;font-size: 48px; margin-bottom: 20px;&quot;&gt;⚠️&lt;/div&gt;
    &lt;h2 style=&quot;color: #e74c3c; margin-bottom: 10px;&quot;&gt;Échec du chargement de la page&lt;/h2&gt;
    &lt;p style=&quot;color: #666; margin-bottom: 20px;&quot;&gt;Impossible de charger la page : <span class="hljs-subst">${src}</span>&lt;/p&gt;
    &lt;p style=&quot;color: #999; font-size: 14px; margin-bottom: 30px;&quot;&gt;
      Message d&#x27;erreur : <span class="hljs-subst">${error.message}</span>
    &lt;/p&gt;
    &lt;div&gt;
      &lt;button on:click=&quot;back()&quot; style=&quot;padding: 10px 20px; margin-right: 10px; cursor: pointer;&quot;&gt;
        Retour à la page précédente
      &lt;/button&gt;
      &lt;button on:click=&quot;goto(&#x27;./home.html&#x27;)&quot; style=&quot;padding: 10px 20px; cursor: pointer;&quot;&gt;
        Retour à l&#x27;accueil
      &lt;/button&gt;
    &lt;/div&gt;
  &lt;/div&gt;`</span>;
};</code></pre>
        <h3>Gestion des types d’erreurs</h3>
        <p>Peut afficher différentes invites en fonction de différents types d&#39;erreurs :</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> <span class="hljs-title function_">fail</span> = (<span class="hljs-params">{ src, error }</span>) =&gt; {
  <span class="hljs-keyword">let</span> errorMessage = <span class="hljs-string">&quot;Erreur inconnue&quot;</span>;
  
  <span class="hljs-keyword">if</span> (error.<span class="hljs-property">message</span>.<span class="hljs-title function_">includes</span>(<span class="hljs-string">&quot;404&quot;</span>)) {
    errorMessage = <span class="hljs-string">&quot;Page introuvable&quot;</span>;
  } <span class="hljs-keyword">else</span> <span class="hljs-keyword">if</span> (error.<span class="hljs-property">message</span>.<span class="hljs-title function_">includes</span>(<span class="hljs-string">&quot;timeout&quot;</span>)) {
    errorMessage = <span class="hljs-string">&quot;Délai d&#x27;attente dépassé, veuillez vérifier votre connexion réseau&quot;</span>;
  } <span class="hljs-keyword">else</span> <span class="hljs-keyword">if</span> (error.<span class="hljs-property">message</span>.<span class="hljs-title function_">includes</span>(<span class="hljs-string">&quot;network&quot;</span>)) {
    errorMessage = <span class="hljs-string">&quot;Erreur réseau, veuillez réessayer plus tard&quot;</span>;
  }
  
  <span class="hljs-keyword">return</span> <span class="hljs-string">`&lt;div style=&quot;padding: 40px; text-align: center;&quot;&gt;
    &lt;h2&gt;Une erreur est survenue&lt;/h2&gt;
    &lt;p&gt;<span class="hljs-subst">${errorMessage}</span>&lt;/p&gt;
    &lt;button on:click=&quot;back()&quot;&gt;Retour&lt;/button&gt;
  &lt;/div&gt;`</span>;
};</code></pre>
