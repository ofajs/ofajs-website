        <h1>Introduction</h1>
        <h2>Qu'est-ce que ofa.js ?</h2>
        <p>ofa.js est un framework front-end Web facile à utiliser, spécialement conçu pour la construction d'applications Web, visant à améliorer l'efficacité de développement et à réduire le seuil d'entrée.</p>
        <blockquote>
          <p>Si vous êtes <strong>déjà familier</strong> avec HTML, CSS et JavaScript, alors ofa.js est un excellent choix.</p>
        </blockquote>
        <h2>Pourquoi je développe ofa.js</h2>
        <p>L'intention de conception d'ofa.js est simple : résoudre les problèmes d'<strong>ingénierie</strong> du développement Web sans dépendre d'outils de compilation.</p>
        <p>L'ingénierie logicielle consiste à intégrer de manière systématique les normes, les processus, les outils et les méthodes du développement logiciel, afin d'améliorer l'efficacité du développement, la qualité du code et la maintenabilité.</p>
        <p>Au cours des dix dernières années, le développement front-end Web a connu une évolution allant d'une croissance initiale désordonnée à une progressive industrialisation. Ce processus s'est inspiré de l'expérience du développement d'applications traditionnelles, en introduisant Node.js et des flux de compilation pour résoudre les problèmes d'industrialisation des projets de grande envergure.</p>
        <p>Cependant, lorsque le projet s'est agrandi, les inconvénients de ce modèle ont progressivement été révélés, entraînant le problème des <strong>applications monolithiques</strong> rencontré dans le développement traditionnel, ce qui rend le projet difficile à maintenir et les itérations des besoins d'interaction complexes.</p>
        <blockquote>
          <p>Une application monolithique (Monolithic Application) fait référence à une application unique, vaste et étroitement couplée, où tous les modules fonctionnels sont concentrés dans un seul dépôt de code. Un changement mineur peut affecter l'ensemble du système, rendant difficile le développement et le déploiement indépendants.</p>
        </blockquote>
        <p>À ce moment-là, il faut décomposer le projet pour réaliser une micro-frontendisation, tout comme les <strong>micro-services</strong>. Mais en raison du traitement de compilation, la micro-frontend devient difficile et fastidieuse ; le déploiement indépendant des modules frontaux nécessite la compilation de chaque petit module, ce qui est très difficile, entraînant pratiquement un arrêt du développement des technologies frontales Web.</p>
        <p>Les microservices (Microservices) sont un style d'architecture logicielle qui décompose des applications volumineuses et complexes en plusieurs petits services à granularité fine, déployés et exécutés indépendamment.</p>
        <p>À ce moment-là, j'ai commencé à réfléchir : les langages de programmation traditionnels doivent s'adapter à différents matériels et systèmes d'exploitation, ils doivent donc être compilés pour réaliser une différenciation multiplateforme. Mais le développement Web est différent, il est basé sur le navigateur, il n'a pas besoin d'être compilé à l'origine, il peut fonctionner et être déployé indépendamment, et il est naturellement en mode micro-frontend. Alors j'ai réalisé que c'est le processus de compilation qui complique les choses.</p>
        <p>Autrement dit, tant que les problèmes d'ingénierie sont résolus et que l'étape de compilation nécessaire est supprimée, le développement front-end est très adapté à la création d'applications à grande échelle, ce qui constitue un modèle natif de micro-frontends. C'est ainsi qu'ofa.js a vu le jour.</p>
        <h2>Avantages clés</h2>
        <h3>Zéro seuil, prêt à l'emploi</h3>
        <p>Pas besoin de configurer un environnement de développement, d'installer des dépendances ou de configurer un échafaudage. Ouvrez simplement le programme de construction officiel via un navigateur, sélectionnez un répertoire local et commencez à développer. Toutes les opérations de calcul, de données et de stockage sont exécutées localement, sans dépendre de services cloud.</p>
        <h3>AI convivial, facile à vérifier</h3>
        <p>Pas de boîte noire de compilation, le code produit par l'IA peut être déployé et auto-vérifié rapidement ; réduire les couches intermédiaires, éviter le processus de compilation, rend le code plus facile à localiser et à réparer les problèmes.</p>
        <h3>Prise en charge native des micro-frontends</h3>
        <p>ofa.js permet au développement front-end Web d’être découpé, comme avec les micro-services, en plusieurs modules indépendants, chacun pouvant être développé et déployé séparément. Une fois les frontières du front-end Web traditionnel abolies, les technologies front-end franchiront progressivement les limites imposées par les technologies serveur.</p>

          <li>Si vous êtes débutant, il est recommandé de commencer par <a href="./create-first-app.html" olink="">Créer votre première application</a>.</li>
        </ul>
