        <h1>Événements personnalisés</h1>
        <p>Dans ofa.js, outre les événements DOM intégrés, il est également possible de créer et d'utiliser des événements personnalisés pour реализовать взаимодействие между компонентами. Les événements personnalisés sont un mécanisme important dans le développement basé sur les composants, ils permettent aux composants de propager des messages ou des changements d'état vers le haut.</p>
        <h2>méthode emit - déclencher des événements personnalisés</h2>
        <p>La méthode <code>emit</code> est utilisée pour déclencher des événements personnalisés, afin de notifier les écouteurs externes des changements d'état internes du composant ou des actions de l'utilisateur.</p>
        <h3>Utilisation de base</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// Déclencher un événement personnalisé simple</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-title function_">emit</span>(<span class="hljs-string">'custom-event'</span>);

<span class="hljs-comment">// Déclencher un événement personnalisé avec des données</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-title function_">emit</span>(<span class="hljs-string">'data-changed'</span>, {
  <span class="hljs-attr">data</span>: {
    <span class="hljs-comment">// Données personnalisées, structure libre selon les besoins</span>
    <span class="hljs-attr">newValue</span>: <span class="hljs-number">100</span>,
    <span class="hljs-attr">oldValue</span>: <span class="hljs-number">50</span>
  }
});</code></pre>
        <h3>Paramètres de la méthode emit</h3>
        <p>La méthode <code>emit</code> accepte deux paramètres :</p>
        <ol>
          <li><strong>Nom de l'événement</strong> : chaîne de caractères, désigne le nom de l'événement à déclencher</li>
          <li><strong>Objet d'options</strong> (facultatif) : contient les options de configuration de l'événement<ul>
              <li><code>data</code> : données à transmettre</li>
              <li><code>bubbles</code> : booléen, contrôle si l'événement remonte (par défaut true)</li>
              <li><code>composed</code> : booléen, contrôle si l'événement peut traverser les limites du Shadow DOM</li>
              <li><code>cancelable</code> : booléen, contrôle si l'événement peut être annulé</li>
            </ul>
          </li>
        </ol>
        <p>Ensuite, l'élément parent peut utiliser la méthode <code>on</code> <a href="./event-binding.html" olink="">(liaison d'événements)</a> pour écouter cet événement personnalisé.</p>

        <h2>bubbles - Mécanisme de propagation d'événements</h2>
        <p>L'attribut <code>bubbles</code> contrôle si l'événement remonte aux éléments parents. Lorsqu'il est défini à <code>true</code>, l'événement se propage le long de l'arbre DOM. La valeur par défaut est <code>true</code>. Si défini à <code>false</code>, l'événement ne remontera pas.</p>
        <h3>Explication détaillée du mécanisme de bulles</h3>
        <ul>
          <li><strong>Comportement par défaut</strong> : Les événements émis avec <code>emit</code> sont par défaut en mode propagation (<code>bubbles: true</code>)</li>
          <li><strong>Chemin de propagation</strong> : L'événement commence à partir de l'élément déclencheur et se propage vers le haut de manière hiérarchique</li>
          <li><strong>Arrêter la propagation</strong> : Appeler <code>event.stopPropagation()</code> dans le gestionnaire d'événements permet d'arrêter la propagation</li>
        </ul>
        <h3>Exemple de tri à bulles</h3>

      <p>Conteneur externe (écoute l'événement en propagation) : {{bubbledEventCount}} fois</p>
      <p>Composant interne (écoute l'événement direct) : {{directEventCount}} fois</p>
      <p>Données reçues : <span style="color:red;">{{result}}</span></p>

            data: {
              result:"-",
              bubbledEventCount: 0,
              directEventCount: 0
            },
            proto: {
              handleDirectChildEvent(event) {
                this.directEventCount++;
                this.result = event.data;
              },
              handleChildEventFromComponent(event) {
                this.bubbledEventCount++;
                this.result = event.data;
              },
            }

    <template component="">
      <style>

      <script>
        export default async () => {
          return {
            tag: "bubble-component",
            proto: {
              triggerNonBubblingEvent() {
                // Événement non propagé, seul l'écouteur direct le capturera
                this.emit('child-event', {
                  data: { type: 'non-bubbling', message: 'Événement non propagé déclenché', timestamp: Date.now() },
                  bubbles: false
                });
              },
              triggerBubblingEvent() {
                // Événement propagé, remonte vers l'élément parent
                this.emit('child-event', {
                  data: { type: 'bubbling', message: 'Événement propagé déclenché', timestamp: Date.now() },
                  bubbles: true
                });
              }
            }
          };
        };
      </script>
    </template>
  </code>

        <h2>composed - 穿透 Shadow DOM 边界</h2>
        <p>La propriété <code>composed</code> contrôle si un événement peut traverser la frontière du Shadow DOM. C’est particulièrement important pour le développement de Web Components, et sa valeur par défaut est <code>false</code>.</p>
        <h3>Détails du mécanisme de pénétration</h3>
        <ul>
          <li><strong>Isolation du Shadow DOM</strong> : Par défaut, les événements ne peuvent pas traverser les frontières du Shadow DOM</li>
          <li><strong>Activation de la traversée</strong> : Définir <code>composed: true</code> permet aux événements de traverser les frontières du Shadow DOM</li>
          <li><strong>Cas d'utilisation</strong> : Lorsqu'un composant doit émettre des événements vers l'environnement hôte, il est nécessaire de définir <code>composed: true</code></li>
        </ul>
