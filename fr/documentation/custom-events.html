        <h1>Événements personnalisés</h1>
        <p>Dans ofa.js, en plus des événements DOM intégrés, il est également possible de créer et d'utiliser des événements personnalisés pour permettre la communication entre composants. Les événements personnalisés constituent un mécanisme essentiel du développement basé sur des composants, car ils permettent à un composant de diffuser vers l'extérieur des messages ou des changements d'état.</p>
        <h2>Méthode emit - Déclencher des événements personnalisés</h2>
        <p>La méthode <code>emit</code> sert à déclencher des événements personnalisés, afin de notifier les écouteurs externes des changements d'état internes du composant ou des actions de l'utilisateur.</p>
        <h3>Utilisation de base</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-comment">// Déclencher un événement personnalisé simple</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-title function_">emit</span>(<span class="hljs-string">'custom-event'</span>);

<span class="hljs-comment">// Déclencher un événement personnalisé avec des données</span>
<span class="hljs-variable language_">this</span>.<span class="hljs-title function_">emit</span>(<span class="hljs-string">'data-changed'</span>, {
  <span class="hljs-attr">data</span>: {
    <span class="hljs-comment">// Données personnalisées, structure arbitraire selon les besoins</span>
    <span class="hljs-attr">newValue</span>: <span class="hljs-number">100</span>,
    <span class="hljs-attr">oldValue</span>: <span class="hljs-number">50</span>
  }
});</code></pre>
        <h3>Paramètres de la méthode emit</h3>
        <p>La méthode <code>emit</code> accepte deux paramètres :</p>
        <ol>
          <li><strong>Nom de l'événement</strong> : chaîne de caractères, indiquant le nom de l'événement à déclencher</li>
          <li><strong>Objet d'options</strong> (en option) : contient les options de configuration de l'événement<ul>
              <li><code>data</code> : données à transmettre</li>
              <li><code>bubbles</code> : booléen, contrôle si l'événement se propage vers le haut (par défaut true)</li>
              <li><code>composed</code> : booléen, contrôle si l'événement peut traverser la limite du Shadow DOM</li>
              <li><code>cancelable</code> : booléen, contrôle si l'événement peut être annulé</li>
            </ul>
          </li>
        </ol>
        <p>Ensuite, l'élément parent peut utiliser la méthode <code>on</code> <a href="./event-binding.html" olink="">(liaison d'événements)</a> pour écouter cet événement personnalisé.</p>

        <h2>bubbles - mécanisme de propagation des événements</h2>
        <p><code>La propriété </code>bubbles<code>contrôle si l'événement remonte vers les éléments parents. Lorsqu'elle est définie sur</code>true<code>, l'événement se propage vers le haut de l'arbre DOM. La valeur par défaut est </code>true<code>. Si elle est définie sur </code>false`, l'événement ne remontera pas.</p>
        <h3>Explication détaillée du mécanisme de bullage</h3>
        <ul>
          <li><strong>Comportement par défaut</strong> : les événements émis avec <code>emit</code> ont la propagation activée par défaut (<code>bubbles: true</code>)</li>
          <li><strong>Chemin de propagation</strong> : l’événement commence à partir de l’élément déclencheur et se propage niveau par niveau vers le haut</li>
          <li><strong>Arrêter la propagation</strong> : appeler <code>event.stopPropagation()</code> dans le gestionnaire d’événement permet d’empêcher la propagation</li>
        </ul>
        <h3>Exemple de bulle</h3>

      <p>Conteneur extérieur (écoute des événements bubbling) : {{bubbledEventCount}} fois</p>
      <p>Composant intérieur (écoute des événements directs) : {{directEventCount}} fois</p>
      <p>Données reçues : <span style="color:red;">{{result}}</span></p>
      <script>
        export default async () => {
          return {
            data: {
              result:"-",
              bubbledEventCount: 0,
              directEventCount: 0
            },
            proto: {
              handleDirectChildEvent(event) {
                this.directEventCount++;
                this.result = event.data;
              },
              handleChildEventFromComponent(event) {
                this.bubbledEventCount++;
                this.result = event.data;
              },
            }
          };

    <template component="">
      <style>

      <button on:click="triggerNonBubblingEvent">Déclencher un événement non bubbling</button>
      <button on:click="triggerBubblingEvent">Déclencher un événement bubbling</button>
      <script>
        export default async () => {
          return {
            tag: "bubble-component",
            proto: {
              triggerNonBubblingEvent() {
                // Événement non bubbling, ne sera capturé que par l'écouteur direct
                this.emit('child-event', {
                  data: { type: 'non-bubbling', message: 'Événement non bubbling déclenché', timestamp: Date.now() },
                  bubbles: false
                });
              },
              triggerBubblingEvent() {
                // Événement bubbling, se propagera vers les éléments parents
                this.emit('child-event', {
                  data: { type: 'bubbling', message: 'Événement bubbling déclenché', timestamp: Date.now() },
                  bubbles: true
                });
              }
            }
          };
        };
      </script>
    </template>
  </code>

        <h2>composed - Pénétrer les limites du Shadow DOM</h2>
        <p>La propriété <code>composed</code> contrôle si l'événement peut traverser la frontière du Shadow DOM. Cela est particulièrement important pour le développement de Web Components, la valeur par défaut est <code>false</code>.</p>
        <h3>Explication détaillée du mécanisme de pénétration</h3>
        <ul>
          <li><strong>Isolement Shadow DOM</strong>：Par défaut, les événements ne peuvent pas traverser la frontière Shadow DOM</li>
          <li><strong>Activation de la pénétration</strong>：Définir <code>composed: true</code> permet aux événements de traverser la frontière Shadow DOM</li>
          <li><strong>Scénario d'utilisation</strong>：Lorsqu'un composant doit envoyer un événement à l'environnement hôte, <code>composed: true</code> doit être défini</li>
        </ul>
