        <h1>Comprendre la liaison d'attributs</h1>
        <p>Dans le contenu précédent, nous avons présenté les bases de l'utilisation de la <a href="./property-binding.html" olink="">liaison de propriétés</a>. L'exemple précédent consistait à lier l'attribut value d'un élément natif du navigateur (comme <code>textarea</code>). Cette section approfondira l'exploration de la nature de la liaison de propriétés — elle lie en réalité aux propriétés JavaScript de l'instance du composant, et non aux attributs HTML.</p>
        <h2>Mécanisme de liaison des propriétés des composants</h2>
        <p>Dans ofa.js, lorsque nous utilisons la syntaxe <code>:toProp="fromProp"</code> dans un composant parent, nous définissons une propriété JavaScript de l'instance du composant enfant, et non un attribut HTML. Cela constitue une différence importante par rapport à la définition directe d'un attribut HTML (comme <code>attr:toKey="fromKey"</code>).</p>
        <p>L'exemple suivant montre comment transmettre des données à un composant personnalisé via la liaison d'attributs :</p>

        <p>Dans cet exemple :- Les données <code>val</code> du composant parent sont liées à la propriété <code>fullName</code> du composant enfant <code>&lt;demo-comp&gt;</code></p>
        <ul>
          <li>Utiliser la syntaxe <code>:full-name="val"</code> pour transmettre la valeur <code>val</code> du composant parent à la propriété <code>fullName</code> du composant enfant</li>
          <li>Après réception de cette valeur, le composant enfant l’affiche dans le modèle via <code>{{fullName}}</code></li>
        </ul>
        <h2>Liaison d'attributs vs Héritage d'attributs de caractéristiques</h2>
        <p>Il est important de noter que la liaison d'attributs (<code>:</code>) et l'héritage des attributs de caractéristiques (<code>attr:</code>) présentent les différences clés suivantes :</p>
        <h3>Liaison de propriété (<code>:</code>)</h3>
        <ul>
          <li>Propriétés JavaScript liées à l’instance du composant</li>
          <li>Les données transmises conservent leur type d’origine (chaîne, nombre, booléen, etc.)</li>
          <li>Elles sont directement accessibles et modifiables à l’intérieur du composant, sans même avoir à définir au préalable un <code>data</code> dans le composant</li>
        </ul>
        <h3>Héritage des attributs de caractéristiques (<code>attr:</code>)</h3>
        <ul>
          <li>Définir les attributs HTML</li>
          <li>Toutes les valeurs sont converties en chaînes de caractères</li>
          <li>Principalement utilisé pour transmettre des attributs aux éléments DOM sous-jacents</li>
          <li>Nécessite un traitement spécial pour analyser les données complexes</li>
          <li>Doit être défini à l'avance dans le composant avec <code>attrs</code> pour recevoir les valeurs d'attribut</li>
        </ul>
        <p>Comparaison grammaticale :```html</p>
        <!-- Liaison d'attributs : transmettre des valeurs JavaScript, conserver les types de données -->
        <p><my-component :data-value="complexObject"></my-component>
          <my-component :count="42"></my-component>
          <my-component :is-active="true"></my-component>
        </p>
        <!-- Héritage d'attributs : définir des attributs HTML, toutes les valeurs sont converties en chaînes -->
        <p><my-component attr:data-value="simpleString"></my-component>
          <my-component attr:count="42"></my-component> <!-- Chaîne "42" réellement transmise -->
        </p>

## Liaison de données bidirectionnelle

Les composants instanciés prennent également en charge la liaison de données bidirectionnelle, en utilisant la syntaxe `sync:toProp="fromProp"`. La liaison bidirectionnelle permet la synchronisation des données entre le composant parent et le composant enfant ; lorsque les données changent d'un côté, l'autre côté est mis à jour en conséquence.

&gt; Contrairement à Angular et Vue, ofa.js n'a pas besoin d'ajouter de configuration spéciale ou d'opérations supplémentaires aux composants pour prendre en charge nativement la syntaxe de liaison de données bidirectionnelle.

Dans cet exemple :- Le `val` du composant parent et le `fullName` du composant enfant réalisent une liaison bidirectionnelle via `sync:full-name="val"`
- Lorsqu’on saisit du contenu dans le champ du composant parent, le composant enfant affiche immédiatement la nouvelle valeur
- Lorsqu’on saisit du contenu dans le champ du composant enfant, le composant parent se met également à jour et affiche la nouvelle valeur

### Différence entre la liaison bidirectionnelle et la liaison de propriété normale

| 特性 | 普通属性绑定 (`:)`) | 双向绑定 (`sync:`) |
|------|-------------------|-------------------|
| 数据流向 | 单向：父 → 子 | 双向：父 ↔ 子 |
| 语法 | `:prop="value"` | `sync:prop="value"` |
| 子组件修改 | 不影响父组件 | 影响父组件 |
| 适用场景 | 父组件向子组件传递配置 | 需要父子组件同步数据 |### Remarques

1. **Considérations de performance** : La liaison bidirectionnelle déclenche un nouveau rendu lors des changements de données, elle doit être utilisée avec prudence dans des scénarios complexes.
2. **Contrôle du flux de données** : Un excès de liaisons bidirectionnelles peut rendre le flux de données difficile à suivre, il est recommandé de concevoir judicieusement les modes de communication entre les composants.
3. **Compatibilité des composants** : Tous les composants ne sont pas adaptés à l'utilisation de la liaison bidirectionnelle, il faut tenir compte de l'objectif de conception du composant.</span></code></pre>
