        <h1>Comprendre la liaison des propriétés</h1>
        <p>Dans le contenu précédent, nous avons présenté brièvement la méthode de base de la <a href="./property-binding.html" olink="">liaison de propriétés</a>. L’exemple précédent servait à lier l’attribut <code>value</code> d’un élément natif du navigateur (comme <code>textarea</code>). Cette section approfondira l’essence de la liaison de propriétés : il s’agit en réalité de lier une propriété JavaScript après l’instanciation du composant, et non un attribut HTML.</p>
        <h2>Mécanisme de liaison des propriétés du composant</h2>
        <p>Dans ofa.js, lorsque nous utilisons la syntaxe <code>:toProp="fromProp"</code> dans le composant parent, nous définissons la propriété JavaScript de l’instance du composant enfant, et non un attribut HTML. Cela diffère de la définition directe d’un attribut HTML (comme <code>attr:toKey="fromKey"</code>), et cette distinction est importante.</p>
        <p>L'exemple ci-dessous montre comment transmettre des données à un composant personnalisé via la liaison de propriétés :</p>

        export default async () => {
          return {

              val: "ofajs",
            },

        };

        <p>Dans cet exemple :- La donnée <code>val</code> du composant parent est liée à la propriété <code>fullName</code> du composant enfant <code>&lt;demo-comp&gt;</code></p>
        <ul>
          <li>La syntaxe <code>:full-name="val"</code> est utilisée pour transmettre la valeur de <code>val</code> du composant parent à la propriété <code>fullName</code> du composant enfant</li>
          <li>Après avoir reçu cette valeur, le composant enfant l'affiche dans le template via <code>{{fullName}}</code></li>
        </ul>
        <h2>Liaison de propriétés vs héritage de propriétés caractéristiques</h2>
        <p>Il convient de noter que la liaison de propriété (<code>:</code>) et l’héritage des attributs de caractéristique (<code>attr:</code>) présentent les différences clés suivantes :</p>
        <h3>Liaison de propriété (<code>:</code>)</h3>
        <ul>
          <li>Propriétés JavaScript liées à l’instance du composant</li>
          <li>Les données transmises conservent leur type d’origine (chaîne, nombre, booléen, etc.)</li>
          <li>Accessibles et modifiables directement à l’intérieur du composant, sans même avoir à définir au préalable <code>data</code> dans le composant</li>
        </ul>
        <h3>Héritage des attributs de caractéristiques (<code>attr:</code>)</h3>
        <ul>
          <li>Définir des attributs HTML</li>
          <li>Toutes les valeurs sont converties en chaînes de caractères</li>
          <li>Principalement utilisé pour transmettre des attributs aux éléments DOM sous-jacents</li>
          <li>Nécessite un traitement spécial pour analyser les données complexes</li>
          <li>Il est nécessaire de définir <code>attrs</code> à l'intérieur du composant à l'avance pour pouvoir recevoir les valeurs d'attribut</li>
        </ul>
        <p>Comparaison grammaticale :```html</p>
        <!-- Liaison de propriété : transmettre des valeurs JavaScript, en conservant le type de données -->
        <p><my-component :data-value="complexObject"></my-component>
          <my-component :count="42"></my-component>
          <my-component :is-active="true"></my-component>
        </p>
        <!-- Héritage d'attributs : définir des attributs HTML, toutes les valeurs sont converties en chaînes -->
        <p><my-component attr:data-value="simpleString"></my-component>
          <my-component attr:count="42"></my-component> <!-- en pratique, la chaîne de caractères "42" est transmise -->
        </p>

## Liaison de données bidirectionnelle

Une fois instancié, le composant prend également en charge la liaison de données bidirectionnelle via la syntaxe `sync:toProp="fromProp"`. Cette liaison bidirectionnelle permet la synchronisation des données entre le composant parent et le composant enfant ; lorsque les données changent d’un côté, l’autre côté se met à jour en conséquence.

&gt; Contrairement à Angular et Vue, ofa.js prend en charge nativement la syntaxe de liaison de données bidirectionnelle sans nécessiter de configuration spéciale ou d'opérations supplémentaires pour les composants.

Dans cet exemple :- La propriété `val` du composant parent et la propriété `fullName` du composant enfant sont liées de manière bidirectionnelle via `sync:full-name="val"`
- Lorsque l'utilisateur saisit du contenu dans la zone de saisie du composant parent, le composant enfant affiche immédiatement la nouvelle valeur
- Lorsque l'utilisateur saisit du contenu dans la zone de saisie du composant enfant, le composant parent est également mis à jour immédiatement

### Différence entre la liaison bidirectionnelle et la liaison de propriété normale

| Caractéristique | Liaison de propriété normale (`:`) | Liaison bidirectionnelle (`sync:`) |
|------|-------------------|-------------------|
| Flux de données | Unidirectionnel : parent → enfant | Bidirectionnel : parent ↔ enfant |
| Syntaxe | `:prop="value"` | `sync:prop="value"` |
| Modification par l'enfant | N'affecte pas le parent | Affecte le parent |
| Cas d'utilisation | Parent transmet une configuration à l'enfant | Nécessite la synchronisation des données entre parent et enfant |### Remarques

1. **Considérations de performance** : la liaison bidirectionnelle déclenche un nouveau rendu lorsque les données changent ; elle doit être utilisée avec prudence dans des scénarios complexes  
2. **Contrôle du flux de données** : trop de liaisons bidirectionnelles peuvent rendre le flux de données difficile à suivre ; il est conseillé de concevoir rationnellement les modes de communication entre composants  
3. **Compatibilité des composants** : tous les composants ne sont pas adaptés à la liaison bidirectionnelle ; l’objectif de conception du composant doit être pris en compte</span></code></pre>
