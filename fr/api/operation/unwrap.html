      <article class="markdown-body">
        <h1>unwrap</h1>
        <p>La méthode <code>unwrap</code> sert à supprimer l&#39;élément d&#39;emballage externe de l&#39;élément cible.</p>
        <o-playground name="unwrap - retirer l'enveloppe" style="--editor-height: 440px">
          <code path="demo.html">
    <template>
      <style> div{border: #aaa solid 1px; margin:8px; padding:8px;} </style>
      <div style="color:red;border-color:red;">
        <div id="target">I am target</div>
      </div>
      <script>
        setTimeout(()=>{
          \$('#target').unwrap();
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Remarques</h2>
        <p>L’élément cible <strong>doit posséder un nœud parent</strong>, sinon l’opération de suppression de l’enveloppe (unwrap) ne peut pas être exécutée.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> $el = $(<span class="hljs-string">`
&lt;div&gt;
    &lt;div id=&quot;target&quot;&gt;&lt;/div&gt;
&lt;/div&gt;
`</span>);

$el.<span class="hljs-title function_">unwrap</span>(); <span class="hljs-comment">// erreur, pas d&#x27;élément parent, impossible de unwrap</span>
$el.$(<span class="hljs-string">&#x27;#target&#x27;</span>).<span class="hljs-title function_">unwrap</span>(); <span class="hljs-comment">// correct, supprime l&#x27;élément qui englobe</span></code></pre>
        <p>Lorsque l&#39;élément cible possède d&#39;autres éléments frères, il n&#39;est pas non plus possible d&#39;exécuter unwrap.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> $el = $(<span class="hljs-string">`
&lt;div&gt;
    &lt;div id=&quot;target&quot;&gt;&lt;/div&gt;
    &lt;div&gt;Je suis un nœud frère&lt;/div&gt;
&lt;/div&gt;
`</span>);

$el.$(<span class="hljs-string">&#x27;#target&#x27;</span>).<span class="hljs-title function_">unwrap</span>(); <span class="hljs-comment">// Erreur, car il possède d&#x27;autres nœuds adjacents</span></code></pre>
        <p>Veuillez noter qu&#39;il ne faut pas操作 à l&#39;intérieur de composants de modèle tels que o-fill ou o-if.</p>
