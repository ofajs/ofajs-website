      <article class="markdown-body">
        <h1>one</h1>
        <p>En utilisant la méthode <code>one</code>, vous pouvez enregistrer un gestionnaire d’événement unique pour l’élément cible, ce qui signifie que le gestionnaire sera automatiquement désactivé après la première déclenchement et ne se déclenchera plus.</p>
        <p>Voici un exemple démontrant comment utiliser la méthode <code>one</code> pour enregistrer un gestionnaire d&#39;événement de clic sur un élément de bouton：</p>
        <o-playground name="one - click 一次性事件" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <button id="target">ajouter le compte</button>
      <br>
      <br>
      <div id="logger" style="border:red solid 1px;padding:8px;">-</div>
      <script>
        let count = 0;
        \$("#target").one("click", ()=> {
          \$("#logger").text = count++;
        });
      </script>
    </template>
  </code>
        </o-playground>
        <p>Dans cet exemple, nous utilisons la méthode <code>one</code> pour attacher un gestionnaire d’événement de clic à l’élément bouton. Lorsque l’utilisateur clique sur le bouton, le gestionnaire d’événement se déclenche, mais ne se déclenchera plus par la suite, car il a été désactivé.</p>
        <h2>Utilisation de la syntaxe de modèle</h2>
        <p>Vous pouvez également utiliser la syntaxe des modèles pour lier des gestionnaires d’événements ponctuels à l’élément cible.</p>
        <o-playground name="one - Syntaxe des modèles" style="--editor-height: 400px">
          <code path="demo.html" preview>
    <template>
      <l-m src="./one-demo.html"></l-m>
      <one-demo></one-demo>
    </template>
  </code>
          <code path="one-demo.html" active>
    <template component>
      <button one:click="addCount">Ajouter le compteur</button>
      <div>{{count}}</div>
      <script>
        export default {
          tag: "one-demo",
          data: {
            count: 0
          },
          proto:{
            addCount(){
              this.count++;
            }
          }
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>在这个示例中，我们在按钮元素上使用 <code>one:click</code> 绑定了一个名为 <code>addCount</code> 的方法。当用户点击按钮时，这个方法将被调用，但之后不会再次触发，因为它是一次性事件处理程序。</p>
      </article>
      <div class="footer"></div>
      <script>
        export const parent = "../../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
    </template>
