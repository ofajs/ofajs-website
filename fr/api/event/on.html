        <h1>on</h1>
        <p>En utilisant la méthode <code>on</code>, vous pouvez enregistrer des gestionnaires d&#39;événements pour les éléments cibles. Cela vous permet de capturer et de répondre facilement aux interactions des utilisateurs.</p>
        <p>Voici un exemple montrant comment utiliser la méthode <code>on</code> pour enregistrer un gestionnaire d&#39;événements de clic pour un élément bouton :</p>
        <o-playground name="événement on - click" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <button id="target">ajouter le compteur</button>
      <br>
      <br>
      <div id="logger" style="border:red solid 1px;padding:8px;">-</div>
      <script>
        let count = 0;
        \$("#target").on("click", ()=> {
          \$("#logger").text = count++;
        });
      </script>
    </template>
  </code>
        </o-playground>
        <p>Dans cet exemple, nous utilisons la méthode <code>on</code> pour ajouter un gestionnaire d&#39;événement de clic à un élément de bouton. Lorsque l&#39;utilisateur clique sur le bouton, le gestionnaire d&#39;événement est déclenché, le compteur s&#39;incrémente et le résultat s&#39;affiche sur la page.</p>
        <h2>Utilisation via la syntaxe de modèle</h2>
        <p>Vous pouvez également utiliser la syntaxe de modèle pour lier des méthodes à des éléments cibles.</p>
        <o-playground name="on - Syntaxe de modèle" style="--editor-height: 400px">
          <code path="demo.html" preview>
    <template>
      <l-m src="./on-demo.html"></l-m>
      <on-demo></on-demo>
    </template>
  </code>
          <code path="on-demo.html" active>
    <template component>
      <button on:click="addCount">Add Count</button>
      <div>{{count}}</div>
      <script>
        export default {
          tag: "on-demo",
          data: {
            count: 0
          },
          proto:{
            addCount(){
              this.count++;
            }
          }
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>Dans cet exemple, nous utilisons <code>on:click</code> sur l&#39;élément bouton pour lier une méthode nommée <code>addCount</code>. Lorsque l&#39;utilisateur clique sur le bouton, cette méthode est appelée, la valeur du compteur s&#39;incrémente et s&#39;affiche sur la page. Cette approche vous permet d&#39;associer des gestionnaires d&#39;événements à des méthodes de composant pour réaliser des interactions plus complexes.</p>
        <h2>event</h2>
        <p>Après l&#39;enregistrement de l&#39;événement, la fonction déclenchée recevra l&#39;objet event, conformément au comportement natif :</p>
        <o-playground name="paramètre on - event" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <button id="target">add count</button>
      <br>
      <br>
      <div id="logger" style="border:red solid 1px;padding:8px;">-</div>
      <script>
        let count = 0;
        \$("#target").on("click", (event)=> {
          \$("#logger").text = event.type;
        });
      </script>
    </template>
  </code>
