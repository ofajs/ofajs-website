        <h1>emit</h1>
        <p>En utilisant la méthode <code>emit</code>, vous pouvez déclencher activement des événements, et les événements déclenchés ont un mécanisme de propagation par bulles. Le mécanisme de propagation par bulles signifie que l&#39;événement se propage des éléments internes vers les éléments externes, déclenchant les événements de manière hiérarchique de l&#39;intérieur vers l&#39;extérieur.</p>
        <p>Voici un exemple montrant comment utiliser la méthode <code>emit</code> pour déclencher un événement personnalisé et utiliser le mécanisme de propagation pour transmettre l&#39;événement aux éléments externes :</p>
        <o-playground name="emit - Déclencher un événement" style="--editor-height: 560px">
          <code path="demo.html">
    <template>
      <ul>
        <li id="target">
          I am target
        </li>
      </ul>
      <div id="logger1" style="border:red solid 1px;padding:8px;">-</div>
      <div id="logger2" style="border:blue solid 1px;padding:8px;">-</div>
      <script>
        let count = 0;
        \$('ul').on('custom-event',()=>{
          count++;
          \$("#logger1").text = 'ul is triggered ' + count;
        });
        \$('#target').on('custom-event',()=>{
          count++;
          \$("#logger2").text = 'target is triggered ' + count;
        });
        setTimeout(()=>{
          \$("#target").emit("custom-event",{
            data:"I am data"
          });
        },500);
      </script>
    </template>
  </code>
        </o-playground>
        <p>Dans cet exemple, nous avons enregistré le même gestionnaire d’événement personnalisé <code>custom-event</code> pour l’élément <code>&lt;ul&gt;</code> et l’élément <code>&lt;li&gt;</code>. Lorsque nous déclenchons l’événement avec la méthode <code>emit</code>, celui-ci remonte de l’élément <code>&lt;li&gt;</code> à l’élément <code>&lt;ul&gt;</code>, déclenchant ainsi les deux gestionnaires d’événement.</p>
        <h2>Données personnalisées</h2>
        <p>En passant le paramètre <code>data</code>, vous pouvez transmettre des données personnalisées au gestionnaire d&#39;événements :</p>
        <o-playground name="emit - données personnalisées" style="--editor-height: 560px">
          <code path="demo.html">
    <template>
      <ul>
        <li id="target">
          Je suis la cible
        </li>
      </ul>
      <div id="logger1" style="border:red solid 1px;padding:8px;">-</div>
      <div id="logger2" style="border:blue solid 1px;padding:8px;">-</div>
      <script>
        \$('ul').on('custom-event',(event)=>{
          \$("#logger1").text = 'ul est déclenché;  =>  ' + event.data;
        });
        \$('#target').on('custom-event',(event)=>{
          \$("#logger2").text = 'la cible est déclenchée;  =>  ' + event.data;
        });
        setTimeout(()=>{
          \$("#target").emit("custom-event",{ 
            data:"Je suis les données"
          });
        },500);
      </script>
    </template>
  </code>
        </o-playground>
        <p>Dans cet exemple, nous passons des données personnalisées au gestionnaire d&#39;événements via le paramètre <code>data</code>. Le gestionnaire d&#39;événements peut récupérer les données transmises via <code>event.data</code>.</p>
        <h2>Déclencher un événement sans bouillonnement</h2>
        <p>Si vous ne souhaitez pas que l&#39;événement se propage, vous pouvez ajouter le paramètre <code>bubbles: false</code> lors du déclenchement de l&#39;événement :</p>
        <o-playground name="emit - pas de remontée" style="--editor-height: 560px">
          <code path="demo.html">
    <template>
      <ul>
        <li id="target">
          I am target
        </li>
      </ul>
      <div id="logger1" style="border:red solid 1px;padding:8px;">-</div>
      <div id="logger2" style="border:blue solid 1px;padding:8px;">-</div>
      <script>
        \$('ul').on('custom-event',()=>{
          \$("#logger1").text = 'ul is triggered';
        });
        \$('#target').on('custom-event',()=>{
          \$("#logger2").text = 'target is triggered';
        });
        setTimeout(()=>{
          \$("#target").emit("custom-event",{
            bubbles: false
          });
        },500);
      </script>
    </template>
  </code>
        </o-playground>
        <p>Dans cet exemple, nous déclenchons un événement personnalisé avec le paramètre <code>bubbles: false</code>. Cet événement ne remonte pas aux éléments parents, seul le gestionnaire d’événements de l’élément <code>&lt;li&gt;</code> est donc déclenché.</p>
        <h2>Percer le nœud racine</h2>
        <p>Par défaut, les événements ne traversent pas le Shadow DOM des composants personnalisés. Mais vous pouvez définir <code>composed: true</code> pour permettre aux événements personnalisés de traverser le nœud racine et de déclencher des éléments en dehors du nœud racine.</p>
        <o-playground name="emit - pénétrer le nœud racine" style="--editor-height: 560px">
          <code path="demo.html" preview>
    <template>
      <div id="outer-logger"></div>
      <l-m src="./composed-test.html"></l-m>
      <composed-test></composed-test>
    </template>
  </code>
          <code path="composed-test.html" active>
    <template component>
      <style>
        :host{
          display:block;
          border:red solid 1px;
        }
      </style>
      <div id="logger">{{loggerText}}</div>
      <div id="target"></div>
      <script>
        export default {
          tag: "composed-test",
          data:{
            loggerText: ""
          },
          ready(){
            this.on("custom-event",(event)=>{
              this.loggerText = 'custom event is triggered;  =>  ' + event.data;
            });
            setTimeout(()=>{
              this.shadow.$("#target").emit("custom-event",{
                composed: true,
                data:"I am composed event"
              });
            },500);
          }
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>Dans cet exemple, nous créons un composant personnalisé <code>composed-test</code>, qui contient un élément dans le shadow DOM et un bouton déclenchant un événement. Par défaut, l’événement ne traverse pas le shadow DOM vers le nœud racine. Cependant, en utilisant le paramètre <code>composed: true</code> lors du déclenchement de l’événement, nous permettons à celui-ci de traverser jusqu’au nœud racine et de déclencher un élément extérieur au nœud racine.</p>
      </article>
