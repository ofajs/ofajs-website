        <h1>Documentation de l'API</h1>
        <p> ofa.js prend non seulement en charge la syntaxe des modèles, mais fournit également une API riche pour manipuler directement le DOM. Tout comme <a href="https://jquery.com/" target="_blank">jQuery</a>, vous pouvez remplacer le JavaScript natif verbeux par une syntaxe concise d’ofa.js et effectuer facilement des opérations sur le DOM. </p>
        <p> Dans les fonctions de cycle de vie des composants ou modules de page ainsi que dans les méthodes personnalisées, vous pouvez appeler à tout moment les API fournies par ofa.js pour manipuler les éléments DOM de manière flexible et efficace. </p>

      <script>
        export const parent = "../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
