        <h1>formData</h1>
        <p>La méthode <code>formData</code> est utilisée pour générer des données d&#39;objet liées aux éléments de formulaire, ce qui rend le traitement des éléments de formulaire plus simple et plus efficace. Cette méthode génère un objet contenant les valeurs de tous les éléments de formulaire dans l&#39;élément cible, et cet objet reflète les modifications des éléments de formulaire en temps réel.</p>
        <p>Dans l’exemple ci-dessous, nous montrons comment utiliser la méthode <code>formData</code> pour générer des données d’objet liées aux éléments de formulaire :</p>
        <o-playground name="formData - utilisation de base" style="--editor-height: 500px">
          <code path="demo.html">
    <template>
      <form id="myForm">
        <input type="text" name="username" value="John Doe" />
        <div>
          sexe:
          <label>
            homme
            <input type="radio" name="sex" value="man" />
          </label>
          <label>
            femme
            <input type="radio" name="sex" value="woman" />
          </label>
        </div>
        <textarea name="message">Hello World!</textarea>
      </form>
      <br />
      <div id="logger"></div>
      <script>
        const data = $("#myForm").formData();
        \$("#logger").text = data;
        data.watch(() => {
          \$("#logger").text = data;
        });
      </script>
    </template>
  </code>
        </o-playground>
        <p>Dans cet exemple, nous avons créé un formulaire contenant un champ de saisie de texte, des boutons radio et une zone de texte, et nous avons utilisé la méthode <code>formData</code> pour créer un objet <code>data</code> contenant les valeurs de ces éléments de formulaire. Nous avons également utilisé la méthode <code>watch</code> pour surveiller les changements de données et afficher les données en temps réel sur la page. Lorsque l&#39;utilisateur modifie la valeur d&#39;un élément du formulaire, l&#39;objet <code>data</code> se met à jour en conséquence, rendant le traitement des données très simple et efficace.</p>
        <h2>Liaison de données inverse</h2>
        <p>Les données d&#39;objet générées ont également une capacité de liaison inverse, ce qui signifie que lorsque vous modifiez les attributs d&#39;un objet, les valeurs des éléments de formulaire associés sont automatiquement mises à jour. Cela est très utile lors du traitement des données de formulaire, car vous pouvez facilement réaliser une liaison de données bidirectionnelle.</p>
        <p>Dans l&#39;exemple ci-dessous, nous montrons comment utiliser les données d&#39;objet générées par la méthode <code>formData</code>, ainsi que la manière de procéder à la liaison de données inverse :</p>
        <o-playground name="formData - liaison inverse" style="--editor-height: 500px">
          <code path="demo.html">
    <template>
      <form id="myForm">
        <input type="text" name="username" value="John Doe" />
        <div>
          sex:
          <label>
            man
            <input type="radio" name="sex" value="man" />
          </label>
          <label>
            woman
            <input type="radio" name="sex" value="woman" />
          </label>
        </div>
        <textarea name="message">Hello World!</textarea>
      </form>
      <br />
      <div id="logger"></div>
      <script>
        const data = $("#myForm").formData();
        setTimeout(()=>{
          data.username = "Yao";
          data.sex = "man";
          data.message = "ofa.js is good!";
        },1000);
      </script>
    </template>
  </code>
        </o-playground>
        <p>Dans cet exemple, nous avons d’abord créé un formulaire contenant un champ de saisie de texte, des boutons radio et une zone de texte, puis nous avons utilisé la méthode <code>formData</code> pour générer un objet de données <code>data</code>. Ensuite, en modifiant les propriétés de l’objet <code>data</code>, nous avons réalisé une liaison de données inverse, c’est-à-dire que les valeurs des éléments du formulaire se mettent à jour automatiquement lorsque les propriétés de l’objet changent. Cette fonctionnalité de liaison de données bidirectionnelle rend l’interaction avec les données du formulaire plus pratique.</p>
        <h2>Écouter un formulaire spécifique</h2>
        <p>Par défaut, la méthode <code>formData()</code> écoute tous les éléments <code>input</code>, <code>select</code> et <code>textarea</code> à l&#39;intérieur de l&#39;élément cible. Mais si vous souhaitez écouter uniquement des éléments de formulaire spécifiques, vous pouvez y parvenir en passant un sélecteur CSS.</p>
        <p>Dans l’exemple ci-dessous, nous montrons comment écouter un élément de formulaire spécifique en passant un sélecteur CSS :</p>
        <o-playground name="formData - Formulaire spécifique" style="--editor-height: 500px">
          <code path="demo.html">
    <template>
      <form id="myForm">
        <input type="text" name="username" value="John Doe" class="use-it" />
        <div>
          sex:
          <label>
            man
            <input type="radio" name="sex" value="man" class="use-it" />
          </label>
          <label>
            woman
            <input type="radio" name="sex" value="woman" class="use-it" />
          </label>
        </div>
        <textarea name="message">Cet élément de formulaire n'est pas lié</textarea>
      </form>
      <br />
      <div id="logger"></div>
      <script>
        const data = $("#myForm").formData(".use-it");
        \$("#logger").text = data;
        data.watch(() => {
          \$("#logger").text = data;
        });
      </script>
    </template>
  </code>
        </o-playground>
        <p>Dans cet exemple, nous souhaitons uniquement écouter les éléments de formulaire ayant la <code>class</code> &quot;use-it&quot;, nous avons donc passé <code>&quot;.use-it&quot;</code> comme paramètre à la méthode <code>formData()</code>. Ainsi, seuls les éléments de formulaire avec ce nom de classe seront surveillés et inclus dans l&#39;objet de données généré. Cela est très utile pour écouter sélectivement les éléments de formulaire afin de gérer plus précisément vos données de formulaire.</p>
        <h2>Formulaire personnalisé</h2>
        <p>L&#39;utilisation des composants de formulaire personnalisés est très simple, il suffit d&#39;ajouter un attribut <strong>value</strong> au composant personnalisé et de définir la propriété <strong>name</strong>.</p>
        <o-playground name="formData - Formulaire personnalisé" style="--editor-height: 500px">
          <code path="demo.html" preview active>
    <template>
      <div id="myForm">
        <input type="text" name="username" value="John Doe" />
        <l-m src="./custom-input.html"></l-m>
        <custom-input name="message"></custom-input>
        <div id="logger"></div>
      </div>
      <script>
        const data = $("#myForm").formData("input,custom-input");
        \$("#logger").text = data;
        data.watch(() => {
          \$("#logger").text = data;
        });
      </script>
    </template>
  </code>
          <code path="custom-input.html">
    <template component>
      <style>
        :host{
          display: block;
        }
        .editor {
          display: inline-block;
          min-width: 200px;
          line-height: 30px;
          height: 30px;
          border: #aaa solid 1px;
          border-radius: 4px;
          padding: 4px;
          font-size: 14px;
        }
      </style>
      <div
        class="editor"
        contenteditable="plaintext-only"
        :text="value"
        on:input="changeText"
      ></div>
      <script>
        export default {
          tag:"custom-input",
          attrs: {
            name: "",
          },
          data: {
            value: "Texte par défaut",
          },
          proto: {
            changeText(e) {
              this.value = $(e.target).text;
            },
          },
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>Lorsque vous utilisez un composant de formulaire personnalisé, il vous suffit de l&#39;ajouter à votre formulaire et de définir l&#39;attribut <code>name</code> requis. Dans l&#39;exemple ci-dessus, nous utilisons un composant de formulaire personnalisé en ajoutant l&#39;élément <code>&lt;custom-input&gt;</code> et en définissant l&#39;attribut <code>name</code>. Ensuite, nous utilisons la méthode <code>formData()</code> pour écouter les valeurs des éléments d&#39;entrée et des composants personnalisés, afin de récupérer et traiter les données du formulaire en temps réel. Cette approche vous permet d&#39;étendre facilement votre formulaire pour y inclure des composants personnalisés, répondant ainsi à vos besoins spécifiques.</p>
        <h2>Utiliser les données de formulaire dans les composants ou pages</h2>
        <p>Parfois, vous pouvez avoir besoin d&#39;utiliser des données de formulaire dans un composant ou une page, et vous devez générer des données et les lier au composant pendant le cycle de vie <code>attached</code>.</p>
        <o-playground name="formData - utilisation dans le composant" style="--editor-height: 600px">
          <code path="demo.html" preview>
    <template>
      <l-m src="./form-data-demo.html"></l-m>
      <form-data-demo></form-data-demo>
    </template>
  </code>
          <code path="form-data-demo.html" active>
    <template component>
      <style>
        :host{
          display: block;
        }
      </style>
      <input type="text" name="username" value="John Doe" />
      <div>{{logtext}}</div>
      <script>
        export default {
          tag:"form-data-demo",
          data: {
            fdata:{},
            logtext: ""
          },
          watch:{
            fdata(data){
              if(data){
                this.logtext = JSON.stringify(data);
              }
            }
          },
          attached(){
            this.fdata = this.shadow.formData();
          }
        };
      </script>
    </template>
  </code>
        </o-playground>
        <p>Grâce au cycle de vie <code>attached</code>, une fois que le composant est prêt, nous utilisons la méthode <code>this.shadow.formData()</code> pour générer l&#39;objet de données de formulaire <code>fdata</code>.</p>
        <p><code>formData()</code> est plus adapté aux scénarios de formulaire avec une logique d&#39;interaction relativement simple.</p>
