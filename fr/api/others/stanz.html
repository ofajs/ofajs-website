        <h1>Caractéristiques des données d'exemple</h1>
        <p>Les objets d’instance obtenus ou créés via <code>$</code> possèdent l’intégralité des caractéristiques de données de stanz, car l’instance <code>$</code> hérite de stanz. Cela signifie que vous pouvez utiliser les méthodes et propriétés de manipulation de données fournies par <code>stanz</code> pour manipuler et écouter les données de l’objet instance.</p>
        <blockquote>
          <p>L'exemple suivant utilise des éléments standards, car les composants personnalisés ont généralement leurs propres données enregistrées, tandis que les éléments standards ne contiennent souvent que des informations de balisage, ce qui les rend plus adaptés à la démonstration.</p>
        </blockquote>
        <h2>watch</h2>
        <p>Les instances peuvent surveiller les changements de valeur via la méthode <code>watch</code> ; même si la valeur d'un sous-objet d'un objet est modifiée, le changement peut être détecté dans la méthode <code>watch</code> de l'objet.</p>
        <p>Voici un exemple qui montre comment utiliser l'instance <code>$</code> et la méthode <code>watch</code> :</p>
        <o-playground name="stanz - montre" style="--editor-height: 480px">
          <code path="demo.html">
    <template>
      <div id="target"></div>
      <br>
      <div id="logger" style="border: #aaa solid 1px; padding: 8px"></div>
      <script>
        const target = $("#target");
        \$("#logger").text = target;
        target.watch(() => {
          \$("#logger").text = target;
        });
        setTimeout(() => {
          target.aaa = "Je suis aaa";
        }, 600);
        setTimeout(() => {
          target.bbb = {
            child: {
              val: "Je suis bbb enfant val",
            },
          };
        }, 1200);
        setTimeout(() => {
          target.bbb.child.val = "changer bbb enfant val";
        }, 1800);
      </script>
    </template>
  </code>
        </o-playground>
        <p>Dans cet exemple, nous créons d'abord un objet d'instance <code>$</code> appelé <code>target</code>, puis utilisons la méthode <code>watch</code> pour surveiller ses changements. Même si nous modifions la valeur d'un sous-objet de l'objet, par exemple la valeur de <code>target.bbb.child.val</code>, la méthode <code>watch</code> peut détecter ces changements et mettre à jour le contenu de l'élément <code>logger</code>. Cela illustre la puissance de l'objet d'instance <code>$</code>, vous permettant de surveiller facilement les changements d'un objet.</p>
        <h2>watchTick</h2>
        <p><code>watchTick</code> et <code>watch</code> ont des fonctionnalités similaires, mais <code>watchTick</code> intègre une opération de throttling en interne, qui s'exécute une seule fois dans un seul thread. Ainsi, dans certains scénarios nécessitant des performances élevées, il permet de surveiller plus efficacement les changements de données.</p>
        <p>Voici un exemple montrant comment utiliser la méthode <code>watchTick</code> de l’instance <code>$</code> :</p>
        <o-playground name="stanz - watchTick" style="--editor-height: 480px">
          <code path="demo.html">
    <template>
      <div id="target"></div>
      <br>
      <div id="logger1" style="border: blue solid 1px; margin: 8px"></div>
      <div id="logger2" style="border: red solid 1px; margin: 8px"></div>
      <script>
        const target = $("#target");
        let count1 = 0;
        target.watch(() => {
          count1++;
          \$("#logger1").text = 'Nombre d\'exécutions de watch : ' + count1;
        });
        let count2 = 0;
        target.watchTick(()=>{
          count2++;
          \$("#logger2").text = 'Nombre d\'exécutions de watchTick : ' + count2;
        });
        setTimeout(() => {
          target.aaa = "Je suis aaa";
          target.bbb = "Je suis bbb";
          target.ccc = "Je suis ccc";
        }, 1000);
      </script>
    </template>
  </code>
        </o-playground>
        <p>Dans cet exemple, nous créons d’abord une instance <code>$</code> nommée <code>target</code>. Ensuite, nous utilisons les méthodes <code>watch</code> et <code>watchTick</code> pour écouter les changements de l’objet. La méthode <code>watch</code> s’exécute immédiatement lors d’une modification des données, tandis que la méthode <code>watchTick</code> ne s’exécute qu’une seule fois dans un thread donné, limitant ainsi la fréquence de l’écoute. Vous pouvez choisir d’utiliser <code>watch</code> ou <code>watchTick</code> selon vos besoins pour surveiller les changements de données.</p>
        <h2>unwatch</h2>
        <p><code>unwatch</code> La méthode est utilisée pour annuler la surveillance des données, elle peut révoquer les surveillances précédemment enregistrées via <code>watch</code> ou <code>watchTick</code>.</p>
        <p>Voici un exemple montrant comment utiliser la méthode <code>unwatch</code> de l'instance <code>$</code> :</p>
        <o-playground name="stanz - unwatch" style="--editor-height: 480px">
          <code path="demo.html">
    <template>
      <div id="target"></div>
      <br>
      <div id="logger1" style="border: blue solid 1px; margin: 8px"></div>
      <div id="logger2" style="border: red solid 1px; margin: 8px"></div>
      <script>
        const target = $("#target");
        const tid1 = target.watch(() => {
          \$("#logger1").text = JSON.stringify(target);
        });
        const tid2 = target.watchTick(()=>{
          \$("#logger2").text = JSON.stringify(target);
        });
        setTimeout(() => {
          target.aaa = "I am aaa";
          target.unwatch(tid1);
          target.unwatch(tid2);
        }, 500);
        setTimeout(() => {
          target.bbb = "I am aaa";
        }, 1000);
      </script>
    </template>
  </code>
        </o-playground>
        <p>Dans cet exemple, nous créons d'abord un objet instance <code>$</code> nommé <code>target</code>, puis nous enregistrons deux écouteurs à l'aide des méthodes <code>watch</code> et <code>watchTick</code> respectivement. Ensuite, nous utilisons la méthode <code>unwatch</code> en passant les valeurs de retour des écouteurs précédemment sauvegardées <code>tid1</code> et <code>tid2</code> pour annuler ces deux écouteurs. Cela signifie que la modification de propriété dans le premier <code>setTimeout</code> ne déclenchera aucun écouteur, car les écouteurs ont été annulés.</p>
        <h2>Valeurs non surveillées</h2>
        <p>Dans l'instance <code>$</code>, l'utilisation de noms de propriétés commençant par un trait de soulignement <code>_</code> indique que ces valeurs ne seront pas surveillées par les méthodes <code>watch</code> ou <code>watchTick</code>. Cela est très utile pour certaines propriétés temporaires ou privées, vous pouvez les modifier librement sans déclencher la surveillance.</p>
        <p>Dans le modèle, ceci est appelé <a href="../../documentation/state-management.html" olink="">données non réactives</a>.</p>
        <p>Voici un exemple montrant comment utiliser les valeurs d'attribut commençant par un tiret bas pour éviter d'être écouté :</p>
        <o-playground name="stanz - données non réactives" style="--editor-height: 480px">
          <code path="demo.html">
    <template>
      <div id="target"></div>
      <br>
      <div id="logger" style="border: #aaa solid 1px; padding: 8px"></div>
      <script>
        const target = $("#target");
        \$("#logger").text = target;
        target.watch(() => {
          \$("#logger").text = target;
        });
        setTimeout(() => {
          target._aaa = "I am aaa";
        }, 600);
        setTimeout(() => {
          target._aaa = "change aaa";
        }, 1200);
      </script>
    </template>
  </code>
        </o-playground>
        <p>Dans cet exemple, nous créons une instance <code>$</code> appelée <code>target</code>, puis nous utilisons la méthode <code>watch</code> pour écouter les changements de valeur des propriétés. Dans <code>setTimeout</code>, nous tentons de modifier la valeur de la propriété <code>_aaa</code>, mais ce changement ne déclenche pas l’écoute. Cela est très utile lorsqu’il est nécessaire de mettre à jour une valeur de propriété sans déclencher l’écoute.</p>
        <h2>Caractéristiques de base</h2>
        <p>Les données d'objet définies sur l'instance seront converties en instance Stanz, cette instance Stanz permettant l'écoute.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> obj = {
  <span class="hljs-attr">val</span>: <span class="hljs-string">"I am obj"</span>
};

$(<span class="hljs-string">"#target"</span>).<span class="hljs-property">obj</span> = obj;
<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>($(<span class="hljs-string">"#target"</span>).<span class="hljs-property">obj</span>.<span class="hljs-property">val</span> === obj.<span class="hljs-property">val</span>);
<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>($(<span class="hljs-string">"#target"</span>).<span class="hljs-property">obj</span> === obj);</code></pre>
        <p>Nous pouvons également utiliser <code>$.stanz</code> pour créer des données Stanz qui ne sont pas liées à une instance.</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> data = $.<span class="hljs-title function_">stanz</span>({
  <span class="hljs-attr">val</span>: <span class="hljs-string">"I am val"</span>
});

data.<span class="hljs-title function_">watch</span>(<span class="hljs-function">() =&gt;</span> {
  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(data.<span class="hljs-property">val</span>);
});

data.<span class="hljs-property">val</span> = <span class="hljs-string">"change val"</span>;</code></pre>
        <p>Ces exemples illustrent les caractéristiques de base de la configuration des données d'objet en tant qu'instances Stanz pour l'écoute.</p>
        <p>Veuillez consulter <a href="https://github.com/ofajs/stanz" target="_blank">stanz</a> pour plus de fonctionnalités complètes.</p>
