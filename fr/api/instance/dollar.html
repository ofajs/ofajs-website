        <h1>$</h1>
        <p>La méthode <code>$</code> est la fonction centrale d'ofa.js, utilisée pour obtenir et manipuler des instances d'éléments DOM. Voici une présentation détaillée des principales fonctionnalités de <code>$</code> :</p>
        <h2>Obtenir une instance d'élément</h2>
        <p>En utilisant la méthode <code>$</code> , vous pouvez obtenir la première instance d'élément sur la page qui correspond au <a href="https://developer.mozilla.org/zh-CN/docs/Web/CSS/Reference/Selectors/Selector_list" target="_blank">sélecteur CSS</a> et effectuer des opérations dessus. Voici un exemple :</p>
        <o-playground name="$ - obtenir l'élément">
          <code path="demo.html">
    <template>
      <div id="target1">target 1 text</div>
      <script>
        setTimeout(()=>{
          \$("#target1").text = 'change target 1';
        },500);
      </script>
    </template>
  </code>
        </o-playground>
        <p>Dans l'exemple ci-dessus, nous avons utilisé le symbole <code>$</code> pour sélectionner l'instance de l'élément ayant l'<code>id</code> "target1", et nous avons modifié son contenu textuel en définissant la propriété <code>text</code>.</p>
        <h2>Exemple de recherche d'élément enfant</h2>
        <p>L'instance possède également la méthode <code>$</code>, qui permet d'obtenir, via la méthode <code>$</code> de l'instance, la première instance d'élément enfant correspondant aux critères.</p>
        <o-playground name="$ - Rechercher les éléments enfants">
          <code path="demo.html">
    <template>
      <div id="target1">
        <h3>target</h3>
        <p>I am target1</p>
      </div>
      <script>
        const tar = $("#target1");
        tar.$('h3').text = 'change target title';
      </script>
    </template>
  </code>
        </o-playground>
        <p>Ne veuillez pas insérer directement l'instance d'élément obtenue dans un autre endroit, car une telle opération affectera l'élément d'origine. Si vous devez créer une copie, vous pouvez utiliser la méthode <a href="./clone.html" olink="">clone</a>.</p>
        <o-playground name="$ - Caractéristiques d'instance" style="--editor-height: 360px">
          <code path="demo.html">
    <template>
      <div id="pos1" style="border:red solid 1px;">
        <h3>position 1</h3>
        <p id="target1" style="color:green">I am target1</p>
      </div>
      <div id="pos2" style="border:blue solid 1px;margin:8px;">
        <h3>position 2</h3>
      </div>
      <script>
        setTimeout(()=>{
          const tar = $("#target1");
          \$("#pos2").push(tar);
        },500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Obtenir les éléments enfants dans le nœud fantôme</h2>
        <p>On peut obtenir une instance via la propriété <a href="./shadow.html" olink="">shadow</a>, puis obtenir l'élément souhaité via la méthode <code>$</code>.</p>
        <pre><code class="hljs language-javascript">$(<span class="hljs-string">'my-component'</span>).<span class="hljs-property">shadow</span>.$(<span class="hljs-string">"sélecteur"</span>).<span class="hljs-property">m</span>é<span class="hljs-title function_">thode</span>(xxx)</code></pre>
        <h2>Instanciation directe d'éléments</h2>
        <p>Vous pouvez initialiser un élément natif directement en tant qu’instance de <code>$</code> de la manière suivante :</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> ele = <span class="hljs-variable language_">document</span>.<span class="hljs-title function_">createElement</span>(<span class="hljs-string">'div'</span>);
<span class="hljs-keyword">const</span> $ele = $(ele);</code></pre>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> ele = <span class="hljs-variable language_">document</span>.<span class="hljs-title function_">querySelector</span>(<span class="hljs-string">'#target'</span>);
<span class="hljs-keyword">const</span> $ele = $(ele);</code></pre>
        <p>Ainsi, vous pouvez facilement convertir les éléments HTML existants en instances <code>$</code> afin d'utiliser les fonctionnalités fournies par <code>$</code> pour les manipuler et les traiter.</p>
        <h2>Générer une instance d'élément</h2>
        <p>En dehors de cela, <code>$</code> qui permet d'obtenir une instance d'élément existante peut également être utilisé pour créer une nouvelle instance d'élément et l'ajouter à la page.</p>
        <h3>Génération via chaîne de caractères</h3>
        <p>Vous pouvez utiliser la fonction <code>$</code> pour créer une nouvelle instance d’élément à partir d’une chaîne, comme suit :</p>
        <o-playground name="$ - génération de chaîne" style="--editor-height: 260px">
          <code path="demo.html">
    <template>
      <div id="target1">
        <b>target1:</b>
      </div>
      <script>
        const newEl = $(`<div style="color:red">ajouter le texte cible 1</div>`);
        \$('#target1').push(newEl);
      </script>
    </template>
  </code>
        </o-playground>
        <p>Dans cet exemple, nous utilisons la fonction <code>$</code> pour créer une nouvelle instance d'élément avec un style et un contenu textuel spécifiés, et l'ajoutons à l'intérieur d'une instance d'élément existante avec l'<code>id</code> "target1".</p>
        <h3>Génération via objet</h3>
        <p>Vous pouvez également utiliser la fonction <code>$</code> pour générer une nouvelle instance d’élément sous forme d’objet, comme suit :</p>
        <o-playground name="$ - Génération d'objet" style="--editor-height: 360px">
          <code path="demo.html">
    <template>
      <div id="target1">
        <b>target1:</b>
      </div>
      <script>
        const newEl = $({
          tag: "div",
          text: "ajouter le texte target 1",
          css: {
            color: "red"
          }
        });
        \$('#target1').push(newEl);
      </script>
    </template>
  </code>
        </o-playground>
        <p>Dans cet exemple, nous utilisons la fonction <code>$</code> pour définir une nouvelle instance d'élément via un objet, comprenant le type de balise, le contenu textuel et les attributs de style, et nous l'ajoutons à une instance d'élément existante avec l'<code>id</code> "target1".</p>
        <h2>Relation entre les exemples obtenus et les instances de page/composant</h2>
        <p>La méthode <code>$</code> permet d'obtenir l'instance de la page ou d'un élément du composant depuis le contexte global ; elle possède la même fonctionnalité que le <code>this</code> utilisé dans les méthodes du cycle de vie du module de page ou de composant.</p>

      <script>
        export const parent = "../../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
