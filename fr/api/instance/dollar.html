      <article class="markdown-body">
        <h1>$</h1>
        <p>La méthode <code>$</code> est la fonction centrale d'ofa.js, utilisée pour obtenir et manipuler des instances d'éléments DOM. Voici une présentation détaillée des principales fonctionnalités de <code>$</code> :</p>
        <h2>Obtenir une instance d'élément</h2>
        <p>Grâce à la méthode <code>$</code>, vous pouvez obtenir la première instance d’élément correspondant au <a href="https://developer.mozilla.org/fr/docs/Web/CSS/Reference/Selectors/Selector_list" target="_blank">sélecteur CSS</a> sur la page et effectuer des opérations dessus. Voici un exemple :</p>
        <o-playground name="$ - obtenir l'élément">
          <code path="demo.html">
    <template>
      <div id="target1">texte cible 1</div>
      <script>
        setTimeout(()=>{
          \$("#target1").text = 'changer cible 1';
        },500);
      </script>
    </template>
  </code>
        </o-playground>
        <p>Dans l'exemple ci-dessus, nous avons utilisé le symbole <code>$</code> pour sélectionner l'instance d'élément avec l'<code>id</code> "target1", et modifié son contenu textuel en définissant la propriété <code>text</code>.</p>
        <h2>Rechercher les instances d'éléments enfants</h2>
        <p>L’instance possède également la méthode <code>$</code>, qui permet d’obtenir, via la méthode <code>$</code> de l’instance, la première instance d’élément enfant correspondant aux critères.</p>
        <o-playground name="$ - Trouver des éléments enfants">
          <code path="demo.html">
    <template>
      <div id="target1">
        <h3>target</h3>
        <p>Je suis target1</p>
      </div>
      <script>
        const tar = $("#target1");
        tar.$('h3').text = 'changer le titre de la cible';
      </script>
    </template>
  </code>
        </o-playground>
        <p>Veuillez ne pas insérer directement l’instance d’élément obtenue ailleurs ; une telle opération affectera l’élément d’origine. Si vous avez besoin d’en créer une copie, utilisez la méthode <a href="./clone.html" olink="">clone</a>.</p>
        <o-playground name="$ - propriétés d'instance" style="--editor-height: 360px">
          <code path="demo.html">
    <template>
      <div id="pos1" style="border:red solid 1px;">
        <h3>position 1</h3>
        <p id="target1" style="color:green">I am target1</p>
      </div>
      <div id="pos2" style="border:blue solid 1px;margin:8px;">
        <h3>position 2</h3>
      </div>
      <script>
        setTimeout(()=>{
          const tar = $("#target1");
          \$("#pos2").push(tar);
        },500);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Obtenir les éléments enfants dans un nœud fantôme</h2>
        <p>On peut obtenir une instance via l'attribut <a href="./shadow.html" olink="">shadow</a>, puis utiliser la méthode <code>$</code> pour obtenir l'élément souhaité :</p>
        <pre><code class="hljs language-javascript">$(<span class="hljs-string">'my-component'</span>).<span class="hljs-property">shadow</span>.$(<span class="hljs-string">"selector"</span>).<span class="hljs-title function_">method</span>(xxx)</code></pre>
        <h2>Instanciation directe d'éléments</h2>
        <p>Vous pouvez initialiser directement un élément natif en tant qu'instance <code>$</code> de la manière suivante :</p>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> ele = <span class="hljs-variable language_">document</span>.<span class="hljs-title function_">createElement</span>(<span class="hljs-string">'div'</span>);
<span class="hljs-keyword">const</span> $ele = $(ele);</code></pre>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> ele = <span class="hljs-variable language_">document</span>.<span class="hljs-title function_">querySelector</span>(<span class="hljs-string">'#target'</span>);
<span class="hljs-keyword">const</span> $ele = $(ele);</code></pre>
        <p>Ainsi, vous pouvez facilement convertir des éléments HTML existants en instances de <code>$</code> afin d’utiliser les fonctionnalités fournies par <code>$</code> pour les manipuler et les traiter.</p>
        <h2>Génération d'instances d'éléments</h2>
        <p>En outre, <code>$</code> permet non seulement d’obtenir une instance d’élément existante, mais aussi de créer une nouvelle instance d’élément et de l’ajouter à la page.</p>
        <h3>Générer par chaîne de caractères</h3>
        <p>Vous pouvez utiliser la fonction <code>$</code> pour créer une nouvelle instance d'élément à partir d'une chaîne de caractères, comme suit :</p>
        <o-playground name="$ - Génération de chaîne" style="--editor-height: 260px">
          <code path="demo.html">
    <template>
      <div id="target1">
        <b>target1:</b>
      </div>
      <script>
        const newEl = $(`<div style="color:red">ajouter le texte target 1</div>`);
        \$('#target1').push(newEl);
      </script>
    </template>
  </code>
        </o-playground>
        <p>Dans cet exemple, nous utilisons la fonction <code>$</code> pour créer une nouvelle instance d'élément avec des styles et un contenu texte spécifiés, puis l'ajoutons à l'intérieur d'une instance d'élément existante ayant l'<code>id</code> "target1".</p>
        <h3>Génération via objet</h3>
        <p>Vous pouvez également utiliser la fonction <code>$</code> pour générer une nouvelle instance d'élément sous forme d'objet, comme suit :</p>
        <o-playground name="$ - Génération d'objet" style="--editor-height: 360px">
          <code path="demo.html">
    <template>
      <div id="target1">
        <b>target1:</b>
      </div>
      <script>
        const newEl = $({
          tag: "div",
          text: "add target 1 text",
          css: {
            color: "red"
          }
        });
        \$('#target1').push(newEl);
      </script>
    </template>
  </code>
        </o-playground>
        <p>Dans cet exemple, nous utilisons la fonction <code>$</code> pour définir une nouvelle instance d'élément de manière objet, incluant le type de balise, le contenu textuel et les attributs de style, puis nous l'ajoutons à l'intérieur de l'instance d'élément existante ayant l'<code>id</code> "target1".</p>
      </article>

      <script>
        export const parent = "../../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
      </script>
