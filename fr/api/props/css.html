      <article class="markdown-body">
        <h1>css</h1>
        <p><code>css</code> méthode est utilisée pour obtenir ou définir le style d&#39;un élément cible.</p>
        <h2>Utilisation directe</h2>
        <p>Vous pouvez utiliser directement la méthode <code>css</code> pour obtenir ou définir le style d&#39;un élément.</p>
        <o-playground name="css - utilisation directe" style="--editor-height: 300px">
          <code path="demo.html">
    <template>
      <div id="target">origin text</div>
      <br>
      <h4>logger</h4>
      <div id="logger" style="border:#aaa solid 1px;padding:8px;"></div>
      <script>
        $("#logger").text = $("#target").css.color;
        setTimeout(()=> {
          $('#target').css.color = 'red';
          $("#logger").text = $("#target").css.color;
        }, 1000);
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Configuration complète</h2>
        <p>Grâce à l&#39;objet <code>css</code> acquis, vous pouvez directement définir la valeur de style sur l&#39;élément.</p>
        <o-playground name="css - Configuration complète" style="--editor-height: 400px">
          <code path="demo.html">
    <template>
      <div id="target" style="color:red">origin text</div>
      <br>
      <h4>logger</h4>
      <div id="logger" style="border:#aaa solid 1px;padding:8px;"></div>
      <script>
        $("#logger").text = Object.keys($("#target").css);
        setTimeout(()=>{
          \$("#target").css = {
            color: "blue",
            lineHeight: "5em"
          };
          \$("#logger").text = Object.keys($("#target").css);
        }, 500);
      </script>
    </template>
  </code>
        </o-playground>
        <p>En utilisant les propriétés de l’objet <code>css</code>, vous pouvez rapidement ajuster le style de l’élément cible.</p>
        <h2>Utilisation via la syntaxe de modèle</h2>
        <p>Vous pouvez également définir le style de l&#39;élément cible à l&#39;aide de la syntaxe de modèle.</p>
        <o-playground name="css - Syntaxe du modèle" style="--editor-height: 400px">
          <code path="demo.html" preview>
    <template>
      <l-m src="./css-demo.html"></l-m>
      <css-demo></css-demo>
      <script>
        setTimeout(()=>{
          \$("css-demo").txt = "blue";
        },1000);
      </script>
    </template>
  </code>
          <code path="css-demo.html" active>
    <template component>
      <div :css.color="txt">I am target</div>
      <script>
        export default {
          tag: "css-demo",
          data: {
            txt: "red"
          },
          ready(){
            setTimeout(()=>{
              this.txt = "blue";
            }, 500);
          }
        };
      </script>
    </template>
  </code>
        </o-playground>
        <h2>Astuces pour configurer le css</h2>
        <p>Vous pouvez modifier une propriété de style d&#39;un élément en utilisant <code>$ele.css = {...$ele.css, color:&#39;red&#39;}</code> sans affecter les autres propriétés de style. Cette approche permet de ne modifier qu&#39;une seule propriété sans avoir à réécrire l&#39;ensemble du style.</p>
        <h3>Exemple</h3>
        <pre><code class="hljs language-javascript"><span class="hljs-keyword">const</span> myElement = $(<span class="hljs-string">&quot;#myElement&quot;</span>);

myElement.<span class="hljs-property">css</span> = { ...myElement.<span class="hljs-property">css</span>, <span class="hljs-attr">color</span>: <span class="hljs-string">&#x27;red&#x27;</span> };</code></pre>
        <p>Dans l&#39;exemple ci-dessus, en utilisant <code>{ ...myElement.css, color: &#39;red&#39; }</code>, nous avons modifié uniquement le style de couleur de l&#39;élément, tout en gardant les autres propriétés de style inchangées. C&#39;est une astuce très pratique qui permet de modifier les styles d&#39;un élément de manière flexible.</p>
      </article>

        export const parent = "../../../layout.html";
        export default async ({
          load,
          query
        }) => {
          const {
            init,
            revoke
          } = await load("../../../js/init.js");
          return {
            data: {},
            attached() {
              init(this, query);
              setTimeout(() => {
                this.style.transform = "";
              }, 300);
            },
            detached() {
              revoke(this);
            },
          };
        };
