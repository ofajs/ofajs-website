        <h1>Utiliser les prompts IA d&#39;ofa.js dans un projet</h1>
        <p>Étant donné qu&#39;ofa.js n&#39;est pas encore devenu un framework largement reconnu, les principaux modèles d&#39;IA ne possèdent pas encore la capacité d&#39;utiliser directement ofa.js. Pour cette raison, nous avons soigneusement préparé des prompts dédiés pour aider l&#39;IA à apprendre et à consulter les méthodes d&#39;utilisation d&#39;ofa.js.</p>
        <p>Nous proposons deux versions de l&#39;invite :</p>
        <h2>Version simplifiée des prompts</h2>
        <p>Ceci est une version concentrée et optimisée, conçue pour minimiser la consommation de jetons d’entrée préliminaires et adaptée à la plupart des scénarios :</p>
        <pre><code class="hljs">https:<span class="hljs-regexp">//</span>raw.githubusercontent.com<span class="hljs-regexp">/ofajs/</span>ofa.js<span class="hljs-regexp">/main/</span>llms<span class="hljs-regexp">/tiny/</span>start.md</code></pre>
        <p>En utilisant cette invite, l’IA peut développer efficacement des composants ou des modules de page pour ofa.js.</p>
        <h2>Prompt complet</h2>
        <p>Si l&#39;IA que vous utilisez n&#39;est pas assez intelligente, vous pouvez essayer d&#39;utiliser la version complète non condensée de l&#39;invite. Bien qu&#39;elle occupe plus de tokens lors de l&#39;initialisation, elle peut offrir de meilleurs résultats :</p>
        <pre><code class="hljs">https:<span class="hljs-regexp">//</span>raw.githubusercontent.com<span class="hljs-regexp">/ofajs/</span>ofa.js<span class="hljs-regexp">/main/</span>llms<span class="hljs-regexp">/origin/</span>start.md</code></pre>
        <p>En fournissant ces mots-clés, nous espérons aider les développeurs à utiliser plus facilement les outils d&#39;IA pour le développement du projet ofa.js, améliorant ainsi l&#39;efficacité du développement.</p>
      </article>
