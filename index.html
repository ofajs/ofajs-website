<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="3;url=./en/" />
  <title>ofa.js Tutorial</title>
  <link rel="stylesheet" href="./css/palette.css" />
  <link rel="stylesheet" href="./css/theme.css" />
  <script src="https://cdn.jsdelivr.net/gh/kirakiray/ofa.js@4.6.20/dist/ofa.mjs" type="module"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--md-sys-color-surface);
      font-family:
        -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .loader {
      width: 36px;
      height: 36px;
      border: 4px solid var(--md-sys-color-primary-container);
      border-top-color: var(--md-sys-color-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .text {
      margin-top: 16px;
      color: var(--md-sys-color-on-surface);
      font-size: 14px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .language-selector {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 0.5s ease-out forwards;
      line-height: 0em;
      animation-delay: 5s;
    }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
        line-height: 1.6em;
      }
    }
  </style>
  <script async="" src="https://www.googletagmanager.com/gtag/js?id=G-7L1TCCJZT6"></script>
  <script>
    window.dataLayer = window.dataLayer || [];

    function gtag() {
      dataLayer.push(arguments);
    }
    gtag("js", new Date());
    gtag("config", "G-7L1TCCJZT6");
  </script>
</head>

<body>
  <div class="loader"></div>
  <nav class="language-selector" role="navigation" aria-label="Language selection">
    <h1>Select Language - Choose your preferred language</h1>
    <ul class="language-list">
      <li><a href="./cn/" hreflang="cn" lang="cn">Chinese - CN Documentation</a></li>
      <li><a href="./en/" hreflang="en" lang="en">English - EN Documentation</a></li>
      <li><a href="./t-cn/" hreflang="t-cn" lang="t-cn">Traditional Chinese - T-CN Documentation</a></li>
      <li><a href="./ja/" hreflang="ja" lang="ja">Japanese - JA Documentation</a></li>
      <li><a href="./ko/" hreflang="ko" lang="ko">Korean - KO Documentation</a></li>
      <li><a href="./es/" hreflang="es" lang="es">Spanish - ES Documentation</a></li>
    </ul>
  </nav>
  <script>
    (async function() {
      try {
        const data = {
          "name": "ofa.js Tutorial",
          "writingLang": "cn",
          "primaryLang": "en",
          "github": "https://github.com/ofajs/ofa.js",
          "languages": ["cn", "en", "t-cn", "ja", "ko", "es"],
          "logoImg": "./logo.svg",
          "logoName": "ofa.js"
        };
        const languages = data.languages || [];
        const userLang = navigator.language || navigator.userLanguage;
        let targetLang = "en";
        const langParts = userLang.toLowerCase().split("-");
        for (const lang of langParts) {
          if (languages.includes(lang)) {
            targetLang = lang;
            break;
          }
        }
        window.location.href = `./${targetLang}/`;
      } catch (e) {
        window.location.href = "./en/";
      }
    })();
  </script>
</body>

</html>
